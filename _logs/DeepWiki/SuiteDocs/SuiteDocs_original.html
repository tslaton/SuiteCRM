min/release/InboundEmail3.png)\n- [static/images/en/admin/release/InboundEmail4.png](static/images/en/admin/release/InboundEmail4.png)\n- [static/images/en/admin/release/InboundEmail5.png](static/images/en/admin/release/InboundEmail5.png)\n- [static/images/en/admin/release/InboundOAuthConfiguration.png](static/images/en/admin/release/InboundOAuthConfiguration.png)\n- [static/images/en/admin/release/OAuthMicrosoftConnection.png](static/images/en/admin/release/OAuthMicrosoftConnection.png)\n- [static/images/en/admin/release/Outbound1.png](static/images/en/admin/release/Outbound1.png)\n- [static/images/en/admin/release/Outbound2.png](static/images/en/admin/release/Outbound2.png)\n\n\u003c/details\u003e\n\n\n\nThis document provides a comprehensive overview of the SuiteCRM versions covered in the SuiteDocs documentation system. It serves as a reference for understanding the version landscape, release cycles, support status, and API evolution across both SuiteCRM 7.x and 8.x series.\n\nFor specific installation procedures, see [Installation Process](#5.1). For upgrade instructions between versions, see [Upgrade Procedures](#5.2). For API-specific documentation, see [API Documentation](#4).\n\n## SuiteCRM Version Ecosystem\n\nThe SuiteCRM ecosystem spans two major architectural generations, each with distinct characteristics, support lifecycles, and development approaches.\n\n### Version Architecture Overview\n\n```mermaid\ngraph TB\n    subgraph \"Legacy 7.x Architecture\"\n        V78[\"7.8.x\u003cbr/\u003eEnd of Life\u003cbr/\u003eJuly 2019\"]\n        V710[\"7.10.x\u003cbr/\u003eExtended Support Ended\u003cbr/\u003eJanuary 2022\"]\n        V711[\"7.11.x\u003cbr/\u003eMaintenance Mode\"]\n        V712[\"7.12.x\u003cbr/\u003eActive Support\u003cbr/\u003eLatest: 7.12.14\"]\n        V713[\"7.13.x\u003cbr/\u003eOAuth Integration\u003cbr/\u003eLatest: 7.13.4\"]\n        V714[\"7.14.x\u003cbr/\u003ePHP 8.2 Support\u003cbr/\u003eLatest: 7.14.6\"]\n    end\n    \n    subgraph \"Modern 8.x Architecture\"\n        V80[\"8.0.x\u003cbr/\u003eAngular Rewrite\u003cbr/\u003eInitial Release\"]\n        V82[\"8.2.x\u003cbr/\u003eMigration Entry Point\u003cbr/\u003eLatest: 8.2.4\"]\n        V84[\"8.4.x\u003cbr/\u003ePHP 8.1+ Required\u003cbr/\u003eLatest: 8.4.2\"]\n        V86[\"8.6.x\u003cbr/\u003eLogin Language Config\u003cbr/\u003eLatest: 8.6.2\"]\n        V87[\"8.7.x\u003cbr/\u003eAngular 18, 2FA\u003cbr/\u003eLatest: 8.7.1\"]\n    end\n    \n    V78 --\u003e V710\n    V710 --\u003e V711\n    V711 --\u003e V712\n    V712 --\u003e V713\n    V713 --\u003e V714\n    \n    V80 --\u003e V82\n    V82 --\u003e V84\n    V84 --\u003e V86\n    V86 --\u003e V87\n    \n    V714 -.-\u003e|\"No Direct Migration\"| V82\n```\n\n**Sources:** [content/admin/releases/7.8.x/_index.en.adoc](), [content/admin/releases/7.10.x/_index.en.adoc](), [content/admin/releases/7.11.x/_index.en.adoc](), [content/admin/releases/7.12.x/_index.en.adoc](), [content/admin/releases/7.13.x/_index.en.adoc](), [content/admin/releases/7.14.x/_index.en.adoc](), [content/8.x/admin/releases/8.0/_index.en.adoc](), [content/8.x/admin/releases/8.2/_index.en.adoc](), [content/8.x/admin/releases/8.4/_index.en.adoc](), [content/8.x/admin/releases/8.6/_index.en.adoc](), [content/8.x/admin/releases/8.7/_index.en.adoc]()\n\n## Release Documentation Structure\n\nThe version documentation follows a hierarchical file structure that mirrors the SuiteCRM release organization:\n\n### Documentation File Mapping\n\n```mermaid\ngraph LR\n    subgraph \"Admin Release Documentation\"\n        AdminRoot[\"content/admin/releases/\"]\n        V7Structure[\"7.x.x/_index.en.adoc\"]\n        V8Structure[\"content/8.x/admin/releases/8.x/_index.en.adoc\"]\n    end\n    \n    subgraph \"Version-Specific Content\"\n        Release714[\"7.14.x/_index.en.adoc\u003cbr/\u003eweight: 9850\"]\n        Release713[\"7.13.x/_index.en.adoc\u003cbr/\u003eweight: 9860\"]\n        Release712[\"7.12.x/_index.en.adoc\u003cbr/\u003eweight: 9870\"]\n        Release711[\"7.11.x/_index.en.adoc\u003cbr/\u003eweight: 9880\"]\n        Release710[\"7.10.x/_index.en.adoc\u003cbr/\u003eweight: 9890\"]\n        Release78[\"7.8.x/_index.en.adoc\u003cbr/\u003eweight: 9910\"]\n    end\n    \n    subgraph \"8.x Release Structure\"\n        Release87[\"8.7/_index.en.adoc\u003cbr/\u003eweight: 9810\"]\n        Release86[\"8.6/_index.en.adoc\u003cbr/\u003eweight: 9820\"]\n        Release85[\"8.5/_index.en.adoc\u003cbr/\u003eweight: 9830\"]\n        Release84[\"8.4/_index.en.adoc\u003cbr/\u003eweight: 9840\"]\n        Release82[\"8.2/_index.en.adoc\u003cbr/\u003eweight: 9860\"]\n        Release80[\"8.0/_index.en.adoc\u003cbr/\u003eweight: 9880\"]\n    end\n    \n    AdminRoot --\u003e V7Structure\n    AdminRoot --\u003e V8Structure\n    V7Structure --\u003e Release714\n    V7Structure --\u003e Release713\n    V7Structure --\u003e Release712\n    V7Structure --\u003e Release711\n    V7Structure --\u003e Release710\n    V7Structure --\u003e Release78\n    V8Structure --\u003e Release87\n    V8Structure --\u003e Release86\n    V8Structure --\u003e Release85\n    V8Structure --\u003e Release84\n    V8Structure --\u003e Release82\n    V8Structure --\u003e Release80\n```\n\n**Sources:** [content/admin/releases/7.14.x/_index.en.adoc:1-4](), [content/admin/releases/7.13.x/_index.en.adoc:1-4](), [content/admin/releases/7.12.x/_index.en.adoc:1-4](), [content/8.x/admin/releases/8.7/_index.en.adoc:1-6](), [content/8.x/admin/releases/8.6/_index.en.adoc:1-6]()\n\n## Version Support Lifecycle\n\n### SuiteCRM 7.x Series Status\n\n| Version | Status | Last Release | End of Life | PHP Support |\n|---------|--------|-------------|-------------|-------------|\n| 7.8.x | End of Life | 7.8.31 (July 2019) | July 2019 | PHP 5.6+ |\n| 7.10.x | End of Life | 7.10.36 (January 2022) | January 2022 | PHP 7.0+ |\n| 7.11.x | Maintenance | 7.11.23 (November 2021) | Maintenance Mode | PHP 7.1+ |\n| 7.12.x | Active | 7.12.14 (November 2023) | Active Support | PHP 7.4+ |\n| 7.13.x | Active | 7.13.4 (July 2023) | Active Support | PHP 8.0+ |\n| 7.14.x | Active | 7.14.6 (November 2024) | Active Support | PHP 8.2+ |\n\n### SuiteCRM 8.x Series Status\n\n| Version | Status | Last Release | Key Features | PHP Requirement |\n|---------|--------|-------------|--------------|-----------------|\n| 8.0.x | Superseded | 8.0.4 (March 2022) | Angular Rewrite | PHP 7.4+ |\n| 8.2.x | Migration Entry | 8.2.4 (March 2023) | Migration Support | PHP 7.4+ |\n| 8.4.x | Superseded | 8.4.2 (November 2023) | PHP 8.1+ Required | PHP 8.1+ |\n| 8.6.x | Active | 8.6.2 (August 2024) | Login Language Config | PHP 8.1+ |\n| 8.7.x | Active | 8.7.1 (November 2024) | Angular 18, 2FA | PHP 8.1+ |\n\n**Sources:** [content/admin/releases/7.8.x/_index.en.adoc:14-16](), [content/admin/releases/7.10.x/_index.en.adoc:22](), [content/8.x/admin/releases/8.4/_index.en.adoc:185-189]()\n\n## API Evolution Across Versions\n\n### API Version Compatibility Matrix\n\n```mermaid\ngraph TB\n    subgraph \"API v4.1 - SOAP \u0026 REST\"\n        API41[\"API v4.1\u003cbr/\u003eSOAP \u0026 REST\u003cbr/\u003eAvailable in ALL Versions\"]\n        SOAP[\"SOAP Endpoint\u003cbr/\u003eservice/v4_1/soap.php\"]\n        REST[\"REST Endpoint\u003cbr/\u003eservice/v4_1/rest.php\"]\n    end\n    \n    subgraph \"API v8 - JSON API\"\n        API8[\"API v8\u003cbr/\u003eJSON API \u0026 OAuth2\u003cbr/\u003e8.x Only\"]\n        JSON[\"JSON API Endpoint\u003cbr/\u003e/api/graphql\"]\n        OAuth[\"OAuth2 Authentication\"]\n    end\n    \n    subgraph \"Version Compatibility\"\n        All7x[\"All 7.x Versions\u003cbr/\u003e7.8.x - 7.14.x\"]\n        All8x[\"All 8.x Versions\u003cbr/\u003e8.0.x - 8.7.x\"]\n    end\n    \n    API41 --\u003e SOAP\n    API41 --\u003e REST\n    API41 --\u003e All7x\n    API41 --\u003e All8x\n    \n    API8 --\u003e JSON\n    API8 --\u003e OAuth\n    API8 --\u003e All8x\n```\n\n**Sources:** [content/developer/api/API-4_1.adoc:14-18](), [content/developer/api/API-4_1.adoc:25-29]()\n\n### API Authentication Methods\n\nThe authentication mechanisms vary significantly between API versions:\n\n**API v4.1 Authentication:**\n- Username/password authentication with MD5 hashing\n- Session-based authentication using `login()` method\n- Available in both SOAP and REST implementations\n\n**API v8 Authentication:**\n- OAuth2 with client credentials flow\n- Bearer token authentication\n- JWT token support for enhanced security\n\n**Sources:** [content/developer/api/API-4_1.adoc:47-51]()\n\n## Security and CVE Tracking\n\n### Security Vulnerability Management\n\nThe documentation tracks security vulnerabilities using CVE (Common Vulnerabilities and Exposures) identifiers across all versions:\n\n```mermaid\ngraph LR\n    subgraph \"Security Issue Types\"\n        SQL[\"SQL Injection\u003cbr/\u003eCVE-2024-49773\"]\n        XSS[\"XSS Vulnerabilities\u003cbr/\u003eCVE-2024-50335\"]\n        RCE[\"Remote Code Execution\u003cbr/\u003eCVE-2024-50333\"]\n        Access[\"Improper Access Control\u003cbr/\u003eCVE-2024-45392\"]\n    end\n    \n    subgraph \"Affected Versions\"\n        V7All[\"7.x Series\u003cbr/\u003eAll Active Versions\"]\n        V8All[\"8.x Series\u003cbr/\u003eAll Active Versions\"]\n    end\n    \n    subgraph \"Resolution Process\"\n        Report[\"Security Report\u003cbr/\u003esecurity@suitecrm.com\"]\n        CVE[\"CVE Assignment\"]\n        Patch[\"Security Patch Release\"]\n    end\n    \n    SQL --\u003e V7All\n    SQL --\u003e V8All\n    XSS --\u003e V7All\n    XSS --\u003e V8All\n    RCE --\u003e V7All\n    RCE --\u003e V8All\n    Access --\u003e V8All\n    \n    V7All --\u003e Report\n    V8All --\u003e Report\n    Report --\u003e CVE\n    CVE --\u003e Patch\n```\n\n**Sources:** [content/admin/releases/7.14.x/_index.en.adoc:26-31](), [content/8.x/admin/releases/8.7/_index.en.adoc:29-34](), [content/admin/releases/7.12.x/_index.en.adoc:223-230]()\n\n## Migration and Upgrade Paths\n\n### Version Upgrade Complexity\n\nThe upgrade paths between versions vary significantly in complexity:\n\n**Within 7.x Series:**\n- Sequential upgrades generally supported (7.12.x → 7.13.x → 7.14.x)\n- Minor version upgrades within series (7.14.5 → 7.14.6)\n- Database schema updates handled automatically\n\n**7.x to 8.x Migration:**\n- No direct upgrade path available\n- Complete system migration required\n- Data migration tools provided for 8.2.0+\n- Legacy mode available for compatibility\n\n**Within 8.x Series:**\n- Standard upgrade procedures between minor versions\n- Breaking changes documented in release notes\n- Configuration updates may be required\n\n**Sources:** [content/8.x/admin/upgrading/general-info.adoc:14-17](), [content/8.x/admin/releases/8.4/_index.en.adoc:211-219]()\n\n## Release Notes Structure\n\n### Standard Release Documentation Format\n\nEach version's release documentation follows a consistent structure implemented across all version files:\n\n```mermaid\ngraph TB\n    subgraph \"Release Note Components\"\n        Assets[\"Assets Section\u003cbr/\u003eGitHub Download Links\u003cbr/\u003eInstall/Upgrade Guides\"]\n        Security[\"Security Section\u003cbr/\u003eCVE Identifiers\u003cbr/\u003eVulnerability Descriptions\"]\n        Features[\"Features/Enhancements\u003cbr/\u003eNew Functionality\u003cbr/\u003eConfiguration Changes\"]\n        Bugs[\"Bug Fixes\u003cbr/\u003eGitHub Issue References\u003cbr/\u003ePull Request Links\"]\n        Community[\"Community Section\u003cbr/\u003eContributor Recognition\u003cbr/\u003eSecurity Reporters\"]\n    end\n    \n    subgraph \"Documentation Elements\"\n        Icons[\"AsciiDoc Icons\u003cbr/\u003eicon:box-open[]\u003cbr/\u003eicon:lock[]\u003cbr/\u003eicon:bug[]\"]\n        Links[\"GitHub References\u003cbr/\u003ePR Numbers\u003cbr/\u003eIssue Numbers\"]\n        CVELinks[\"CVE Database Links\u003cbr/\u003eNIST/MITRE References\"]\n    end\n    \n    Assets --\u003e Icons\n    Security --\u003e Icons\n    Security --\u003e CVELinks\n    Bugs --\u003e Links\n    Features --\u003e Icons\n    Community --\u003e Links\n```\n\n**Sources:** [content/admin/releases/7.14.x/_index.en.adoc:15-32](), [content/8.x/admin/releases/8.7/_index.en.adoc:17-34](), [layouts/shortcodes/ghcontributors.html:1-36]()\n\n## Community Contribution Tracking\n\n### Contributor Recognition System\n\nThe documentation system includes automated contributor recognition using GitHub usernames:\n\n**GitHub Contributors Shortcode:**\n- Implemented in `layouts/shortcodes/ghcontributors.html`\n- Displays contributor avatars and GitHub profiles\n- Used across all release notes for community recognition\n\n**Community Contribution Categories:**\n- Security vulnerability reporting\n- Bug fixes and feature development\n- Documentation improvements\n- Translation and localization\n\n**Sources:** [layouts/shortcodes/ghcontributors.html:23-34](), [content/admin/releases/7.14.x/_index.en.adoc:52-58]()"])</script><script>self.__next_f.push([1,"1b:T4bfd,"])</script><script>self.__next_f.push([1,"# SuiteCRM 8.x Series\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [content/8.x/_index.en.adoc](content/8.x/_index.en.adoc)\n- [content/8.x/admin/Licensing.adoc](content/8.x/admin/Licensing.adoc)\n- [content/8.x/admin/_index.en.adoc](content/8.x/admin/_index.en.adoc)\n- [content/8.x/admin/_index.ru.adoc](content/8.x/admin/_index.ru.adoc)\n- [content/8.x/admin/installation-guide/Downloading \u0026 Installing.adoc](content/8.x/admin/installation-guide/Downloading \u0026 Installing.adoc)\n- [content/8.x/admin/installation-guide/Languages/install-a-new-language.adoc](content/8.x/admin/installation-guide/Languages/install-a-new-language.adoc)\n- [content/8.x/admin/installation-guide/Languages/update-a-language-pack.adoc](content/8.x/admin/installation-guide/Languages/update-a-language-pack.adoc)\n- [content/8.x/admin/ en/8.x/admin/release/Fav-Filter.gif](static/images/en/8.x/admin/release/Fav-Filter.gif)\n- [static/images/en/8.x/admin/release/Qr-2FA.png](static/images/en/8.x/admin/release/Qr-2FA.png)\n- [static/images/en/8.x/admin/release/new-record-view.png](static/images/en/8.x/admin/release/new-record-view.png)\n- [static/images/en/8.x/admin/release/portal-user-enable-buttons.gif](static/images/en/8.x/admin/release/portal-user-enable-buttons.gif)\n- [static/images/en/8.x/admin/release/preinstall-page-re-styled.png](static/images/en/8.x/admin/release/preinstall-page-re-styled.png)\n- [static/images/en/8.x/admin/release/release-notes-field-actions-example.gif](static/images/en/8.x/admin/release/release-notes-field-actions-example.gif)\n- [static/images/en/8.x/user/features/2FA-Profile.png](static/images/en/8.x/user/features/2FA-Profile.png)\n- [static/images/en/8.x/user/features/Disable-Two-Factor.gif](static/images/en/8.x/user/features/Disable-Two-Factor.gif)\n- [static/images/en/8.x/user/features/Enable-2FA.png](static/images/en/8.x/user/features/Enable-2FA.png)\n- [static/images/en/8.x/user/features/Enabled-2FA.png](static/images/en/8.x/user/features/Enabled-2FA.png)\n- [static/images/en/8.x/user/features/Login-2FA.png](static/images/en/8.x/user/features/Login-2FA.png)\n- [static/images/en/8.x/user/features/New-Disable-2FA.png](static/images/en/8.x/user/features/New-Disable-2FA.png)\n- [static/images/en/8.x/user/features/QR-Code-Secret.png](static/images/en/8.x/user/features/QR-Code-Secret.png)\n- [static/images/en/8.x/user/features/Qr-2FA.png](static/images/en/8.x/user/features/Qr-2FA.png)\n- [static/images/en/8.x/user/features/Regenerate-Codes.gif](static/images/en/8.x/user/features/Regenerate-Codes.gif)\n\n\u003c/details\u003e\n\n\n\nThis document provides comprehensive coverage of the SuiteCRM 8.x series, including version evolution, architectural changes, upgrade paths, and development considerations. The 8.x series represents a complete architectural rewrite of SuiteCRM, transitioning from a traditional PHP application to a modern Angular frontend with Symfony backend.\n\nFor information about SuiteCRM 7.x series, see [SuiteCRM 7.x Series](#3.2). For API documentation covering both series, see [API Documentation](#4).\n\n## Version Evolution and Timeline\n\nThe SuiteCRM 8.x series spans from 8.0.0 (initial release) through 8.8.0 (latest), with significant architectural changes throughout its evolution.\n\n```mermaid\ntimeline\n    title \"SuiteCRM 8.x Evolution Timeline\"\n    \n    section 8.0-8.1\n        8.0.x : Initial Angular Rewrite\n              : Legacy PHP Backend\n              : Basic CRUD Operations\n        8.1.x : Recently Viewed\n              : Favourites\n              : HTML Fields\n              : User Preferences Storage\n    \n    section 8.2-8.3\n        8.2.x : LDAP/SAML Authentication\n              : 7.x Migration Path\n              : Duplicate View\n              : Bulk Select Subpanel\n        8.3.x : PHP 7.4+ Required\n              : Notifications System\n              : Subpanel Filters\n              : Load More Pagination\n              : Admin Panel Redesign\n    \n    section 8.4-8.5\n        8.4.x : PHP 8.1+ Required\n              : Smarty v4 Upgrade\n              : Navigation Redesign\n              : Floating Save\n              : Field Logic Extensions\n        8.5.x : Angular 16 Upgrade\n              : Symfony Caching\n              : Quick Filters\n              : Mobile Adjustments\n    \n    section 8.6-8.7\n        8.6.x : Language Selector\n              : Mobile Improvements\n              : Pre-install Checks\n              : Relate Field Redesign\n        8.7.x : Symfony 6.4 Upgrade\n              : PHP 8.1+ Minimum\n              : Convert Target\n              : Record Pagination\n              : Field Actions\n    \n    section 8.8\n        8.8.x : Angular 18 Upgrade\n              : PHP 8.3 Support\n              : Two-Factor Authentication\n              : Record View Redesign\n              : Save Handlers\n              : Record Mappers\n```\n\nSources: [content/8.x/admin/releases/8.4/_index.en.adoc:172-303](), [content/8.x/admin/releases/8.6/_index.en.adoc:214-335](), [content/8.x/admin/releases/8.8/_index.en.adoc:14-198]()\n\n## System Architecture Overview\n\nSuiteCRM 8.x employs a modern multi-tier architecture with clear separation between frontend, backend, and legacy components.\n\n```mermaid\ngraph TB\n    subgraph \"Frontend Layer\"\n        Angular[\"Angular 18 Frontend\u003cbr/\u003ecore/app/core/\"]\n        Extensions[\"Angular Extensions\u003cbr/\u003eextensions/defaultExt/app/\"]\n        ModuleFederation[\"Module Federation\u003cbr/\u003ewebpack.config.js\"]\n    end\n    \n    subgraph \"Backend Layer\"\n        Symfony[\"Symfony 6.4 Backend\u003cbr/\u003ecore/backend/\"]\n        GraphQL[\"GraphQL API\u003cbr/\u003eapi/graphql\"]\n        JsonAPI[\"JSON API v8\u003cbr/\u003eOAuth2\"]\n        ProcessAPI[\"Process API\u003cbr/\u003ecore/backend/Process/\"]\n    end\n    \n    subgraph \"Legacy Layer\"\n        LegacyPHP[\"Legacy PHP Components\u003cbr/\u003epublic/legacy/\"]\n        SoapRest[\"SOAP \u0026 REST API v4.1\u003cbr/\u003epublic/legacy/service/\"]\n        SugarLogic[\"Sugar Logic Hooks\u003cbr/\u003ecustom/modules/\"]\n    end\n    \n    subgraph \"Data Layer\"\n        MySQL[\"MySQL Database\"]\n        FileSystem[\"File System\u003cbr/\u003epublic/legacy/upload/\"]\n        Cache[\"Symfony Cache\u003cbr/\u003ecache/\"]\n    end\n    \n    subgraph \"Authentication\"\n        LDAP[\"LDAP Authentication\u003cbr/\u003ecore/backend/Security/\"]\n        SAML[\"SAML Authentication\u003cbr/\u003ecore/backend/Security/\"]\n        TwoFA[\"Two-Factor Auth\u003cbr/\u003eTOTP Implementation\"]\n    end\n    \n    Angular --\u003e Symfony\n    Extensions --\u003e Angular\n    ModuleFederation --\u003e Extensions\n    Symfony --\u003e GraphQL\n    Symfony --\u003e JsonAPI\n    Symfony --\u003e ProcessAPI\n    Symfony --\u003e LegacyPHP\n    LegacyPHP --\u003e SoapRest\n    LegacyPHP --\u003e SugarLogic\n    Symfony --\u003e MySQL\n    Symfony --\u003e FileSystem\n    Symfony --\u003e Cache\n    Symfony --\u003e LDAP\n    Symfony --\u003e SAML\n    Symfony --\u003e TwoFA\n```\n\nSources: [content/8.x/admin/releases/8.7/_index.en.adoc:79-246](), [content/8.x/admin/releases/8.8/_index.en.adoc:40-198](), [content/8.x/developer/extensions/frontend/migration/Migration-8.8.adoc:1-117]()\n\n## System Requirements Evolution\n\nThe 8.x series introduced progressive system requirement updates to support modern technologies.\n\n| Version Range | PHP Version | Node.js | Angular | Symfony | Key Requirements |\n|---------------|-------------|---------|---------|---------|-----------------|\n| 8.0.x - 8.3.x | 7.4+ | 14.x | 12 | 5.4 | Initial requirements |\n| 8.4.x | 8.1+ | 16.x | 14 | 5.4 | PHP 8.1 minimum |\n| 8.5.x | 8.1+ | 18.x | 16 | 5.4 | Angular 16 upgrade |\n| 8.6.x | 8.1+ | 18.x | 16 | 5.4 | Stability focus |\n| 8.7.x | 8.1+ | 18.x | 16 | 6.4 | Symfony 6.4 upgrade |\n| 8.8.x | 8.1+ (8.3 supported) | 20.11.1+ | 18 | 6.4 | Angular 18, Yarn 4.5+ |\n\nSources: [content/8.x/admin/releases/8.4/_index.en.adoc:185-191](), [content/8.x/admin/releases/8.7/_index.en.adoc:96-105](), [content/8.x/admin/releases/8.8/_index.en.adoc:52-62]()\n\n## Migration and Upgrade Paths\n\nSuiteCRM 8.x provides structured upgrade paths with version-specific requirements and breaking changes.\n\n```mermaid\nflowchart TD\n    Legacy[\"SuiteCRM 7.12.x+\u003cbr/\u003eLegacy Installation\"] \n    \n    subgraph \"8.x Upgrade Paths\"\n        RC[\"8.0.x/8.1.x\u003cbr/\u003eRelease Candidates\"]\n        V82[\"8.2.x\u003cbr/\u003eStable Base\"]\n        V83[\"8.3.x\u003cbr/\u003eEnhanced Features\"]\n        V84[\"8.4.x\u003cbr/\u003ePHP 8.1+ Required\"]\n        V85[\"8.5.x\u003cbr/\u003eAngular 16\"]\n        V86[\"8.6.x\u003cbr/\u003eMobile Focus\"]\n        V87[\"8.7.x\u003cbr/\u003eSymfony 6.4\"]\n        V88[\"8.8.x\u003cbr/\u003eAngular 18\"]\n    end\n    \n    subgraph \"Migration Tools\"\n        LegacyMigration[\"legacy-migration/\u003cbr/\u003e8.2.0-legacy-migration/\"]\n        UpgradeCommand[\"bin/console suitecrm:app:upgrade\"]\n        ConfigRebuild[\"Admin \u003e Repair \u003e Rebuild Config\"]\n    end\n    \n    Legacy --\u003e|\"Migration Guide\"| V82\n    RC --\u003e|\"Mandatory Step\"| V82\n    V82 --\u003e V83\n    V83 --\u003e V84\n    V84 --\u003e V85\n    V85 --\u003e V86\n    V86 --\u003e V87\n    V87 --\u003e V88\n    \n    Legacy --\u003e LegacyMigration\n    V82 --\u003e UpgradeCommand\n    V88 --\u003e ConfigRebuild\n    \n    classDef breaking fill:#ffcccc\n    classDef stable fill:#ccffcc\n    classDef migration fill:#ccccff\n    \n    class V84,V85,V87,V88 breaking\n    class V82,V83,V86 stable\n    class LegacyMigration,UpgradeCommand migration\n```\n\nSources: [content/8.x/admin/upgrading/general-info.adoc:32-79](), [content/8.x/admin/releases/8.2/_index.en.adoc:326-440]()\n\n## Frontend Architecture and Extensions\n\nThe frontend architecture uses Angular with Module Federation for extensibility.\n\n```mermaid\ngraph LR\n    subgraph \"Core Frontend\"\n        CoreApp[\"core/app/core/\u003cbr/\u003eMain Angular App\"]\n        CommonLib[\"core/app/core/src/lib/common/\u003cbr/\u003eShared Components\"]\n        CoreModule[\"core/app/core/src/app/\u003cbr/\u003eCore Modules\"]\n    end\n    \n    subgraph \"Extension System\"\n        DefaultExt[\"extensions/defaultExt/app/\u003cbr/\u003eDefault Extensions\"]\n        CustomExt[\"extensions/{custom}/app/\u003cbr/\u003eCustom Extensions\"]\n        ExtConfig[\"extensions/{ext}/config/\u003cbr/\u003eextension.php\"]\n    end\n    \n    subgraph \"Build System\"\n        AngularJson[\"angular.json\u003cbr/\u003e(Generated)\"]\n        BaseConfig[\"core/angular/base-angular.json\"]\n        WebpackConfig[\"webpack.config.js\u003cbr/\u003eModule Federation\"]\n        YarnMerge[\"yarn merge-angular-json\"]\n    end\n    \n    subgraph \"Generated Assets\"\n        RemoteEntry[\"remoteEntry.js\u003cbr/\u003eFederation Endpoints\"]\n        DistFiles[\"dist/\u003cbr/\u003eBuilt Assets\"]\n    end\n    \n    CoreApp --\u003e CommonLib\n    CoreApp --\u003e CoreModule\n    DefaultExt --\u003e CommonLib\n    CustomExt --\u003e CommonLib\n    ExtConfig --\u003e RemoteEntry\n    \n    BaseConfig --\u003e YarnMerge\n    DefaultExt --\u003e YarnMerge\n    CustomExt --\u003e YarnMerge\n    YarnMerge --\u003e AngularJson\n    \n    AngularJson --\u003e WebpackConfig\n    WebpackConfig --\u003e RemoteEntry\n    WebpackConfig --\u003e DistFiles\n```\n\nSources: [content/8.x/developer/extensions/frontend/migration/Migration-8.8.adoc:21-117](), [content/8.x/developer/installation-guide/8.2.0-front-end-installation-guide.adoc:1-50]()\n\n## Backend Components and APIs\n\nThe backend provides multiple API layers and extension points for different use cases.\n\n```mermaid\ngraph TB\n    subgraph \"Modern Backend (8.x)\"\n        SymfonyCore[\"Symfony Core\u003cbr/\u003ecore/backend/\"]\n        \n        subgraph \"API Layer\"\n            GraphQLAPI[\"GraphQL Endpoint\u003cbr/\u003e/api/graphql\"]\n            JsonAPIv8[\"JSON API v8\u003cbr/\u003eOAuth2 Authentication\"]\n            ProcessAPI[\"Process API\u003cbr/\u003ecore/backend/Process/\"]\n        end\n        \n        subgraph \"Extension Points\"\n            SaveHandlers[\"Save Handlers\u003cbr/\u003eBefore/After Save Logic\"]\n            RecordMappers[\"Record Mappers\u003cbr/\u003eInternal/External Format\"]\n            FieldLogic[\"Field Logic\u003cbr/\u003eDisplay/Validation Logic\"]\n        end\n        \n        subgraph \"Authentication\"\n            JWTAuth[\"JWT Authentication\"]\n            OAuth2[\"OAuth2 Provider\"]\n            SAMLProvider[\"SAML Provider\u003cbr/\u003eNbgrp Bundle\"]\n            LDAPProvider[\"LDAP Provider\"]\n            TwoFactorAuth[\"TOTP Two-Factor\u003cbr/\u003eAuthentication\"]\n        end\n    end\n    \n    subgraph \"Legacy Backend (7.x Compatibility)\"\n        LegacyAPI[\"SOAP \u0026 REST API v4.1\u003cbr/\u003epublic/legacy/service/\"]\n        LogicHooks[\"Logic Hooks\u003cbr/\u003ebefore_save/after_save\"]\n        Vardefs[\"Vardefs\u003cbr/\u003eField Definitions\"]\n        ScheduledTasks[\"Scheduled Tasks\u003cbr/\u003eCron Jobs\"]\n    end\n    \n    SymfonyCore --\u003e GraphQLAPI\n    SymfonyCore --\u003e JsonAPIv8\n    SymfonyCore --\u003e ProcessAPI\n    SymfonyCore --\u003e SaveHandlers\n    SymfonyCore --\u003e RecordMappers\n    SymfonyCore --\u003e FieldLogic\n    SymfonyCore --\u003e JWTAuth\n    SymfonyCore --\u003e OAuth2\n    SymfonyCore --\u003e SAMLProvider\n    SymfonyCore --\u003e LDAPProvider\n    SymfonyCore --\u003e TwoFactorAuth\n    \n    SymfonyCore -.-\u003e|\"Legacy Bridge\"| LegacyAPI\n    SaveHandlers -.-\u003e|\"Similar to\"| LogicHooks\n```\n\nSources: [content/8.x/developer/extensions/backend/save-handlers/_index.en.adoc:1-58](), [content/8.x/admin/releases/8.7/_index.en.adoc:108-182](), [content/8.x/admin/releases/8.8/_index.en.adoc:97-153]()\n\n## Key Features by Version\n\n### Authentication and Security Features\n\nThe 8.x series progressively enhanced authentication capabilities:\n\n- **8.2.x**: Introduced LDAP and SAML authentication with user auto-creation\n- **8.6.x**: Added login language configuration and user profile language settings  \n- **8.7.x**: Updated SAML implementation with new `Nbgrp` bundle and environment-based configuration\n- **8.8.x**: Implemented TOTP-based two-factor authentication with backup codes\n\nConfiguration files: [core/backend/Security/](), [.env]() for SAML settings, [core/backend/Security/]() for LDAP.\n\n### User Interface Enhancements\n\nMajor UI improvements across versions:\n\n- **8.4.x**: Navigation bar redesign, floating save functionality, subpanel button widgets\n- **8.5.x**: Quick filters implementation, mobile view adjustments with insights toggle\n- **8.6.x**: Pre-install check page, relate field component redesign, mobile navigation improvements\n- **8.7.x**: Convert target action, record pagination (VCR replacement), field-level action buttons\n- **8.8.x**: Complete record view redesign with compact fields, subpanel redesign, timeline improvements\n\nSources: [content/8.x/admin/releases/8.4/_index.en.adoc:240-275](), [content/8.x/admin/releases/8.6/_index.en.adoc:233-295](), [content/8.x/admin/releases/8.8/_index.en.adoc:107-127]()\n\n### Developer Extensions and APIs\n\nThe extension system evolved significantly:\n\n- **8.3.x**: Process Handler Interface with `getRequiredACls` function\n- **8.4.x**: Field logic operators, display logic configuration, panel logic\n- **8.5.x**: Angular 16 migration requirements, frontend extension updates\n- **8.7.x**: State Providers/Processors replacing Data Providers/Persisters\n- **8.8.x**: Save Handlers, Record Mappers, common lib moved to `core/app/core/src/lib/common/`\n\nKey files: [extensions/defaultExt/config/extension.php](), [webpack.config.js](), [angular.json]()\n\n## Breaking Changes and Migration Considerations\n\n### Major Breaking Changes by Version\n\n**8.4.x Breaking Changes:**\n- Minimum PHP version updated to 8.1\n- `extensions/default` renamed to `extensions/defaultExt`\n- `displayType` logic deprecated in favor of `displayLogic`\n\n**8.5.x Breaking Changes:**\n- Angular 16 upgrade requiring dependency updates\n- Module Federation library version updates\n- Frontend extension rebuild required\n\n**8.7.x Breaking Changes:**\n- Symfony 6.4 upgrade with API Platform 3.2\n- SAML configuration structure changes\n- Session handling updates removing `LEGACYSESSID`\n- Doctrine DBAL method deprecations\n\n**8.8.x Breaking Changes:**\n- Angular 18 upgrade with zone.js disabled\n- Common lib relocation to `core/app/core/src/lib/common/`\n- Generated `angular.json` file (no longer version controlled)\n- Subpanel widget configuration key change from `insightWidget` to `subpanelWidget`\n\nSources: [content/8.x/admin/releases/8.4/_index.en.adoc:194-218](), [content/8.x/admin/releases/8.7/_index.en.adoc:116-160](), [content/8.x/developer/extensions/frontend/migration/Migration-8.8.adoc:21-46]()\n\n### Frontend Extension Migration\n\nFor extensions created before 8.8.x, migration steps include:\n\n1. Update Node.js and Yarn to compatibility matrix versions\n2. Copy configuration files from package: `angular.json`, `webpack.config.js`, etc.\n3. Update common lib imports from `'common'` to `'core'`\n4. Update `remoteEntry` paths in `extension.php` from `./extensions/` to `../extensions/`\n5. Run `yarn merge-angular-json` to generate the angular.json file\n6. Build extensions using `yarn build:extension \u003cextension\u003e`\n\nSources: [content/8.x/developer/extensions/frontend/migration/Migration-8.8.adoc:68-112]()\n\n## Installation and Development Setup\n\n### Installation Options\n\nSuiteCRM 8.x provides multiple installation methods:\n- **UI Installer**: Web-based installation with pre-install checks\n- **CLI Installer**: Command-line installation for automated deployments\n- **Dev Package**: Includes `dist` folder for extension development\n\nInstallation guide: [content/8.x/admin/installation-guide/Downloading \u0026 Installing.adoc:83-89]()\n\n### Development Requirements\n\nDevelopment setup requires:\n- Node.js 20.11.1+ (for 8.8.x)\n- Yarn 4.5.0+ (for 8.8.x)\n- PHP 8.1+ with required extensions\n- MySQL 5.7+ or MariaDB 10.1+\n- Composer 2.x+ for backend dependencies\n\nBuild commands:\n- `yarn merge-angular-json`: Generate angular.json from base and extensions\n- `yarn build:extension \u003cname\u003e`: Build specific extension\n- `yarn build`: Production build\n- `yarn build-dev`: Development build\n\nSources: [content/8.x/admin/releases/8.8/_index.en.adoc:52-62](), [content/8.x/developer/extensions/frontend/migration/Migration-8.8.adoc:47-67]()"])</script><script>self.__next_f.push([1,"1c:T3992,"])</script><script>self.__next_f.push([1,"# SuiteCRM 7.x Series\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [.htmltest.yml](.htmltest.yml)\n- [content/8.x/admin/releases/8.0/_index.en.adoc](content/8.x/admin/releases/8.0/_index.en.adoc)\n- [content/admin/Advanced Configuration Options.adoc](content/admin/Advanced Configuration Options.adoc)\n- [content/admin/releases/7.10.x/_index.en.adoc](content/admin/releases/7.10.x/_index.en.adoc)\n- [content/admin/releases/7.11.x/_index.en.adoc](content/admin/releases/7.11.x/_index.en.adoc)\n- [content/admin/releases/7.12.x/_index.en.adoc](content/admin/releases/7.12.x/_index.en.adoc)\n- [content/admin/releases/7.13.x/_index.en.adoc](content/admin/releases/7.13.x/_index.en.adoc)\n- [content/admin/releases/7.14.x/_index.en.adoc](content/admin/releases/7.14.x/_index.en.adoc)\n- [content/admin/releases/7.8.x/_index.en.adoc](content/admin/releases/7.8.x/_index.en.adoc)\n- [content/blog/Customizing-Subthemes.adoc](content/blog/Customizing-Subthemes.adoc)\n- [content/blog/_index.es.md](content/blog/_index.es.md)\n- [content/developer/api/API-4_1.adoc](content/developer/api/API-4_1.adoc)\n- [layouts/shortcodes/contribs.html](layouts/shortcodes/contribs.html)\n- [layouts/shortcodes/dumpJSON.html](layouts/shortcodes/dumpJSON.html)\n- [layouts/shortcodes/ghcontributors.html](layouts/shortcodes/ghcontributors.html)\n- [static/images/en/8.x/user/features/subpanels/Filter-Expanded.png](static/images/en/8.x/user/features/subpanels/Filter-Expanded.png)\n- [static/images/en/8.x/user/features/subpanels/Filter-Full-Panel.png](static/images/en/8.x/user/features/subpanels/Filter-Full-Panel.png)\n- [static/images/en/8.x/user/features/subpanels/Filter-Searched.png](static/images/en/8.x/user/features/subpanels/Filter-Searched.png)\n- [static/images/en/admin/release/Externaloauth1.png](static/images/en/admin/release/Externaloauth1.png)\n- [static/images/en/admin/release/Externaloauth2.png](static/images/en/admin/release/Externaloauth2.png)\n- [static/images/en/admin/release/Externaloauth3.png](static/images/en/admin/release/Externaloauth3.png)\n- [static/images/en/admin/release/InboundEmail1.png](static/images/en/admin/release/InboundEmail1.png)\n- [static/images/en/admin/release/InboundEmail2.png](static/images/en/admin/release/InboundEmail2.png)\n- [static/images/en/admin/release/InboundEmail3.png](static/images/en/admin/release/InboundEmail3.png)\n- [static/images/en/admin/release/InboundEmail4.png](static/images/en/admin/release/InboundEmail4.png)\n- [static/images/en/admin/release/InboundEmail5.png](static/images/en/admin/release/InboundEmail5.png)\n- [static/images/en/admin/release/InboundOAuthConfiguration.png](static/images/en/admin/release/InboundOAuthConfiguration.png)\n- [static/images/en/admin/release/OAuthMicrosoftConnection.png](static/images/en/admin/release/OAuthMicrosoftConnection.png)\n- [static/images/en/admin/release/Outbound1.png](static/images/en/admin/release/Outbound1.png)\n- [static/images/en/admin/release/Outbound2.png](static/images/en/admin/release/Outbound2.png)\n- [static/images/en/developer/Admin-OAuth2Clients-2.png](static/images/en/developer/Admin-OAuth2Clients-2.png)\n- [static/images/en/developer/Admin-OAuth2Clients-3.png](static/images/en/developer/Admin-OAuth2Clients-3.png)\n\n\u003c/details\u003e\n\n\n\nThis document covers the SuiteCRM 7.x series, including version history, technical architecture, release timeline, and upgrade paths. The 7.x series represents the traditional PHP-based architecture of SuiteCRM, in contrast to the Angular-based 8.x series covered in [SuiteCRM 8.x Series](#3.1). For compatibility information across versions, see [Version Compatibility Matrix](#3.3).\n\n## Version Overview and Lifecycle\n\nThe SuiteCRM 7.x series spans from version 7.8.x through 7.14.x, with different branches serving various support lifecycles. The series maintains backward compatibility while introducing incremental improvements and security updates.\n\n```mermaid\ntimeline\n    title SuiteCRM 7.x Release Timeline\n    \n    section Legacy (EOL)\n        2019-07 : 7.8.31 (Final)\n               : End of Life\n    \n    section LTS Extended Support\n        2019-2022 : 7.10.x Series\n                  : Extended Support\n        2022-01 : 7.10.36 (Final)\n               : EOL January 2022\n    \n    section Maintenance Mode\n        2020-2021 : 7.11.x Series\n                  : Maintenance Mode\n        2021-11 : 7.11.23 (Final)\n    \n    section Active Development\n        2022-2023 : 7.12.x Series\n                  : Latest 7.x Stable\n        2023-2024 : 7.13.x Series\n                  : OAuth Integration\n        2024-Current : 7.14.x Series\n                     : PHP 8.2 Support\n```\n\nSources: [content/admin/releases/7.8.x/_index.en.adoc:15-16](), [content/admin/releases/7.10.x/_index.en.adoc:22](), [content/admin/releases/7.11.x/_index.en.adoc:11-23](), [content/admin/releases/7.12.x/_index.en.adoc:11-14](), [content/admin/releases/7.13.x/_index.en.adoc:12-14](), [content/admin/releases/7.14.x/_index.en.adoc:12-14]()\n\n## Technical Architecture Overview\n\nSuiteCRM 7.x maintains a traditional PHP-based architecture with established customization patterns and upgrade-safe modification approaches.\n\n```mermaid\ngraph TB\n    subgraph \"SuiteCRM-7x-Core\"\n        THEMES[\"themes/SuiteP/\"]\n        MODULES[\"modules/\"]\n        INCLUDE[\"include/\"]\n        CONFIG[\"config.php\"]\n    end\n    \n    subgraph \"Custom-Directory-Pattern\"\n        CUSTOM_THEMES[\"custom/themes/SuiteP/\"]\n        CUSTOM_MODULES[\"custom/modules/\"]\n        CUSTOM_INCLUDE[\"custom/include/\"]\n        CUSTOM_EXT[\"custom/Extension/\"]\n    end\n    \n    subgraph \"Development-Tools\"\n        STUDIO[\"modules/ModuleBuilder/\"]\n        MODULE_BUILDER[\"modules/DynamicFields/\"]\n        WORKFLOW[\"modules/AOW_WorkFlow/\"]\n    end\n    \n    subgraph \"Configuration-Layer\"\n        CONFIG_OVERRIDE[\"config_override.php\"]\n        VARDEFS[\"vardefs.php\"]\n        METADATA[\"metadata/\"]\n    end\n    \n    THEMES --\u003e CUSTOM_THEMES\n    MODULES --\u003e CUSTOM_MODULES\n    INCLUDE --\u003e CUSTOM_INCLUDE\n    CONFIG --\u003e CONFIG_OVERRIDE\n    \n    STUDIO --\u003e CUSTOM_EXT\n    MODULE_BUILDER --\u003e CUSTOM_MODULES\n    WORKFLOW --\u003e CUSTOM_EXT\n```\n\nSources: [content/blog/Customizing-Subthemes.adoc:24-28](), [content/admin/Advanced Configuration Options.adoc:140-144]()\n\n## Release Branch Characteristics\n\n### 7.8.x Series (End of Life)\nThe final legacy branch before major architectural improvements.\n\n| Characteristic | Details |\n|---|---|\n| **Final Version** | 7.8.31 (July 2019) |\n| **Status** | End of Life |\n| **PHP Support** | PHP 7.1-7.3 |\n| **Key Features** | Basic SuiteP theme, traditional customization |\n\n### 7.10.x Series (Extended Support Ended)\nLong-term support branch with extended maintenance lifecycle.\n\n| Characteristic | Details |\n|---|---|\n| **Final Version** | 7.10.36 (January 2022) |\n| **Status** | Extended Support Ended |\n| **PHP Support** | PHP 7.1-8.0 |\n| **Key Security** | CVE-2021-45898, CVE-2021-45899, CVE-2021-45897 |\n\n### 7.11.x Series (Maintenance Mode)\nTransitional branch with limited feature development.\n\n| Characteristic | Details |\n|---|---|\n| **Final Version** | 7.11.23 (November 2021) |\n| **Status** | Maintenance Mode |\n| **PHP Support** | PHP 7.2-8.0 |\n| **Key Improvements** | ElasticSearch enhancements, security hardening |\n\n### 7.12.x Series (Latest Stable)\nCurrent stable production branch for 7.x deployments.\n\n| Characteristic | Details |\n|---|---|\n| **Latest Version** | 7.12.14 (November 2023) |\n| **Status** | Active Security Updates |\n| **PHP Support** | PHP 7.4-8.1 |\n| **Key Features** | Comprehensive security updates, performance improvements |\n\n### 7.13.x Series (OAuth Integration)\nBranch introducing modern authentication capabilities.\n\n| Characteristic | Details |\n|---|---|\n| **Latest Version** | 7.13.4 (July 2023) |\n| **Status** | Feature Complete |\n| **PHP Support** | PHP 7.4-8.2 |\n| **Key Features** | OAuth2 email integration, enhanced security |\n\n### 7.14.x Series (Modern PHP Support)\nCurrent development branch with latest PHP compatibility.\n\n| Characteristic | Details |\n|---|---|\n| **Latest Version** | 7.14.6 (November 2024) |\n| **Status** | Active Development |\n| **PHP Support** | PHP 8.0-8.2 |\n| **Key Features** | PHP 8.2 support, login language configuration |\n\nSources: [content/admin/releases/7.8.x/_index.en.adoc:15-16](), [content/admin/releases/7.10.x/_index.en.adoc:11-13](), [content/admin/releases/7.12.x/_index.en.adoc:11-14](), [content/admin/releases/7.14.x/_index.en.adoc:78-84]()\n\n## Customization Architecture\n\nSuiteCRM 7.x employs a well-established customization pattern using the `custom/` directory structure for upgrade-safe modifications.\n\n```mermaid\ngraph LR\n    subgraph \"Theme-Customization\"\n        SUITEP_BASE[\"themes/SuiteP/themedef.php\"]\n        CUSTOM_THEME[\"custom/themes/SuiteP/themedef.php\"]\n        SUBTHEMES[\"themes/SuiteP/css/Day/\"]\n        SCSS_COMPILE[\"vendor/bin/pscss\"]\n    end\n    \n    subgraph \"Module-Customization\"\n        STUDIO_TOOL[\"modules/ModuleBuilder/parsers/\"]\n        VARDEFS_CUSTOM[\"custom/modules/{Module}/vardefs.php\"]\n        METADATA_CUSTOM[\"custom/modules/{Module}/metadata/\"]\n        LAYOUTS_CUSTOM[\"custom/modules/{Module}/Ext/Layoutdefs/\"]\n    end\n    \n    subgraph \"Extension-Framework\"\n        EXT_APP[\"custom/Extension/application/\"]\n        EXT_MODULES[\"custom/Extension/modules/\"]\n        REPAIR_REBUILD[\"modules/Administration/Repair.php\"]\n    end\n    \n    SUITEP_BASE --\u003e CUSTOM_THEME\n    SUBTHEMES --\u003e SCSS_COMPILE\n    STUDIO_TOOL --\u003e VARDEFS_CUSTOM\n    STUDIO_TOOL --\u003e METADATA_CUSTOM\n    EXT_MODULES --\u003e REPAIR_REBUILD\n```\n\nSources: [content/blog/Customizing-Subthemes.adoc:54-57](), [content/admin/Advanced Configuration Options.adoc:140-144]()\n\n## API Evolution in 7.x Series\n\nThe 7.x series maintains the v4.1 API while introducing incremental improvements and security enhancements.\n\n| API Version | Availability | Protocol Support | Authentication |\n|---|---|---|---|\n| **v4.1 SOAP** | All 7.x versions | SOAP/WSDL | Username/Password MD5 |\n| **v4.1 REST** | All 7.x versions | JSON/Serialize | Username/Password MD5 |\n| **v8 JSON API** | 7.10+ | JSON API spec | OAuth2 (7.13+) |\n\n```mermaid\ngraph TB\n    subgraph \"API-v4.1-Endpoints\"\n        SOAP_ENDPOINT[\"service/v4_1/soap.php\"]\n        REST_ENDPOINT[\"service/v4_1/rest.php\"]\n        WSDL_ENDPOINT[\"service/v4_1/soap.php?wsdl\"]\n    end\n    \n    subgraph \"API-v8-Framework\"\n        V8_ROUTES[\"api/\"]\n        V8_AUTH[\"modules/OAuth2/\"]\n        V8_CONTROLLERS[\"lib/API/\"]\n    end\n    \n    subgraph \"Authentication-Methods\"\n        LEGACY_AUTH[\"MD5 password hash\"]\n        OAUTH2_AUTH[\"OAuth2 tokens (7.13+)\"]\n        SESSION_AUTH[\"Session-based\"]\n    end\n    \n    SOAP_ENDPOINT --\u003e LEGACY_AUTH\n    REST_ENDPOINT --\u003e LEGACY_AUTH\n    V8_ROUTES --\u003e OAUTH2_AUTH\n    V8_ROUTES --\u003e SESSION_AUTH\n```\n\nSources: [content/developer/api/API-4_1.adoc:25-29](), [content/developer/api/API-4_1.adoc:93-97](), [content/admin/releases/7.13.x/_index.en.adoc:71-74]()\n\n## Configuration Management\n\nAdvanced configuration in 7.x series utilizes multiple configuration layers for different deployment scenarios.\n\n```mermaid\ngraph TB\n    subgraph \"Configuration-Hierarchy\"\n        BASE_CONFIG[\"config.php\"]\n        OVERRIDE_CONFIG[\"config_override.php\"]\n        ADMIN_SETTINGS[\"modules/Administration/\"]\n        USER_PREFS[\"modules/Users/\"]\n    end\n    \n    subgraph \"Advanced-Options\"\n        ADMIN_ACCESS[\"admin_access_control\"]\n        MODULE_LOAD[\"use_common_ml_dir\"]\n        RESOURCE_LIMITS[\"default_limit / special_query_limit\"]\n        FILE_PERMS[\"default_permissions\"]\n    end\n    \n    subgraph \"Directory-Controls\"\n        UPLOAD_DIR[\"upload_dir\"]\n        CACHE_DIR[\"cache_dir\"]\n        CUSTOM_DIR[\"custom/\"]\n    end\n    \n    BASE_CONFIG --\u003e OVERRIDE_CONFIG\n    OVERRIDE_CONFIG --\u003e ADMIN_ACCESS\n    OVERRIDE_CONFIG --\u003e MODULE_LOAD\n    OVERRIDE_CONFIG --\u003e RESOURCE_LIMITS\n    BASE_CONFIG --\u003e FILE_PERMS\n    BASE_CONFIG --\u003e UPLOAD_DIR\n    BASE_CONFIG --\u003e CACHE_DIR\n```\n\nSources: [content/admin/Advanced Configuration Options.adoc:26-30](), [content/admin/Advanced Configuration Options.adoc:44-47](), [content/admin/Advanced Configuration Options.adoc:55-57]()\n\n## Migration and Upgrade Paths\n\nThe 7.x series provides clear upgrade paths within the branch family, but migration to 8.x requires significant planning due to architectural differences.\n\n```mermaid\ngraph LR\n    subgraph \"Within-7x-Upgrades\"\n        V78[\"7.8.x (EOL)\"]\n        V710[\"7.10.x (EOL)\"]\n        V711[\"7.11.x (Maintenance)\"]\n        V712[\"7.12.x (Stable)\"]\n        V713[\"7.13.x (OAuth)\"]\n        V714[\"7.14.x (PHP 8.2)\"]\n    end\n    \n    subgraph \"Migration-Challenges\"\n        NO_DIRECT[\"No Direct Migration Path\"]\n        ARCH_CHANGE[\"Architecture Change\"]\n        DATA_MIGRATION[\"Data Migration Required\"]\n    end\n    \n    subgraph \"8x-Target\"\n        V80[\"8.0.x (Initial)\"]\n        V82[\"8.2.x (Migration Entry)\"]\n        V88[\"8.8.x (Current)\"]\n    end\n    \n    V78 --\u003e V710\n    V710 --\u003e V711\n    V711 --\u003e V712\n    V712 --\u003e V713\n    V713 --\u003e V714\n    \n    V714 -.-\u003e NO_DIRECT\n    NO_DIRECT -.-\u003e V82\n    \n    style NO_DIRECT fill:#ffebee\n    style ARCH_CHANGE fill:#ffebee\n    style DATA_MIGRATION fill:#ffebee\n```\n\nSources: [content/admin/releases/7.14.x/_index.en.adoc:144-146](), [content/8.x/admin/releases/8.0/_index.en.adoc:86-88]()\n\n## Security Evolution\n\nThe 7.x series has maintained active security updates with regular CVE addressing across all supported branches.\n\n| Version Branch | Notable CVEs | Security Focus |\n|---|---|---|\n| **7.8.x** | CVE-2019-12601, CVE-2019-6506 | SQL Injection, XSS |\n| **7.10.x** | CVE-2021-45898, CVE-2021-45899 | RCE, File Inclusion |\n| **7.12.x** | CVE-2022-45185 | Access Control |\n| **7.14.x** | CVE-2024-36416, CVE-2024-36415 | DOS, Access Control |\n\nSources: [content/admin/releases/7.8.x/_index.en.adoc:62-64](), [content/admin/releases/7.10.x/_index.en.adoc:26-30](), [content/admin/releases/7.12.x/_index.en.adoc:223-230](), [content/admin/releases/7.14.x/_index.en.adoc:147-167]()\n\n## Current Status and Recommendations\n\nAs of 2024, the 7.x series remains in active development with the 7.14.x branch, while earlier branches have reached end-of-life or maintenance-only status. Organizations should plan migration strategies considering the architectural changes required for 8.x adoption.\n\n- **Production Use**: 7.14.x for new deployments requiring 7.x architecture\n- **Legacy Systems**: Upgrade path from 7.12.x → 7.13.x → 7.14.x recommended\n- **Migration Planning**: 8.x migration requires comprehensive project planning due to architectural differences\n\nSources: [content/admin/releases/7.14.x/_index.en.adoc:12-14](), [content/admin/releases/7.12.x/_index.en.adoc:11-14]()"])</script><script>self.__next_f.push([1,"1d:T2d0d,"])</script><script>self.__next_f.push([1,"# Version Compatibility Matrix\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [.github/ISSUE_TEMPLATE.md](.github/ISSUE_TEMPLATE.md)\n- [.github/ISSUE_TEMPLATE.md.NOT](.github/ISSUE_TEMPLATE.md.NOT)\n- [content/8.x/admin/Compatibility Matrix.adoc](content/8.x/admin/Compatibility Matrix.adoc)\n- [content/8.x/admin/Compatibility Matrix.ru.adoc](content/8.x/admin/Compatibility Matrix.ru.adoc)\n- [content/8.x/developer/developer-getting-started.adoc](content/8.x/developer/developer-getting-started.adoc)\n- [content/8.x/developer/extensions/backend/record-mappers/_index.en.adoc](content/8.x/developer/extensions/backend/record-mappers/_index.en.adoc)\n- [content/8.x/developer/extensions/frontend/88x-fe-extensions-setup.adoc](content/8.x/developer/extensions/frontend/88x-fe-extensions-setup.adoc)\n- [content/8.x/developer/extensions/frontend/examples/add-charts-extension.adoc](content/8.x/developer/extensions/frontend/examples/add-charts-extension.adoc)\n- [content/8.x/developer/extensions/frontend/examples/add-sidebar-widget.adoc](content/8.x/developer/extensions/frontend/examples/add-sidebar-widget.adoc)\n- [content/8.x/developer/extensions/frontend/migration/_index.en.adoc](content/8.x/developer/extensions/frontend/migration/_index.en.adoc)\n- [content/8.x/developer/extensions/frontend/older/8x-fe-extensions-getting-started.adoc](content/8.x/developer/extensions/frontend/older/8x-fe-extensions-getting-started.adoc)\n- [content/8.x/developer/extensions/frontend/older/8x-fe-extensions-setup.adoc](content/8.x/developer/extensions/frontend/older/8x-fe-extensions-setup.adoc)\n- [content/8.x/developer/extensions/frontend/older/_index.en.adoc](content/8.x/developer/extensions/frontend/older/_index.en.adoc)\n- [content/8.x/developer/installation-guide/backend-end-installation-guide.adoc](content/8.x/developer/installation-guide/backend-end-installation-guide.adoc)\n- [content/_index.en.md](content/_index.en.md)\n- [content/admin/Compatibility Matrix.adoc](content/admin/Compatibility Matrix.adoc)\n- [content/admin/Compatibility Matrix.ru.adoc](content/admin/Compatibility Matrix.ru.adoc)\n- [content/admin/Licensing.ru.adoc](content/admin/Licensing.ru.adoc)\n- [content/admin/_index.ru.adoc](content/admin/_index.ru.adoc)\n- [content/admin/administration-panel/search/elasticsearch/Introduction.ru.adoc](content/admin/administration-panel/search/elasticsearch/Introduction.ru.adoc)\n- [content/admin/administration-panel/search/elasticsearch/Set up Elasticsearch.ru.adoc](content/admin/administration-panel/search/elasticsearch/Set up Elasticsearch.ru.adoc)\n- [content/user/_index.ru.adoc](content/user/_index.ru.adoc)\n- [static/images/ru/admin/System/image6.png](static/images/ru/admin/System/image6.png)\n\n\u003c/details\u003e\n\n\n\nThis document provides comprehensive compatibility information for all supported SuiteCRM versions, including system requirements, supported technologies, and version-specific constraints. The compatibility matrix serves as a reference for system administrators planning installations, upgrades, and development environments.\n\nFor installation procedures, see [Installation Process](#5.1). For upgrade guidance, see [Upgrade Procedures](#5.2).\n\n## Overview\n\nSuiteCRM maintains compatibility matrices across two major version series: the legacy 7.x series and the modern 8.x series. Each series has distinct architectural requirements and technology dependencies that evolved significantly over time.\n\n```mermaid\ntimeline\n    title \"SuiteCRM Version Series Timeline\"\n    \n    section 7.x Series\n        7.4.x : Legacy PHP 5.3-5.6\n              : Apache 2.0-2.2\n              : IE 9+ Support\n        7.8.x : PHP 7.0 Support\n              : End of Life\n        7.11.x : Extended Support\n               : PHP 7.4 Support\n        7.14.x : Latest 7.x\n               : PHP 8.2 Support\n               : Maintenance Mode\n    \n    section 8.x Series\n        8.0.x : Angular Rewrite\n              : PHP 7.3+\n              : Module Federation\n        8.4.x : PHP 8.1+ Required\n              : Angular 16\n        8.8.x : Angular 18\n              : 2FA Support\n              : PHP 8.3 Support\n```\n\n**Sources:** [content/8.x/admin/Compatibility Matrix.adoc:10-52](), [content/admin/Compatibility Matrix.adoc:8-47]()\n\n## Version Series Architecture\n\nThe compatibility matrix reflects fundamental architectural differences between the 7.x and 8.x series:\n\n```mermaid\ngraph TB\n    subgraph \"7.x Series Architecture\"\n        PHP7[\"PHP Backend\"]\n        LEGACY[\"Legacy Frontend\"]\n        SUGAR[\"SugarCRM Base\"]\n        JQUERY[\"jQuery/JavaScript\"]\n    end\n    \n    subgraph \"8.x Series Architecture\"\n        SYMFONY[\"Symfony Backend\"]\n        ANGULAR[\"Angular Frontend\"]\n        API[\"JSON API Layer\"]\n        FEDERATION[\"Module Federation\"]\n    end\n    \n    subgraph \"Shared Components\"\n        DB[(Database)]\n        WEB[\"Web Server\"]\n        BROWSER[\"Browser\"]\n    end\n    \n    PHP7 --\u003e DB\n    SYMFONY --\u003e DB\n    LEGACY --\u003e WEB\n    ANGULAR --\u003e WEB\n    JQUERY --\u003e BROWSER\n    FEDERATION --\u003e BROWSER\n    \n    subgraph \"Migration Path\"\n        PHP7 -.-\u003e|Complex Migration| SYMFONY\n        LEGACY -.-\u003e|Complete Rewrite| ANGULAR\n    end\n```\n\n**Sources:** [content/8.x/admin/Compatibility Matrix.adoc:46-51](), [content/admin/Compatibility Matrix.adoc:14-47]()\n\n## Technology Stack Requirements\n\n### Platform and Operating System Support\n\nSuiteCRM supports multiple operating systems with version-specific variations:\n\n| Component | 7.x Series | 8.x Series |\n|-----------|------------|------------|\n| **Linux/Unix/macOS** | Any version supporting PHP | Any version supporting PHP |\n| **Windows** | Windows Server 2008+ (7.4.x+: 2012+, 7.14.x: 2019+) | Not officially supported |\n| **Web Server** | Apache 2.0-2.4, IIS 7.0-10 | Apache 2.4 only |\n\n**Sources:** [content/admin/Compatibility Matrix.adoc:16-26](), [content/8.x/admin/Compatibility Matrix.adoc:20-26]()\n\n### PHP Version Evolution\n\nPHP support has evolved significantly across versions, with breaking changes in the 8.x series:\n\n```mermaid\ngraph LR\n    subgraph \"PHP Evolution Timeline\"\n        PHP53[\"PHP 5.3\"] --\u003e PHP56[\"PHP 5.6\"]\n        PHP56 --\u003e PHP70[\"PHP 7.0\"]\n        PHP70 --\u003e PHP74[\"PHP 7.4\"]\n        PHP74 --\u003e PHP81[\"PHP 8.1\"]\n        PHP81 --\u003e PHP83[\"PHP 8.3\"]\n    end\n    \n    subgraph \"SuiteCRM 7.x Support\"\n        V74[\"7.4.x: 5.3-5.6\"]\n        V78[\"7.8.x: 5.5-7.1\"]\n        V711[\"7.11.x: 5.6-7.4\"]\n        V714[\"7.14.x: 8.1-8.2\"]\n    end\n    \n    subgraph \"SuiteCRM 8.x Support\"\n        V80[\"8.0.x: 7.3-8.0\"]\n        V86[\"8.6.x: 8.1-8.2\"]\n        V87[\"8.7.x: 8.1-8.2\"]\n        V88[\"8.8.x: 8.1-8.3\"]\n    end\n    \n    PHP53 -.-\u003e V74\n    PHP70 -.-\u003e V78\n    PHP74 -.-\u003e V711\n    PHP81 -.-\u003e V714\n    PHP81 -.-\u003e V86\n    PHP83 -.-\u003e V88\n```\n\n**Sources:** [content/8.x/admin/Compatibility Matrix.adoc:22](), [content/8.x/admin/Compatibility Matrix.adoc:57-58](), [content/admin/Compatibility Matrix.adoc:20]()\n\n### Database Compatibility Matrix\n\nDatabase support varies between version series:\n\n| Database | 7.x Series Versions | 8.x Series Versions |\n|----------|---------------------|---------------------|\n| **MySQL** | 5.1-8.0 (version dependent) | 5.7, 8.0 |\n| **MariaDB** | 5.5-10.11 (version dependent) | 10.4-10.11 |\n| **SQL Server** | 2008+ (7.x only) | Not supported |\n\n**Sources:** [content/admin/Compatibility Matrix.adoc:30-34](), [content/8.x/admin/Compatibility Matrix.adoc:30-32]()\n\n## Browser Compatibility Requirements\n\nBrowser support has modernized significantly in recent versions:\n\n### Legacy 7.x Browser Support\n- **Internet Explorer**: 9+ (7.4.x), 11 only (7.8.x+)\n- **Chrome**: 38+ (7.4.x) to 109+ (7.13.x+)\n- **Firefox**: 32+ (7.4.x) to 109+ (7.13.x+)\n- **Safari**: 6+ (most versions) to 16+ (7.13.x+)\n\n### Modern 8.x Browser Support\n- **Internet Explorer**: 11 (compatibility mode not supported)\n- **Chrome**: 90+ (8.0.x-8.1.x) to 109+ (8.4.x+)\n- **Firefox**: 90+ (8.0.x-8.1.x) to 109+ (8.4.x+)\n- **Edge**: 89+ (8.0.x-8.1.x) to 109+ (8.4.x+)\n- **Safari**: 14+ (8.0.x-8.1.x) to 16+ (8.4.x+)\n\n**Sources:** [content/admin/Compatibility Matrix.adoc:36-46](), [content/8.x/admin/Compatibility Matrix.adoc:34-44]()\n\n## Development Environment Requirements\n\nSuiteCRM 8.x introduces additional requirements for frontend development that are not needed in production environments:\n\n```mermaid\ngraph TB\n    subgraph \"Production Environment\"\n        PROD_PHP[\"PHP 8.1-8.3\"]\n        PROD_WEB[\"Apache 2.4\"]\n        PROD_DB[\"MariaDB/MySQL\"]\n        PROD_BROWSER[\"Modern Browser\"]\n    end\n    \n    subgraph \"Development Environment\"\n        DEV_NODE[\"Node.js ^20.11.1\"]\n        DEV_YARN[\"yarn ^4.5.0\"]\n        DEV_ANGULAR[\"Angular CLI ^18\"]\n        DEV_BUILD[\"Build Tools\"]\n    end\n    \n    subgraph \"Version Evolution\"\n        V84[\"8.4.x: Node ^14.15.1, Angular ^12\"]\n        V86[\"8.6.x: Node ^18, Angular ^16\"]\n        V88[\"8.8.x: Node ^20.11.1, Angular ^18\"]\n    end\n    \n    PROD_PHP --\u003e PROD_WEB\n    PROD_WEB --\u003e PROD_DB\n    DEV_NODE --\u003e DEV_YARN\n    DEV_YARN --\u003e DEV_ANGULAR\n    DEV_ANGULAR --\u003e DEV_BUILD\n    \n    V84 -.-\u003e V86\n    V86 -.-\u003e V88\n```\n\n**Sources:** [content/8.x/admin/Compatibility Matrix.adoc:46-51](), [content/8.x/admin/Compatibility Matrix.adoc:94-96](), [content/8.x/admin/Compatibility Matrix.adoc:140-142]()\n\n## Critical Compatibility Warnings\n\n### PHP Version Breaking Changes\n\nSeveral versions introduce breaking changes that affect upgrade paths:\n\n1. **SuiteCRM 8.6.x**: Last version supporting PHP 7.4\n2. **SuiteCRM 8.7.x**: PHP 7.4 support discontinued\n3. **SuiteCRM 8.4.x+**: PHP 8.1+ required\n\n**Sources:** [content/8.x/admin/Compatibility Matrix.adoc:57-58](), [content/8.x/admin/Compatibility Matrix.adoc:102-104]()\n\n### Angular Framework Evolution\n\nFrontend development requirements evolve with Angular versions:\n\n| SuiteCRM Version | Angular CLI | Node.js | yarn |\n|------------------|-------------|---------|------|\n| 8.0.x - 8.4.x | ^12 | ^14.15.1 | ^1.22.10 |\n| 8.5.x - 8.6.x | ^16 | ^18 | ^1.22.10 |\n| 8.7.x | ^16 | ^18.10 | ^1.22.10 |\n| 8.8.x | ^18 | ^20.11.1 | ^4.5.0 |\n\n**Sources:** [content/8.x/admin/Compatibility Matrix.adoc:48-50](), [content/8.x/admin/Compatibility Matrix.adoc:94-96]()\n\n## Version-Specific Compatibility Details\n\n### SuiteCRM 8.x Series Compatibility\n\nThe complete compatibility matrices for each 8.x version are defined in `content/8.x/admin/Compatibility Matrix.adoc`, covering versions 8.0.x through 8.8.x with detailed platform, PHP, web server, database, and browser requirements.\n\n### SuiteCRM 7.x Series Compatibility \n\nThe complete compatibility matrices for each 7.x version are defined in `content/admin/Compatibility Matrix.adoc`, covering versions 7.4.x through 7.14.x with detailed platform, PHP, web server, database, and browser requirements, including Windows and SQL Server support not available in 8.x.\n\n## Migration Considerations\n\nWhen planning migrations between versions, consider these compatibility factors:\n\n1. **PHP Version Compatibility**: Ensure target version supports current PHP installation\n2. **Database Compatibility**: Verify database version support in target SuiteCRM version  \n3. **Browser Requirements**: Update minimum browser requirements for end users\n4. **Development Tools**: Install required Node.js, Angular CLI, and yarn versions for 8.x development\n5. **Operating System**: Windows Server support varies by version and is discontinued in 8.x\n\n**Sources:** [content/8.x/admin/Compatibility Matrix.adoc:1-381](), [content/admin/Compatibility Matrix.adoc:1-462]()"])</script><script>self.__next_f.push([1,"1e:T3111,"])</script><script>self.__next_f.push([1,"# API Documentation\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [.htmltest.yml](.htmltest.yml)\n- [content/8.x/admin/releases/8.0/_index.en.adoc](content/8.x/admin/releases/8.0/_index.en.adoc)\n- [content/admin/Advanced Configuration Options.adoc](content/admin/Advanced Configuration Options.adoc)\n- [content/admin/administration-panel/System.adoc](content/admin/administration-panel/System.adoc)\n- [content/admin/releases/7.10.x/_index.en.adoc](content/admin/releases/7.10.x/_index.en.adoc)\n- [content/admin/releases/7.11.x/_index.en.adoc](content/admin/releases/7.11.x/_index.en.adoc)\n- [content/admin/releases/7.12.x/_index.en.adoc](content/admin/releases/7.12.x/_index.en.adoc)\n- [content/admin/releases/7.8.x/_index.en.adoc](content/admin/releases/7.8.x/_index.en.adoc)\n- [content/blog/_index.es.md](content/blog/_index.es.md)\n- [content/developer/api/API-4_1.adoc](content/developer/api/API-4_1.adoc)\n- [content/developer/api/Developer-setup-guide/Configure Authentication.adoc](content/developer/api/Developer-setup-guide/Configure Authentication.adoc)\n- [content/developer/api/Developer-setup-guide/Customization.adoc](content/developer/api/Developer-setup-guide/Customization.adoc)\n- [content/developer/api/Developer-setup-guide/Getting Available Resources.adoc](content/developer/api/Developer-setup-guide/Getting Available Resources.adoc)\n- [content/developer/api/Developer-setup-guide/Introduction.adoc](content/developer/api/Developer-setup-guide/Introduction.adoc)\n- [content/developer/api/Developer-setup-guide/JSON-API.adoc](content/developer/api/Developer-setup-guide/JSON-API.adoc)\n- [content/developer/api/Developer-setup-guide/Managing Tokens.adoc](content/developer/api/Developer-setup-guide/Managing Tokens.adoc)\n- [content/developer/api/Developer-setup-guide/Requirements.adoc](content/developer/api/Developer-setup-guide/Requirements.adoc)\n- [content/developer/api/Developer-setup-guide/SuiteCRM_V8_API_Set_Up_For_Postman.adoc](content/developer/api/Developer-setup-guide/SuiteCRM_V8_API_Set_Up_For_Postman.adoc)\n- [content/developer/api/Developer-setup-guide/_index.en.adoc](content/developer/api/Developer-setup-guide/_index.en.adoc)\n- [layouts/shortcodes/contribs.html](layouts/shortcodes/contribs.html)\n- [layouts/shortcodes/dumpJSON.html](layouts/shortcodes/dumpJSON.html)\n- [layouts/shortcodes/ghcontributors.html](layouts/shortcodes/ghcontributors.html)\n- [static/images/en/8.x/user/features/subpanels/Filter-Expanded.png](static/images/en/8.x/user/features/subpanels/Filter-Expanded.png)\n- [static/images/en/8.x/user/features/subpanels/Filter-Full-Panel.png](static/images/en/8.x/user/features/subpanels/Filter-Full-Panel.png)\n- [static/images/en/8.x/user/features/subpanels/Filter-Searched.png](static/images/en/8.x/user/features/subpanels/Filter-Searched.png)\n\n\u003c/details\u003e\n\n\n\nThis document provides an overview of the APIs available in SuiteCRM for third-party integration and programmatic access to CRM data and functionality. SuiteCRM offers two distinct API systems that serve different use cases and support different SuiteCRM versions.\n\nFor detailed implementation guides on specific API versions, see [API v4.1 (SOAP \u0026 REST)](#4.1) and [JSON API (v8)](#4.2).\n\n## API Overview\n\nSuiteCRM provides two major API systems that have evolved to meet different integration needs:\n\n### API Architecture Overview\n\n```mermaid\ngraph TB\n    subgraph \"SuiteCRM Application\"\n        CORE[\"SuiteCRM Core\u003cbr/\u003eModules \u0026 Business Logic\"]\n        AUTH[\"Authentication System\"]\n        DB[\"Database Layer\"]\n    end\n    \n    subgraph \"API v4.1 (Legacy)\"\n        SOAP_EP[\"/service/v4_1/soap.php\"]\n        REST_EP[\"/service/v4_1/rest.php\"]\n        SOAP_IMPL[\"SugarWebServiceImplv4_1\"]\n        REST_IMPL[\"REST Handler\"]\n    end\n    \n    subgraph \"JSON API v8 (Modern)\"\n        V8_BASE[\"/Api/V8/\"]\n        OAUTH2[\"/Api/access_token\"]\n        SLIM[\"Slim Framework\"]\n        JWT[\"JWT Token System\"]\n        \n        subgraph \"V8 Endpoints\"\n            MODULE_EP[\"/Api/V8/module/{module}\"]\n            META_EP[\"/Api/V8/meta/\"]\n            REL_EP[\"/Api/V8/module/{module}/{id}/relationships\"]\n        end\n    end\n    \n    subgraph \"Client Applications\"\n        LEGACY_CLIENTS[\"Legacy SOAP/REST Clients\"]\n        MODERN_CLIENTS[\"Modern REST Clients\"]\n    end\n    \n    LEGACY_CLIENTS --\u003e SOAP_EP\n    LEGACY_CLIENTS --\u003e REST_EP\n    MODERN_CLIENTS --\u003e V8_BASE\n    MODERN_CLIENTS --\u003e OAUTH2\n    \n    SOAP_EP --\u003e SOAP_IMPL\n    REST_EP --\u003e REST_IMPL\n    SOAP_IMPL --\u003e CORE\n    REST_IMPL --\u003e CORE\n    \n    V8_BASE --\u003e SLIM\n    OAUTH2 --\u003e JWT\n    SLIM --\u003e CORE\n    JWT --\u003e AUTH\n    \n    CORE --\u003e DB\n    AUTH --\u003e DB\n```\n\nSources: [content/developer/api/API-4_1.adoc:23-102](), [content/developer/api/Developer-setup-guide/JSON-API.adoc:1-389]()\n\n## API Version Compatibility\n\n| SuiteCRM Version | API v4.1 Support | JSON API v8 Support | Primary Recommendation |\n|------------------|-------------------|---------------------|------------------------|\n| 7.8.x and earlier | ✓ | ✗ | API v4.1 only |\n| 7.10.x - 7.14.x | ✓ | ✓ | JSON API v8 preferred |\n| 8.0.x+ | ✓ | ✓ | JSON API v8 strongly recommended |\n\nSources: [content/developer/api/API-4_1.adoc:6-9](), [content/admin/releases/7.10.x/_index.en.adoc:167]()\n\n## API v4.1 (SOAP \u0026 REST)\n\nThe legacy API system supporting both SOAP and REST protocols, available in all SuiteCRM versions.\n\n### Key Characteristics\n\n- **Protocols**: SOAP and REST (pseudo-REST using POST only)\n- **Authentication**: Username/password with MD5 hashing\n- **Endpoints**: \n  - SOAP: `/service/v4_1/soap.php?wsdl`\n  - REST: `/service/v4_1/rest.php`\n- **Data Format**: XML (SOAP) or JSON/Serialized (REST)\n\n### Authentication Flow\n\n```mermaid\nsequenceDiagram\n    participant CLIENT as \"API Client\"\n    participant API41 as \"/service/v4_1/rest.php\"\n    participant IMPL as \"SugarWebServiceImplv4_1\"\n    participant AUTH as \"Authentication System\"\n    \n    CLIENT-\u003e\u003eAPI41: POST login request\u003cbr/\u003e{user_name, password (MD5)}\n    API41-\u003e\u003eIMPL: login() method\n    IMPL-\u003e\u003eAUTH: Validate credentials\n    AUTH--\u003e\u003eIMPL: User validated\n    IMPL--\u003e\u003eAPI41: Session ID\n    API41--\u003e\u003eCLIENT: {id: session_id}\n    \n    Note over CLIENT: Store session_id for subsequent requests\n    \n    CLIENT-\u003e\u003eAPI41: POST get_entry_list\u003cbr/\u003e{session: session_id, ...}\n    API41-\u003e\u003eIMPL: get_entry_list() method\n    IMPL-\u003e\u003eAUTH: Validate session\n    IMPL--\u003e\u003eAPI41: Module data\n    API41--\u003e\u003eCLIENT: JSON/XML response\n```\n\nSources: [content/developer/api/API-4_1.adoc:47-88](), [content/developer/api/API-4_1.adoc:155-201]()\n\n## JSON API v8 (Modern REST API)\n\nThe modern REST API following JSON API 1.0 specification, available from SuiteCRM 7.10+.\n\n### Key Characteristics\n\n- **Protocol**: True REST API\n- **Authentication**: OAuth2 with JWT tokens\n- **Standard**: JSON API 1.0 specification compliance\n- **Base URL**: `/Api/V8/`\n- **Framework**: Built on Slim Framework\n\n### OAuth2 Authentication Flow\n\n```mermaid\nsequenceDiagram\n    participant CLIENT as \"API Client\"\n    participant TOKEN_EP as \"/Api/access_token\"\n    participant OAUTH2 as \"OAuth2 Server\"\n    participant V8_API as \"/Api/V8/module/*\"\n    participant JWT as \"JWT Service\"\n    \n    Note over CLIENT: Setup OAuth2 client in Admin panel\n    \n    CLIENT-\u003e\u003eTOKEN_EP: POST\u003cbr/\u003e{grant_type, client_id, client_secret}\n    TOKEN_EP-\u003e\u003eOAUTH2: Validate client credentials\n    OAUTH2-\u003e\u003eJWT: Generate JWT token\n    JWT--\u003e\u003eOAUTH2: Signed access_token\n    OAUTH2--\u003e\u003eTOKEN_EP: {access_token, expires_in}\n    TOKEN_EP--\u003e\u003eCLIENT: Bearer token response\n    \n    Note over CLIENT: Include Bearer token in Authorization header\n    \n    CLIENT-\u003e\u003eV8_API: GET /Api/V8/module/Accounts\u003cbr/\u003eAuthorization: Bearer {token}\n    V8_API-\u003e\u003eJWT: Validate token signature\n    JWT--\u003e\u003eV8_API: Token valid\n    V8_API--\u003e\u003eCLIENT: JSON API response\n```\n\nSources: [content/developer/api/Developer-setup-guide/JSON-API.adoc:68-96](), [content/developer/api/Developer-setup-guide/Configure Authentication.adoc:8-284]()\n\n## API Endpoints and Capabilities\n\n### API v4.1 Method Categories\n\n| Category | Example Methods | Description |\n|----------|----------------|-------------|\n| Authentication | `login`, `logout` | Session management |\n| Data Retrieval | `get_entry_list`, `get_entry` | Fetch records and lists |\n| Data Modification | `set_entry`, `set_entries` | Create and update records |\n| Relationships | `get_relationships`, `set_relationship` | Manage record relationships |\n\n### JSON API v8 Endpoint Structure\n\n```mermaid\ngraph TB\n    subgraph \"Core Endpoints\"\n        AUTH_EP[\"/Api/access_token\u003cbr/\u003eOAuth2 Authentication\"]\n        LOGOUT_EP[\"/Api/V8/logout\u003cbr/\u003eSession Termination\"]\n    end\n    \n    subgraph \"Metadata Endpoints\"\n        META_MODULES[\"/Api/V8/meta/modules\u003cbr/\u003eAvailable Modules\"]\n        META_FIELDS[\"/Api/V8/meta/fields/{module}\u003cbr/\u003eModule Field Definitions\"]\n        META_SWAGGER[\"/Api/V8/meta/swagger.json\u003cbr/\u003eAPI Documentation\"]\n    end\n    \n    subgraph \"Module Operations\"\n        MODULE_LIST[\"/Api/V8/module/{module}\u003cbr/\u003eGET: List Records\"]\n        MODULE_GET[\"/Api/V8/module/{module}/{id}\u003cbr/\u003eGET: Single Record\"]\n        MODULE_POST[\"/Api/V8/module\u003cbr/\u003ePOST: Create Record\"]\n        MODULE_PATCH[\"/Api/V8/module\u003cbr/\u003ePATCH: Update Record\"]\n        MODULE_DELETE[\"/Api/V8/module/{module}/{id}\u003cbr/\u003eDELETE: Remove Record\"]\n    end\n    \n    subgraph \"Relationship Operations\"\n        REL_GET[\"/Api/V8/module/{module}/{id}/relationships/{field}\u003cbr/\u003eGET: Related Records\"]\n        REL_POST[\"/Api/V8/module/{module}/{id}/relationships/{field}\u003cbr/\u003ePOST: Create Relationship\"]\n        REL_DELETE[\"/Api/V8/module/{module}/{id}/relationships/{field}/{relatedId}\u003cbr/\u003eDELETE: Remove Relationship\"]\n    end\n```\n\nSources: [content/developer/api/Developer-setup-guide/JSON-API.adoc:269-388](), [content/developer/api/Developer-setup-guide/Getting Available Resources.adoc:14-21]()\n\n## API Configuration and Setup\n\n### API v4.1 Configuration\n\nAPI v4.1 requires minimal configuration as it uses SuiteCRM's standard authentication system:\n\n- **Location**: Standard SuiteCRM user credentials\n- **Access Control**: Role-based permissions apply\n- **Custom Methods**: Extensible via `custom/service/v4_1_custom/`\n\n### JSON API v8 Configuration Requirements\n\nThe JSON API v8 requires specific setup steps:\n\n#### OAuth2 Key Generation\n```bash\n# Navigate to OAuth2 directory\ncd {{suitecrm.root}}/Api/V8/OAuth2\n\n# Generate private key\nopenssl genrsa -out private.key 2048\n\n# Generate public key\nopenssl rsa -in private.key -pubout -out public.key\n\n# Set permissions\nchmod 600 private.key public.key\nchown www-data:www-data *.key\n```\n\n#### Required Configuration Files\n\n| File Path | Purpose |\n|-----------|---------|\n| `/Api/V8/OAuth2/private.key` | OAuth2 token signing |\n| `/Api/V8/OAuth2/public.key` | OAuth2 token verification |\n| `config.php: oauth2_encryption_key` | OAuth2 encryption |\n| `/Api/.htaccess` | URL rewriting for endpoints |\n\nSources: [content/developer/api/Developer-setup-guide/JSON-API.adoc:17-66](), [content/developer/api/Developer-setup-guide/Requirements.adoc:21-29]()\n\n## API Integration Patterns\n\n### Choosing Between APIs\n\n**Use API v4.1 when:**\n- Integrating with SuiteCRM 7.9.x or earlier\n- Working with existing SOAP-based integrations\n- Simple CRUD operations without complex filtering\n\n**Use JSON API v8 when:**\n- SuiteCRM 7.10+ or 8.x deployment\n- Building modern web or mobile applications\n- Requiring advanced filtering, pagination, or field selection\n- Implementing OAuth2-based security\n\n### API Extension and Customization\n\nBoth APIs support customization through different mechanisms:\n\n- **API v4.1**: Custom methods via `SugarWebServiceImplv4_1_custom` class extension\n- **JSON API v8**: Slim framework middleware and custom routes in `custom/application/Ext/Api/V8/`\n\nSources: [content/developer/api/API-4_1.adoc:230-296](), [content/developer/api/Developer-setup-guide/Customization.adoc:11-119]()\n\n## Security Considerations\n\n### API v4.1 Security\n\n- Username/password authentication with MD5 hashing\n- Session-based access control\n- Standard SuiteCRM role permissions apply\n- Custom authentication via logic hooks possible\n\n### JSON API v8 Security\n\n- OAuth2 with JWT token-based authentication\n- HTTPS/TLS required for production deployments\n- Configurable token expiration\n- Client credentials and password grant types supported\n\nSources: [content/developer/api/Developer-setup-guide/Requirements.adoc:8-26](), [content/developer/api/Developer-setup-guide/Configure Authentication.adoc:22-284]()"])</script><script>self.__next_f.push([1,"1f:T34ef,"])</script><script>self.__next_f.push([1,"# API v4.1 (SOAP \u0026 REST)\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [.htmltest.yml](.htmltest.yml)\n- [content/8.x/admin/releases/8.0/_index.en.adoc](content/8.x/admin/releases/8.0/_index.en.adoc)\n- [content/admin/Advanced Configuration Options.adoc](content/admin/Advanced Configuration Options.adoc)\n- [content/admin/administration-panel/System.adoc](content/admin/administration-panel/System.adoc)\n- [content/admin/releases/7.10.x/_index.en.adoc](content/admin/releases/7.10.x/_index.en.adoc)\n- [content/admin/releases/7.11.x/_index.en.adoc](content/admin/releases/7.11.x/_index.en.adoc)\n- [content/admin/releases/7.12.x/_index.en.adoc](content/admin/releases/7.12.x/_index.en.adoc)\n- [content/admin/releases/7.8.x/_index.en.adoc](content/admin/releases/7.8.x/_index.en.adoc)\n- [content/blog/_index.es.md](content/blog/_index.es.md)\n- [content/developer/api/API-4_1.adoc](content/developer/api/API-4_1.adoc)\n- [content/developer/api/Developer-setup-guide/Configure Authentication.adoc](content/developer/api/Developer-setup-guide/Configure Authentication.adoc)\n- [content/developer/api/Developer-setup-guide/Customization.adoc](content/developer/api/Developer-setup-guide/Customization.adoc)\n- [content/developer/api/Developer-setup-guide/Getting Available Resources.adoc](content/developer/api/Developer-setup-guide/Getting Available Resources.adoc)\n- [content/developer/api/Developer-setup-guide/Introduction.adoc](content/developer/api/Developer-setup-guide/Introduction.adoc)\n- [content/developer/api/Developer-setup-guide/JSON-API.adoc](content/developer/api/Developer-setup-guide/JSON-API.adoc)\n- [content/developer/api/Developer-setup-guide/Managing Tokens.adoc](content/developer/api/Developer-setup-guide/Managing Tokens.adoc)\n- [content/developer/api/Developer-setup-guide/Requirements.adoc](content/developer/api/Developer-setup-guide/Requirements.adoc)\n- [content/developer/api/Developer-setup-guide/SuiteCRM_V8_API_Set_Up_For_Postman.adoc](content/developer/api/Developer-setup-guide/SuiteCRM_V8_API_Set_Up_For_Postman.adoc)\n- [content/developer/api/Developer-setup-guide/_index.en.adoc](content/developer/api/Developer-setup-guide/_index.en.adoc)\n- [layouts/shortcodes/contribs.html](layouts/shortcodes/contribs.html)\n- [layouts/shortcodes/dumpJSON.html](layouts/shortcodes/dumpJSON.html)\n- [layouts/shortcodes/ghcontributors.html](layouts/shortcodes/ghcontributors.html)\n- [static/images/en/8.x/user/features/subpanels/Filter-Expanded.png](static/images/en/8.x/user/features/subpanels/Filter-Expanded.png)\n- [static/images/en/8.x/user/features/subpanels/Filter-Full-Panel.png](static/images/en/8.x/user/features/subpanels/Filter-Full-Panel.png)\n- [static/images/en/8.x/user/features/subpanels/Filter-Searched.png](static/images/en/8.x/user/features/subpanels/Filter-Searched.png)\n\n\u003c/details\u003e\n\n\n\nThis document covers the SuiteCRM API version 4.1, which provides both SOAP and REST interfaces for external applications to interact with SuiteCRM data and functionality. API v4.1 was the primary API interface for SuiteCRM versions up to 7.9.x and remains available in later versions for backward compatibility.\n\nFor information about the modern JSON API available in SuiteCRM 8.x and later, see [JSON API (v8)](#4.2). For general API setup and authentication concepts, see [API Documentation](#4).\n\n## API v4.1 Architecture Overview\n\nAPI v4.1 provides dual protocol support through separate SOAP and REST endpoints, both sharing common authentication mechanisms and underlying service implementations.\n\n```mermaid\ngraph TB\n    subgraph \"SuiteCRM Instance\"\n        subgraph \"API v4.1 Layer\"\n            SOAP[\"SOAP Endpoint\u003cbr/\u003eservice/v4_1/soap.php\"]\n            REST[\"REST Endpoint\u003cbr/\u003eservice/v4_1/rest.php\"]\n            WSDL[\"WSDL Definition\u003cbr/\u003eservice/v4_1/soap.php?wsdl\"]\n        end\n        \n        subgraph \"Core Implementation\"\n            IMPL[\"SugarWebServiceImplv4_1\u003cbr/\u003eservice/v4_1/SugarWebServiceImplv4_1.php\"]\n            REGISTRY[\"Service Registry\u003cbr/\u003eservice/v4_1/registry.php\"]\n            HELPER[\"Helper Classes\u003cbr/\u003eservice/core/\"]\n        end\n        \n        subgraph \"Data Layer\"\n            BEANS[\"SugarBean Objects\"]\n            DB[\"Database\"]\n            ACL[\"Access Control\"]\n        end\n        \n        subgraph \"Authentication\"\n            AUTH[\"Session Management\"]\n            USERAUTH[\"User Authentication\"]\n        end\n    end\n    \n    subgraph \"External Clients\"\n        SOAPCLIENT[\"SOAP Client Applications\"]\n        RESTCLIENT[\"REST Client Applications\"]\n    end\n    \n    SOAPCLIENT --\u003e SOAP\n    SOAPCLIENT --\u003e WSDL\n    RESTCLIENT --\u003e REST\n    \n    SOAP --\u003e IMPL\n    REST --\u003e IMPL\n    WSDL --\u003e REGISTRY\n    \n    IMPL --\u003e BEANS\n    IMPL --\u003e AUTH\n    BEANS --\u003e DB\n    BEANS --\u003e ACL\n    \n    AUTH --\u003e USERAUTH\n```\n\n**Sources:** [content/developer/api/API-4_1.adoc:1-50](), [content/developer/api/API-4_1.adoc:230-290]()\n\n## SOAP API Implementation\n\nThe SOAP API provides a standards-compliant web service interface with full WSDL definition support.\n\n### SOAP Endpoint Configuration\n\n| Component | Location | Description |\n|-----------|----------|-------------|\n| **SOAP Service** | `service/v4_1/soap.php` | Main SOAP endpoint processor |\n| **WSDL Definition** | `service/v4_1/soap.php?wsdl` | Web Service Description Language file |\n| **Implementation Class** | `SugarWebServiceImplv4_1` | Core SOAP method implementations |\n\n### SOAP Authentication Flow\n\n```mermaid\nsequenceDiagram\n    participant Client as \"SOAP Client\"\n    participant Endpoint as \"soap.php\"\n    participant Auth as \"Authentication System\" \n    participant Session as \"Session Manager\"\n    \n    Client-\u003e\u003eEndpoint: login(userAuth, appName, nameValueList)\n    Endpoint-\u003e\u003eAuth: Validate credentials\n    Auth-\u003e\u003eSession: Create session\n    Session-\u003e\u003eEndpoint: Return session_id\n    Endpoint-\u003e\u003eClient: Login response with session_id\n    \n    Client-\u003e\u003eEndpoint: get_entry_list(session_id, module, query, ...)\n    Endpoint-\u003e\u003eSession: Validate session_id\n    Session-\u003e\u003eEndpoint: Session valid\n    Endpoint-\u003e\u003eClient: Entry list response\n```\n\n**Sources:** [content/developer/api/API-4_1.adoc:35-88]()\n\n### SOAP Method Structure\n\nThe SOAP API methods follow a consistent pattern usin
