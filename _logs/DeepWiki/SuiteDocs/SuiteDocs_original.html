 enables Single Sign-On integration with identity providers like Active Directory, Okta, or Keycloak.\n\n### Enabling SAML\n\nConfigure SAML authentication in `.env.local`:\n\n```bash\nAUTH_TYPE=saml\n```\n\n### Basic SAML Configuration\n\nSet SAML parameters in `.env.local`:\n\n```bash\n###\u003e SAML CONFIG ###\nSAML_USERNAME_ATTRIBUTE=uid\nSAML_USE_ATTRIBUTE_FRIENDLY_NAME=true\n###\u003c SAML CONFIG ###\n```\n\n| Parameter | Description |\n|-----------|-------------|\n| `SAML_USERNAME_ATTRIBUTE` | SAML attribute used as SuiteCRM username |\n| `SAML_USE_ATTRIBUTE_FRIENDLY_NAME` | Whether to use friendly names from SAML response |\n\n### Advanced SAML Configuration\n\nCreate detailed SAML configuration in `extensions/\u003cyour-extension\u003e/config/packages/hslavich_onelogin_saml.yaml`:\n\n```yaml\nhslavich_onelogin_saml:\n  idp:\n    entityId: '\u003cidp-entity-id\u003e'\n    singleSignOnService:\n      url: '\u003cidp-sso-url\u003e'\n      binding: 'urn:oasis:names:tc:SAML:2.0:bindings:HTTP-Redirect'\n    x509cert: '\u003cidp-certificate-string\u003e'\n    \n  sp:\n    entityId: '\u003csp-entity-id-use-suitecrm-url\u003e'\n    assertionConsumerService:\n      url: 'https://\u003cyour-suitecrm-instance\u003e/saml/acs'\n      binding: 'urn:oasis:names:tc:SAML:2.0:bindings:HTTP-POST'\n    privateKey: '\u003csp-private-key\u003e'\n    x509cert: '\u003csp-cert\u003e'\n```\n\n### SAML Auto-User Creation\n\nEnable automatic user creation from SAML attributes:\n\n```bash\nSAML_AUTO_CREATE=enabled\n```\n\nConfigure attribute mapping in `extensions/\u003cyour-package\u003e/config/services/saml/saml.yaml`:\n\n```yaml\nparameters:\n  saml.autocreate.attributes_map:\n    email: email1\n    'urn:oid:2.5.4.4': last_name\n    'urn:oid:2.5.4.42': first_name\n```\n\n### SAML Fallback Authentication\n\nUsers can still use SuiteCRM credentials by accessing: `https://\u003cyour-suitecrm-instance\u003e/auth`\n\nThe `external_auth_only` field in the `users` table controls this behavior:\n- `1` (true): SAML only\n- `0` (false): Allows SuiteCRM fallback\n\nSources: [content/8.x/admin/configuration/SAML-Configuration.ru.adoc:44-50](), [content/8.x/admin/configuration/SAML-Configuration.ru.adoc:109-191](), [content/8.x/admin/configuration/SAML-Configuration.ru.adoc:368-424]()\n\n## LDAP Authentication\n\nLDAP authentication integrates with Active Directory and other LDAP directory services using Symfony's LDAP Security component.\n\n### Enabling LDAP\n\nConfigure LDAP authentication in `.env.local`:\n\n```bash\nAUTH_TYPE=ldap\n```\n\n### Basic LDAP Configuration\n\nSet LDAP connection parameters in `.env.local`:\n\n```bash\n###\u003e LDAP CONFIG ###\nLDAP_HOST='ldap.example.com'\nLDAP_PORT=389\nLDAP_ENCRYPTION=tls\nLDAP_PROTOCOL_VERSION=3\nLDAP_REFERRALS=false\nLDAP_DN_STRING='cn={username},dc=example,dc=org'\nLDAP_QUERY_STRING=''\nLDAP_SEARCH_DN=''\nLDAP_SEARCH_PASSWORD=''\n###\u003c LDAP CONFIG ###\n```\n\n| Parameter | Description |\n|-----------|-------------|\n| `LDAP_HOST` | LDAP server hostname |\n| `LDAP_PORT` | LDAP server port (usually 389 or 636) |\n| `LDAP_ENCRYPTION` | Encryption type: `none`, `tls`, or `ssl` |\n| `LDAP_DN_STRING` | DN template for user authentication |\n| `LDAP_SEARCH_DN` | DN for search user account |\n| `LDAP_SEARCH_PASSWORD` | Password for search user account |\n\n### LDAP Auto-User Creation\n\nEnable automatic user creation from LDAP:\n\n```bash\n###\u003e LDAP AUTO CREATE CONFIG ###\nLDAP_AUTO_CREATE=enabled\nLDAP_PROVIDER_BASE_DN='dc=example,dc=org'\nLDAP_PROVIDER_UID_KEY='cn'\nLDAP_PROVIDER_SEARCH_DN='cn=admin,dc=example,dc=org'\nLDAP_PROVIDER_SEARCH_PASSWORD='admin'\n###\u003c LDAP AUTO CREATE CONFIG ###\n```\n\n### LDAP Field Mapping\n\nConfigure LDAP attribute mapping in `extensions/\u003cyour-package\u003e/config/services/ldap/ldap.yaml`:\n\n```yaml\nparameters:\n  ldap.extra_fields: [ 'name', 'sn', 'email' ]\n  ldap.autocreate.extra_fields_map:\n    name: first_name\n    sn: last_name\n    email: email1\n```\n\n### LDAP Fallback Authentication\n\nSimilar to SAML, the `external_auth_only` field controls fallback behavior for LDAP users.\n\nSources: [content/8.x/admin/configuration/LDAP-Configuration.ru.adoc:42-98](), [content/8.x/admin/configuration/LDAP-Configuration.ru.adoc:108-206]()\n\n## Two-Factor Authentication (2FA)\n\nTwo-Factor Authentication adds an additional security layer using Time-based One-Time Passwords (TOTP) compatible with apps like Google Authenticator.\n\n### Availability\n\n2FA is available starting from SuiteCRM 8.8.0 and uses TOTP implementation.\n\n### Enabling 2FA for Users\n\n1. Navigate to user profile\n2. Access \"Two-Factor Authentication\" tab\n3. Click \"Two Factor Configuration\" button\n4. Scan QR code with authenticator app\n5. Enter verification code to enable\n\n### 2FA Configuration Details\n\n- **Algorithm**: TOTP (Time-based One-Time Password)\n- **Interval**: 30 seconds\n- **Digits**: 6\n- **Hash Algorithm**: SHA-1\n\n### Backup Codes\n\nWhen 2FA is enabled, users receive 10 one-time backup codes for emergency access. These codes:\n- Can only be used once\n- Are shown only during initial setup\n- Can be regenerated through the configuration page\n\n### Administrative Controls\n\nAdministrators can:\n- View 2FA status in user profiles\n- Disable 2FA for users via \"Disable 2FA\" action\n- Cannot enable 2FA for other users (self-service only)\n\n### Database Storage\n\n2FA secrets and backup codes are stored encoded in the database starting from SuiteCRM 8.8.0.\n\nSources: [content/8.x/features/two-factor/two-factor.en.adoc:8-83](), [content/8.x/admin/releases/8.8/_index.en.adoc:98-105]()\n\n## Login Security and Throttling\n\nSuiteCRM includes built-in protection against brute force attacks through login attempt throttling.\n\n### Default Throttling Settings\n\n- **Maximum attempts**: 3 failed login attempts\n- **Lockout duration**: Minimum 1 minute\n- **Scope**: Per user account\n\n### Configuring Throttling\n\nModify the maximum attempts in `.env.local`:\n\n```bash\nLOGIN_THROTTLING_MAX_ATTEMPTS=5\n```\n\n### Advanced Throttling Configuration\n\nFor detailed throttling configuration, refer to Symfony's security documentation for limiting login attempts.\n\nWhen throttling is triggered, users see a message indicating maximum attempts reached and must wait before retrying.\n\nSources: [content/8.x/admin/configuration/Login-Throttling-Configuration.ru.adoc:9-25]()\n\n## Environment and Cache Management\n\n### Environment Configuration\n\nAuthentication settings require environment variables in `.env.local`. After making changes:\n\n1. Clear Symfony cache:\n```bash\nbin/console cache:clear\n```\n\n2. Ensure proper file permissions for cache directory\n\n### Symfony Secrets Integration\n\nFor production environments, sensitive values like certificates and passwords can be stored using Symfony's secrets management:\n\n```bash\nphp bin/console secrets:set SAML_SP_PRIVATE_KEY\nphp bin/console secrets:set LDAP_SEARCH_PASSWORD\n```\n\nReference secrets in configuration files:\n```yaml\nprivateKey: '%env(SAML_SP_PRIVATE_KEY)%'\n```\n\n### Configuration File Precedence\n\nConfiguration files are processed in this order:\n1. Core configuration in `config/`\n2. Extension configuration in `extensions/\u003cextension\u003e/config/`\n3. Environment variables from `.env.local`\n\nSources: [content/8.x/admin/configuration/SAML-Configuration.ru.adoc:438-454](), [content/8.x/admin/configuration/SAML-Configuration.ru.adoc:198-253](), [content/8.x/admin/configuration/LDAP-Configuration.ru.adoc:230-246]()"])</script><script>self.__next_f.push([1,"25:T38cb,"])</script><script>self.__next_f.push([1,"# Customization and Development\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [content/8.x/admin/Compatibility Matrix.adoc](content/8.x/admin/Compatibility Matrix.adoc)\n- [content/8.x/developer/developer-getting-started.adoc](content/8.x/developer/developer-getting-started.adoc)\n- [content/8.x/developer/extensions/backend/record-mappers/_index.en.adoc](content/8.x/developer/extensions/backend/record-mappers/_index.en.adoc)\n- [content/8.x/developer/extensions/frontend/88x-fe-extensions-setup.adoc](content/8.x/developer/extensions/frontend/88x-fe-extensions-setup.adoc)\n- [content/8.x/developer/extensions/frontend/examples/add-charts-extension.adoc](content/8.x/developer/extensions/frontend/examples/add-charts-extension.adoc)\n- [content/8.x/developer/extensions/frontend/examples/add-sidebar-widget.adoc](content/8.x/developer/extensions/frontend/examples/add-sidebar-widget.adoc)\n- [content/8.x/developer/extensions/frontend/migration/_index.en.adoc](content/8.x/developer/extensions/frontend/migration/_index.en.adoc)\n- [content/8.x/developer/extensions/frontend/older/8x-fe-extensions-getting-started.adoc](content/8.x/developer/extensions/frontend/older/8x-fe-extensions-getting-started.adoc)\n- [content/8.x/developer/extensions/frontend/older/8x-fe-extensions-setup.adoc](content/8.x/developer/extensions/frontend/older/8x-fe-extensions-setup.adoc)\n- [content/8.x/developer/extensions/frontend/older/_index.en.adoc](content/8.x/developer/extensions/frontend/older/_index.en.adoc)\n- [content/8.x/developer/installation-guide/backend-end-installation-guide.adoc](content/8.x/developer/installation-guide/backend-end-installation-guide.adoc)\n- [content/blog/Customizing-Subthemes.adoc](content/blog/Customizing-Subthemes.adoc)\n- [content/blog/ListView-conditional-formatting.adoc](content/blog/ListView-conditional-formatting.adoc)\n- [content/community/contributing-to-docs/guidelines.adoc](content/community/contributing-to-docs/guidelines.adoc)\n- [content/community/contributing-to-docs/translate.adoc](content/community/contributing-to-docs/translate.adoc)\n- [content/developer/Best Practices.adoc](content/developer/Best Practices.adoc)\n- [content/developer/Config.adoc](content/developer/Config.adoc)\n- [content/developer/Controllers.adoc](content/developer/Controllers.adoc)\n- [content/developer/Entry Points.adoc](content/developer/Entry Points.adoc)\n- [content/developer/Extension Framework.adoc](content/developer/Extension Framework.adoc)\n- [content/developer/Language Strings.adoc](content/developer/Language Strings.adoc)\n- [content/developer/Logging.adoc](content/developer/Logging.adoc)\n- [content/developer/Logic Hooks.adoc](content/developer/Logic Hooks.adoc)\n- [content/developer/Metadata.adoc](content/developer/Metadata.adoc)\n- [content/developer/Module Installer.adoc](content/developer/Module Installer.adoc)\n- [content/developer/Scheduled Tasks.adoc](content/developer/Scheduled Tasks.adoc)\n- [content/developer/Vardefs.adoc](content/developer/Vardefs.adoc)\n- [static/images/en/developer/Admin-OAuth2Clients-2.png](static/images/en/developer/Admin-OAuth2Clients-2.png)\n- [static/images/en/developer/Admin-OAuth2Clients-3.png](static/images/en/developer/Admin-OAuth2Clients-3.png)\n- [static/images/en/developer/developerData.png](static/images/en/developer/developerData.png)\n- [static/images/en/developer/vardefs.png](static/images/en/developer/vardefs.png)\n\n\u003c/details\u003e\n\n\n\nThis page provides an overview of the customization and development options available in SuiteCRM, covering both the legacy 7.x series and the modern 8.x architecture. It explains the different approaches for extending SuiteCRM functionality, from simple theme modifications to complex backend and frontend extensions.\n\nFor specific guidance on installation and upgrade procedures, see [Installation and Upgrade Guides](#5). For administration and configuration topics, see [Administration](#7).\n\n## Development Environment Requirements\n\nSuiteCRM development requires different tools depending on the version and type of customization:\n\n| SuiteCRM Version | PHP | Node.js | Angular CLI | yarn | Purpose |\n|------------------|-----|---------|-------------|------|---------|\n| 8.8.x | 8.1, 8.2, 8.3 | ^20.11.1 | ^18 | ^4.5.0 | Frontend development |\n| 8.7.x | 8.1, 8.2 | ^18.10 | ^16 | ^1.22.10 | Frontend development |\n| 8.4.x-8.6.x | 8.1, 8.2 | ^14.15.1 | ^12 | ^1.22.10 | Frontend development |\n| 7.14.x | 7.4, 8.0, 8.1, 8.2 | - | - | - | Backend only |\n\n**Sources:** [content/8.x/admin/Compatibility Matrix.adoc:1-381]()\n\n## Architecture Overview\n\nSuiteCRM offers two distinct development paradigms depending on the version:\n\n```mermaid\ngraph TB\n    subgraph \"SuiteCRM 7.x Legacy Architecture\"\n        PHP7[\"PHP Backend\"]\n        SMARTY[\"Smarty Templates\"]\n        JQUERY[\"jQuery/JavaScript\"]\n        MYSQL7[\"MySQL/MariaDB\"]\n        \n        PHP7 --\u003e SMARTY\n        SMARTY --\u003e JQUERY\n        PHP7 --\u003e MYSQL7\n    end\n    \n    subgraph \"SuiteCRM 8.x Modern Architecture\"\n        SYMFONY[\"Symfony Backend\"]\n        ANGULAR[\"Angular Frontend\"]\n        GRAPHQL[\"GraphQL API\"]\n        MYSQL8[\"MySQL/MariaDB\"]\n        \n        ANGULAR --\u003e GRAPHQL\n        GRAPHQL --\u003e SYMFONY\n        SYMFONY --\u003e MYSQL8\n    end\n    \n    subgraph \"Development Approaches\"\n        THEME[\"Theme Customization\"]\n        FRONTEND[\"Frontend Extensions\"]\n        BACKEND[\"Backend Development\"]\n    end\n    \n    THEME --\u003e PHP7\n    THEME --\u003e ANGULAR\n    FRONTEND --\u003e ANGULAR\n    BACKEND --\u003e PHP7\n    BACKEND --\u003e SYMFONY\n    \n    style ANGULAR fill:#e3f2fd\n    style SYMFONY fill:#f3e5f5\n    style PHP7 fill:#fff3e0\n```\n\n**Sources:** [content/8.x/developer/developer-getting-started.adoc:1-42](), [content/8.x/developer/installation-guide/backend-end-installation-guide.adoc:1-113]()\n\n## Customization Framework Architecture\n\nThe SuiteCRM customization system uses an extension framework that allows modular modifications:\n\n```mermaid\ngraph TD\n    subgraph \"Extension Framework Core\"\n        EXTDIR[\"custom/Extension/\"]\n        COMPILE[\"Quick Repair \u0026 Rebuild\"]\n        EXTFILES[\"Compiled Extension Files\"]\n    end\n    \n    subgraph \"Extension Types\"\n        VARDEFS[\"Vardefs Extensions\u003cbr/\u003ecustom/Extension/modules/Module/Ext/Vardefs/\"]\n        LOGICHOOKS[\"Logic Hooks\u003cbr/\u003ecustom/Extension/modules/Module/Ext/LogicHooks/\"]\n        LANGUAGE[\"Language Strings\u003cbr/\u003ecustom/Extension/modules/Module/Ext/Language/\"]\n        LAYOUTS[\"Layout Definitions\u003cbr/\u003ecustom/Extension/modules/Module/Ext/Layoutdefs/\"]\n        SCHEDULED[\"Scheduled Tasks\u003cbr/\u003ecustom/Extension/modules/Schedulers/Ext/ScheduledTasks/\"]\n        ENTRYPOINTS[\"Entry Points\u003cbr/\u003ecustom/Extension/application/Ext/EntryPointRegistry/\"]\n    end\n    \n    subgraph \"Compilation Targets\"\n        VARDEFS_EXT[\"vardefs.ext.php\"]\n        HOOKS_EXT[\"logichooks.ext.php\"] \n        LANG_EXT[\"Language Files\"]\n        LAYOUT_EXT[\"layoutdefs.ext.php\"]\n        SCHED_EXT[\"scheduledtasks.ext.php\"]\n        ENTRY_EXT[\"entry_point_registry.ext.php\"]\n    end\n    \n    VARDEFS --\u003e COMPILE\n    LOGICHOOKS --\u003e COMPILE\n    LANGUAGE --\u003e COMPILE\n    LAYOUTS --\u003e COMPILE\n    SCHEDULED --\u003e COMPILE\n    ENTRYPOINTS --\u003e COMPILE\n    \n    COMPILE --\u003e VARDEFS_EXT\n    COMPILE --\u003e HOOKS_EXT\n    COMPILE --\u003e LANG_EXT\n    COMPILE --\u003e LAYOUT_EXT\n    COMPILE --\u003e SCHED_EXT\n    COMPILE --\u003e ENTRY_EXT\n    \n    EXTDIR --\u003e EXTFILES\n```\n\n**Sources:** [content/developer/Extension Framework.adoc:1-163](), [content/developer/Vardefs.adoc:318-334](), [content/developer/Logic Hooks.adoc:270-282]()\n\n## Theme Customization\n\nTheme customization in SuiteCRM involves modifying the visual appearance and user interface elements. The approach differs significantly between versions:\n\n### SuiteCRM 7.x Theme System\n- **SuiteP Theme**: Primary theme with sub-themes (Dawn, Day, Dusk, Night)\n- **SCSS Compilation**: Uses `leafo/scssphp` for stylesheet compilation\n- **File Structure**: `themes/SuiteP/css/SubThemeName/`\n- **Build Command**: `./vendor/bin/pscss -f compressed themes/SuiteP/css/Noon/style.scss \u003e themes/SuiteP/css/Noon/style.css`\n\n### SuiteCRM 8.x Theme System\n- **Angular Material**: Built on Angular Material components\n- **CSS Custom Properties**: Modern CSS variable system\n- **Component-Based**: Styling tied to Angular components\n\n**Sources:** [content/blog/Customizing-Subthemes.adoc:1-191]()\n\n## Frontend Extensions\n\nFrontend extensions allow adding new user interface components and functionality to SuiteCRM 8.x:\n\n```mermaid\ngraph LR\n    subgraph \"Frontend Extension Development\"\n        DEFAULTEXT[\"defaultExt Template\"]\n        ANGULAR_APP[\"Angular Extension App\"]\n        MODULE_FED[\"Module Federation\"]\n        BUILD_SYSTEM[\"Webpack Build\"]\n    end\n    \n    subgraph \"Extension Components\"\n        SIDEBAR[\"SidebarWidgetRegistry\"]\n        CHARTS[\"ChartRegistry\"] \n        COMPONENTS[\"Custom Components\"]\n        SERVICES[\"Custom Services\"]\n    end\n    \n    subgraph \"Build Outputs\"\n        REMOTE_ENTRY[\"remoteEntry.js\"]\n        PUBLIC_DIR[\"public/extensions/\"]\n        EXTENSION_CONFIG[\"config/extension.php\"]\n    end\n    \n    DEFAULTEXT --\u003e ANGULAR_APP\n    ANGULAR_APP --\u003e MODULE_FED\n    MODULE_FED --\u003e BUILD_SYSTEM\n    \n    ANGULAR_APP --\u003e SIDEBAR\n    ANGULAR_APP --\u003e CHARTS\n    ANGULAR_APP --\u003e COMPONENTS\n    ANGULAR_APP --\u003e SERVICES\n    \n    BUILD_SYSTEM --\u003e REMOTE_ENTRY\n    BUILD_SYSTEM --\u003e PUBLIC_DIR\n    \n    EXTENSION_CONFIG --\u003e REMOTE_ENTRY\n```\n\n### Key Extension Registries\n- **SidebarWidgetRegistry**: `sidebarWidgetRegistry.register('default', 'widget-name', ComponentClass)`\n- **ChartRegistry**: `chartRegistry.register('default', 'chart-type', ChartComponent)`\n\n### Build Commands\n- Development: `yarn run build-dev:extensionName --watch`\n- Production: `yarn run build:extensionName`\n\n**Sources:** [content/8.x/developer/extensions/frontend/older/8x-fe-extensions-getting-started.adoc:1-185](), [content/8.x/developer/extensions/frontend/examples/add-sidebar-widget.adoc:1-881](), [content/8.x/developer/extensions/frontend/examples/add-charts-extension.adoc:1-392]()\n\n## Backend Development\n\nBackend development encompasses server-side customizations including business logic, data processing, and API extensions:\n\n### Logic Hooks System\nLogic hooks allow injecting custom code at specific points in the application lifecycle:\n\n```mermaid\ngraph TD\n    subgraph \"Logic Hook Types\"\n        MODULE_HOOKS[\"Module Hooks\u003cbr/\u003ebefore_save, after_save\u003cbr/\u003ebefore_delete, after_delete\"]\n        APP_HOOKS[\"Application Hooks\u003cbr/\u003eafter_user_load\u003cbr/\u003eafter_entry_point\"]\n        USER_HOOKS[\"User Hooks\u003cbr/\u003eafter_login, after_logout\u003cbr/\u003elogin_failed\"]\n        JOB_HOOKS[\"Job Queue Hooks\u003cbr/\u003ejob_failure, job_failure_retry\"]\n    end\n    \n    subgraph \"Hook Registration\"\n        HOOK_FILE[\"custom/Extension/modules/Module/Ext/LogicHooks/\"]\n        HOOK_ARRAY[\"hook_array definition\"]\n        HOOK_CLASS[\"Custom Hook Class\"]\n    end\n    \n    subgraph \"Hook Execution\"\n        SORT_ORDER[\"Sort Order (numeric)\"]\n        HOOK_METHOD[\"Hook Method(bean, event, arguments)\"]\n        BUSINESS_LOGIC[\"Custom Business Logic\"]\n    end\n    \n    MODULE_HOOKS --\u003e HOOK_FILE\n    APP_HOOKS --\u003e HOOK_FILE\n    USER_HOOKS --\u003e HOOK_FILE\n    JOB_HOOKS --\u003e HOOK_FILE\n    \n    HOOK_FILE --\u003e HOOK_ARRAY\n    HOOK_ARRAY --\u003e HOOK_CLASS\n    HOOK_CLASS --\u003e SORT_ORDER\n    SORT_ORDER --\u003e HOOK_METHOD\n    HOOK_METHOD --\u003e BUSINESS_LOGIC\n```\n\n### Vardefs and Field Definitions\nVardefs define the structure and behavior of module fields:\n\n```mermaid\ngraph LR\n    subgraph \"Vardef Components\"\n        FIELD_DEF[\"Field Definitions\u003cbr/\u003ename, type, len, options\"]\n        RELATIONSHIP_DEF[\"Relationships\u003cbr/\u003elhs_module, rhs_module\u003cbr/\u003erelationship_type\"]\n        INDEX_DEF[\"Database Indices\u003cbr/\u003ename, type, fields\"]\n        TEMPLATE_DEF[\"Vardef Templates\u003cbr/\u003edefault, assignable, person\"]\n    end\n    \n    subgraph \"Vardef Files\"\n        MODULE_VARDEF[\"modules/Module/vardefs.php\"]\n        CUSTOM_VARDEF[\"custom/Extension/modules/Module/Ext/Vardefs/\"]\n        COMPILED_VARDEF[\"custom/modules/Module/Ext/Vardefs/vardefs.ext.php\"]\n    end\n    \n    subgraph \"Field Types\"\n        BASIC_TYPES[\"varchar, text, int\u003cbr/\u003ebool, date, datetime\"]\n        RELATIONSHIP_TYPES[\"relate, link\u003cbr/\u003eenum, multienum\"]\n        CUSTOM_TYPES[\"Custom Field Types\"]\n    end\n    \n    FIELD_DEF --\u003e MODULE_VARDEF\n    RELATIONSHIP_DEF --\u003e MODULE_VARDEF\n    INDEX_DEF --\u003e MODULE_VARDEF\n    TEMPLATE_DEF --\u003e MODULE_VARDEF\n    \n    MODULE_VARDEF --\u003e CUSTOM_VARDEF\n    CUSTOM_VARDEF --\u003e COMPILED_VARDEF\n    \n    BASIC_TYPES --\u003e FIELD_DEF\n    RELATIONSHIP_TYPES --\u003e FIELD_DEF\n    CUSTOM_TYPES --\u003e FIELD_DEF\n```\n\n### Scheduled Tasks and Job Queue\nCustom scheduled tasks for background processing:\n\n- **Scheduler Definition**: `custom/Extension/modules/Schedulers/Ext/ScheduledTasks/TaskName.php`\n- **Job Queue**: `SugarJobQueue` and `SchedulersJob` classes\n- **Task Method**: Function added to `$job_strings` array\n\n**Sources:** [content/developer/Logic Hooks.adoc:1-356](), [content/developer/Vardefs.adoc:1-404](), [content/developer/Scheduled Tasks.adoc:1-376]()\n\n## Record Mappers (SuiteCRM 8.x)\n\nRecord mappers provide flexible data transformation between internal and external formats:\n\n### Mapper Architecture\n- **API Level**: Execute before/after API operations\n- **Entity Level**: Execute during entity operations (save, retrieve)\n- **Types**: Field Mapper, Field Type Mapper, Record Mapper\n- **Modes**: retrieve, list, save\n\n**Sources:** [content/8.x/developer/extensions/backend/record-mappers/_index.en.adoc:1-115]()\n\n## Development Workflow\n\n### Version 7.x Development\n1. **Setup**: Install SuiteCRM 7.x package\n2. **Customize**: Use Studio, custom directory, or extension framework\n3. **Deploy**: Copy custom files, run Quick Repair \u0026 Rebuild\n\n### Version 8.x Development  \n1. **Setup**: Install dev package or build from source\n2. **Install Dependencies**: `yarn install`\n3. **Enable Extension**: Modify `extensions/defaultExt/config/extension.php`\n4. **Develop**: Build extensions with `yarn run build-dev:extensionName --watch`\n5. **Deploy**: Build production with `yarn run build:extensionName`\n\n### Migration Considerations\n- **No Direct Migration Path**: 7.x to 8.x requires complete redevelopment\n- **Architecture Change**: Move from PHP/Smarty to Angular/Symfony\n- **API Evolution**: v4.1 (SOAP/REST) to v8 (JSON API/OAuth2)\n\n**Sources:** [content/8.x/developer/developer-getting-started.adoc:1-42](), [content/8.x/developer/extensions/frontend/older/8x-fe-extensions-getting-started.adoc:1-185]()"])</script><script>self.__next_f.push([1,"26:T302b,"])</script><script>self.__next_f.push([1,"# Theme Customization\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [content/blog/Customizing-Subthemes.adoc](content/blog/Customizing-Subthemes.adoc)\n- [layouts/partials/custom-footer.html](layouts/partials/custom-footer.html)\n- [layouts/partials/custom-header.html](layouts/partials/custom-header.html)\n- [layouts/partials/menu-footer.html](layouts/partials/menu-footer.html)\n- [layouts/partials/suitecrm.com-menu.html](layouts/partials/suitecrm.com-menu.html)\n- [static/images/en/developer/Admin-OAuth2Clients-2.png](static/images/en/developer/Admin-OAuth2Clients-2.png)\n- [static/images/en/developer/Admin-OAuth2Clients-3.png](static/images/en/developer/Admin-OAuth2Clients-3.png)\n- [static/images/repo-forked.svg](static/images/repo-forked.svg)\n- [static/images/star.svg](static/images/star.svg)\n\n\u003c/details\u003e\n\n\n\nThis document covers the customization of SuiteCRM themes, specifically focusing on the SuiteP theme system and its sub-themes. It provides guidance on creating custom sub-themes, modifying styles through SCSS, and organizing theme files in an upgrade-safe manner.\n\nFor information about frontend extensions and Angular development, see [Frontend Extensions](#6.2). For backend development including custom modules, see [Backend Development](#6.3).\n\n## SuiteP Theme Architecture\n\nSuiteCRM 7.10+ uses the SuiteP theme system with four built-in sub-themes: Dawn, Day, Dusk, and Night. The theme architecture follows a hierarchical structure where custom modifications are placed in the `custom/` directory to ensure upgrade safety.\n\n```mermaid\ngraph TB\n    SuiteP[\"SuiteP Base Theme\"]\n    \n    subgraph \"Built-in Sub-themes\"\n        Dawn[\"Dawn\"]\n        Day[\"Day\"] \n        Dusk[\"Dusk\"]\n        Night[\"Night\"]\n    end\n    \n    subgraph \"Core Theme Files\"\n        ThemeDef[\"themes/SuiteP/themedef.php\"]\n        Variables[\"themes/SuiteP/css/variables.scss\"]\n        ColorPalette[\"themes/SuiteP/css/color-palette.scss\"]\n        MainStyle[\"themes/SuiteP/css/style.scss\"]\n    end\n    \n    subgraph \"Sub-theme Directories\"\n        DawnCSS[\"themes/SuiteP/css/Dawn/\"]\n        DayCSS[\"themes/SuiteP/css/Day/\"]\n        DuskCSS[\"themes/SuiteP/css/Dusk/\"]\n        NightCSS[\"themes/SuiteP/css/Night/\"]\n    end\n    \n    subgraph \"Custom Override Structure\"\n        CustomThemeDef[\"custom/themes/SuiteP/themedef.php\"]\n        CustomLang[\"custom/modules/Users/language/en_us.lang.php\"]\n        CustomAppLang[\"custom/Extension/application/Ext/Language/en_us.*.php\"]\n    end\n    \n    SuiteP --\u003e Dawn\n    SuiteP --\u003e Day\n    SuiteP --\u003e Dusk\n    SuiteP --\u003e Night\n    \n    SuiteP --\u003e ThemeDef\n    ThemeDef --\u003e Variables\n    ThemeDef --\u003e ColorPalette\n    ThemeDef --\u003e MainStyle\n    \n    Dawn --\u003e DawnCSS\n    Day --\u003e DayCSS\n    Dusk --\u003e DuskCSS\n    Night --\u003e NightCSS\n    \n    ThemeDef -.-\u003e CustomThemeDef\n    CustomThemeDef --\u003e CustomLang\n    CustomThemeDef --\u003e CustomAppLang\n```\n\n**Theme Component Overview**\n\n| Component | Purpose | File Location |\n|-----------|---------|---------------|\n| `themedef.php` | Theme definition and sub-theme registration | `themes/SuiteP/themedef.php` |\n| `variables.scss` | SCSS variables and configuration | `themes/SuiteP/css/variables.scss` |\n| `color-palette.scss` | Color definitions for themes | `themes/SuiteP/css/color-palette.scss` |\n| `style.scss` | Main stylesheet compilation entry point | `themes/SuiteP/css/style.scss` |\n\nSources: [content/blog/Customizing-Subthemes.adoc:22-31](), [content/blog/Customizing-Subthemes.adoc:78-82]()\n\n## Creating Custom Sub-themes\n\nCustom sub-themes are created by copying existing sub-theme directories and registering them through the custom theme definition system. This process involves modifying theme definitions, language files, and CSS directories.\n\n```mermaid\nflowchart TD\n    Start[\"Start Custom Sub-theme Creation\"]\n    \n    subgraph \"Theme Registration\"\n        CopyThemeDef[\"Copy themes/SuiteP/themedef.php to custom/themes/SuiteP/themedef.php\"]\n        AddSubtheme[\"Add new sub-theme entry to themedef.php\"]\n        RegisterLabel[\"Register LBL_SUBTHEME_OPTIONS_* label\"]\n    end\n    \n    subgraph \"Language Configuration\"\n        ModLang[\"Create custom/modules/Users/language/en_us.lang.php\"]\n        AppLang[\"Create custom/Extension/application/Ext/Language/en_us.*.php\"]\n        DefineLabels[\"Define theme name labels\"]\n    end\n    \n    subgraph \"CSS Directory Setup\" \n        CopyCSS[\"Copy existing sub-theme CSS directory\"]\n        CreateNew[\"cp -R themes/SuiteP/css/Day themes/SuiteP/css/Noon\"]\n        QuickRepair[\"Run Quick Repair and Rebuild\"]\n    end\n    \n    subgraph \"SCSS Compilation Setup\"\n        InstallSASS[\"composer require leafo/scssphp\"]\n        CompileCmd[\"./vendor/bin/pscss -f compressed\"]\n        StyleOutput[\"themes/SuiteP/css/Noon/style.css\"]\n    end\n    \n    Start --\u003e CopyThemeDef\n    CopyThemeDef --\u003e AddSubtheme\n    AddSubtheme --\u003e RegisterLabel\n    RegisterLabel --\u003e ModLang\n    ModLang --\u003e AppLang\n    AppLang --\u003e DefineLabels\n    DefineLabels --\u003e CopyCSS\n    CopyCSS --\u003e CreateNew\n    CreateNew --\u003e QuickRepair\n    QuickRepair --\u003e InstallSASS\n    InstallSASS --\u003e CompileCmd\n    CompileCmd --\u003e StyleOutput\n```\n\n**Required File Modifications**\n\nThe custom sub-theme registration requires specific file modifications:\n\n1. **Theme Definition**: Add sub-theme entry in `custom/themes/SuiteP/themedef.php`\n2. **Module Language**: Define labels in `custom/modules/Users/language/en_us.lang.php`  \n3. **Application Language**: Create extension file in `custom/Extension/application/Ext/Language/`\n\nSources: [content/blog/Customizing-Subthemes.adoc:22-42](), [content/blog/Customizing-Subthemes.adoc:53-59]()\n\n## SCSS Compilation Process\n\nThe SuiteP theme system uses SCSS for stylesheet compilation. The compilation process transforms SCSS source files into optimized CSS output using the `leafo/scssphp` compiler.\n\n```mermaid\ngraph LR\n    subgraph \"SCSS Source Files\"\n        MainSCSS[\"style.scss\"]\n        VarSCSS[\"variables.scss\"] \n        PaletteSCSS[\"color-palette.scss\"]\n        ComponentSCSS[\"*.scss components\"]\n    end\n    \n    subgraph \"Compilation Process\"\n        Composer[\"composer require leafo/scssphp\"]\n        PSCSSCmd[\"./vendor/bin/pscss\"]\n        CompressFlag[\"-f compressed\"]\n        InputFile[\"themes/SuiteP/css/Noon/style.scss\"]\n    end\n    \n    subgraph \"Output\"\n        CompiledCSS[\"themes/SuiteP/css/Noon/style.css\"]\n        MinifiedCSS[\"Compressed CSS Output\"]\n    end\n    \n    VarSCSS --\u003e MainSCSS\n    PaletteSCSS --\u003e MainSCSS  \n    ComponentSCSS --\u003e MainSCSS\n    MainSCSS --\u003e PSCSSCmd\n    \n    Composer --\u003e PSCSSCmd\n    PSCSSCmd --\u003e CompressFlag\n    CompressFlag --\u003e InputFile\n    InputFile --\u003e CompiledCSS\n    CompiledCSS --\u003e MinifiedCSS\n```\n\n**SCSS Compilation Command Structure**\n\nThe compilation command follows this pattern:\n```bash\n./vendor/bin/pscss -f compressed themes/SuiteP/css/[SubTheme]/style.scss \u003e themes/SuiteP/css/[SubTheme]/style.css\n```\n\nThis command processes the main `style.scss` file which imports all other SCSS dependencies, regardless of which specific SCSS file was modified.\n\nSources: [content/blog/Customizing-Subthemes.adoc:61-74](), [content/blog/Customizing-Subthemes.adoc:77-82]()\n\n## Style Customization Framework\n\nSuiteCRM's theming system provides multiple levels of customization through SCSS variables and color palette modifications. The framework supports targeted changes to specific UI components while maintaining overall design consistency.\n\n**Key SCSS Files for Customization**\n\n| File | Purpose | Customization Level |\n|------|---------|-------------------|\n| `variables.scss` | Global SCSS variables and mixins | System-wide settings |\n| `color-palette.scss` | Color definitions with variable mapping | Color scheme control |\n| `style.scss` | Main import file and component organization | Structural modifications |\n\n**Color Palette Variable System**\n\nThe color palette uses a numbered variable system (`$color-1` through `$color-82`) with semantic mappings. Each color variable serves specific UI components:\n\n- `$color-7`: List view elements with foreground color `$fg-color-7`\n- `$color-12`: Sidebar elements  \n- `$color-44`, `$color-50`, `$color-80`, `$color-82`: White variants for backgrounds\n- `$color-49`: Red for error states\n\n```mermaid\ngraph TB\n    subgraph \"SCSS Variable Structure\"\n        GlobalVars[\"variables.scss - Global Variables\"]\n        ColorPalette[\"color-palette.scss - Color Definitions\"]\n        ComponentStyles[\"Component-specific SCSS files\"]\n    end\n    \n    subgraph \"Color Variable Mapping\"\n        Color7[\"$color-7: #4B97C4 - List Views\"]\n        FGColor7[\"$fg-color-7: #111 - List View Text\"]\n        Color12[\"$color-12: #666666 - General UI\"]\n        Color13[\"$color-13: #303D44 - Sidebar\"]\n        Color49[\"$color-49: #FF0000 - Error States\"]\n    end\n    \n    subgraph \"UI Component Application\"\n        TopMenus[\"Top Navigation Menus\"]\n        Sidebars[\"Sidebar Navigation\"]\n        ListViews[\"Data List Views\"]\n        ErrorStates[\"Error Messages\"]\n    end\n    \n    GlobalVars --\u003e ColorPalette\n    ColorPalette --\u003e ComponentStyles\n    \n    Color7 --\u003e ListViews\n    FGColor7 --\u003e ListViews\n    Color12 --\u003e TopMenus\n    Color13 --\u003e Sidebars\n    Color49 --\u003e ErrorStates\n```\n\n**Example Color Customization Workflow**\n\nFor increased contrast modifications, specific color values can be updated in `color-palette.scss`:\n\n- Top menus: `#C2C3C4` → `#555555` (darker background)\n- Text lettering: `#817C8D` → `#111` (darker text)  \n- Sidebar elements: `#929798` → `#626768`, `#707d84` → `#303d44` (increased contrast)\n\nSources: [content/blog/Customizing-Subthemes.adoc:83-97](), [content/blog/Customizing-Subthemes.adoc:99-188]()\n\n## File Organization and Upgrade Safety\n\nSuiteCRM's customization system follows the custom directory pattern to ensure modifications survive system upgrades. All theme customizations should be placed within the `custom/` directory structure to maintain upgrade compatibility.\n\n```mermaid\ngraph TD\n    subgraph \"Core Theme Structure\"\n        CoreThemes[\"themes/SuiteP/\"]\n        CoreThemeDef[\"themes/SuiteP/themedef.php\"]\n        CoreCSS[\"themes/SuiteP/css/\"]\n        CoreSubthemes[\"themes/SuiteP/css/[Dawn|Day|Dusk|Night]/\"]\n    end\n    \n    subgraph \"Custom Override Structure\"\n        CustomRoot[\"custom/\"]\n        CustomThemes[\"custom/themes/SuiteP/\"]\n        CustomThemeDef[\"custom/themes/SuiteP/themedef.php\"]\n        CustomModules[\"custom/modules/Users/language/\"]\n        CustomExtensions[\"custom/Extension/application/Ext/Language/\"]\n    end\n    \n    subgraph \"SASS Compilation Tools\"\n        Vendor[\"vendor/bin/pscss\"]\n        ComposerDeps[\"composer.json - leafo/scssphp\"]\n        CompileScript[\"Compilation command\"]\n    end\n    \n    subgraph \"User Profile Integration\"\n        UserProfile[\"User Profile - Layout Options\"]\n        ThemeSelector[\"Sub-theme Selection Interface\"]\n        QuickRepair[\"Admin - Quick Repair and Rebuild\"]\n    end\n    \n    CoreThemes -.-\u003e|\"Override via\"| CustomThemes\n    CoreThemeDef -.-\u003e|\"Customized in\"| CustomThemeDef\n    \n    CustomThemeDef --\u003e CustomModules\n    CustomThemeDef --\u003e CustomExtensions\n    \n    ComposerDeps --\u003e Vendor\n    Vendor --\u003e CompileScript\n    CompileScript --\u003e CoreCSS\n    \n    CustomThemeDef --\u003e QuickRepair\n    QuickRepair --\u003e UserProfile\n    UserProfile --\u003e ThemeSelector\n```\n\n**Upgrade-Safe Customization Checklist**\n\n1. **Theme Definition**: Use `custom/themes/SuiteP/themedef.php` instead of modifying core files\n2. **Language Files**: Place labels in `custom/modules/Users/language/` and `custom/Extension/application/Ext/Language/`\n3. **CSS Compilation**: Compile directly to core CSS directories (acceptable as they regenerate)\n4. **Version Control**: Track custom SCSS source files, not compiled CSS output\n5. **Documentation**: Maintain compilation commands and color change documentation\n\n**Required System Operations**\n\nAfter theme modifications, specific system operations ensure proper integration:\n\n- **Quick Repair and Rebuild**: Required after theme definition changes\n- **Cache Clear**: May be needed for language file updates\n- **User Profile Update**: Users can select new themes from Layout Options\n\nSources: [content/blog/Customizing-Subthemes.adoc:22-59](), [content/blog/Customizing-Subthemes.adoc:190-191]()"])</script><script>self.__next_f.push([1,"27:T4494,"])</script><script>self.__next_f.push([1,"# Frontend Extensions\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [content/8.x/admin/Compatibility Matrix.adoc](content/8.x/admin/Compatibility Matrix.adoc)\n- [content/8.x/admin/releases/8.8/_index.en.adoc](content/8.x/admin/releases/8.8/_index.en.adoc)\n- [content/8.x/developer/developer-getting-started.adoc](content/8.x/developer/developer-getting-started.adoc)\n- [content/8.x/developer/extensions/backend/record-mappers/_index.en.adoc](content/8.x/developer/extensions/backend/record-mappers/_index.en.adoc)\n- [content/8.x/developer/extensions/backend/save-handlers/_index.en.adoc](content/8.x/developer/extensions/backend/save-handlers/_index.en.adoc)\n- [content/8.x/developer/extensions/frontend/88x-fe-extensions-setup.adoc](content/8.x/developer/extensions/frontend/88x-fe-extensions-setup.adoc)\n- [content/8.x/developer/extensions/frontend/examples/add-charts-extension.adoc](content/8.x/developer/extensions/frontend/examples/add-charts-extension.adoc)\n- [content/8.x/developer/extensions/frontend/examples/add-sidebar-widget.adoc](content/8.x/developer/extensions/frontend/examples/add-sidebar-widget.adoc)\n- [content/8.x/developer/extensions/frontend/migration/Migration-8.8.adoc](content/8.x/developer/extensions/frontend/migration/Migration-8.8.adoc)\n- [content/8.x/developer/extensions/frontend/migration/_index.en.adoc](content/8.x/developer/extensions/frontend/migration/_index.en.adoc)\n- [content/8.x/developer/extensions/frontend/older/8x-fe-extensions-getting-started.adoc](content/8.x/developer/extensions/frontend/older/8x-fe-extensions-getting-started.adoc)\n- [content/8.x/developer/extensions/frontend/older/8x-fe-extensions-setup.adoc](content/8.x/developer/extensions/frontend/older/8x-fe-extensions-setup.adoc)\n- [content/8.x/developer/extensions/frontend/older/_index.en.adoc](content/8.x/developer/extensions/frontend/older/_index.en.adoc)\n- [content/8.x/developer/installation-guide/8.2.0-front-end-installation-guide.adoc](content/8.x/developer/installation-guide/8.2.0-front-end-installation-guide.adoc)\n- [content/8.x/developer/installation-guide/8.8.0-front-end-installation-guide.adoc](content/8.x/developer/installation-guide/8.8.0-front-end-installation-guide.adoc)\n- [content/8.x/developer/installation-guide/backend-end-installation-guide.adoc](content/8.x/developer/installation-guide/backend-end-installation-guide.adoc)\n- [content/8.x/features/two-factor/two-factor.en.adoc](content/8.x/features/two-factor/two-factor.en.adoc)\n- [static/images/en/8.x/admin/release/Fav-Filter.gif](static/images/en/8.x/admin/release/Fav-Filter.gif)\n- [static/images/en/8.x/admin/release/Qr-2FA.png](static/images/en/8.x/admin/release/Qr-2FA.png)\n- [static/images/en/8.x/admin/release/new-record-view.png](static/images/en/8.x/admin/release/new-record-view.png)\n- [static/images/en/8.x/user/features/2FA-Profile.png](static/images/en/8.x/user/features/2FA-Profile.png)\n- [static/images/en/8.x/user/features/Disable-Two-Factor.gif](static/images/en/8.x/user/features/Disable-Two-Factor.gif)\n- [static/images/en/8.x/user/features/Enable-2FA.png](static/images/en/8.x/user/features/Enable-2FA.png)\n- [static/images/en/8.x/user/features/Enabled-2FA.png](static/images/en/8.x/user/features/Enabled-2FA.png)\n- [static/images/en/8.x/user/features/Login-2FA.png](static/images/en/8.x/user/features/Login-2FA.png)\n- [static/images/en/8.x/user/features/New-Disable-2FA.png](static/images/en/8.x/user/features/New-Disable-2FA.png)\n- [static/images/en/8.x/user/features/QR-Code-Secret.png](static/images/en/8.x/user/features/QR-Code-Secret.png)\n- [static/images/en/8.x/user/features/Qr-2FA.png](static/images/en/8.x/user/features/Qr-2FA.png)\n- [static/images/en/8.x/user/features/Regenerate-Codes.gif](static/images/en/8.x/user/features/Regenerate-Codes.gif)\n\n\u003c/details\u003e\n\n\n\nThis document covers the development of frontend extensions for SuiteCRM 8.x using Angular and Module Federation. Frontend extensions allow developers to add custom user interface components, override existing functionality, and integrate new features into the SuiteCRM frontend application.\n\nFor backend extension development including Save Handlers and Record Mappers, see [Backend Development](#6.3). For theme customization, see [Theme Customization](#6.1).\n\n## Overview\n\nSuiteCRM 8.x uses a micro-frontend architecture built on Angular with Module Federation to enable dynamic loading of extensions at runtime. This allows developers to create isolated, independent frontend modules that integrate seamlessly with the core application.\n\n```mermaid\ngraph TB\n    subgraph \"SuiteCRM 8.x Frontend Architecture\"\n        Shell[\"Shell Application\u003cbr/\u003e(Main Container)\"]\n        Core[\"Core Module\u003cbr/\u003e(Base Components)\"]\n        \n        subgraph \"Extensions\"\n            DefaultExt[\"defaultExt\u003cbr/\u003e(Template Extension)\"]\n            CustomExt[\"Custom Extensions\u003cbr/\u003e(User-developed)\"]\n        end\n        \n        subgraph \"Module Federation\"\n            RemoteEntry[\"remoteEntry.js\u003cbr/\u003e(Extension Entry Point)\"]\n            ExtensionModule[\"ExtensionModule\u003cbr/\u003e(Angular Module)\"]\n        end\n        \n        subgraph \"Component Registries\"\n            SidebarRegistry[\"SidebarWidgetRegistry\"]\n            ChartRegistry[\"ChartRegistry\"] \n            FieldRegistry[\"FieldRegistry\"]\n        end\n    end\n    \n    Shell --\u003e Core\n    Shell --\u003e DefaultExt\n    Shell --\u003e CustomExt\n    \n    DefaultExt --\u003e RemoteEntry\n    CustomExt --\u003e RemoteEntry\n    RemoteEntry --\u003e ExtensionModule\n    \n    ExtensionModule --\u003e SidebarRegistry\n    ExtensionModule --\u003e ChartRegistry\n    ExtensionModule --\u003e FieldRegistry\n```\n\n**Extension Runtime Loading Process**\n\nSources: [content/8.x/developer/extensions/frontend/older/8x-fe-extensions-setup.adoc:531-533](), [content/8.x/developer/extensions/frontend/88x-fe-extensions-setup.adoc:136-137]()\n\n## Development Requirements\n\n### System Requirements by Version\n\nThe frontend development requirements vary by SuiteCRM version:\n\n| SuiteCRM Version | Angular CLI | Node.js | yarn | PHP |\n|------------------|-------------|---------|------|-----|\n| 8.8.x | ^18 | ^20.11.1 | ^4.5.0 | 8.1, 8.2, 8.3 |\n| 8.7.x | ^16 | ^18.10 | ^1.22.10 | 8.1, 8.2 |\n| 8.6.x | ^16 | ^18 | ^1.22.10 | 8.1, 8.2 |\n| 8.4.x - 8.5.x | ^12 | ^14.15.1 | ^1.22.10 | 8.1, 8.2 |\n\nSources: [content/8.x/admin/Compatibility Matrix.adoc:48-51](), [content/8.x/admin/Compatibility Matrix.adoc:94-97]()\n\n### Extension Structure\n\n```mermaid\ngraph TD\n    subgraph \"Extension Directory Structure\"\n        ExtRoot[\"extensions/myExt/\"]\n        \n        subgraph \"Configuration\"\n            ExtPhp[\"config/extension.php\u003cbr/\u003e(Extension Registration)\"]\n        end\n        \n        subgraph \"Angular Application\"\n            AppRoot[\"app/\"]\n            SrcDir[\"app/src/\"]\n            ExtModule[\"app/src/extension/extension.module.ts\"]\n            Components[\"app/src/containers/\u003cbr/\u003e(Custom Components)\"]\n            Services[\"app/src/services/\u003cbr/\u003e(Custom Services)\"]\n        end\n        \n        subgraph \"Build Configuration\"\n            WebpackConfig[\"app/webpack.config.js\"]\n            AngularJson[\"app/angular.json\"]\n            TsConfig[\"app/tsconfig.app.json\"]\n        end\n        \n        subgraph \"Output\"\n            PublicDir[\"public/extensions/myExt/\u003cbr/\u003e(Built Files)\"]\n            RemoteEntry[\"public/extensions/myExt/remoteEntry.js\"]\n        end\n    end\n    \n    ExtRoot --\u003e ExtPhp\n    ExtRoot --\u003e AppRoot\n    AppRoot --\u003e SrcDir\n    SrcDir --\u003e ExtModule\n    SrcDir --\u003e Components\n    SrcDir --\u003e Services\n    AppRoot --\u003e WebpackConfig\n    AppRoot --\u003e AngularJson\n    AppRoot --\u003e TsConfig\n    \n    WebpackConfig --\u003e PublicDir\n    PublicDir --\u003e RemoteEntry\n```\n\nSources: [content/8.x/developer/extensions/frontend/88x-fe-extensions-setup.adoc:17-61](), [content/8.x/developer/extensions/frontend/older/8x-fe-extensions-setup.adoc:406-417]()\n\n## Setting Up Frontend Extensions\n\n### For SuiteCRM 8.8+\n\nThe setup process for SuiteCRM 8.8+ includes significant changes to the build system:\n\n1. **Copy and Configure Extension Template**\n   ```bash\n   # Copy defaultExt as template\n   cp -r extensions/defaultExt extensions/myExt\n   ```\n\n2. **Update Configuration Files**\n   - [extensions/myExt/app/webpack.config.js]()\n   - [extensions/myExt/app/angular.json]()\n   - [extensions/myExt/config/extension.php]()\n\n3. **Build Process (8.8+)**\n   ```bash\n   # Generate angular.json from base and extensions\n   yarn merge-angular-json\n   \n   # Build extension\n   yarn build:extension myExt\n   \n   # Development build with watch\n   yarn build-dev:extension myExt\n   ```\n\nSources: [content/8.x/developer/extensions/frontend/88x-fe-extensions-setup.adoc:90-115](), [content/8.x/developer/extensions/frontend/migration/Migration-8.8.adoc:57-67]()\n\n### Migration from Pre-8.8 Versions\n\nSuiteCRM 8.8 introduced breaking changes requiring migration:\n\n```mermaid\ngraph LR\n    subgraph \"Pre-8.8 Structure\"\n        OldCommon[\"core/app/common\"]\n        OldAngularJson[\"angular.json\u003cbr/\u003e(Version Controlled)\"]\n        OldBuildCmd[\"yarn build:defaultExt\"]\n    end\n    \n    subgraph \"8.8+ Structure\"  \n        NewCommon[\"core/app/core/src/lib/common/\"]\n        NewAngularJson[\"angular.json\u003cbr/\u003e(Generated)\"]\n        NewBuildCmd[\"yarn build:extension defaultExt\"]\n    end\n    \n    OldCommon --\u003e NewCommon\n    OldAngularJson --\u003e NewAngularJson\n    OldBuildCmd --\u003e NewBuildCmd\n```\n\n**Key Migration Steps:**\n1. Update import statements from `'common'` to `'core'`\n2. Update `remoteEntry` path in `extension.php`\n3. Use new build commands\n4. Run `yarn merge-angular-json` before building\n\nSources: [content/8.x/developer/extensions/frontend/migration/Migration-8.8.adoc:23-67]()\n\n## Extension Components\n\n### Sidebar Widgets\n\nSidebar widgets are custom components that appear in the record view sidebar:\n\n```mermaid\ngraph TD\n    subgraph \"Sidebar Widget Implementation\"\n        BaseWidget[\"BaseWidgetComponent\u003cbr/\u003e(Base Class)\"]\n        CustomWidget[\"HelloWorldSidebarWidgetComponent\u003cbr/\u003e(Custom Implementation)\"]\n        WidgetModule[\"HelloWorldSidebarWidgetModule\u003cbr/\u003e(Angular Module)\"]\n        \n        subgraph \"Registration\"\n            Registry[\"SidebarWidgetRegistry\"]\n            ExtModule[\"ExtensionModule.constructor()\"]\n        end\n        \n        subgraph \"Configuration\"\n            DetailViewDefs[\"detailviewdefs.php\u003cbr/\u003esidebarWidgets config\"]\n        end\n    end\n    \n    BaseWidget --\u003e CustomWidget\n    CustomWidget --\u003e WidgetModule\n    WidgetModule --\u003e ExtModule\n    ExtModule --\u003e Registry\n    Registry --\u003e DetailViewDefs\n```\n\n**Basic Sidebar Widget Example:**\n\n```typescript\n// HelloWorldSidebarWidgetComponent\n@Component({\n    selector: 'scrm-hello-world-sidebar-widget',\n    templateUrl: './hello-world-sidebar-widget.component.html'\n})\nexport class HelloWorldSidebarWidgetComponent extends BaseWidgetComponent {\n    constructor() {\n        super();\n    }\n}\n```\n\n**Registration in ExtensionModule:**\n```typescript\nconstructor(protected sidebarWidgetRegistry: SidebarWidgetRegistry) {\n    sidebarWidgetRegistry.register('default', 'hello-world', HelloWorldSidebarWidgetComponent);\n}\n```\n\nSources: [content/8.x/developer/extensions/frontend/examples/add-sidebar-widget.adoc:120-152](), [content/8.x/developer/extensions/frontend/examples/add-sidebar-widget.adoc:74-91]()\n\n### Charts\n\nCustom chart components extend the charting capabilities:\n\n```mermaid\ngraph TD\n    subgraph \"Chart Extension Architecture\"\n        BaseChart[\"BaseChartComponent\u003cbr/\u003e(Base Class)\"]\n        CustomChart[\"HorizontalBarChartComponent\u003cbr/\u003e(Custom Chart)\"]\n        ChartModule[\"HorizontalBarChartModule\"]\n        \n        subgraph \"Chart Libraries\"\n            NgxCharts[\"@swimlane/ngx-charts\"]\n            ChartTypes[\"horizontal-bar, pie-grid, vertical-bar\"]\n        end\n        \n        subgraph \"Registration\"\n            ChartRegistry[\"ChartRegistry\"]\n            ExtModule[\"ExtensionModule\"]\n        end\n        \n        subgraph \"Configuration\"\n            ViewDefs[\"listviewdefs.php/detailviewdefs.php\u003cbr/\u003esidebarWidgets.charts config\"]\n            StatisticsAPI[\"Statistics API\u003cbr/\u003e(Data Source)\"]\n        end\n    end\n    \n    BaseChart --\u003e CustomChart\n    NgxCharts --\u003e CustomChart\n    CustomChart --\u003e ChartModule\n    ChartModule --\u003e ExtModule\n    ExtModule --\u003e ChartRegistry\n    ChartRegistry --\u003e ViewDefs\n    ViewDefs --\u003e StatisticsAPI\n```\n\n**Chart Registration:**\n```typescript\nconstructor(protected chartRegistry: ChartRegistry) {\n    chartRegistry.register('default', 'horizontal-bar', HorizontalBarChartComponent);\n}\n```\n\nSources: [content/8.x/developer/extensions/frontend/examples/add-charts-extension.adoc:288-317](), [content/8.x/developer/extensions/frontend/examples/add-charts-extension.adoc:169-176]()\n\n## Build and Deployment Process\n\n### Build Commands Evolution\n\n```mermaid\ngraph TD\n    subgraph \"SuiteCRM 8.8+ Build Process\"\n        MergeCmd[\"yarn merge-angular-json\u003cbr/\u003e(Generate angular.json)\"]\n        CoreBuild[\"yarn build\u003cbr/\u003e(Core + Shell)\"]\n        ExtBuild[\"yarn build:extension myExt\u003cbr/\u003e(Extension Build)\"]\n        \n        subgraph \"Development\"\n            DevBuild[\"yarn build-dev:extension myExt\"]\n            WatchMode[\"yarn build-dev:extension myExt --watch\"]\n        end\n    end\n    \n    subgraph \"Pre-8.8 Build Process\"\n        OldCommonBuild[\"yarn build:common\"]\n        OldCoreBuild[\"yarn build:core\"] \n        OldShellBuild[\"yarn build:shell\"]\n        OldExtBuild[\"yarn build:myExt\"]\n    end\n    \n    MergeCmd --\u003e CoreBuild\n    CoreBuild --\u003e ExtBuild\n    ExtBuild --\u003e DevBuild\n    DevBuild --\u003e WatchMode\n```\n\n### Extension Configuration\n\n**extension.php Structure:**\n```php\n$extensions['myExt'] = [\n    'remoteEntry' =\u003e '../extensions/myExt/remoteEntry.js',\n    'remoteName' =\u003e 'myExt',\n    'enabled' =\u003e true,\n    'extension_name' =\u003e 'My Extension',\n    'description' =\u003e 'Custom extension description',\n    'version' =\u003e '1.0.0'\n];\n```\n\nSources: [content/8.x/developer/extensions/frontend/migration/Migration-8.8.adoc:97-101](), [content/8.x/developer/extensions/frontend/older/8x-fe-extensions-setup.adoc:559-567]()\n\n## Component Registry System\n\nThe registry system enables dynamic component registration and loading:\n\n```mermaid\ngraph TB\n    subgraph \"Registry Architecture\"\n        subgraph \"Core Registries\"\n            SidebarRegistry[\"SidebarWidgetRegistry\u003cbr/\u003eregister(theme, key, component)\"]\n            ChartRegistry[\"ChartRegistry\u003cbr/\u003eregister(theme, key, component)\"] \n            FieldRegistry[\"FieldRegistry\u003cbr/\u003eregister(theme, key, component)\"]\n        end\n        \n        subgraph \"Extension Registration\"\n            ExtConstructor[\"ExtensionModule.constructor()\"]\n            RegisterCalls[\"registry.register() calls\"]\n        end\n        \n        subgraph \"Runtime Resolution\"\n            ComponentFactory[\"Dynamic Component Loading\"]\n            ViewRenderer[\"View Rendering Engine\"]\n        end\n    end\n    \n    ExtConstructor --\u003e RegisterCalls\n    RegisterCalls --\u003e SidebarRegistry\n    RegisterCalls --\u003e ChartRegistry\n    RegisterCalls --\u003e FieldRegistry\n    \n    SidebarRegistry --\u003e ComponentFactory\n    ChartRegistry --\u003e ComponentFactory\n    FieldRegistry --\u003e ComponentFactory\n    ComponentFactory --\u003e ViewRenderer\n```\n\n**Registration Pattern:**\n```typescript\nexport class ExtensionModule {\n    constructor(\n        protected sidebarWidgetRegistry: SidebarWidgetRegistry,\n        protected chartRegistry: ChartRegistry\n    ) {\n        // Register components with theme, key, and component class\n        sidebarWidgetRegistry.register('default', 'custom-widget', CustomWidgetComponent);\n        chartRegistry.register('default', 'custom-chart', CustomChartComponent);\n    }\n}\n```\n\nSources: [content/8.x/developer/extensions/frontend/examples/add-sidebar-widget.adoc:143-149](), [content/8.x/developer/extensions/frontend/examples/add-charts-extension.adoc:311-317]()\n\n## Integration with Backend\n\nFrontend extensions integrate with SuiteCRM's backend through several mechanisms:\n\n```mermaid\ngraph TD\n    subgraph \"Frontend-Backend Integration\"\n        subgraph \"Frontend Extension\"\n            Component[\"Custom Component\"]\n            Service[\"Angular Service\"]\n        end\n        \n        subgraph \"API Layer\"\n            GraphQL[\"GraphQL API\"]\n            RecordAPI[\"Record API\"]\n            MetadataAPI[\"Metadata API\"]\n        end\n        \n        subgraph \"Backend Extension Points\"\n            RecordMappers[\"Record Mappers\u003cbr/\u003e(Data Transformation)\"]\n            SaveHandlers[\"Save Handlers\u003cbr/\u003e(Before/After Save)\"]\n            Statistics[\"Statistics API\u003cbr/\u003e(Chart Data)\"]\n        end\n        \n        subgraph \"Configuration\"\n            ViewDefs[\"PHP View Definitions\u003cbr/\u003e(detailviewdefs.php)\"]\n            ExtensionPhp[\"extension.php\u003cbr/\u003e(Registration)\"]\n        end\n    end\n    \n    Component --\u003e Service\n    Service --\u003e GraphQL\n    Service --\u003e RecordAPI\n    Service --\u003e MetadataAPI\n    \n    GraphQL --\u003e RecordMappers\n    RecordAPI --\u003e SaveHandlers\n    MetadataAPI --\u003e Statistics\n    \n    ViewDefs --\u003e Component\n    ExtensionPhp --\u003e Component\n```\n\nFrontend extensions can:\n- Fetch and display data through the GraphQL API\n- Trigger backend save operations with custom Save Handlers\n- Transform data presentation using Record Mappers\n- Display statistical data through the Statistics API\n\nSources: [content/8.x/developer/extensions/backend/record-mappers/_index.en.adoc:7-15](), [content/8.x/developer/extensions/backend/save-handlers/_index.en.adoc:7-12](), [content/8.x/developer/extensions/frontend/examples/add-charts-extension.adoc:99-102]()"])</script><script>self.__next_f.push([1,"28:T3c6d,"])</script><script>self.__next_f.push([1,"# Backend Development\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [content/admin/Troubleshooting and Support.adoc](content/admin/Troubleshooting and Support.adoc)\n- [content/admin/Troubleshooting and Support.ru.adoc](content/admin/Troubleshooting and Support.ru.adoc)\n- [content/admin/releases/7.9.x/_index.en.adoc](content/admin/releases/7.9.x/_index.en.adoc)\n- [content/admin/releases/_index.ru.adoc](content/admin/releases/_index.ru.adoc)\n- [content/blog/ListView-conditional-formatting.adoc](content/blog/ListView-conditional-formatting.adoc)\n- [content/blog/larger-upgrades.ru.adoc](content/blog/larger-upgrades.ru.adoc)\n- [content/community/contributing-to-docs/guidelines.adoc](content/community/contributing-to-docs/guidelines.adoc)\n- [content/community/contributing-to-docs/simple-issue.es.adoc](content/community/contributing-to-docs/simple-issue.es.adoc)\n- [content/community/contributing-to-docs/translate.adoc](content/community/contributing-to-docs/translate.adoc)\n- [content/developer/Best Practices.adoc](content/developer/Best Practices.adoc)\n- [content/developer/Config.adoc](content/developer/Config.adoc)\n- [content/developer/Controllers.adoc](content/developer/Controllers.adoc)\n- [content/developer/Entry Points.adoc](content/developer/Entry Points.adoc)\n- [content/developer/Extension Framework.adoc](content/developer/Extension Framework.adoc)\n- [content/developer/Further Resources.adoc](content/developer/Further Resources.adoc)\n- [content/developer/Language Strings.adoc](content/developer/Language Strings.adoc)\n- [content/developer/Logging.adoc](content/developer/Logging.adoc)\n- [content/developer/Logic Hooks.adoc](content/developer/Logic Hooks.adoc)\n- [content/developer/Metadata.adoc](content/developer/Metadata.adoc)\n- [content/developer/Module Installer.adoc](content/developer/Module Installer.adoc)\n- [content/developer/Scheduled Tasks.adoc](content/developer/Scheduled Tasks.adoc)\n- [content/developer/Translate strings.adoc](content/developer/Translate strings.adoc)\n- [content/developer/Vardefs.adoc](content/developer/Vardefs.adoc)\n- [content/developer/_index.es.adoc](content/developer/_index.es.adoc)\n- [content/developer/scripts/codecept.bat](content/developer/scripts/codecept.bat)\n- [content/developer/scripts/codecept.sh](content/developer/scripts/codecept.sh)\n- [static/images/en/developer/developerData.png](static/images/en/developer/developerData.png)\n- [static/images/en/developer/vardefs.png](static/images/en/developer/vardefs.png)\n- [static/images/ru/blog/upgrading-strategies.png](static/images/ru/blog/upgrading-strategies.png)\n\n\u003c/details\u003e\n\n\n\nThis page covers the core backend development concepts and systems in SuiteCRM, including data definition, custom business logic, background processing, and extensibility frameworks. This documentation focuses on server-side PHP development and database customization.\n\nFor frontend customization using Angular, see [Frontend Extensions](#6.2). For visual theme modifications, see [Theme Customization](#6.1).\n\n## Backend Architecture Overview\n\nSuiteCRM's backend architecture provides several key systems for customization and extension:\n\n```mermaid\ngraph TB\n    subgraph \"Data Layer\"\n        Vardefs[\"Vardefs\u003cbr/\u003eField \u0026 Relationship\u003cbr/\u003eDefinitions\"]\n        DB[\"Database\u003cbr/\u003eTables \u0026 Schema\"]\n        Beans[\"SugarBean\u003cbr/\u003eORM Layer\"]\n    end\n    \n    subgraph \"Business Logic Layer\"\n        LogicHooks[\"Logic Hooks\u003cbr/\u003eEvent-Driven Code\"]\n        Schedulers[\"Scheduled Tasks\u003cbr/\u003eBackground Jobs\"]\n        Controllers[\"Controllers\u003cbr/\u003eRequest Handling\"]\n    end\n    \n    subgraph \"Extension Framework\"\n        ExtFramework[\"Extension Framework\u003cbr/\u003eModular Customization\"]\n        ModuleInstaller[\"Module Installer\u003cbr/\u003ePackage Management\"]\n        CustomDir[\"custom/ Directory\u003cbr/\u003eUpgrade-Safe Storage\"]\n    end\n    \n    subgraph \"Supporting Systems\"\n        Logging[\"Logging System\u003cbr/\u003eLoggerManager\"]\n        Config[\"Configuration\u003cbr/\u003econfig.php\"]\n        Language[\"Language Strings\u003cbr/\u003eInternationalization\"]\n    end\n    \n    Vardefs --\u003e DB\n    DB --\u003e Beans\n    Beans --\u003e LogicHooks\n    LogicHooks --\u003e Schedulers\n    Controllers --\u003e Beans\n    \n    ExtFramework --\u003e Vardefs\n    ExtFramework --\u003e LogicHooks\n    ExtFramework --\u003e Language\n    ModuleInstaller --\u003e ExtFramework\n    \n    CustomDir --\u003e ExtFramework\n    Config --\u003e Beans\n    Logging --\u003e LogicHooks\n    Logging --\u003e Schedulers\n```\n\nSources: [content/developer/Vardefs.adoc:1-404](), [content/developer/Logic Hooks.adoc:1-356](), [content/developer/Extension Framework.adoc:1-163]()\n\n## Vardefs System\n\nVardefs (Variable Definitions) are the foundation of SuiteCRM's data layer, defining fields, relationships, and database structure for modules.\n\n### Core Vardefs Structure\n\nVardefs are defined in `$dictionary` arrays and specify module metadata:\n\n| Component | Purpose | Location |\n|-----------|---------|----------|\n| **Fields** | Define field properties and types | `modules/\u003cModule\u003e/vardefs.php` |\n| **Relationships** | Define inter-module connections | `$dictionary['Module']['relationships']` |\n| **Indices** | Define database indexes | `$dictionary['Module']['indices']` |\n| **Templates** | Apply common field sets | `VardefManager::createVardef()` |\n\n### Field Types and Properties\n\n```mermaid\ngraph LR\n    subgraph \"Field Types\"\n        BasicTypes[\"Basic Types\u003cbr/\u003evarchar, text, int\u003cbr/\u003edate, datetime, bool\"]\n        RelationTypes[\"Relation Types\u003cbr/\u003erelate, link\u003cbr/\u003eid_name, rname\"]\n        SpecialTypes[\"Special Types\u003cbr/\u003eenum, multienum\u003cbr/\u003ephone, currency\"]\n    end\n    \n    subgraph \"Field Properties\"\n        CoreProps[\"Core Properties\u003cbr/\u003ename, type, len\u003cbr/\u003erequired, audited\"]\n        DisplayProps[\"Display Properties\u003cbr/\u003evname, studio\u003cbr/\u003emassupdate, unified_search\"]\n        DBProps[\"Database Properties\u003cbr/\u003edbtype, source\u003cbr/\u003edefault, isnull\"]\n    end\n    \n    BasicTypes --\u003e CoreProps\n    RelationTypes --\u003e CoreProps\n    SpecialTypes --\u003e CoreProps\n    \n    CoreProps --\u003e DisplayProps\n    CoreProps --\u003e DBProps\n```\n\n### Customizing Vardefs\n\nCustom vardefs are placed in the Extension Framework:\n\n```\ncustom/Extension/modules/\u003cTheModule\u003e/Ext/Vardefs/\n```\n\nSources: [content/developer/Vardefs.adoc:10-404](), [content/developer/Extension Framework.adoc:94-96]()\n\n## Logic Hooks System\n\nLogic Hooks provide event-driven customization points throughout SuiteCRM's execution flow.\n\n### Hook Types and Execution Points\n\n```mermaid\ngraph TD\n    subgraph \"Application Hooks\"\n        AppHooks[\"after_user_load\u003cbr/\u003eafter_entry_point\u003cbr/\u003eafter_ui_footer\u003cbr/\u003eserver_round_trip\"]\n    end\n    \n    subgraph \"User Hooks\"\n        UserHooks[\"after_login\u003cbr/\u003eafter_logout\u003cbr/\u003ebefore_logout\u003cbr/\u003elogin_failed\"]\n    end\n    \n    subgraph \"Module Hooks\"\n        ModuleHooks[\"before_save\u003cbr/\u003eafter_save\u003cbr/\u003ebefore_delete\u003cbr/\u003eafter_delete\u003cbr/\u003eafter_retrieve\u003cbr/\u003eprocess_record\"]\n    end\n    \n    subgraph \"Job Queue Hooks\"\n        JobHooks[\"job_failure\u003cbr/\u003ejob_failure_retry\"]\n    end\n    \n    AppHooks --\u003e LogicHookRegistry[\"Logic Hook Registry\u003cbr/\u003e$hook_array\"]\n    UserHooks --\u003e LogicHookRegistry\n    ModuleHooks --\u003e LogicHookRegistry\n    JobHooks --\u003e LogicHookRegistry\n    \n    LogicHookRegistry --\u003e HookExecution[\"Hook Execution\u003cbr/\u003eSort Order Priority\"]\n```\n\n### Hook Definition Structure\n\nLogic hooks are defined in `$hook_array` with five components:\n\n1. **Sort Order** - Execution priority (lower numbers execute first)\n2. **Hook Label** - Descriptive name for the hook\n3. **File Path** - Location of the hook class\n4. **Class Name** - PHP class containing the hook method\n5. **Method Name** - Function to execute\n\n### Implementation Locations\n\n| Hook Type | Definition Location |\n|-----------|-------------------|\n| **Application** | `custom/Extension/application/Ext/LogicHooks/` |\n| **Module** | `custom/Extension/modules/\u003cModule\u003e/Ext/LogicHooks/` |\n| **User** | `custom/Extension/application/Ext/LogicHooks/` |\n\nSources: [content/developer/Logic Hooks.adoc:9-356](), [content/developer/Extension Framework.adoc:75-78]()\n\n## Extension Framework\n\nThe Extension Framework provides a modular system for customizations that consolidates files during Quick Repair and Rebuild.\n\n### Standard Extensions\n\n```mermaid\ngraph TB\n    subgraph \"Core Extensions\"\n        Vardefs[\"Vardefs\u003cbr/\u003evardefs.ext.php\"]\n        LogicHooks[\"LogicHooks\u003cbr/\u003elogichooks.ext.php\"]\n        Language[\"Language\u003cbr/\u003e*.lang.php\"]\n        Layoutdefs[\"Layoutdefs\u003cbr/\u003elayoutdefs.ext.php\"]\n    end\n    \n    subgraph \"Administrative Extensions\"\n        Admin[\"Administration\u003cbr/\u003eadministration.ext.php\"]\n        ScheduledTasks[\"ScheduledTasks\u003cbr/\u003escheduledtasks.ext.php\"]\n        EntryPoints[\"EntryPointRegistry\u003cbr/\u003eentry_point_registry.ext.php\"]\n        Menus[\"Menus\u003cbr/\u003emenu.ext.php\"]\n    end\n    \n    subgraph \"Advanced Extensions\"\n        ActionMaps[\"Action Maps\u003cbr/\u003eaction_view_map.ext.php\"]\n        Utils[\"Utils\u003cbr/\u003ecustom_utils.ext.php\"]\n        JSGroupings[\"JSGroupings\u003cbr/\u003ejsgroups.ext.php\"]\n        Include[\"Include\u003cbr/\u003emodules.ext.php\"]\n    end\n    \n    QuickRepair[\"Quick Repair\u003cbr/\u003e\u0026 Rebuild\"] --\u003e Vardefs\n    QuickRepair --\u003e LogicHooks\n    QuickRepair --\u003e Admin\n    QuickRepair --\u003e ScheduledTasks\n```\n\n### Extension Framework Workflow\n\nThe Extension Framework follows this process:\n\n1. **File Placement** - Custom files placed in `custom/Extension/` structure\n2. **Consolidation** - Quick Repair scans extension directories\n3. **Compilation** - Files merged into single `.ext.php` files\n4. **Loading** - Compiled extensions loaded by SuiteCRM\n\n### Override Mechanism\n\nFiles prefixed with `_override` are processed after standard extensions, ensuring precedence:\n\n```\ncustom/Extension/modules/Accounts/Ext/Vardefs/_override_my_field_change.php\n```\n\nSources: [content/developer/Extension Framework.adoc:8-163]()\n\n## Scheduled Tasks System\n\nSuiteCRM's scheduler handles both recurring tasks and one-time job queue processing.\n\n### Scheduler Architecture\n\n```mermaid\ngraph TB\n    subgraph \"Scheduler Definition\"\n        SchedulerExt[\"ScheduledTasks Extension\u003cbr/\u003ecustom/Extension/modules/Schedulers/Ext/ScheduledTasks/\"]\n        JobStrings[\"$job_strings[]\u003cbr/\u003eMethod Registration\"]\n        LanguageFile[\"Language File\u003cbr/\u003eLBL_METHODNAME\"]\n    end\n    \n    subgraph \"Job Queue System\"\n        JobCreation[\"Job Creation\u003cbr/\u003eSchedulersJob\"]\n        JobQueue[\"SugarJobQueue\u003cbr/\u003esubmitJob()\"]\n        JobExecution[\"Job Execution\u003cbr/\u003eRunnableSchedulerJob\"]\n    end\n    \n    subgraph \"Execution Flow\"\n        CronJob[\"Cron/Scheduled Task\u003cbr/\u003ephp -f cron.php\"]\n        Scheduler[\"Scheduler Process\"]\n        JobRunner[\"Job Runner\"]\n    end\n    \n    SchedulerExt --\u003e JobStrings\n    JobStrings --\u003e LanguageFile\n    \n    JobCreation --\u003e JobQueue\n    JobQueue --\u003e CronJob\n    CronJob --\u003e Scheduler\n    Scheduler --\u003e JobRunner\n    JobRunner --\u003e JobExecution\n```\n\n### Scheduled Task Implementation\n\nScheduled tasks require three components:\n\n1. **Method Definition** - Function added to `$job_strings` array\n2. **Function Implementation** - Actual task logic\n3. **Language Label** - User-friendly name with key `LBL_UPPERMETHODNAME`\n\n### Job Queue for Asynchronous Processing\n\nThe job queue allows deferring long-running tasks:\n\n```php\n// Job creation pattern\n$scheduledJob = new SchedulersJob();\n$scheduledJob-\u003ename = \"Background Task\";\n$scheduledJob-\u003eassigned_user_id = '1';\n$scheduledJob-\u003edata = json_encode($taskData);\n$scheduledJob-\u003etarget = \"class::TaskClass\";\n$queue = new SugarJobQueue();\n$queue-\u003esubmitJob($scheduledJob);\n```\n\nSources: [content/developer/Scheduled Tasks.adoc:10-376]()\n\n## Module Installer\n\nThe Module Installer packages customizations for distribution and installation across SuiteCRM instances.\n\n### Package Structure\n\n```mermaid\ngraph LR\n    subgraph \"Package Components\"\n        ManifestFile[\"manifest.php\u003cbr/\u003ePackage Definition\"]\n        InstallDefs[\"$installdefs\u003cbr/\u003eInstallation Instructions\"]\n        UpgradeDefs[\"$upgrade_manifest\u003cbr/\u003eUpgrade Handling\"]\n    end\n    \n    subgraph \"Package Contents\"\n        CustomFiles[\"Custom Files\u003cbr/\u003ePHP, Templates, Images\"]\n        LanguageFiles[\"Language Files\u003cbr/\u003eTranslations\"]\n        Vardefs[\"Vardefs\u003cbr/\u003eField Definitions\"]\n        LogicHookFiles[\"Logic Hooks\u003cbr/\u003eCustom Business Logic\"]\n    end\n    \n    subgraph \"Installation Types\"\n        ModuleType[\"module\u003cbr/\u003eNew Modules\"]\n        PatchType[\"patch\u003cbr/\u003eSystem Updates\"]\n        ThemeType[\"theme\u003cbr/\u003eVisual Themes\"]\n        LangType[\"langpack\u003cbr/\u003eTranslations\"]\n    end\n    \n    ManifestFile --\u003e CustomFiles\n    InstallDefs --\u003e CustomFiles\n    ManifestFile --\u003e ModuleType\n```\n\n### Key Manifest Components\n\n| Component | Purpose | Key Properties |\n|-----------|---------|----------------|\n| **$manifest** | Package metadata | `name`, `version`, `type`, `dependencies` |\n| **$installdefs** | Installation rules | `copy`, `vardefs`, `logic_hooks`, `custom_fields` |\n| **$upgrade_manifest** | Upgrade handling | Version-specific `installdefs` |\n\n### Installation Definition Types\n\nThe `$installdefs` array supports various installation components:\n\n- **copy** - File and directory copying\n- **vardefs** - Field and relationship definitions  \n- **logic_hooks** - Event-driven custom code\n- **custom_fields** - New field creation\n- **language** - Translation files\n- **administration** - Admin panel additions\n\nSources: [content/developer/Module Installer.adoc:9-524]()\n\n## Configuration and Logging\n\n### Configuration System\n\nSuiteCRM uses two main configuration files:\n\n| File | Purpose | Modification |\n|------|---------|--------------|\n| **config.php** | Core settings, database config, site URL | Manual editing for migrations |\n| **config_override.php** | Admin-configurable overrides | Modified through Admin interface |\n\n### Logging System\n\n```mermaid\ngraph LR\n    subgraph \"Logging Components\"\n        LoggerManager[\"LoggerManager::getLogger()\"]\n        LogLevels[\"Log Levels\u003cbr/\u003edebug, info, warn\u003cbr/\u003eerror, fatal, security\"]\n        LogFile[\"suitecrm.log\u003cbr/\u003eRoot Directory\"]\n    end\n    \n    subgraph \"Log Output Format\"\n        LogFormat[\"Date ProcessId UserId LogLevel Message\u003cbr/\u003eTue Apr 28 16:52:21 2015 [15006][1][DEBUG]\"]\n    end\n    \n    LoggerManager --\u003e LogLevels\n    LogLevels --\u003e LogFile\n    LogFile --\u003e LogFormat\n```\n\nThe logging system provides debug capabilities with configurable verbosity levels. Production instances typically use `error` or `fatal` levels, while development uses `debug`.\n\nSources: [content/developer/Config.adoc:9-123](), [content/developer/Logging.adoc:9-91]()\n\n## Best Practices\n\n### Development Environment\n\n- **Use development instances** - Never develop directly on production\n- **Version control** - Track customizations with Git or similar systems\n- **Regular backups** - Maintain file and database backups before changes\n\n### Customization Guidelines\n\n- **Extension Framework** - Use extension directories for upgrade-safe customizations\n- **Custom directory** - Place customizations in `custom/` structure\n- **Logic hooks over core modifications** - Prefer event-driven customization\n- **Proper testing** - Test in development before deploying to production\n\n### Performance Considerations\n\n- **Job queue for heavy tasks** - Use scheduled jobs for long-running operations\n- **Efficient database queries** - Optimize custom database operations\n- **Appropriate log levels** - Use less verbose logging in production\n\nSources: [content/developer/Best Practices.adoc:7-76]()"])</script><script>self.__next_f.push([1,"29:T4750,"])</script><script>self.__next_f.push([1,"# Administration\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [content/8.x/admin/administration-panel/Administration-Panel.ru.adoc](content/8.x/admin/administration-panel/Administration-Panel.ru.adoc)\n- [content/admin/Advanced Configuration Options.ru.adoc](content/admin/Advanced Configuration Options.ru.adoc)\n- [content/admin/administration-panel/Advanced OpenAdmin.ru.adoc](content/admin/administration-panel/Advanced OpenAdmin.ru.adoc)\n- [content/admin/administration-panel/Developer Tools.ru.adoc](content/admin/administration-panel/Developer Tools.ru.adoc)\n- [content/admin/administration-panel/Google Sync.ru.adoc](content/admin/administration-panel/Google Sync.ru.adoc)\n- [content/admin/administration-panel/System.ru.adoc](content/admin/administration-panel/System.ru.adoc)\n- [content/admin/administration-panel/Users.ru.adoc](content/admin/administration-panel/Users.ru.adoc)\n- [content/admin/installation-guide/Downloading \u0026 Installing.ru.adoc](content/admin/installation-guide/Downloading \u0026 Installing.ru.adoc)\n- [content/admin/installation-guide/Upgrading.ru.adoc](content/admin/installation-guide/Upgrading.ru.adoc)\n- [content/admin/installation-guide/Using the Upgrade Wizard.ru.adoc](content/admin/installation-guide/Using the Upgrade Wizard.ru.adoc)\n- [content/user/advanced-modules/Cases with Portal.ru.adoc](content/user/advanced-modules/Cases with Portal.ru.adoc)\n- [content/user/advanced-modules/Reschedule.ru.adoc](content/user/advanced-modules/Reschedule.ru.adoc)\n- [content/user/advanced-modules/Workflow.ru.adoc](content/user/advanced-modules/Workflow.ru.adoc)\n- [content/user/core-modules/Campaigns.ru.adoc](content/user/core-modules/Campaigns.ru.adoc)\n- [content/user/core-modules/Cases.ru.adoc](content/user/core-modules/Cases.ru.adoc)\n- [content/user/core-modules/Emails.ru.adoc](content/user/core-modules/Emails.ru.adoc)\n- [content/user/core-modules/Opportunities.ru.adoc](content/user/core-modules/Opportunities.ru.adoc)\n- [content/user/introduction/User Interface/Record Management.ru.adoc](content/user/introduction/User Interface/Record Management.ru.adoc)\n- [content/user/introduction/User Interface/Views.ru.adoc](content/user/introduction/User Interface/Views.ru.adoc)\n- [content/user/modules/Confirmed-Opt-In-Settings.ru.adoc](content/user/modules/Confirmed-Opt-In-Settings.ru.adoc)\n- [content/user/modules/LawfulBasis.ru.adoc](content/user/modules/LawfulBasis.ru.adoc)\n- [content/user/suitecrm-analytics/1.1/SCRM-Analytics-Getting-Started.ru.adoc](content/user/suitecrm-analytics/1.1/SCRM-Analytics-Getting-Started.ru.adoc)\n- [static/images/en/admin/AdminAODSettings.png](static/images/en/admin/AdminAODSettings.png)\n- [static/images/en/admin/AdminAOPSettings.png](static/images/en/admin/AdminAOPSettings.png)\n- [static/images/en/admin/AdminAOSSettings.png](static/images/en/admin/AdminAOSSettings.png)\n- [static/images/en/admin/AdminBusinessHours.png](static/images/en/admin/AdminBusinessHours.png)\n- [static/images/en/admin/StudioExportCustomisations.png](static/images/en/admin/StudioExportCustomisations.png)\n- [static/images/en/user/RolesCreateRole.png](static/images/en/user/RolesCreateRole.png)\n- [static/images/en/user/RolesListByUser.png](static/images/en/user/RolesListByUser.png)\n- [static/images/en/user/RolesListRoles.png](static/images/en/user/RolesListRoles.png)\n- [static/images/ru/8.x/admin/administration-panel/image1.png](static/images/ru/8.x/admin/administration-panel/image1.png)\n- [static/images/ru/8.x/admin/administration-panel/image2.png](static/images/ru/8.x/admin/administration-panel/image2.png)\n- [static/images/ru/admin/AdvancedOpenAdmin/image3.png](static/images/ru/admin/AdvancedOpenAdmin/image3.png)\n- [static/images/ru/user/UserInterface/image34.png](static/images/ru/user/UserInterface/image34.png)\n- [static/images/ru/user/advanced-modules/Workflow/image2.png](static/images/ru/user/advanced-modules/Workflow/image2.png)\n- [static/images/ru/user/core-modules/E-mail/image1.png](static/images/ru/user/core-modules/E-mail/image1.png)\n- [static/images/ru/user/core-modules/E-mail/image2.png](static/images/ru/user/core-modules/E-mail/image2.png)\n\n\u003c/details\u003e\n\n\n\nThis document provides an overview of SuiteCRM administration functionality, including system configuration, user management, and administrative tools. Administration in SuiteCRM encompasses the core system settings, user access control, email configuration, and various maintenance utilities required to manage a SuiteCRM installation.\n\nFor detailed system configuration options, see [System Configuration](#7.1). For user and role management, see [User Management](#7.2). For email setup and OAuth configuration, see [Email Configuration](#7.3).\n\n## Administration Panel Architecture\n\nThe SuiteCRM administration system is organized around a central administration panel that provides access to various configuration subsystems. The panel is accessible to users with administrator privileges and serves as the primary interface for system management.\n\n```mermaid\ngraph TB\n    subgraph \"Administration Panel Access\"\n        AdminUser[\"Administrator User\"]\n        AdminPanel[\"Administration Panel\"]\n        AdminMenu[\"Admin Menu\"]\n    end\n    \n    subgraph \"Core Administration Areas\"\n        SystemConfig[\"System Configuration\"]\n        UserMgmt[\"User Management\"] \n        EmailConfig[\"Email Configuration\"]\n        DevTools[\"Developer Tools\"]\n        AdminTools[\"Administrative Tools\"]\n    end\n    \n    subgraph \"System Configuration Components\"\n        UISettings[\"UI Settings\"]\n        ProxyConfig[\"Proxy Configuration\"]\n        LogSettings[\"Logging Configuration\"]\n        Scheduler[\"Scheduler/Cron Jobs\"]\n        CurrencyLocale[\"Currency \u0026 Locale\"]\n    end\n    \n    subgraph \"User Management Components\"\n        Users[\"User Accounts\"]\n        Roles[\"Security Roles\"]\n        Groups[\"Security Groups\"]\n        PasswordMgmt[\"Password Management\"]\n        OAuth[\"OAuth Keys\"]\n    end\n    \n    subgraph \"Email Configuration Components\"\n        InboundEmail[\"Inbound Email Accounts\"]\n        OutboundEmail[\"Outbound Email Settings\"]\n        EmailOAuth[\"Email OAuth Integration\"]\n        EmailQueue[\"Email Queue Management\"]\n    end\n    \n    AdminUser --\u003e AdminPanel\n    AdminPanel --\u003e AdminMenu\n    AdminMenu --\u003e SystemConfig\n    AdminMenu --\u003e UserMgmt\n    AdminMenu --\u003e EmailConfig\n    AdminMenu --\u003e DevTools\n    AdminMenu --\u003e AdminTools\n    \n    SystemConfig --\u003e UISettings\n    SystemConfig --\u003e ProxyConfig\n    SystemConfig --\u003e LogSettings\n    SystemConfig --\u003e Scheduler\n    SystemConfig --\u003e CurrencyLocale\n    \n    UserMgmt --\u003e Users\n    UserMgmt --\u003e Roles\n    UserMgmt --\u003e Groups\n    UserMgmt --\u003e PasswordMgmt\n    UserMgmt --\u003e OAuth\n    \n    EmailConfig --\u003e InboundEmail\n    EmailConfig --\u003e OutboundEmail\n    EmailConfig --\u003e EmailOAuth\n    EmailConfig --\u003e EmailQueue\n```\n\nSources: `content/admin/administration-panel/System.ru.adoc:24
