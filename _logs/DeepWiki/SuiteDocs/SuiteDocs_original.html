e scope and version compatibility requirements.\n\n```mermaid\ngantt\n    title SuiteCRM Version Support Timeline\n    dateFormat YYYY-MM-DD\n    axisFormat %Y-%m\n    \n    section 7.x Series\n    7.12 ESR Support    :done, v712, 2021-10-01, 2023-08-01\n    7.12 Security Only  :done, v712sec, 2023-08-01, 2023-11-01\n    7.13 Support        :done, v713, 2022-12-01, 2023-08-01\n    7.14 ESR Support    :active, v714, 2023-08-01, 2025-06-01\n    7.14 Security Only  :v714sec, 2025-06-01, 2025-12-01\n    \n    section 8.x Series\n    8.2 Support         :done, v82, 2022-10-01, 2023-03-01\n    8.3 Support         :done, v83, 2023-05-01, 2023-08-01\n    8.4 Support         :done, v84, 2023-08-01, 2023-12-01\n    8.5 Support         :done, v85, 2023-12-01, 2024-04-01\n    8.6 Support         :active, v86, 2024-04-01, 2024-07-01\n```\n\n**SuiteCRM Version Support Timeline and Contribution Targets**\n\n### Branch Targeting Guidelines\n\n- **Bug fixes affecting all versions**: Target `hotfix` branch\n- **Version-specific issues**: Target appropriate version branch (e.g., `7.14.x`)\n- **New features**: Target `develop` branch for inclusion in next major release\n- **Security fixes**: Follow security reporting process regardless of version\n\nThe Extended Support Release (ESR) model provides longer support cycles for enterprise deployments, while standard releases focus on rapid feature development and improvement cycles.\n\nSources: [content/community/supported-versions.adoc:1-77](), [content/community/contributing-code/Bugs.adoc:59-92]()"])</script><script>self.__next_f.push([1,"2e:T40a5,"])</script><script>self.__next_f.push([1,"# Contributing to Documentation\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [LICENSE.md](LICENSE.md)\n- [README.md](README.md)\n- [archetypes/blog.md](archetypes/blog.md)\n- [archetypes/default.md](archetypes/default.md)\n- [content/admin/administration-panel/search/elasticsearch/Command Line Tools.ru.adoc](content/admin/administration-panel/search/elasticsearch/Command Line Tools.ru.adoc)\n- [content/admin/administration-panel/search/elasticsearch/Set up SuiteCRM.ru.adoc](content/admin/administration-panel/search/elasticsearch/Set up SuiteCRM.ru.adoc)\n- [content/community/_index.ru.adoc](content/community/_index.ru.adoc)\n- [content/community/contributing-code/_index.ru.adoc](content/community/contributing-code/_index.ru.adoc)\n- [content/community/contributing-to-docs/_index.ru.adoc](content/community/contributing-to-docs/_index.ru.adoc)\n- [content/community/contributing-to-docs/guidelines.ru.adoc](content/community/contributing-to-docs/guidelines.ru.adoc)\n- [content/community/contributing-to-docs/simple-edit.ru.adoc](content/community/contributing-to-docs/simple-edit.ru.adoc)\n- [content/community/contributing-to-docs/simple-issue.ru.adoc](content/community/contributing-to-docs/simple-issue.ru.adoc)\n- [content/community/contributing-to-docs/translate.ru.adoc](content/community/contributing-to-docs/translate.ru.adoc)\n- [content/developer/_index.ru.adoc](content/developer/_index.ru.adoc)\n- [content/user/advanced-modules/Workflow Calculated Fields.ru.adoc](content/user/advanced-modules/Workflow Calculated Fields.ru.adoc)\n- [content/user/introduction/User Interface/Navigation Elements.ru.adoc](content/user/introduction/User Interface/Navigation Elements.ru.adoc)\n- [content/user/introduction/User Interface/Search.ru.adoc](content/user/introduction/User Interface/Search.ru.adoc)\n\n\u003c/details\u003e\n\n\n\nThis document covers the processes, tools, and guidelines for contributing to the SuiteCRM documentation project. It explains how community members can help improve, translate, and maintain the comprehensive documentation hosted at docs.suitecrm.com.\n\nFor information about contributing code to SuiteCRM itself, see [Contributing Code](#8). For reporting security vulnerabilities, see [Security Policy](#8.3).\n\n## Overview\n\nSuiteDocs is a community-driven documentation project that provides comprehensive guides for SuiteCRM users, administrators, and developers. The documentation system uses modern static site generation tools and supports multiple languages with a collaborative workflow centered around GitHub.\n\nThe documentation covers all aspects of SuiteCRM from basic user guides to advanced development topics, spanning multiple SuiteCRM versions (7.x and 8.x series) and including API documentation for both legacy and modern implementations.\n\nSources: [README.md:1-43](), [content/community/contributing-to-docs/_index.ru.adoc:1-19]()\n\n## Documentation System Architecture\n\nThe SuiteDocs project uses a modern static site generation pipeline that converts AsciiDoc content into a responsive website with multi-language support.\n\n```mermaid\ngraph TB\n    subgraph \"Content Sources\"\n        ADOC[\"AsciiDoc Files\u003cbr/\u003e*.adoc\"]\n        TRANSLATIONS[\"Translation Files\u003cbr/\u003e*.ru.adoc, *.es.adoc\"]\n        IMAGES[\"Static Images\u003cbr/\u003e/static/images/\"]\n        CONFIG[\"Configuration\u003cbr/\u003econfig.toml\"]\n    end\n    \n    subgraph \"Build Pipeline\"\n        HUGO[\"Hugo Static Generator\u003cbr/\u003egohugo.io/hugo\"]\n        ASCIIDOCTOR[\"AsciiDoctor Engine\u003cbr/\u003eRuby-based processor\"]\n        LEARN_THEME[\"Learn Theme\u003cbr/\u003ehugo-theme-learn\"]\n    end\n    \n    subgraph \"Deployment\"\n        GITHUB[\"GitHub Repository\u003cbr/\u003esalesagility/SuiteDocs\"]\n        NETLIFY[\"Netlify Platform\u003cbr/\u003eAutomated Deploy\"]\n        DOCS_SITE[\"docs.suitecrm.com\u003cbr/\u003eProduction Site\"]\n    end\n    \n    subgraph \"Multi-language Output\"\n        ENGLISH[\"/en/ (default)\"]\n        SPANISH[\"/es/\"]\n        RUSSIAN[\"/ru/\"]\n    end\n    \n    ADOC --\u003e ASCIIDOCTOR\n    TRANSLATIONS --\u003e ASCIIDOCTOR\n    IMAGES --\u003e HUGO\n    CONFIG --\u003e HUGO\n    \n    ASCIIDOCTOR --\u003e HUGO\n    LEARN_THEME --\u003e HUGO\n    \n    HUGO --\u003e NETLIFY\n    GITHUB --\u003e NETLIFY\n    NETLIFY --\u003e DOCS_SITE\n    \n    DOCS_SITE --\u003e ENGLISH\n    DOCS_SITE --\u003e SPANISH\n    DOCS_SITE --\u003e RUSSIAN\n```\n\n**SuiteDocs Technical Stack**\n\nSources: [README.md:11-17](), [content/community/contributing-to-docs/guidelines.ru.adoc:14-25]()\n\n## Content Organization Structure\n\nThe documentation follows a hierarchical structure that mirrors SuiteCRM's functional areas and user roles.\n\n```mermaid\ngraph TD\n    subgraph \"Content Directory Structure\"\n        CONTENT[\"content/\"]\n        \n        USER[\"user/\u003cbr/\u003eUser Documentation\"]\n        ADMIN[\"admin/\u003cbr/\u003eAdministrator Guides\"]\n        DEVELOPER[\"developer/\u003cbr/\u003eDeveloper Resources\"]\n        COMMUNITY[\"community/\u003cbr/\u003eCommunity Guidelines\"]\n        BLOG[\"blog/\u003cbr/\u003eDeveloper Blog\"]\n        \n        CONTENT --\u003e USER\n        CONTENT --\u003e ADMIN\n        CONTENT --\u003e DEVELOPER\n        CONTENT --\u003e COMMUNITY\n        CONTENT --\u003e BLOG\n        \n        subgraph \"User Modules\"\n            CORE_MODULES[\"core-modules/\"]\n            ADVANCED_MODULES[\"advanced-modules/\"]\n            INTRODUCTION[\"introduction/\"]\n        end\n        \n        subgraph \"Admin Sections\"\n            INSTALLATION[\"installation/\"]\n            CONFIG_ADMIN[\"administration-panel/\"]\n            SYSTEM_ADMIN[\"system/\"]\n        end\n        \n        subgraph \"Developer Areas\"\n            API[\"api/\"]\n            EXTENSIONS[\"extensions/\"]\n            CUSTOMIZATION[\"customization/\"]\n        end\n        \n        USER --\u003e CORE_MODULES\n        USER --\u003e ADVANCED_MODULES\n        USER --\u003e INTRODUCTION\n        \n        ADMIN --\u003e INSTALLATION\n        ADMIN --\u003e CONFIG_ADMIN\n        ADMIN --\u003e SYSTEM_ADMIN\n        \n        DEVELOPER --\u003e API\n        DEVELOPER --\u003e EXTENSIONS\n        DEVELOPER --\u003e CUSTOMIZATION\n    end\n```\n\n**Documentation Content Hierarchy**\n\nSources: [content/community/contributing-to-docs/guidelines.ru.adoc:20-25](), [README.md:32-37]()\n\n## Contribution Methods\n\nContributors can participate in documentation improvement through several pathways, each suited to different levels of technical expertise and contribution scope.\n\n### Simple Web-Based Editing\n\nFor minor corrections and content updates, contributors can edit pages directly through the GitHub web interface without requiring local development setup.\n\n| Method | Use Cases | Requirements |\n|--------|-----------|---------------|\n| GitHub Web Editor | Typo fixes, content updates, small additions | GitHub account |\n| Issue Reporting | Bug reports, content requests, clarifications | GitHub account |\n| Pull Requests | Direct changes via web interface | Basic Git knowledge |\n\n**Web Editing Workflow:**\n1. Navigate to target page on docs.suitecrm.com\n2. Click \"Edit this page\" link (redirects to GitHub)\n3. Make changes using GitHub's built-in editor\n4. Submit pull request with descriptive commit message\n5. Community review and merge process\n\nSources: [content/community/contributing-to-docs/simple-edit.ru.adoc:20-67](), [content/community/contributing-to-docs/simple-issue.ru.adoc:20-51]()\n\n### Local Development Setup\n\nFor extensive contributions, translations, or structural changes, local development provides full control over the Hugo build environment.\n\n```mermaid\ngraph LR\n    subgraph \"Local Development Workflow\"\n        CLONE[\"git clone\u003cbr/\u003eSuiteDocs repo\"]\n        SETUP[\"Hugo Installation\u003cbr/\u003eAsciiDoctor Setup\"]\n        DEVELOP[\"Local Development\u003cbr/\u003ehugo serve --watch\"]\n        TEST[\"Preview Changes\u003cbr/\u003elocalhost:1313\"]\n        COMMIT[\"Git Commit\u003cbr/\u003eDescriptive Messages\"]\n        PUSH[\"Push to Branch\u003cbr/\u003eFeature Branch\"]\n        PR[\"Create Pull Request\u003cbr/\u003eTarget: master\"]\n    end\n    \n    CLONE --\u003e SETUP\n    SETUP --\u003e DEVELOP\n    DEVELOP --\u003e TEST\n    TEST --\u003e DEVELOP\n    TEST --\u003e COMMIT\n    COMMIT --\u003e PUSH\n    PUSH --\u003e PR\n```\n\n**Local Development Requirements:**\n- Git version control system\n- Hugo static site generator\n- Ruby with AsciiDoctor gem\n- Text editor with AsciiDoc support\n\nSources: [README.md:19-29](), [content/community/contributing-to-docs/guidelines.ru.adoc:14-17]()\n\n## File Naming and Structure Conventions\n\nThe documentation system follows specific naming patterns to support Hugo's content organization and multi-language features.\n\n### Content File Naming\n\n```mermaid\ngraph TD\n    subgraph \"File Naming Patterns\"\n        ENGLISH[\"example-page.adoc\u003cbr/\u003eDefault English Content\"]\n        SPANISH[\"example-page.es.adoc\u003cbr/\u003eSpanish Translation\"]\n        RUSSIAN[\"example-page.ru.adoc\u003cbr/\u003eRussian Translation\"]\n        \n        INDEX[\"_index.adoc\u003cbr/\u003eSection Index Page\"]\n        INDEX_RU[\"_index.ru.adoc\u003cbr/\u003eLocalized Index\"]\n        \n        ARCHETYPE[\"archetypes/default.md\u003cbr/\u003eContent Template\"]\n        BLOG_ARCH[\"archetypes/blog.md\u003cbr/\u003eBlog Post Template\"]\n    end\n    \n    subgraph \"Directory Structure Rules\"\n        LOWERCASE[\"Lowercase names\u003cbr/\u003eno-spaces-or-special\"]\n        HYPHENS[\"Hyphen separators\u003cbr/\u003ekebab-case-style\"]\n        DESCRIPTIVE[\"Descriptive paths\u003cbr/\u003ematch-content-purpose\"]\n    end\n```\n\n**File Naming Standards:**\n\n| File Type | Pattern | Example |\n|-----------|---------|---------|\n| English Content | `filename.adoc` | `installation-guide.adoc` |\n| Spanish Translation | `filename.es.adoc` | `installation-guide.es.adoc` |\n| Russian Translation | `filename.ru.adoc` | `installation-guide.ru.adoc` |\n| Section Index | `_index.adoc` | `_index.adoc` |\n| Blog Posts | Uses archetype | Generated from `archetypes/blog.md` |\n\nSources: [content/community/contributing-to-docs/guidelines.ru.adoc:27-54](), [archetypes/default.md:1-6](), [archetypes/blog.md:1-15]()\n\n## AsciiDoc Content Standards\n\nDocumentation content uses AsciiDoc markup with specific conventions for consistency and maintainability.\n\n### Document Front Matter\n\nEvery AsciiDoc file begins with YAML front matter defining metadata:\n\n```yaml\n---\ntitle: \"Page Title\"\nweight: 50\n---\n```\n\n### Required AsciiDoc Attributes\n\n```asciidoc\n:author: author-name\n:email: author@example.com\n:toc:\n:toc-title: Table of Contents\n:experimental:\n:imagesdir: /images/en/section-name/\n```\n\n### Content Formatting Guidelines\n\n| Element | AsciiDoc Syntax | Usage |\n|---------|----------------|--------|\n| Buttons | `btn:[Save]` | UI button references |\n| Code paths | `\\`/path/to/file\\`` | File system paths |\n| Inline code | `\\`variable_name\\`` | Code variables |\n| External links | `link:url[text^]` | Opens in new tab |\n| Internal links | `link:../page[text]` | Relative navigation |\n\n**Hugo Shortcodes for Special Content:**\n\n```asciidoc\n{{% notice info %}}\nInformation message content\n{{% /notice %}}\n\n{{% notice warning %}}\nWarning message content\n{{% /notice %}}\n\n{{% children depth=\"3\" showhidden=\"true\" %}}\n```\n\nSources: [content/community/contributing-to-docs/guidelines.ru.adoc:55-132](), [content/user/advanced-modules/Workflow Calculated Fields.ru.adoc:1-30]()\n\n## Translation Workflow\n\nSuiteDocs supports multiple languages with a structured translation process that maintains consistency across language versions.\n\n```mermaid\ngraph TB\n    subgraph \"Translation Process\"\n        SOURCE[\"Source English Content\u003cbr/\u003efilename.adoc\"]\n        TRANSLATE[\"Create Translation File\u003cbr/\u003efilename.{lang}.adoc\"]\n        MAINTAIN[\"Maintain Language Code\u003cbr/\u003ePreserve English filename\"]\n        LOCALIZE[\"Localize Content\u003cbr/\u003eTranslate text, preserve structure\"]\n        REVIEW[\"Community Review\u003cbr/\u003eNative speaker validation\"]\n        MERGE[\"Merge Translation\u003cbr/\u003eDeploy to production\"]\n        \n        SOURCE --\u003e TRANSLATE\n        TRANSLATE --\u003e MAINTAIN\n        MAINTAIN --\u003e LOCALIZE\n        LOCALIZE --\u003e REVIEW\n        REVIEW --\u003e MERGE\n        \n        subgraph \"Supported Languages\"\n            EN[\"English (default)\u003cbr/\u003eNo language code\"]\n            ES[\"Spanish\u003cbr/\u003e.es.adoc suffix\"]\n            RU[\"Russian\u003cbr/\u003e.ru.adoc suffix\"]\n        end\n        \n        MERGE --\u003e EN\n        MERGE --\u003e ES\n        MERGE --\u003e RU\n    end\n```\n\n**Translation Guidelines:**\n- Preserve original filename structure\n- Add language code before file extension\n- Maintain front matter structure\n- Translate content while preserving AsciiDoc markup\n- Keep image paths and links functional\n- Update `:imagesdir:` attribute for localized images\n\n**Language Code Mapping:**\n- English: No suffix (default language)\n- Spanish: `.es.adoc`\n- Russian: `.ru.adoc`\n\nSources: [content/community/contributing-to-docs/translate.ru.adoc:9-17](), [content/community/contributing-to-docs/guidelines.ru.adoc:36-53]()\n\n## GitHub Integration and Deployment\n\nThe documentation system uses GitHub as the central repository with automated deployment through Netlify.\n\n```mermaid\ngraph TD\n    subgraph \"GitHub Repository Workflow\"\n        FORK[\"Fork Repository\u003cbr/\u003ePersonal GitHub Fork\"]\n        BRANCH[\"Feature Branch\u003cbr/\u003edescriptive-branch-name\"]\n        CHANGES[\"Make Changes\u003cbr/\u003eLocal development\"]\n        COMMIT[\"Commit Changes\u003cbr/\u003eDescriptive messages\"]\n        PUSH[\"Push to Fork\u003cbr/\u003eOrigin feature-branch\"]\n        PR[\"Pull Request\u003cbr/\u003eTarget: master branch\"]\n        REVIEW[\"Community Review\u003cbr/\u003eMaintainer approval\"]\n        MERGE[\"Merge to Master\u003cbr/\u003eAutomated deployment\"]\n        \n        FORK --\u003e BRANCH\n        BRANCH --\u003e CHANGES\n        CHANGES --\u003e COMMIT\n        COMMIT --\u003e PUSH\n        PUSH --\u003e PR\n        PR --\u003e REVIEW\n        REVIEW --\u003e MERGE\n        \n        subgraph \"Automated Processes\"\n            NETLIFY_BUILD[\"Netlify Build\u003cbr/\u003eHugo generation\"]\n            DEPLOY[\"Deploy to Production\u003cbr/\u003edocs.suitecrm.com\"]\n            PREVIEW[\"Deploy Previews\u003cbr/\u003ePR validation\"]\n        end\n        \n        PR --\u003e PREVIEW\n        MERGE --\u003e NETLIFY_BUILD\n        NETLIFY_BUILD --\u003e DEPLOY\n    end\n```\n\n**Repository Details:**\n- Main repository: `salesagility/SuiteDocs`\n- Default branch: `master`\n- Deployment: Automatic via Netlify\n- Preview deployments: Available for pull requests\n- Build status: Monitored via Netlify badge\n\n**Netlify Configuration:**\nThe deployment process uses [netlify.toml]() configuration for build settings and Hugo version specification.\n\nSources: [README.md:19-29](), [content/community/contributing-to-docs/simple-edit.ru.adoc:44-50]()\n\n## Quality Assurance and Review Process\n\nDocumentation contributions undergo community review to ensure accuracy, consistency, and adherence to project standards.\n\n### Review Criteria\n\n| Aspect | Requirements |\n|--------|-------------|\n| Technical Accuracy | Information must be current and correct |\n| Language Quality | Clear, grammatically correct writing |\n| Structure Consistency | Follows established formatting guidelines |\n| Link Functionality | All internal and external links work correctly |\n| Image Quality | Screenshots current, properly sized |\n| AsciiDoc Syntax | Valid markup, proper attributes |\n\n### Contributor Guidelines\n\n**Content Standards:**\n- Maximum 80 characters per line for readability\n- Use relative links for internal navigation\n- Include alt text for all images\n- Follow established terminology consistently\n- Provide sources and references where applicable\n\n**Code References:**\n- Use inline code formatting for file paths: `config.toml`\n- Reference specific line numbers: [filename:start-end]()\n- Include context for code examples\n- Verify code accuracy against current SuiteCRM versions\n\n### Issue Tracking and Management\n\nCommunity members can report documentation issues through GitHub's issue tracking system:\n\n- **Bug Reports**: Incorrect information or broken functionality\n- **Content Requests**: Missing documentation or feature coverage\n- **Clarification Needs**: Unclear or confusing explanations\n- **Translation Issues**: Language-specific problems\n\nSources: [content/community/contributing-to-docs/guidelines.ru.adoc:205-242](), [content/community/contributing-to-docs/simple-issue.ru.adoc:20-51]()\n\n## Licensing and Legal Considerations\n\nSuiteDocs content is licensed under the GNU Free Documentation License, ensuring open access and community ownership of documentation improvements.\n\n**License Requirements:**\n- All contributions become part of the GFDL-licensed documentation\n- Contributors retain attribution for their work\n- Content must be compatible with open documentation standards\n- Commercial use permitted under license terms\n\n**Copyright Attribution:**\nContributors are encouraged to include author attribution in AsciiDoc files:\n\n```asciidoc\n:author: Your Name\n:email: your.email@example.com\n```\n\nSources: [LICENSE.md:1-121](), [README.md:40-42]()"])</script><script>self.__next_f.push([1,"2f:T316c,"])</script><script>self.__next_f.push([1,"# Bug Reporting and Issue Management\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [changes_sed.txt](changes_sed.txt)\n- [content/community/contributing-code/Bugs.adoc](content/community/contributing-code/Bugs.adoc)\n- [content/community/contributing-code/Coding Standards.adoc](content/community/contributing-code/Coding Standards.adoc)\n- [content/community/contributing-code/Contributing.adoc.NOT](content/community/contributing-code/Contributing.adoc.NOT)\n- [content/community/contributing-code/Features.adoc](content/community/contributing-code/Features.adoc)\n- [content/community/contributing-code/Test Pull Requests.adoc](content/community/contributing-code/Test Pull Requests.adoc)\n- [content/community/contributing-code/_index.es.adoc](content/community/contributing-code/_index.es.adoc)\n- [content/community/contributing-to-docs/simple-edit.es.adoc](content/community/contributing-to-docs/simple-edit.es.adoc)\n- [content/community/raising-issues/_index.en.adoc](content/community/raising-issues/_index.en.adoc)\n- [content/community/raising-issues/issues-voting.adoc](content/community/raising-issues/issues-voting.adoc)\n- [content/community/raising-issues/raising-issues.adoc](content/community/raising-issues/raising-issues.adoc)\n- [content/community/security-policy.adoc](content/community/security-policy.adoc)\n- [content/community/supported-versions.adoc](content/community/supported-versions.adoc)\n- [static/images/en/community/32Issue-Voting.gif](static/images/en/community/32Issue-Voting.gif)\n- [static/images/en/community/testingprs1.png](static/images/en/community/testingprs1.png)\n- [static/images/en/community/testingprs2.png](static/images/en/community/testingprs2.png)\n- [static/images/en/community/testingprs3.png](static/images/en/community/testingprs3.png)\n\n\u003c/details\u003e\n\n\n\nThis document covers the processes and workflows for reporting bugs, managing issues, and contributing bug fixes to SuiteCRM. It includes GitHub-based issue tracking, community voting mechanisms, and the technical workflows for submitting and testing bug fixes.\n\nFor information about reporting security vulnerabilities, see [Security Policy](#8.3). For general documentation contributions, see [Contributing to Documentation](#8.1).\n\n## Issue Reporting Process\n\nThe SuiteCRM project uses GitHub Issues as the primary mechanism for bug reporting and feature requests. Issues should be clearly documented with comprehensive details to enable effective reproduction and resolution.\n\n### Issue Requirements\n\nWhen reporting issues, contributors must provide:\n\n- Clear description with steps to reproduce\n- SuiteCRM version(s) where the issue occurs  \n- Platform and environment details when relevant\n- Screenshots or error logs when applicable\n\nIssues that meet these criteria are more likely to be addressed promptly and accurately by the development team.\n\n**Issue Lifecycle Workflow**\n```mermaid\nflowchart TD\n    A[\"Issue Created\"] --\u003e B[\"Initial Triage\"]\n    B --\u003e C[\"Label Assignment\"]\n    C --\u003e D[\"Priority Assessment\"]\n    D --\u003e E[\"Community Voting\"]\n    E --\u003e F{\"Fix Available?\"}\n    F --\u003e|Yes| G[\"Pull Request Created\"]\n    F --\u003e|No| H[\"Awaiting Development\"]\n    G --\u003e I[\"Code Review\"]\n    I --\u003e J[\"Testing\"]\n    J --\u003e K[\"Merge to hotfix\"]\n    K --\u003e L[\"Issue Closed\"]\n    H --\u003e M[\"Backlog\"]\n    M --\u003e N[\"Future Release Planning\"]\n```\n\nSources: [content/community/raising-issues/raising-issues.adoc:8-33]()\n\n## GitHub Labels and Issue Classification\n\nThe SuiteCRM project uses a comprehensive labeling system to categorize and prioritize issues effectively.\n\n### Issue Type Labels\n\n| Label | Purpose | GitHub Filter |\n|-------|---------|---------------|\n| `bug` | Confirmed or likely bugs | [Bug Issues](https://github.com/salesagility/SuiteCRM/labels/bug) |\n| `suggestion` | Feature requests and improvements | [Suggestion Issues](https://github.com/salesagility/SuiteCRM/labels/Suggestion) |\n| `question` | General questions (should use community forum) | [Question Issues](https://github.com/salesagility/SuiteCRM/labels/Question) |\n| `invalid` | Invalid or non-reproducible issues | [Invalid Issues](https://github.com/salesagility/SuiteCRM/labels/invalid) |\n| `duplicate` | Duplicate of existing issues | [Duplicate Issues](https://github.com/salesagility/SuiteCRM/labels/Duplicate) |\n\n### Priority Classification\n\n| Priority Level | Impact Description | GitHub Filter |\n|----------------|-------------------|---------------|\n| `Low Priority` | Visual issues, typos, minor alignments | [Low Priority](https://github.com/salesagility/SuiteCRM/labels/Low%20Priority) |\n| `Medium Priority` | Medium impact blockers with workarounds | [Medium Priority](https://github.com/salesagility/SuiteCRM/labels/Medium%20Priority) |\n| `High Priority` | High impact blockers without workarounds | [High Priority](https://github.com/salesagility/SuiteCRM/labels/High%20Priority) |\n\n### Status and Action Labels\n\n| Label | Description | GitHub Filter |\n|-------|-------------|---------------|\n| `Fix Proposed` | Issues with related pull requests | [Fix Proposed](https://github.com/salesagility/SuiteCRM/labels/Fix%20Proposed) |\n| `Pending Input` | Awaiting response from issue reporter | [Pending Input](https://github.com/salesagility/SuiteCRM/labels/Pending%20Input) |\n| `Resolved: Next Release` | Fixed issues pending next release | [Resolved: Next Release](https://github.com/salesagility/SuiteCRM/labels/Resolved%3A%20Next%20Release) |\n\nSources: [content/community/raising-issues/raising-issues.adoc:34-72]()\n\n## Issue Voting and Community Prioritization\n\nThe project implements a voting mechanism using GitHub reactions to help prioritize issues based on community impact and demand.\n\n### Voting Process\n\nContributors can vote on issues by:\n1. Navigating to the issue page\n2. Clicking the reaction button on the **original issue description**\n3. Selecting the thumbs up (👍) reaction\n\n**Important**: Only reactions on the original issue description are counted. Reactions on comments are disregarded.\n\n### Sorting by Popularity\n\nTo view most popular issues, use the GitHub filter parameter:\n```\nsort:reactions-+1-desc\n```\n\nThis sorting mechanism helps maintainers identify community priorities and allocate development resources effectively.\n\n**Community Voting Workflow**\n```mermaid\nflowchart LR\n    A[\"Issue Created\"] --\u003e B[\"Community Review\"]\n    B --\u003e C[\"Thumbs Up Voting\"]\n    C --\u003e D[\"Vote Aggregation\"]\n    D --\u003e E[\"Priority Ranking\"]\n    E --\u003e F[\"Development Planning\"]\n    F --\u003e G[\"Resource Allocation\"]\n```\n\nSources: [content/community/raising-issues/issues-voting.adoc:8-35]()\n\n## Bug Fix Contribution Workflow\n\nContributors can submit bug fixes through GitHub Pull Requests following established branch and commit conventions.\n\n### Branch Strategy\n\nBug fixes must target the `hotfix` branch, which follows this merge pattern:\n\n**SuiteCRM Branch Workflow**\n```mermaid\nflowchart TD\n    A[\"contributor/bugfix_XXXX\"] --\u003e B[\"hotfix\"]\n    B --\u003e C[\"7.12.x\"]\n    B --\u003e D[\"develop\"] \n    D --\u003e E[\"master\"]\n    \n    F[\"Issue #XXXX\"] --\u003e A\n    G[\"Pull Request\"] --\u003e A\n    H[\"Code Review\"] --\u003e I[\"Travis CI\"]\n    I --\u003e J[\"CLA Check\"]\n    J --\u003e K[\"Merge to hotfix\"]\n```\n\n### Branch Naming Convention\n\nCreate bug fix branches using the pattern:\n- `bugfix_XXXX` (where XXXX is the issue ID)\n- `issue-XXXX` (alternative format)\n\nExample Git commands:\n```bash\ngit checkout -b bugfix_3062 upstream/hotfix\n```\n\nFor SuiteCRM 8, the same pattern applies:\n```bash\ngit checkout -b bugfix_3062 upstream/hotfix\n```\n\n### Commit Message Format\n\nFollow the standardized commit message format:\n```\nFix #XXXX - \u003cissue subject\u003e\n```\n\nExample:\n```bash\ngit commit -m \"Fix #1436 - Reports with nested Parentheses are removing parameters\"\n```\n\nThis format enables automatic inclusion in release notes and links commits to issues.\n\nSources: [content/community/contributing-code/Bugs.adoc:6-57]()\n\n## Pull Request Requirements and Validation\n\nAll pull requests undergo automated validation and manual review processes before acceptance.\n\n### Repository Targets\n\n| SuiteCRM Version | Repository | Base Branch |\n|------------------|------------|-------------|\n| SuiteCRM 7.x | `salesagility/SuiteCRM` | `hotfix` |\n| SuiteCRM 8.x | `salesagility/SuiteCRM-Core` | `hotfix` |\n\n### Automated Checks\n\n**Pull Request Validation Pipeline**\n```mermaid\nflowchart TD\n    A[\"Pull Request Created\"] --\u003e B[\"CLA Check\"]\n    B --\u003e C[\"Travis CI Testing\"]\n    C --\u003e D[\"Automated Tests\"]\n    D --\u003e E{\"All Checks Pass?\"}\n    E --\u003e|Yes| F[\"Ready for Review\"]\n    E --\u003e|No| G[\"Fixes Required\"]\n    F --\u003e H[\"Code Review\"]\n    H --\u003e I[\"Community Testing\"]\n    I --\u003e J[\"Merge Approval\"]\n```\n\n#### Contributor License Agreement (CLA)\n\nAll contributors must sign the CLA at https://cla.suitecrm.com/salesagility/SuiteCRM. This is required only once per contributor.\n\n#### Travis CI Integration\n\nTravis CI automatically tests pull request mergeability. Contributors can run tests locally:\n```bash\ncd tests\nsh runtests.sh\n```\n\n### Pull Request Labels\n\n| Label | Description | Purpose |\n|-------|-------------|---------|\n| `Assessed` | Confirmed to fix the original issue | Ready for code review |\n| `Ready to Merge` | Passed assessment and code review | Awaiting merge |\n| `Requires Tests` | Needs additional test coverage | Testing required |\n| `Community Contribution` | Created by community member | Attribution |\n| `Enhancement` | Adds new functionality | Feature review needed |\n| `In Review` | Currently under review | Work in progress |\n| `Wrong Branch` | Targeting incorrect branch | Needs retargeting |\n\nSources: [content/community/contributing-code/Bugs.adoc:93-127](), [content/community/raising-issues/raising-issues.adoc:74-107]()\n\n## Pull Request Testing Process\n\nCommunity members can test pending pull requests to help validate fixes before they are merged.\n\n### Testing Workflow\n\n1. **Identify Pull Request**: Browse https://github.com/salesagility/SuiteCRM/pulls\n2. **Extract Branch Information**: Get author's repository and branch name\n3. **Create Test Branch**: \n   ```bash\n   cd /path/to/your/fork\n   git checkout -b testing6614 hotfix\n   ```\n4. **Pull Author's Changes**:\n   ```bash\n   git pull https://github.com/{author}/SuiteCRM.git {branch-name}\n   ```\n5. **Test the Fix**: Follow issue reproduction steps\n6. **Report Results**: Comment \"Assessed :+1:\" if successful\n\n**Pull Request Testing Workflow**\n```mermaid\nflowchart TD\n    A[\"Select PR to Test\"] --\u003e B[\"Get Author Repo Info\"]\n    B --\u003e C[\"Create Test Branch\"]\n    C --\u003e D[\"Pull Author Changes\"]\n    D --\u003e E[\"Test Fix Implementation\"]\n    E --\u003e F{\"Fix Works?\"}\n    F --\u003e|Yes| G[\"Comment: Assessed :+1:\"]\n    F --\u003e|No| H[\"Report Issues\"]\n    G --\u003e I[\"PR Ready for Merge\"]\n    H --\u003e J[\"Author Fixes Issues\"]\n```\n\nThe \"Assessed\" comment provides clear indication to maintainers that community testing has been completed successfully.\n\nSources: [content/community/contributing-code/Test Pull Requests.adoc:9-57]()\n\n## Version Support and Lifecycle Management\n\nUnderstanding SuiteCRM's version support lifecycle is crucial for effective issue management and bug fix targeting.\n\n### Currently Supported Versions\n\n| Version | Initial Release | Active Support Until | Security Support Until |\n|---------|----------------|---------------------|----------------------|\n| 7.14 ESR | August 2023 | June 2025 | December 2025 |\n| 8.6 | April 2024 | July 2024 | - |\n\n### End of Life Versions\n\nRecent EOL versions include 7.12 ESR, 7.13, and several 8.x releases (8.2 through 8.5). Issues affecting only EOL versions receive lower priority unless they also impact supported versions.\n\n### Branch Migration Process\n\nWhen versions reach EOL, pull requests may need retargeting. The process involves:\n\n1. **Extract Commit Hashes**:\n   ```bash\n   git log -1 --format=format:\"%H\"\n   ```\n2. **Create New Branch from Current Target**:\n   ```bash\n   git checkout hotfix\n   git checkout -b new-branch\n   ```\n3. **Cherry-pick Changes**:\n   ```bash\n   git cherry-pick commit1 commit2\n   ```\n\nSources: [content/community/supported-versions.adoc:10-72](), [content/community/contributing-code/Bugs.adoc:59-92]()\n\n## Integration with Security Policy\n\nWhile this document covers general bug reporting, security vulnerabilities require special handling through the dedicated security policy framework.\n\nSecurity issues should be reported through:\n- GitHub Security Advisories for the appropriate repository\n- Direct email to security@suitecrm.com\n\nFor complete security reporting procedures, see [Security Policy](#8.3).\n\nSources: [content/community/security-policy.adoc:10-28]()"])</script><script>self.__next_f.push([1,"30:T2426,"])</script><script>self.__next_f.push([1,"# Security Policy\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [content/admin/releases/7.13.x/_index.en.adoc](content/admin/releases/7.13.x/_index.en.adoc)\n- [content/admin/releases/7.14.x/_index.en.adoc](content/admin/releases/7.14.x/_index.en.adoc)\n- [content/community/raising-issues/_index.en.adoc](content/community/raising-issues/_index.en.adoc)\n- [content/community/raising-issues/issues-voting.adoc](content/community/raising-issues/issues-voting.adoc)\n- [content/community/raising-issues/raising-issues.adoc](content/community/raising-issues/raising-issues.adoc)\n- [content/community/security-policy.adoc](content/community/security-policy.adoc)\n- [content/community/supported-versions.adoc](content/community/supported-versions.adoc)\n- [static/images/en/admin/release/Externaloauth1.png](static/images/en/admin/release/Externaloauth1.png)\n- [static/images/en/admin/release/Externaloauth2.png](static/images/en/admin/release/Externaloauth2.png)\n- [static/images/en/admin/release/Externaloauth3.png](static/images/en/admin/release/Externaloauth3.png)\n- [static/images/en/admin/release/InboundEmail1.png](static/images/en/admin/release/InboundEmail1.png)\n- [static/images/en/admin/release/InboundEmail2.png](static/images/en/admin/release/InboundEmail2.png)\n- [static/images/en/admin/release/InboundEmail3.png](static/images/en/admin/release/InboundEmail3.png)\n- [static/images/en/admin/release/InboundEmail4.png](static/images/en/admin/release/InboundEmail4.png)\n- [static/images/en/admin/release/InboundEmail5.png](static/images/en/admin/release/InboundEmail5.png)\n- [static/images/en/admin/release/InboundOAuthConfiguration.png](static/images/en/admin/release/InboundOAuthConfiguration.png)\n- [static/images/en/admin/release/OAuthMicrosoftConnection.png](static/images/en/admin/release/OAuthMicrosoftConnection.png)\n- [static/images/en/admin/release/Outbound1.png](static/images/en/admin/release/Outbound1.png)\n- [static/images/en/admin/release/Outbound2.png](static/images/en/admin/release/Outbound2.png)\n- [static/images/en/community/32Issue-Voting.gif](static/images/en/community/32Issue-Voting.gif)\n\n\u003c/details\u003e\n\n\n\nThis document outlines SuiteCRM's security policy, including how to report security vulnerabilities, response procedures, and supported version information. The policy applies to both SuiteCRM 7.x and 8.x series and covers the entire vulnerability disclosure lifecycle from initial reporting through resolution and public disclosure.\n\nFor information about contributing code fixes or general bug reports, see [Contributing to Documentation](#8.1) and [Bug Reporting and Issue Management](#8.2).\n\n## Supported Versions\n\nSuiteCRM maintains active security support for specific versions based on the support lifecycle. Currently supported versions receive security patches and vulnerability fixes on a priority basis.\n\n### Active Support Matrix\n\nThe security policy applies to all actively supported versions as defined in the version support matrix. Each release has defined periods for active support and extended security support.\n\n```mermaid\ntimeline\n    title \"SuiteCRM Security Support Timeline\"\n    section \"7.x Series\"\n        7.14 ESR : Extended Support Release\n                  : Active until June 2025\n                  : Security until December 2025\n    section \"8.x Series\"  \n        8.6      : Regular Release\n                 : Active until July 2024\n                 : No extended security support\n```\n\n**Sources:** [content/community/supported-versions.adoc:15-32](), [content/community/security-policy.adoc:6-8]()\n\n## Security Vulnerability Reporting\n\nSuiteCRM takes security seriously and has established multiple channels for reporting security vulnerabilities. The preferred method varies depending on which version of SuiteCRM is affected.\n\n### Reporting Channels\n\n```mermaid\nflowchart TD\n    A[\"Security Issue Discovered\"] --\u003e B{\"Affects which version?\"}\n    B --\u003e|\"Both 7.x and 8.x\"| C[\"Report to SuiteCRM Repository\u003cbr/\u003egithub.com/salesagility/SuiteCRM/security\"]\n    B --\u003e|\"Only 8.x\"| D[\"Report to SuiteCRM-Core Repository\u003cbr/\u003egithub.com/salesagility/SuiteCRM-Core/security\"]\n    B --\u003e|\"Unsure or urgent\"| E[\"Email security@suitecrm.com\"]\n    \n    C --\u003e F[\"GitHub Security Advisory\"]\n    D --\u003e F\n    E --\u003e G[\"Security Team Review\"]\n    \n    F --\u003e H[\"Add POC and details in comments\"]\n    G --\u003e I[\"Internal Assessment\"]\n    H --\u003e I\n    \n    I --\u003e J[\"Security Team Response\u003cbr/\u003ewithin 72 hours\"]\n```\n\n**Sources:** [content/community/security-policy.adoc:13-25](), [content/admin/releases/7.14.x/_index.en.adoc:62](), [content/admin/releases/7.14.x/_index.en.adoc:126]()\n\n### Valid Security Report Criteria\n\nSecurity reports must meet specific criteria to be considered valid and actionable:\n\n| Requirement | Description |\n|-------------|-------------|\n| **Issue Count** | Maximum 1 issue per report, or up to 3 if closely related |\n| **Verification** | Reporter must verify the issue before submission |\n| **Reproduction** | Include step-by-step reproduction or POC script |\n| **Version Scope** | Specify affected versions among actively supported releases |\n| **Support Status** | Issues must affect currently supported versions |\n\n**Sources:** [content/community/security-policy.adoc:31-37]()\n\n## Security Response Process\n\nThe security team follows a structured process for handling vulnerability reports, with defined timelines and escalation procedures.\n\n### Response Timeline\n\n```mermaid\ngantt\n    title \"Security Response Timeline\"\n    dateFormat X\n    axisFormat %s\n    \n    section \"Initial Response\"\n    Acknowledgment : 0, 72\n    \n    section \"Assessment\"\n    Severity Analysis : 72, 168\n    Priority Assignment : 168, 240\n    \n    section \"Resolution\"\n    Fix Development : 240, 720\n    Testing \u0026 Validation : 720, 840\n    \n    section \"Disclosure\"\n    Security Advisory : 840, 864\n    CVE Assignment : 864, 888\n    Public Release : 888, 912\n```\n\n### Assessment and Prioritization\n\nThe security team assesses each report based on multiple factors:\n\n1. **Severity Classification** - Impact assessment using industry standards\n2. **Priority Grading** - Based on exploitability and affected user base  \n3. **Fix Complexity** - Development effort required for resolution\n4. **Disclosure Timeline** - Coordinated with reporter preferences\n\n**Sources:** [content/community/security-policy.adoc:45-55]()\n\n## CVE Assignment and Public Disclosure\n\nSuiteCRM follows coordinated vulnerability disclosure practices, working with security researchers and maintaining transparency with the community.\n\n### CVE Integration Process\n\n```mermaid\nflowchart LR\n    A[\"Security Fix Developed\"] --\u003e B[\"CVE Requested\"]\n    B --\u003e C[\"GitHub Security Advisory\"]\n    C --\u003e D[\"Release Notes Updated\"]\n    D --\u003e E[\"Community Notification\"]\n    \n    F[\"Reporter Credit\"] --\u003e E\n    G[\"MITRE CVE Database\"] --\u003e C\n    H[\"National Vulnerability Database\"] --\u003e C\n    \n    subgraph \"Public Channels\"\n        I[\"security@suitecrm.com\"]\n        J[\"Release Announcements\"] \n        K[\"Documentation Updates\"]\n    end\n    \n    E --\u003e I\n    E --\u003e J  \n    E --\u003e K\n```\n\n### Recent Security Disclosures\n\nThe release notes demonstrate the active security disclosure process with examples like:\n\n- **CVE-2024-50335**: XSS Vulnerability with GitHub Advisory GHSA-8rw6-g96j-3w7m\n- **CVE-2024-49773**: SQL Injection with GitHub Advisory GHSA-5hr4-r43c-6qf7  \n- **CVE-2024-36416**: Excessive log data DOS with GitHub Advisory GHSA-jrpp-22g3-2j77\n\nEach disclosure includes:\n- CVE identifier\n- GitHub Security Advisory reference\n- Reporter attribution\n- Technical description\n\n**Sources:** [content/admin/releases/7.14.x/_index.en.adoc:26-31](), [content/admin/releases/7.14.x/_index.en.adoc:153-166]()\n\n## Security Policy Implementation\n\nThe security policy is implemented through integration points across the SuiteCRM development and release process.\n\n### Process Integration Points\n\n```mermaid\ngraph TB\n    subgraph \"Reporting Layer\"\n        A[\"GitHub Security Advisories\"]\n        B[\"security@suitecrm.com\"]\n        C[\"Community Reports\"]\n    end\n    \n    subgraph \"Assessment Layer\"  \n        D[\"Security Team\"]\n        E[\"Severity Analysis\"]\n        F[\"Priority Assignment\"]\n    end\n    \n    subgraph \"Development Layer\"\n        G[\"Fix Development\"]\n        H[\"Code Review\"]\n        I[\"Security Testing\"]\n    end\n    \n    subgraph \"Release Layer\"\n        J[\"CVE Assignment\"]\n        K[\"Release Notes\"]\n        L[\"GitHub Advisory\"]\n        M[\"Public Disclosure\"]\n    end\n    \n    A --\u003e D\n    B --\u003e D\n    C --\u003e D\n    \n    D --\u003e E\n    E --\u003e F\n    F --\u003e G\n    \n    G --\u003e H\n    H --\u003e I\n    I --\u003e J\n    \n    J --\u003e K\n    K --\u003e L\n    L --\u003e M\n```\n\n### Documentation References\n\nSecurity policy documentation is maintained in multiple locations:\n\n- Primary policy: `content/community/security-policy.adoc`\n- Version support: `content/community/supported-versions.adoc`  \n- Release-specific disclosures in `content/admin/releases/` directories\n- Cross-references in release notes and upgrade guides\n\n**Sources:** [content/community/security-policy.adoc:1-56](), [content/admin/releases/7.14.x/_index.en.adoc:62](), [content/admin/releases/7.13.x/_index.en.adoc:53]()"])</script><script>self.__next_f.push([1,"5:[\"$\",\"$L12\",null,{\"repoName\":\"SuiteCRM/SuiteDocs\",\"hasConfig\":false,\"children\":[\"$\",\"$L13\",null,{\"wiki\":{\"metadata\":{\"repo_name\":\"SuiteCRM/SuiteDocs\",\"commit_hash\":\"77cd1b0b\",\"generated_at\":\"2025-07-22T17:50:47.125024\",\"config\":null,\"config_source\":\"none\"},\"pages\":[{\"page_plan\":{\"id\":\"1\",\"title\":\"SuiteDocs Overview\"},\"content\":\"$14\"},{\"page_plan\":{\"id\":\"1.1\",\"title\":\"Documentation Structure\"},\"content\":\"$15\"},{\"page_plan\":{\"id\":\"2\",\"title\":\"Documentation System Architecture\"},\"content\":\"$16\"},{\"page_plan\":{\"id\":\"2.1\",\"title\":\"Hugo Configuration and Build Process\"},\"content\":\"$17\"},{\"page_plan\":{\"id\":\"2.2\",\"title\":\"Multi-language Support\"},\"content\":\"$18\"},{\"page_plan\":{\"id\":\"2.3\",\"title\":\"Netlify Deployment\"},\"content\":\"$19\"},{\"page_plan\":{\"id\":\"3\",\"title\":\"SuiteCRM Version Documentat
