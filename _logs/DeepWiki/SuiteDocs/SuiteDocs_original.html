\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [LICENSE.md](LICENSE.md)\n- [README.md](README.md)\n- [archetypes/blog.md](archetypes/blog.md)\n- [archetypes/default.md](archetypes/default.md)\n- [config.toml](config.toml)\n- [content/community/contributing-code/Forking.adoc](content/community/contributing-code/Forking.adoc)\n- [i18n/en.toml](i18n/en.toml)\n- [i18n/ru.toml](i18n/ru.toml)\n- [layouts/index.html](layouts/index.html)\n- [layouts/partials/header.html](layouts/partials/header.html)\n- [layouts/partials/menu.html](layouts/partials/menu.html)\n- [layouts/partials/search.html](layouts/partials/search.html)\n- [netlify.toml](netlify.toml)\n- [static/css/theme-suitecrm.css](static/css/theme-suitecrm.css)\n- [static/css/theme.css](static/css/theme.css)\n- [static/images/favicon.png](static/images/favicon.png)\n- [themes/hugo-theme-learn/layouts/partials/menu.html](themes/hugo-theme-learn/layouts/partials/menu.html)\n\n\u003c/details\u003e\n\n\n\nSuiteDocs is the comprehensive documentation system for SuiteCRM, serving as the primary source of technical documentation, user guides, and community resources for the SuiteCRM open-source CRM platform. This system generates and hosts the documentation website at https://docs.suitecrm.com, providing structured information for administrators, end users, developers, and community contributors.\n\nThe SuiteDocs repository contains the source content, build configuration, and deployment infrastructure for generating a multi-language static documentation site. It covers installation procedures, user interface guides, development APIs, customization techniques, and community contribution guidelines across multiple SuiteCRM versions (7.x and 8.x series).\n\nFor information about contributing code to SuiteCRM itself, see [Community Contribution](#8). For details about SuiteCRM version compatibility, see [Version Compatibility Matrix](#3.3).\n\n## Documentation System Architecture\n\n```mermaid\ngraph TB\n    subgraph \"Source Repository\"\n        CONFIG[\"config.toml\u003cbr/\u003eHugo Configuration\"]\n        NETLIFY_CONFIG[\"netlify.toml\u003cbr/\u003eDeployment Config\"]\n        CONTENT[\"content/\u003cbr/\u003eAsciiDoc \u0026 Markdown\"]\n        LAYOUTS[\"layouts/\u003cbr/\u003eHugo Templates\"]\n        STATIC[\"static/\u003cbr/\u003eCSS, Images, JS\"]\n        I18N[\"i18n/\u003cbr/\u003eTranslation Files\"]\n    end\n    \n    subgraph \"Build Process\"\n        HUGO[\"Hugo Static Generator\u003cbr/\u003ev0.85.0\"]\n        ASCIIDOCTOR[\"AsciiDoctor Engine\u003cbr/\u003eRuby Processing\"]\n        THEME[\"hugo-theme-learn\u003cbr/\u003eSuiteCRM Variant\"]\n    end\n    \n    subgraph \"Generated Output\"\n        PUBLIC[\"public/\u003cbr/\u003eStatic HTML/CSS/JS\"]\n        INDEXES[\"Search Indexes\u003cbr/\u003eLunr.js\"]\n        LANG_DIRS[\"Language Directories\u003cbr/\u003e/en/, /es/, /ru/\"]\n    end\n    \n    subgraph \"Deployment\"\n        NETLIFY[\"Netlify Platform\"]\n        PROD[\"docs.suitecrm.com\u003cbr/\u003eProduction Site\"]\n        PREVIEW[\"Deploy Previews\u003cbr/\u003ePR Testing\"]\n    end\n    \n    CONFIG --\u003e HUGO\n    NETLIFY_CONFIG --\u003e NETLIFY\n    CONTENT --\u003e ASCIIDOCTOR\n    LAYOUTS --\u003e HUGO\n    STATIC --\u003e HUGO\n    I18N --\u003e HUGO\n    \n    HUGO --\u003e PUBLIC\n    ASCIIDOCTOR --\u003e PUBLIC\n    THEME --\u003e PUBLIC\n    \n    PUBLIC --\u003e INDEXES\n    PUBLIC --\u003e LANG_DIRS\n    \n    PUBLIC --\u003e NETLIFY\n    NETLIFY --\u003e PROD\n    NETLIFY --\u003e PREVIEW\n```\n\n**Sources:** [config.toml:1-118](), [netlify.toml:1-32](), [README.md:12-17](), [layouts/partials/header.html:1-118]()\n\n## Hugo Configuration System\n\nThe documentation system uses Hugo with specific configuration parameters that define the site structure, language support, and build behavior:\n\n| Configuration Area | File | Key Settings |\n|-------------------|------|-------------|\n| Base Configuration | `config.toml` | `baseURL`, `title`, `theme`, `timeout` |\n| Build Settings | `config.toml` | `enableGitInfo`, `metaDataFormat: \"yaml\"` |\n| Language Configuration | `config.toml` | `defaultContentLanguage: \"en\"` |\n| Theme Variant | `config.toml` | `themeVariant = \"suitecrm\"` |\n| Deployment | `netlify.toml` | `HUGO_VERSION = \"0.85.0\"` |\n\n```mermaid\ngraph LR\n    subgraph \"Hugo Configuration Flow\"\n        CONFIG_TOML[\"config.toml\"]\n        PARAMS[\"Site Params\"]\n        LANGUAGES[\"Languages Config\"]\n        MENUS[\"Menu Shortcuts\"]\n        OUTPUTS[\"Output Formats\"]\n    end\n    \n    subgraph \"Key Parameters\"\n        GITHUB_REPO[\"GitHubRepo\u003cbr/\u003eEditURL\u003cbr/\u003eIssueURL\"]\n        THEME_VAR[\"themeVariant: suitecrm\"]\n        VISITED_LINKS[\"showVisitedLinks: true\"]\n        GIT_INFO[\"enableGitInfo: true\"]\n    end\n    \n    CONFIG_TOML --\u003e PARAMS\n    CONFIG_TOML --\u003e LANGUAGES\n    CONFIG_TOML --\u003e MENUS\n    CONFIG_TOML --\u003e OUTPUTS\n    \n    PARAMS --\u003e GITHUB_REPO\n    PARAMS --\u003e THEME_VAR\n    PARAMS --\u003e VISITED_LINKS\n    PARAMS --\u003e GIT_INFO\n```\n\n**Sources:** [config.toml:13-23](), [config.toml:34-40](), [netlify.toml:10-13]()\n\n## Multi-Language Support Architecture\n\nSuiteDocs implements comprehensive internationalization through Hugo's built-in multi-language features, supporting English, Spanish, and Russian translations:\n\n```mermaid\ngraph TB\n    subgraph \"Language Configuration\"\n        EN_CONFIG[\"Languages.en\u003cbr/\u003eWeight: 1\u003cbr/\u003eLanguageDir: /\"]\n        ES_CONFIG[\"Languages.es\u003cbr/\u003eWeight: 2\u003cbr/\u003eLanguageDir: /es/\"]\n        RU_CONFIG[\"Languages.ru\u003cbr/\u003eWeight: 3\u003cbr/\u003eLanguageDir: /ru/\"]\n    end\n    \n    subgraph \"Translation Files\"\n        EN_I18N[\"i18n/en.toml\u003cbr/\u003e147 translation keys\"]\n        ES_I18N[\"i18n/es.toml\u003cbr/\u003eSpanish translations\"]\n        RU_I18N[\"i18n/ru.toml\u003cbr/\u003eRussian translations\"]\n    end\n    \n    subgraph \"Menu Generation\"\n        MENU_HTML[\"layouts/partials/menu.html\"]\n        SELECT_LANG[\"Language Selector\"]\n        LANG_SWITCH[\"Dynamic Language Switching\"]\n    end\n    \n    subgraph \"URL Structure\"\n        ROOT_URL[\"docs.suitecrm.com/\u003cbr/\u003eEnglish (default)\"]\n        ES_URL[\"docs.suitecrm.com/es/\u003cbr/\u003eSpanish\"]\n        RU_URL[\"docs.suitecrm.com/ru/\u003cbr/\u003eRussian\"]\n    end\n    \n    EN_CONFIG --\u003e EN_I18N\n    ES_CONFIG --\u003e ES_I18N\n    RU_CONFIG --\u003e RU_I18N\n    \n    EN_I18N --\u003e MENU_HTML\n    ES_I18N --\u003e MENU_HTML\n    RU_I18N --\u003e MENU_HTML\n    \n    MENU_HTML --\u003e SELECT_LANG\n    SELECT_LANG --\u003e LANG_SWITCH\n    \n    EN_CONFIG --\u003e ROOT_URL\n    ES_CONFIG --\u003e ES_URL\n    RU_CONFIG --\u003e RU_URL\n```\n\n**Sources:** [config.toml:28-118](), [i18n/en.toml:1-147](), [i18n/ru.toml:1-142](), [layouts/partials/menu.html:92-131]()\n\n## Content Organization and Navigation\n\nThe documentation content follows a hierarchical structure with specialized sections for different user types and use cases:\n\n```mermaid\ngraph TD\n    subgraph \"Main Navigation Structure\"\n        DOCS_ROOT[\"Documentation Root\"]\n        USER_GUIDE[\"user/\u003cbr/\u003eEnd User Documentation\"]\n        ADMIN_GUIDE[\"admin/\u003cbr/\u003eAdministrator Guide\"]\n        DEV_GUIDE[\"developer/\u003cbr/\u003eDeveloper Documentation\"]\n        COMMUNITY[\"community/\u003cbr/\u003eCommunity Guidelines\"]\n        BLOG[\"blog/\u003cbr/\u003eTechnical Blog\"]\n    end\n    \n    subgraph \"Menu System\"\n        TOP_MENU[\"layouts/partials/menu.html\u003cbr/\u003eLine 64-75\"]\n        SIDEBAR_NAV[\"Sidebar Navigation\u003cbr/\u003eSection Tree\"]\n        BREADCRUMBS[\"Breadcrumb Navigation\u003cbr/\u003eheader.html\"]\n    end\n    \n    subgraph \"Content Processing\"\n        ASCIIDOC[\"*.adoc files\u003cbr/\u003eAsciiDoc Format\"]\n        MARKDOWN[\"*.md files\u003cbr/\u003eMarkdown Format\"]\n        HUGO_PROCESS[\"Hugo Processing\u003cbr/\u003eStatic Generation\"]\n    end\n    \n    DOCS_ROOT --\u003e USER_GUIDE\n    DOCS_ROOT --\u003e ADMIN_GUIDE\n    DOCS_ROOT --\u003e DEV_GUIDE\n    DOCS_ROOT --\u003e COMMUNITY\n    DOCS_ROOT --\u003e BLOG\n    \n    TOP_MENU --\u003e SIDEBAR_NAV\n    SIDEBAR_NAV --\u003e BREADCRUMBS\n    \n    ASCIIDOC --\u003e HUGO_PROCESS\n    MARKDOWN --\u003e HUGO_PROCESS\n    HUGO_PROCESS --\u003e SIDEBAR_NAV\n```\n\n**Sources:** [layouts/partials/menu.html:64-75](), [layouts/partials/header.html:68-85](), [content/community/contributing-code/Forking.adoc:1-57]()\n\n## Build and Deployment Pipeline\n\n```mermaid\ngraph LR\n    subgraph \"Source Control\"\n        GITHUB[\"GitHub Repository\u003cbr/\u003esalesagility/SuiteDocs\"]\n        MASTER[\"master branch\"]\n        PR[\"Pull Requests\"]\n    end\n    \n    subgraph \"Build Configuration\"\n        BUILD_SH[\"build.sh\u003cbr/\u003eCustom Build Script\"]\n        NETLIFY_TOML[\"netlify.toml\u003cbr/\u003eBuild Commands\"]\n        HUGO_CONFIG[\"Hugo v0.85.0\u003cbr/\u003eStatic Generation\"]\n    end\n    \n    subgraph \"Build Process\"\n        CHMOD[\"chmod +x build.sh\"]\n        BUNDLE[\"Ruby Bundle\u003cbr/\u003eAsciiDoctor\"]\n        HUGO_BUILD[\"Hugo Build\u003cbr/\u003eStatic Site Generation\"]\n        CSS_COMPILE[\"CSS Processing\u003cbr/\u003etheme-suitecrm.css\"]\n    end\n    \n    subgraph \"Deployment Targets\"\n        PRODUCTION[\"docs.suitecrm.com\u003cbr/\u003eProduction Site\"]\n        DEPLOY_PREVIEW[\"Deploy Previews\u003cbr/\u003ePR Testing\"]\n        BRANCH_DEPLOY[\"Branch Deployments\u003cbr/\u003eFeature Testing\"]\n    end\n    \n    GITHUB --\u003e MASTER\n    GITHUB --\u003e PR\n    \n    MASTER --\u003e BUILD_SH\n    PR --\u003e BUILD_SH\n    \n    BUILD_SH --\u003e NETLIFY_TOML\n    NETLIFY_TOML --\u003e HUGO_CONFIG\n    \n    HUGO_CONFIG --\u003e CHMOD\n    CHMOD --\u003e BUNDLE\n    BUNDLE --\u003e HUGO_BUILD\n    HUGO_BUILD --\u003e CSS_COMPILE\n    \n    CSS_COMPILE --\u003e PRODUCTION\n    CSS_COMPILE --\u003e DEPLOY_PREVIEW\n    CSS_COMPILE --\u003e BRANCH_DEPLOY\n```\n\n**Sources:** [netlify.toml:3-6](), [netlify.toml:15-21](), [netlify.toml:22-27](), [README.md:21-29]()\n\n## Theme and Styling System\n\nThe documentation uses a customized version of the Hugo Learn theme with SuiteCRM-specific styling and branding:\n\n```mermaid\ngraph TB\n    subgraph \"Theme Architecture\"\n        HUGO_THEME[\"hugo-theme-learn\u003cbr/\u003eBase Theme\"]\n        THEME_VARIANT[\"themeVariant: suitecrm\u003cbr/\u003econfig.toml:22\"]\n        THEME_CSS[\"static/css/theme-suitecrm.css\u003cbr/\u003e1401 lines\"]\n    end\n    \n    subgraph \"CSS Structure\"\n        CSS_VARS[\"CSS Variables\u003cbr/\u003eLines 1-21\"]\n        MAIN_CONTENT[\"Main Content Styles\u003cbr/\u003eLines 23-321\"]\n        WEB_NAV[\"Web Navigation\u003cbr/\u003eLines 393-537\"]\n        SIDEBAR[\"Sidebar Styles\u003cbr/\u003eLines 601-837\"]\n        RESPONSIVE[\"Media Queries\u003cbr/\u003eLines 1103-1322\"]\n    end\n    \n    subgraph \"Color Scheme\"\n        PRIMARY[\"--MAIN-LINK-color: #ED6758\"]\n        MENU_BG[\"--MENU-HEADER-BG-color: #5C566A\"]\n        SEARCH_BG[\"--MENU-SEARCH-BG-color: #696D7D\"]\n        ACTIVE_BG[\"--MENU-SECTIONS-ACTIVE-BG-color: #fff\"]\n    end\n    \n    subgraph \"Layout Components\"\n        HEADER[\"layouts/partials/header.html\u003cbr/\u003eCSS Includes\"]\n        MENU_PARTIAL[\"layouts/partials/menu.html\u003cbr/\u003eNavigation Structure\"]\n        SEARCH[\"layouts/partials/search.html\u003cbr/\u003eSearch Interface\"]\n    end\n    \n    HUGO_THEME --\u003e THEME_VARIANT\n    THEME_VARIANT --\u003e THEME_CSS\n    \n    THEME_CSS --\u003e CSS_VARS\n    THEME_CSS --\u003e MAIN_CONTENT\n    THEME_CSS --\u003e WEB_NAV\n    THEME_CSS --\u003e SIDEBAR\n    THEME_CSS --\u003e RESPONSIVE\n    \n    CSS_VARS --\u003e PRIMARY\n    CSS_VARS --\u003e MENU_BG\n    CSS_VARS --\u003e SEARCH_BG\n    CSS_VARS --\u003e ACTIVE_BG\n    \n    HEADER --\u003e CSS_VARS\n    MENU_PARTIAL --\u003e SIDEBAR\n    SEARCH --\u003e SEARCH_BG\n```\n\n**Sources:** [static/css/theme-suitecrm.css:1-21](), [static/css/theme-suitecrm.css:393-537](), [layouts/partials/header.html:13-25](), [layouts/partials/search.html:1-20]()\n\n## Search and Navigation Features\n\n```mermaid\ngraph LR\n    subgraph \"Search System\"\n        LUNR[\"lunr.min.js\u003cbr/\u003eSearch Engine\"]\n        LUNR_MULTI[\"lunr.multi.js\u003cbr/\u003eMulti-language\"]\n        LUNR_RU[\"lunr.ru.js\u003cbr/\u003eRussian Support\"]\n        SEARCH_JS[\"search.js\u003cbr/\u003eSearch Interface\"]\n    end\n    \n    subgraph \"Navigation Features\"\n        VISITED_LINKS[\"showVisitedLinks: true\u003cbr/\u003eRead Status Tracking\"]\n        BREADCRUMBS[\"Breadcrumb Navigation\u003cbr/\u003eheader.html:68-85\"]\n        SIDEBAR_TOGGLE[\"Mobile Sidebar Toggle\u003cbr/\u003eResponsive Design\"]\n        EDIT_LINKS[\"GitHub Edit Links\u003cbr/\u003eIssue Reporting\"]\n    end\n    \n    subgraph \"User Interface\"\n        SEARCH_BOX[\"Search Input Box\u003cbr/\u003eAuto-complete\"]\n        LANG_SELECTOR[\"Language Selector\u003cbr/\u003eDropdown Menu\"]\n        TOP_BAR[\"Top Navigation Bar\u003cbr/\u003eGuide Categories\"]\n        GITHUB_LINKS[\"GitHub Integration\u003cbr/\u003eEdit/Issue Links\"]\n    end\n    \n    LUNR --\u003e SEARCH_BOX\n    LUNR_MULTI --\u003e SEARCH_BOX\n    LUNR_RU --\u003e SEARCH_BOX\n    SEARCH_JS --\u003e SEARCH_BOX\n    \n    VISITED_LINKS --\u003e SIDEBAR_TOGGLE\n    BREADCRUMBS --\u003e TOP_BAR\n    SIDEBAR_TOGGLE --\u003e LANG_SELECTOR\n    EDIT_LINKS --\u003e GITHUB_LINKS\n```\n\n**Sources:** [layouts/partials/search.html:7-19](), [layouts/partials/header.html:49-66](), [config.toml:21](), [layouts/partials/menu.html:190-196]()"])</script><script>self.__next_f.push([1,"15:T2a41,"])</script><script>self.__next_f.push([1,"# Documentation Structure\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [.github/ISSUE_TEMPLATE.md](.github/ISSUE_TEMPLATE.md)\n- [.github/ISSUE_TEMPLATE.md.NOT](.github/ISSUE_TEMPLATE.md.NOT)\n- [LICENSE.md](LICENSE.md)\n- [README.md](README.md)\n- [archetypes/blog.md](archetypes/blog.md)\n- [archetypes/default.md](archetypes/default.md)\n- [content/_index.en.md](content/_index.en.md)\n- [content/admin/Compatibility Matrix.adoc](content/admin/Compatibility Matrix.adoc)\n- [i18n/en.toml](i18n/en.toml)\n- [layouts/index.html](layouts/index.html)\n- [layouts/partials/header.html](layouts/partials/header.html)\n- [layouts/partials/menu.html](layouts/partials/menu.html)\n- [layouts/partials/search.html](layouts/partials/search.html)\n- [static/css/theme-suitecrm.css](static/css/theme-suitecrm.css)\n- [static/css/theme.css](static/css/theme.css)\n- [static/images/favicon.png](static/images/favicon.png)\n- [themes/hugo-theme-learn/layouts/partials/menu.html](themes/hugo-theme-learn/layouts/partials/menu.html)\n\n\u003c/details\u003e\n\n\n\nThis document explains how the SuiteCRM documentation is organized across different user types, content categories, and technical implementation. It covers the hierarchical structure of documentation sections, content organization patterns, and navigation systems that make up the SuiteDocs repository.\n\nFor information about the technical build process and deployment pipeline, see [Documentation System Architecture](#2). For details about contributing to documentation, see [Contributing to Documentation](#8.1).\n\n## Documentation Organization Hierarchy\n\nThe SuiteDocs repository follows a structured approach to organize documentation content across multiple dimensions: user types, SuiteCRM versions, and content categories.\n\n```mermaid\ngraph TD\n    DOCS[\"SuiteDocs Root\"]\n    \n    subgraph \"Primary Navigation Sections\"\n        USER[\"User Guide\u003cbr/\u003e/user/\"]\n        DEV[\"Developer Guide\u003cbr/\u003e/developer/\"]\n        ADMIN[\"Administrator Guide\u003cbr/\u003e/admin/\"]\n        COMMUNITY[\"Community\u003cbr/\u003e/community/\"]\n        BLOG[\"Technical Blog\u003cbr/\u003e/blog/\"]\n    end\n    \n    subgraph \"Content Categories by User Type\"\n        USER_CONTENT[\"Core Modules\u003cbr/\u003eAdvanced Features\u003cbr/\u003eUser Interface\"]\n        DEV_CONTENT[\"API Documentation\u003cbr/\u003eExtensions\u003cbr/\u003eCustomization\"]\n        ADMIN_CONTENT[\"Installation\u003cbr/\u003eConfiguration\u003cbr/\u003eMaintenance\"]\n        COMM_CONTENT[\"Contributing\u003cbr/\u003eIssue Reporting\u003cbr/\u003eTranslation\"]\n    end\n    \n    subgraph \"Version-Specific Documentation\"\n        V7[\"SuiteCRM 7.x\u003cbr/\u003e7.8 - 7.14\"]\n        V8[\"SuiteCRM 8.x\u003cbr/\u003e8.0 - 8.8\"]\n        API4[\"API v4.1\u003cbr/\u003eSOAP \u0026 REST\"]\n        API8[\"API v8\u003cbr/\u003eJSON API\"]\n    end\n    \n    DOCS --\u003e USER\n    DOCS --\u003e DEV\n    DOCS --\u003e ADMIN\n    DOCS --\u003e COMMUNITY\n    DOCS --\u003e BLOG\n    \n    USER --\u003e USER_CONTENT\n    DEV --\u003e DEV_CONTENT\n    ADMIN --\u003e ADMIN_CONTENT\n    COMMUNITY --\u003e COMM_CONTENT\n    \n    USER_CONTENT --\u003e V7\n    USER_CONTENT --\u003e V8\n    DEV_CONTENT --\u003e API4\n    DEV_CONTENT --\u003e API8\n    ADMIN_CONTENT --\u003e V7\n    ADMIN_CONTENT --\u003e V8\n```\n\n**Top-Level Navigation Structure Implementation**\n\nThe main navigation is implemented in the menu template system, with distinct sections for different user audiences.\n\nSources: [layouts/partials/menu.html:64-75](), [i18n/en.toml:40-62]()\n\n## Content File Organization\n\nThe documentation content follows a hierarchical file structure that mirrors the logical organization of information.\n\n```mermaid\ngraph TB\n    CONTENT[\"content/\"]\n    \n    subgraph \"Language Directories\"\n        EN[\"_index.en.md\"]\n        ES[\"es/ (Spanish)\"]\n        RU[\"ru/ (Russian)\"]\n    end\n    \n    subgraph \"Section Directories\"\n        ADMIN_DIR[\"admin/\"]\n        USER_DIR[\"user/\"]\n        DEV_DIR[\"developer/\"]\n        COMM_DIR[\"community/\"]\n        BLOG_DIR[\"blog/\"]\n    end\n    \n    subgraph \"Content Types\"\n        ADOC[\"AsciiDoc Files\u003cbr/\u003e*.adoc\"]\n        MD[\"Markdown Files\u003cbr/\u003e*.md\"]\n        ASSETS[\"Images \u0026 Assets\u003cbr/\u003e/static/\"]\n    end\n    \n    subgraph \"Example Admin Content\"\n        COMPAT[\"Compatibility Matrix.adoc\"]\n        INSTALL[\"Installation guides\"]\n        CONFIG[\"Configuration docs\"]\n    end\n    \n    CONTENT --\u003e EN\n    CONTENT --\u003e ES\n    CONTENT --\u003e RU\n    \n    CONTENT --\u003e ADMIN_DIR\n    CONTENT --\u003e USER_DIR\n    CONTENT --\u003e DEV_DIR\n    CONTENT --\u003e COMM_DIR\n    CONTENT --\u003e BLOG_DIR\n    \n    ADMIN_DIR --\u003e COMPAT\n    ADMIN_DIR --\u003e INSTALL\n    ADMIN_DIR --\u003e CONFIG\n    \n    ADOC --\u003e ADMIN_DIR\n    MD --\u003e USER_DIR\n    ASSETS --\u003e CONTENT\n```\n\n**File Naming and Weight System**\n\nContent files use Hugo's weight system for ordering and AsciiDoc/Markdown frontmatter for metadata. The compatibility matrix demonstrates structured tabular documentation.\n\nSources: [content/admin/Compatibility Matrix.adoc:1-4](), [content/_index.en.md:1-6](), [archetypes/default.md:1-6]()\n\n## Navigation System Implementation\n\nThe site navigation is implemented through Hugo's template system with multi-level menu generation and language switching capabilities.\n\n```mermaid\ngraph LR\n    subgraph \"Navigation Templates\"\n        MENU_PARTIAL[\"menu.html\"]\n        HEADER_PARTIAL[\"header.html\"]\n        SEARCH_PARTIAL[\"search.html\"]\n    end\n    \n    subgraph \"Menu Generation Logic\"\n        SECTION_TREE[\"section-tree-nav template\"]\n        WEIGHT_ORDER[\"ordersectionsby: weight\"]\n        VISITED_LINKS[\"showVisitedLinks\"]\n    end\n    \n    subgraph \"Top Navigation Bar\"\n        TOP_MENU[\"topmenu\"]\n        GUIDES_MENU[\"Guides dropdown\"]\n        LANG_SELECT[\"Language selector\"]\n    end\n    \n    subgraph \"Sidebar Navigation\"\n        SIDEBAR[\"#sidebar\"]\n        TOPICS_UL[\"ul.topics\"]\n        SEARCH_BOX[\"searchbox\"]\n    end\n    \n    MENU_PARTIAL --\u003e SECTION_TREE\n    MENU_PARTIAL --\u003e TOP_MENU\n    MENU_PARTIAL --\u003e SIDEBAR\n    \n    SECTION_TREE --\u003e WEIGHT_ORDER\n    SECTION_TREE --\u003e VISITED_LINKS\n    \n    TOP_MENU --\u003e GUIDES_MENU\n    SIDEBAR --\u003e TOPICS_UL\n    SIDEBAR --\u003e SEARCH_BOX\n    SIDEBAR --\u003e LANG_SELECT\n```\n\n**Menu Template Structure**\n\nThe navigation system uses recursive template generation to build hierarchical menus based on Hugo's content structure.\n\nSources: [layouts/partials/menu.html:134-146](), [layouts/partials/menu.html:179-236](), [layouts/partials/header.html:67-85]()\n\n## Multi-Language Documentation Structure\n\nThe documentation supports multiple languages through Hugo's multi-language configuration and i18n templates.\n\n| Language | Path Prefix | Configuration File | Status |\n|----------|-------------|-------------------|---------|\n| English | `/` (root) | `i18n/en.toml` | Primary language |\n| Spanish | `/es/` | `i18n/es.toml` | Secondary language |\n| Russian | `/ru/` | `i18n/ru.toml` | Secondary language |\n\n```mermaid\ngraph TD\n    subgraph \"Language Infrastructure\"\n        I18N[\"i18n/ directory\"]\n        EN_TOML[\"en.toml\"]\n        ES_TOML[\"es.toml\"] \n        RU_TOML[\"ru.toml\"]\n    end\n    \n    subgraph \"Content Translation\"\n        EN_CONTENT[\"English content\u003cbr/\u003e(default)\"]\n        ES_CONTENT[\"Spanish content\u003cbr/\u003e/es/ prefix\"]\n        RU_CONTENT[\"Russian content\u003cbr/\u003e/ru/ prefix\"]\n    end\n    \n    subgraph \"UI Translation Keys\"\n        NAV_KEYS[\"Navigation labels\"]\n        SEARCH_KEYS[\"Search placeholders\"]\n        GUIDE_KEYS[\"Guide section names\"]\n        ACTION_KEYS[\"Action button text\"]\n    end\n    \n    I18N --\u003e EN_TOML\n    I18N --\u003e ES_TOML\n    I18N --\u003e RU_TOML\n    \n    EN_TOML --\u003e EN_CONTENT\n    ES_TOML --\u003e ES_CONTENT\n    RU_TOML --\u003e RU_CONTENT\n    \n    EN_TOML --\u003e NAV_KEYS\n    EN_TOML --\u003e SEARCH_KEYS\n    EN_TOML --\u003e GUIDE_KEYS\n    EN_TOML --\u003e ACTION_KEYS\n```\n\n**Language Switching Implementation**\n\nThe language selector is implemented in the sidebar with dropdown functionality and automatic URL translation.\n\nSources: [layouts/partials/menu.html:92-132](), [i18n/en.toml:1-147](), [layouts/partials/search.html:13-18]()\n\n## Content Types and Styling\n\nThe documentation system supports different content types with specialized styling and formatting.\n\n| Content Type | File Extension | Primary Use | Styling Classes |\n|--------------|---------------|-------------|-----------------|\n| AsciiDoc | `.adoc` | Structured documentation | `.admonition`, `.listingblock` |\n| Markdown | `.md` | Simple content pages | `.markdown-body` |\n| Blog Posts | `.md` | Technical blog content | `.blog-post`, `.tags` |\n| Compatibility Tables | `.adoc` | Version matrices | `#smaller-table-spacing` |\n\n```mermaid\ngraph LR\n    subgraph \"Content Processing Pipeline\"\n        ASCIIDOC[\"AsciiDoc\u003cbr/\u003e*.adoc files\"]\n        MARKDOWN[\"Markdown\u003cbr/\u003e*.md files\"]\n        HUGO_PROC[\"Hugo Processing\"]\n        STYLED_OUTPUT[\"Styled HTML Output\"]\n    end\n    \n    subgraph \"CSS Theme System\"\n        BASE_THEME[\"theme.css\"]\n        SUITE_THEME[\"theme-suitecrm.css\"]\n        CUSTOM_STYLES[\"Custom component styles\"]\n    end\n    \n    subgraph \"Special Content Features\"\n        TABLES[\"Compatibility matrices\"]\n        NOTICES[\"Info/Warning boxes\"]\n        CODE_BLOCKS[\"Syntax highlighting\"]\n        NAV_BREADCRUMBS[\"Breadcrumb navigation\"]\n    end\n    \n    ASCIIDOC --\u003e HUGO_PROC\n    MARKDOWN --\u003e HUGO_PROC\n    HUGO_PROC --\u003e STYLED_OUTPUT\n    \n    BASE_THEME --\u003e STYLED_OUTPUT\n    SUITE_THEME --\u003e STYLED_OUTPUT\n    \n    STYLED_OUTPUT --\u003e TABLES\n    STYLED_OUTPUT --\u003e NOTICES\n    STYLED_OUTPUT --\u003e CODE_BLOCKS\n    STYLED_OUTPUT --\u003e NAV_BREADCRUMBS\n```\n\n**Specialized Table Styling**\n\nThe compatibility matrix uses custom CSS classes for compact table display with version-specific formatting.\n\nSources: [static/css/theme-suitecrm.css:119-128](), [content/admin/Compatibility Matrix.adoc:10-47](), [static/css/theme.css:726-737]()\n\n## Homepage Structure and Call-to-Action System\n\nThe homepage implements a structured layout with multiple call-to-action sections targeting different user types.\n\n```mermaid\ngraph TD\n    subgraph \"Homepage Layout Components\"\n        TITLE_WRAP[\"home-title-wrap\"]\n        CTA_SECTION[\"home-ctas\"]\n        RECENT_SECTION[\"home-recent\"]\n    end\n    \n    subgraph \"Call-to-Action Blocks\"\n        CTA1[\"home-cta1\u003cbr/\u003eGetting Started\"]\n        CTA2[\"home-cta2\u003cbr/\u003eUsing SuiteCRM\"]\n        CTA3[\"home-cta3\u003cbr/\u003eContributing\"]\n    end\n    \n    subgraph \"Dynamic Content Areas\"\n        BLOG_LATEST[\"home-blog-latest\u003cbr/\u003eRecent blog posts\"]\n        RECENTLY_EDITED[\"home-recently-edited\u003cbr/\u003eDocumentation updates\"]\n    end\n    \n    TITLE_WRAP --\u003e CTA_SECTION\n    CTA_SECTION --\u003e CTA1\n    CTA_SECTION --\u003e CTA2\n    CTA_SECTION --\u003e CTA3\n    \n    CTA_SECTION --\u003e RECENT_SECTION\n    RECENT_SECTION --\u003e BLOG_LATEST\n    RECENT_SECTION --\u003e RECENTLY_EDITED\n```\n\n**Homepage Template Implementation**\n\nThe homepage uses partial templates for modular content blocks with responsive flex layout.\n\nSources: [layouts/index.html:7-38](), [static/css/theme-suitecrm.css:873-1100](), [i18n/en.toml:70-147]()"])</script><script>self.__next_f.push([1,"16:T2f0b,"])</script><script>self.__next_f.push([1,"# Documentation System Architecture\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [LICENSE.md](LICENSE.md)\n- [README.md](README.md)\n- [archetypes/blog.md](archetypes/blog.md)\n- [archetypes/default.md](archetypes/default.md)\n- [config.toml](config.toml)\n- [content/community/contributing-code/Forking.adoc](content/community/contributing-code/Forking.adoc)\n- [i18n/ru.toml](i18n/ru.toml)\n- [layouts/_default/single.html](layouts/_default/single.html)\n- [layouts/partials/header-link.html](layouts/partials/header-link.html)\n- [netlify.toml](netlify.toml)\n\n\u003c/details\u003e\n\n\n\nThis document describes the technical architecture of the SuiteDocs documentation system, including the static site generation pipeline, content processing, multi-language support, and deployment infrastructure. The system transforms AsciiDoc and Markdown source files into a multi-language documentation website using Hugo and deploys it via Netlify.\n\nFor information about contributing content to the documentation, see [Contributing to Documentation](#8.1). For details about the SuiteCRM versions covered, see [SuiteCRM Version Documentation](#3).\n\n## System Overview\n\nThe SuiteDocs system is a Hugo-based static site generator that processes documentation content written in AsciiDoc format and deploys it as a multi-language website. The architecture follows a content-first approach where documentation authors write in markup formats, and the system handles rendering, navigation generation, and deployment automatically.\n\n```mermaid\ngraph TB\n    subgraph \"Source Content\"\n        ADOC[\"AsciiDoc Files\u003cbr/\u003e*.adoc\"]\n        MD[\"Markdown Files\u003cbr/\u003e*.md\"] \n        IMAGES[\"Static Assets\u003cbr/\u003eimages/, css/\"]\n        I18N[\"Translation Files\u003cbr/\u003ei18n/*.toml\"]\n    end\n    \n    subgraph \"Hugo Configuration\"\n        CONFIG[\"config.toml\u003cbr/\u003eSite Configuration\"]\n        THEME[\"hugo-theme-learn\u003cbr/\u003eDocumentation Theme\"]\n        LAYOUTS[\"layouts/\u003cbr/\u003eCustom Templates\"]\n        ARCHETYPES[\"archetypes/\u003cbr/\u003eContent Templates\"]\n    end\n    \n    subgraph \"Build Pipeline\"\n        HUGO_ENGINE[\"Hugo Engine\u003cbr/\u003ev0.85.0\"]\n        ASCIIDOCTOR[\"AsciiDoctor\u003cbr/\u003eRuby Engine\"]\n        BUILD_SCRIPT[\"build.sh\u003cbr/\u003eBuild Script\"]\n    end\n    \n    subgraph \"Deployment\"\n        NETLIFY[\"Netlify Platform\"]\n        PREVIEW[\"Deploy Previews\"]\n        PRODUCTION[\"docs.suitecrm.com\"]\n    end\n    \n    ADOC --\u003e HUGO_ENGINE\n    MD --\u003e HUGO_ENGINE\n    IMAGES --\u003e HUGO_ENGINE\n    I18N --\u003e HUGO_ENGINE\n    \n    CONFIG --\u003e HUGO_ENGINE\n    THEME --\u003e HUGO_ENGINE\n    LAYOUTS --\u003e HUGO_ENGINE\n    ARCHETYPES --\u003e HUGO_ENGINE\n    \n    HUGO_ENGINE --\u003e ASCIIDOCTOR\n    ASCIIDOCTOR --\u003e BUILD_SCRIPT\n    BUILD_SCRIPT --\u003e NETLIFY\n    \n    NETLIFY --\u003e PREVIEW\n    NETLIFY --\u003e PRODUCTION\n```\n\n**Hugo Configuration and Content Processing Architecture**\n\nSources: [config.toml:1-118](), [README.md:11-18](), [netlify.toml:1-32]()\n\n## Hugo Configuration System\n\nThe Hugo configuration is centralized in `config.toml`, which defines site-wide settings, language configurations, and theme parameters. The configuration uses TOML format and establishes the foundation for the entire documentation system.\n\n### Core Site Configuration\n\n| Configuration Key | Value | Purpose |\n|------------------|-------|---------|\n| `baseURL` | `\"https://docs.suitecrm.com\"` | Production site URL |\n| `theme` | `\"hugo-theme-learn\"` | Documentation theme |\n| `metaDataFormat` | `\"yaml\"` | Front matter format |\n| `timeout` | `47000` | Build timeout (ms) |\n| `enableGitInfo` | `true` | Git integration for edit links |\n\nThe site uses the Learn theme variant specifically customized for SuiteCRM (`themeVariant = \"suitecrm\"`), which provides documentation-focused navigation and styling.\n\n### Multi-Language Configuration\n\nThe system supports three languages with distinct configurations:\n\n```mermaid\ngraph LR\n    subgraph \"Language Configuration\"\n        EN[\"Languages.en\u003cbr/\u003eWeight: 1\u003cbr/\u003eDir: /\"]\n        ES[\"Languages.es\u003cbr/\u003eWeight: 2\u003cbr/\u003eDir: /es/\"]\n        RU[\"Languages.ru\u003cbr/\u003eWeight: 3\u003cbr/\u003eDir: /ru/\"]\n    end\n    \n    subgraph \"Translation Files\"\n        EN_I18N[\"i18n/en.toml\u003cbr/\u003e(Default)\"]\n        ES_I18N[\"i18n/es.toml\u003cbr/\u003e(Not shown)\"]\n        RU_I18N[\"i18n/ru.toml\u003cbr/\u003eRussian Translations\"]\n    end\n    \n    subgraph \"Menu Configuration\"\n        EN_MENU[\"English Menus\u003cbr/\u003eGitHub, Blog, Credits\"]\n        ES_MENU[\"Spanish Menus\u003cbr/\u003eGitHub, Blog, Gracias\"]\n        RU_MENU[\"Russian Menus\u003cbr/\u003e(Minimal)\"]\n    end\n    \n    EN --\u003e EN_I18N\n    ES --\u003e ES_I18N\n    RU --\u003e RU_I18N\n    \n    EN --\u003e EN_MENU\n    ES --\u003e ES_MENU\n    RU --\u003e RU_MENU\n```\n\n**Multi-Language System Architecture**\n\nEach language defines its own menu shortcuts, titles, and URL structure. The Russian translation file contains comprehensive translations for UI elements like navigation, search, and page actions.\n\nSources: [config.toml:28-118](), [i18n/ru.toml:1-142]()\n\n## Content Processing Pipeline\n\nThe documentation system processes content through a multi-stage pipeline that transforms source markup into the final website. The process integrates AsciiDoc processing with Hugo's static site generation.\n\n### Build Process Flow\n\n```mermaid\nflowchart TD\n    subgraph \"Content Input\"\n        SOURCE_ADOC[\"Source .adoc Files\u003cbr/\u003econtent/**/*.adoc\"]\n        SOURCE_MD[\"Source .md Files\u003cbr/\u003econtent/**/*.md\"]\n        STATIC_FILES[\"Static Files\u003cbr/\u003estatic/\"]\n    end\n    \n    subgraph \"Hugo Processing\"\n        FRONT_MATTER[\"Front Matter\u003cbr/\u003eParsing (YAML)\"]\n        CONTENT_PROC[\"Content Processing\u003cbr/\u003eHugo + AsciiDoctor\"]\n        TEMPLATE_RENDER[\"Template Rendering\u003cbr/\u003elayouts/\"]\n        MENU_GEN[\"Menu Generation\u003cbr/\u003eBased on Weight\"]\n    end\n    \n    subgraph \"Build Script\"\n        BUILD_SH[\"build.sh\u003cbr/\u003echmod +x \u0026\u0026 execute\"]\n        HUGO_CMD[\"hugo command\u003cbr/\u003ewith baseURL\"]\n        PUBLIC_DIR[\"public/\u003cbr/\u003eGenerated Site\"]\n    end\n    \n    subgraph \"Netlify Deploy\"\n        NETLIFY_CONFIG[\"netlify.toml\u003cbr/\u003eDeploy Configuration\"]\n        DEPLOY_PREVIEW[\"Deploy Preview\u003cbr/\u003eDEPLOY_PRIME_URL\"]\n        PRODUCTION_DEPLOY[\"Production Deploy\u003cbr/\u003edocs.suitecrm.com\"]\n    end\n    \n    SOURCE_ADOC --\u003e FRONT_MATTER\n    SOURCE_MD --\u003e FRONT_MATTER\n    STATIC_FILES --\u003e CONTENT_PROC\n    \n    FRONT_MATTER --\u003e CONTENT_PROC\n    CONTENT_PROC --\u003e TEMPLATE_RENDER\n    TEMPLATE_RENDER --\u003e MENU_GEN\n    \n    MENU_GEN --\u003e BUILD_SH\n    BUILD_SH --\u003e HUGO_CMD\n    HUGO_CMD --\u003e PUBLIC_DIR\n    \n    PUBLIC_DIR --\u003e NETLIFY_CONFIG\n    NETLIFY_CONFIG --\u003e DEPLOY_PREVIEW\n    NETLIFY_CONFIG --\u003e PRODUCTION_DEPLOY\n```\n\n**Content Processing and Deployment Pipeline**\n\nThe `build.sh` script serves as the entry point for the build process, making the script executable and running Hugo with appropriate parameters based on the deployment context (production vs. preview).\n\nSources: [netlify.toml:3-6](), [netlify.toml:17-17](), [README.md:14-17]()\n\n## Template and Layout System\n\nThe documentation system uses Hugo's layout system with custom templates that extend the Learn theme. The layout system provides consistent structure across all documentation pages while allowing for customization.\n\n### Layout Components\n\n| Component | File Path | Purpose |\n|-----------|-----------|---------|\n| Single Page Layout | `layouts/_default/single.html` | Individual page rendering |\n| Header Link Processing | `layouts/partials/header-link.html` | Auto-linking headers |\n| Content Archetypes | `archetypes/default.md` | Default page templates |\n| Blog Archetypes | `archetypes/blog.md` | Blog post templates |\n\nThe single page layout includes footer information with author details and modification dates, extracted from Git information when `enableGitInfo` is enabled.\n\n### Header Link Generation\n\nThe system automatically generates anchor links for headers using a regex replacement in `header-link.html`:\n\n```mermaid\ngraph LR\n    subgraph \"Header Processing\"\n        INPUT[\"Raw HTML Headers\u003cbr/\u003eh2-h9 elements\"]\n        REGEX[\"RegEx Replacement\u003cbr/\u003eheader-link.html\"]\n        OUTPUT[\"Linked Headers\u003cbr/\u003ewith anchor icons\"]\n    end\n    \n    subgraph \"Regex Pattern\"\n        PATTERN[\"(\u003ch[2-9] id=\\\"([^\\\"]+)\\\"\u003e)(.+)(\u003c/h[2-9]+\u003e)\"]\n        REPLACEMENT[\"${1}\u003ca class=\\\"header-icon-link\\\"\u003cbr/\u003ehref=\\\"#${2}\\\"\u003e${3}\u003cbr/\u003e\u003ci class=\\\"fas fa-link\\\"\u003e\u003c/i\u003e\u003c/a\u003e${4}\"]\n    end\n    \n    INPUT --\u003e REGEX\n    REGEX --\u003e PATTERN\n    PATTERN --\u003e REPLACEMENT\n    REPLACEMENT --\u003e OUTPUT\n```\n\n**Header Link Auto-Generation System**\n\nThis processing automatically adds clickable anchor links to all headers (h2-h9), improving navigation within long documentation pages.\n\nSources: [layouts/_default/single.html:1-14](), [layouts/partials/header-link.html:1-2](), [archetypes/default.md:1-6](), [archetypes/blog.md:1-15]()\n\n## Netlify Deployment Configuration\n\nThe deployment system uses Netlify with environment-specific configurations defined in `netlify.toml`. The configuration supports multiple deployment contexts including production, deploy previews, and branch deployments.\n\n### Deployment Contexts\n\n| Context | Command | Environment | Purpose |\n|---------|---------|-------------|---------|\n| Production | `chmod +x build.sh \u0026\u0026 ./build.sh` | `HUGO_ENV=production` | Main site deployment |\n| Deploy Preview | `chmod +x build.sh \u0026\u0026 ./build.sh -b $DEPLOY_PRIME_URL` | Hugo v0.85.0 | PR previews |\n| Branch Deploy | `chmod +x build.sh \u0026\u0026 ./build.sh -b $DEPLOY_PRIME_URL` | Hugo v0.85.0 | Feature branch testing |\n\nThe system uses Hugo version 0.85.0 consistently across all deployment contexts, with Ruby version 2.6.2 configured as an environment variable in Netlify's UI for AsciiDoctor support.\n\n### Build Configuration\n\n```mermaid\ngraph TB\n    subgraph \"Netlify Configuration\"\n        BUILD_CMD[\"command = 'chmod +x build.sh \u0026\u0026 ./build.sh'\"]\n        PUBLISH_DIR[\"publish = 'public'\"]\n        GIT_INFO[\"HUGO_ENABLEGITINFO = 'true'\"]\n    end\n    \n    subgraph \"Environment Variables\"\n        HUGO_VERSION[\"HUGO_VERSION = '0.85.0'\"]\n        HUGO_ENV[\"HUGO_ENV = 'production'\"]\n        HUGO_BASEURL[\"HUGO_BASEURL = 'https://docs.suitecrm.com'\"]\n        RUBY_VERSION[\"RUBY_VERSION = '2.6.2'\u003cbr/\u003e(UI Configuration)\"]\n    end\n    \n    subgraph \"Context-Specific\"\n        PRODUCTION[\"Production Context\u003cbr/\u003emaster branch\"]\n        PREVIEW[\"Deploy Preview Context\u003cbr/\u003e-b $DEPLOY_PRIME_URL\"]\n        BRANCH[\"Branch Deploy Context\u003cbr/\u003enon-master branches\"]\n    end\n    \n    BUILD_CMD --\u003e HUGO_VERSION\n    PUBLISH_DIR --\u003e HUGO_ENV\n    GIT_INFO --\u003e HUGO_BASEURL\n    \n    HUGO_VERSION --\u003e PRODUCTION\n    HUGO_ENV --\u003e PREVIEW\n    HUGO_BASEURL --\u003e BRANCH\n    \n    PRODUCTION --\u003e RUBY_VERSION\n    PREVIEW --\u003e RUBY_VERSION\n    BRANCH --\u003e RUBY_VERSION\n```\n\n**Netlify Deployment Configuration System**\n\nThe `$DEPLOY_PRIME_URL` variable is automatically provided by Netlify for preview deployments, allowing the build script to generate the site with the correct base URL for preview functionality.\n\nSources: [netlify.toml:1-32](), [README.md:17-17](), [README.md:21-29]()\n\n## Git Integration and Edit Links\n\nThe documentation system integrates with Git to provide edit functionality and track page modifications. This integration enables community contributions and maintains revision history.\n\n### Git Configuration Parameters\n\nThe site configuration includes several Git-related parameters that enable direct editing and issue reporting:\n\n| Parameter | Value | Function |\n|-----------|-------|----------|\n| `GitHubRepo` | `\"https://github.com/salesagility/SuiteDocs/\"` | Repository base URL |\n| `editURL` | `\"https://github.com/salesagility/SuiteDocs/edit/master/content/\"` | Edit link prefix |\n| `issueURL` | `\"https://github.com/salesagility/SuiteDocs/issues/new?\"` | Issue creation URL |\n| `enableGitInfo` | `true` | Enable Git metadata extraction |\n\nThe `enableGitInfo` setting allows Hugo to extract Git information for each page, including last modification date and author information, which is displayed in the page footer through the single page layout template.\n\nSources: [config.toml:13-21](), [layouts/_default/single.html:6-9]()"])</script><script>self.__next_f.push([1,"17:T27c5,"])</script><script>self.__next_f.push([1,"# Hugo Configuration and Build Process\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [Gemfile](Gemfile)\n- [Gemfile.lock](Gemfile.lock)\n- [_source/fixes.php](_source/fixes.php)\n- [_source/yamlize](_source/yamlize)\n- [config.toml](config.toml)\n- [content/community/contributing-code/Forking.adoc](content/community/contributing-code/Forking.adoc)\n- [content/developer/database-schema.adoc](content/developer/database-schema.adoc)\n- [i18n/ru.toml](i18n/ru.toml)\n- [layouts/_default/single.html](layouts/_default/single.html)\n- [layouts/partials/header-link.html](layouts/partials/header-link.html)\n- [netlify.toml](netlify.toml)\n- [static/images/en/developer/database-schema/schema.png](static/images/en/developer/database-schema/schema.png)\n- [static/images/en/developer/database-schema/schemaspy.png](static/images/en/developer/database-schema/schemaspy.png)\n- [static/images/ru/user/core-modules/Calls/image2.png](static/images/ru/user/core-modules/Calls/image2.png)\n- [static/images/ru/user/core-modules/Calls/image5.png](static/images/ru/user/core-modules/Calls/image5.png)\n- [static/images/ru/user/core-modules/Meetings/image2.png](static/images/ru/user/core-modules/Meetings/image2.png)\n\n\u003c/details\u003e\n\n\n\nThis document covers the Hugo static site generator configuration and build process used by the SuiteDocs documentation system. It details how content is processed from AsciiDoc sources into the final deployed website, including multi-language support and deployment workflows.\n\nFor information about multi-language content structure and translation workflows, see [Multi-language Support](#2.2). For deployment specifics and Netlify configuration, see [Netlify Deployment](#2.3).\n\n## Hugo Configuration Structure\n\nThe SuiteDocs system uses Hugo with a customized version of the `hugo-theme-learn` theme. The main configuration is defined in `config.toml`, which establishes the site structure, language settings, and integration parameters.\n\n### Core Site Configuration\n\nThe base Hugo configuration defines essential site properties and build behavior:\n\n```mermaid\ngraph TB\n    config[\"config.toml\"]\n    \n    subgraph \"Site Properties\"\n        baseURL[\"baseURL: docs.suitecrm.com\"]\n        theme[\"theme: hugo-theme-learn\"]\n        timeout[\"timeout: 47000\"]\n        gitinfo[\"enableGitInfo: true\"]\n    end\n    \n    subgraph \"Content Processing\"\n        metadata[\"metaDataFormat: yaml\"]\n        errors[\"ignoreErrors: error-remote-getjson\"]\n        outputs[\"outputs: HTML, RSS, JSON\"]\n    end\n    \n    subgraph \"Parameters\"\n        github[\"GitHubRepo\"]\n        editurl[\"editURL\"]\n        issueurl[\"issueURL\"]\n        variant[\"themeVariant: suitecrm\"]\n    end\n    \n    config --\u003e baseURL\n    config --\u003e theme\n    config --\u003e timeout\n    config --\u003e gitinfo\n    config --\u003e metadata\n    config --\u003e errors\n    config --\u003e outputs\n    config --\u003e github\n    config --\u003e editurl\n    config --\u003e issueurl\n    config --\u003e variant\n```\n\n**Sources:** [config.toml:1-27]()\n\n### Multi-language Architecture\n\nThe configuration supports three languages with distinct URL structures and menu configurations:\n\n```mermaid\ngraph TB\n    languages[\"Languages Configuration\"]\n    \n    subgraph \"English (Default)\"\n        en_config[\"Languages.en\"]\n        en_weight[\"weight: 1\"]\n        en_dir[\"languageDir: /\"]\n        en_menus[\"menu.shortcuts\"]\n    end\n    \n    subgraph \"Spanish\"\n        es_config[\"Languages.es\"]\n        es_weight[\"weight: 2\"]\n        es_dir[\"languageDir: /es/\"]\n        es_menus[\"menu.shortcuts\"]\n    end\n    \n    subgraph \"Russian\"\n        ru_config[\"Languages.ru\"]\n        ru_weight[\"weight: 3\"]\n        ru_dir[\"languageDir: /ru/\"]\n        ru_menus[\"menu.shortcuts\"]\n    end\n    \n    languages --\u003e en_config\n    languages --\u003e es_config\n    languages --\u003e ru_config\n    \n    en_config --\u003e en_weight\n    en_config --\u003e en_dir\n    en_config --\u003e en_menus\n    \n    es_config --\u003e es_weight\n    es_config --\u003e es_dir\n    es_config --\u003e es_menus\n    \n    ru_config --\u003e ru_weight\n    ru_config --\u003e ru_dir\n```\n\n**Sources:** [config.toml:28-118]()\n\n## Build Dependencies and Process\n\nThe build system combines Hugo's static site generation with AsciiDoctor processing for enhanced documentation formatting capabilities.\n\n### Dependency Management\n\nThe system uses Ruby's Bundler to manage AsciiDoctor dependencies:\n\n| Component | Version | Purpose |\n|-----------|---------|---------|\n| `asciidoctor` | ~\u003e 2.0, \u003e= 2.0.17 | AsciiDoc processing |\n| `hugo` | 0.85.0 | Static site generation |\n\n**Sources:** [Gemfile:1-5](), [Gemfile.lock:1-10](), [netlify.toml:11]()\n\n### Build Process Flow\n\n```mermaid\nflowchart TD\n    trigger[\"Build Trigger\"]\n    \n    subgraph \"Dependency Setup\"\n        bundle[\"bundle install\"]\n        ruby[\"Ruby 2.6.2\"]\n        asciidoctor[\"AsciiDoctor 2.0.17\"]\n    end\n    \n    subgraph \"Content Processing\"\n        adoc_files[\"*.adoc files\"]\n        md_files[\"*.md files\"]\n        hugo_process[\"Hugo Processing\"]\n        asciidoc_render[\"AsciiDoc Rendering\"]\n    end\n    \n    subgraph \"Asset Generation\"\n        css_compile[\"CSS Compilation\"]\n        js_bundle[\"JavaScript Bundling\"]\n        image_opt[\"Image Processing\"]\n    end\n    \n    subgraph \"Output\"\n        public_dir[\"public/ directory\"]\n        html_files[\"Generated HTML\"]\n        static_assets[\"Static Assets\"]\n    end\n    \n    trigger --\u003e bundle\n    bundle --\u003e ruby\n    ruby --\u003e asciidoctor\n    \n    asciidoctor --\u003e adoc_files\n    adoc_files --\u003e asciidoc_render\n    md_files --\u003e hugo_process\n    asciidoc_render --\u003e hugo_process\n    \n    hugo_process --\u003e css_compile\n    hugo_process --\u003e js_bundle\n    hugo_process --\u003e image_opt\n    \n    css_compile --\u003e public_dir\n    js_bundle --\u003e public_dir\n    image_opt --\u003e public_dir\n    hugo_process --\u003e html_files\n    html_files --\u003e public_dir\n    static_assets --\u003e public_dir\n```\n\n**Sources:** [netlify.toml:3-7](), [Gemfile:1-5]()\n\n### Build Script Configuration\n\nThe build process uses a custom `build.sh` script with different configurations for various deployment contexts:\n\n```mermaid\ngraph TB\n    build_script[\"build.sh\"]\n    \n    subgraph \"Production Context\"\n        prod_cmd[\"./build.sh\"]\n        prod_env[\"HUGO_ENV=production\"]\n        prod_baseurl[\"HUGO_BASEURL=docs.suitecrm.com\"]\n    end\n    \n    subgraph \"Deploy Preview\"\n        preview_cmd[\"./build.sh -b $DEPLOY_PRIME_URL\"]\n        preview_env[\"HUGO_VERSION=0.85.0\"]\n    end\n    \n    subgraph \"Branch Deploy\"\n        branch_cmd[\"./build.sh -b $DEPLOY_PRIME_URL\"]\n        branch_env[\"HUGO_VERSION=0.85.0\"]\n    end\n    \n    build_script --\u003e prod_cmd\n    build_script --\u003e preview_cmd\n    build_script --\u003e branch_cmd\n    \n    prod_cmd --\u003e prod_env\n    prod_cmd --\u003e prod_baseurl\n    \n    preview_cmd --\u003e preview_env\n    branch_cmd --\u003e branch_env\n```\n\n**Sources:** [netlify.toml:3-28]()\n\n## Content Processing Pipeline\n\nThe system processes multiple content formats and applies transformations during the build process.\n\n### Content Source Processing\n\n```mermaid\nflowchart LR\n    subgraph \"Content Sources\"\n        adoc[\"AsciiDoc Files (.adoc)\"]\n        md[\"Markdown Files (.md)\"]\n        images[\"Static Images\"]\n        i18n[\"Translation Files (i18n/*.toml)\"]\n    end\n    \n    subgraph \"Processing Layer\"\n        asciidoctor_proc[\"AsciiDoctor Processor\"]\n        hugo_md[\"Hugo Markdown Processor\"]\n        hugo_i18n[\"Hugo i18n Processor\"]\n        image_proc[\"Image Processor\"]\n    end\n    \n    subgraph \"Output Generation\"\n        html_pages[\"HTML Pages\"]\n        css_assets[\"CSS Assets\"]\n        js_assets[\"JavaScript Assets\"]\n        optimized_images[\"Optimized Images\"]\n    end\n    \n    adoc --\u003e asciidoctor_proc\n    md --\u003e hugo_md\n    images --\u003e image_proc\n    i18n --\u003e hugo_i18n\n    \n    asciidoctor_proc --\u003e html_pages\n    hugo_md --\u003e html_pages\n    hugo_i18n --\u003e html_pages\n    image_proc --\u003e optimized_images\n    \n    html_pages --\u003e css_assets\n    html_pages --\u003e js_assets\n```\n\n**Sources:** [config.toml:7](), [i18n/ru.toml:1-142]()\n\n### Theme Integration\n\nThe system uses a customized version of `hugo-theme-learn` with SuiteCRM-specific styling:\n\n| Configuration | Value | Purpose |\n|---------------|-------|---------|\n| `theme` | \"hugo-theme-learn\" | Base theme framework |\n| `themeVariant` | \"suitecrm\" | Custom styling variant |\n| `showVisitedLinks` | true | Track user navigation |\n\n**Sources:** [config.toml:6](), [config.toml:22]()\n\n## GitHub Integration Configuration\n\nThe system integrates with GitHub for content editing and issue reporting:\n\n```mermaid\ngraph TB\n    github_integration[\"GitHub Integration\"]\n    \n    subgraph \"Repository Configuration\"\n        repo_url[\"GitHubRepo: salesagility/SuiteDocs\"]\n        edit_url[\"editURL: /edit/master/content/\"]\n        issue_url[\"issueURL: /issues/new?\"]\n    end\n    \n    subgraph \"Generated Links\"\n        edit_button[\"Edit Page Button\"]\n        issue_button[\"Report Issue Button\"]\n        git_info[\"Git Commit Information\"]\n    end\n    \n    github_integration --\u003e repo_url\n    github_integration --\u003e edit_url\n    github_integration --\u003e issue_url\n    \n    repo_url --\u003e edit_button\n    edit_url --\u003e edit_button\n    issue_url --\u003e issue_button\n    git_info --\u003e edit_button\n```\n\n**Sources:** [config.toml:14-16]()\n\n## Menu System Configuration\n\nEach language has its own menu configuration with shortcuts to external resources:\n\n### Common Menu Items\n\nAll languages include shortcuts to:\n- GitHub repository\n- Blog section  \n- Credits page\n\n### Language-specific Menu Structure\n\n```mermaid\ngraph TB\n    menu_system[\"Menu System\"]\n    \n    subgraph \"English Menus\"\n        en_github[\"GitHub: salesagility/SuiteCRM\"]\n        en_blog[\"Blog\"]\n        en_credits[\"Credits\"]\n    end\n    \n    subgraph \"Spanish Menus\"\n        es_github[\"GitHub: salesagility/SuiteCRM\"]\n        es_blog[\"Blog\"]\n        es_credits[\"Gracias\"]\n    end\n    \n    subgraph \"Russian Menus\"\n        ru_menus[\"Russian menu configurations\"]\n    end\n    \n    menu_system --\u003e en_github\n    menu_system --\u003e en_blog\n    menu_system --\u003e en_credits\n    menu_system --\u003e es_github\n    menu_system --\u003e es_blog\n    menu_system --\u003e es_credits\n    menu_system --\u003e ru_menus\n```\n\n**Sources:** [config.toml:42-95]()"])</script><script>self.__next_f.push([1,"18:T2b8b,"])</script><script>self.__next_f.push([1,"# Multi-language Support\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [config.toml](config.toml)\n- [content/8.x/admin/Compatibility Matrix.ru.adoc](content/8.x/admin/Compatibility Matrix.ru.adoc)\n- [content/admin/Compatibility Matrix.ru.adoc](content/admin/Compatibility Matrix.ru.adoc)\n- [content/admin/Licensing.ru.adoc](content/admin/Licensing.ru.adoc)\n- [content/admin/_index.ru.adoc](content/admin/_index.ru.adoc)\n- [content/admin/administration-panel/search/elasticsearch/Introduction.ru.adoc](content/admin/administration-panel/search/elasticsearch/Introduction.ru.adoc)\n- [content/admin/administration-panel/search/elasticsearch/Set up Elasticsearch.ru.adoc](content/admin/administration-panel/search/elasticsearch/Set up Elasticsearch.ru.adoc)\n- [content/community/contributing-code/Forking.adoc](content/community/contributing-code/Forking.adoc)\n- [content/user/_index.ru.adoc](content/user/_index.ru.adoc)\n- [i18n/en.toml](i18n/en.toml)\n- [i18n/ru.toml](i18n/ru.toml)\n- [layouts/index.html](layouts/index.html)\n- [layouts/partials/header.html](layouts/partials/header.html)\n- [layouts/partials/menu.html](layouts/partials/menu.html)\n- [layouts/partials/search.html](layouts/partials/search.html)\n- [netlify.toml](netlify.toml)\n- [static/css/theme-suitecrm.css](static/css/theme-suitecrm.css)\n- [static/css/theme.css](static/css/theme.css)\n- [static/images/favicon.png](static/images/favicon.png)\n- [static/images/ru/admin/System/image6.png](static/images/ru/admin/System/image6.png)\n- [themes/hugo-theme-learn/layouts/partials/menu.html](themes/hugo-theme-learn/layouts/partials/menu.html)\n\n\u003c/details\u003e\n\n\n\nThe SuiteDocs system provides comprehensive multi-language support to serve the global SuiteCRM community. This document covers the technical implementation of internationalization (i18n) features, including language configuration, translation management, content organization, and user interface elements for language switching.\n\nFor information about content creation and translation workflows, see [Contributing to Documentation](#8.1).\n\n## Language Configuration Architecture\n\nThe multi-language system is built on Hugo's native internationalization capabilities, configured through the main site configuration and implemented across templates and content files.\n\n```mermaid\ngraph TB\n    config[\"config.toml\u003cbr/\u003eSite Configuration\"]\n    \n    subgraph \"Language Definitions\"\n        en[\"Languages.en\u003cbr/\u003eEnglish (Default)\"]\n        es[\"Languages.es\u003cbr/\u003eSpanish\"]\n        ru[\"Languages.ru\u003cbr/\u003eRussian\"]\n    end\n    \n    subgraph \"Language Parameters\"\n        title[\"title: Site Title\"]\n        weight[\"weight: Language Order\"]\n        langName[\"languageName: Display Name\"]\n        langDir[\"languageDir: URL Path\"]\n    end\n    \n    subgraph \"Menu Configuration\"\n        shortcuts[\"menu.shortcuts\u003cbr/\u003eLanguage-specific Menus\"]\n        menuItems[\"Menu Items\u003cbr/\u003eGitHub, Blog, Credits\"]\n    end\n    \n    config --\u003e en\n    config --\u003e es\n    config --\u003e ru\n    \n    en --\u003e title\n    en --\u003e weight\n    en --\u003e langName\n    en --\u003e langDir\n    \n    en --\u003e shortcuts\n    es --\u003e shortcuts\n    ru --\u003e shortcuts\n    \n    shortcuts --\u003e menuItems\n```\n\n**Sources:** [config.toml:28-118]()\n\n### Language Settings\n\nThe system supports three languages with specific configurations:\n\n| Language | Code | Weight | Directory | Display Name |\n|----------|------|--------|-----------|--------------|\n| English  | `en` | 1      | `/`       | English      |\n| Spanish  | `es` | 2      | `/es/`    | Español      |\n| Russian  | `ru` | 3      | `/ru/`    | Русский      |\n\nEach language configuration includes site-specific settings such as titles and menu structures. The `defaultContentLanguageInSubdir` parameter is set to `false`, placing English content at the root path.\n\n**Sources:** [config.toml:34-40](), [config.toml:69-73](), [config.toml:112-116]()\n\n## Translation System\n\nThe i18n system uses TOML files to manage user interface translations, separate from content translations which are handled through dedicated content files.\n\n```mermaid\ngraph LR\n    subgraph \"Translation Files\"\n        enToml[\"i18n/en.toml\u003cbr/\u003eEnglish Strings\"]\n        ruToml[\"i18n/ru.toml\u003cbr/\u003eRussian Strings\"] \n    end\n    \n    subgraph \"Template Usage\"\n        templates[\"layouts/partials/*.html\u003cbr/\u003eTemplate Files\"]\n        i18nFunc[\"{{ T 'translation-key' }}\u003cbr/\u003eHugo i18n Function\"]\n    end\n    \n    subgraph \"UI Elements\"\n        nav[\"Navigation Labels\"]\n        search[\"Search Placeholder\"]\n        buttons[\"Button Text\"]\n        messages[\"System Messages\"]\n    end\n    \n    enToml --\u003e i18nFunc\n    ruToml --\u003e i18nFunc\n    \n    templates --\u003e i18nFunc\n    \n    i18nFunc --\u003e nav\n    i18nFunc --\u003e search\n    i18nFunc --\u003e buttons\n    i18nFunc --\u003e messages\n```\n\n**Sources:** [i18n/en.toml:1-147](), [i18n/ru.toml:1-142]()\n\n### Translation Keys\n\nThe system defines standard translation keys for common UI elements:\n\n- **Navigation**: `Documentation`, `Guides`, `User`, `Developer`, `Administrator`, `Community`\n- **Search**: `Search-placeholder`, `Clear-History`\n- **Actions**: `Edit-this-page`, `Issue-for-page`, `Go-to-homepage`\n- **Content**: `GettingStarted`, `Installing`, `Upgrading`, `Using-SuiteCRM`\n\n**Sources:** [i18n/en.toml:40-62](), [i18n/ru.toml:40-62]()\n\n## Language Switching Interface\n\nThe language selector provides users with an accessible dropdown interface for switching between available languages.\n\n```mermaid\ngraph TB\n    sidebar[\"#sidebar\u003cbr/\u003eMain Sidebar\"]\n    \n    subgraph \"Language Selector\"\n        langSection[\"#lang-selector\u003cbr/\u003eLanguage Section\"]\n        dropdown[\"select#select-language\u003cbr/\u003eLanguage Dropdown\"]\n        options[\"option Elements\u003cbr/\u003eLanguage Options\"]\n        helpLink[\"Help Translate Link\"]\n    end\n    \n    subgraph \"Template Logic\"\n        multiCheck[\"Site.IsMultiLingual\u003cbr/\u003eMultilingual Check\"]\n        transLoop[\"Page.AllTranslations\u003cbr/\u003eTranslation Loop\"]\n        langLoop[\"Site.Languages\u003cbr/\u003eLanguage Loop\"]\n    end\n    \n    subgraph \"Selection Handling\"\n        onChange[\"onchange='location = this.value'\u003cbr/\u003ePage Navigation\"]\n        selected[\"selected Attribute\u003cbr/\u003eCurrent Language\"]\n        permalink[\"translation.RelPermalink\u003cbr/\u003eTarget URL\"]\n    end\n    \n    sidebar --\u003e langSection\n    langSection --\u003e dropdown\n    dropdown --\u003e options\n    dropdown --\u003e helpLink\n    \n    multiCheck --\u003e transLoop\n    transLoop --\u003e langLoop\n    langLoop --\u003e options\n    \n    options --\u003e onChange\n    options --\u003e selected\n    options --\u003e permalink\n```\n\n**Sources:** [layouts/partials/menu.html:92-132]()\n\nThe language selector implementation includes:\n\n1. **Conditional Display**: Only shown when `Site.IsMultiLingual` is true\n2. **Dynamic Options**: Generated from available page translations\n3. **Current Language Highlighting**: Selected attribute on current language option\n4. **Translation Helper**: Link to translation contribution page\n5. **JavaScript Navigation**: Immediate page redirect on selection change\n\n**Sources:** [layouts/partials/menu.html:95-116]()\n\n## Content Organization\n\nMulti-language content follows a structured file organization pattern that separates language-specific content while maintaining consistency across versions.\n\n```mermaid\ngraph TD\n    content[\"content/\u003cbr/\u003eRoot Content Directory\"]\n    \n    subgraph \"English Content (Default)\"\n        enPages[\"*.adoc\u003cbr/\u003eEnglish Pages\"]\n        enAdmin[\"admin/*.adoc\u003cbr/\u003eAdmin Guides\"]\n        enUser[\"user/*.adoc\u003cbr/\u003eUser Guides\"]\n    end\n    \n    subgraph \"Localized Content\"\n        ruPages[\"*.ru.adoc\u003cbr/\u003eRussian Pages\"]\n        ruAdmin[\"admin/*.ru.adoc\u003cbr/\u003eRussian Admin\"]\n        ruUser[\"user/*.ru.adoc\u003cbr/\u003eRussian User\"]\n    end\n    \n    subgraph \"Shared Resources\"\n        images[\"static/images/\u003cbr/\u003eImage Assets\"]\n        langImages[\"static/images/ru/\u003cbr/\u003eLocalized Images\"]\n        css[\"static/css/\u003cbr/\u003eStylesheets\"]\n    end\n    \n    content --\u003e enPages\n    content --\u003e enAdmin\n    content --\u003e enUser\n    \n    content --\u003e ruPages\n    content --\u003e ruAdmin\n    content --\u003e ruUser\n    \n    content --\u003e images\n    content --\u003e langImages\n    content --\u003e css\n```\n\n**Sources:** [content/admin/_index.ru.adoc:1-12](), [content/user/_index.ru.adoc:1-12]()\n\n### File Naming Convention\n\nThe system uses Hugo's filename-based language detection:\n\n- **Default Language**: `filename.adoc` (English)\n- **Localized Content**: `filename.LANG.adoc` (e.g., `filename.ru.adoc`)\n- **Language-specific Assets**: `static/images/LANG/` directories\n\n**Sources:** [content/admin/Compatibility Matrix.ru.adoc:1-465](), [static/images/ru/admin/System/image6.png:1]()\n\n## Build and Deployment Process\n\nThe multi-language build process generates separate URL structures for each language while maintaining cross-language navigation and search functionality.\n\n```mermaid\ngraph LR\n    subgraph \"Source Processing\"\n        hugo[\"Hugo Build Process\"]\n        asciidoc[\"AsciiDoc Processing\"]\n        i18nProcess[\"i18n String Processing\"]\n    end\n    \n    subgraph \"Language Output\"\n        enSite[\"English Site\u003cbr/\u003edocs.suitecrm.com/\"]\n        esSite[\"Spanish Site\u003cbr/\u003edocs.suitecrm.com/es/\"]\n        ruSite[\"Russian Site\u003cbr/\u003edocs.suitecrm.com/ru/\"]\n    end\n    \n    subgraph \"Shared Assets\"\n        css[\"CSS Files\"]\n        js[\"JavaScript Files\"]\n        fonts[\"Font Files\"]\n        globalImages[\"Global Images\"]\n    end\n    \n    subgraph \"Search Integration\"\n        lunrEn[\"lunr.min.js\u003cbr/\u003eEnglish Search\"]\n        lunrRu[\"lunr.ru.js\u003cbr/\u003eRussian Search\"]\n        lunrMulti[\"lunr.multi.js\u003cbr/\u003eMulti-language\"]\n    end\n    \n    hugo --\u003e enSite\n    hugo --\u003e esSite\n    hugo --\u003e ruSite\n    \n    asciidoc --\u003e hugo\n    i18nProcess --\u003e hugo\n    \n    css --\u003e enSite\n    css --\u003e esSite\n    css --\u003e ruSite\n    \n    lunrEn --\u003e enSite\n    lunrRu --\u003e ruSite\n    lunrMulti --\u003e enSite\n    lunrMulti --\u003e esSite\n    lunrMulti --\u003e ruSite\n```\n\n**Sources:** [netlify.toml:1-32](), [layouts/partials/search.html:7-19]()\n\n### Search Localization\n\nThe search functionality includes language-specific components:\n\n- **Language Detection**: `Site.IsMultiLingual` check determines search configuration\n- **Lunr.js Libraries**: Separate stemmer support for Russian (`lunr.ru.js`)\n- **Multi-language Support**: `lunr.multi.js` enables cross-language search capabilities\n- **Base URL Configuration**: Language-specific base URLs for search indexing\n\n**Sources:** [layouts/partials/search.html:13-17]()\n\n### Navigation and Cross-linking\n\nThe template system generates language-aware navigation:\n\n- **Language Parameter Access**: `Site.Language.Params.LanguageDir` for URL construction\n- **Cross-language Links**: Automatic generation of translation links\n- **Menu Localization**: Language-specific menu items and labels using `i18n` function\n\n**Sources:** [layouts/partials/menu.html:67](), [layouts/partials/menu.html:103-115]()\n\n## Theme Integration\n\nThe multi-language system integrates with the SuiteCRM theme through CSS and styling customizations that accommodate different text lengths and character sets.\n\n**Sources:** [static/css/theme-suitecrm.css:812-823](), [layouts/partials/header.html:23-25]()"])</script><script>self.__next_f.push([1,"19:T35ef,"])</script><script>self.__next_f.push([1,"# Netlify Deployment\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [LICENSE.md](LICENSE.md)\n- [README.md](README.md)\n- [archetypes/blog.md](archetypes/blog.md)\n- [archetypes/default.md](archetypes/default.md)\n- [config.toml](config.toml)\n- [content/community/contributing-code/Forking.adoc](content/community/contributing-code/Forking.adoc)\n- [i18n/ru.toml](i18n/ru.toml)\n- [netlify.toml](netlify.toml)\n\n\u003c/details\u003e\n\n\n\nThis document describes the Netlify deployment configuration and process for the SuiteDocs documentation system. It covers the automated deployment pipeline, build contexts, preview deployments, and integration with the Hugo static site generator.\n\nThe deployment system handles both production releases and preview deployments for pull requests, supporting multiple languages and automated builds triggered by GitHub commits. For information about the Hugo build process itself, see [Hugo Configuration and Build Process](#2.1). For details about multi-language content structure, see [Multi-language Support](#2.2).\n\n## Deployment Architecture Overview\n\nThe SuiteDocs deployment system uses Netlify's continuous deployment platform to automatically build and deploy the Hugo-generated documentation site from the GitHub repository.\n\n**Netlify Deployment Pipeline**\n```mermaid\nflowchart TD\n    subgraph \"GitHub Repository\"\n        master[\"master branch\"]\n        pr[\"Pull Request branches\"]\n        content[\"Content (.adoc, .md files)\"]\n        config[\"config.toml\"]\n        netlify_config[\"netlify.toml\"]\n        build_script[\"build.sh\"]\n    end\n    \n    subgraph \"Netlify Build Process\"\n        trigger[\"Git Push Trigger\"]\n        build_env[\"Build Environment\u003cbr/\u003eHugo 0.85.0\u003cbr/\u003eRuby 2.6.2\"]\n        build_cmd[\"chmod +x build.sh \u0026\u0026 ./build.sh\"]\n        hugo_build[\"Hugo Static Generation\"]\n        asciidoc[\"AsciiDoctor Processing\"]\n        public_dir[\"public/ directory\"]\n    end\n    \n    subgraph \"Deployment Contexts\"\n        production[\"Production Context\u003cbr/\u003edocs.suitecrm.com\"]\n        preview[\"Deploy Preview Context\u003cbr/\u003edeploy-preview-XX.netlify.app\"]\n        branch[\"Branch Deploy Context\u003cbr/\u003ebranch-name.netlify.app\"]\n    end\n    \n    subgraph \"Multi-language Sites\"\n        en_site[\"English Site\u003cbr/\u003e/\"]\n        es_site[\"Spanish Site\u003cbr/\u003e/es/\"]\n        ru_site[\"Russian Site\u003cbr/\u003e/ru/\"]\n    end\n    \n    master --\u003e trigger\n    pr --\u003e trigger\n    trigger --\u003e build_env\n    build_env --\u003e build_cmd\n    build_script --\u003e build_cmd\n    config --\u003e hugo_build\n    netlify_config --\u003e build_env\n    content --\u003e asciidoc\n    build_cmd --\u003e hugo_build\n    hugo_build --\u003e asciidoc\n    asciidoc --\u003e public_dir\n    \n    public_dir --\u003e production\n    public_dir --\u003e preview\n    public_dir --\u003e branch\n    \n    production --\u003e en_site\n    production --\u003e es_site\n    production --\u003e ru_site\n    \n    style build_env fill:#f9f9f9\n    style public_dir fill:#e8f5e8\n    style production fill:#e8f0ff\n```\n\nSources: [README.md:13-17](), [netlify.toml:1-32](), [config.toml:1-43]()\n\n## Netlify Configuration Structure\n\nThe deployment configuration is defined in `netlify.toml` which specifies build settings, deployment contexts, and environment variables for different deployment scenarios.\n\n| Configuration Section | Purpose | Key Settings |\n|----------------------|---------|--------------|\n| `[build]` | Base build configuration | `publish = \"public\"`, build command |\n| `[context.production.environment]` | Production environment variables | `HUGO_VERSION`, `HUGO_ENV`, `HUGO_BASEURL` |\n| `[context.deploy-preview]` | Pull request preview settings | Custom build command with `$DEPLOY_PRIME_URL` |\n| `[context.branch-deploy]` | Non-master branch deployments | Environment-specific base URL handling |\n\n**Build Configuration Details**\n```mermaid\ngraph TB\n    subgraph \"netlify.toml Structure\"\n        build_section[\"[build]\u003cbr/\u003epublish = 'public'\u003cbr/\u003ecommand = 'chmod +x build.sh \u0026\u0026 ./build.sh'\u003cbr/\u003eHUGO_ENABLEGITINFO = 'true'\"]\n        \n        prod_context[\"[context.production.environment]\u003cbr/\u003eHUGO_VERSION = '0.85.0'\u003cbr/\u003eHUGO_ENV = 'production'\u003cbr/\u003eHUGO_BASEURL = 'https://docs.suitecrm.com'\"]\n        \n        preview_context[\"[context.deploy-preview]\u003cbr/\u003ecommand = 'chmod +x build.sh \u0026\u0026 ./build.sh -b $DEPLOY_PRIME_URL'\"]\n        \n        branch_context[\"[context.branch-deploy]\u003cbr/\u003ecommand = 'chmod +x build.sh \u0026\u0026 ./build.sh -b $DEPLOY_PRIME_URL'\"]\n        \n        preview_env[\"[context.deploy-preview.environment]\u003cbr/\u003eHUGO_VERSION = '0.85.0'\"]\n        \n        branch_env[\"[context.branch-deploy.environment]\u003cbr/\u003eHUGO_VERSION = '0.85.0'\"]\n    end\n    \n    subgraph \"Environment Variables\"\n        hugo_version[\"HUGO_VERSION = '0.85.0'\"]\n        hugo_env[\"HUGO_ENV = 'production'\"]\n        base_url[\"HUGO_BASEURL\"]\n        deploy_url[\"DEPLOY_PRIME_URL (Netlify-provided)\"]\n        git_info[\"HUGO_ENABLEGITINFO = 'true'\"]\n    end\n    \n    build_section --\u003e hugo_version\n    build_section --\u003e git_info\n    prod_context --\u003e hugo_env\n    prod_context --\u003e base_url\n    preview_context --\u003e deploy_url\n    branch_context --\u003e deploy_url\n    \n    style build_section fill:#f0f8ff\n    style prod_context fill:#f0fff0\n    style preview_context fill:#fff8f0\n```\n\nSources: [netlify.toml:3-32]()\n\n## Build Process and Commands\n\nThe build process executes a shell script that handles Hugo compilation with AsciiDoc processing. The build command varies by deployment context to handle different base URL configurations.\n\n### Build Command Execution Flow\n\n**Production Build Command:**\n```bash\nchmod +x build.sh \u0026\u0026 ./build.sh\n```\n\n**Preview/Branch Build Command:**\n```bash\nchmod +x build.sh \u0026\u0026 ./build.sh -b $DEPLOY_PRIME_URL\n```\n\nThe `build.sh` script (referenced but not provided in the file listing) processes the Hugo site generation with AsciiDoctor for `.adoc` file conversion. The `-b` flag allows dynamic base URL setting for preview deployments.\n\n**Build Environment Configuration**\n```mermaid\ngraph LR\n    subgraph \"Build Environment Setup\"\n        ruby[\"Ruby 2.6.2\u003cbr/\u003e(Environment Variable)\"]\n        hugo[\"Hugo 0.85.0\u003cbr/\u003e(netlify.toml)\"]\n        asciidoctor[\"AsciiDoctor\u003cbr/\u003e(Auto-installed by Netlify)\"]\n        git[\"Git Info Enabled\u003cbr/\u003eHUGO_ENABLEGITINFO = true\"]\n    end\n    \n    subgraph \"Build Script Execution\"\n        chmod[\"chmod +x build.sh\"]\n        execute[\"./build.sh execution\"]\n        baseurl_param[\"-b $DEPLOY_PRIME_URL\u003cbr/\u003e(preview/branch only)\"]\n    end\n    \n    subgraph \"Hugo Processing\"\n        content_processing[\"Content Processing\u003cbr/\u003eAsciiDoc → HTML\"]\n        theme_processing[\"Theme Processing\u003cbr/\u003ehugo-theme-learn\"]\n        multilang[\"Multi-language Site Generation\u003cbr/\u003een, es, ru\"]\n        output[\"public/ directory output\"]\n    end\n    \n    ruby --\u003e execute\n    hugo --\u003e execute\n    asciidoctor --\u003e content_processing\n    git --\u003e content_processing\n    chmod --\u003e execute\n    execute --\u003e content_processing\n    baseurl_param --\u003e execute\n    content_processing --\u003e theme_processing\n    theme_processing --\u003e multilang\n    multilang --\u003e output\n    \n    style execute fill:#fff2e6\n    style output fill:#e6ffe6\n```\n\nSources: [netlify.toml:5-6](), [netlify.toml:17](), [netlify.toml:23](), [README.md:1-2]()\n\n## Deployment Contexts and Environments\n\nNetlify provides three distinct deployment contexts, each with specific configuration for different use cases in the documentation workflow.\n\n### Production Context\n\nThe production context deploys from the `master` branch to the primary domain `docs.suitecrm.com`. This context includes full environment configuration for the live documentation site.\n\n**Production Environment Variables:**\n- `HUGO_VERSION = \"0.85.0\"`\n- `HUGO_ENV = \"production\"`\n- `HUGO_BASEURL = \"https://docs.suitecrm.com\"`\n\n### Deploy Preview Context\n\nDeploy previews are automatically generated for pull requests, providing a staging environment to review documentation changes before merging to master.\n\n**Preview URL Pattern:** `deploy-preview-{PR_NUMBER}--suitedocs.netlify.app`\n\nThe preview context uses the `$DEPLOY_PRIME_URL` environment variable to ensure all internal links work correctly in the preview environment.\n\n### Branch Deploy Context\n\nBranch deployments create preview sites for any non-master branch pushed to GitHub, useful for long-running feature branches or collaborative documentation work.\n\n**Branch URL Pattern:** `{BRANCH_NAME}--suitedocs.netlify.app`\n\n**Deployment Context Flow**\n```mermaid\nflowchart TD\n    subgraph \"Git Events\"\n        master_push[\"Push to master branch\"]\n        pr_create[\"Pull Request created/updated\"]\n        branch_push[\"Push to feature branch\"]\n    end\n    \n    subgraph \"Netlify Context Selection\"\n        production_check{\"Is master branch?\"}\n        pr_check{\"Is Pull Request?\"}\n        context_production[\"Production Context\u003cbr/\u003e[context.production.environment]\"]\n        context_preview[\"Deploy Preview Context\u003cbr/\u003e[context.deploy-preview]\"]\n        context_branch[\"Branch Deploy Context\u003cbr/\u003e[context.branch-deploy]\"]\n    end\n    \n    subgraph \"Build Execution\"\n        prod_build[\"./build.sh\u003cbr/\u003eHUGO_BASEURL = docs.suitecrm.com\"]\n        preview_build[\"./build.sh -b $DEPLOY_PRIME_URL\u003cbr/\u003ePreview URL as base\"]\n        branch_build[\"./build.sh -b $DEPLOY_PRIME_URL\u003cbr/\u003eBranch URL as base\"]\n    end\n    \n    subgraph \"Deployment Targets\"\n        prod_site[\"docs.suitecrm.com\"]\n        preview_site[\"deploy-preview-XX.netlify.app\"]\n        branch_site[\"branch-name.netlify.app\"]\n    end\n    \n    master_push --\u003e production_check\n    pr_create --\u003e pr_check\n    branch_push --\u003e production_check\n    \n    production_check --\u003e|Yes| context_production\n    production_check --\u003e|No| pr_check\n    pr_check --\u003e|Yes| context_preview\n    pr_check --\u003e|No| context_branch\n    \n    context_production --\u003e prod_build\n    context_preview --\u003e preview_build\n    context_branch --\u003e branch_build\n    \n    prod_build --\u003e prod_site\n    preview_build --\u003e preview_site\n    branch_build --\u003e branch_site\n    \n    style context_production fill:#e6f3ff\n    style context_preview fill:#fff3e6\n    style context_branch fill:#f0f8f0\n```\n\nSources: [netlify.toml:9-14](), [netlify.toml:15-21](), [netlify.toml:22-28]()\n\n## Integration with Hugo Configuration\n\nThe Netlify deployment system integrates closely with the Hugo site configuration defined in `config.toml`, particularly for multi-language support and theme processing.\n\n### Hugo-Netlify Integration Points\n\n| Hugo Configuration | Netlify Usage | Purpose |\n|-------------------|---------------|---------|\n| `baseURL = \"https://docs.suitecrm.com\"` | Overridden by `HUGO_BASEURL` | Production URL configuration |\n| `theme = \"hugo-theme-learn\"` | Used in build process | Theme selection for Hugo |\n| `timeout = 47000` | Build timeout setting | Long build time accommodation |\n| `enableGitInfo = true` | Set via `HUGO_ENABLEGITINFO` | Git metadata in pages |\n| Multi-language `[Languages]` | Deployed as subdirectories | `/`, `/es/`, `/ru/` paths |\n\n**Hugo Configuration Integration**\n```mermaid\ngraph TB\n    subgraph \"config.toml Settings\"\n        base_url[\"baseURL = 'https://docs.suitecrm.com'\"]\n        theme_config[\"theme = 'hugo-theme-learn'\"]\n        timeout[\"timeout = 47000\"]\n        git_info[\"enableGitInfo = true\"]\n        languages[\"[Languages.en/es/ru]\"]\n    end\n    \n    subgraph \"Netlify Environment Variables\"\n        netlify_baseurl[\"HUGO_BASEURL\u003cbr/\u003e(context-dependent)\"]\n        netlify_gitinfo[\"HUGO_ENABLEGITINFO = 'true'\"]\n        hugo_version[\"HUGO_VERSION = '0.85.0'\"]\n        hugo_env[\"HUGO_ENV = 'production'\"]\n    end\n    \n    subgraph \"Hugo Build Process\"\n        url_resolution[\"URL Resolution\"]\n        theme_processing[\"Theme Processing\"]\n        content_build[\"Content Building\"]\n        multilang_build[\"Multi-language Site Generation\"]\n    end\n    \n    subgraph \"Output Structure\"\n        public_root[\"public/\"]\n        en_output[\"public/ (English)\"]\n        es_output[\"public/es/ (Spanish)\"]\n        ru_output[\"public/ru/ (Russian)\"]\n    end\n    \n    base_url --\u003e netlify_baseurl\n    git_info --\u003e netlify_gitinfo\n    netlify_baseurl --\u003e url_resolution\n    theme_config --\u003e theme_processing\n    timeout --\u003e content_build\n    netlify_gitinfo --\u003e content_build\n    languages --\u003e multilang_build\n    \n    url_resolution --\u003e public_root\n    theme_processing --\u003e public_root\n    content_build --\u003e public_root\n    multilang_build --\u003e en_output\n    multilang_build --\u003e es_output\n    multilang_build --\u003e ru_output\n    \n    style netlify_baseurl fill:#ffe6e6\n    style public_root fill:#e6ffe6\n```\n\nSources: [config.toml:1](), [config.toml:6](), [config.toml:10](), [config.toml:9](), [config.toml:28-118](), [netlify.toml:6](), [netlify.toml:13]()\n\n## Status Monitoring and GitHub Integration\n\nThe deployment system includes status monitoring through GitHub badges and direct integration with the GitHub repository for automated builds and content editing workflows.\n\n### GitHub Integration Features\n\nThe `config.toml` file defines several GitHub integration points that work with the Netlify deployment:\n\n- **Edit Links:** `editURL = \"https://github.com/salesagility/SuiteDocs/edit/master/content/\"`\n- **Issue Creation:** `issueURL = \"https://github.com/salesagility/SuiteDocs/issues/new?\"`\n- **Repository Reference:** `GitHubRepo = \"https://github.com/salesagility/SuiteDocs/\"`\n\n### Deployment Status Badge\n\nThe README displays a Netlify status badge that shows real-time deployment status:\n```\n[![Netlify Status](https://api.netlify.com/api/v1/badges/2cb9437a-4da2-47de-9dc7-11477d85c3ae/deploy-status)](https://app.netlify.com/sites/suitedocs/deploys)\n```\n\nThis badge provides immediate visibility into the deployment state and links to the Netlify deployment dashboard for detailed build information.\n\nSources: [README.md:1-2](), [config.toml:14-16]()"])</script><script>self.__next_f.push([1,"1a:T3b2c,"])</script><script>self.__next_f.push([1,"# SuiteCRM Version Documentation\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [.htmltest.yml](.htmltest.yml)\n- [content/8.x/admin/releases/8.0/_index.en.adoc](content/8.x/admin/releases/8.0/_index.en.adoc)\n- [content/8.x/admin/releases/8.1/_index.en.adoc](content/8.x/admin/releases/8.1/_index.en.adoc)\n- [content/8.x/admin/releases/8.2/_index.en.adoc](content/8.x/admin/releases/8.2/_index.en.adoc)\n- [content/8.x/admin/releases/8.3/_index.en.adoc](content/8.x/admin/releases/8.3/_index.en.adoc)\n- [content/8.x/admin/releases/8.4/_index.en.adoc](content/8.x/admin/releases/8.4/_index.en.adoc)\n- [content/8.x/admin/releases/8.5/_index.en.adoc](content/8.x/admin/releases/8.5/_index.en.adoc)\n- [content/8.x/admin/releases/8.6/_index.en.adoc](content/8.x/admin/releases/8.6/_index.en.adoc)\n- [content/8.x/admin/releases/8.7/_index.en.adoc](content/8.x/admin/releases/8.7/_index.en.adoc)\n- [content/8.x/admin/upgrading/general-info.adoc](content/8.x/admin/upgrading/general-info.adoc)\n- [content/admin/Advanced Configuration Options.adoc](content/admin/Advanced Configuration Options.adoc)\n- [content/admin/releases/7.10.x/_index.en.adoc](content/admin/releases/7.10.x/_index.en.adoc)\n- [content/admin/releases/7.11.x/_index.en.adoc](content/admin/releases/7.11.x/_index.en.adoc)\n- [content/admin/releases/7.12.x/_index.en.adoc](content/admin/releases/7.12.x/_index.en.adoc)\n- [content/admin/releases/7.13.x/_index.en.adoc](content/admin/releases/7.13.x/_index.en
