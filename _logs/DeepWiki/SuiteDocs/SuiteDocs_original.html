g the `SugarWebServiceImplv4_1` class:\n\n```mermaid\ngraph LR\n    subgraph \"SOAP Method Categories\"\n        AUTH[\"Authentication Methods\u003cbr/\u003elogin(), logout()\"]\n        CRUD[\"CRUD Operations\u003cbr/\u003eget_entry_list(), get_entry()\u003cbr/\u003eset_entry(), set_entries()\"]\n        REL[\"Relationship Methods\u003cbr/\u003eget_relationships()\u003cbr/\u003eset_relationship()\"]\n        META[\"Metadata Methods\u003cbr/\u003eget_module_fields()\u003cbr/\u003eget_available_modules()\"]\n        UTIL[\"Utility Methods\u003cbr/\u003eget_server_info()\u003cbr/\u003eget_user_id()\"]\n    end\n    \n    AUTH --\u003e IMPL[\"SugarWebServiceImplv4_1\"]\n    CRUD --\u003e IMPL\n    REL --\u003e IMPL\n    META --\u003e IMPL\n    UTIL --\u003e IMPL\n```\n\n**Sources:** [content/developer/api/API-4_1.adoc:40-88]()\n\n## REST API Implementation\n\nThe REST API provides a simplified HTTP-based interface, though it deviates from true REST principles by using POST for all operations.\n\n### REST Endpoint Structure\n\n| Parameter | Description | Example |\n|-----------|-------------|---------|\n| **method** | API method name | `login`, `get_entry_list` |\n| **input_type** | Request data format | `JSON`, `Serialize` |\n| **response_type** | Response data format | `JSON`, `Serialize` |\n| **rest_data** | Method arguments | Encoded parameter array |\n\n### REST Request Flow\n\n```mermaid\nsequenceDiagram\n    participant Client as \"REST Client\"\n    participant Endpoint as \"rest.php\"\n    participant Processor as \"Request Processor\"\n    participant Methods as \"API Methods\"\n    \n    Client-\u003e\u003eEndpoint: POST with method='login'\u003cbr/\u003erest_data=JSON(userAuth)\n    Endpoint-\u003e\u003eProcessor: Parse request parameters\n    Processor-\u003e\u003eMethods: Call login method\n    Methods-\u003e\u003eProcessor: Return session data\n    Processor-\u003e\u003eEndpoint: Encode response\n    Endpoint-\u003e\u003eClient: JSON response with session_id\n    \n    Client-\u003e\u003eEndpoint: POST with method='get_entry_list'\u003cbr/\u003erest_data=JSON(session, module, query)\n    Endpoint-\u003e\u003eProcessor: Parse request parameters\n    Processor-\u003e\u003eMethods: Call get_entry_list method\n    Methods-\u003e\u003eProcessor: Return entry data\n    Processor-\u003e\u003eEndpoint: Encode response\n    Endpoint-\u003e\u003eClient: JSON response with entries\n```\n\n**Sources:** [content/developer/api/API-4_1.adoc:90-202]()\n\n### REST Parameter Ordering\n\nThe REST API requires strict parameter ordering in the `rest_data` array:\n\n```mermaid\ngraph TD\n    subgraph \"REST Parameter Structure\"\n        ORDER[\"Parameter Order Matters\"]\n        LOGIN[\"login() Parameters:\u003cbr/\u003e1. user_auth\u003cbr/\u003e2. application_name\u003cbr/\u003e3. name_value_list\"]\n        GETLIST[\"get_entry_list() Parameters:\u003cbr/\u003e1. session\u003cbr/\u003e2. module_name\u003cbr/\u003e3. query\u003cbr/\u003e4. order_by\u003cbr/\u003e5. offset\u003cbr/\u003e6. select_fields\u003cbr/\u003e7. link_name_to_fields_array\u003cbr/\u003e8. max_results\u003cbr/\u003e9. deleted\"]\n    end\n    \n    ORDER --\u003e LOGIN\n    ORDER --\u003e GETLIST\n```\n\n**Sources:** [content/developer/api/API-4_1.adoc:120-130](), [content/developer/api/API-4_1.adoc:210-230]()\n\n## Authentication and Session Management\n\nBoth SOAP and REST APIs share the same authentication mechanism using username/password credentials and session tokens.\n\n### Authentication Parameters\n\n| Parameter | Type | Description |\n|-----------|------|-------------|\n| **user_name** | string | SuiteCRM username |\n| **password** | string | MD5 hash of user password |\n| **application_name** | string | Client application identifier |\n| **name_value_list** | array | Additional authentication parameters |\n\n### Session Lifecycle\n\n```mermaid\nstateDiagram-v2\n    [*] --\u003e Unauthenticated\n    Unauthenticated --\u003e Authenticated: login(credentials)\n    Authenticated --\u003e SessionActive: session_id returned\n    SessionActive --\u003e SessionActive: API calls with session_id\n    SessionActive --\u003e SessionExpired: timeout/inactivity\n    SessionActive --\u003e LoggedOut: logout() called\n    SessionExpired --\u003e Unauthenticated\n    LoggedOut --\u003e Unauthenticated\n```\n\n**Sources:** [content/developer/api/API-4_1.adoc:15-25](), [content/developer/api/API-4_1.adoc:45-55]()\n\n## Version Compatibility and Lifecycle\n\nAPI v4.1 maintains backward compatibility across multiple SuiteCRM versions with specific support windows:\n\n### Version Support Matrix\n\n| SuiteCRM Version | API v4.1 Status | Notes |\n|------------------|-----------------|-------|\n| **7.8.x and earlier** | Primary API | Full feature support |\n| **7.9.x** | Primary API | Last version with v4.1 as main API |\n| **7.10.x - 7.14.x** | Legacy Support | Maintained for compatibility |\n| **8.x** | Legacy Support | JSON API v8 preferred |\n\n### API Evolution Path\n\n```mermaid\ntimeline\n    title SuiteCRM API Evolution\n    \n    section Legacy Era\n        7.8.x : API v4.1 Primary\n             : SOAP/REST only\n    \n    section Transition Period  \n        7.9.x : API v4.1 Primary\n             : Last major v4.1 version\n        7.10.x : API v4.1 Legacy\n              : JSON API v8 introduced\n    \n    section Modern Era\n        8.x : JSON API Primary\n           : OAuth2 authentication\n           : API v4.1 compatibility maintained\n```\n\n**Sources:** [content/developer/api/API-4_1.adoc:6-10](), [content/admin/releases/7.10.x/_index.en.adoc:1-50](), [content/admin/releases/7.11.x/_index.en.adoc:1-50]()\n\n## Custom API Extensions\n\nAPI v4.1 supports custom method extensions through the service framework:\n\n### Custom Method Implementation\n\n| Component | Location | Purpose |\n|-----------|----------|---------|\n| **Custom Service Class** | `custom/service/v4_1_custom/` | Extended service implementation |\n| **Registry File** | `custom/service/v4_1_custom/registry.php` | Method registration |\n| **Implementation Class** | `SugarWebServiceImplv4_1_custom` | Custom method definitions |\n\n### Extension Architecture\n\n```mermaid\ngraph TB\n    subgraph \"Core API Framework\"\n        COREIMPL[\"SugarWebServiceImplv4_1\u003cbr/\u003eservice/v4_1/\"]\n        COREREG[\"Core Registry\u003cbr/\u003eservice/v4_1/registry.php\"]\n    end\n    \n    subgraph \"Custom Extensions\"\n        CUSTOMIMPL[\"SugarWebServiceImplv4_1_custom\u003cbr/\u003ecustom/service/v4_1_custom/\"]\n        CUSTOMREG[\"Custom Registry\u003cbr/\u003ecustom/service/v4_1_custom/registry.php\"]\n        CUSTOMMETHODS[\"Custom Methods\u003cbr/\u003ewrite_log_message()\u003cbr/\u003ecustom_operation()\"]\n    end\n    \n    subgraph \"API Endpoints\"\n        SOAPEP[\"SOAP Endpoint\"]\n        RESTEP[\"REST Endpoint\"]\n    end\n    \n    CUSTOMIMPL --\u003e COREIMPL\n    CUSTOMREG --\u003e COREREG\n    CUSTOMMETHODS --\u003e CUSTOMIMPL\n    \n    SOAPEP --\u003e CUSTOMIMPL\n    RESTEP --\u003e CUSTOMIMPL\n```\n\n**Sources:** [content/developer/api/API-4_1.adoc:230-290]()\n\n## Security Considerations\n\nAPI v4.1 implementations should address several security aspects documented in release notes:\n\n### Common Security Issues\n\n| Issue Type | Description | Mitigation |\n|------------|-------------|------------|\n| **SQL Injection** | Direct query parameter usage | Input validation and sanitization |\n| **Access Control** | Insufficient permission checks | Session validation and ACL enforcement |\n| **Authentication Bypass** | Session handling vulnerabilities | Proper session management |\n\n### Security Updates Timeline\n\nThe release notes show ongoing security maintenance across versions, with CVE identifiers tracking specific vulnerabilities in API v4.1 implementations.\n\n**Sources:** [content/admin/releases/7.10.x/_index.en.adoc:20-35](), [content/admin/releases/7.11.x/_index.en.adoc:20-35](), [content/admin/releases/7.12.x/_index.en.adoc:20-35]()"])</script><script>self.__next_f.push([1,"20:T308a,"])</script><script>self.__next_f.push([1,"# JSON API (v8)\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [content/admin/administration-panel/System.adoc](content/admin/administration-panel/System.adoc)\n- [content/blog/Customizing-Subthemes.adoc](content/blog/Customizing-Subthemes.adoc)\n- [content/developer/api/Developer-setup-guide/Configure Authentication.adoc](content/developer/api/Developer-setup-guide/Configure Authentication.adoc)\n- [content/developer/api/Developer-setup-guide/Customization.adoc](content/developer/api/Developer-setup-guide/Customization.adoc)\n- [content/developer/api/Developer-setup-guide/Getting Available Resources.adoc](content/developer/api/Developer-setup-guide/Getting Available Resources.adoc)\n- [content/developer/api/Developer-setup-guide/Introduction.adoc](content/developer/api/Developer-setup-guide/Introduction.adoc)\n- [content/developer/api/Developer-setup-guide/JSON-API.adoc](content/developer/api/Developer-setup-guide/JSON-API.adoc)\n- [content/developer/api/Developer-setup-guide/Managing Tokens.adoc](content/developer/api/Developer-setup-guide/Managing Tokens.adoc)\n- [content/developer/api/Developer-setup-guide/Requirements.adoc](content/developer/api/Developer-setup-guide/Requirements.adoc)\n- [content/developer/api/Developer-setup-guide/SuiteCRM_V8_API_Set_Up_For_Postman.adoc](content/developer/api/Developer-setup-guide/SuiteCRM_V8_API_Set_Up_For_Postman.adoc)\n- [content/developer/api/Developer-setup-guide/_index.en.adoc](content/developer/api/Developer-setup-guide/_index.en.adoc)\n- [static/images/en/developer/Admin-OAuth2Clients-2.png](static/images/en/developer/Admin-OAuth2Clients-2.png)\n- [static/images/en/developer/Admin-OAuth2Clients-3.png](static/images/en/developer/Admin-OAuth2Clients-3.png)\n\n\u003c/details\u003e\n\n\n\n## Purpose and Scope\n\nThe JSON API (v8) is SuiteCRM's modern REST API interface available exclusively in SuiteCRM 8.x series. It implements the JSON API 1.0 specification over HTTPS and provides OAuth2-secured access to CRM data and functionality. This API replaces the legacy SOAP and REST interfaces found in API v4.1.\n\nFor information about the legacy API system available in SuiteCRM 7.x and 8.x, see [API v4.1 (SOAP \u0026 REST)](#4.1). For broader API documentation context, see [API Documentation](#4).\n\n## System Architecture\n\nThe JSON API v8 is built on the Slim framework and follows a modular architecture with clear separation between authentication, routing, and business logic components.\n\n### Core Architecture Overview\n\n```mermaid\ngraph TB\n    subgraph \"Client Layer\"\n        CLIENT[\"`Client Application`\"]\n        SWAGGER[\"`Swagger Documentation`\"]\n    end\n    \n    subgraph \"API Gateway\"\n        HTACCESS[\"`/.htaccess`\"]\n        ENTRY[\"`/Api/V8/entry.php`\"]\n    end\n    \n    subgraph \"Authentication Layer\"\n        OAUTH[\"`OAuth2 Server`\"]\n        TOKEN[\"`/Api/access_token`\"]\n        KEYS[\"`/Api/V8/OAuth2/private.key`\"]\n    end\n    \n    subgraph \"Slim Framework Core\"\n        SLIM[\"`Slim Application`\"]\n        ROUTES[\"`/Api/V8/Config/routes.php`\"]\n        MIDDLEWARE[\"`Authentication Middleware`\"]\n    end\n    \n    subgraph \"API Handlers\"\n        MODULE[\"`Module Endpoints`\"]\n        META[\"`Meta Endpoints`\"]\n        CUSTOM[\"`Custom Extensions`\"]\n    end\n    \n    subgraph \"Data Layer\"\n        BEANS[\"`SugarBean Objects`\"]\n        DATABASE[\"`MySQL Database`\"]\n    end\n    \n    CLIENT --\u003e HTACCESS\n    HTACCESS --\u003e ENTRY\n    ENTRY --\u003e OAUTH\n    OAUTH --\u003e TOKEN\n    TOKEN --\u003e KEYS\n    ENTRY --\u003e SLIM\n    SLIM --\u003e ROUTES\n    ROUTES --\u003e MIDDLEWARE\n    MIDDLEWARE --\u003e MODULE\n    MIDDLEWARE --\u003e META\n    MIDDLEWARE --\u003e CUSTOM\n    MODULE --\u003e BEANS\n    META --\u003e BEANS\n    CUSTOM --\u003e BEANS\n    BEANS --\u003e DATABASE\n    \n    SWAGGER --\u003e CLIENT\n```\n\nSources: [content/developer/api/Developer-setup-guide/JSON-API.adoc:1-389](), [content/developer/api/Developer-setup-guide/Getting Available Resources.adoc:1-115]()\n\n### Authentication Flow\n\n```mermaid\nsequenceDiagram\n    participant Client\n    participant \"OAuth2Server\" as OAuth\n    participant \"access_token\" as Token\n    participant \"private.key\" as Keys\n    participant \"API Endpoints\" as API\n    \n    Client-\u003e\u003eOAuth: POST /Api/access_token\n    Note over Client,OAuth: client_credentials or password grant\n    OAuth-\u003e\u003eKeys: Load encryption keys\n    Keys--\u003e\u003eOAuth: public/private key pair\n    OAuth-\u003e\u003eToken: Generate JWT token\n    Token--\u003e\u003eClient: Bearer token + expires_in\n    \n    Client-\u003e\u003eAPI: API Request with Authorization header\n    Note over Client,API: Bearer {access_token}\n    API-\u003e\u003eKeys: Validate JWT signature\n    Keys--\u003e\u003eAPI: Token validation result\n    API--\u003e\u003eClient: JSON API response\n```\n\nSources: [content/developer/api/Developer-setup-guide/JSON-API.adoc:17-96](), [content/developer/api/Developer-setup-guide/Configure Authentication.adoc:8-307]()\n\n## Authentication System\n\nThe JSON API v8 uses OAuth2 for authentication with JWT tokens. The system supports two grant types available through the SuiteCRM admin panel.\n\n### OAuth2 Grant Types\n\n| Grant Type | Purpose | Available Since |\n|------------|---------|----------------|\n| Client Credentials | Machine-to-machine authentication | SuiteCRM 7.10.2+ |\n| Password | User authentication with username/password | SuiteCRM 7.10.0+ |\n| Refresh Token | Token renewal | SuiteCRM 7.10.0+ |\n\n### Setup Requirements\n\nBefore using the API, several setup steps are required:\n\n1. **Composer Dependencies**: Install required packages via `composer install`\n2. **OAuth2 Keys**: Generate RSA key pair in `/Api/V8/OAuth2/`\n3. **Encryption Key**: Configure `oauth2_encryption_key` in `config.php`\n4. **mod_rewrite**: Enable Apache mod_rewrite module\n\n```bash\n# Generate OAuth2 keys\nopenssl genrsa -out private.key 2048\nopenssl rsa -in private.key -pubout -out public.key\nsudo chmod 600 private.key public.key\nsudo chown www-data:www-data p*.key\n```\n\nSources: [content/developer/api/Developer-setup-guide/JSON-API.adoc:10-67](), [content/developer/api/Developer-setup-guide/Requirements.adoc:21-29]()\n\n### Token Endpoint\n\nThe authentication endpoint follows this pattern:\n\n**POST** `/Api/access_token`\n\nRequest parameters vary by grant type:\n\n```json\n{\n  \"grant_type\": \"client_credentials\",\n  \"client_id\": \"3D7f3fda97-d8e2-b9ad-eb89-5a2fe9b07650\",\n  \"client_secret\": \"client_secret\"\n}\n```\n\nResponse includes JWT bearer token:\n\n```json\n{\n  \"token_type\": \"Bearer\",\n  \"expires_in\": 3600,\n  \"access_token\": \"eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiI...\"\n}\n```\n\nSources: [content/developer/api/Developer-setup-guide/Configure Authentication.adoc:61-105]()\n\n## Core Endpoints and Operations\n\nThe API provides a consistent interface for CRUD operations on SuiteCRM modules and their relationships.\n\n### Module Operations\n\n```mermaid\ngraph TB\n    subgraph \"Module Endpoints\"\n        GET_ONE[\"`GET /V8/module/{moduleName}/{id}`\"]\n        GET_COLLECTION[\"`GET /V8/module/{moduleName}`\"]\n        POST_CREATE[\"`POST /V8/module`\"]\n        PATCH_UPDATE[\"`PATCH /V8/module`\"]\n        DELETE_RECORD[\"`DELETE /V8/module/{moduleName}/{id}`\"]\n    end\n    \n    subgraph \"Relationship Endpoints\"\n        GET_REL[\"`GET /V8/module/{moduleName}/{id}/relationships/{linkFieldName}`\"]\n        POST_REL[\"`POST /V8/module/{moduleName}/{id}/relationships/{linkFieldName}`\"]\n        DELETE_REL[\"`DELETE /V8/module/{moduleName}/{id}/relationships/{linkFieldName}/{relatedBeanId}`\"]\n    end\n    \n    subgraph \"Meta Endpoints\"\n        GET_MODULES[\"`GET /V8/meta/modules`\"]\n        GET_FIELDS[\"`GET /V8/meta/fields/{moduleName}`\"]\n        GET_SWAGGER[\"`GET /V8/meta/swagger.json`\"]\n    end\n    \n    subgraph \"Utility Endpoints\"\n        POST_LOGOUT[\"`POST /V8/logout`\"]\n    end\n```\n\nSources: [content/developer/api/Developer-setup-guide/JSON-API.adoc:269-388]()\n\n### Query Parameters\n\nThe API supports JSON API 1.0 compliant query parameters:\n\n| Parameter | Purpose | Example |\n|-----------|---------|---------|\n| `fields[Module]` | Field filtering | `fields[Accounts]=name,account_type` |\n| `page[number]` | Pagination | `page[number]=3\u0026page[size]=10` |\n| `page[size]` | Page size | `page[size]=25` |\n| `sort` | Sorting | `sort=-name` (DESC) or `sort=name` (ASC) |\n| `filter` | Record filtering | `filter[account_type][eq]=Customer` |\n\n### Filter Operators\n\nThe API supports these comparison and logical operators:\n\n**Comparison Operators:**\n- `eq` (equals)\n- `neq` (not equals) \n- `gt` (greater than)\n- `gte` (greater than or equal)\n- `lt` (less than)\n- `lte` (less than or equal)\n\n**Logical Operators:**\n- `AND`\n- `OR`\n\nSources: [content/developer/api/Developer-setup-guide/JSON-API.adoc:98-268]()\n\n## Request and Response Structure\n\n### JSON API Compliance\n\nAll requests and responses follow the JSON API 1.0 specification with SuiteCRM-specific extensions in meta objects.\n\n### Sample Request Structure\n\n```json\n{\n  \"data\": {\n    \"type\": \"Accounts\",\n    \"attributes\": {\n      \"name\": \"Test Account\",\n      \"account_type\": \"Customer\"\n    }\n  }\n}\n```\n\n### Sample Response Structure\n\n```json\n{\n  \"data\": {\n    \"type\": \"Account\",\n    \"id\": \"11a71596-83e7-624d-c792-5ab9006dd493\",\n    \"attributes\": {\n      \"name\": \"White Cross Co\",\n      \"account_type\": \"Customer\"\n    },\n    \"relationships\": {\n      \"AOS_Contracts\": {\n        \"links\": {\n          \"related\": \"/V8/module/Accounts/11a71596-83e7-624d-c792-5ab9006dd493/relationships/aos_contracts\"\n        }\n      }\n    }\n  },\n  \"meta\": {\n    \"total-pages\": 54\n  },\n  \"links\": {\n    \"first\": \"/V8/module/Accounts?page[number]=1\u0026page[size]=1\",\n    \"next\": \"/V8/module/Accounts?page[number]=2\u0026page[size]=1\"\n  }\n}\n```\n\nSources: [content/developer/api/Developer-setup-guide/JSON-API.adoc:113-174]()\n\n## API Documentation and Discovery\n\n### Swagger Documentation\n\nThe API provides machine-readable documentation via Swagger/OpenAPI specification:\n\n- **Static file**: `/Api/docs/swagger/swagger.json`\n- **API endpoint**: `GET /Api/V8/meta/swagger.json`\n\nThe Swagger documentation includes:\n- Available endpoints and HTTP methods\n- Request/response schemas\n- Parameter descriptions\n- Authentication requirements\n- Example values\n\nSources: [content/developer/api/Developer-setup-guide/Getting Available Resources.adoc:8-115]()\n\n## Customization and Extensions\n\n### Extension Architecture\n\nThe API provides a comprehensive extension system located in `/custom/application/Ext/Api/V8/`:\n\n```mermaid\ngraph TB\n    subgraph \"Extension Files\"\n        SLIM_CONFIG[\"`slim.php`\"]\n        ROUTES[\"`Config/routes.php`\"]\n        SERVICES[\"`services.php`\"]\n        CONTROLLERS[\"`controllers.php`\"]\n        MIDDLEWARE[\"`middlewares.php`\"]\n        VALIDATORS[\"`validators.php`\"]\n        HELPERS[\"`helpers.php`\"]\n        FACTORIES[\"`factories.php`\"]\n        GLOBALS[\"`globals.php`\"]\n        PARAMS[\"`params.php`\"]\n        ALIASES[\"`beanAliases.php`\"]\n    end\n    \n    subgraph \"Slim Framework\"\n        SLIM_APP[\"`Slim Application`\"]\n        CONTAINER[\"`DI Container`\"]\n    end\n    \n    SLIM_CONFIG --\u003e SLIM_APP\n    ROUTES --\u003e SLIM_APP\n    SERVICES --\u003e CONTAINER\n    CONTROLLERS --\u003e CONTAINER\n    MIDDLEWARE --\u003e CONTAINER\n    VALIDATORS --\u003e CONTAINER\n    HELPERS --\u003e CONTAINER\n    FACTORIES --\u003e CONTAINER\n    GLOBALS --\u003e CONTAINER\n    PARAMS --\u003e CONTAINER\n    ALIASES --\u003e SLIM_APP\n```\n\n### Custom Route Example\n\n```php\n// custom/application/Ext/Api/V8/Config/routes.php\n$app-\u003eget('/hello', function() {\n    return 'Hello World!';\n});\n\n$app-\u003epost('/my-route/{myParam}', 'MyCustomController:myCustomAction');\n```\n\n### Service Extension Example\n\n```php\n// custom/application/Ext/Api/V8/services.php\nreturn ['myCustomService' =\u003e function() {\n    return new MyCustomService();\n}];\n```\n\nSources: [content/developer/api/Developer-setup-guide/Customization.adoc:9-118]()\n\n## Integration Considerations\n\n### HTTPS Requirement\n\nThe API requires HTTPS/SSL for all communications to prevent man-in-the-middle attacks, as mandated by OAuth2 security standards.\n\n### PHP Version Compatibility\n\n- **Minimum**: PHP 5.5.9\n- **Recommended**: PHP 7.0+\n- **SuiteCRM 8.4+**: PHP 8.1+ required\n\n### Performance Considerations\n\n- Implement proper pagination using `page[size]` and `page[number]`\n- Use field filtering with `fields[Module]` to reduce payload size\n- Cache bearer tokens until expiration (default 3600 seconds)\n- Implement refresh token flow for long-running applications\n\nSources: [content/developer/api/Developer-setup-guide/Requirements.adoc:8-29](), [content/developer/api/Developer-setup-guide/JSON-API.adoc:132-174]()"])</script><script>self.__next_f.push([1,"21:T4743,"])</script><script>self.__next_f.push([1,"# Installation and Upgrade Guides\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [.gitignore](.gitignore)\n- [content/8.x/_index.en.adoc](content/8.x/_index.en.adoc)\n- [content/8.x/admin/Licensing.adoc](content/8.x/admin/Licensing.adoc)\n- [content/8.x/admin/_index.en.adoc](content/8.x/admin/_index.en.adoc)\n- [content/8.x/admin/_index.ru.adoc](content/8.x/admin/_index.ru.adoc)\n- [content/8.x/admin/configuration/LDAP-Configuration.ru.adoc](content/8.x/admin/configuration/LDAP-Configuration.ru.adoc)\n- [content/8.x/admin/configuration/Login-Throttling-Configuration.ru.adoc](content/8.x/admin/configuration/Login-Throttling-Configuration.ru.adoc)\n- [content/8.x/admin/configuration/SAML-Configuration.ru.adoc](content/8.x/admin/configuration/SAML-Configuration.ru.adoc)\n- [content/8.x/admin/configuration/_index.ru.adoc](content/8.x/admin/configuration/_index.ru.adoc)\n- [content/8.x/admin/installation-guide/Downloading \u0026 Installing.adoc](content/8.x/admin/installation-guide/Downloading \u0026 Installing.adoc)\n- [content/8.x/admin/installation-guide/Downloading \u0026 Installing.ru.adoc](content/8.x/admin/installation-guide/Downloading \u0026 Installing.ru.adoc)\n- [content/8.x/admin/installation-guide/Languages/install-a-new-language.adoc](content/8.x/admin/installation-guide/Languages/install-a-new-language.adoc)\n- [content/8.x/admin/installation-guide/Languages/install-a-new-language.ru.adoc](content/8.x/admin/installation-guide/Languages/install-a-new-language.ru.adoc)\n- [content/8.x/admin/installation-guide/Languages/update-a-language-pack.adoc](content/8.x/admin/installation-guide/Languages/update-a-language-pack.adoc)\n- [content/8.x/admin/installation-guide/Languages/update-a-language-pack.ru.adoc](content/8.x/admin/installation-guide/Languages/update-a-language-pack.ru.adoc)\n- [content/8.x/admin/installation-guide/Performance.en.adoc](content/8.x/admin/installation-guide/Performance.en.adoc)\n- [content/8.x/admin/installation-guide/Uninstalling.adoc](content/8.x/admin/installation-guide/Uninstalling.adoc)\n- [content/8.x/admin/installation-guide/Uninstalling.ru.adoc](content/8.x/admin/installation-guide/Uninstalling.ru.adoc)\n- [content/8.x/admin/installation-guide/Upgrading.ru.adoc](content/8.x/admin/installation-guide/Upgrading.ru.adoc)\n- [content/8.x/admin/installation-guide/running-the-cli-installer.ru.adoc](content/8.x/admin/installation-guide/running-the-cli-installer.ru.adoc)\n- [content/8.x/admin/installation-guide/running-the-ui-installer.ru.adoc](content/8.x/admin/installation-guide/running-the-ui-installer.ru.adoc)\n- [content/8.x/admin/installation-guide/webserver-setup-guide.ru.adoc](content/8.x/admin/installation-guide/webserver-setup-guide.ru.adoc)\n- [content/admin/installation-guide/Downloading \u0026 Installing.adoc](content/admin/installation-guide/Downloading \u0026 Installing.adoc)\n- [content/admin/installation-guide/Using the Upgrade Wizard.adoc](content/admin/installation-guide/Using the Upgrade Wizard.adoc)\n- [static/images/en/8.x/admin/install-guide/suite-cli-install-options.png](static/images/en/8.x/admin/install-guide/suite-cli-install-options.png)\n\n\u003c/details\u003e\n\n\n\nThis document provides comprehensive installation and upgrade procedures for SuiteCRM, covering both the legacy 7.x series and the modern 8.x architecture. It includes detailed instructions for fresh installations, version upgrades, and post-installation configuration including authentication setup and performance optimization.\n\nFor detailed API documentation, see [API Documentation](#4). For customization and development guidance, see [Customization and Development](#6). For system administration tasks, see [Administration](#7).\n\n## Installation Architecture Overview\n\nSuiteCRM supports multiple installation methods depending on the version and deployment requirements:\n\n**SuiteCRM Installation Methods Flow**\n```mermaid\nflowchart TD\n    START[\"Installation Decision\"]\n    \n    subgraph \"Version Selection\"\n        V7[\"SuiteCRM 7.x\u003cbr/\u003eLegacy Architecture\"]\n        V8[\"SuiteCRM 8.x\u003cbr/\u003eModern Architecture\"]\n    end\n    \n    subgraph \"7.x Installation\"\n        WEB7[\"Web-based Installer\u003cbr/\u003einstall.php\"]\n        MANUAL7[\"Manual Installation\u003cbr/\u003eFile Copy + Wizard\"]\n        CONFIG7[\"config.php Configuration\"]\n    end\n    \n    subgraph \"8.x Installation Methods\"\n        WEBUI8[\"Web UI Installer\u003cbr/\u003e/#/install\"]\n        CLI8[\"CLI Installer\u003cbr/\u003ebin/console suitecrm:app:install\"]\n        PREREQ8[\"Prerequisites Check\u003cbr/\u003eSymfony Requirements\"]\n    end\n    \n    subgraph \"Common Requirements\"\n        WEBSERVER[\"Web Server Setup\u003cbr/\u003eApache/Nginx + mod_rewrite\"]\n        DATABASE[\"Database Preparation\u003cbr/\u003eMySQL/MariaDB\"]\n        PHP[\"PHP Configuration\u003cbr/\u003eExtensions + php.ini\"]\n        PERMISSIONS[\"File Permissions\u003cbr/\u003echmod/chown\"]\n    end\n    \n    START --\u003e V7\n    START --\u003e V8\n    \n    V7 --\u003e WEB7\n    V7 --\u003e MANUAL7\n    WEB7 --\u003e CONFIG7\n    MANUAL7 --\u003e CONFIG7\n    \n    V8 --\u003e WEBUI8\n    V8 --\u003e CLI8\n    WEBUI8 --\u003e PREREQ8\n    CLI8 --\u003e PREREQ8\n    \n    V7 --\u003e WEBSERVER\n    V8 --\u003e WEBSERVER\n    WEBSERVER --\u003e DATABASE\n    DATABASE --\u003e PHP\n    PHP --\u003e PERMISSIONS\n```\n\nSources: [content/8.x/admin/installation-guide/Downloading \u0026 Installing.adoc:83-88](), [content/admin/installation-guide/Downloading \u0026 Installing.adoc:95-107](), [content/8.x/admin/installation-guide/running-the-ui-installer.ru.adoc:36-38]()\n\n## SuiteCRM 8.x Installation Process\n\n### Prerequisites and Web Server Setup\n\nSuiteCRM 8.x requires specific server configuration before installation:\n\n| Component | Requirement | Configuration File |\n|-----------|-------------|-------------------|\n| PHP Extensions | `cli`, `curl`, `intl`, `json`, `gd`, `mbstring`, `mysqli`, `pdo_mysql`, `openssl`, `soap`, `xml`, `zip` | `php.ini` |\n| Apache Module | `mod_rewrite` enabled | `httpd.conf` or `.htaccess` |\n| Error Reporting | `E_ALL \u0026 ~E_DEPRECATED \u0026 ~E_STRICT \u0026 ~E_NOTICE \u0026 ~E_WARNING` | `php.ini` |\n| Document Root | Points to `public/` directory | `vhost` configuration |\n\nThe web server setup involves configuring the document root to point to the `public/` directory for security:\n\n```apache\n\u003cVirtualHost *:80\u003e\n    DocumentRoot /\u003cpath-to-suite\u003e/public\n    \u003cDirectory /\u003cpath-to-suite\u003e/public\u003e\n        AllowOverride All\n        Order Allow,Deny\n        Allow from All\n    \u003c/Directory\u003e\n\u003c/VirtualHost\u003e\n```\n\nSources: [content/8.x/admin/installation-guide/webserver-setup-guide.ru.adoc:36-53](), [content/8.x/admin/installation-guide/webserver-setup-guide.ru.adoc:66-80]()\n\n### File Permissions Setup\n\nAfter extracting SuiteCRM files, specific permissions must be set:\n\n```bash\nfind . -type d -not -perm 2755 -exec chmod 2755 {} \\;\nfind . -type f -not -perm 0644 -exec chmod 0644 {} \\;\nfind . ! -user www-data -exec chown www-data:www-data {} \\;\nchmod +x bin/console\n```\n\nSources: [content/8.x/admin/installation-guide/Downloading \u0026 Installing.adoc:58-64](), [content/8.x/admin/installation-guide/running-the-cli-installer.ru.adoc:75-81]()\n\n### Installation Methods\n\n**SuiteCRM 8.x Installation Options**\n```mermaid\nflowchart LR\n    subgraph \"CLI Installation\"\n        CLI_CMD[\"bin/console suitecrm:app:install\"]\n        CLI_INTERACTIVE[\"Interactive Mode\u003cbr/\u003ePrompts for parameters\"]\n        CLI_PARAMS[\"Parameter Mode\u003cbr/\u003e-u -p -U -P -H -N -Z -S -d\"]\n    end\n    \n    subgraph \"Web UI Installation\"\n        WEB_URL[\"/#/install\"]\n        WEB_LICENSE[\"License Agreement\"]\n        WEB_CONFIG[\"Configuration Form\"]\n        WEB_VALIDATION[\"System Validation\"]\n    end\n    \n    subgraph \"Installation Parameters\"\n        ADMIN_USER[\"admin_username\"]\n        ADMIN_PASS[\"admin_password\"] \n        DB_USER[\"db_user\"]\n        DB_PASS[\"db_password\"]\n        DB_HOST[\"db_host\"]\n        DB_NAME[\"db_name\"]\n        DB_PORT[\"db_port\"]\n        SITE_URL[\"site_url\"]\n        DEMO_DATA[\"demo_data\"]\n    end\n    \n    CLI_CMD --\u003e CLI_INTERACTIVE\n    CLI_CMD --\u003e CLI_PARAMS\n    \n    WEB_URL --\u003e WEB_LICENSE\n    WEB_LICENSE --\u003e WEB_CONFIG\n    WEB_CONFIG --\u003e WEB_VALIDATION\n    \n    CLI_PARAMS --\u003e ADMIN_USER\n    WEB_CONFIG --\u003e ADMIN_USER\n    ADMIN_USER --\u003e ADMIN_PASS\n    ADMIN_PASS --\u003e DB_USER\n    DB_USER --\u003e DB_PASS\n    DB_PASS --\u003e DB_HOST\n    DB_HOST --\u003e DB_NAME\n    DB_NAME --\u003e DB_PORT\n    DB_PORT --\u003e SITE_URL\n    SITE_URL --\u003e DEMO_DATA\n```\n\nSources: [content/8.x/admin/installation-guide/running-the-cli-installer.ru.adoc:34-67](), [content/8.x/admin/installation-guide/running-the-ui-installer.ru.adoc:50-85]()\n\n## SuiteCRM 7.x Installation Process\n\n### Legacy Installation Wizard\n\nSuiteCRM 7.x uses a traditional PHP-based installation wizard accessible at `install.php`:\n\n**7.x Installation Flow**\n```mermaid\nflowchart TD\n    EXTRACT[\"Extract SuiteCRM Files\"]\n    PERMS[\"Set File Permissions\u003cbr/\u003echmod 755, 775\"]\n    WIZARD[\"Access install.php\"]\n    \n    subgraph \"Installation Wizard Steps\"\n        WELCOME[\"Welcome Page\"]\n        LICENSE[\"License Agreement\"]\n        SYSCHECK[\"System Requirements Check\"]\n        DBTYPE[\"Database Type Selection\"]\n        DBCONFIG[\"Database Configuration\"]\n        SITECONFIG[\"Site Configuration\"]\n        CONFIRM[\"Confirm Settings\"]\n        INSTALL[\"Installation Process\"]\n        COMPLETE[\"Installation Complete\"]\n    end\n    \n    subgraph \"Installation Types\"\n        TYPICAL[\"Typical Installation\u003cbr/\u003eStandard Settings\"]\n        CUSTOM[\"Custom Installation\u003cbr/\u003eAdvanced Options\"]\n    end\n    \n    EXTRACT --\u003e PERMS\n    PERMS --\u003e WIZARD\n    WIZARD --\u003e WELCOME\n    WELCOME --\u003e LICENSE\n    LICENSE --\u003e SYSCHECK\n    SYSCHECK --\u003e TYPICAL\n    SYSCHECK --\u003e CUSTOM\n    TYPICAL --\u003e DBTYPE\n    CUSTOM --\u003e DBTYPE\n    DBTYPE --\u003e DBCONFIG\n    DBCONFIG --\u003e SITECONFIG\n    SITECONFIG --\u003e CONFIRM\n    CONFIRM --\u003e INSTALL\n    INSTALL --\u003e COMPLETE\n```\n\nSources: [content/admin/installation-guide/Downloading \u0026 Installing.adoc:110-184](), [content/admin/installation-guide/Downloading \u0026 Installing.adoc:186-257]()\n\n## Upgrade Procedures\n\n### SuiteCRM 8.x Upgrade Process\n\nSuiteCRM 8.x uses console commands for upgrades without requiring special upgrade packages:\n\n**8.x Upgrade Workflow**\n```mermaid\nflowchart TD\n    BACKUP[\"Create System Backup\u003cbr/\u003eFiles + Database\"]\n    COMPAT[\"Check Compatibility Matrix\"]\n    ENV_CHECK[\"Verify APP_ENV=prod\u003cbr/\u003e.env.local\"]\n    \n    subgraph \"Version Constraints\"\n        V80_81[\"8.0.x → 8.1.x\u003cbr/\u003eDirect Upgrade\"]\n        V82_PLUS[\"8.2.x and Later\u003cbr/\u003eStandard Process\"]\n        V80_83[\"8.0.x → 8.3.x+\u003cbr/\u003eMust go through 8.2.x\"]\n    end\n    \n    subgraph \"Upgrade Commands\"\n        DOWNLOAD[\"Download Release Package\"]\n        EXTRACT[\"Extract to tmp/package/upgrade/\"]\n        UPGRADE_CMD[\"bin/console suitecrm:app:upgrade -t VERSION\"]\n        FINALIZE_CMD[\"bin/console suitecrm:app:upgrade-finalize -t VERSION\"]\n    end\n    \n    subgraph \"Metadata Merge Modes\"\n        KEEP_MODE[\"keep: Preserve existing\"]\n        MERGE_MODE[\"merge: Combine metadata\"] \n        OVERRIDE_MODE[\"override: Replace all\"]\n    end\n    \n    BACKUP --\u003e COMPAT\n    COMPAT --\u003e ENV_CHECK\n    ENV_CHECK --\u003e V80_81\n    ENV_CHECK --\u003e V82_PLUS\n    ENV_CHECK --\u003e V80_83\n    \n    V82_PLUS --\u003e DOWNLOAD\n    DOWNLOAD --\u003e EXTRACT\n    EXTRACT --\u003e UPGRADE_CMD\n    UPGRADE_CMD --\u003e FINALIZE_CMD\n    \n    FINALIZE_CMD --\u003e KEEP_MODE\n    FINALIZE_CMD --\u003e MERGE_MODE\n    FINALIZE_CMD --\u003e OVERRIDE_MODE\n```\n\nExample upgrade commands:\n```bash\n./bin/console suitecrm:app:upgrade -t SuiteCRM-8.3.0\n./bin/console suitecrm:app:upgrade-finalize -t SuiteCRM-8.3.0 -m merge\n```\n\nSources: [content/8.x/admin/installation-guide/Upgrading.ru.adoc:78-89](), [content/8.x/admin/installation-guide/Upgrading.ru.adoc:139-195]()\n\n### SuiteCRM 7.x Upgrade Wizard\n\nThe 7.x series uses a web-based Upgrade Wizard for version transitions:\n\n**7.x Upgrade Process**\n```mermaid\nflowchart TD\n    ADMIN_LOGIN[\"Login as Administrator\"]\n    UPGRADE_WIZARD[\"Access Upgrade Wizard\u003cbr/\u003eAdmin Panel\"]\n    \n    subgraph \"Upgrade Wizard Steps\"\n        SYSTEM_CHECK[\"System Checks\"]\n        UPLOAD[\"Upload Upgrade Package\"]\n        PREFLIGHT[\"Preflight Check\u003cbr/\u003eSchema Differences\"]\n        COMMIT[\"Commit Upgrade\"]\n        LAYOUT_MERGE[\"Layout Confirmation\u003cbr/\u003eThree-way Merge\"]\n        COMPLETE[\"Upgrade Complete\"]\n    end\n    \n    subgraph \"Post-Upgrade Tasks\"\n        REPAIR[\"Repair and Rebuild\u003cbr/\u003eRelationships + Extensions\"]\n        MANUAL_MERGE[\"Manual File Merging\u003cbr/\u003eSkipped Files\"]\n        LOG_CHECK[\"Check upgradeWizard.log\"]\n    end\n    \n    ADMIN_LOGIN --\u003e UPGRADE_WIZARD\n    UPGRADE_WIZARD --\u003e SYSTEM_CHECK\n    SYSTEM_CHECK --\u003e UPLOAD\n    UPLOAD --\u003e PREFLIGHT\n    PREFLIGHT --\u003e COMMIT\n    COMMIT --\u003e LAYOUT_MERGE\n    LAYOUT_MERGE --\u003e COMPLETE\n    COMPLETE --\u003e REPAIR\n    REPAIR --\u003e MANUAL_MERGE\n    MANUAL_MERGE --\u003e LOG_CHECK\n```\n\nSources: [content/admin/installation-guide/Using the Upgrade Wizard.adoc:16-98]()\n\n## Authentication Configuration\n\n### SAML Configuration\n\nSuiteCRM 8.x supports SAML authentication using OneloginSamlBundle:\n\n**SAML Authentication Flow**\n```mermaid\nflowchart LR\n    subgraph \"Configuration Files\"\n        ENV_LOCAL[\".env.local\u003cbr/\u003eAUTH_TYPE=saml\"]\n        SAML_CONFIG[\"extensions/custom/config/packages/\u003cbr/\u003ehslavich_onelogin_saml.yaml\"]\n        SECRETS[\"Symfony Secrets Vault\u003cbr/\u003eEncrypted Keys\"]\n    end\n    \n    subgraph \"SAML Components\" \n        IDP[\"Identity Provider\u003cbr/\u003eentityId, singleSignOnService\"]\n        SP[\"Service Provider\u003cbr/\u003eSuiteCRM Instance\"]\n        CERTIFICATES[\"X.509 Certificates\u003cbr/\u003eIDP + SP\"]\n    end\n    \n    subgraph \"User Management\"\n        AUTO_CREATE[\"SAML_AUTO_CREATE=enabled\"]\n        ATTR_MAP[\"Attribute Mapping\u003cbr/\u003eSAML → SuiteCRM Fields\"]\n        EXTERNAL_AUTH[\"external_auth_only Flag\"]\n    end\n    \n    ENV_LOCAL --\u003e SAML_CONFIG\n    SAML_CONFIG --\u003e IDP\n    SAML_CONFIG --\u003e SP\n    SAML_CONFIG --\u003e CERTIFICATES\n    CERTIFICATES --\u003e SECRETS\n    \n    IDP --\u003e AUTO_CREATE\n    SP --\u003e ATTR_MAP\n    ATTR_MAP --\u003e EXTERNAL_AUTH\n```\n\nKey configuration parameters:\n- `SAML_USERNAME_ATTRIBUTE`: Maps SAML attribute to SuiteCRM username\n- `SAML_USE_ATTRIBUTE_FRIENDLY_NAME`: Uses friendly names from SAML request\n\nSources: [content/8.x/admin/configuration/SAML-Configuration.ru.adoc:45-50](), [content/8.x/admin/configuration/SAML-Configuration.ru.adoc:90-191]()\n\n### LDAP Configuration\n\nLDAP authentication integrates with Symfony Security components:\n\n| Parameter | Description | Example |\n|-----------|-------------|---------|\n| `LDAP_HOST` | LDAP server hostname | `ldap.company.com` |\n| `LDAP_PORT` | Server port | `389` (standard) |\n| `LDAP_ENCRYPTION` | Connection security | `tls`, `ssl`, `none` |\n| `LDAP_DN_STRING` | Distinguished Name pattern | `cn={username},dc=example,dc=org` |\n| `LDAP_QUERY_STRING` | User search query | Custom search filter |\n\nSources: [content/8.x/admin/configuration/LDAP-Configuration.ru.adoc:44-98](), [content/8.x/admin/configuration/LDAP-Configuration.ru.adoc:120-206]()\n\n## Language Pack Installation\n\n### Language Pack Management\n\nSuiteCRM supports multiple languages through installable language packs:\n\n**Language Pack Installation Process**\n```mermaid\nflowchart TD\n    DOWNLOAD[\"Download Language Pack\u003cbr/\u003eZIP File\"]\n    ADMIN_PANEL[\"Access Admin Panel\u003cbr/\u003eModule Loader\"]\n    \n    subgraph \"Installation Steps\"\n        UPLOAD[\"Upload Language Pack\"]\n        INSTALL[\"Install Package\"]\n        REPAIR[\"Quick Repair and Rebuild\"]\n        LOGOUT[\"Logout from System\"]\n        LOGIN[\"Login with New Language\"]\n    end\n    \n    subgraph \"Update Process\"\n        UNINSTALL[\"Uninstall Old Pack\"]\n        REPAIR_OLD[\"Quick Repair\"]\n        INSTALL_NEW[\"Install New Pack\"] \n        REPAIR_NEW[\"Final Repair\"]\n    end\n    \n    DOWNLOAD --\u003e ADMIN_PANEL\n    ADMIN_PANEL --\u003e UPLOAD\n    UPLOAD --\u003e INSTALL\n    INSTALL --\u003e REPAIR\n    REPAIR --\u003e LOGOUT\n    LOGOUT --\u003e LOGIN\n    \n    ADMIN_PANEL --\u003e UNINSTALL\n    UNINSTALL --\u003e REPAIR_OLD\n    REPAIR_OLD --\u003e INSTALL_NEW\n    INSTALL_NEW --\u003e REPAIR_NEW\n```\n\nSources: [content/8.x/admin/installation-guide/Languages/install-a-new-language.ru.adoc:42-54](), [content/8.x/admin/installation-guide/Languages/update-a-language-pack.ru.adoc:10-17]()\n\n## Performance Configuration\n\n### Production Optimization\n\nFor production deployments, SuiteCRM 8.x supports several performance enhancements:\n\n**Performance Configuration Stack**\n```mermaid\nflowchart TD\n    subgraph \"PHP Optimization\"\n        OPCACHE[\"OPCache Configuration\u003cbr/\u003eopcache.enable=1\"]\n        APCU[\"APCu Cache\u003cbr/\u003eMemory Cache\"]\n        MEMORY[\"Memory Limits\u003cbr/\u003ephp.ini\"]\n    end\n    \n    subgraph \"Symfony Configuration\"\n        APP_ENV[\"APP_ENV=prod\u003cbr/\u003e.env.local\"]\n        CACHE_CLEAR[\"bin/console cache:clear\"]\n        METADATA_CACHE[\"API Platform Metadata Cache\"]\n    end\n    \n    subgraph \"Web Server\"\n        MOD_REWRITE[\"mod_rewrite Enable\"]\n        COMPRESSION[\"GZIP Compression\"]\n        STATIC_CACHE[\"Static File Caching\"]\n    end\n    \n    OPCACHE --\u003e APP_ENV\n    APCU --\u003e CACHE_CLEAR\n    MEMORY --\u003e METADATA_CACHE\n    \n    APP_ENV --\u003e MOD_REWRITE\n    CACHE_CLEAR --\u003e COMPRESSION\n    METADATA_CACHE --\u003e STATIC_CACHE\n```\n\nExample OPCache configuration for `php.ini`:\n```ini\n[opcache]\nzend_extension=opcache.so\nopcache.enable=1\nopcache.memory_consumption=256\nopcache.max_accelerated_files=20000\nopcache.validate_timestamps=0\n```\n\nSources: [content/8.x/admin/installation-guide/Performance.en.adoc:6-32](), [content/8.x/admin/installation-guide/Performance.en.adoc:42-60]()\n\n## Troubleshooting and Log Files\n\n### Common Installation Issues\n\n| Issue | Location | Solution |\n|-------|----------|----------|\n| Permission errors | File system | Re-run `chmod`/`chown` commands |\n| Database connection | `.env.local` | Verify credentials and host |\n| Session ID conflicts | `php.ini` | Set `session.name=PHPSESSID` |\n| Cache issues | `cache/` directory | Run `bin/console cache:clear` |\n\n### Log File Locations\n\nSuiteCRM 8.x maintains several log files for troubleshooting:\n\n- `logs/upgrade.log`: Upgrade process logs\n- `public/legacy/upgradeWizard.log`: Legacy upgrade logs  \n- `logs/\u003capp-env\u003e/\u003capp-env\u003e.log`: Main application logs\n- `public/legacy/suitecrm.log`: Legacy application logs\n- `logs/auth.log`: Authentication process logs\n\nSources: [content/8.x/admin/installation-guide/Upgrading.ru.adoc:291-314](), [content/8.x/admin/configuration/SAML-Configuration.ru.adoc:422-436]()"])</script><script>self.__next_f.push([1,"22:T316b,"])</script><script>self.__next_f.push([1,"# Installation Process\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [.gitignore](.gitignore)\n- [content/8.x/_index.en.adoc](content/8.x/_index.en.adoc)\n- [content/8.x/admin/Licensing.adoc](content/8.x/admin/Licensing.adoc)\n- [content/8.x/admin/_index.en.adoc](content/8.x/admin/_index.en.adoc)\n- [content/8.x/admin/_index.ru.adoc](content/8.x/admin/_index.ru.adoc)\n- [content/8.x/admin/configuration/LDAP-Configuration.ru.adoc](content/8.x/admin/configuration/LDAP-Configuration.ru.adoc)\n- [content/8.x/admin/configuration/Login-Throttling-Configuration.ru.adoc](content/8.x/admin/configuration/Login-Throttling-Configuration.ru.adoc)\n- [content/8.x/admin/configuration/SAML-Configuration.ru.adoc](content/8.x/admin/configuration/SAML-Configuration.ru.adoc)\n- [content/8.x/admin/configuration/_index.ru.adoc](content/8.x/admin/configuration/_index.ru.adoc)\n- [content/8.x/admin/installation-guide/Downloading \u0026 Installing.adoc](content/8.x/admin/installation-guide/Downloading \u0026 Installing.adoc)\n- [content/8.x/admin/installation-guide/Downloading \u0026 Installing.ru.adoc](content/8.x/admin/installation-guide/Downloading \u0026 Installing.ru.adoc)\n- [content/8.x/admin/installation-guide/Languages/install-a-new-language.adoc](content/8.x/admin/installation-guide/Languages/install-a-new-language.adoc)\n- [content/8.x/admin/installation-guide/Languages/install-a-new-language.ru.adoc](content/8.x/admin/installation-guide/Languages/install-a-new-language.ru.adoc)\n- [content/8.x/admin/installation-guide/Languages/update-a-language-pack.adoc](content/8.x/admin/installation-guide/Languages/update-a-language-pack.adoc)\n- [content/8.x/admin/installation-guide/Languages/update-a-language-pack.ru.adoc](content/8.x/admin/installation-guide/Languages/update-a-language-pack.ru.adoc)\n- [content/8.x/admin/installation-guide/Performance.en.adoc](content/8.x/admin/installation-guide/Performance.en.adoc)\n- [content/8.x/admin/installation-guide/Uninstalling.adoc](content/8.x/admin/installation-guide/Uninstalling.adoc)\n- [content/8.x/admin/installation-guide/Uninstalling.ru.adoc](content/8.x/admin/installation-guide/Uninstalling.ru.adoc)\n- [content/8.x/admin/installation-guide/Upgrading.ru.adoc](content/8.x/admin/installation-guide/Upgrading.ru.adoc)\n- [content/8.x/admin/installation-guide/running-the-cli-installer.ru.adoc](content/8.x/admin/installation-guide/running-the-cli-installer.ru.adoc)\n- [content/8.x/admin/installation-guide/running-the-ui-installer.ru.adoc](content/8.x/admin/installation-guide/running-the-ui-installer.ru.adoc)\n- [content/8.x/admin/installation-guide/webserver-setup-guide.ru.adoc](content/8.x/admin/installation-guide/webserver-setup-guide.ru.adoc)\n- [content/admin/installation-guide/Downloading \u0026 Installing.adoc](content/admin/installation-guide/Downloading \u0026 Installing.adoc)\n- [content/admin/installation-guide/Using the Upgrade Wizard.adoc](content/admin/installation-guide/Using the Upgrade Wizard.adoc)\n- [static/images/en/8.x/admin/install-guide/suite-cli-install-options.png](static/images/en/8.x/admin/install-guide/suite-cli-install-options.png)\n\n\u003c/details\u003e\n\n\n\nThis document covers the step-by-step installation process for SuiteCRM 8.x, including prerequisites, installation methods, and post-installation configuration. For upgrade procedures between versions, see [Upgrade Procedures](#5.2). For authentication setup after installation, see [Authentication Configuration](#5.3).\n\n## Overview\n\nThe SuiteCRM 8.x installation process involves setting up the web server environment, downloading and extracting files, configuring permissions, and running either a web-based or command-line installer. The system uses Symfony's console application for CLI operations and provides a modern Angular-based web installer interface.\n\n## Installation Architecture\n\n```mermaid\nflowchart TD\n    subgraph \"Prerequisites\"\n        WEBSERVER[\"Web Server Setup\"]\n        PHP[\"PHP 7.4+ with Extensions\"]\n        DATABASE[\"MySQL/MariaDB Database\"]\n        COMPOSER[\"File Permissions Setup\"]\n    end\n    \n    subgraph \"Installation Methods\"\n        UI_INSTALLER[\"Web UI Installer\u003cbr/\u003e/#/install route\"]\n        CLI_INSTALLER[\"CLI Installer\u003cbr/\u003ebin/console suitecrm:app:install\"]\n    end\n    \n    subgraph \"Core Installation Files\"\n        CONSOLE[\"bin/console\"]\n        CONFIG_LEGACY[\"public/legacy/config.php\"]\n        HTACCESS[\"public/legacy/.htaccess\"]\n        ENV_LOCAL[\".env.local\"]\n    end\n    \n    subgraph \"Post-Installation\"\n        PERMISSIONS[\"Permission Verification\"]\n        CONFIG_CHECK[\"Configuration Validation\"]\n        LOGIN[\"System Access\"]\n    end\n    \n    WEBSERVER --\u003e UI_INSTALLER\n    WEBSERVER --\u003e CLI_INSTALLER\n    PHP --\u003e UI_INSTALLER\n    PHP --\u003e CLI_INSTALLER\n    DATABASE --\u003e UI_INSTALLER\n    DATABASE --\u003e CLI_INSTALLER\n    COMPOSER --\u003e UI_INSTALLER\n    COMPOSER --\u003e CLI_INSTALLER\n    \n    UI_INSTALLER --\u003e CONSOLE\n    CLI_INSTALLER --\u003e CONSOLE\n    \n    CONSOLE --\u003e CONFIG_LEGACY\n    CONSOLE --\u003e HTACCESS\n    CONSOLE --\u003e ENV_LOCAL\n    \n    CONFIG_LEGACY --\u003e PERMISSIONS\n    HTACCESS --\u003e CONFIG_CHECK\n    ENV_LOCAL --\u003e LOGIN\n```\n\nSources: [content/8.x/admin/installation-guide/Downloading \u0026 Installing.adoc:15-89](), [content/8.x/admin/installation-guide/webserver-setup-guide.ru.adoc:23-100]()\n\n## Prerequisites and System Preparation\n\n### Web Server Requirements\n\nThe installation requires proper web server configuration with the document root pointing to the `public` directory. The system uses Apache's `mod_rewrite` for URL routing and API calls.\n\n| Component | Requirement | Configuration File |\n|-----------|------------|-------------------|\n| Web Server | Apache with `mod_rewrite` | Virtual host config |\n| PHP | 7.4+ with required extensions | `php.ini` |\n| Database | MySQL/MariaDB | Database server |\n| File System | Proper permissions | Directory structure |\n\n### Required PHP Extensions\n\n```mermaid\ngraph LR\n    subgraph \"Core Extensions\"\n        CLI[\"cli\"]\n        CURL[\"curl\"]\n        COMMON[\"common\"]\n        INTL[\"intl\"]\n        JSON[\"json\"]\n    end\n    \n    subgraph \"Database Extensions\"\n        MYSQLI[\"mysqli\"]\n        PDO_MYSQL[\"pdo_mysql\"]\n    end\n    \n    subgraph \"Utility Extensions\"\n        GD[\"gd\"]\n        MBSTRING[\"mbstring\"]\n        OPENSSL[\"openssl\"]\n        SOAP[\"soap\"]\n        XML[\"xml\"]\n        ZIP[\"zip\"]\n    end\n    \n    subgraph \"Optional Extensions\"\n        IMAP[\"imap\"]\n        LDAP[\"ldap\"]\n    end\n```\n\nSources: [content/8.x/admin/installation-guide/webserver-setup-guide.ru.adoc:34-53]()\n\n### File Permission Setup\n\nThe system requires specific permissions for proper operation:\n\n```bash\nfind . -type d -not -perm 2755 -exec chmod 2755 {} \\;\nfind . -type f -not -perm 0644 -exec chmod 0644 {} \\;\nfind . ! -user www-data -exec chown www-data:www-data {} \\;\nchmod +x bin/console\n```\n\nSources: [content/8.x/admin/installation-guide/Downloading \u0026 Installing.adoc:58-64](), [content/8.x/admin/installation-guide/running-the-cli-installer.ru.adoc:75-81]()\n\n## Installation Methods\n\n### Web UI Installer\n\nThe web-based installer provides a guided installation process accessible through the browser at `/#/install` route when SuiteCRM is not yet configured.\n\n```mermaid\nsequenceDiagram\n    participant Browser\n    participant WebServer\n    participant Angular as \"Angular UI\"\n    participant Console as \"bin/console\"\n    participant Database\n    \n    Browser-\u003e\u003eWebServer: Navigate to /#/install\n    WebServer-\u003e\u003eAngular: Load installer interface\n    Angular-\u003e\u003eBrowser: Display license agreement\n    Browser-\u003e\u003eAngular: Accept license, enter config\n    Angular-\u003e\u003eConsole: Execute installation commands\n    Console-\u003e\u003eDatabase: Create schema and data\n    Console-\u003e\u003eWebServer: Generate config files\n    WebServer-\u003e\u003eBrowser: Redirect to login\n```\n\n#### Configuration Parameters\n\n| Parameter | Description | Example |\n|-----------|-------------|---------|\n| URL | SuiteCRM instance location | `https://example-domain.com` |\n| Database Name | Target database name | `suitecrm` |\n| Database Host | Database server host | `localhost` or `127.0.0.1` |\n| Database User | Database admin user | Database administrator |\n| Database Password | Database admin password | Secure password |\n| Admin Username | System admin username | `admin` |\n| Admin Password | System admin password | Secure password |\n\nSources: [content/8.x/admin/installation-guide/running-the-ui-installer.ru.adoc:50-83]()\n\n### CLI Installer\n\nThe command-line installer uses Symfony's console component for automated installations:\n\n```bash\n./bin/console suitecrm:app:install -u \"admin_username\" -p \"admin_password\" -U \"db_user\" -P \"db_password\" -H \"db_host\" -N \"db_name\" -Z \"db_port\" -S \"site_url\" -d \"demo_data\"\n```\n\n#### CLI Parameters\n\n```mermaid\ngraph TD\n    CONSOLE[\"bin/console suitecrm:app:install\"]\n    \n    subgraph \"Admin Parameters\"\n        U_PARAM[\"-u admin_username\"]\n        P_PARAM[\"-p admin_password\"]\n    end\n    \n    subgraph \"Database Parameters\"\n        DB_U[\"-U db_user\"]\n        DB_P[\"-P db_password\"]\n        DB_H[\"-H db_host\"]\n        DB_N[\"-N db_name\"]\n        DB_Z[\"-Z db_port\"]\n    end\n    \n    subgraph \"System Parameters\"\n        SITE_URL[\"-S site_url\"]\n        DEMO_DATA[\"-d demo_data\"]\n    end\n    \n    CONSOLE --\u003e U_PARAM\n    CONSOLE --\u003e P_PARAM\n    CONSOLE --\u003e DB_U\n    CONSOLE --\u003e DB_P\n    CONSOLE --\u003e DB_H\n    CONSOLE --\u003e DB_N\n    CONSOLE --\u003e DB_Z\n    CONSOLE --\u003e SITE_URL\n    CONSOLE --\u003e DEMO_DATA\n```\n\nSources: [content/8.x/admin/installation-guide/running-the-cli-installer.ru.adoc:39-68]()\n\n## Configuration File Generation\n\n### Core Configuration Files\n\nThe installation process generates several critical configuration files:\n\n| File | Purpose | Key Directives |\n|------|---------|---------------|\n| `public/legacy/config.php` | Legacy system config | `site_url`, database settings |\n| `public/legacy/.htaccess` | URL rewriting rules | `RewriteBase`, routing rules |\n| `.env.local` | Environment variables | `APP_ENV`, `DATABASE_URL` |\n\n### Configuration Validation\n\n```mermaid\nflowchart TD\n    subgraph \"Configuration Checks\"\n        VHOST_CHECK[\"Virtual Host Configuration\"]\n        SITE_URL_CHECK[\"site_url Directive\"]\n        REWRITE_BASE[\"RewriteBase Setting\"]\n        PUBLIC_PATH[\"Public Directory Path\"]\n    end\n    \n    subgraph \"File Locations\"\n        CONFIG_PHP[\"public/legacy/config.php\"]\n        HTACCESS_FILE[\"public/legacy/.htaccess\"]\n    end\n    \n    subgraph \"Validation Rules\"\n        RULE1[\"If vhost != public: add /public to site_url\"]\n        RULE2[\"If vhost = legacy: RewriteBase /legacy\"]\n        RULE3[\"Else: RewriteBase /path/to/public/legacy\"]\n    end\n    \n    VHOST_CHECK --\u003e CONFIG_PHP\n    SITE_URL_CHECK --\u003e CONFIG_PHP\n    REWRITE_BASE --\u003e HTACCESS_FILE\n    PUBLIC_PATH --\u003e HTACCESS_FILE\n    \n    CONFIG_PHP --\u003e RULE1\n    HTACCESS_FILE --\u003e RULE2\n    HTACCESS_FILE --\u003e RULE3\n```\n\nSources: [content/8.x/admin/installation-guide/running-the-ui-installer.ru.adoc:94-103](), [content/8.x/admin/installation-guide/running-the-cli-installer.ru.adoc:94-103]()\n\n## Post-Installation Steps\n\n### Permission Verification\n\nAfter installation, verify that file permissions are correctly set, especially for:\n\n- `bin/console` - Must be executable\n- Cache directories - Must be writable by web server\n- Configuration files - Must be readable by web server\n\n### System Access Validation\n\nThe completed installation should be accessible at the configured URL with the admin credentials provided during installation.\n\n### Session Configuration\n\nSuiteCRM requires the PHP session identifier to be set to `PHPSESSID`. If experiencing 403 errors on `/api/graphql` calls, verify the `session.name` setting in `php.ini`.\n\nSources: [content/8.x/admin/installation-guide/Downloading \u0026 Installing.adoc:67-69]()\n\n## Installation Command Reference\n\n### Key Console Commands\n\n```mermaid\ngraph LR\n    subgraph \"Installation Commands\"\n        INSTALL[\"suitecrm:app:install\"]\n        HELP[\"suitecrm:app:install --help\"]\n    end\n    \n    subgraph \"Maintenance Commands\"\n        CACHE_CLEAR[\"cache:clear\"]\n        PERMISSIONS[\"File permission commands\"]\n    end\n    \n    BIN_CONSOLE[\"bin/console\"] --\u003e INSTALL\n    BIN_CONSOLE --\u003e HELP\n    BIN_CONSOLE --\u003e CACHE_CLEAR\n    SYSTEM_COMMANDS[\"System Commands\"] --\u003e PERMISSIONS\n```\n\n### Interactive vs Non-Interactive Installation\n\nThe CLI installer supports both interactive mode (prompts for input) and non-interactive mode (all parameters provided via command line arguments).\n\nSources: [content/8.x/admin/installation-guide/running-the-cli-installer.ru.adoc:34-37](), [content/8.x/admin/installation-guide/running-the-cli-installer.ru.adoc:69-71]()"])</script><script>self.__next_f.push([1,"23:T3969,"])</script><script>self.__next_f.push([1,"# Upgrade Procedures\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [content/8.x/_index.en.adoc](content/8.x/_index.en.adoc)\n- [content/8.x/admin/Licensing.adoc](content/8.x/admin/Licensing.adoc)\n- [content/8.x/admin/_index.en.adoc](content/8.x/admin/_index.en.adoc)\n- [content/8.x/admin/_index.ru.adoc](content/8.x/admin/_index.ru.adoc)\n- [content/8.x/admin/installation-guide/Downloading \u0026 Installing.adoc](content/8.x/admin/installation-guide/Downloading \u0026 Installing.adoc)\n- [content/8.x/admin/installation-guide/Languages/install-a-new-language.adoc](content/8.x/admin/installation-guide/Languages/install-a-new-language.adoc)\n- [content/8.x/admin/installation-guide/Languages/update-a-language-pack.adoc](content/8.x/admin/installation-guide/Languages/update-a-language-pack.adoc)\n- [content/8.x/admin/installation-guide/Performance.en.adoc](content/8.x/admin/installation-guide/Performance.en.adoc)\n- [content/8.x/admin/installation-guide/Uninstalling.adoc](content/8.x/admin/installation-guide/Uninstalling.adoc)\n- [content/8.x/admin/releases/8.1/_index.en.adoc](content/8.x/admin/releases/8.1/_index.en.adoc)\n- [content/8.x/admin/releases/8.2/_index.en.adoc](content/8.x/admin/releases/8.2/_index.en.adoc)\n- [content/8.x/admin/releases/8.3/_index.en.adoc](content/8.x/admin/releases/8.3/_index.en.adoc)\n- [content/8.x/admin/releases/8.4/_index.en.adoc](content/8.x/admin/releases/8.4/_index.en.adoc)\n- [content/8.x/admin/releases/8.5/_index.en.adoc](content/8.x/admin/releases/8.5/_index.en.adoc)\n- [content/8.x/admin/releases/8.6/_index.en.adoc](content/8.x/admin/releases/8.6/_index.en.adoc)\n- [content/8.x/admin/releases/8.7/_index.en.adoc](content/8.x/admin/releases/8.7/_index.en.adoc)\n- [content/8.x/admin/upgrading/general-info.adoc](content/8.x/admin/upgrading/general-info.adoc)\n- [content/blog/larger-upgrades.adoc](content/blog/larger-upgrades.adoc)\n- [i18n/es.toml](i18n/es.toml)\n- [layouts/partials/home-cta1.html](layouts/partials/home-cta1.html)\n- [layouts/partials/home-cta2.html](layouts/partials/home-cta2.html)\n- [layouts/partials/home-cta3.html](layouts/partials/home-cta3.html)\n- [layouts/partials/home-cta4.html](layouts/partials/home-cta4.html)\n- [layouts/partials/last-blog-posts.html](layouts/partials/last-blog-posts.html)\n- [layouts/partials/recently-edited-item.html](layouts/partials/recently-edited-item.html)\n- [layouts/partials/recently-edited.html](layouts/partials/recently-edited.html)\n- [layouts/partials/tags.html](layouts/partials/tags.html)\n- [static/css/tags.css](static/css/tags.css)\n- [static/images/en/8.x/admin/install-guide/suite-cli-install-options.png](static/images/en/8.x/admin/install-guide/suite-cli-install-options.png)\n- [static/images/en/8.x/admin/release/portal-user-enable-buttons.gif](static/images/en/8.x/admin/release/portal-user-enable-buttons.gif)\n- [static/images/en/8.x/admin/release/preinstall-page-re-styled.png](static/images/en/8.x/admin/release/preinstall-page-re-styled.png)\n- [static/images/en/8.x/admin/release/release-notes-field-actions-example.gif](static/images/en/8.x/admin/release/release-notes-field-actions-example.gif)\n- [themes/hugo-theme-learn/layouts/partials/summary-minus-toc.html](themes/hugo-theme-learn/layouts/partials/summary-minus-toc.html)\n- [themes/hugo-theme-learn/layouts/partials/toc.html](themes/hugo-theme-learn/layouts/partials/toc.html)\n\n\u003c/details\u003e\n\n\n\nThis document covers the upgrade procedures for SuiteCRM installations, focusing on the technical processes, version compatibility requirements, and upgrade paths between different SuiteCRM versions. For initial installation procedures, see [Installation Process](#5.1). For post-upgrade authentication configuration, see [Authentication Configuration](#5.3).\n\n## Purpose and Scope\n\nThe upgrade procedures encompass version-specific upgrade paths, system requirement changes, backward compatibility considerations, and the technical execution of upgrades for both SuiteCRM 7.x and 8.x series. This includes database migrations, file management, configuration updates, and validation processes.\n\n## Version Compatibility and Upgrade Paths\n\n### SuiteCRM Version Ecosystem\n\n```mermaid\ngraph TD\n    subgraph \"Legacy 7.x Series\"\n        V78[\"7.8.x\u003cbr/\u003eEOL\"]\n        V710[\"7.10.x\u003cbr/\u003eExtended Support Ended\"]\n        V711[\"7.11.x\u003cbr/\u003eMaintenance Mode\"]\n        V712[\"7.12.x\u003cbr/\u003eLatest 7.x\"]\n        V713[\"7.13.x\u003cbr/\u003eOAuth Email\"]\n        V714[\"7.14.x\u003cbr/\u003ePHP 8.2 Support\"]\n    end\n    \n    subgraph \"Modern 8.x Series\"\n        V80[\"8.0.x\u003cbr/\u003eInitial Release\"]\n        V81[\"8.1.x\u003cbr/\u003eEarly Adopter\"]\n        V82[\"8.2.x\u003cbr/\u003eMigration Entry Point\"]\n        V83[\"8.3.x\u003cbr/\u003eNotifications \u0026 Subpanel Filters\"]\n        V84[\"8.4.x\u003cbr/\u003ePHP 8.1+ Required\"]\n        V85[\"8.5.x\u003cbr/\u003eAngular 16\"]\n        V86[\"8.6.x\u003cbr/\u003eLanguage Selector\"]\n        V87[\"8.7.x\u003cbr/\u003eSymfony 6.4\"]\n        V88[\"8.8.x\u003cbr/\u003eLatest\"]\n    end\n    \n    subgraph \"Upgrade Restrictions\"\n        STEP1[\"RC/8.0.x/8.1.x → 8.2.x\"]\n        STEP2[\"8.2.x → Current\"]\n        BLOCK[\"8.0.x-8.1.x cannot upgrade\u003cbr/\u003edirectly to 8.3.x+\"]\n    end\n    \n    V78 --\u003e V710\n    V710 --\u003e V711\n    V711 --\u003e V712\n    V712 --\u003e V713\n    V713 --\u003e V714\n    \n    V714 -.-\u003e|\"No Direct Path\"| V82\n    \n    V80 --\u003e V81\n    V81 --\u003e STEP1\n    V80 --\u003e STEP1\n    STEP1 --\u003e V82\n    V82 --\u003e STEP2\n    STEP2 --\u003e V88\n    \n    V82 --\u003e V83\n    V83 --\u003e V84\n    V84 --\u003e V85\n    V85 --\u003e V86\n    V86 --\u003e V87\n    V87 --\u003e V88\n    \n    STEP1 --\u003e BLOCK\n    BLOCK --\u003e V83\n```\n\nSources: [content/8.x/admin/upgrading/general-info.adoc:30-79](), [content/8.x/admin/releases/8.4/_index.en.adoc:212-220](), [content/8.x/admin/releases/8.2/_index.en.adoc:326-348]()\n\n### Upgrade Path Requirements\n\n| Starting Version | Required Path | Documentation |\n|------------------|---------------|---------------|\n| RC/8.0.x/8.1.x → 8.3.x+ | Must upgrade to 8.2.x first | Mandatory step restriction |\n| 8.2.x → Current | Direct upgrade supported | Standard procedure |\n| Beta → Current | Beta → RC/8.0.x/8.1.x → 8.2.x → Current | Multi-step required |\n| 7.12.x+ → 8.x | Migration procedure required | Uses migration tooling |\n\nSources: [content/8.x/admin/upgrading/general-info.adoc:40-44](), [content/8.x/admin/upgrading/general-info.adoc:68-78]()\n\n## System Requirements and Breaking Changes\n\n### Version-Specific System Requirements\n\n```mermaid\ngraph LR\n    subgraph \"PHP Requirements\"\n        PHP74[\"PHP 7.4\u003cbr/\u003e8.3.0+\"]\n        PHP81[\"PHP 8.1\u003cbr/\u003e8.4.0+\"]\n        PHP81_87[\"PHP 8.1\u003cbr/\u003e8.7.0+\"]\n    end\n    \n    subgraph \"Framework Updates\"\n        SF6[\"Symfony 6.4\u003cbr/\u003e8.7.0+\"]\n        AP3[\"Api Platform 3.2\u003cbr/\u003e8.7.0+\"]\n        ANG16[\"Angular 16\u003cbr/\u003e8.5.0+\"]\n        ANG18[\"Angular 18\u003cbr/\u003e8.8.0+\"]\n    end\n    \n    subgraph \"Development Tools\"\n        COMP2[\"Composer 2+\u003cbr/\u003e8.7.0+\"]\n        NODE18[\"Node.js 18+\u003cbr/\u003e8.5.0+\"]\n    end\n    \n    V83 --\u003e PHP74\n    V84 --\u003e PHP81\n    V87 --\u003e PHP81_87\n    V87 --\u003e SF6\n    V87 --\u003e AP3\n    V87 --\u003e COMP2\n    V85 --\u003e ANG16\n    V88 --\u003e ANG18\n```\n\nSources: [content/8.x/admin/releases/8.3/_index.en.adoc:105-111](), [content/8.x/admin/releases/8.4/_index.en.adoc:185-191](), [content/8.x/admin/releases/8.7/_index.en.adoc:96-105]()\n\n### Critical Configuration Changes\n\n| Version | Change Type | Impact | Required Action |\n|---------|-------------|--------|-----------------|\n| 8.4.0 | Extension Rename | `extensions/default` → `extensions/defaultExt` | Manual migration required |\n| 8.4.0 | Display Logic | `displayType` → `displayLogic` | Update metadata |\n| 8.7.0 | SAML Config | Configuration structure changed | Reconfigure SAML |\n| 8.7.0 | APP_SECRET | Environment property required | Auto-generated on upgrade |\n\nSources: [content/8.x/admin/releases/8.4/_index.en.adoc:194-210](), [content/8.x/admin/releases/8.7/_index.en.adoc:106-161]()\n\n## Upgrade Process Components\n\n### Technical Upgrade Workflow\n\n```mermaid\nflowchart TD\n    START[\"upgrade_start\"]\n    \n    subgraph \"Pre-Upgrade Phase\"\n        CHECK_SYS[\"system_requirements_check\"]\n        BACKUP_DB[\"database_backup\"]\n        BACKUP_FILES[\"files_backup\"]\n        CHECK_CUSTOM[\"customizations_audit\"]\n    end\n    \n    subgraph \"Core Upgrade Process\"\n        DOWNLOAD[\"download_packages\"]\n        EXTRACT[\"extract_files\"]\n        REPLACE_CORE[\"replace_core_files\"]\n        PRESERVE_CUSTOM[\"preserve_custom_directory\"]\n        PRESERVE_UPLOADS[\"preserve_uploads_directory\"]\n    end\n    \n    subgraph \"Database Migration\"\n        DB_SCHEMA[\"run_database_migrations\"]\n        CONFIG_UPDATE[\"update_config_php\"]\n        CACHE_CLEAR[\"clear_cache_directories\"]\n    end\n    \n    subgraph \"Post-Upgrade Tasks\"\n        REPAIR_REBUILD[\"repair_and_rebuild\"]\n        PERMISSIONS[\"set_file_permissions\"]\n        VALIDATE[\"validation_tests\"]\n        CONFIG_CHECK[\"configuration_verification\"]\n    end\n    \n    START --\u003e CHECK_SYS\n    CHECK_SYS --\u003e BACKUP_DB\n    BACKUP_DB --\u003e BACKUP_FILES\n    BACKUP_FILES --\u003e CHECK_CUSTOM\n    \n    CHECK_CUSTOM --\u003e DOWNLOAD\n    DOWNLOAD --\u003e EXTRACT\n    EXTRACT --\u003e REPLACE_CORE\n    REPLACE_CORE --\u003e PRESERVE_CUSTOM\n    PRESERVE_CUSTOM --\u003e PRESERVE_UPLOADS\n    \n    PRESERVE_UPLOADS --\u003e DB_SCHEMA\n    DB_SCHEMA --\u003e CONFIG_UPDATE\n    CONFIG_UPDATE --\u003e CACHE_CLEAR\n    \n    CACHE_CLEAR --\u003e REPAIR_REBUILD\n    REPAIR_REBUILD --\u003e PERMISSIONS\n    PERMISSIONS --\u003e VALIDATE\n    VALIDATE --\u003e CONFIG_CHECK\n```\n\nSources: [content/blog/larger-upgrades.adoc:115-188](), [content/8.x/admin/installation-guide/Downloading \u0026 Installing.adoc:52-64]()\n\n### File System Components in Upgrade\n\n```mermaid\ngraph TD\n    subgraph \"SuiteCRM Directory Structure\"\n        ROOT[\"suitecrm_root\"]\n        CORE[\"core/\"]\n        CUSTOM[\"custom/\"]\n        UPLOADS[\"uploads/\"]\n        CACHE[\"cache/\"]\n        CONFIG[\"config.php\"]\n        HTACCESS[\".htaccess\"]\n    end\n    \n    subgraph \"Upgrade Actions\"\n        REPLACE[\"replace_core_files\"]\n        PRESERVE[\"preserve_customizations\"]\n        MIGRATE[\"migrate_configurations\"]\n        CLEAR[\"clear_cache\"]\n        UPDATE_PERMS[\"update_permissions\"]\n    end\n    \n    subgraph \"File Operations\"\n        BACKUP_OP[\"backup_operation\"]\n        EXTRACT_OP[\"extract_new_files\"]\n        MERGE_OP[\"merge_custom_files\"]\n        VALIDATE_OP[\"validate_file_structure\"]\n    end\n    \n    ROOT --\u003e CORE\n    ROOT --\u003e CUSTOM\n    ROOT --\u003e UPLOADS\n    ROOT --\u003e CACHE\n    ROOT --\u003e CONFIG\n    ROOT --\u003e HTACCESS\n    \n    CORE --\u003e REPLACE\n    CUSTOM --\u003e PRESERVE\n    CONFIG --\u003e MIGRATE\n    CACHE --\u003e CLEAR\n    ROOT --\u003e UPDATE_PERMS\n    \n    REPLACE --\u003e BACKUP_OP\n    PRESERVE --\u003e MERGE_OP\n    MIGRATE --\u003e EXTRACT_OP\n    CLEAR --\u003e VALIDATE_OP\n```\n\nSources: [content/blog/larger-upgrades.adoc:147-156](), [content/8.x/admin/installation-guide/Downloading \u0026 Installing.adoc:35-51]()\n\n## Database Migration Procedures\n\n### Database Upgrade Process\n\nThe database upgrade process involves schema updates, data migrations, and configuration changes. The core upgrade logic handles version-specific database modifications automatically.\n\n**Key Database Operations:**\n- Schema updates for new field types and table structures\n- Data migration for configuration changes\n- Index updates for performance improvements\n- Foreign key constraint updates\n\n**Critical Files:**\n- Database upgrade scripts handle version-specific migrations\n- Configuration updates modify `config.php` entries\n- Cache clearing removes outdated metadata\n\nSources: [content/blog/larger-upgrades.adoc:133-145](), [content/8.x/admin/releases/8.2/_index.en.adoc:25-30]()\n\n### Configuration Migration\n\nConfiguration changes between versions require specific migration steps:\n\n```mermaid\ngraph LR\n    subgraph \"Config Sources\"\n        CONFIG_PHP[\"config.php\"]\n        ENV_FILES[\".env files\"]\n        LEGACY_CONFIG[\"legacy_settings\"]\n    end\n    \n    subgraph \"Migration Process\"\n        PARSE_CONFIG[\"parse_existing_config\"]\n        VALIDATE_SETTINGS[\"validate_settings\"]\n        APPLY_DEFAULTS[\"apply_new_defaults\"]\n        UPDATE_STRUCTURE[\"update_config_structure\"]\n    end\n    \n    subgraph \"Output\"\n        NEW_CONFIG[\"updated_config.php\"]\n        NEW_ENV[\"updated_.env\"]\n        MIGRATION_LOG[\"migration_log\"]\n    end\n    \n    CONFIG_PHP --\u003e PARSE_CONFIG\n    ENV_FILES --\u003e PARSE_CONFIG\n    LEGACY_CONFIG --\u003e PARSE_CONFIG\n    \n    PARSE_CONFIG --\u003e VALIDATE_SETTINGS\n    VALIDATE_SETTINGS --\u003e APPLY_DEFAULTS\n    APPLY_DEFAULTS --\u003e UPDATE_STRUCTURE\n    \n    UPDATE_STRUCTURE --\u003e NEW_CONFIG\n    UPDATE_STRUCTURE --\u003e NEW_ENV\n    UPDATE_STRUCTURE --\u003e MIGRATION_LOG\n```\n\nSources: [content/8.x/admin/releases/8.7/_index.en.adoc:106-161](), [content/8.x/admin/releases/8.1/_index.en.adoc:156-167]()\n\n## Version-Specific Upgrade Considerations\n\n### 8.4.x Upgrade Requirements\n\n**Breaking Changes:**\n- `extensions/default` package renamed to `extensions/defaultExt`\n- `displayType` logic moved to `displayLogic` metadata entry\n- PHP 8.1+ requirement\n\n**Migration Steps:**\n1. Manual migration of custom extensions from `default` to `defaultExt`\n2. Update metadata configurations using new `displayLogic` structure\n3. Verify PHP version compatibility\n\nSources: [content/8.x/admin/releases/8.4/_index.en.adoc:194-210]()\n\n### 8.7.x Platform Upgrade\n\n**Major Framework Changes:**\n- Symfony 6.4 upgrade\n- Api Platform 3.2 migration\n- Composer 2+ requirement\n- APP_SECRET environment property required\n\n**SAML Configuration Update:**\n- New configuration structure with environment-based settings\n- Migration from `Hslavich` to `Nbgrp` SAML dependency\n- Updated authentication handlers\n\nSources: [content/8.x/admin/releases/8.7/_index.en.adoc:92-161]()\n\n## Security and Validation\n\n### Post-Upgrade Validation\n\n**Critical Validation Points:**\n- Database integrity verification\n- File permission validation\n- Configuration syntax checking\n- Custom code compatibility testing\n- API endpoint functionality verification\n\n**Security Considerations:**\n- File permission reset using `chmod 2755` for directories and `chmod 0644` for files\n- Web server user ownership verification (`www-data` or `apache`)\n- `.htaccess` configuration validation\n\nSources: [content/8.x/admin/installation-guide/Downloading \u0026 Installing.adoc:52-74](), [content/blog/larger-upgrades.adoc:155-173]()\n\n### Testing and Rollback Procedures\n\n**Testing Strategy:**\n- Clone system testing before production upgrade\n- Customization functionality verification\n- Email configuration testing\n- Theme and UI validation\n- Third-party integration testing\n\n**Rollback Preparation:**\n- Complete database backup before upgrade\n- File system snapshot or backup\n- Configuration backup\n- Documentation of custom modifications\n\nSources: [content/blog/larger-upgrades.adoc:117-132](), [content/blog/larger-upgrades.adoc:155-164]()"])</script><script>self.__next_f.push([1,"24:T3c55,"])</script><script>self.__next_f.push([1,"# Authentication Configuration\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [content/8.x/admin/configuration/LDAP-Configuration.ru.adoc](content/8.x/admin/configuration/LDAP-Configuration.ru.adoc)\n- [content/8.x/admin/configuration/Login-Throttling-Configuration.ru.adoc](content/8.x/admin/configuration/Login-Throttling-Configuration.ru.adoc)\n- [content/8.x/admin/configuration/SAML-Configuration.ru.adoc](content/8.x/admin/configuration/SAML-Configuration.ru.adoc)\n- [content/8.x/admin/configuration/_index.ru.adoc](content/8.x/admin/configuration/_index.ru.adoc)\n- [content/8.x/admin/installation-guide/Downloading \u0026 Installing.ru.adoc](content/8.x/admin/installation-guide/Downloading \u0026 Installing.ru.adoc)\n- [content/8.x/admin/installation-guide/Languages/install-a-new-language.ru.adoc](content/8.x/admin/installation-guide/Languages/install-a-new-language.ru.adoc)\n- [content/8.x/admin/installation-guide/Languages/update-a-language-pack.ru.adoc](content/8.x/admin/installation-guide/Languages/update-a-language-pack.ru.adoc)\n- [content/8.x/admin/installation-guide/Uninstalling.ru.adoc](content/8.x/admin/installation-guide/Uninstalling.ru.adoc)\n- [content/8.x/admin/installation-guide/Upgrading.ru.adoc](content/8.x/admin/installation-guide/Upgrading.ru.adoc)\n- [content/8.x/admin/installation-guide/running-the-cli-installer.ru.adoc](content/8.x/admin/installation-guide/running-the-cli-installer.ru.adoc)\n- [content/8.x/admin/installation-guide/running-the-ui-installer.ru.adoc](content/8.x/admin/installation-guide/running-the-ui-installer.ru.adoc)\n- [content/8.x/admin/installation-guide/webserver-setup-guide.ru.adoc](content/8.x/admin/installation-guide/webserver-setup-guide.ru.adoc)\n- [content/8.x/admin/releases/8.8/_index.en.adoc](content/8.x/admin/releases/8.8/_index.en.adoc)\n- [content/8.x/developer/extensions/backend/save-handlers/_index.en.adoc](content/8.x/developer/extensions/backend/save-handlers/_index.en.adoc)\n- [content/8.x/developer/extensions/frontend/migration/Migration-8.8.adoc](content/8.x/developer/extensions/frontend/migration/Migration-8.8.adoc)\n- [content/8.x/developer/installation-guide/8.2.0-front-end-installation-guide.adoc](content/8.x/developer/installation-guide/8.2.0-front-end-installation-guide.adoc)\n- [content/8.x/developer/installation-guide/8.8.0-front-end-installation-guide.adoc](content/8.x/developer/installation-guide/8.8.0-front-end-installation-guide.adoc)\n- [content/8.x/features/two-factor/two-factor.en.adoc](content/8.x/features/two-factor/two-factor.en.adoc)\n- [static/images/en/8.x/admin/release/Fav-Filter.gif](static/images/en/8.x/admin/release/Fav-Filter.gif)\n- [static/images/en/8.x/admin/release/Qr-2FA.png](static/images/en/8.x/admin/release/Qr-2FA.png)\n- [static/images/en/8.x/admin/release/new-record-view.png](static/images/en/8.x/admin/release/new-record-view.png)\n- [static/images/en/8.x/user/features/2FA-Profile.png](static/images/en/8.x/user/features/2FA-Profile.png)\n- [static/images/en/8.x/user/features/Disable-Two-Factor.gif](static/images/en/8.x/user/features/Disable-Two-Factor.gif)\n- [static/images/en/8.x/user/features/Enable-2FA.png](static/images/en/8.x/user/features/Enable-2FA.png)\n- [static/images/en/8.x/user/features/Enabled-2FA.png](static/images/en/8.x/user/features/Enabled-2FA.png)\n- [static/images/en/8.x/user/features/Login-2FA.png](static/images/en/8.x/user/features/Login-2FA.png)\n- [static/images/en/8.x/user/features/New-Disable-2FA.png](static/images/en/8.x/user/features/New-Disable-2FA.png)\n- [static/images/en/8.x/user/features/QR-Code-Secret.png](static/images/en/8.x/user/features/QR-Code-Secret.png)\n- [static/images/en/8.x/user/features/Qr-2FA.png](static/images/en/8.x/user/features/Qr-2FA.png)\n- [static/images/en/8.x/user/features/Regenerate-Codes.gif](static/images/en/8.x/user/features/Regenerate-Codes.gif)\n\n\u003c/details\u003e\n\n\n\nThis page covers the configuration of authentication methods in SuiteCRM 8.x, including standard authentication, SAML SSO, LDAP integration, Two-Factor Authentication (2FA), and login security controls. For user management and role configuration, see [User Management](#7.2). For email authentication setup, see [Email Configuration](#7.3).\n\n## Overview\n\nSuiteCRM 8.x supports multiple authentication methods that can be configured through environment variables and configuration files. The authentication system is built on Symfony's Security component and supports modern authentication protocols.\n\n### Supported Authentication Methods\n\n| Method | Configuration | Use Case |\n|--------|---------------|----------|\n| Standard | Default | Username/password authentication |\n| SAML SSO | `AUTH_TYPE=saml` | Single Sign-On with identity providers |\n| LDAP | `AUTH_TYPE=ldap` | Active Directory/LDAP integration |\n| Two-Factor (2FA) | User profile | Additional security layer with TOTP |\n\n## Authentication Architecture\n\n```mermaid\ngraph TB\n    subgraph \"Authentication Flow\"\n        Login[\"Login Request\"] --\u003e AuthType{\"AUTH_TYPE Environment Variable\"}\n        AuthType --\u003e|\"default\"| Standard[\"Standard Authentication\"]\n        AuthType --\u003e|\"saml\"| SAML[\"SAML Authentication\"]\n        AuthType --\u003e|\"ldap\"| LDAP[\"LDAP Authentication\"]\n        \n        Standard --\u003e UserDB[\"User Database Validation\"]\n        SAML --\u003e SAMLProvider[\"SAML Identity Provider\"]\n        LDAP --\u003e LDAPServer[\"LDAP/Active Directory\"]\n        \n        UserDB --\u003e TwoFA{\"2FA Enabled?\"}\n        SAMLProvider --\u003e TwoFA\n        LDAPServer --\u003e TwoFA\n        \n        TwoFA --\u003e|\"Yes\"| TOTPValidation[\"TOTP Code Validation\"]\n        TwoFA --\u003e|\"No\"| Success[\"Authentication Success\"]\n        TOTPValidation --\u003e Success\n        \n        Success --\u003e SessionCreate[\"Create User Session\"]\n    end\n    \n    subgraph \"Configuration Sources\"\n        EnvLocal[\".env.local\"]\n        ConfigFiles[\"Configuration Files\"]\n        UserProfile[\"User Profile Settings\"]\n        \n        EnvLocal --\u003e AuthType\n        ConfigFiles --\u003e SAML\n        ConfigFiles --\u003e LDAP\n        UserProfile --\u003e TwoFA\n    end\n```\n\nSources: [content/8.x/admin/configuration/SAML-Configuration.ru.adoc:44-50](), [content/8.x/admin/configuration/LDAP-Configuration.ru.adoc:42-48](), [content/8.x/features/two-factor/two-factor.en.adoc:69-83]()\n\n## Configuration File Structure\n\n```mermaid\ngraph TB\n    subgraph \"SuiteCRM Root\"\n        EnvLocal[\".env.local\u003cbr/\u003eAUTH_TYPE configuration\"]\n        \n        subgraph \"Core Configuration\"\n            CoreConfig[\"config/\u003cbr/\u003eservices/saml/saml.yaml\u003cbr/\u003eservices/ldap/ldap.yaml\"]\n        end\n        \n        subgraph \"Extension Configuration\"\n            ExtConfig[\"extensions/\u003cextension\u003e/config/\u003cbr/\u003epackages/hslavich_onelogin_saml.yaml\u003cbr/\u003eservices/ldap/ldap.yaml\u003cbr/\u003eservices/saml/saml.yaml\"]\n        end\n        \n        subgraph \"Cache Directory\"\n            Cache[\"cache/\u003cbr/\u003eSymfony cache for\u003cbr/\u003eauthentication config\"]\n        end\n    end\n    \n    EnvLocal --\u003e CoreConfig\n    CoreConfig --\u003e ExtConfig\n    ExtConfig --\u003e Cache\n    \n    subgraph \"Authentication Components\"\n        SAMLBundle[\"OneloginSamlBundle\"]\n        LDAPComponent[\"Symfony LDAP Component\"]\n        TOTPService[\"TOTP Service\"]\n    end\n    \n    ExtConfig --\u003e SAMLBundle\n    ExtConfig --\u003e LDAPComponent\n    EnvLocal --\u003e TOTPService\n```\n\nSources: [content/8.x/admin/configuration/SAML-Configuration.ru.adoc:99-101](), [content/8.x/admin/configuration/LDAP-Configuration.ru.adoc:162-164]()\n\n## Standard Authentication\n\nStandard authentication uses SuiteCRM's built-in user database with username and password validation. This is the default method when no `AUTH_TYPE` is specified.\n\n### Configuration\n\nNo additional configuration is required for standard authentication. It is active by default when:\n- No `AUTH_TYPE` environment variable is set, or\n- `AUTH_TYPE` is not set to `saml` or `ldap`\n\n### User Database Integration\n\nStandard authentication validates credentials against the `users` table in the SuiteCRM database, checking the `user_name` and `user_hash` fields.\n\nSources: [content/8.x/admin/configuration/SAML-Configuration.ru.adoc:360-367](), [content/8.x/admin/configuration/LDAP-Configuration.ru.adoc:100-106]()\n\n## SAML Authentication\n\nSAML (Security Assertion Markup Language)
