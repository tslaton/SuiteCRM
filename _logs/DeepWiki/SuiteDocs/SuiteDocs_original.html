-70`, `content/8.x/admin/administration-panel/Administration-Panel.ru.adoc:32-38`\n\n## Configuration File Hierarchy\n\nSuiteCRM administration relies on a hierarchical configuration system that allows for both default settings and custom overrides. Understanding this hierarchy is crucial for effective administration.\n\n```mermaid\ngraph TD\n    subgraph \"Configuration Files\"\n        ConfigPhp[\"config.php\u003cbr/\u003eMain Configuration\"]\n        ConfigOverride[\"config_override.php\u003cbr/\u003eCustom Overrides\"]\n        SugarConfig[\"$sugar_config Array\u003cbr/\u003eRuntime Configuration\"]\n    end\n    \n    subgraph \"Configuration Categories\"\n        DBConfig[\"Database Settings\u003cbr/\u003edb_* parameters\"]\n        SecurityConfig[\"Security Settings\u003cbr/\u003eadmin_access_control, xss_check\"]\n        PerformanceConfig[\"Performance Settings\u003cbr/\u003ememory_limit, query_limits\"]\n        EmailConfig[\"Email Settings\u003cbr/\u003esmtp_*, email_*\"]\n        CacheConfig[\"Cache Settings\u003cbr/\u003ecache_dir, external_cache\"]\n        LogConfig[\"Logging Settings\u003cbr/\u003elog_level, log_file\"]\n    end\n    \n    subgraph \"Advanced Configuration\"\n        Permissions[\"File Permissions\u003cbr/\u003edefault_permissions\"]\n        ResourceMgmt[\"Resource Management\u003cbr/\u003eresource_management\"]\n        CronSettings[\"Cron Job Settings\u003cbr/\u003ecron.max_cron_runtime\"]\n        SaveQuery[\"Query Saving\u003cbr/\u003esave_query\"]\n    end\n    \n    ConfigPhp --\u003e SugarConfig\n    ConfigOverride --\u003e SugarConfig\n    SugarConfig --\u003e DBConfig\n    SugarConfig --\u003e SecurityConfig\n    SugarConfig --\u003e PerformanceConfig\n    SugarConfig --\u003e EmailConfig\n    SugarConfig --\u003e CacheConfig\n    SugarConfig --\u003e LogConfig\n    \n    SecurityConfig --\u003e Permissions\n    PerformanceConfig --\u003e ResourceMgmt\n    PerformanceConfig --\u003e CronSettings\n    PerformanceConfig --\u003e SaveQuery\n```\n\nSources: `content/admin/Advanced Configuration Options.ru.adoc:44-67`, `content/admin/Advanced Configuration Options.ru.adoc:75-93`, `content/admin/Advanced Configuration Options.ru.adoc:124-145`\n\n## Administrative Tools and Utilities\n\nThe administration system includes various tools for system maintenance, diagnostics, and data management. These tools are accessible through the administration panel and provide essential functionality for system upkeep.\n\n| Tool Category | Purpose | Key Functions |\n|---------------|---------|---------------|\n| **System Repair** | Database and file maintenance | Quick repair, rebuild relationships, rebuild extensions |\n| **Diagnostics** | System health checking | Configuration analysis, file integrity checks, database structure validation |\n| **Backup \u0026 Restore** | Data protection | File backups, database export, system restoration |\n| **Import/Export** | Data migration | CSV import, module data export, upgrade wizards |\n| **Developer Tools** | Customization support | Studio, Module Builder, field editor |\n| **Scheduler Management** | Automated task control | Cron job configuration, scheduled task monitoring |\n\nSources: `content/admin/administration-panel/System.ru.adoc:498-635`, `content/admin/administration-panel/System.ru.adoc:177-204`, `content/admin/administration-panel/Developer Tools.ru.adoc:25-29`\n\n## User Access Control Architecture\n\nSuiteCRM implements a comprehensive access control system that governs user permissions, role-based security, and authentication mechanisms.\n\n```mermaid\ngraph TB\n    subgraph \"Authentication Layer\"\n        Login[\"User Login\"]\n        Session[\"Session Management\"]\n        OAuth2[\"OAuth2 Integration\"]\n        LDAP[\"LDAP Integration\"]\n        SAML[\"SAML Integration\"]\n    end\n    \n    subgraph \"Authorization Layer\"\n        User[\"User Account\"]\n        Role[\"Security Role\"]\n        Group[\"Security Group\"]\n        ACL[\"Access Control Lists\"]\n    end\n    \n    subgraph \"Permission Types\"\n        ModuleAccess[\"Module Access\"]\n        RecordAccess[\"Record-Level Access\"]\n        FieldAccess[\"Field-Level Access\"]\n        ActionAccess[\"Action Permissions\"]\n    end\n    \n    subgraph \"Security Features\"\n        IPCheck[\"IP Address Validation\"]\n        PasswordPolicy[\"Password Policies\"]\n        SessionTimeout[\"Session Timeout\"]\n        TwoFactor[\"Two-Factor Authentication\"]\n    end\n    \n    Login --\u003e Session\n    Login --\u003e OAuth2\n    Login --\u003e LDAP\n    Login --\u003e SAML\n    \n    Session --\u003e User\n    User --\u003e Role\n    User --\u003e Group\n    Role --\u003e ACL\n    Group --\u003e ACL\n    \n    ACL --\u003e ModuleAccess\n    ACL --\u003e RecordAccess\n    ACL --\u003e FieldAccess\n    ACL --\u003e ActionAccess\n    \n    Session --\u003e IPCheck\n    User --\u003e PasswordPolicy\n    Session --\u003e SessionTimeout\n    Login --\u003e TwoFactor\n```\n\nSources: `content/admin/administration-panel/Users.ru.adoc:27-50`, `content/admin/administration-panel/System.ru.adoc:91-95`, `content/admin/administration-panel/System.ru.adoc:419-426`\n\n## Email System Configuration\n\nEmail functionality in SuiteCRM requires proper configuration of both inbound and outbound email systems, along with OAuth integration for modern email providers.\n\n```mermaid\ngraph LR\n    subgraph \"Inbound Email\"\n        IMAPServer[\"IMAP Server\"]\n        InboundAccount[\"Inbound Email Account\"]\n        EmailFolders[\"Email Folders\"]\n        GroupAccount[\"Group Account\"]\n        PersonalAccount[\"Personal Account\"]\n    end\n    \n    subgraph \"Outbound Email\"\n        SMTPServer[\"SMTP Server\"]\n        OutboundAccount[\"Outbound Email Account\"]\n        EmailQueue[\"Email Queue\"]\n        BounceHandling[\"Bounce Handling\"]\n    end\n    \n    subgraph \"OAuth Integration\"\n        OAuthProvider[\"OAuth Provider\"]\n        OAuthConnection[\"OAuth Connection\"]\n        OAuthTokens[\"Access Tokens\"]\n        RefreshTokens[\"Refresh Tokens\"]\n    end\n    \n    subgraph \"Email Processing\"\n        EmailImport[\"Email Import\"]\n        EmailSync[\"Email Synchronization\"]\n        AutoResponse[\"Auto Response\"]\n        EmailTracking[\"Email Tracking\"]\n    end\n    \n    IMAPServer --\u003e InboundAccount\n    InboundAccount --\u003e EmailFolders\n    InboundAccount --\u003e GroupAccount\n    InboundAccount --\u003e PersonalAccount\n    \n    SMTPServer --\u003e OutboundAccount\n    OutboundAccount --\u003e EmailQueue\n    OutboundAccount --\u003e BounceHandling\n    \n    OAuthProvider --\u003e OAuthConnection\n    OAuthConnection --\u003e OAuthTokens\n    OAuthConnection --\u003e RefreshTokens\n    \n    InboundAccount --\u003e EmailImport\n    EmailImport --\u003e EmailSync\n    OutboundAccount --\u003e AutoResponse\n    EmailQueue --\u003e EmailTracking\n    \n    OAuthConnection --\u003e InboundAccount\n    OAuthConnection --\u003e OutboundAccount\n```\n\nSources: `content/user/core-modules/Emails.ru.adoc:99-164`, `content/admin/administration-panel/System.ru.adoc:419-426`\n\n## Scheduler and Background Tasks\n\nThe SuiteCRM scheduler system manages automated background tasks essential for system operation, including email processing, data cleanup, and report generation.\n\n| Scheduled Task | Purpose | Frequency | Configuration |\n|----------------|---------|-----------|---------------|\n| **Check Inbound Mailboxes** | Process incoming emails | Every minute | `cron.php` execution |\n| **Bounce Handling** | Process returned emails | Nightly | Bounce account configuration |\n| **Mass Email Campaigns** | Send bulk email campaigns | Nightly | Campaign queue processing |\n| **Tracker Cleanup** | Clean tracking tables | Every 30 days | Automatic cleanup |\n| **Database Cleanup** | Remove deleted records | Monthly | Physical record deletion |\n| **Email Reminders** | Send event reminders | Variable | Based on event schedules |\n| **Workflow Processing** | Execute workflow rules | Every minute | Workflow engine |\n\nThe scheduler requires proper cron configuration on the server:\n\n```bash\n* * * * * cd /path/to/suitecrm; php -f cron.php \u003e /dev/null 2\u003e\u00261\n```\n\nSources: `content/admin/administration-panel/System.ru.adoc:177-204`, `content/admin/administration-panel/System.ru.adoc:208-308`\n\n## Security and Access Control\n\nSuiteCRM provides multiple layers of security configuration to protect system integrity and user data. These security measures are configurable through the administration panel and configuration files.\n\n```mermaid\ngraph TB\n    subgraph \"File-Level Security\"\n        FilePermissions[\"File Permissions\u003cbr/\u003e2770 directories, 660 files\"]\n        HtaccessRules[\".htaccess Rules\u003cbr/\u003eDirectory access restrictions\"]\n        ApacheUser[\"Apache User/Group\u003cbr/\u003ewww-data, apache\"]\n    end\n    \n    subgraph \"Application Security\"\n        XSSProtection[\"XSS Protection\u003cbr/\u003eInput sanitization\"]\n        CSRFProtection[\"CSRF Protection\u003cbr/\u003eReferer validation\"]\n        IPValidation[\"IP Address Validation\u003cbr/\u003eSession binding\"]\n        InputValidation[\"Input Validation\u003cbr/\u003eData type checking\"]\n    end\n    \n    subgraph \"Authentication Security\"\n        PasswordPolicies[\"Password Policies\u003cbr/\u003eComplexity requirements\"]\n        SessionTimeout[\"Session Timeout\u003cbr/\u003eAutomatic logout\"]\n        LoginAttempts[\"Login Attempt Limits\u003cbr/\u003eBrute force protection\"]\n        TwoFactorAuth[\"Two-Factor Authentication\u003cbr/\u003eAdditional verification\"]\n    end\n    \n    subgraph \"Data Security\"\n        DatabaseEncryption[\"Database Encryption\u003cbr/\u003eSensitive data protection\"]\n        EmailEncryption[\"Email Password Encryption\u003cbr/\u003eStored credentials\"]\n        SSLRequirements[\"SSL/TLS Requirements\u003cbr/\u003eSecure connections\"]\n        DataAuditing[\"Data Auditing\u003cbr/\u003eChange tracking\"]\n    end\n    \n    FilePermissions --\u003e HtaccessRules\n    HtaccessRules --\u003e ApacheUser\n    \n    XSSProtection --\u003e CSRFProtection\n    CSRFProtection --\u003e IPValidation\n    IPValidation --\u003e InputValidation\n    \n    PasswordPolicies --\u003e SessionTimeout\n    SessionTimeout --\u003e LoginAttempts\n    LoginAttempts --\u003e TwoFactorAuth\n    \n    DatabaseEncryption --\u003e EmailEncryption\n    EmailEncryption --\u003e SSLRequirements\n    SSLRequirements --\u003e DataAuditing\n```\n\nSources: `content/admin/Advanced Configuration Options.ru.adoc:20-67`, `content/admin/Advanced Configuration Options.ru.adoc:94-102`, `content/admin/administration-panel/System.ru.adoc:91-95`\n\n## Performance and Resource Management\n\nAdministrative control over system performance involves multiple configuration areas that affect memory usage, database query limits, and caching behavior.\n\n| Configuration Area | Parameters | Default Values | Tuning Considerations |\n|-------------------|------------|----------------|----------------------|\n| **Memory Management** | `memory_limit` | 512M | Increase for large imports |\n| **Query Limits** | `default_limit` | 1000 queries | Adjust for module size |\n| **Special Query Modules** | `special_query_limit` | 50000 queries | For admin operations |\n| **Cron Job Timing** | `max_cron_runtime` | 30 minutes | Job execution limits |\n| **Cache Settings** | `cache_dir` | `./cache/` | Can be moved for performance |\n| **Upload Directory** | `upload_dir` | `./upload/` | Can be relocated |\n\nPerformance optimization through `config_override.php`:\n\n```php\n// Increase query limits for specific modules\n$sugar_config['resource_management']['special_query_modules'][] = 'Contacts';\n$sugar_config['resource_management']['special_query_limit'] = 0;\n\n// Optimize cron job performance\n$sugar_config['cron']['max_cron_runtime'] = 50;\n$sugar_config['cron']['max_cron_jobs'] = 10;\n\n// Disable automatic query saving for performance\n$sugar_config['save_query'] = 'no';\n```\n\nSources: `content/admin/Advanced Configuration Options.ru.adoc:104-192`, `content/admin/Advanced Configuration Options.ru.adoc:147-192`"])</script><script>self.__next_f.push([1,"2a:T3b45,"])</script><script>self.__next_f.push([1,"# System Configuration\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [.htmltest.yml](.htmltest.yml)\n- [content/8.x/admin/administration-panel/Administration-Panel.ru.adoc](content/8.x/admin/administration-panel/Administration-Panel.ru.adoc)\n- [content/8.x/admin/releases/8.0/_index.en.adoc](content/8.x/admin/releases/8.0/_index.en.adoc)\n- [content/admin/Advanced Configuration Options.adoc](content/admin/Advanced Configuration Options.adoc)\n- [content/admin/Advanced Configuration Options.ru.adoc](content/admin/Advanced Configuration Options.ru.adoc)\n- [content/admin/administration-panel/Advanced OpenAdmin.ru.adoc](content/admin/administration-panel/Advanced OpenAdmin.ru.adoc)\n- [content/admin/administration-panel/Developer Tools.ru.adoc](content/admin/administration-panel/Developer Tools.ru.adoc)\n- [content/admin/administration-panel/Google Sync.ru.adoc](content/admin/administration-panel/Google Sync.ru.adoc)\n- [content/admin/administration-panel/System.ru.adoc](content/admin/administration-panel/System.ru.adoc)\n- [content/admin/administration-panel/Users.ru.adoc](content/admin/administration-panel/Users.ru.adoc)\n- [content/admin/installation-guide/Downloading \u0026 Installing.ru.adoc](content/admin/installation-guide/Downloading \u0026 Installing.ru.adoc)\n- [content/admin/installation-guide/Upgrading.ru.adoc](content/admin/installation-guide/Upgrading.ru.adoc)\n- [content/admin/installation-guide/Using the Upgrade Wizard.ru.adoc](content/admin/installation-guide/Using the Upgrade Wizard.ru.adoc)\n- [content/admin/releases/7.10.x/_index.en.adoc](content/admin/releases/7.10.x/_index.en.adoc)\n- [content/admin/releases/7.11.x/_index.en.adoc](content/admin/releases/7.11.x/_index.en.adoc)\n- [content/admin/releases/7.12.x/_index.en.adoc](content/admin/releases/7.12.x/_index.en.adoc)\n- [content/admin/releases/7.8.x/_index.en.adoc](content/admin/releases/7.8.x/_index.en.adoc)\n- [content/blog/_index.es.md](content/blog/_index.es.md)\n- [content/developer/api/API-4_1.adoc](content/developer/api/API-4_1.adoc)\n- [content/user/advanced-modules/Cases with Portal.ru.adoc](content/user/advanced-modules/Cases with Portal.ru.adoc)\n- [content/user/advanced-modules/Reschedule.ru.adoc](content/user/advanced-modules/Reschedule.ru.adoc)\n- [content/user/advanced-modules/Workflow.ru.adoc](content/user/advanced-modules/Workflow.ru.adoc)\n- [content/user/core-modules/Campaigns.ru.adoc](content/user/core-modules/Campaigns.ru.adoc)\n- [content/user/core-modules/Cases.ru.adoc](content/user/core-modules/Cases.ru.adoc)\n- [content/user/core-modules/Emails.ru.adoc](content/user/core-modules/Emails.ru.adoc)\n- [content/user/core-modules/Opportunities.ru.adoc](content/user/core-modules/Opportunities.ru.adoc)\n- [content/user/introduction/User Interface/Record Management.ru.adoc](content/user/introduction/User Interface/Record Management.ru.adoc)\n- [content/user/introduction/User Interface/Views.ru.adoc](content/user/introduction/User Interface/Views.ru.adoc)\n- [content/user/modules/Confirmed-Opt-In-Settings.ru.adoc](content/user/modules/Confirmed-Opt-In-Settings.ru.adoc)\n- [content/user/modules/LawfulBasis.ru.adoc](content/user/modules/LawfulBasis.ru.adoc)\n- [content/user/suitecrm-analytics/1.1/SCRM-Analytics-Getting-Started.ru.adoc](content/user/suitecrm-analytics/1.1/SCRM-Analytics-Getting-Started.ru.adoc)\n- [layouts/shortcodes/contribs.html](layouts/shortcodes/contribs.html)\n- [layouts/shortcodes/dumpJSON.html](layouts/shortcodes/dumpJSON.html)\n- [layouts/shortcodes/ghcontributors.html](layouts/shortcodes/ghcontributors.html)\n- [static/images/en/8.x/user/features/subpanels/Filter-Expanded.png](static/images/en/8.x/user/features/subpanels/Filter-Expanded.png)\n- [static/images/en/8.x/user/features/subpanels/Filter-Full-Panel.png](static/images/en/8.x/user/features/subpanels/Filter-Full-Panel.png)\n- [static/images/en/8.x/user/features/subpanels/Filter-Searched.png](static/images/en/8.x/user/features/subpanels/Filter-Searched.png)\n- [static/images/ru/8.x/admin/administration-panel/image1.png](static/images/ru/8.x/admin/administration-panel/image1.png)\n- [static/images/ru/8.x/admin/administration-panel/image2.png](static/images/ru/8.x/admin/administration-panel/image2.png)\n- [static/images/ru/admin/AdvancedOpenAdmin/image3.png](static/images/ru/admin/AdvancedOpenAdmin/image3.png)\n- [static/images/ru/user/UserInterface/image34.png](static/images/ru/user/UserInterface/image34.png)\n- [static/images/ru/user/advanced-modules/Workflow/image2.png](static/images/ru/user/advanced-modules/Workflow/image2.png)\n- [static/images/ru/user/core-modules/E-mail/image1.png](static/images/ru/user/core-modules/E-mail/image1.png)\n- [static/images/ru/user/core-modules/E-mail/image2.png](static/images/ru/user/core-modules/E-mail/image2.png)\n\n\u003c/details\u003e\n\n\n\nThis page covers SuiteCRM's system-wide configuration options available to administrators through the Administration Panel. These settings control core system behavior, user interface defaults, security policies, and performance parameters that affect all users of the SuiteCRM instance.\n\nFor information about individual user preferences and settings, see [User Management](#7.2). For email-specific configuration options, see [Email Configuration](#7.3).\n\n## Configuration System Overview\n\nSuiteCRM's configuration system operates on multiple levels, with system-wide settings taking precedence over user-specific preferences. Configuration data is stored in PHP configuration files and database tables, with changes typically made through the web-based Administration Panel.\n\n```mermaid\ngraph TB\n    AdminPanel[\"Administration Panel\u003cbr/\u003eWeb Interface\"]\n    ConfigFiles[\"Configuration Files\u003cbr/\u003econfig.php\u003cbr/\u003econfig_override.php\"]\n    Database[\"Configuration Tables\u003cbr/\u003econfig\u003cbr/\u003eadministration\"]\n    SystemBehavior[\"System Behavior\u003cbr/\u003eUI Rendering\u003cbr/\u003eSecurity Enforcement\u003cbr/\u003ePerformance Controls\"]\n    \n    AdminPanel --\u003e ConfigFiles\n    AdminPanel --\u003e Database\n    ConfigFiles --\u003e SystemBehavior\n    Database --\u003e SystemBehavior\n    \n    subgraph \"Configuration Categories\"\n        UI[\"User Interface\u003cbr/\u003eDisplay Settings\"]\n        Security[\"Security\u003cbr/\u003eAccess Controls\"]\n        Performance[\"Performance\u003cbr/\u003eMemory \u0026 Caching\"]\n        Regional[\"Regional Settings\u003cbr/\u003eLocale \u0026 Currency\"]\n        Email[\"Email Settings\u003cbr/\u003eSMTP Configuration\"]\n        Logging[\"Logging\u003cbr/\u003eDebug \u0026 Audit\"]\n    end\n    \n    SystemBehavior --\u003e UI\n    SystemBehavior --\u003e Security\n    SystemBehavior --\u003e Performance\n    SystemBehavior --\u003e Regional\n    SystemBehavior --\u003e Email\n    SystemBehavior --\u003e Logging\n```\n\nSources: [content/admin/administration-panel/System.ru.adoc:24-323](), [content/admin/Advanced Configuration Options.ru.adoc:16-114]()\n\n## Configuration Storage and Access\n\nThe configuration system uses a hierarchical approach with multiple storage mechanisms working together to provide flexible system administration capabilities.\n\n```mermaid\ngraph LR\n    subgraph \"Configuration Sources\"\n        DefaultConfig[\"default_config\u003cbr/\u003eBuilt-in Defaults\"]\n        ConfigPHP[\"config.php\u003cbr/\u003eInstallation Settings\"]\n        ConfigOverride[\"config_override.php\u003cbr/\u003eCustom Overrides\"]\n        DatabaseConfig[\"Database Tables\u003cbr/\u003eRuntime Settings\"]\n    end\n    \n    subgraph \"Access Methods\"\n        AdminUI[\"Admin Panel UI\u003cbr/\u003eWeb Forms\"]\n        DirectFile[\"Direct File Edit\u003cbr/\u003econfig_override.php\"]\n        CLI[\"Command Line\u003cbr/\u003eInstallation Scripts\"]\n    end\n    \n    subgraph \"Configuration Processing\"\n        SugarConfig[\"$sugar_config Array\u003cbr/\u003eRuntime Configuration\"]\n        AdminSettings[\"Administration Class\u003cbr/\u003eSettings Management\"]\n        ConfigCheck[\"ConfigurationCheck\u003cbr/\u003eValidation \u0026 Defaults\"]\n    end\n    \n    DefaultConfig --\u003e SugarConfig\n    ConfigPHP --\u003e SugarConfig\n    ConfigOverride --\u003e SugarConfig\n    DatabaseConfig --\u003e SugarConfig\n    \n    AdminUI --\u003e AdminSettings\n    DirectFile --\u003e ConfigOverride\n    CLI --\u003e ConfigPHP\n    \n    AdminSettings --\u003e DatabaseConfig\n    ConfigCheck --\u003e SugarConfig\n```\n\nSources: [content/admin/Advanced Configuration Options.ru.adoc:44-67](), [content/admin/administration-panel/System.ru.adoc:87-114]()\n\n## Core Configuration Categories\n\n### User Interface Configuration\n\nThe user interface configuration controls default display settings, navigation behavior, and user interaction patterns across the entire SuiteCRM instance.\n\n| Configuration Option | Description | Default Value |\n|---------------------|-------------|---------------|\n| `listview_max_records` | Maximum records displayed per page in list views | 20 |\n| `disable_user_home_page_customization` | Prevents users from customizing dashboard | false |\n| `max_dashlets_homepage` | Maximum dashlets allowed on home page | 15 |\n| `display_response_time` | Shows server response time in footer | true |\n| `subpanel_max_records` | Maximum records in subpanels | 10 |\n| `disable_subpanel_reordering` | Prevents subpanel drag-and-drop | false |\n\nSources: [content/admin/administration-panel/System.ru.adoc:38-66]()\n\n### Security and Access Control\n\nSecurity configuration options provide administrators with fine-grained control over system access, authentication, and data protection measures.\n\n```mermaid\ngraph TD\n    SecurityConfig[\"Security Configuration\"]\n    \n    SecurityConfig --\u003e IPValidation[\"IP Address Validation\u003cbr/\u003echeck_ip_address\"]\n    SecurityConfig --\u003e XSRFProtection[\"XSRF Protection\u003cbr/\u003ehttp_referer.list\"]\n    SecurityConfig --\u003e FileAccess[\"File Access Control\u003cbr/\u003eupload_maxsize\"]\n    SecurityConfig --\u003e SessionControl[\"Session Management\u003cbr/\u003esession.name\"]\n    SecurityConfig --\u003e AdminAccess[\"Admin Access Control\u003cbr/\u003eadmin_access_control\"]\n    \n    IPValidation --\u003e SessionTermination[\"Automatic Session\u003cbr/\u003eTermination\"]\n    XSRFProtection --\u003e TrustedSites[\"Trusted Site\u003cbr/\u003eValidation\"]\n    FileAccess --\u003e UploadRestrictions[\"File Upload\u003cbr/\u003eRestrictions\"]\n    SessionControl --\u003e PHPSessionID[\"PHPSESSID\u003cbr/\u003eRequirement\"]\n    AdminAccess --\u003e WizardBlocking[\"Update Wizard\u003cbr/\u003eModule Builder Block\"]\n```\n\nSources: [content/admin/administration-panel/System.ru.adoc:91-96](), [content/admin/Advanced Configuration Options.ru.adoc:94-102](), [content/admin/installation-guide/Downloading \u0026 Installing.ru.adoc:95-97]()\n\n### Performance and Resource Management\n\nPerformance configuration settings control memory usage, caching behavior, and system resource allocation to optimize SuiteCRM's operational efficiency.\n\n| Setting | Purpose | Configuration Location |\n|---------|---------|----------------------|\n| `memory_limit` | PHP memory allocation | php.ini |\n| `slow_query_log` | Database performance monitoring | System Configuration |\n| `slow_query_threshold` | Query performance threshold (ms) | System Configuration |\n| `log_memory_usage` | Memory usage tracking | System Configuration |\n| `developer_mode` | Disables caching for development | System Configuration |\n| `default_permissions` | File system permissions | config_override.php |\n\nSources: [content/admin/administration-panel/System.ru.adoc:97-108](), [content/admin/Advanced Configuration Options.ru.adoc:105-110]()\n\n## Logging and Debugging Configuration\n\nThe logging system provides comprehensive audit trails and debugging capabilities through configurable log levels and output formats.\n\n```mermaid\ngraph TB\n    LogConfig[\"Logging Configuration\"]\n    \n    LogConfig --\u003e LogLevel[\"Log Level\u003cbr/\u003eDEBUG/INFO/WARN/ERROR/FATAL\"]\n    LogConfig --\u003e LogFile[\"Log File Settings\u003cbr/\u003esuitecrm.log\"]\n    LogConfig --\u003e LogFormat[\"Log Format\u003cbr/\u003eDate/Time Formatting\"]\n    LogConfig --\u003e LogRotation[\"Log Rotation\u003cbr/\u003eSize \u0026 Count Limits\"]\n    \n    LogLevel --\u003e DebugMode[\"Debug Messages\u003cbr/\u003eApplication Debugging\"]\n    LogLevel --\u003e InfoMode[\"Info Messages\u003cbr/\u003eGeneral Information\"]\n    LogLevel --\u003e ErrorMode[\"Error Messages\u003cbr/\u003eSystem Errors\"]\n    LogLevel --\u003e SecurityMode[\"Security Messages\u003cbr/\u003eSecurity Events\"]\n    \n    LogFile --\u003e FileLocation[\"File Location\u003cbr/\u003eRoot Directory\"]\n    LogFile --\u003e FileExtension[\"File Extension\u003cbr/\u003e.log\"]\n    LogFile --\u003e FileSuffix[\"Time Suffix\u003cbr/\u003eDate/Time Stamps\"]\n    \n    LogRotation --\u003e MaxSize[\"Maximum Size\u003cbr/\u003e10MB Default\"]\n    LogRotation --\u003e MaxFiles[\"Maximum Files\u003cbr/\u003e10 Files Default\"]\n```\n\nSources: [content/admin/administration-panel/System.ru.adoc:115-176]()\n\n## Scheduler Configuration Integration\n\nThe system configuration integrates with SuiteCRM's job scheduler to automate maintenance tasks and background processing operations.\n\n```mermaid\ngraph LR\n    SystemConfig[\"System Configuration\"]\n    SchedulerJobs[\"Scheduler Jobs\"]\n    \n    SystemConfig --\u003e DatabaseCleanup[\"Database Cleanup\u003cbr/\u003eMonthly Maintenance\"]\n    SystemConfig --\u003e EmailChecking[\"Email Checking\u003cbr/\u003eIMAP Monitoring\"]\n    SystemConfig --\u003e BounceProcessing[\"Bounce Processing\u003cbr/\u003eCampaign Management\"]\n    SystemConfig --\u003e MassEmailing[\"Mass Email\u003cbr/\u003eQueue Processing\"]\n    SystemConfig --\u003e ReportGeneration[\"Report Generation\u003cbr/\u003eScheduled Reports\"]\n    SystemConfig --\u003e WorkflowExecution[\"Workflow Execution\u003cbr/\u003eProcess Tasks\"]\n    \n    DatabaseCleanup --\u003e CronJob[\"cron.php\u003cbr/\u003eSystem Scheduler\"]\n    EmailChecking --\u003e CronJob\n    BounceProcessing --\u003e CronJob\n    MassEmailing --\u003e CronJob\n    ReportGeneration --\u003e CronJob\n    WorkflowExecution --\u003e CronJob\n    \n    CronJob --\u003e SchedulerTable[\"schedulers\u003cbr/\u003eDatabase Table\"]\n    CronJob --\u003e JobQueue[\"job_queue\u003cbr/\u003eTask Processing\"]\n```\n\nSources: [content/admin/administration-panel/System.ru.adoc:177-204]()\n\n## Configuration File Structure\n\nSuiteCRM's configuration architecture follows a layered approach where settings can be overridden at multiple levels without modifying core installation files.\n\nThe primary configuration files work together in this hierarchy:\n\n1. **Default Configuration**: Built into the application code\n2. **Installation Configuration** (`config.php`): Created during initial setup\n3. **Custom Overrides** (`config_override.php`): Administrator customizations\n4. **Database Configuration**: Runtime settings stored in database tables\n\nKey configuration arrays and their purposes:\n\n- `$sugar_config`: Main configuration array containing all system settings\n- `$app_list_strings`: Dropdown options and display values  \n- `$app_strings`: System-wide language strings\n- `$default_permissions`: File system permission settings\n\nSources: [content/admin/Advanced Configuration Options.ru.adoc:44-67](), [content/admin/administration-panel/System.ru.adoc:87-114]()\n\n## Regional and Localization Settings\n\nSystem configuration includes comprehensive regional settings that affect date formats, currency display, time zones, and language preferences across the entire SuiteCRM instance.\n\nThese settings establish system-wide defaults while allowing individual users to override specific preferences in their personal profiles. The configuration includes support for multiple currencies, various date and time formats, and extensive localization options for international deployments.\n\nSources: [content/admin/administration-panel/System.ru.adoc:28-31](), [content/admin/installation-guide/Downloading \u0026 Installing.ru.adoc:204-205]()"])</script><script>self.__next_f.push([1,"2b:T4535,"])</script><script>self.__next_f.push([1,"# User Management\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [content/8.x/admin/administration-panel/Administration-Panel.ru.adoc](content/8.x/admin/administration-panel/Administration-Panel.ru.adoc)\n- [content/admin/Advanced Configuration Options.ru.adoc](content/admin/Advanced Configuration Options.ru.adoc)\n- [content/admin/administration-panel/Advanced OpenAdmin.ru.adoc](content/admin/administration-panel/Advanced OpenAdmin.ru.adoc)\n- [content/admin/administration-panel/Developer Tools.ru.adoc](content/admin/administration-panel/Developer Tools.ru.adoc)\n- [content/admin/administration-panel/Google Sync.ru.adoc](content/admin/administration-panel/Google Sync.ru.adoc)\n- [content/admin/administration-panel/System.ru.adoc](content/admin/administration-panel/System.ru.adoc)\n- [content/admin/administration-panel/Users.ru.adoc](content/admin/administration-panel/Users.r ic/images/en/admin/AdminBusinessHours.png](static/images/en/admin/AdminBusinessHours.png)\n- [static/images/en/admin/StudioExportCustomisations.png](static/images/en/admin/StudioExportCustomisations.png)\n- [static/images/en/user/RolesCreateRole.png](static/images/en/user/RolesCreateRole.png)\n- [static/images/en/user/RolesListByUser.png](static/images/en/user/RolesListByUser.png)\n- [static/images/en/user/RolesListRoles.png](static/images/en/user/RolesListRoles.png)\n- [static/images/ru/8.x/admin/administration-panel/image1.png](static/images/ru/8.x/admin/administration-panel/image1.png)\n- [static/images/ru/8.x/admin/administration-panel/image2.png](static/images/ru/8.x/admin/administration-panel/image2.png)\n- [static/images/ru/admin/AdvancedOpenAdmin/image3.png](static/images/ru/admin/AdvancedOpenAdmin/image3.png)\n- [static/images/ru/user/UserInterface/image34.png](static/images/ru/user/UserInterface/image34.png)\n- [static/images/ru/user/advanced-modules/Workflow/image2.png](static/images/ru/user/advanced-modules/Workflow/image2.png)\n- [static/images/ru/user/core-modules/E-mail/image1.png](static/images/ru/user/core-modules/E-mail/image1.png)\n- [static/images/ru/user/core-modules/E-mail/image2.png](static/images/ru/user/core-modules/E-mail/image2.png)\n\n\u003c/details\u003e\n\n\n\nUser Management in SuiteCRM encompasses the administration of user accounts, roles, permissions, and security groups that control access to the system and its data. This includes creating and managing user accounts, defining role-based permissions, configuring security groups, and managing authentication settings.\n\nFor email-specific user configuration, see [Email Configuration](#7.3). For overall system configuration that affects all users, see [System Configuration](#7.1).\n\n## User Management Architecture\n\nThe SuiteCRM user management system operates on a multi-layered security model that combines user accounts, roles, and security groups to provide granular access control.\n\n```mermaid\ngraph TB\n    Admin[\"System Administrator\"] --\u003e UserMgmt[\"User Management System\"]\n    \n    UserMgmt --\u003e Users[\"User Accounts\"]\n    UserMgmt --\u003e Roles[\"Role Management\"] \n    UserMgmt --\u003e Groups[\"Security Groups\"]\n    UserMgmt --\u003e Auth[\"Authentication\"]\n    \n    Users --\u003e CreateUser[\"Create User\"]\n    Users --\u003e EditUser[\"Edit User\"]\n    Users --\u003e UserProfiles[\"User Profiles\"]\n    Users --\u003e UserStatus[\"User Status Management\"]\n    \n    Roles --\u003e RoleDefinition[\"Role Definitions\"]\n    Roles --\u003e Permissions[\"Permission Sets\"]\n    Roles --\u003e RoleAssignment[\"Role Assignment\"]\n    \n    Groups --\u003e GroupCreation[\"Group Creation\"]\n    Groups --\u003e GroupMembers[\"Group Membership\"]\n    Groups --\u003e GroupAccess[\"Group Access Control\"]\n    \n    Auth --\u003e PasswordPolicy[\"Password Policy\"]\n    Auth --\u003e LoginSettings[\"Login Settings\"]\n    Auth --\u003e SessionMgmt[\"Session Management\"]\n    Auth --\u003e OAuth[\"OAuth Integration\"]\n```\n\n**User Management System Architecture**\n\nSources: [content/admin/administration-panel/Users.ru.adoc](), [content/8.x/admin/administration-panel/Administration-Panel.ru.adoc]()\n\n## User Account Management\n\nUser accounts form the foundation of the SuiteCRM security model. Each user account contains authentication credentials, personal information, and system preferences.\n\n### User Account Components\n\n```mermaid\ngraph LR\n    UserAccount[\"User Account\"] --\u003e BasicInfo[\"Basic Information\"]\n    UserAccount --\u003e Credentials[\"Authentication Credentials\"]\n    UserAccount --\u003e Preferences[\"User Preferences\"]\n    UserAccount --\u003e Access[\"Access Control\"]\n    \n    BasicInfo --\u003e Username[\"Username\"]\n    BasicInfo --\u003e Email[\"Email Address\"]\n    BasicInfo --\u003e Profile[\"User Profile\"]\n    BasicInfo --\u003e Contact[\"Contact Information\"]\n    \n    Credentials --\u003e Password[\"Password\"]\n    Credentials --\u003e Status[\"Account Status\"]\n    Credentials --\u003e LastLogin[\"Last Login\"]\n    \n    Preferences --\u003e Language[\"Language Settings\"]\n    Preferences --\u003e Timezone[\"Timezone\"]\n    Preferences --\u003e DateFormat[\"Date Format\"]\n    Preferences --\u003e Theme[\"Theme Preferences\"]\n    \n    Access --\u003e AssignedRoles[\"Assigned Roles\"]\n    Access --\u003e GroupMembership[\"Group Membership\"]\n    Access --\u003e Permissions[\"Effective Permissions\"]\n```\n\n**User Account Structure and Components**\n\nThe user management interface provides administrative controls for:\n\n- Creating new user accounts with required profile information\n- Managing user status (Active, Inactive)\n- Resetting passwords and managing authentication settings\n- Configuring user preferences and regional settings\n- Assigning roles and group memberships\n\nSources: [content/admin/administration-panel/Users.ru.adoc](), [content/admin/Advanced Configuration Options.ru.adoc]()\n\n### User Creation and Management Workflow\n\n```mermaid\nflowchart TD\n    Start[\"Administrator Access\"] --\u003e CreateUser[\"Create New User\"]\n    CreateUser --\u003e BasicInfo[\"Enter Basic Information\"]\n    BasicInfo --\u003e SetCredentials[\"Set Authentication Credentials\"]\n    SetCredentials --\u003e AssignRole[\"Assign Role\"]\n    AssignRole --\u003e AssignGroups[\"Assign Security Groups\"]\n    AssignGroups --\u003e SetPreferences[\"Configure Preferences\"]\n    SetPreferences --\u003e SaveUser[\"Save User Account\"]\n    SaveUser --\u003e EmailNotification[\"Send Account Notification\"]\n    \n    SaveUser --\u003e ManageUser[\"Manage Existing User\"]\n    ManageUser --\u003e EditProfile[\"Edit Profile\"]\n    ManageUser --\u003e ChangeRole[\"Change Role Assignment\"]\n    ManageUser --\u003e UpdateGroups[\"Update Group Membership\"]\n    ManageUser --\u003e ResetPassword[\"Reset Password\"]\n    ManageUser --\u003e DeactivateUser[\"Deactivate User\"]\n    \n    EditProfile --\u003e SaveChanges[\"Save Changes\"]\n    ChangeRole --\u003e SaveChanges\n    UpdateGroups --\u003e SaveChanges\n    ResetPassword --\u003e SaveChanges\n    DeactivateUser --\u003e SaveChanges\n```\n\n**User Management Workflow Process**\n\nSources: [content/admin/administration-panel/Users.ru.adoc](), [content/admin/installation-guide/Downloading \u0026 Installing.ru.adoc]()\n\n## Role-Based Access Control\n\nSuiteCRM implements a comprehensive role-based access control (RBAC) system that defines what actions users can perform on different modules and records.\n\n### Role Management Components\n\n| Component | Description | Configuration |\n|-----------|-------------|---------------|\n| **Role Definition** | Named role with specific permissions | Created in Role Management interface |\n| **Module Access** | Controls which modules users can access | Per-module enable/disable settings |\n| **Action Permissions** | Defines CRUD operations allowed | Create, Read, Update, Delete, Import, Export |\n| **Field-Level Security** | Controls access to specific fields | Field-by-field visibility settings |\n| **Record-Level Security** | Limits access to specific records | Owner, Group, All records access |\n\n### Permission Matrix Structure\n\n```mermaid\ngraph TB\n    Role[\"User Role\"] --\u003e ModuleAccess[\"Module Access Control\"]\n    Role --\u003e ActionPerms[\"Action Permissions\"]\n    Role --\u003e FieldSecurity[\"Field-Level Security\"]\n    Role --\u003e RecordSecurity[\"Record-Level Security\"]\n    \n    ModuleAccess --\u003e EnabledModules[\"Enabled Modules\"]\n    ModuleAccess --\u003e AdminAccess[\"Admin Panel Access\"]\n    \n    ActionPerms --\u003e CreatePerm[\"Create Permission\"]\n    ActionPerms --\u003e ReadPerm[\"Read Permission\"]\n    ActionPerms --\u003e UpdatePerm[\"Update Permission\"]\n    ActionPerms --\u003e DeletePerm[\"Delete Permission\"]\n    ActionPerms --\u003e ImportPerm[\"Import Permission\"]\n    ActionPerms --\u003e ExportPerm[\"Export Permission\"]\n    \n    FieldSecurity --\u003e FieldAccess[\"Field Access Control\"]\n    FieldSecurity --\u003e FieldVisibility[\"Field Visibility\"]\n    \n    RecordSecurity --\u003e OwnerAccess[\"Owner-Only Access\"]\n    RecordSecurity --\u003e GroupAccess[\"Group Access\"]\n    RecordSecurity --\u003e GlobalAccess[\"Global Access\"]\n```\n\n**Role-Based Access Control Structure**\n\nSources: [content/admin/administration-panel/Users.ru.adoc](), [content/user/advanced-modules/Workflow.ru.adoc]()\n\n## Security Groups\n\nSecurity groups provide an additional layer of access control by organizing users into groups and controlling access to records based on group membership.\n\n### Security Group Architecture\n\n```mermaid\ngraph LR\n    SecurityGroups[\"Security Groups\"] --\u003e GroupTypes[\"Group Types\"]\n    SecurityGroups --\u003e Membership[\"Group Membership\"]\n    SecurityGroups --\u003e AccessRules[\"Access Rules\"]\n    \n    GroupTypes --\u003e UserGroups[\"User Groups\"]\n    GroupTypes --\u003e AdminGroups[\"Administrative Groups\"]\n    GroupTypes --\u003e FunctionalGroups[\"Functional Groups\"]\n    \n    Membership --\u003e DirectMembers[\"Direct Members\"]\n    Membership --\u003e InheritedMembers[\"Inherited Members\"]\n    \n    AccessRules --\u003e RecordSharing[\"Record Sharing Rules\"]\n    AccessRules --\u003e ModuleAccess[\"Module Access Rules\"]\n    AccessRules --\u003e FieldRestrictions[\"Field Restrictions\"]\n    \n    RecordSharing --\u003e OwnerGroup[\"Owner Group Access\"]\n    RecordSharing --\u003e RelatedGroup[\"Related Group Access\"]\n    RecordSharing --\u003e ParentGroup[\"Parent Group Access\"]\n```\n\n**Security Group Organization and Access Control**\n\n### Group Management Operations\n\nThe security group system supports:\n\n- **Group Creation**: Establishing new security groups with defined purposes\n- **Member Management**: Adding and removing users from groups\n- **Inheritance Rules**: Defining how group permissions cascade\n- **Access Policies**: Setting record and module access rules per group\n- **Group Hierarchies**: Creating parent-child group relationships\n\nSources: [content/admin/administration-panel/Users.ru.adoc](), [content/8.x/admin/administration-panel/Administration-Panel.ru.adoc]()\n\n## Authentication and Password Management\n\nSuiteCRM provides robust authentication mechanisms and password management features to ensure system security.\n\n### Authentication Methods\n\n```mermaid\ngraph TB\n    Authentication[\"Authentication System\"] --\u003e LocalAuth[\"Local Authentication\"]\n    Authentication --\u003e ExternalAuth[\"External Authentication\"]\n    Authentication --\u003e OAuth[\"OAuth Integration\"]\n    \n    LocalAuth --\u003e UsernamePassword[\"Username/Password\"]\n    LocalAuth --\u003e PasswordPolicy[\"Password Policy\"]\n    LocalAuth --\u003e SessionMgmt[\"Session Management\"]\n    \n    ExternalAuth --\u003e LDAP[\"LDAP Integration\"]\n    ExternalAuth --\u003e SAML[\"SAML SSO\"]\n    ExternalAuth --\u003e TwoFactor[\"Two-Factor Authentication\"]\n    \n    OAuth --\u003e OAuth2Clients[\"OAuth2 Clients\"]\n    OAuth --\u003e TokenMgmt[\"Token Management\"]\n    OAuth --\u003e ExternalProviders[\"External Providers\"]\n    \n    PasswordPolicy --\u003e MinLength[\"Minimum Length\"]\n    PasswordPolicy --\u003e Complexity[\"Complexity Requirements\"]\n    PasswordPolicy --\u003e Expiration[\"Password Expiration\"]\n    PasswordPolicy --\u003e History[\"Password History\"]\n```\n\n**Authentication System Components**\n\n### Password Management Features\n\n| Feature | Description | Configuration Location |\n|---------|-------------|----------------------|\n| **Password Policy** | Enforces password complexity requirements | System Configuration |\n| **Password Expiration** | Forces regular password changes | User Management settings |\n| **Password History** | Prevents password reuse | Security settings |\n| **Account Lockout** | Locks accounts after failed attempts | Authentication configuration |\n| **Password Reset** | Allows administrative password resets | User management interface |\n\nSources: [content/admin/administration-panel/System.ru.adoc](), [content/admin/Advanced Configuration Options.ru.adoc]()\n\n## User Interface Access Controls\n\nThe user management system controls various aspects of the user interface based on roles and permissions.\n\n### Interface Control Mechanisms\n\n```mermaid\ngraph LR\n    UIControls[\"UI Access Controls\"] --\u003e MenuAccess[\"Menu Access\"]\n    UIControls --\u003e ModuleVisibility[\"Module Visibility\"]\n    UIControls --\u003e FieldDisplay[\"Field Display\"]\n    UIControls --\u003e ActionButtons[\"Action Buttons\"]\n    \n    MenuAccess --\u003e AdminMenu[\"Admin Panel Menu\"]\n    MenuAccess --\u003e ModuleMenu[\"Module Menus\"]\n    MenuAccess --\u003e UserMenu[\"User Profile Menu\"]\n    \n    ModuleVisibility --\u003e TabDisplay[\"Tab Display\"]\n    ModuleVisibility --\u003e ModuleList[\"Module List Access\"]\n    \n    FieldDisplay --\u003e ReadOnlyFields[\"Read-Only Fields\"]\n    FieldDisplay --\u003e HiddenFields[\"Hidden Fields\"]\n    FieldDisplay --\u003e RequiredFields[\"Required Fields\"]\n    \n    ActionButtons --\u003e CreateButton[\"Create Button\"]\n    ActionButtons --\u003e EditButton[\"Edit Button\"]\n    ActionButtons --\u003e DeleteButton[\"Delete Button\"]\n    ActionButtons --\u003e ExportButton[\"Export Button\"]\n```\n\n**User Interface Access Control System**\n\n### Administrative Interface Elements\n\nThe user management system controls access to:\n\n- **Administration Panel**: Full admin access vs. limited administrative functions\n- **Module Configuration**: Access to Studio, Module Builder, and other development tools\n- **System Settings**: Currency, regional settings, email configuration\n- **User Preferences**: Personal settings that individual users can modify\n- **Reporting Tools**: Access to reports, dashboards, and analytics\n\nSources: [content/admin/administration-panel/Developer Tools.ru.adoc](), [content/user/introduction/User Interface/Views.ru.adoc]()\n\n## Integration with System Components\n\nUser management integrates with various SuiteCRM system components to provide comprehensive access control.\n\n### System Integration Points\n\n```mermaid\ngraph TB\n    UserMgmt[\"User Management\"] --\u003e EmailSystem[\"Email System\"]\n    UserMgmt --\u003e WorkflowEngine[\"Workflow Engine\"]\n    UserMgmt --\u003e ReportingSystem[\"Reporting System\"]\n    UserMgmt --\u003e APIAccess[\"API Access\"]\n    \n    EmailSystem --\u003e EmailAccounts[\"Email Accounts\"]\n    EmailSystem --\u003e EmailTemplates[\"Email Templates\"]\n    EmailSystem --\u003e EmailCampaigns[\"Email Campaigns\"]\n    \n    WorkflowEngine --\u003e WorkflowAssignment[\"Workflow Assignment\"]\n    WorkflowEngine --\u003e ProcessAutomation[\"Process Automation\"]\n    WorkflowEngine --\u003e UserNotifications[\"User Notifications\"]\n    \n    ReportingSystem --\u003e ReportAccess[\"Report Access\"]\n    ReportingSystem --\u003e DashboardAccess[\"Dashboard Access\"]\n    ReportingSystem --\u003e DataVisibility[\"Data Visibility\"]\n    \n    APIAccess --\u003e APIKeys[\"API Keys\"]\n    APIAccess --\u003e TokenAuthentication[\"Token Authentication\"]\n    APIAccess --\u003e ExternalIntegration[\"External Integration\"]\n```\n\n**User Management System Integration Architecture**\n\nThe user management system coordinates with:\n\n- **Email Configuration**: Personal email accounts and system-wide email settings\n- **Workflow Processes**: User assignment and notification rules\n- **Module Security**: Field-level and record-level access controls\n- **API Authentication**: OAuth tokens and API key management\n- **System Logging**: User activity tracking and audit trails\n\nSources: [content/user/core-modules/Emails.ru.adoc](), [content/user/advanced-modules/Workflow.ru.adoc](), [content/admin/administration-panel/System.ru.adoc]()"])</script><script>self.__next_f.push([1,"2c:T414b,"])</script><script>self.__next_f.push([1,"# Email Configuration\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [content/8.x/admin/Licensing.ru.adoc](content/8.x/admin/Licensing.ru.adoc)\n- [content/8.x/features/_index.ru.adoc](content/8.x/features/_index.ru.adoc)\n- [content/admin/administration-panel/Emails/Email-Compose-From-List.ru.adoc](content/admin/administration-panel/Emails/Email-Compose-From-List.ru.adoc)\n- [content/admin/administration-panel/Emails/Email.ru.adoc](content/admin/administration-panel/Emails/Email.ru.adoc)\n- [content/admin/administration-panel/Emails/Microsoft-OAuth-Provider-HowTo.ru.adoc](content/admin/administration-panel/Emails/Microsoft-OAuth-Provider-HowTo.ru.adoc)\n- [content/admin/releases/7.13.x/_index.en.adoc](content/admin/releases/7.13.x/_index.en.adoc)\n- [content/admin/releases/7.14.x/_index.en.adoc](content/admin/releases/7.14.x/_index.en.adoc)\n- [static/images/en/admin/release/Externaloauth1.png](static/images/en/admin/release/Externaloauth1.png)\n- [static/images/en/admin/release/Externaloauth2.png](static/images/en/admin/release/Externaloauth2.png)\n- [static/images/en/admin/release/Externaloauth3.png](static/images/en/admin/release/Externaloauth3.png)\n- [static/images/en/admin/release/InboundEmail1.png](static/images/en/admin/release/InboundEmail1.png)\n- [static/images/en/admin/release/InboundEmail2.png](static/images/en/admin/release/InboundEmail2.png)\n- [static/images/en/admin/release/InboundEmail3.png](static/images/en/admin/release/InboundEmail3.png)\n- [static/images/en/admin/release/InboundEmail4.png](static/images/en/admin/release/InboundEmail4.png)\n- [static/images/en/admin/release/InboundEmail5.png](static/images/en/admin/release/InboundEmail5.png)\n- [static/images/en/admin/release/InboundOAuthConfiguration.png](static/images/en/admin/release/InboundOAuthConfiguration.png)\n- [static/images/en/admin/release/OAuthMicrosoftConnection.png](static/images/en/admin/release/OAuthMicrosoftConnection.png)\n- [static/images/en/admin/release/Outbound1.png](static/images/en/admin/release/Outbound1.png)\n- [static/images/en/admin/release/Outbound2.png](static/images/en/admin/release/Outbound2.png)\n- [static/images/ru/8.x/features/loadmore/image0.png](static/images/ru/8.x/features/loadmore/image0.png)\n- [static/images/ru/8.x/features/loadmore/image1.png](static/images/ru/8.x/features/loadmore/image1.png)\n- [static/images/ru/8.x/features/loadmore/image2.png](static/images/ru/8.x/features/loadmore/image2.png)\n- [static/images/ru/8.x/features/loadmore/image3.png](static/images/ru/8.x/features/loadmore/image3.png)\n- [static/images/ru/8.x/features/notifications/image1.png](static/images/ru/8.x/features/notifications/image1.png)\n- [static/images/ru/8.x/features/notifications/image2.png](static/images/ru/8.x/features/notifications/image2.png)\n- [static/images/ru/8.x/features/notifications/image3.png](static/images/ru/8.x/features/notifications/image3.png)\n- [static/images/ru/admin/Email/image4.png](static/images/ru/admin/Email/image4.png)\n- [static/images/ru/admin/Email/image6.png](static/images/ru/admin/Email/image6.png)\n\n\u003c/details\u003e\n\n\n\nThis document covers the configuration and administration of SuiteCRM's email system, including traditional SMTP/IMAP settings and modern OAuth2 authentication integration. Email configuration encompasses inbound email processing, outbound email delivery, OAuth provider setup, and email account management across personal, group, and system-level contexts.\n\nFor information about using the email interface as an end user, see [User Email Guide](#4.1). For API-level email integration, see [API Documentation](#4).\n\n## Email System Architecture\n\nSuiteCRM's email system consists of multiple interconnected components that handle different aspects of email processing, authentication, and delivery.\n\n```mermaid\ngraph TB\n    subgraph \"Email Configuration Components\"\n        SystemConfig[\"System Email Settings\u003cbr/\u003e(config.php)\"]\n        InboundAccounts[\"Inbound Email Accounts\u003cbr/\u003e(InboundEmail module)\"]\n        OutboundAccounts[\"Outbound Email Accounts\u003cbr/\u003e(OutboundEmail module)\"]\n        OAuthProviders[\"OAuth Providers\u003cbr/\u003e(ExternalOAuthConnection)\"]\n    end\n    \n    subgraph \"Account Types\"\n        PersonalInbound[\"Personal Inbound\"]\n        GroupInbound[\"Group Inbound\"]\n        BounceInbound[\"Bounce Handling\"]\n        PersonalOutbound[\"Personal Outbound\"]\n        GroupOutbound[\"Group Outbound\"]\n        SystemOutbound[\"System Outbound\"]\n    end\n    \n    subgraph \"Authentication Methods\"\n        BasicAuth[\"Basic Authentication\u003cbr/\u003e(username/password)\"]\n        OAuthAuth[\"OAuth2 Authentication\u003cbr/\u003e(token-based)\"]\n    end\n    \n    subgraph \"Processing Components\"\n        EmailScheduler[\"Email Scheduler Jobs\"]\n        EmailQueue[\"Email Queue Management\"]\n        EmailImport[\"Email Import Processing\"]\n        CaseCreation[\"Automatic Case Creation\"]\n    end\n    \n    SystemConfig --\u003e OutboundAccounts\n    InboundAccounts --\u003e PersonalInbound\n    InboundAccounts --\u003e GroupInbound\n    InboundAccounts --\u003e BounceInbound\n    OutboundAccounts --\u003e PersonalOutbound\n    OutboundAccounts --\u003e GroupOutbound\n    OutboundAccounts --\u003e SystemOutbound\n    \n    OAuthProviders --\u003e OAuthAuth\n    OAuthAuth --\u003e InboundAccounts\n    OAuthAuth --\u003e OutboundAccounts\n    BasicAuth --\u003e InboundAccounts\n    BasicAuth --\u003e OutboundAccounts\n    \n    EmailScheduler --\u003e EmailQueue\n    EmailScheduler --\u003e EmailImport\n    GroupInbound --\u003e CaseCreation\n```\n\n**Sources:** content/admin/releases/7.13.x/_index.en.adoc, content/admin/administration-panel/Emails/Email.ru.adoc\n\n## Account Types and Configuration Entities\n\nThe email system supports different account types, each serving specific organizational needs and mapped to distinct code entities.\n\n| Account Type | Module/Entity | Purpose | Configuration Location |\n|-------------|---------------|---------|----------------------|\n| Personal Inbound | `InboundEmail` | Individual user email access | User profile + Admin panel |\n| Group Inbound | `InboundEmail` | Shared team email processing | Admin panel only |\n| Bounce Handling | `InboundEmail` | Campaign bounce processing | Admin panel only |\n| Personal Outbound | `OutboundEmail` | Individual sending accounts | User profile + Admin panel |\n| Group Outbound | `OutboundEmail` | Shared sending accounts | Admin panel only |\n| System Outbound | System settings | Default notification sender | Admin panel only |\n\n### Inbound Email Account Configuration\n\nInbound email accounts handle email retrieval and processing through IMAP protocols with optional OAuth2 authentication.\n\n```mermaid\ngraph LR\n    subgraph \"InboundEmail Configuration\"\n        InboundForm[\"Inbound Email Form\"]\n        AuthType[\"Authentication Type\"]\n        ServerConfig[\"Server Configuration\"]\n        ProcessingRules[\"Processing Rules\"]\n    end\n    \n    subgraph \"Authentication Options\"\n        BasicCreds[\"Basic Authentication\u003cbr/\u003e(username/password)\"]\n        OAuthConnection[\"OAuth Connection\u003cbr/\u003e(ExternalOAuthConnection)\"]\n    end\n    \n    subgraph \"Processing Features\"\n        AutoImport[\"Automatic Import\"]\n        CaseCreation[\"Case Creation\"]\n        AutoReply[\"Auto-Reply Templates\"]\n        SecurityGroups[\"Security Group Assignment\"]\n    end\n    \n    InboundForm --\u003e AuthType\n    AuthType --\u003e BasicCreds\n    AuthType --\u003e OAuthConnection\n    InboundForm --\u003e ServerConfig\n    InboundForm --\u003e ProcessingRules\n    ProcessingRules --\u003e AutoImport\n    ProcessingRules --\u003e CaseCreation\n    ProcessingRules --\u003e AutoReply\n    ProcessingRules --\u003e SecurityGroups\n    \n    OAuthConnection -.-\u003e OAuthProviders[\"OAuth Providers\u003cbr/\u003e(Microsoft, Google, etc.)\"]\n```\n\n**Sources:** content/admin/releases/7.13.x/_index.en.adoc, static/images/en/admin/release/InboundOAuthConfiguration.png\n\n## OAuth Integration Architecture\n\nOAuth2 integration provides secure, token-based authentication for modern email providers like Microsoft 365 and Google Workspace.\n\n```mermaid\ngraph TB\n    subgraph \"OAuth Provider Setup\"\n        ProviderConfig[\"ExternalOAuthConnection\u003cbr/\u003eProvider Configuration\"]\n        ClientCredentials[\"Client ID \u0026 Secret\"]\n        RedirectURI[\"Redirect URI\u003cbr/\u003e(index.php?entryPoint=setExternalOAuthToken)\"]\n        TokenEndpoints[\"Authorization \u0026 Token Endpoints\"]\n    end\n    \n    subgraph \"OAuth Flow Implementation\"\n        AuthRequest[\"Authorization Request\"]\n        AuthCode[\"Authorization Code\"]\n        TokenExchange[\"Token Exchange\"]\n        AccessToken[\"Access Token Storage\"]\n        RefreshToken[\"Token Refresh Logic\"]\n    end\n    \n    subgraph \"Email Account Integration\"\n        InboundOAuth[\"Inbound Email + OAuth\"]\n        OutboundOAuth[\"Outbound Email + OAuth\"]\n        IMAP2Handler[\"Imap2Handler\u003cbr/\u003e(xoauth support)\"]\n    end\n    \n    subgraph \"Security Features\"\n        SecurityGroupAccess[\"Security Group Access Control\"]\n        PersonalVsGroup[\"Personal vs Group Connections\"]\n        TokenEncryption[\"Token Storage Security\"]\n    end\n    \n    ProviderConfig --\u003e ClientCredentials\n    ProviderConfig --\u003e RedirectURI\n    ProviderConfig --\u003e TokenEndpoints\n    \n    ClientCredentials --\u003e AuthRequest\n    AuthRequest --\u003e AuthCode\n    AuthCode --\u003e TokenExchange\n    TokenExchange --\u003e AccessToken\n    AccessToken --\u003e RefreshToken\n    \n    AccessToken --\u003e InboundOAuth\n    AccessToken --\u003e OutboundOAuth\n    InboundOAuth --\u003e IMAP2Handler\n    \n    InboundOAuth --\u003e SecurityGroupAccess\n    OutboundOAuth --\u003e SecurityGroupAccess\n    SecurityGroupAccess --\u003e PersonalVsGroup\n    AccessToken --\u003e TokenEncryption\n```\n\n**Sources:** content/admin/releases/7.13.x/_index.en.adoc, content/admin/administration-panel/Emails/Microsoft-OAuth-Provider-HowTo.ru.adoc, static/images/en/admin/release/OAuthMicrosoftConnection.png\n\n## Configuration Management Components\n\nEmail configuration involves multiple administrative interfaces and storage mechanisms across the SuiteCRM codebase.\n\n### System-Level Configuration\n\nThe core email settings are managed through the admin panel and stored in `config.php`:\n\n- **Default outbound mail server**: System-wide SMTP configuration\n- **Assignment notifications**: User notification preferences  \n- **Security settings**: Email content filtering and tag restrictions\n- **Campaign settings**: Mass email processing parameters\n\n### Module-Specific Configuration\n\nEach email account type has dedicated configuration interfaces:\n\n```mermaid\ngraph LR\n    subgraph \"Admin Panel Interfaces\"\n        BasicEmailSettings[\"Basic Email Settings\u003cbr/\u003e(config.php management)\"]\n        InboundEmailModule[\"Inbound Email Module\u003cbr/\u003e(CRUD operations)\"]\n        OutboundEmailModule[\"Outbound Email Module\u003cbr/\u003e(CRUD operations)\"]\n        OAuthProviderModule[\"OAuth Provider Module\u003cbr/\u003e(External connections)\"]\n    end\n    \n    subgraph \"User Profile Interfaces\"\n        UserEmailSettings[\"User Email Settings\u003cbr/\u003e(Personal accounts)\"]\n        SignatureManager[\"Email Signatures\u003cbr/\u003e(Personal/Group)\"]\n    end\n    \n    subgraph \"Processing Components\"\n        EmailScheduler[\"Scheduler Jobs\u003cbr/\u003e(Email processing)\"]\n        EmailQueue[\"Email Queue\u003cbr/\u003e(Send queue management)\"]\n        ImportProcessor[\"Import Processor\u003cbr/\u003e(Email ingestion)\"]\n    end\n    \n    BasicEmailSettings --\u003e SystemConfig[\"System Configuration\u003cbr/\u003e(config.php)\"]\n    InboundEmailModule --\u003e InboundStorage[\"InboundEmail Records\"]\n    OutboundEmailModule --\u003e OutboundStorage[\"OutboundEmail Records\"]\n    OAuthProviderModule --\u003e OAuthStorage[\"ExternalOAuthConnection Records\"]\n    \n    UserEmailSettings --\u003e PersonalAccounts[\"Personal Account Records\"]\n    SignatureManager --\u003e EmailSignatures[\"Email Signature Storage\"]\n    \n    EmailScheduler --\u003e ScheduledJobs[\"Scheduled Task Definitions\"]\n    EmailQueue --\u003e QueueTables[\"Email Queue Tables\"]\n    ImportProcessor --\u003e EmailRecords[\"Imported Email Records\"]\n```\n\n**Sources:** content/admin/administration-panel/Emails/Email.ru.adoc, content/admin/releases/7.14.x/_index.en.adoc\n\n## Authentication Method Implementation\n\nSuiteCRM supports both traditional and modern authentication methods for email connectivity.\n\n### Basic Authentication Flow\n\nTraditional username/password authentication for email servers:\n\n```mermaid\nsequenceDiagram\n    participant Admin as \"Administrator\"\n    participant UI as \"Admin Interface\"\n    participant Config as \"Account Configuration\"\n    participant EmailServer as \"Email Server\"\n    \n    Admin-\u003e\u003eUI: Configure Email Account\n    Admin-\u003e\u003eUI: Enter Server Details\n    Admin-\u003e\u003eUI: Provide Credentials\n    UI-\u003e\u003eConfig: Store Account Settings\n    UI-\u003e\u003eEmailServer: Test Connection\n    EmailServer--\u003e\u003eUI: Connection Result\n    UI--\u003e\u003eAdmin: Configuration Status\n    \n    Note over Config: Credentials stored securely\n    Note over EmailServer: IMAP/SMTP with authentication\n```\n\n### OAuth2 Authentication Flow\n\nModern token-based authentication with external providers:\n\n```mermaid\nsequenceDiagram\n    participant Admin as \"Administrator\"\n    participant SuiteCRM as \"SuiteCRM\"\n    participant Provider as \"OAuth Provider\"\n    participant EmailServer as \"Email Server\"\n    \n    Admin-\u003e\u003eSuiteCRM: Configure OAuth Provider\n    Admin-\u003e\u003eSuiteCRM: Create Email Account\n    Admin-\u003e\u003eSuiteCRM: Select OAuth Connection\n    SuiteCRM-\u003e\u003eProvider: Authorization Request\n    Provider--\u003e\u003eSuiteCRM: Authorization Code\n    SuiteCRM-\u003e\u003eProvider: Exchange for Tokens\n    Provider--\u003e\u003eSuiteCRM: Access \u0026 Refresh Tokens\n    SuiteCRM-\u003e\u003eEmailServer: Authenticate with Token\n    EmailServer--\u003e\u003eSuiteCRM: Access Granted\n    \n    Note over SuiteCRM: Tokens stored securely\n    Note over Provider: Supports Microsoft, Google, etc.\n```\n\n**Sources:** content/admin/releases/7.13.x/_index.en.adoc, content/admin/releases/7.14.x/_index.en.adoc\n\n## Email Processing and Automation\n\nThe email system includes automated processing capabilities for different organizational workflows.\n\n### Group Email Processing Features\n\nGroup email accounts provide additional automation capabilities:\n\n- **Automatic email import**: Configurable import of all incoming messages\n- **Case creation**: Automatic generation of support cases from emails\n- **Auto-reply templates**: Customizable automatic responses\n- **Assignment distribution**: Round-robin or rule-based assignment methods\n- **Security group integration**: Access control for team-based email accounts\n\n### Processing Configuration Options\n\n| Feature | Configuration Entity | Purpose |\n|---------|---------------------|---------|\n| Auto Import | `InboundEmail.auto_import` | Import emails into SuiteCRM |\n| Case Creation | `InboundEmail.create_case` | Generate cases from emails |\n| Auto Reply | `InboundEmail.template_id` | Automated response templates |\n| Assignment Method | `InboundEmail.assignment_method` | User assignment strategy |\n| Security Groups | `SecurityGroup` relationships | Access control |\n\n**Sources:** content/admin/administration-panel/Emails/Email.ru.adoc\n\n## Email Queue and Scheduling\n\nSuiteCRM implements a robust email queue system for reliable message delivery and processing.\n\n```mermaid\ngraph TB\n    subgraph \"Email Queue System\"\n        EmailComposer[\"Email Composer\u003cbr/\u003e(User Interface)\"]\n        QueueManager[\"Email Queue Manager\u003cbr/\u003e(Queue processing)\"]\n        SchedulerJobs[\"Scheduler Jobs\u003cbr/\u003e(Automated processing)\"]\n    end\n    \n    subgraph \"Queue Operations\"\n        QueueStorage[\"Email Queue Storage\u003cbr/\u003e(Database tables)\"]\n        BatchProcessing[\"Batch Processing\u003cbr/\u003e(Configurable limits)\"]\n        RetryLogic[\"Retry Logic\u003cbr/\u003e(Failed delivery handling)\"]\n    end\n    \n    subgraph \"Processing Types\"\n        ImmediateSend[\"Immediate Send\u003cbr/\u003e(Interactive emails)\"]\n        CampaignMailing[\"Campaign Mailing\u003cbr/\u003e(Mass email processing)\"]\n        NotificationSend[\"Notification Send\u003cbr/\u003e(System notifications)\"]\n    end\n    \n    EmailComposer --\u003e QueueStorage\n    QueueStorage --\u003e QueueManager\n    SchedulerJobs --\u003e QueueManager\n    QueueManager --\u003e BatchProcessing\n    BatchProcessing --\u003e RetryLogic\n    \n    QueueManager --\u003e ImmediateSend\n    QueueManager --\u003e CampaignMailing\n    QueueManager --\u003e NotificationSend\n    \n    ImmediateSend --\u003e DeliveryStatus[\"Delivery Status Tracking\"]\n    CampaignMailing --\u003e DeliveryStatus\n    NotificationSend --\u003e DeliveryStatus\n```\n\n### Queue Configuration Parameters\n\nThe email queue system supports several configuration parameters for optimal performance:\n\n- **Batch size**: Number of emails processed simultaneously\n- **Campaign tracker location**: URL configuration for tracking links\n- **Message storage**: Optional retention of sent message copies\n- **Retry intervals**: Failed delivery retry scheduling\n\n**Sources:** content/admin/administration-panel/Emails/Email.ru.adoc, content/admin/releases/7.14.x/_index.en.adoc"])</script><script>self.__next_f.push([1,"2d:T3f2a,"])</script><script>self.__next_f.push([1,"# Community Contribution\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [LICENSE.md](LICENSE.md)\n- [README.md](README.md)\n- [archetypes/blog.md](archetypes/blog.md)\n- [archetypes/default.md](archetypes/default.md)\n- [changes_sed.txt](changes_sed.txt)\n- [content/community/contributing-code/Bugs.adoc](content/community/contributing-code/Bugs.adoc)\n- [content/community/contributing-code/Coding Standards.adoc](content/community/contributing-code/Coding Standards.adoc)\n- [content/community/contributing-code/Contributing.adoc.NOT](content/community/contributing-code/Contributing.adoc.NOT)\n- [content/community/contributing-code/Features.adoc](content/community/contributing-code/Features.adoc)\n- [content/community/contributing-code/Test Pull Requests.adoc](content/community/contributing-code/Test Pull Requests.adoc)\n- [content/community/contributing-code/_index.es.adoc](content/community/contributing-code/_index.es.adoc)\n- [content/community/contributing-to-docs/simple-edit.es.adoc](content/community/contributing-to-docs/simple-edit.es.adoc)\n- [content/community/raising-issues/_index.en.adoc](content/community/raising-issues/_index.en.adoc)\n- [content/community/raising-issues/issues-voting.adoc](content/community/raising-issues/issues-voting.adoc)\n- [content/community/raising-issues/raising-issues.adoc](content/community/raising-issues/raising-issues.adoc)\n- [content/community/security-policy.adoc](content/community/security-policy.adoc)\n- [content/community/supported-versions.adoc](content/community/supported-versions.adoc)\n- [static/images/en/community/32Issue-Voting.gif](static/images/en/community/32Issue-Voting.gif)\n- [static/images/en/community/testingprs1.png](static/images/en/community/testingprs1.png)\n- [static/images/en/community/testingprs2.png](static/images/en/community/testingprs2.png)\n- [static/images/en/community/testingprs3.png](static/images/en/community/testingprs3.png)\n\n\u003c/details\u003e\n\n\n\n## Purpose and Scope\n\nThis document provides a comprehensive guide to contributing to the SuiteCRM ecosystem, including both the main application and its documentation. It covers the processes, standards, and workflows that enable community members to participate in the development and improvement of SuiteCRM.\n\nFor specific information about installation and configuration, see [Installation and Upgrade Guides](#5). For details about API development, see [API Documentation](#4). For customization techniques, see [Customization and Development](#6).\n\n## Community Contribution Framework\n\nThe SuiteCRM project operates as an open-source community initiative with multiple contribution pathways. Contributors can participate through documentation improvements, code contributions, issue reporting, testing, and community support activities.\n\n```mermaid\nflowchart TD\n    subgraph \"Community Contribution Entry Points\"\n        DOCS[\"Documentation\\nContributions\"]\n        CODE[\"Code\\nContributions\"] \n        ISSUES[\"Issue\\nReporting\"]\n        TESTING[\"Pull Request\\nTesting\"]\n        SECURITY[\"Security\\nReporting\"]\n    end\n    \n    subgraph \"SuiteCRM Repositories\"\n        SUITEDOCS[\"salesagility/SuiteDocs\\nDocumentation Site\"]\n        SUITECRM[\"salesagility/SuiteCRM\\n7.x Versions\"]\n        SUITECORE[\"salesagility/SuiteCRM-Core\\n8.x Versions\"]\n    end\n    \n    subgraph \"Quality Assurance\"\n        CLA[\"Contributor License\\nAgreement\"]\n        TRAVIS[\"Travis CI\\nAutomated Testing\"]\n        REVIEW[\"Code Review\\nProcess\"]\n        LABELS[\"GitHub Issue\\nLabeling System\"]\n    end\n    \n    DOCS --\u003e SUITEDOCS\n    CODE --\u003e SUITECRM\n    CODE --\u003e SUITECORE\n    ISSUES --\u003e SUITECRM\n    ISSUES --\u003e SUITECORE\n    TESTING --\u003e SUITECRM\n    TESTING --\u003e SUITECORE\n    SECURITY --\u003e SUITECRM\n    SECURITY --\u003e SUITECORE\n    \n    SUITEDOCS --\u003e CLA\n    SUITECRM --\u003e CLA\n    SUITECORE --\u003e CLA\n    SUITECRM --\u003e TRAVIS\n    SUITECORE --\u003e TRAVIS\n    CODE --\u003e REVIEW\n    ISSUES --\u003e LABELS\n    \n    style DOCS fill:#f9f9f9\n    style CODE fill:#f9f9f9\n    style ISSUES fill:#f9f9f9\n    style TESTING fill:#f9f9f9\n    style SECURITY fill:#f9f9f9\n```\n\n**SuiteCRM Community Contribution Framework**\n\nSources: [README.md:1-43](), [content/community/contributing-code/Bugs.adoc:1-127](), [content/community/raising-issues/raising-issues.adoc:1-114](), [content/community/security-policy.adoc:1-56]()\n\n## Documentation Contribution Workflow\n\nThe SuiteDocs repository uses Hugo static site generator with AsciiDoc content format to create the official documentation website. Contributors can make simple edits directly through GitHub's web interface or set up local development environments for more complex contributions.\n\n```mermaid\nflowchart LR\n    subgraph \"Content Creation\"\n        SIMPLE[\"Simple GitHub\\nWeb Edits\"]\n        ADVANCED[\"Local Hugo\\nDevelopment\"]\n        TRANSLATE[\"Translation\\nContributions\"]\n    end\n    \n    subgraph \"SuiteDocs Repository Structure\"\n        CONTENT[\"content/\\nAsciiDoc Files\"]\n        STATIC[\"static/images/\\nAssets\"]\n        CONFIG[\"config.toml\\nSite Configuration\"]\n        NETLIFY[\"netlify.toml\\nDeployment Config\"]\n    end\n    \n    subgraph \"Build and Deploy\"\n        HUGO[\"Hugo Static\\nSite Generator\"]\n        ASCIIDOCTOR[\"AsciiDoctor\\nProcessor\"]\n        NETLIFY_DEPLOY[\"Netlify\\nDeployment\"]\n        PREVIEW[\"docs.suitecrm.com\\nLive Site\"]\n    end\n    \n    SIMPLE --\u003e CONTENT\n    ADVANCED --\u003e CONTENT\n    ADVANCED --\u003e STATIC\n    TRANSLATE --\u003e CONTENT\n    \n    CONTENT --\u003e HUGO\n    STATIC --\u003e HUGO\n    CONFIG --\u003e HUGO\n    NETLIFY --\u003e NETLIFY_DEPLOY\n    \n    HUGO --\u003e ASCIIDOCTOR\n    ASCIIDOCTOR --\u003e NETLIFY_DEPLOY\n    NETLIFY_DEPLOY --\u003e PREVIEW\n    \n    style SIMPLE fill:#e1f5fe\n    style ADVANCED fill:#e1f5fe\n    style TRANSLATE fill:#e1f5fe\n```\n\n**Documentation Contribution and Build Pipeline**\n\nThe documentation supports multiple languages with content organized in language-specific directories. The build process converts AsciiDoc files to HTML and deploys automatically via Netlify when changes are merged to the master branch.\n\n| Contribution Type | Requirements | Target Files |\n|------------------|--------------|--------------|\n| Simple Text Edits | GitHub Account | `content/**/*.adoc` |\n| Advanced Features | Hugo, AsciiDoctor | `content/`, `static/`, `config.toml` |\n| Translations | Language Skills | `content/{lang}/`, `i18n/{lang}.toml` |\n| Screenshots | Image Assets | `static/images/` |\n\nSources: [README.md:11-43](), [content/community/contributing-to-docs/simple-edit.es.adoc:1-66]()\n\n## Code Contribution Process\n\nCode contributions to SuiteCRM follow a structured branching strategy with different workflows for bug fixes and feature development. The process includes mandatory CLA signing, automated testing, and code review procedures.\n\n```mermaid\nflowchart TD\n    subgraph \"Contribution Types\"\n        BUGFIX[\"Bug Fixes\\nbugfix_XXXX branches\"]\n        FEATURE[\"New Features\\nfeature-name branches\"]\n        HOTFIX[\"Critical Fixes\\nhotfix branch\"]\n    end\n    \n    subgraph \"Target Branches\"\n        HOTFIX_BR[\"hotfix\\nBug fixes target\"]\n        DEVELOP_BR[\"develop\\nFeature development\"]\n        MASTER_BR[\"master\\nStable releases\"]\n        VERSION_BR[\"7.14.x, 8.6.x\\nVersion branches\"]\n    end\n    \n    subgraph \"Quality Gates\"\n        CLA_CHECK[\"CLA Signature\\ncla.suitecrm.com\"]\n        TRAVIS_CI[\"Travis CI\\nAutomated Testing\"]\n        CODE_REVIEW[\"Manual Code\\nReview Process\"]\n        STANDARDS[\"Coding Standards\\nPSR-2, Documentation\"]\n    end\n    \n    BUGFIX --\u003e HOTFIX_BR\n    FEATURE --\u003e DEVELOP_BR\n    HOTFIX --\u003e HOTFIX_BR\n    \n    HOTFIX_BR --\u003e DEVELOP_BR\n    DEVELOP_BR --\u003e MASTER_BR\n    HOTFIX_BR --\u003e VERSION_BR\n    \n    BUGFIX --\u003e CLA_CHECK\n    FEATURE --\u003e CLA_CHECK\n    CLA_CHECK --\u003e TRAVIS_CI\n    TRAVIS_CI --\u003e CODE_REVIEW\n    CODE_REVIEW --\u003e STANDARDS\n    \n    style BUGFIX fill:#fff3e0\n    style FEATURE fill:#e8f5e8\n    style HOTFIX fill:#ffebee\n```\n\n**Code Contribution Branching and Quality Process**\n\n### Branch Naming Conventions\n\n- **Bug fixes**: `bugfix_XXXX` where XXXX is the issue number\n- **Features**: Descriptive names like `campaign-wizard-ui`\n- **Critical fixes**: Direct commits to `hotfix` branch\n\n### Commit Message Format\n\nBug fixes should use the format: `Fix #XXXX - \u003cissue description\u003e`\nFeatures should use descriptive commit messages following git best practices.\n\nSources: [content/community/contributing-code/Bugs.adoc:28-92](), [content/community/contributing-code/Features.adoc:10-48](), [content/community/contributing-code/Coding Standards.adoc:1-317]()\n\n## Issue Management and Community Processes\n\nThe SuiteCRM project uses GitHub's issue tracking system with a comprehensive labeling scheme to categorize and prioritize community feedback. The system supports voting mechanisms and provides clear workflows for different types of issues.\n\n```mermaid\nflowchart LR\n    subgraph \"Issue Types\"\n        BUG[\"bug\\nConfirmed Issues\"]\n        SUGGESTION[\"Suggestion\\nEnhancement Ideas\"]\n        QUESTION[\"Question\\nSupport Requests\"]\n        SECURITY[\"Security\\nVulnerability Reports\"]\n    end\n    \n    subgraph \"Priority Labels\"\n        LOW[\"Low Priority\\nVisual, Typos\"]\n        MEDIUM[\"Medium Priority\\nWorkaround Available\"]\n        HIGH[\"High Priority\\nNo Workaround\"]\n    end\n    \n    subgraph \"Status Labels\"\n        PENDING[\"Pending Input\\nAwaiting Reporter\"]\n        PROPOSED[\"Fix Proposed\\nPR Available\"]\n        RESOLVED[\"Resolved Next Release\\nFixed in Pipeline\"]\n        INVALID[\"Invalid\\nNon-reproducible\"]\n    end\n    \n    subgraph \"Community Actions\"\n        VOTING[\"GitHub Reactions\\nThumbs Up Voting\"]\n        TESTING[\"Community Testing\\nPR Validation\"]\n        ASSESSMENT[\"Assessed Label\\nCommunity Verification\"]\n    end\n    \n    BUG --\u003e LOW\n    BUG --\u003e MEDIUM\n    BUG --\u003e HIGH\n    \n    LOW --\u003e PENDING\n    MEDIUM --\u003e PENDING\n    HIGH --\u003e PENDING\n    \n    PENDING --\u003e PROPOSED\n    PROPOSED --\u003e RESOLVED\n    PENDING --\u003e INVALID\n    \n    BUG --\u003e VOTING\n    SUGGESTION --\u003e VOTING\n    PROPOSED --\u003e TESTING\n    TESTING --\u003e ASSESSMENT\n    \n    style BUG fill:#ffebee\n    style SECURITY fill:#fce4ec\n    style VOTING fill:#e3f2fd\n    style TESTING fill:#e8f5e8\n```\n\n**GitHub Issue Lifecycle and Community Interaction**\n\n### Voting System\n\nCommunity members can vote for issues using GitHub's reaction system. The thumbs-up count on the original issue description determines priority for future releases. Votes on comments are not counted.\n\n### Pull Request Testing\n\nCommunity members can test pull requests by:\n1. Cloning the author's branch: `git pull https://github.com/{username}/SuiteCRM.git {branch-name}`\n2. Testing the fix according to the issue description\n3. Commenting \"Assessed :+1:\" if the fix works correctly\n\nSources: [content/community/raising-issues/raising-issues.adoc:34-114](), [content/community/raising-issues/issues-voting.adoc:1-36](), [content/community/contributing-code/Test Pull Requests.adoc:1-58]()\n\n## Security Policy and Vulnerability Reporting\n\nSuiteCRM maintains a dedicated security policy for responsible disclosure of vulnerabilities. Security issues follow a separate reporting process from regular bugs to ensure proper handling of sensitive information.\n\n```mermaid\nflowchart TD\n    subgraph \"Security Reporting Channels\"\n        GITHUB_ADV[\"GitHub Security\\nAdvisories\"]\n        EMAIL[\"security@suitecrm.com\\nDirect Email\"]\n    end\n    \n    subgraph \"Repository Selection\"\n        BOTH_VERSIONS[\"Both 7.x and 8.x\\nsalesagility/SuiteCRM\"]\n        EIGHT_ONLY[\"8.x Only\\nsalesagility/SuiteCRM-Core\"]\n    end\n    \n    subgraph \"Assessment Process\"\n        CRITERIA[\"Valid Report Criteria\\n1 issue per report\\nVerified by reporter\\nReproduction steps\\nSupported versions\"]\n        SEVERITY[\"Severity Grading\\nPriority Assignment\"]\n        TIMELINE[\"Response Timeline\\n72h acknowledgment\\nVariable assessment time\"]\n    end\n    \n    subgraph \"Resolution\"\n        PRIVATE_FIX[\"Private Development\\nSecurity Team Only\"]\n        CVE_PROCESS[\"CVE Assignment\\nIf Applicable\"]\n        PUBLIC_RELEASE[\"Public Disclosure\\nAfter Fix Release\"]\n    end\n    \n    GITHUB_ADV --\u003e BOTH_VERSIONS\n    GITHUB_ADV --\u003e EIGHT_ONLY\n    EMAIL --\u003e BOTH_VERSIONS\n    EMAIL --\u003e EIGHT_ONLY\n    \n    BOTH_VERSIONS --\u003e CRITERIA\n    EIGHT_ONLY --\u003e CRITERIA\n    CRITERIA --\u003e SEVERITY\n    SEVERITY --\u003e TIMELINE\n    \n    TIMELINE --\u003e PRIVATE_FIX\n    PRIVATE_FIX --\u003e CVE_PROCESS\n    CVE_PROCESS --\u003e PUBLIC_RELEASE\n    \n    style GITHUB_ADV fill:#ffebee\n    style EMAIL fill:#ffebee\n    style PRIVATE_FIX fill:#fce4ec\n    style PUBLIC_RELEASE fill:#e8f5e8\n```\n\n**Security Vulnerability Reporting and Resolution Process**\n\n### Supported Versions for Security Reports\n\nOnly actively supported versions receive security updates. Current supported versions include SuiteCRM 7.14 ESR and 8.6, with specific support timelines documented in the version support matrix.\n\n| Version | Type | Active Support Until | Security Support Until |\n|---------|------|---------------------|----------------------|\n| 7.14 ESR | Extended Support | June 2025 | December 2025 |\n| 8.6 | Standard | July 2024 | - |\n\nSources: [content/community/security-policy.adoc:1-56](), [content/community/supported-versions.adoc:15-77]()\n\n## Development Standards and Quality Assurance\n\nThe SuiteCRM project enforces coding standards based on PSR-2 guidelines with additional project-specific requirements. All contributions must include proper documentation, follow naming conventions, and maintain compatibility with supported platforms.\n\n### Code Quality Requirements\n\n| Standard | Requirement | Example |\n|----------|-------------|---------|\n| Indentation | 4 spaces (PHP), 2 spaces (JavaScript) | `if (condition) {` |\n| Class Names | StudlyCaps | `class YoungInfant extends Person` |\n| Function Names | camelCase with descriptive verbs | `function printLoginStatus($user, $time)` |\n| Variables | camelCase, descriptive names | `$jobStrings`, `$disableRowLevelSecurity` |\n| Comments | PHPDoc format required | `/** @param string $variable */` |\n\n### File Structure Requirements\n\n- **License headers**: All core files must include the SuiteCRM license header\n- **Entry point validation**: PHP files must check `sugarEntry` constant\n- **JavaScript minification**: Provide both minified and source versions in `jssource/`\n- **CSS compilation**: SASS sources required for theme modifications\n\nSources: [content/community/contributing-code/Coding Standards.adoc:74-317]()\n\n## Version Support and Compatibility\n\nThe SuiteCRM project maintains multiple concurrent versions with different support lifecycles. Contributors must target the appropriate version branch based on the issu
