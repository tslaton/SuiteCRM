n    Email --\u003e SugarPHPMailer[\"SugarPHPMailer\"]\n    Email --\u003e Notes[\"Notes (Attachments)\"]\n    SugarEmailAddress --\u003e EmailAddresses[\"email_addresses table\"]\n    EmailMan --\u003e Campaigns[\"Campaigns\"]\n    EmailMan --\u003e EmailMarketing[\"EmailMarketing\"]\n    Email --\u003e EmailsText[\"emails_text table\"]\n    Email --\u003e EmailsBeanRel[\"emails_bean_rel table\"]\n    \n    subgraph \"UI Layer\"\n        UI\n        ComposeModal[\"EmailsComposeViewModal.js\"]\n        ListView[\"ListViewDataEmails\"]\n    end\n    \n    subgraph \"Business Logic\"\n        Controller\n        Email\n        EmailMan\n        SugarEmailAddress\n    end\n    \n    subgraph \"Data Layer\"\n        EmailAddresses\n        EmailsText\n        EmailsBeanRel\n        Notes\n    end\n```\n\n**Email System Architecture**\n\nSources: [modules/Emails/Email.php](), [modules/Emails/EmailsController.php](), [include/SugarEmailAddress/SugarEmailAddress.php](), [modules/EmailMan/EmailMan.php](), [modules/Emails/include/ComposeView/EmailsComposeView.js]()\n\n## Core Email Entity\n\nThe `Email` class serves as the primary entity for all email operations, extending the `Basic` template and providing comprehensive email functionality.\n\n### Email Class Structure\n\nThe `Email` class defines the core email entity with the following key properties:\n\n| Property | Type | Purpose |\n|----------|------|---------|\n| `from_addr` | string | Sender email address |\n| `reply_to_addr` | string | Reply-to email address |\n| `to_addrs`, `cc_addrs`, `bcc_addrs` | string | Recipient addresses |\n| `message_id` | string | Unique message identifier |\n| `type` | string | Email type (archived, draft, out, etc.) |\n| `status` | string | Email status (sent, draft, send_error, etc.) |\n| `description_html` | string | HTML email content |\n| `raw_source` | string | Raw email source |\n| `parent_id`, `parent_type` | string | Related record information |\n\n### Email Processing Methods\n\n```mermaid\ngraph LR\n    compose[\"email2Send()\"] --\u003e validate[\"isDraftEmail()\"]\n    validate --\u003e parse[\"email2ParseAddresses()\"]\n    parse --\u003e template[\"EmailTemplate::parse_template()\"]\n    template --\u003e mail[\"setMailer()\"]\n    mail --\u003e send[\"SugarPHPMailer::Send()\"]\n    send --\u003e save[\"save()\"]\n    save --\u003e attachments[\"handleMultipleFileAttachments()\"]\n```\n\n**Email Processing Flow**\n\nKey methods in the `Email` class include:\n\n- `email2Send()` - Main email sending method [modules/Emails/Email.php:911-1500]()\n- `email2ParseAddresses()` - Parses email addresses from UI input [modules/Emails/Email.php:685-725]()\n- `handleMultipleFileAttachments()` - Processes email attachments [modules/Emails/Email.php:3080-3150]()\n- `setMailer()` - Configures PHPMailer instance [modules/Emails/Email.php:2150-2300]()\n\nSources: [modules/Emails/Email.php:54-480](), [modules/Emails/vardefs.php:45-450]()\n\n## Email Controllers and Actions\n\nThe `EmailsController` manages email-related HTTP requests and coordinates between the UI and business logic layers.\n\n### Controller Actions\n\nThe controller provides several key actions for email management:\n\n| Action | Method | Purpose |\n|--------|--------|---------|\n| `ComposeView` | `action_ComposeView()` | Display email composition interface |\n| `send` | `action_send()` | Process email sending |\n| `SaveDraft` | `action_SaveDraft()` | Save email as draft |\n| `ReplyTo` | `action_ReplyTo()` | Handle email replies |\n| `Forward` | `action_Forward()` | Handle email forwarding |\n| `getFromFields` | `action_getFromFields()` | Get available sender addresses |\n\n### Email Composition Flow\n\n```mermaid\nsequenceDiagram\n    participant UI as \"ComposeView UI\"\n    participant Controller as \"EmailsController\"\n    participant Email as \"Email\"\n    participant Mailer as \"SugarPHPMailer\"\n    \n    UI-\u003e\u003eController: action_send()\n    Controller-\u003e\u003eEmail: populateBeanFromRequest()\n    Controller-\u003e\u003eEmail: replaceEmailVariables()\n    Controller-\u003e\u003eEmail: send()\n    Email-\u003e\u003eMailer: Send()\n    Mailer--\u003e\u003eEmail: Result\n    Email-\u003e\u003eEmail: save()\n    Email--\u003e\u003eController: Status\n    Controller--\u003e\u003eUI: Response\n```\n\n**Email Sending Sequence**\n\n### Request Validation and Processing\n\nThe controller implements comprehensive validation before processing email requests:\n\n- User permission validation [modules/Emails/EmailsController.php:274-317]()\n- Email variable replacement with template parsing [modules/Emails/EmailsController.php:330-372]()\n- Outbound email account validation [modules/Emails/EmailsController.php:254-273]()\n\nSources: [modules/Emails/EmailsController.php:53-450](), [modules/Emails/controller.php:41-45]()\n\n## Email Address Management\n\nThe `SugarEmailAddress` class provides centralized email address management, validation, and relationship handling throughout the system.\n\n### Email Address Entity Structure\n\n```mermaid\nerDiagram\n    EmailAddresses {\n        string id PK\n        string email_address\n        string email_address_caps\n        bool opt_out\n        bool invalid_email\n        string confirm_opt_in\n        datetime confirm_opt_in_date\n    }\n    \n    EmailAddrBeanRel {\n        string id PK\n        string email_address_id FK\n        string bean_id FK\n        string bean_module\n        bool primary_address\n        bool reply_to_address\n    }\n    \n    EmailAddresses ||--o{ EmailAddrBeanRel : \"has relationships\"\n```\n\n**Email Address Data Model**\n\n### Email Address Operations\n\nThe `SugarEmailAddress` class provides several key operations:\n\n- **Email Validation**: Using regex pattern validation [include/SugarEmailAddress/SugarEmailAddress.php:104]()\n- **Opt-in/Opt-out Management**: Handling email preferences and confirmations\n- **Bean Relationships**: Managing email address associations with CRM entities\n- **User Profile Management**: Special handling for user email addresses [include/SugarEmailAddress/SugarEmailAddress.php:279-408]()\n\n### Opt-in Status Management\n\nThe system supports comprehensive opt-in status tracking:\n\n| Status | Constant | Description |\n|--------|----------|-------------|\n| Opt-in | `COI_STAT_OPT_IN` | User has opted in |\n| Confirmed Opt-in | `COI_STAT_CONFIRMED_OPT_IN` | Email confirmed |\n| Disabled | `COI_STAT_DISABLED` | Opt-in disabled |\n\nSources: [include/SugarEmailAddress/SugarEmailAddress.php:49-550](), [modules/EmailAddresses/EmailAddress.php:1-120](), [metadata/email_addressesMetaData.php:1-350]()\n\n## Email Campaign Management (EmailMan)\n\nThe `EmailMan` class handles mass email campaigns, queue management, and email marketing operations.\n\n### EmailMan Entity Structure\n\nThe `EmailMan` class manages individual email campaign entries:\n\n| Property | Type | Purpose |\n|----------|------|---------|\n| `campaign_id` | string | Associated campaign |\n| `marketing_id` | string | Email marketing template |\n| `list_id` | string | Target list identifier |\n| `related_id`, `related_type` | string | Target record information |\n| `send_date_time` | datetime | Scheduled send time |\n| `send_attempts` | int | Number of send attempts |\n| `in_queue` | bool | Queue status |\n\n### Campaign Processing Flow\n\n```mermaid\ngraph TB\n    Campaign[\"Campaign\"] --\u003e EmailMarketing[\"EmailMarketing\"]\n    EmailMarketing --\u003e ProspectList[\"ProspectList\"]\n    ProspectList --\u003e EmailMan[\"EmailMan Records\"]\n    EmailMan --\u003e Queue[\"Email Queue\"]\n    Queue --\u003e Send[\"SendEmail Process\"]\n    Send --\u003e Log[\"CampaignLog\"]\n    \n    EmailMan --\u003e Templates[\"EmailTemplate\"]\n    Templates --\u003e Parse[\"Template Parsing\"]\n    Parse --\u003e Send\n```\n\n**Campaign Email Processing**\n\n### Queue Management\n\nThe EmailMan system provides sophisticated queue management:\n\n- **Queue Creation**: `create_queue_items_query()` [modules/EmailMan/EmailMan.php:279-347]()\n- **Batch Processing**: Handling large email volumes efficiently\n- **Retry Logic**: Managing failed send attempts\n- **Status Tracking**: Monitoring email delivery status\n\nSources: [modules/EmailMan/EmailMan.php:46-850]()\n\n## User Interface Components\n\nThe email system provides a rich JavaScript-based user interface for email composition and management.\n\n### Compose View Components\n\nThe email composition interface is built using several key JavaScript components:\n\n```mermaid\ngraph TB\n    Modal[\"EmailsComposeViewModal.js\"] --\u003e ComposeView[\"EmailsComposeView.js\"]\n    ComposeView --\u003e Validation[\"Form Validation\"]\n    ComposeView --\u003e Attachments[\"Attachment Handling\"]\n    ComposeView --\u003e Signatures[\"Signature Management\"]\n    ComposeView --\u003e AddressBook[\"Address Selection\"]\n    \n    ComposeView --\u003e TinyMCE[\"TinyMCE Editor\"]\n    ComposeView --\u003e Templates[\"Template Processing\"]\n    \n    subgraph \"UI Components\"\n        Modal\n        ComposeView\n        ListView[\"ListViewDataEmails\"]\n    end\n    \n    subgraph \"Features\"\n        Validation\n        Attachments\n        Signatures\n        AddressBook\n    end\n```\n\n**Email UI Component Architecture**\n\n### Key UI Features\n\nThe compose view provides comprehensive email composition features:\n\n- **Rich Text Editing**: TinyMCE integration for HTML email composition [modules/Emails/include/ComposeView/EmailsComposeView.js:515-535]()\n- **Address Validation**: Client-side email address validation [modules/Emails/include/ComposeView/EmailsComposeView.js:337-349]()\n- **Signature Management**: Automatic signature insertion and updates [modules/Emails/include/ComposeView/EmailsComposeView.js:352-428]()\n- **Attachment Handling**: File and document attachment support\n\n### Form Validation\n\nThe UI implements comprehensive validation:\n\n| Validation | Method | Purpose |\n|------------|--------|---------|\n| Email Addresses | `isValidEmailAddresses()` | Validates email format |\n| Subject | `isSubjectValid()` | Ensures subject is present |\n| Body | `isBodyValid()` | Validates email content |\n| Recipients | `isToValid()` | Validates recipient addresses |\n\nSources: [modules/Emails/include/ComposeView/EmailsComposeView.js:47-1000](), [jssource/src_files/include/javascript/EmailsComposeViewModal.js:40-220](), [modules/Emails/metadata/composeviewdefs.php:41-150]()\n\n## Email Storage and Relationships\n\nThe email system maintains complex relationships between emails and other CRM entities through a sophisticated data model.\n\n### Email Data Storage\n\n```mermaid\nerDiagram\n    Emails {\n        string id PK\n        string name\n        string type\n        string status\n        datetime date_sent_received\n        string parent_id\n        string parent_type\n        string assigned_user_id\n    }\n    \n    EmailsText {\n        string email_id PK FK\n        text from_addr\n        text to_addrs\n        text cc_addrs\n        text bcc_addrs\n        longtext description\n        longtext description_html\n        longtext raw_source\n    }\n    \n    EmailsBeanRel {\n        string id PK\n        string email_id FK\n        string bean_id FK\n        string bean_module\n    }\n    \n    Notes {\n        string id PK\n        string parent_id FK\n        string parent_type\n        string filename\n    }\n    \n    Emails ||--|| EmailsText : \"has content\"\n    Emails ||--o{ EmailsBeanRel : \"relates to beans\"\n    Emails ||--o{ Notes : \"has attachments\"\n```\n\n**Email Storage Data Model**\n\n### Relationship Management\n\nThe email system maintains relationships with various CRM entities:\n\n| Relationship | Table | Purpose |\n|--------------|-------|---------|\n| `emails_accounts_rel` | Accounts | Link emails to accounts |\n| `emails_contacts_rel` | Contacts | Link emails to contacts |\n| `emails_leads_rel` | Leads | Link emails to leads |\n| `emails_users_rel` | Users | Link emails to users |\n| `emails_cases_rel` | Cases | Link emails to cases |\n\n### Email Type Classifications\n\nThe system supports multiple email types defined in the language files:\n\n- **Outbound**: `out` - Sent emails\n- **Inbound**: `inbound` - Received emails  \n- **Draft**: `draft` - Unsent emails\n- **Archived**: `archived` - Imported emails\n- **Campaign**: `campaign` - Mass email campaigns\n\nSources: [modules/Emails/vardefs.php:45-800](), [include/language/en_us.lang.php:741-760](), [modules/Emails/language/en_us.lang.php:45-400]()\n\n## Email Processing Workflow\n\nThe complete email processing workflow integrates all system components from composition to delivery and storage.\n\n```mermaid\nflowchart TD\n    Start[\"User Initiates Email\"] --\u003e Compose[\"ComposeView UI\"]\n    Compose --\u003e Validate[\"Client Validation\"]\n    Validate --\u003e Submit[\"Submit to EmailsController\"]\n    \n    Submit --\u003e AuthCheck[\"Permission Check\"]\n    AuthCheck --\u003e PopulateBean[\"populateBeanFromRequest()\"]\n    PopulateBean --\u003e ProcessVars[\"replaceEmailVariables()\"]\n    \n    ProcessVars --\u003e CheckType{\"Draft or Send?\"}\n    CheckType --\u003e|Draft| SaveDraft[\"Save as Draft\"]\n    CheckType --\u003e|Send| PrepareEmail[\"Prepare for Sending\"]\n    \n    PrepareEmail --\u003e SetMailer[\"Configure SugarPHPMailer\"]\n    SetMailer --\u003e ParseAddresses[\"Parse Recipients\"]\n    ParseAddresses --\u003e AttachFiles[\"Handle Attachments\"]\n    AttachFiles --\u003e SendEmail[\"Send via SMTP\"]\n    \n    SendEmail --\u003e Success{\"Send Successful?\"}\n    Success --\u003e|Yes| UpdateStatus[\"Status: sent\"]\n    Success --\u003e|No| ErrorStatus[\"Status: send_error\"]\n    \n    UpdateStatus --\u003e SaveRecord[\"Save Email Record\"]\n    ErrorStatus --\u003e SaveRecord\n    SaveDraft --\u003e SaveRecord\n    \n    SaveRecord --\u003e CreateRelations[\"Create Bean Relationships\"]\n    CreateRelations --\u003e UpdateAddresses[\"Update Email Addresses\"]\n    UpdateAddresses --\u003e End[\"Complete\"]\n```\n\n**Complete Email Processing Workflow**\n\nThis workflow demonstrates the integration between UI components, controllers, business logic, and data persistence layers, showing how emails flow through the system from user interaction to final storage and relationship creation.\n\nSources: [modules/Emails/EmailsController.php:237-317](), [modules/Emails/Email.php:911-1500](), [include/SugarEmailAddress/SugarEmailAddress.php:220-450]()"])</script><script>self.__next_f.push([1,"20:T3b52,"])</script><script>self.__next_f.push([1,"# Campaign Management\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [include/generic/SugarWidgets/SugarWidgetSubPanelTopCreateCampaignMarketingEmailButton.php](include/generic/SugarWidgets/SugarWidgetSubPanelTopCreateCampaignMarketingEmailButton.php)\n- [jssource/src_files/modules/Campaigns/wizard.js](jssource/src_files/modules/Campaigns/wizard.js)\n- [modules/Campaigns/DotListWizardMenu.php](modules/Campaigns/DotListWizardMenu.php)\n- [modules/Campaigns/Subscriptions.html](modules/Campaigns/Subscriptions.html)\n- [modules/Campaigns/Subscriptions.php](modules/Campaigns/Subscriptions.php)\n- [modules/Campaigns/Subscriptions.tpl](modules/Campaigns/Subscriptions.tpl)\n- [modules/Campaigns/WizardEmailSetup.html](modules/Campaigns/WizardEmailSetup.html)\n- [modules/Campaigns/WizardHome.html](modules/Campaigns/WizardHome.html)\n- [modules/Campaigns/WizardHome.php](modules/Campaigns/WizardHome.php)\n- [modules/Campaigns/WizardMarketing.html](modules/Campaigns/WizardMarketing.html)\n- [modules/Campaigns/WizardMarketing.php](modules/Campaigns/WizardMarketing.php)\n- [modules/Campaigns/WizardNewsletter.html](modules/Campaigns/WizardNewsletter.html)\n- [modules/Campaigns/WizardNewsletter.php](modules/Campaigns/WizardNewsletter.php)\n- [modules/Campaigns/language/en_us.lang.php](modules/Campaigns/language/en_us.lang.php)\n- [modules/Campaigns/metadata/listviewdefs.php](modules/Campaigns/metadata/listviewdefs.php)\n- [modules/Campaigns/metadata/subpaneldefs.php](modules/Campaigns/metadata/subpaneldefs.php)\n- [modules/Campaigns/tpls/WizardCampaignBudget.tpl](modules/Campaigns/tpls/WizardCampaignBudget.tpl)\n- [modules/Campaigns/tpls/WizardCampaignHeader.tpl](modules/Campaigns/tpls/WizardCampaignHeader.tpl)\n- [modules/Campaigns/tpls/WizardCampaignTargetList.tpl](modules/Campaigns/tpls/WizardCampaignTargetList.tpl)\n- [modules/Campaigns/tpls/WizardCampaignTargetListForNonNewsLetter.tpl](modules/Campaigns/tpls/WizardCampaignTargetListForNonNewsLetter.tpl)\n- [modules/Campaigns/tpls/WizardCampaignTracker.tpl](modules/Campaigns/tpls/WizardCampaignTracker.tpl)\n- [modules/Campaigns/tpls/WizardHomeStart.tpl](modules/Campaigns/tpls/WizardHomeStart.tpl)\n- [modules/Campaigns/tpls/WizardNewsletter.tpl](modules/Campaigns/tpls/WizardNewsletter.tpl)\n- [modules/Campaigns/tpls/progressStepsStyle.html](modules/Campaigns/tpls/progressStepsStyle.html)\n- [modules/Campaigns/wizard.js](modules/Campaigns/wizard.js)\n- [modules/EmailMan/EmailManDelivery.php](modules/EmailMan/EmailManDelivery.php)\n- [modules/EmailMarketing/List.php](modules/EmailMarketing/List.php)\n- [modules/EmailTemplates/EmailTemplate.css](modules/EmailTemplates/EmailTemplate.css)\n- [modules/EmailTemplates/EmailTemplateData.php](modules/EmailTemplates/EmailTemplateData.php)\n- [modules/EmailTemplates/EmailTemplateFormBase.php](modules/EmailTemplates/EmailTemplateFormBase.php)\n\n\u003c/details\u003e\n\n\n\nThis document covers the Campaign Management system in SuiteCRM, which provides comprehensive tools for creating, managing, and executing marketing campaigns. The system includes a multi-step wizard interface, email template management, target list handling, and email delivery capabilities.\n\nFor information about the underlying email system infrastructure, see [Email System](#4.2). For user management and authentication details, see [User Management](#4.1).\n\n## System Architecture Overview\n\nThe Campaign Management system is built around a wizard-based interface that guides users through campaign creation. The system supports multiple campaign types including newsletters, email campaigns, and surveys, with integrated email template management and target list handling.\n\n```mermaid\ngraph TB\n    CampaignWizard[\"Campaign Wizard\"]\n    EmailTemplates[\"Email Templates\"]\n    TargetLists[\"Target Lists\"]\n    EmailDelivery[\"Email Delivery\"]\n    CampaignTrackers[\"Campaign Trackers\"]\n    \n    CampaignWizard --\u003e EmailTemplates\n    CampaignWizard --\u003e TargetLists\n    CampaignWizard --\u003e EmailDelivery\n    CampaignWizard --\u003e CampaignTrackers\n    \n    EmailTemplates --\u003e EmailDelivery\n    TargetLists --\u003e EmailDelivery\n    \n    subgraph \"Campaign Types\"\n        Newsletter[\"Newsletter\"]\n        EmailCampaign[\"Email Campaign\"]\n        Survey[\"Survey\"]\n        Telesales[\"Telesales\"]\n    end\n    \n    CampaignWizard --\u003e Newsletter\n    CampaignWizard --\u003e EmailCampaign\n    CampaignWizard --\u003e Survey\n    CampaignWizard --\u003e Telesales\n```\n\n**Sources:** [modules/Campaigns/WizardMarketing.php:1-600](), [modules/Campaigns/WizardNewsletter.php:1-600](), [modules/Campaigns/language/en_us.lang.php:45-470]()\n\n## Campaign Wizard System\n\nThe campaign wizard provides a multi-step interface for campaign creation, implemented through several key components:\n\n### Wizard Navigation and Flow\n\nThe wizard uses a step-based navigation system controlled by JavaScript functions and PHP backend processing:\n\n```mermaid\ngraph LR\n    Step1[\"Step 1: Campaign Header\"]\n    Step2[\"Step 2: Target Lists\"]\n    Step3[\"Step 3: Email Templates\"] \n    Step4[\"Step 4: Marketing Setup\"]\n    Step5[\"Step 5: Summary\"]\n    \n    Step1 --\u003e Step2\n    Step2 --\u003e Step3\n    Step3 --\u003e Step4\n    Step4 --\u003e Step5\n    \n    Step1 -.-\u003e WizardNewsletter[\"WizardNewsletter.php\"]\n    Step3 -.-\u003e WizardMarketing[\"WizardMarketing.php\"]\n    Step5 -.-\u003e WizardHome[\"WizardHome.php\"]\n    \n    subgraph \"JavaScript Navigation\"\n        navigate[\"navigate()\"]\n        showfirst[\"showfirst()\"]\n        validate_wiz[\"validate_wiz()\"]\n    end\n    \n    Step1 --\u003e navigate\n    Step2 --\u003e navigate\n    Step3 --\u003e navigate\n    Step4 --\u003e navigate\n```\n\n### Core Wizard Classes and Functions\n\n| Component | File | Key Functions |\n|-----------|------|---------------|\n| `DotListWizardMenu` | [modules/Campaigns/DotListWizardMenu.php]() | `getWizardMenuHTML()`, `getWizardMenuItemHTML()` |\n| `navigate()` | [modules/Campaigns/wizard.js:134-248]() | Step navigation logic |\n| `validate_wiz()` | [modules/Campaigns/wizard.js:365-402]() | Form validation |\n| `campaignCreateAndRefreshPage()` | [modules/Campaigns/wizard.js:251-279]() | Campaign creation |\n\n**Sources:** [modules/Campaigns/wizard.js:1-500](), [modules/Campaigns/DotListWizardMenu.php:1-58](), [modules/Campaigns/WizardMarketing.html:45-500]()\n\n## Email Template Management\n\nThe system provides comprehensive email template management through the `EmailTemplateData.php` entry point and related classes:\n\n### Template Operations\n\n```mermaid\ngraph TB\n    EmailTemplateData[\"EmailTemplateData.php\"]\n    EmailTemplateFormBase[\"EmailTemplateFormBase\"]\n    EmailTemplate[\"EmailTemplate Bean\"]\n    \n    EmailTemplateData --\u003e |\"get\"| EmailTemplate\n    EmailTemplateData --\u003e |\"update\"| EmailTemplate\n    EmailTemplateData --\u003e |\"createCopy\"| EmailTemplate\n    EmailTemplateData --\u003e |\"uploadAttachments\"| EmailTemplateFormBase\n    \n    EmailTemplateFormBase --\u003e |\"handleAttachmentsProcessImages()\"| EmailTemplate\n    \n    subgraph \"Template Functions\"\n        onEmailTemplateChange[\"onEmailTemplateChange()\"]\n        showEmailTemplateAttachments[\"showEmailTemplateAttachments()\"]\n    end\n    \n    EmailTemplateData --\u003e onEmailTemplateChange\n    EmailTemplateData --\u003e showEmailTemplateAttachments\n    \n    subgraph \"Campaign Integration\"\n        MarketingWizard[\"WizardMarketing\"]\n        SessionData[\"$_SESSION campaignWizard\"]\n    end\n    \n    EmailTemplateData --\u003e MarketingWizard\n    EmailTemplateData --\u003e SessionData\n```\n\n### Template Data Handling\n\nThe template system supports various operations through the `EmailTemplateData.php` entry point:\n\n| Operation | Function | Description |\n|-----------|----------|-------------|\n| `get` | Default operation | Retrieves template data including attachments |\n| `update` | Template modification | Updates existing template with new content |\n| `createCopy` | Template duplication | Creates a copy of existing template |\n| `uploadAttachments` | File handling | Manages template attachments |\n\n**Sources:** [modules/EmailTemplates/EmailTemplateData.php:1-158](), [modules/EmailTemplates/EmailTemplateFormBase.php:1-600](), [modules/Campaigns/wizard.js:416-500]()\n\n## Target List Management\n\nTarget lists are managed through the campaign wizard interface with support for different list types:\n\n### Target List Types and Structure\n\n```mermaid\ngraph TB\n    ProspectLists[\"ProspectLists Bean\"]\n    \n    subgraph \"List Types\"\n        DefaultList[\"default - Primary targets\"]\n        TestList[\"test - Test recipients\"]  \n        ExemptList[\"exempt - Suppression list\"]\n        SeedList[\"seed - Seed addresses\"]\n        ExemptDomain[\"exempt_domain - Domain suppression\"]\n        ExemptAddress[\"exempt_address - Email suppression\"]\n    end\n    \n    ProspectLists --\u003e DefaultList\n    ProspectLists --\u003e TestList\n    ProspectLists --\u003e ExemptList\n    ProspectLists --\u003e SeedList\n    ProspectLists --\u003e ExemptDomain\n    ProspectLists --\u003e ExemptAddress\n    \n    subgraph \"Campaign Integration\"\n        CampaignTargetList[\"WizardCampaignTargetListForNonNewsLetter.tpl\"]\n        TargetManagement[\"add_target() function\"]\n        PopupSelection[\"Target List Popup\"]\n    end\n    \n    ProspectLists --\u003e CampaignTargetList\n    CampaignTargetList --\u003e TargetManagement\n    CampaignTargetList --\u003e PopupSelection\n```\n\n### Target List JavaScript Functions\n\nThe target list management includes several JavaScript functions for dynamic list handling:\n\n| Function | Location | Purpose |\n|----------|----------|---------|\n| `add_target()` | [modules/Campaigns/tpls/WizardCampaignTargetListForNonNewsLetter.tpl:222-280]() | Adds target lists to campaign |\n| `addTargetListData()` | [modules/Campaigns/wizard.js:475-483]() | Handles target list selection |\n| `set_return_prospect_list()` | Referenced in templates | Popup callback for list selection |\n\n**Sources:** [modules/Campaigns/tpls/WizardCampaignTargetListForNonNewsLetter.tpl:1-400](), [modules/Campaigns/WizardNewsletter.php:420-470](), [modules/Campaigns/wizard.js:475-500]()\n\n## Email Marketing and Delivery\n\nThe email delivery system is handled through the `EmailManDelivery.php` system with integration to campaign marketing records:\n\n### Email Delivery Architecture\n\n```mermaid\ngraph TB\n    EmailManDelivery[\"EmailManDelivery.php\"]\n    EmailMan[\"EmailMan Bean\"]\n    SugarPHPMailer[\"SugarPHPMailer\"]\n    OutboundEmailAccounts[\"OutboundEmailAccounts\"]\n    \n    EmailManDelivery --\u003e EmailMan\n    EmailManDelivery --\u003e SugarPHPMailer\n    EmailManDelivery --\u003e OutboundEmailAccounts\n    \n    subgraph \"Campaign Components\"\n        EmailMarketing[\"EmailMarketing Bean\"]\n        Campaign[\"Campaign Bean\"] \n        EmailTemplate[\"EmailTemplate Bean\"]\n        ProspectLists[\"ProspectLists Bean\"]\n    end\n    \n    EmailManDelivery --\u003e EmailMarketing\n    EmailMarketing --\u003e Campaign\n    EmailMarketing --\u003e EmailTemplate\n    Campaign --\u003e ProspectLists\n    \n    subgraph \"Delivery Process\"\n        QueueProcessing[\"Queue Processing\"]\n        SuppressionLists[\"Suppression Lists\"]\n        BounceHandling[\"Bounce Handling\"]\n        TestMode[\"Test Mode\"]\n    end\n    \n    EmailManDelivery --\u003e QueueProcessing\n    EmailManDelivery --\u003e SuppressionLists\n    EmailManDelivery --\u003e BounceHandling\n    EmailManDelivery --\u003e TestMode\n```\n\n### Email Delivery Flow\n\nThe delivery system processes emails through several stages:\n\n1. **Queue Selection**: Based on `send_date_time` and campaign criteria\n2. **Validation**: Verifies campaign, marketing, and template records\n3. **Suppression Processing**: Checks exempt lists and domains\n4. **SMTP Configuration**: Uses campaign-specific or system SMTP settings\n5. **Delivery Execution**: Sends emails with tracking and bounce handling\n\n**Sources:** [modules/EmailMan/EmailManDelivery.php:1-300](), [modules/Campaigns/WizardMarketing.php:220-290]()\n\n## Campaign Types and Wizard Variations\n\nThe system supports multiple campaign types with different wizard flows:\n\n### Campaign Type Configuration\n\n```mermaid\ngraph TB\n    CampaignTypes[\"Campaign Types\"]\n    \n    subgraph \"Email-Based Campaigns\"\n        Newsletter[\"Newsletter\"]\n        EmailCampaign[\"Email Campaign\"]\n        Survey[\"Survey\"]\n    end\n    \n    subgraph \"Non-Email Campaigns\"\n        Telesales[\"Telesales\"]\n        General[\"General\"]\n    end\n    \n    CampaignTypes --\u003e Newsletter\n    CampaignTypes --\u003e EmailCampaign\n    CampaignTypes --\u003e Survey\n    CampaignTypes --\u003e Telesales\n    CampaignTypes --\u003e General\n    \n    subgraph \"Wizard Steps\"\n        NewsletterSteps[\"Header → Budget → Subscriptions → Summary\"]\n        EmailSteps[\"Header → Budget → Target Lists → Templates → Marketing → Summary\"]\n        TelesalesSteps[\"Header → Budget → Target Lists → Summary\"]\n    end\n    \n    Newsletter --\u003e NewsletterSteps\n    EmailCampaign --\u003e EmailSteps\n    Survey --\u003e EmailSteps\n    Telesales --\u003e TelesalesSteps\n```\n\n### Type-Specific Functionality\n\n| Campaign Type | Key Features | Special Templates |\n|---------------|--------------|------------------|\n| Newsletter | Subscription management | [modules/Campaigns/tpls/WizardCampaignTargetList.tpl]() |\n| Email | Multiple target lists | [modules/Campaigns/tpls/WizardCampaignTargetListForNonNewsLetter.tpl]() |\n| Survey | Survey integration | Survey selection in header |\n| Telesales | No email components | Simplified wizard flow |\n\n**Sources:** [modules/Campaigns/WizardNewsletter.php:122-135](), [modules/Campaigns/language/en_us.lang.php:453-456](), [modules/Campaigns/tpls/WizardCampaignHeader.tpl:74-85]()\n\n## Key Classes and Components\n\n### Core Campaign Classes\n\n| Class/Component | File | Primary Purpose |\n|-----------------|------|-----------------|\n| `Campaign` | Bean class | Core campaign entity |\n| `EmailMarketing` | Bean class | Marketing message configuration |\n| `EmailTemplate` | Bean class | Email template management |\n| `ProspectLists` | Bean class | Target list management |\n| `CampaignTrackers` | Bean class | URL tracking management |\n| `EmailMan` | Bean class | Email queue management |\n\n### Wizard Controllers and Actions\n\n| Controller | File | Actions |\n|------------|------|---------|\n| `WizardNewsletter` | [modules/Campaigns/WizardNewsletter.php]() | Campaign header, budget, target lists |\n| `WizardMarketing` | [modules/Campaigns/WizardMarketing.php]() | Email templates, marketing setup |\n| `WizardHome` | [modules/Campaigns/WizardHome.php]() | Campaign summary and management |\n| `EmailTemplateData` | [modules/EmailTemplates/EmailTemplateData.php]() | Template CRUD operations |\n\n### JavaScript Navigation System\n\nThe wizard navigation is controlled by JavaScript functions that manage step transitions, validation, and form submission:\n\n| Function | Purpose | Key Logic |\n|----------|---------|-----------|\n| `navigate()` | Step navigation | Validates current step, updates UI |\n| `showfirst()` | Initial wizard setup | Shows first step, configures buttons |\n| `validate_wiz()` | Step validation | Calls custom validation functions |\n| `onEmailTemplateChange()` | Template selection | Loads template data via AJAX |\n\n**Sources:** [modules/Campaigns/wizard.js:1-500](), [modules/Campaigns/WizardMarketing.php:1-600](), [modules/Campaigns/WizardNewsletter.php:1-600](), [modules/Campaigns/WizardHome.php:1-400]()"])</script><script>self.__next_f.push([1,"21:T367c,"])</script><script>self.__next_f.push([1,"# Reports and Analytics\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [include/SuiteGraphs/RGraphIncludes.php](include/SuiteGraphs/RGraphIncludes.php)\n- [modules/AOR_Charts/AOR_Chart.php](modules/AOR_Charts/AOR_Chart.php)\n- [modules/AOR_Reports/AOR_Report.js](modules/AOR_Reports/AOR_Report.js)\n- [modules/AOR_Reports/AOR_Report.php](modules/AOR_Reports/AOR_Report.php)\n- [modules/AOR_Reports/Dashlets/AORReportsDashlet/AORReportsDashlet.js](modules/AOR_Reports/Dashlets/AORReportsDashlet/AORReportsDashlet.js)\n- [modules/AOR_Reports/Dashlets/AORReportsDashlet/AORReportsDashlet.php](modules/AOR_Reports/Dashlets/AORReportsDashlet/AORReportsDashlet.php)\n- [modules/AOR_Reports/Dashlets/AORReportsDashlet/dashlet.tpl](modules/AOR_Reports/Dashlets/AORReportsDashlet/dashlet.tpl)\n- [modules/AOR_Reports/Dashlets/AORReportsDashlet/dashletConfigure.tpl](modules/AOR_Reports/Dashlets/AORReportsDashlet/dashletConfigure.tpl)\n- [modules/AOR_Reports/Menu.php](modules/AOR_Reports/Menu.php)\n- [modules/AOR_Reports/aor_utils.php](modules/AOR_Reports/aor_utils.php)\n- [modules/AOR_Reports/controller.php](modules/AOR_Reports/controller.php)\n- [modules/AOR_Reports/language/en_us.lang.php](modules/AOR_Reports/language/en_us.lang.php)\n- [modules/AOR_Reports/metadata/detailviewdefs.php](modules/AOR_Reports/metadata/detailviewdefs.php)\n- [modules/AOR_Reports/tpls/report.tpl](modules/AOR_Reports/tpls/report.tpl)\n- [modules/AOR_Reports/vardefs.php](modules/AOR_Reports/vardefs.php)\n- [modules/AOR_Reports/views/view.detail.php](modules/AOR_Reports/views/view.detail.php)\n- [modules/AOW_WorkFlow/aow_utils.php](modules/AOW_WorkFlow/aow_utils.php)\n\n\u003c/details\u003e\n\n\n\nThis document covers the Advanced OpenReports (AOR) system in SuiteCRM, which provides comprehensive reporting and data visualization capabilities. The system allows users to create custom reports from any module data, apply filtering conditions, generate various chart types, and export results in multiple formats.\n\nFor general search functionality, see page [5.3](#5.3). For campaign management and email analytics, see page [4.3](#4.3).\n\n## System Architecture\n\nThe Reports and Analytics system is built around several core modules that work together to provide end-to-end reporting functionality.\n\n```mermaid\ngraph TB\n    subgraph \"User Interface Layer\"\n        UI[\"AOR_ReportsViewDetail\"]\n        CTL[\"AOR_ReportsController\"] \n        TPL[\"report.tpl\"]\n        DASH[\"AORReportsDashlet\"]\n    end\n    \n    subgraph \"Core Business Logic\"\n        REP[\"AOR_Report\"]\n        CHART[\"AOR_Chart\"]\n        FIELD[\"AOR_Fields\"]\n        COND[\"AOR_Conditions\"]\n    end\n    \n    subgraph \"Rendering Engines\"\n        PCHART[\"pChart Library\"]\n        RGRAPH[\"RGraph Library\"]\n        CHARTJS[\"Chart.js Library\"]\n    end\n    \n    subgraph \"Export Systems\"\n        CSV[\"CSV Export\"]\n        PDF[\"PDF Export\"]\n        PROS[\"Prospect List Integration\"]\n    end\n    \n    subgraph \"Utility Layer\"\n        UTILS[\"aor_utils.php\"]\n        AOWUTILS[\"aow_utils.php\"]\n    end\n    \n    UI --\u003e CTL\n    CTL --\u003e REP\n    REP --\u003e FIELD\n    REP --\u003e COND\n    REP --\u003e CHART\n    \n    CHART --\u003e PCHART\n    CHART --\u003e RGRAPH\n    CHART --\u003e CHARTJS\n    \n    REP --\u003e CSV\n    REP --\u003e PDF\n    REP --\u003e PROS\n    \n    REP --\u003e UTILS\n    CTL --\u003e AOWUTILS\n    \n    DASH --\u003e REP\n    DASH --\u003e CHART\n```\n\n**System Architecture Overview**\n\nSources: [modules/AOR_Reports/AOR_Report.php:1-80](), [modules/AOR_Reports/controller.php:1-50](), [modules/AOR_Charts/AOR_Chart.php:1-60]()\n\n## Core Entities\n\n### AOR_Report Class\n\nThe `AOR_Report` class serves as the primary entity for report definitions and execution.\n\n```mermaid\nclassDiagram\n    class AOR_Report {\n        +string report_module\n        +int graphs_per_row\n        +array user_parameters\n        +save()\n        +build_report_html()\n        +build_group_report()\n        +build_report_chart()\n        +build_report_csv()\n        +getReportFields()\n        +ACLAccess()\n    }\n    \n    class AOR_Chart {\n        +string type\n        +string x_field\n        +string y_field\n        +string name\n        +buildChartHTML()\n        +buildChartImage()\n        +save_lines()\n    }\n    \n    class AOR_Fields {\n        +string field\n        +string label\n        +string field_function\n        +boolean display\n        +boolean group_display\n        +int field_order\n    }\n    \n    class AOR_Conditions {\n        +string field\n        +string operator\n        +string value_type\n        +string value\n        +boolean parameter\n        +int condition_order\n    }\n    \n    AOR_Report ||--o{ AOR_Fields : \"has many\"\n    AOR_Report ||--o{ AOR_Conditions : \"has many\"\n    AOR_Report ||--o{ AOR_Chart : \"has many\"\n```\n\n**Core Entity Relationships**\n\nSources: [modules/AOR_Reports/AOR_Report.php:48-80](), [modules/AOR_Charts/AOR_Chart.php:26-65](), [modules/AOR_Reports/vardefs.php:122-150]()\n\n## Report Generation Process\n\nThe report generation system follows a multi-stage process to transform database queries into formatted output.\n\n```mermaid\nflowchart TD\n    START[\"User Request\"] --\u003e PARAM[\"requestToUserParameters()\"]\n    PARAM --\u003e QUERY[\"build_report_query()\"]\n    QUERY --\u003e GROUP{\"Grouped Report?\"}\n    \n    GROUP --\u003e|Yes| MULTIGROUP[\"buildMultiGroupReport()\"]\n    GROUP --\u003e|No| HTML[\"build_report_html()\"]\n    \n    MULTIGROUP --\u003e GROUPHTML[\"build_group_report()\"]\n    GROUPHTML --\u003e HTML\n    \n    HTML --\u003e PAGINATION[\"Pagination Logic\"]\n    PAGINATION --\u003e TOTALS[\"getTotalHTML()\"]\n    TOTALS --\u003e RENDER[\"HTML Rendering\"]\n    \n    RENDER --\u003e CHARTS[\"build_report_chart()\"]\n    CHARTS --\u003e CHARTTYPE{\"Chart Type\"}\n    \n    CHARTTYPE --\u003e|PCHART| PIMG[\"buildChartImage()\"]\n    CHARTTYPE --\u003e|RGRAPH| RGRAPHHTML[\"buildChartHTMLRGraph()\"]\n    CHARTTYPE --\u003e|CHARTJS| CHARTJSHTML[\"buildChartHTMLChartJS()\"]\n    \n    PIMG --\u003e OUTPUT[\"Final Output\"]\n    RGRAPHHTML --\u003e OUTPUT\n    CHARTJSHTML --\u003e OUTPUT\n```\n\n**Report Generation Flow**\n\nThe core report generation process begins with parameter processing through `requestToUserParameters()` [modules/AOR_Reports/aor_utils.php:96-173](), followed by query building and HTML rendering via `build_report_html()` [modules/AOR_Reports/AOR_Report.php:624-875]().\n\nSources: [modules/AOR_Reports/AOR_Report.php:302-361](), [modules/AOR_Reports/aor_utils.php:96-173](), [modules/AOR_Reports/views/view.detail.php:75-85]()\n\n## Chart System\n\nThe system supports multiple chart rendering engines and various visualization types.\n\n### Chart Types and Rendering\n\n```mermaid\ngraph LR\n    subgraph \"Chart Configuration\"\n        TYPE[\"Chart Type\"]\n        XFIELD[\"X-Axis Field\"]\n        YFIELD[\"Y-Axis Field\"]\n        TITLE[\"Chart Title\"]\n    end\n    \n    subgraph \"Supported Types\"\n        BAR[\"bar\"]\n        LINE[\"line\"] \n        PIE[\"pie\"]\n        RADAR[\"radar\"]\n        ROSE[\"rose\"]\n        GROUPED[\"grouped_bar\"]\n        STACKED[\"stacked_bar\"]\n    end\n    \n    subgraph \"Rendering Engines\"\n        PCHART_ENG[\"pChart Engine\"]\n        RGRAPH_ENG[\"RGraph Engine\"]\n        CHARTJS_ENG[\"Chart.js Engine\"]\n    end\n    \n    TYPE --\u003e BAR\n    TYPE --\u003e LINE\n    TYPE --\u003e PIE\n    TYPE --\u003e RADAR\n    TYPE --\u003e ROSE\n    TYPE --\u003e GROUPED\n    TYPE --\u003e STACKED\n    \n    BAR --\u003e PCHART_ENG\n    BAR --\u003e RGRAPH_ENG\n    BAR --\u003e CHARTJS_ENG\n    \n    LINE --\u003e PCHART_ENG\n    LINE --\u003e RGRAPH_ENG\n    \n    PIE --\u003e PCHART_ENG\n    PIE --\u003e RGRAPH_ENG\n    \n    RADAR --\u003e RGRAPH_ENG\n    ROSE --\u003e RGRAPH_ENG\n    GROUPED --\u003e RGRAPH_ENG\n    STACKED --\u003e RGRAPH_ENG\n```\n\n**Chart Type Support Matrix**\n\nChart rendering is handled by the `buildChartHTML()` method [modules/AOR_Charts/AOR_Chart.php:232-243]() which delegates to specific engines based on the `chartType` parameter.\n\nSources: [modules/AOR_Charts/AOR_Chart.php:93-96](), [modules/AOR_Charts/AOR_Chart.php:181-184](), [modules/AOR_Charts/AOR_Chart.php:266-351]()\n\n## Export Functionality\n\n### Export Actions and Controllers\n\n```mermaid\nflowchart TD\n    USER[\"User Export Request\"] --\u003e ACTION{\"Export Type\"}\n    \n    ACTION --\u003e|CSV| CSV_ACT[\"action_export()\"]\n    ACTION --\u003e|PDF| PDF_ACT[\"action_downloadPDF()\"]\n    ACTION --\u003e|Prospect List| PROS_ACT[\"action_addToProspectList()\"]\n    \n    CSV_ACT --\u003e CSV_CHECK[\"ACL Check\"]\n    PDF_ACT --\u003e PDF_CHECK[\"ACL Check\"]\n    PROS_ACT --\u003e PROS_CHECK[\"ACL Check\"]\n    \n    CSV_CHECK --\u003e CSV_PARAMS[\"requestToUserParameters()\"]\n    PDF_CHECK --\u003e PDF_PARAMS[\"requestToUserParameters()\"]\n    PROS_CHECK --\u003e PROS_QUERY[\"build_report_query()\"]\n    \n    CSV_PARAMS --\u003e CSV_BUILD[\"build_report_csv()\"]\n    PDF_PARAMS --\u003e PDF_BUILD[\"build_group_report()\"]\n    PROS_QUERY --\u003e PROS_REL[\"Relationship Processing\"]\n    \n    CSV_BUILD --\u003e CSV_OUT[\"CSV Download\"]\n    PDF_BUILD --\u003e PDF_WRAP[\"PDFWrapper\"]\n    PROS_REL --\u003e PROS_OUT[\"Target List Update\"]\n    \n    PDF_WRAP --\u003e PDF_OUT[\"PDF Download\"]\n```\n\n**Export Process Flow**\n\nThe export system provides three main output formats controlled by dedicated controller actions. CSV export uses `build_report_csv()` while PDF export leverages the `PDFWrapper` class for document generation.\n\nSources: [modules/AOR_Reports/controller.php:175-186](), [modules/AOR_Reports/controller.php:192-272](), [modules/AOR_Reports/controller.php:133-166]()\n\n## Dashboard Integration\n\n### AORReportsDashlet Architecture\n\nThe dashlet system allows reports to be embedded in user dashboards with configurable parameters and chart display options.\n\n```mermaid\ngraph TB\n    subgraph \"Dashlet Configuration\"\n        CONFIG[\"dashletConfigure.tpl\"]\n        PARAMS[\"Parameter Configuration\"]\n        CHARTS[\"Chart Selection\"]\n        ONLYCHARTS[\"Charts Only Mode\"]\n    end\n    \n    subgraph \"Dashlet Runtime\"\n        DASHLET[\"AORReportsDashlet\"]\n        DISPLAY[\"display()\"]\n        CHARTHTML[\"getChartHTML()\"]\n        SAVE[\"saveOptions()\"]\n    end\n    \n    subgraph \"Report Integration\"\n        REPORT[\"AOR_Report Instance\"]\n        USERPARAMS[\"user_parameters\"]\n        CHARTBUILD[\"build_report_chart()\"]\n    end\n    \n    CONFIG --\u003e DASHLET\n    PARAMS --\u003e USERPARAMS\n    CHARTS --\u003e CHARTHTML\n    \n    DASHLET --\u003e DISPLAY\n    DISPLAY --\u003e CHARTHTML\n    CHARTHTML --\u003e REPORT\n    \n    REPORT --\u003e USERPARAMS\n    REPORT --\u003e CHARTBUILD\n    \n    ONLYCHARTS --\u003e DISPLAY\n```\n\n**Dashlet Integration Architecture**\n\nThe `AORReportsDashlet` class [modules/AOR_Reports/Dashlets/AORReportsDashlet/AORReportsDashlet.php:11-169]() manages report embedding with configurable parameters and chart filtering capabilities.\n\nSources: [modules/AOR_Reports/Dashlets/AORReportsDashlet/AORReportsDashlet.php:18-50](), [modules/AOR_Reports/Dashlets/AORReportsDashlet/AORReportsDashlet.php:73-81](), [modules/AOR_Reports/Dashlets/AORReportsDashlet/dashletConfigure.tpl:1-200]()\n\n## User Interface Components\n\n### Report Display Template System\n\n| Component | Template File | JavaScript Controller | Purpose |\n|-----------|---------------|----------------------|---------|\n| Main Report View | `report.tpl` | `AOR_Report.js` | Primary report display |\n| Parameter Panel | Embedded in `report.tpl` | `conditionLines.js` | Dynamic filtering |\n| Pagination | Generated in `build_report_html()` | `changeReportPage()` | Result navigation |\n| Chart Container | Dynamic HTML | RGraph/Chart.js | Visualization display |\n\nThe main report interface uses `report.tpl` [modules/AOR_Reports/tpls/report.tpl:1-117]() which integrates parameter controls, chart rendering areas, and tabular data display.\n\n### JavaScript Integration\n\n```mermaid\ngraph LR\n    subgraph \"Client-Side Scripts\"\n        MAIN[\"AOR_Report.js\"]\n        COND[\"conditionLines.js\"] \n        DASHLET[\"AORReportsDashlet.js\"]\n        RGRAPH[\"RGraphIncludes.php\"]\n    end\n    \n    subgraph \"Key Functions\"\n        PARAMS[\"addParametersToForm()\"]\n        PAGE[\"changeReportPage()\"]\n        PDF[\"PDF Export Handler\"]\n        CSV[\"CSV Export Handler\"]\n    end\n    \n    subgraph \"Chart Libraries\"\n        RGRAPHLIB[\"RGraph Libraries\"]\n        CHARTJSLIB[\"Chart.js Library\"]\n        PCHARTLIB[\"pChart (Server-side)\"]\n    end\n    \n    MAIN --\u003e PARAMS\n    MAIN --\u003e PAGE\n    MAIN --\u003e PDF\n    MAIN --\u003e CSV\n    \n    COND --\u003e PARAMS\n    DASHLET --\u003e PAGE\n    \n    RGRAPH --\u003e RGRAPHLIB\n    MAIN --\u003e CHARTJSLIB\n```\n\n**JavaScript Architecture**\n\nThe client-side functionality centers around parameter management through `addParametersToForm()` [modules/AOR_Reports/AOR_Report.js:117-128]() and dynamic report updates via `changeReportPage()` [modules/AOR_Reports/AOR_Report.js:164-200]().\n\nSources: [modules/AOR_Reports/AOR_Report.js:24-53](), [modules/AOR_Reports/tpls/report.tpl:69-96](), [include/SuiteGraphs/RGraphIncludes.php:1-181]()\n\n## Data Processing Pipeline\n\n### Field and Condition Processing\n\nThe system processes report definitions through a sophisticated pipeline that handles field selection, condition evaluation, and data aggregation.\n\n```mermaid\nflowchart TD\n    MODULE[\"Module Selection\"] --\u003e FIELDS[\"Field Configuration\"]\n    FIELDS --\u003e FIELDPATH[\"Module Path Resolution\"]\n    FIELDPATH --\u003e CONDITIONS[\"Condition Setup\"]\n    \n    CONDITIONS --\u003e CONDEVAL[\"Condition Evaluation\"]\n    CONDEVAL --\u003e PARAMS[\"Parameter Substitution\"]\n    PARAMS --\u003e QUERY[\"SQL Query Building\"]\n    \n    QUERY --\u003e JOINS[\"Relationship Joins\"]\n    JOINS --\u003e WHERE[\"WHERE Clause Assembly\"]\n    WHERE --\u003e GROUPBY[\"GROUP BY Processing\"]\n    GROUPBY --\u003e ORDERBY[\"ORDER BY Application\"]\n    \n    ORDERBY --\u003e EXECUTE[\"Query Execution\"]\n    EXECUTE --\u003e POSTPROC[\"Post-processing\"]\n    POSTPROC --\u003e FORMAT[\"Field Formatting\"]\n    FORMAT --\u003e OUTPUT[\"Final Output\"]\n```\n\n**Data Processing Pipeline**\n\nField processing utilizes `getModuleFields()` [modules/AOW_WorkFlow/aow_utils.php:45-126]() for dynamic field discovery, while condition evaluation leverages `getConditionsAsParameters()` [modules/AOR_Reports/aor_utils.php:175-222]() for parameter-based filtering.\n\nSources: [modules/AOR_Reports/AOR_Report.php:168-179](), [modules/AOW_WorkFlow/aow_utils.php:149-170](), [modules/AOR_Reports/aor_utils.php:51-94]()"])</script><script>self.__next_f.push([1,"22:T2c8e,"])</script><script>self.__next_f.push([1,"# Inbound Email Processing\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [include/Imap/Imap2Handler.php](include/Imap/Imap2Handler.php)\n- [include/Imap/ImapHandler.php](include/Imap/ImapHandler.php)\n- [include/Imap/ImapHandlerException.php](include/Imap/ImapHandlerException.php)\n- [include/Imap/ImapHandlerFactory.php](include/Imap/ImapHandlerFactory.php)\n- [include/Imap/ImapHandlerFake.php](include/Imap/ImapHandlerFake.php)\n- [include/Imap/ImapHandlerFakeCalls.php](include/Imap/ImapHandlerFakeCalls.php)\n- [include/Imap/ImapHandlerFakeData.php](include/Imap/ImapHandlerFakeData.php)\n- [include/Imap/ImapHandlerInterface.php](include/Imap/ImapHandlerInterface.php)\n- [include/Imap/ImapTestSettingsEntry.php](include/Imap/ImapTestSettingsEntry.php)\n- [include/Imap/ImapTestSettingsEntryHandler.php](include/Imap/ImapTestSettingsEntryHandler.php)\n- [modules/InboundEmail/InboundEmail.php](modules/InboundEmail/InboundEmail.php)\n- [tests/SuiteCRM/Test/BeanFactoryTestCase.php](tests/SuiteCRM/Test/BeanFactoryTestCase.php)\n- [tests/_support/Step/Acceptance/NavigationBarTester.php](tests/_support/Step/Acceptance/NavigationBarTester.php)\n- [tests/unit/phpunit/data/BeanFactoryTest.php](tests/unit/phpunit/data/BeanFactoryTest.php)\n\n\u003c/details\u003e\n\n\n\n## Purpose and Scope\n\nThe Inbound Email Processing system handles the retrieval, synchronization, and processing of emails from external mail servers (IMAP/POP3) into SuiteCRM. This system enables users to configure email accounts, automatically import emails, create cases from incoming messages, and manage email data within the CRM.\n\nFor information about outbound email sending, see [Email System](#4.2). For campaign email management, see [Campaign Management](#4.3).\n\n## System Architecture\n\nThe inbound email system is built around the `InboundEmail` SugarBean class and uses an abstracted IMAP handler system for mail server communication.\n\n### Core Architecture Overview\n\n```mermaid\ngraph TB\n    subgraph \"SuiteCRM Application Layer\"\n        IE[\"InboundEmail Class\u003cbr/\u003e(SugarBean)\"]\n        CACHE[\"Email Cache\u003cbr/\u003e(email_cache table)\"]\n        OVERVIEW[\"Overview Class\"]\n    end\n    \n    subgraph \"IMAP Abstraction Layer\"\n        FACTORY[\"ImapHandlerFactory\"]\n        INTERFACE[\"ImapHandlerInterface\"]\n        NATIVE[\"ImapHandler\u003cbr/\u003e(PHP IMAP)\"]\n        IMAP2[\"Imap2Handler\u003cbr/\u003e(Javanile IMAP2)\"]\n        FAKE[\"ImapHandlerFake\u003cbr/\u003e(Testing)\"]\n    end\n    \n    subgraph \"External Mail Servers\"\n        IMAPSERVER[\"IMAP Server\"]\n        POP3SERVER[\"POP3 Server\"]\n    end\n    \n    subgraph \"Data Storage\"\n        DB[(Database)]\n        EMAILTABLE[\"inbound_email table\"]\n        CACHETABLE[\"email_cache table\"]\n    end\n    \n    IE --\u003e FACTORY\n    FACTORY --\u003e INTERFACE\n    INTERFACE --\u003e NATIVE\n    INTERFACE --\u003e IMAP2\n    INTERFACE --\u003e FAKE\n    \n    NATIVE --\u003e IMAPSERVER\n    NATIVE --\u003e POP3SERVER\n    IMAP2 --\u003e IMAPSERVER\n    \n    IE --\u003e CACHE\n    IE --\u003e OVERVIEW\n    IE --\u003e DB\n    DB --\u003e EMAILTABLE\n    DB --\u003e CACHETABLE\n```\n\nSources: [modules/InboundEmail/InboundEmail.php:54-185](), [include/Imap/ImapHandlerFactory.php:56-266](), [include/Imap/ImapHandlerInterface.php:51-387]()\n\n### Class Relationships and Data Flow\n\n```mermaid\ngraph LR\n    subgraph \"InboundEmail Bean Methods\"\n        RETRIEVE[\"retrieve()\"]\n        SAVE[\"save()\"]\n        CONNECT[\"connectMailserver()\"]\n        CHECK[\"checkWithPagination()\"]\n        PROCESS[\"processInboundEmail()\"]\n    end\n    \n    subgraph \"IMAP Handler Operations\"\n        OPEN[\"open()\"]\n        SEARCH[\"search()\"]\n        FETCH[\"fetchOverview()\"]\n        GETMESSAGELIST[\"getMessageList()\"]\n        SORT[\"sort()\"]\n    end\n    \n    subgraph \"Email Processing\"\n        PARSER[\"MailMimeParser\"]\n        OVERVIEW[\"Overview\"]\n        CACHE[\"setCacheValue()\"]\n        IMPORT[\"importEmail()\"]\n    end\n    \n    RETRIEVE --\u003e CONNECT\n    CONNECT --\u003e OPEN\n    CHECK --\u003e GETMESSAGELIST\n    GETMESSAGELIST --\u003e SEARCH\n    GETMESSAGELIST --\u003e SORT\n    GETMESSAGELIST --\u003e FETCH\n    \n    PROCESS --\u003e PARSER\n    PROCESS --\u003e OVERVIEW\n    PROCESS --\u003e CACHE\n    PROCESS --\u003e IMPORT\n    \n    SAVE --\u003e CACHE\n```\n\nSources: [modules/InboundEmail/InboundEmail.php:379-425](), [include/Imap/ImapHandler.php:910-1020](), [modules/InboundEmail/InboundEmail.php:647-681]()\n\n## Core Components\n\n### InboundEmail Class\n\nThe `InboundEmail` class extends `SugarBean` and serves as the primary entity for managing email account configurations and operations.\n\n| Property | Type | Purpose |\n|----------|------|---------|\n| `server_url` | string | Mail server hostname |\n| `email_user` | string | Authentication username |\n| `email_password` | string | Encrypted password |\n| `port` | int | Server port number |\n| `service` | string | Protocol (imap/pop3) |\n| `mailbox` | string | Mailbox paths |\n| `auth_type` | string | Authentication method (basic/oauth) |\n| `is_personal` | bool | Personal vs group account |\n\nKey methods include:\n\n- `connectMailserver()` - Establishes mail server connection\n- `checkWithPagination()` - Retrieves paginated email lists\n- `processInboundEmail()` - Processes individual emails\n- `setCacheValue()` - Manages email cache\n\nSources: [modules/InboundEmail/InboundEmail.php:61-304](), [modules/InboundEmail/InboundEmail.php:647-681]()\n\n### IMAP Handler System\n\nThe system uses a factory pattern to provide different IMAP implementations:\n\n```mermaid\ngraph TD\n    FACTORY[\"ImapHandlerFactory\"]\n    INTERFACE[\"ImapHandlerInterface\"]\n    \n    NATIVE[\"ImapHandler\"]\n    IMAP2[\"Imap2Handler\"] \n    FAKE[\"ImapHandlerFake\"]\n    \n    FACTORY --\u003e INTERFACE\n    INTERFACE --\u003e NATIVE\n    INTERFACE --\u003e IMAP2\n    INTERFACE --\u003e FAKE\n    \n    NATIVE -.-\u003e PHPEXT[\"PHP IMAP Extension\"]\n    IMAP2 -.-\u003e JAVANILE[\"Javanile IMAP2 Library\"]\n    FAKE -.-\u003e TESTDATA[\"ImapHandlerFakeData\"]\n```\n\nThe `ImapHandlerFactory` selects the appropriate handler based on configuration:\n\n- **ImapHandler** - Uses PHP's built-in IMAP extension\n- **Imap2Handler** - Uses Javanile IMAP2 library as alternative\n- **ImapHandlerFake** - Provides test doubles for unit testing\n\nSources: [include/Imap/ImapHandlerFactory.php:197-223](), [include/Imap/ImapHandler.php:55-1051](), [include/Imap/Imap2Handler.php:58-923]()\n\n## Email Retrieval and Processing\n\n### Connection Process\n\nThe email connection process follows this sequence:\n\n```mermaid\nsequenceDiagram\n    participant IE as InboundEmail\n    participant Factory as ImapHandlerFactory\n    participant Handler as ImapHandler\n    participant Server as Mail Server\n    \n    IE-\u003e\u003eFactory: getImapHandler()\n    Factory-\u003e\u003eHandler: new ImapHandler()\n    IE-\u003e\u003eHandler: setTimeout()\n    IE-\u003e\u003eHandler: open(mailbox, user, pass)\n    Handler-\u003e\u003eServer: IMAP/POP3 Connection\n    Server--\u003e\u003eHandler: Connection Response\n    Handler--\u003e\u003eIE: Connection Stream\n    IE-\u003e\u003eHandler: ping()\n    Handler--\u003e\u003eIE: Connection Status\n```\n\nSources: [modules/InboundEmail/InboundEmail.php:345-370](), [include/Imap/ImapHandler.php:279-304]()\n\n### Message List Retrieval\n\nThe `checkWithPagination()` method provides efficient email listing with filtering and sorting:\n\n```php\npublic function checkWithPagination(\n    $offset = 0,\n    $pageSize = 20,\n    $order = array(),\n    $filter = array(),\n    $columns = array()\n)\n```\n\nThis method:\n1. Establishes server connection via `connectMailserver()`\n2. Processes sort and filter criteria\n3. Delegates to `ImapHandler::getMessageList()`\n4. Returns paginated email headers with mailbox info\n\nSources: [modules/InboundEmail/InboundEmail.php:647-681](), [include/Imap/ImapHandler.php:910-1020]()\n\n### Caching System\n\nThe system maintains an email cache in the `email_cache` table for performance:\n\n| Cache Operations | Method | Purpose |\n|------------------|--------|---------|\n| Store headers | `setCacheValue()` | Cache email metadata |\n| Retrieve cached data | `getCacheValue()` | Get cached email list |\n| Check timestamp | `getCacheTimestamp()` | Validate cache freshness |\n| Clear cache | `deleteCache()` | Remove stale data |\n\nThe cache stores email overview data including:\n- Message UIDs and IDs\n- Subject, sender, recipient\n- Date and size information\n- Read/unread status\n\nSources: [modules/InboundEmail/InboundEmail.php:1189-1362](), [modules/InboundEmail/InboundEmail.php:975-982]()\n\n## Authentication and Security\n\n### Authentication Types\n\nThe system supports multiple authentication methods:\n\n**Basic Authentication:**\n- Username/password stored encrypted using `blowfishEncode()`\n- Password decrypted on retrieval via `blowfishDecode()`\n\n**OAuth Authentication:**\n- Uses `external_oauth_connection_id` for OAuth providers\n- Clears password field when OAuth is selected\n\n### Access Control\n\nPersonal email accounts have restricted access:\n- Only account owner or admin can access personal accounts\n- `hasAccessToPersonalAccount()` method enforces security\n- Access denied events are logged via `logPersonalAccountAccessDenied()`\n\nSources: [modules/InboundEmail/InboundEmail.php:400-425](), [modules/InboundEmail/InboundEmail.php:431-462](), [modules/InboundEmail/InboundEmail.php:467-501]()\n\n## Email Processing Workflow\n\n### Message Import Process\n\n```mermaid\nflowchart TD\n    START[\"Email Retrieval Triggered\"]\n    CONNECT[\"Connect to Mail Server\"]\n    GETLIST[\"Get Message List\"]\n    FILTER[\"Apply Filters\"]\n    CACHE[\"Check Cache\"]\n    PROCESS[\"Process New Messages\"]\n    PARSE[\"Parse Email Content\"]\n    IMPORT[\"Import to CRM\"]\n    CLEANUP[\"Cache Management\"]\n    \n    START --\u003e CONNECT\n    CONNECT --\u003e GETLIST\n    GETLIST --\u003e FILTER\n    FILTER --\u003e CACHE\n    CACHE --\u003e PROCESS\n    PROCESS --\u003e PARSE\n    PARSE --\u003e IMPORT\n    IMPORT --\u003e CLEANUP\n```\n\nThe system processes emails through several stages:\n\n1. **Connection**: Establish secure connection to mail server\n2. **Retrieval**: Get message list with pagination and filtering\n3. **Caching**: Store/retrieve email metadata for performance\n4. **Processing**: Parse email content using `MailMimeParser`\n5. **Import**: Create Email records and related CRM data\n6. **Cleanup**: Manage cache and optionally move messages\n\n### Message Structure Handling\n\nThe system can detect and process email attachments:\n\n```php\npublic function messageStructureHasAttachment($imapStructure)\n```\n\nThis method analyzes IMAP message structure to identify:\n- Multipart messages with attachments\n- Message types and encoding\n- Disposition parameters for file attachments\n\nSources: [modules/InboundEmail/InboundEmail.php:687-714](), [include/Imap/ImapHandler.php:1026-1050]()\n\n## Configuration and Administration\n\n### Required Configuration Fields\n\nThe `InboundEmail` entity requires these essential fields:\n\n```php\npublic $required_fields = [\n    'name' =\u003e 'name',\n    'server_url' =\u003e 'server_url', \n    'mailbox' =\u003e 'mailbox',\n    'user' =\u003e 'user',\n    'port' =\u003e 'port',\n];\n```\n\n### Mailbox Management\n\nThe system supports multiple mailbox folders:\n- Comma-separated mailbox paths in `mailbox` field\n- Automatic folder hierarchy generation\n- Support for IMAP folder operations (create, rename, delete)\n\n### Job Scheduling\n\nAutomated email processing is handled via the scheduler:\n- Job name: `function::pollMonitoredInboxes`\n- Processes all configured inbound email accounts\n- Configurable polling intervals\n\nSources: [modules/InboundEmail/InboundEmail.php:143-149](), [modules/InboundEmail/InboundEmail.php:168](), [modules/InboundEmail/InboundEmail.php:589-621]()"])</script><script>self.__next_f.push([1,"23:T403b,"])</script><script>self.__next_f.push([1,"# Administration \u0026 Configuration\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [include/Smarty/plugins/function.diff_for_humans.php](include/Smarty/plugins/function.diff_for_humans.php)\n- [include/language/getJSLanguage.php](include/language/getJSLanguage.php)\n- [install.php](install.php)\n- [install/dbConfig_a.php](install/dbConfig_a.php)\n- [install/install.css](install/install.css)\n- [install/install2.css](install/install2.css)\n- [install/installConfig.php](install/installConfig.php)\n- [install/installDisabled.php](install/installDisabled.php)\n- [install/installType.php](install/installType.php)\n- [install/install_utils.php](install/install_utils.php)\n- [install/language/en_us.lang.php](install/language/en_us.lang.php)\n- [install/license.php](install/license.php)\n- [install/old_php.js](install/old_php.js)\n- [install/old_php.php](install/old_php.php)\n- [install/performSetup.php](install/performSetup.php)\n- [install/ready.css](install/ready.css)\n- [install/ready.php](install/ready.php)\n- [install/siteConfig_a.php](install/siteConfig_a.php)\n- [install/siteConfig_b.php](install/siteConfig_b.php)\n- [install/suite_install/enabledTabs.php](install/suite_install/enabledTabs.php)\n- [install/suite_install/scenarios.php](install/suite_install/scenarios.php)\n- [install/welcome.php](install/welcome.php)\n- [lib/Search/Index/IndexingSchedulerTrait.php](lib/Search/Index/IndexingSchedulerTrait.php)\n- [lib/Search/UI/SearchThrowableHandler.php](lib/Search/UI/SearchThrowableHandler.php)\n- [modules/Administration/ElasticSearchSettings.php](modules/Administration/ElasticSearchSettings.php)\n- [modules/Administration/Search/ElasticSearch/Controller.php](modules/Administration/Search/ElasticSearch/Controller.php)\n- [modules/Administration/Search/ElasticSearch/View.php](modules/Administration/Search/ElasticSearch/View.php)\n- [modules/Administration/Search/ElasticSearch/scripts.js](modules/Administration/Search/ElasticSearch/scripts.js)\n- [modules/Administration/Search/ElasticSearch/view.tpl](modules/Administration/Search/ElasticSearch/view.tpl)\n- [modules/Administration/Search/MVC/Controller.php](modules/Administration/Search/MVC/Controller.php)\n- [modules/Administration/UpgradeAccess.php](modules/Administration/UpgradeAccess.php)\n- [modules/Administration/language/en_us.lang.php](modules/Administration/language/en_us.lang.php)\n- [modules/Administration/metadata/adminpaneldefs.php](modules/Administration/metadata/adminpaneldefs.php)\n- [modules/Home/Search.php](modules/Home/Search.php)\n- [modules/Home/language/en_us.lang.php](modules/Home/language/en_us.lang.php)\n- [modules/Import/views/ImportView.php](modules/Import/views/ImportView.php)\n- [modules/OAuth2Clients/Menu.php](modules/OAuth2Clients/Menu.php)\n- [modules/OAuth2Tokens/Menu.php](modules/OAuth2Tokens/Menu.php)\n- [modules/Schedulers/Scheduler.php](modules/Schedulers/Scheduler.php)\n- [modules/Schedulers/_AddJobsHere.php](modules/Schedulers/_AddJobsHere.php)\n- [modules/Schedulers/language/en_us.lang.php](modules/Schedulers/language/en_us.lang.php)\n- [modules/Studio/parsers/StudioParser.php](modules/Studio/parsers/StudioParser.php)\n\n\u003c/details\u003e\n\n\n\nThis document covers SuiteCRM's administration and configuration systems, including installation, system settings management, background job scheduling, and administrative interfaces. The administration system provides centralized control over system-wide settings, user management, module configuration, and maintenance tasks.\n\nFor information about specific business modules and their configuration, see other module-specific documentation. For API-level configuration, see [API Architecture](#6.2).\n\n## Installation System\n\nThe SuiteCRM installation system provides a web-based wizard for initial system setup, database configuration, and basic system settings.\n\n### Installation Entry Point and Flow\n\nThe installation process begins with `install.php`, which serves as the main entry point and orchestrates the multi-step installation wizard.\n\n```mermaid\ngraph TD\n    A[\"install.php\"] --\u003e B[\"welcome.php\"]\n    B --\u003e C[\"ready.php\"]\n    C --\u003e D[\"installType.php\"]\n    D --\u003e E[\"dbConfig_a.php\"]\n    E --\u003e F[\"siteConfig_a.php\"]\n    F --\u003e G[\"performSetup.php\"]\n    G --\u003e H[\"complete_install.php\"]\n    \n    A --\u003e I[\"install_utils.php\"]\n    G --\u003e J[\"handleSugarConfig()\"]\n    G --\u003e K[\"handleDbCreateDatabase()\"]\n    G --\u003e L[\"handleDbCreateSugarUser()\"]\n    G --\u003e M[\"create_default_users()\"]\n    G --\u003e N[\"insert_default_settings()\"]\n```\n\n**Installation System Architecture**\n\nSources: [install.php:1-900](), [install/welcome.php:1-400](), [install/performSetup.php:1-600]()\n\n### Database Configuration and Setup\n\nThe installation system supports multiple database types and handles database creation, user setup, and initial data population.\n\n```mermaid\ngraph TD\n    A[\"DBManagerFactory\"] --\u003e B[\"getInstallDbInstance()\"]\n    B --\u003e C[\"MySQL/MariaDB\"]\n    B --\u003e D[\"SQL Server\"]\n    B --\u003e E[\"Oracle\"]\n    \n    F[\"getDbConnection()\"] --\u003e G[\"handleDbCreateDatabase()\"]\n    G --\u003e H[\"handleDbCharsetCollation()\"]\n    H --\u003e I[\"handleDbCreateSugarUser()\"]\n    \n    J[\"performSetup.php\"] --\u003e K[\"create_table_if_not_exist()\"]\n    K --\u003e L[\"SugarBean::createRelationshipMeta()\"]\n    L --\u003e M[\"insert_default_settings()\"]\n    M --\u003e N[\"create_default_users()\"]\n```\n\n**Database Setup Process**\n\nThe `performSetup.php` file coordinates database creation and initial data setup through several key functions:\n\n- `handleDbCreateDatabase()` - Creates the main database\n- `handleDbCharsetCollation()` - Sets UTF-8 charset and collation\n- `handleDbCreateSugarUser()` - Creates application database user\n- `create_table_if_not_exist()` - Creates all module tables\n\nSources: [install/performSetup.php:175-350](), [install/install_utils.php:594-700]()\n\n### Configuration File Generation\n\nThe installation process generates the main `config.php` file and other configuration files needed for system operation.\n\n```mermaid\ngraph TD\n    A[\"handleSugarConfig()\"] --\u003e B[\"writeSugarConfig()\"]\n    B --\u003e C[\"config.php\"]\n    \n    D[\"handleHtaccess()\"] --\u003e E[\".htaccess\"]\n    F[\"handleWebConfig()\"] --\u003e G[\"web.config\"]\n    \n    H[\"InstallLayout\"] --\u003e I[\"Form Generation\"]\n    I --\u003e J[\"installConfig.php\"]\n    J --\u003e K[\"System Settings Form\"]\n```\n\n**Configuration Generation Components**\n\nSources: [install/performSetup.php:155-170](), [install/install_utils.php:461-472](), [install/installConfig.php:90-250]()\n\n## Administration Panel\n\nThe administration panel provides a centralized interface for managing all system settings, organized into logical groups for different administrative functions.\n\n### Admin Panel Structure\n\nThe administration panel is defined through `adminpaneldefs.php`, which organizes administrative functions into groups.\n\n```mermaid\ngraph TD\n    A[\"adminpaneldefs.php\"] --\u003e B[\"Users \u0026 Authentication\"]\n    A --\u003e C[\"System Settings\"]\n    A --\u003e D[\"Module Settings\"]\n    A --\u003e E[\"Email Management\"]\n    A --\u003e F[\"Developer Tools\"]\n    \n    B --\u003e G[\"UserManagement\"]\n    B --\u003e H[\"Password Management\"]\n    B --\u003e I[\"OAuth2 Clients\"]\n    B --\u003e J[\"Role Management\"]\n    \n    C --\u003e K[\"System Settings\"]\n    C --\u003e L[\"Currencies\"]\n    C --\u003e M[\"Languages\"]\n    C --\u003e N[\"Scheduler\"]\n    \n    D --\u003e O[\"Module Configuration\"]\n    D --\u003e P[\"Tab Configuration\"]\n    D --\u003e Q[\"Connector Settings\"]\n```\n\n**Administration Panel Organization**\n\nThe admin panel groups are defined in `$admin_group_header` arrays, with each group containing multiple administrative options.\n\nSources: [modules/Administration/metadata/adminpaneldefs.php:44-98](), [modules/Administration/metadata/adminpaneldefs.php:100-167]()\n\n### System Configuration Management\n\nThe `Configurator` module handles system-wide settings through a centralized configuration interface.\n\n```mermaid\ngraph TD\n    A[\"Configurator\"] --\u003e B[\"config.php Settings\"]\n    A --\u003e C[\"System Locale\"]\n    A --\u003e D[\"Currency Management\"]\n    A --\u003e E[\"Language Packs\"]\n    \n    F[\"Administration::saveSetting()\"] --\u003e G[\"administration Table\"]\n    H[\"sugar_config Array\"] --\u003e I[\"Runtime Configuration\"]\n    \n    J[\"LocaleSettings\"] --\u003e K[\"Date/Time Format\"]\n    J --\u003e L[\"Number Format\"]\n    J --\u003e M[\"Name Format\"]\n```\n\n**Configuration Storage and Management**\n\nSystem settings are stored in two primary locations:\n- `config.php` file for core system settings\n- `administration` database table for dynamic settings\n\nSources: [modules/Administration/metadata/adminpaneldefs.php:102-108](), [install/installConfig.php:50-88]()\n\n## Scheduler System\n\nThe scheduler system manages background jobs and automated tasks through the `Schedulers` module, providing cron-like functionality for maintenance and processing tasks.\n\n### Scheduler Architecture\n\n```mermaid\ngraph TD\n    A[\"Scheduler Bean\"] --\u003e B[\"schedulers Table\"]\n    A --\u003e C[\"SchedulersJob Bean\"]\n    C --\u003e D[\"schedulers_jobs Table\"]\n    \n    E[\"cron.php\"] --\u003e F[\"Scheduler::checkPendingJobs()\"]\n    F --\u003e G[\"Job Execution\"]\n    G --\u003e H[\"Job Status Update\"]\n    \n    I[\"_AddJobsHere.php\"] --\u003e J[\"Job Function Definitions\"]\n    J --\u003e K[\"pollMonitoredInboxes()\"]\n    J --\u003e L[\"runMassEmailCampaign()\"]\n    J --\u003e M[\"pruneDatabase()\"]\n    J --\u003e N[\"trimTracker()\"]\n```\n\n**Scheduler Job Management System**\n\nThe scheduler system consists of several key components:\n- `Scheduler` bean for job definitions\n- `SchedulersJob` bean for job execution tracking  \n- Job function definitions in `_AddJobsHere.php`\n- Cron-based execution through `cron.php`\n\nSources: [modules/Schedulers/Scheduler.php:48-99](), [modules/Schedulers/_AddJobsHere.php:69-87]()\n\n### Built-in Scheduler Jobs\n\nSuiteCRM includes several out-of-the-box scheduler jobs for system maintenance and processing.\n\n```mermaid\ngraph TD\n    A[\"Job Functions\"] --\u003e B[\"Email Processing\"]\n    A --\u003e C[\"Database Maintenance\"]\n    A --\u003e D[\"System Cleanup\"]\n    A --\u003e E[\"Search Indexing\"]\n    \n    B --\u003e F[\"pollMonitoredInboxes()\"]\n    B --\u003e G[\"runMassEmailCampaign()\"]\n    B --\u003e H[\"pollMonitoredInboxesForBouncedCampaignEmails()\"]\n    \n    C --\u003e I[\"pruneDatabase()\"]\n    C --\u003e J[\"trimTracker()\"]\n    \n    D --\u003e K[\"cleanJobQueue()\"]\n    D --\u003e L[\"trimSugarFeeds()\"]\n    D --\u003e M[\"removeDocumentsFromFS()\"]\n    \n    E --\u003e N[\"aodIndexUnindexed()\"]\n    E --\u003e O[\"runElasticSearchIndexerScheduler()\"]\n```\n\n**Scheduler Job Types and Functions**\n\nKey scheduler jobs include:\n- Email processing (`pollMonitoredInboxes`, `runMassEmailCampaign`)\n- Database maintenance (`pruneDatabase`, `trimTracker`)\n- System cleanup (`cleanJobQueue`, `trimSugarFeeds`)\n- Search indexing (`aodIndexUnindexed`, `runElasticSearchIndexerScheduler`)\n\nSources: [modules/Schedulers/_AddJobsHere.php:102-268](), [modules/Schedulers/_AddJobsHere.php:272-295](), [modules/Schedulers/_AddJobsHere.php:298-361]()\n\n### Scheduler Job Execution\n\nThe scheduler execution system handles job queuing, execution, and status tracking.\n\n```mermaid\ngraph TD\n    A[\"Scheduler::fireJob()\"] --\u003e B[\"Job Status Check\"]\n    B --\u003e C[\"Job Execution\"]\n    C --\u003e D[\"SchedulersJob Creation\"]\n    D --\u003e E[\"Job Function Call\"]\n    E --\u003e F[\"Status Update\"]\n    \n    G[\"Job Queue Management\"] --\u003e H[\"runJob()\"]\n    H --\u003e I[\"Job Timeout Handling\"]\n    I --\u003e J[\"Error Handling\"]\n    J --\u003e K[\"Cleanup\"]\n```\n\n**Job Execution Flow**\n\nSources: [modules/Schedulers/Scheduler.php:400-500](), [modules/Schedulers/language/en_us.lang.php:46-61]()\n\n## Search Configuration\n\nSuiteCRM provides configurable search capabilities including traditional database search and ElasticSearch integration.\n\n### ElasticSearch Configuration\n\nThe ElasticSearch integration provides advanced full-text search capabilities with configurable indexing and search options.\n\n```mermaid\ngraph TD\n    A[\"ElasticSearchSettings.php\"] --\u003e B[\"Configuration Interface\"]\n    B --\u003e C[\"Connection Settings\"]\n    B --\u003e D[\"Index Configuration\"]\n    B --\u003e E[\"Module Selection\"]\n    \n    F[\"ElasticSearch Controller\"] --\u003e G[\"Index Management\"]\n    G --\u003e H[\"runElasticSearchIndexerScheduler()\"]\n    H --\u003e I[\"Document Indexing\"]\n    \n    J[\"SearchThrowableHandler\"] --\u003e K[\"Error Handling\"]\n    K --\u003e L[\"Fallback to Database Search\"]\n```\n\n**ElasticSearch Integration Architecture**\n\nThe ElasticSearch system includes:\n- Configuration interface through `ElasticSearchSettings.php`\n- Scheduler-based indexing through `runElasticSearchIndexerScheduler()`\n- Error handling and fallback mechanisms\n- Module-specific indexing configuration\n\nSources: [modules/Administration/ElasticSearchSettings.php:1-100](), [modules/Administration/Search/ElasticSearch/Controller.php:1-200](), [lib/Search/UI/SearchThrowableHandler.php:1-200]()\n\n### Search System Components\n\n```mermaid\ngraph TD\n    A[\"Search System\"] --\u003e B[\"Global Search\"]\n    A --\u003e C[\"Module Search\"]\n    A --\u003e D[\"ElasticSearch\"]\n    \n    B --\u003e E[\"SearchSettings\"]\n    B --\u003e F[\"Unified Search\"]\n    \n    C --\u003e G[\"ListView Search\"]\n    C --\u003e H[\"Advanced Search\"]\n    \n    D --\u003e I[\"Index Management\"]\n    D --\u003e J[\"Query Processing\"]\n    D --\u003e K[\"Result Ranking\"]\n```\n\n**Search Configuration Options**\n\nSources: [modules/Administration/metadata/adminpaneldefs.php:137-150](), [modules/Administration/Search/MVC/Controller.php:1-100]()\n\n## Module and Extension Management\n\nThe administration system provides tools for managing modules, language packs, and system extensions.\n\n### Module Installation System\n\n```mermaid\ngraph TD\n    A[\"ModuleInstaller\"] --\u003e B[\"Package Validation\"]\n    B --\u003e C[\"Manifest Processing\"]\n    C --\u003e D[\"File Installation\"]\n    D --\u003e E[\"Database Updates\"]\n    E --\u003e F[\"Cache Refresh\"]\n    \n    G[\"UpgradeHistory\"] --\u003e H[\"Installation Tracking\"]\n    H --\u003e I[\"Rollback Capability\"]\n    \n    J[\"Language Pack Management\"] --\u003e K[\"commitLanguagePack()\"]\n    K --\u003e L[\"File Deployment\"]\n    L --\u003e M[\"Configuration Update\"]\n```\n\n**Module Management Components**\n\nThe module management system handles:\n- Package validation and installation\n- Language pack deployment\n- Upgrade history tracking\n- System cache management\n\nSources: [install/install_utils.php:113-245](), [install/install_utils.php:316-390](), [modules/Administration/UpgradeAccess.php:45-84]()\n\n### System Maintenance Tools\n\n```mermaid\ngraph TD\n    A[\"Repair Tools\"] --\u003e B[\"Database Repair\"]\n    A --\u003e C[\"Relationship Rebuild\"]\n    A --\u003e D[\"Cache Clearing\"]\n    A --\u003e E[\"Config Rebuild\"]\n    \n    F[\"Administration Utilities\"] --\u003e G[\"User Management\"]\n    F --\u003e H[\"Security Groups\"]\n    F --\u003e I[\"System Diagnostics\"]\n    \n    J[\"Backup System\"] --\u003e K[\"File Backup\"]\n    J --\u003e L[\"Database Backup\"]\n```\n\n**System Maintenance Architecture**\n\nSources: [modules/Administration/language/en_us.lang.php:434-506](), [modules/Administration/metadata/adminpaneldefs.php:170-235]()\n\n## Configuration Data Flow\n\nThe administration system manages configuration data through multiple storage mechanisms and access patterns.\n\n### Configuration Storage Architecture\n\n```mermaid\ngraph TD\n    A[\"Configuration Sources\"] --\u003e B[\"config.php\"]\n    A --\u003e C[\"administration Table\"]\n    A --\u003e D[\"config_override.php\"]\n    A --\u003e E[\"Module Configurations\"]\n    \n    F[\"Runtime Access\"] --\u003e G[\"sugar_config Array\"]\n    F --\u003e H[\"Administration::retrieveSettings()\"]\n    F --\u003e I[\"Configurator Class\"]\n    \n    J[\"Update Mechanisms\"] --\u003e K[\"writeSugarConfig()\"]\n    J --\u003e L[\"Administration::saveSetting()\"]\n    J --\u003e M[\"Module-specific Saves\"]\n```\n\n**Configuration Data Management**\n\nConfiguration data flows through several layers:\n- File-based configuration (`config.php`, `config_override.php`)\n- Database-stored settings (`administration` table)\n- Runtime configuration (`sugar_config` global array)\n- Module-specific configuration files\n\nSources: [install/install_utils.php:461-472](), [modules/Administration/metadata/adminpaneldefs.php:44-250]()\n\n### Administrative Interface Integration\n\n```mermaid\ngraph TD\n    A[\"Admin Interface\"] --\u003e B[\"adminpaneldefs.php\"]\n    B --\u003e C[\"Module Controllers\"]\n    C --\u003e D[\"Configuration Forms\"]\n    D --\u003e E[\"Validation Logic\"]\n    E --\u003e F[\"Data Persistence\"]\n    \n    G[\"Access Control\"] --\u003e H[\"ACL Checks\"]\n    H --\u003e I[\"Admin Role Validation\"]\n    I --\u003e J[\"Feature Access Control\"]\n```\n\n**Administrative Interface Flow**\n\nThe administrative interface coordinates:\n- Panel definition and organization\n- Form generation and validation\n- Access control and security\n- Configuration persistence\n\nSources: [modules/Administration/metadata/adminpaneldefs.php:1-350](), [install/installConfig.php:91-200]()"])</script><script>self.__next_f.push([1,"24:T3135,"])</script><script>self.__next_f.push([1,"# Installation System\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [include/language/getJSLanguage.php](include/language/getJSLanguage.php)\n- [install.php](install.php)\n- [install/dbConfig_a.php](install/dbConfig_a.php)\n- [install/install.css](install/install.css)\n- [install/install2.css](install/install2.css)\n- [install/installConfig.php](install/installConfig.php)\n- [install/installDisabled.php](install/installDisabled.php)\n- [install/installType.php](install/installType.php)\n- [install/install_utils.php](install/install_utils.php)\n- [install/language/en_us.lang.php](install/language/en_us.lang.php)\n- [install/license.php](install/license.php)\n- [install/old_php.js](install/old_php.js)\n- [install/old_php.php](install/old_php.php)\n- [install/performSetup.php](install/performSetup.php)\n- [install/ready.css](install/ready.css)\n- [install/ready.php](install/ready.php)\n- [install/siteConfig_a.php](install/siteConfig_a.php)\n- [install/siteConfig_b.php](install/siteConfig_b.php)\n- [install/welcome.php](install/welcome.php)\n- [modules/Administration/UpgradeAccess.php](modules/Administration/UpgradeAccess.php)\n- [modules/Import/views/ImportView.php](modules/Import/views/ImportView.php)\n- [modules/Studio/parsers/StudioParser.php](modules/Studio/parsers/StudioParser.php)\n\n\u003c/details\u003e\n\n\n\nThis document covers SuiteCRM's installation wizard system, which handles the initial setup and configuration of a new SuiteCRM instance. The installation system is a web-based wizard that guides users through license acceptance, system requirements validation, database configuration, and initial data population.\n\nFor information about post-installation administration, see [Administration Panel](#5.2). For upgrade procedures, see the upgrade documentation in the administration section.\n\n## Overview\n\nThe installation system is implemented as a multi-step web wizard that orchestrates the complete setup process for a new SuiteCRM installation. The system validates system requirements, configures database connections, creates necessary tables, populates default data, and establishes the initial administrative user.\n\n### Installation Workflow\n\n```mermaid\ngraph TD\n    A[\"install.php\"] --\u003e B{\"PHP Version Check\"}\n    B --\u003e|\"Old Version\"| C[\"old_php.php\"]\n    B --\u003e|\"Acceptable\"| D[\"welcome.php\"]\n    C --\u003e D\n    D --\u003e E[\"ready.php\"]\n    E --\u003e F[\"installConfig.php\"]\n    F --\u003e G[\"performSetup.php\"]\n    G --\u003e H[\"complete_install.php\"]\n    \n    D --\u003e I[\"License Acceptance\"]\n    E --\u003e J[\"System Requirements Check\"]\n    F --\u003e K[\"Database \u0026 Site Configuration\"]\n    G --\u003e L[\"Table Creation \u0026 Data Population\"]\n```\n\n**Sources:** [install.php:380-460](), [install.php:462-477]()\n\n### Core Installation Components\n\n```mermaid\ngraph TB\n    subgraph \"Installation Controller\"\n        MAIN[\"install.php\u003cbr/\u003eMain Controller\"]\n        UTILS[\"install_utils.php\u003cbr/\u003eUtility Functions\"]\n    end\n    \n    subgraph \"Wizard Steps\"\n        WELCOME[\"welcome.php\u003cbr/\u003eLicense Acceptance\"]\n        READY[\"ready.php\u003cbr/\u003eSystem Check\"]\n        CONFIG[\"installConfig.php\u003cbr/\u003eConfiguration Forms\"]\n        PERFORM[\"performSetup.php
