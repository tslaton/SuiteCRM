\u003cbr/\u003eSetup Execution\"]\n    end\n    \n    subgraph \"Installation Data\"\n        LANG[\"language/en_us.lang.php\u003cbr/\u003eUI Strings\"]\n        DEFAULTS[\"install_defaults.php\u003cbr/\u003eDefault Values\"]\n    end\n    \n    MAIN --\u003e WELCOME\n    MAIN --\u003e READY  \n    MAIN --\u003e CONFIG\n    MAIN --\u003e PERFORM\n    UTILS --\u003e PERFORM\n    LANG --\u003e WELCOME\n    LANG --\u003e CONFIG\n    DEFAULTS --\u003e CONFIG\n```\n\n**Sources:** [install.php:1-50](), [install/install_utils.php:1-50](), [install/performSetup.php:1-50]()\n\n## Installation Controller\n\n### Main Entry Point\n\nThe `install.php` file serves as the primary controller for the installation process. It manages session state, workflow progression, and step validation.\n\n| Component | Purpose | Key Functions |\n|-----------|---------|---------------|\n| `$workflow` array | Defines installation step sequence | Step progression control |\n| `$next_step` | Current workflow position | Navigation management |\n| Session management | Preserves configuration across steps | State persistence |\n| Language handling | Multi-language support | Localization |\n\n**Key workflow management:**\n- Workflow steps are defined in a simple array structure [install.php:380-460]()\n- Step progression is controlled via `$_REQUEST['goto']` parameter [install.php:462-477]()\n- Session variables maintain state between steps [install.php:367-372]()\n\n**Sources:** [install.php:380-460](), [install.php:462-477](), [install.php:367-372]()\n\n### Installation Utilities\n\nThe `install_utils.php` file provides core utility functions used throughout the installation process:\n\n```mermaid\ngraph LR\n    subgraph \"Database Operations\"\n        A[\"getInstallDbInstance()\"]\n        B[\"getDbConnection()\"]\n        C[\"handleDbCreateDatabase()\"]\n        D[\"handleDbCreateSugarUser()\"]\n    end\n    \n    subgraph \"Configuration Management\"\n        E[\"handleSugarConfig()\"]\n        F[\"writeSugarConfig()\"]\n        G[\"installerHook()\"]\n    end\n    \n    subgraph \"Language Pack Management\"  \n        H[\"commitLanguagePack()\"]\n        I[\"removeLanguagePack()\"]\n        J[\"getLanguagePackName()\"]\n    end\n    \n    A --\u003e B\n    B --\u003e C\n    B --\u003e D\n    E --\u003e F\n```\n\n**Sources:** [install/install_utils.php:594-620](), [install/install_utils.php:747-870](), [install/install_utils.php:113-245]()\n\n## Installation Steps\n\n### License Acceptance (`welcome.php`)\n\nThe welcome step handles license acceptance and language selection:\n\n- Displays SuiteCRM license text from `LICENSE.txt`\n- Provides language selection dropdown\n- Requires explicit license acceptance before proceeding\n- Performs initial system compatibility check via AJAX\n\n**Key components:**\n- License text display in textarea [install/welcome.php:139]()\n- JavaScript-based license acceptance validation [install/welcome.php:218-290]()\n- AJAX system check integration [install/welcome.php:218-290]()\n\n**Sources:** [install/welcome.php:54-66](), [install/welcome.php:139](), [install/welcome.php:218-290]()\n\n### System Requirements Check (`ready.php`)\n\nThe ready step validates system requirements and displays environment information:\n\n| Check Category | Components Validated |\n|----------------|---------------------|\n| PHP Environment | Version, memory limit, extensions |\n| File System | Directory permissions, writability |\n| Database Support | Available database drivers |\n| Optional Features | IMAP, cURL, image processing |\n\n```mermaid\ngraph TD\n    A[\"ready.php\"] --\u003e B[\"PHP Version Check\"]\n    A --\u003e C[\"Memory Limit Validation\"]\n    A --\u003e D[\"Extension Availability\"]\n    A --\u003e E[\"File Permission Check\"]\n    A --\u003e F[\"Database Driver Check\"]\n    \n    D --\u003e G[\"XML Parser\"]\n    D --\u003e H[\"MB String\"]\n    D --\u003e I[\"IMAP\"]\n    D --\u003e J[\"cURL\"]\n    D --\u003e K[\"ZIP Support\"]\n    D --\u003e L[\"PCRE Library\"]\n```\n\n**Sources:** [install/ready.php:59-61](), [install/ready.php:98-140](), [install/ready.php:172-190]()\n\n### Configuration (`installConfig.php`)\n\nThe configuration step provides forms for database and site settings:\n\n**Database Configuration:**\n- Database type selection (MySQL, SQL Server, etc.)\n- Connection parameters (host, port, credentials)\n- Database creation options\n- User account management\n\n**Site Configuration:**\n- Admin user creation\n- Site URL specification\n- System name setting\n- Security options\n\nThe configuration interface uses the `InstallLayout` class to generate forms dynamically based on database driver capabilities [install/installConfig.php:91-248]().\n\n**Sources:** [install/installConfig.php:91-248](), [install/installConfig.php:249-700]()\n\n### Setup Execution (`performSetup.php`)\n\nThe setup execution step performs the actual installation:\n\n```mermaid\ngraph TD\n    A[\"performSetup.php\"] --\u003e B[\"Configuration File Creation\"]\n    B --\u003e C[\"Database Setup\"]\n    C --\u003e D[\"Table Creation\"]\n    D --\u003e E[\"Default Data Population\"]\n    E --\u003e F[\"Admin User Creation\"]\n    F --\u003e G[\"System Finalization\"]\n    \n    C --\u003e H[\"handleDbCreateDatabase()\"]\n    C --\u003e I[\"handleDbCreateSugarUser()\"]\n    D --\u003e J[\"Bean Table Creation\"]\n    D --\u003e K[\"Relationship Tables\"]\n    E --\u003e L[\"Default Settings\"]\n    E --\u003e M[\"Scheduler Jobs\"]\n    F --\u003e N[\"create_default_users()\"]\n```\n\n**Key processes:**\n1. **Configuration Generation**: Creates `config.php` with database and site settings [install/performSetup.php:747-870]()\n2. **Database Initialization**: Creates database and user accounts if needed [install/performSetup.php:176-204]()\n3. **Table Creation**: Iterates through all Bean classes to create tables [install/performSetup.php:241-297]()\n4. **Relationship Setup**: Creates relationship metadata tables [install/performSetup.php:308-323]()\n5. **Default Data**: Populates configuration settings and creates admin user [install/performSetup.php:333-357]()\n\n**Sources:** [install/performSetup.php:155-188](), [install/performSetup.php:241-297](), [install/performSetup.php:333-357]()\n\n## Database Installation Process\n\n### Database Creation and Configuration\n\nThe installation system handles multiple database platforms through a unified interface:\n\n```mermaid\ngraph TB\n    subgraph \"Database Setup Flow\"\n        A[\"getInstallDbInstance()\"] --\u003e B[\"Database Type Selection\"]\n        B --\u003e C[\"Connection Parameter Validation\"]\n        C --\u003e D[\"Database Creation\"]\n        D --\u003e E[\"Character Set Configuration\"]\n        E --\u003e F[\"User Account Management\"]\n    end\n    \n    subgraph \"Table Creation Process\"\n        G[\"Bean Iteration\"] --\u003e H[\"Table Structure Generation\"]\n        H --\u003e I[\"Index Creation\"]\n        I --\u003e J[\"Relationship Metadata\"]\n    end\n    \n    F --\u003e G\n```\n\n**Database operations:**\n- **Type Selection**: Supports MySQL, SQL Server via driver abstraction [install/install_utils.php:594-597]()\n- **Connection Management**: Establishes admin connections for setup [install/install_utils.php:599-620]()\n- **Table Creation**: Processes all SugarBean classes to create tables [install/performSetup.php:241-297]()\n- **Relationship Setup**: Creates join tables and metadata [install/performSetup.php:308-323]()\n\n**Sources:** [install/install_utils.php:594-620](), [install/performSetup.php:241-297](), [install/performSetup.php:308-323]()\n\n### Configuration File Generation\n\nThe `handleSugarConfig()` function creates the main `config.php` file:\n\n| Configuration Section | Purpose | Key Settings |\n|----------------------|---------|--------------|\n| Database Config | Connection parameters | Host, credentials, database name |\n| Site Settings | Base system configuration | URL, session paths, logging |\n| Security Options | Application security | Session management, authentication |\n| Feature Flags | Optional functionality | Module availability, features |\n\n**Sources:** [install/install_utils.php:747-870]()\n\n## Installation Hooks and Extensibility\n\nThe installation system provides hooks for customization through the `installerHook()` function:\n\n```mermaid\ngraph LR\n    A[\"installerHook()\"] --\u003e B[\"custom/install/install_hooks.php\"]\n    B --\u003e C[\"Custom Installation Logic\"]\n    \n    D[\"Pre-hooks\"] --\u003e E[\"pre_handleDbCreateDatabase\"]\n    D --\u003e F[\"pre_createAllModuleTables\"]\n    D --\u003e G[\"pre_createDefaultSettings\"]\n    \n    H[\"Post-hooks\"] --\u003e I[\"post_handleDbCreateDatabase\"]\n    H --\u003e J[\"post_createAllModuleTables\"]\n    H --\u003e K[\"post_createDefaultSettings\"]\n```\n\n**Available hook points:**\n- Database creation (pre/post)\n- Table creation (pre/post)  \n- Default settings (pre/post)\n- User creation (pre/post)\n- System finalization\n\n**Sources:** [install/install_utils.php:56-80](), [install/performSetup.php:178-180](), [install/performSetup.php:238-240]()\n\n## Error Handling and Validation\n\nThe installation system includes comprehensive validation and error handling:\n\n### System Requirements Validation\n\n- **PHP Version**: Validates minimum and recommended versions [install/ready.php:59-61]()\n- **Extension Checks**: Verifies required PHP extensions [install/ready.php:172-190]()\n- **File Permissions**: Validates directory writability [install/ready.php:80-95]()\n- **Memory Limits**: Checks PHP memory configuration [install/ready.php:98-140]()\n\n### Configuration Validation\n\n- **Database Connectivity**: Tests database connections before proceeding\n- **Required Fields**: Validates all mandatory configuration fields\n- **Security Validation**: Ensures secure password requirements\n- **URL Validation**: Verifies site URL accessibility\n\n**Sources:** [install/ready.php:98-140](), [install/ready.php:172-190](), [install/installConfig.php:304-344]()"])</script><script>self.__next_f.push([1,"25:T3206,"])</script><script>self.__next_f.push([1,"# Administration Panel\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [include/Smarty/plugins/function.diff_for_humans.php](include/Smarty/plugins/function.diff_for_humans.php)\n- [install/suite_install/enabledTabs.php](install/suite_install/enabledTabs.php)\n- [install/suite_install/scenarios.php](install/suite_install/scenarios.php)\n- [lib/Search/Index/IndexingSchedulerTrait.php](lib/Search/Index/IndexingSchedulerTrait.php)\n- [lib/Search/UI/SearchThrowableHandler.php](lib/Search/UI/SearchThrowableHandler.php)\n- [modules/Administration/ElasticSearchSettings.php](modules/Administration/ElasticSearchSettings.php)\n- [modules/Administration/Search/ElasticSearch/Controller.php](modules/Administration/Search/ElasticSearch/Controller.php)\n- [modules/Administration/Search/ElasticSearch/View.php](modules/Administration/Search/ElasticSearch/View.php)\n- [modules/Administration/Search/ElasticSearch/scripts.js](modules/Administration/Search/ElasticSearch/scripts.js)\n- [modules/Administration/Search/ElasticSearch/view.tpl](modules/Administration/Search/ElasticSearch/view.tpl)\n- [modules/Administration/Search/MVC/Controller.php](modules/Administration/Search/MVC/Controller.php)\n- [modules/Administration/language/en_us.lang.php](modules/Administration/language/en_us.lang.php)\n- [modules/Administration/metadata/adminpaneldefs.php](modules/Administration/metadata/adminpaneldefs.php)\n- [modules/Home/Search.php](modules/Home/Search.php)\n- [modules/Home/language/en_us.lang.php](modules/Home/language/en_us.lang.php)\n- [modules/OAuth2Clients/Menu.php](modules/OAuth2Clients/Menu.php)\n- [modules/OAuth2Tokens/Menu.php](modules/OAuth2Tokens/Menu.php)\n- [modules/Schedulers/Scheduler.php](modules/Schedulers/Scheduler.php)\n- [modules/Schedulers/_AddJobsHere.php](modules/Schedulers/_AddJobsHere.php)\n- [modules/Schedulers/language/en_us.lang.php](modules/Schedulers/language/en_us.lang.php)\n\n\u003c/details\u003e\n\n\n\nThe Administration Panel serves as the central control hub for SuiteCRM system configuration and management. It provides administrators with access to system settings, user management, scheduler configuration, and various maintenance tools. This document covers the admin panel structure, scheduler system integration, and key administrative functions.\n\nFor information about system installation and initial setup, see [Installation System](#5.1). For details about search configuration and maintenance, see [Search System](#5.3).\n\n## Admin Panel Architecture\n\nThe Administration Panel is organized into logical groups of related functionality, each containing specific configuration options and tools. The panel structure is defined through metadata files and presents a hierarchical interface for system management.\n\n```mermaid\ngraph TB\n    subgraph \"Admin Panel Groups\"\n        USERS[\"Users \u0026 Authentication\"]\n        SYSTEM[\"System Settings\"] \n        MODULES[\"Module Settings\"]\n        EMAIL[\"Email Management\"]\n        TOOLS[\"Admin Tools\"]\n        STUDIO[\"Studio \u0026 Development\"]\n        GOOGLE[\"Google Suite Integration\"]\n    end\n    \n    subgraph \"Core Admin Classes\"\n        AdminPanel[\"adminpaneldefs.php\"]\n        Controller[\"Administration Controller\"]\n        Configurator[\"Configurator\"]\n    end\n    \n    subgraph \"Key Subsystems\"\n        Scheduler[\"Scheduler System\"]\n        ElasticSearch[\"ElasticSearch Config\"]\n        EmailConfig[\"Email Configuration\"]\n        UserMgmt[\"User Management\"]\n    end\n    \n    AdminPanel --\u003e USERS\n    AdminPanel --\u003e SYSTEM\n    AdminPanel --\u003e MODULES\n    AdminPanel --\u003e EMAIL\n    AdminPanel --\u003e TOOLS\n    AdminPanel --\u003e STUDIO\n    AdminPanel --\u003e GOOGLE\n    \n    SYSTEM --\u003e Scheduler\n    SYSTEM --\u003e ElasticSearch\n    EMAIL --\u003e EmailConfig\n    USERS --\u003e UserMgmt\n    \n    Controller --\u003e Configurator\n    Configurator --\u003e \"config.php\"\n```\n\nSources: [modules/Administration/metadata/adminpaneldefs.php:44-498]()\n\n## Admin Panel Group Structure\n\nThe admin panel organizes functionality into distinct groups, each containing related configuration options and management tools:\n\n| Group | Key Components | Purpose |\n|-------|----------------|---------|\n| Users \u0026 Authentication | User Management, Password Policy, Role Management, Security Groups | User account and access control |\n| System | System Settings, Currencies, Languages, Locale, Scheduler | Core system configuration |\n| Module Settings | Activity Streams, Business Hours, Module Configuration | Module-specific settings |\n| Email Management | Inbound/Outbound Email, Campaign Settings, OAuth Connections | Email system configuration |\n| Admin Tools | Repair, Backup, Diagnostics, Module Loader | Maintenance and troubleshooting |\n| Studio \u0026 Development | Studio, Module Builder, Dropdown Editor, Workflow | Development and customization |\n| Google Suite | Calendar Settings, Maps Configuration | Google integration |\n\nSources: [modules/Administration/metadata/adminpaneldefs.php:98-449]()\n\n## Scheduler System Integration\n\nThe Scheduler system is a critical component accessible through the Administration Panel, responsible for executing background tasks and automated processes. It provides job queue management and periodic task execution capabilities.\n\n```mermaid\ngraph TB\n    subgraph \"Admin Interface\"\n        AdminUI[\"Administration Panel\"]\n        SchedulerUI[\"Scheduler Interface\"]\n    end\n    \n    subgraph \"Scheduler Core\"\n        SchedulerClass[\"Scheduler.php\"]\n        JobsFile[\"_AddJobsHere.php\"]\n        SchedulerJob[\"SchedulersJob\"]\n    end\n    \n    subgraph \"Job Types\"\n        EmailJobs[\"pollMonitoredInboxes\u003cbr/\u003erunMassEmailCampaign\u003cbr/\u003esendEmailReminders\"]\n        MaintenanceJobs[\"pruneDatabase\u003cbr/\u003etrimTracker\u003cbr/\u003ecleanJobQueue\"]\n        IndexJobs[\"runElasticSearchIndexerScheduler\u003cbr/\u003eaodIndexUnindexed\"]\n        SyncJobs[\"syncGoogleCalendar\u003cbr/\u003eprocessAOW_Workflow\"]\n    end\n    \n    subgraph \"Execution\"\n        CronTab[\"cron.php\"]\n        JobQueue[\"SugarJobQueue\"]\n        JobRunner[\"Job Execution\"]\n    end\n    \n    AdminUI --\u003e SchedulerUI\n    SchedulerUI --\u003e SchedulerClass\n    SchedulerClass --\u003e JobsFile\n    SchedulerClass --\u003e SchedulerJob\n    \n    JobsFile --\u003e EmailJobs\n    JobsFile --\u003e MaintenanceJobs  \n    JobsFile --\u003e IndexJobs\n    JobsFile --\u003e SyncJobs\n    \n    SchedulerClass --\u003e JobQueue\n    CronTab --\u003e JobQueue\n    JobQueue --\u003e JobRunner\n    \n    JobRunner --\u003e EmailJobs\n    JobRunner --\u003e MaintenanceJobs\n    JobRunner --\u003e IndexJobs\n    JobRunner --\u003e SyncJobs\n```\n\nSources: [modules/Schedulers/Scheduler.php:48-99](), [modules/Schedulers/_AddJobsHere.php:69-87]()\n\n### Scheduler Job Management\n\nThe Scheduler class provides comprehensive job management functionality, including job qualification checking, execution timing, and queue management:\n\n```mermaid\ngraph LR\n    subgraph \"Job Lifecycle\"\n        Create[\"createJob()\"]\n        Check[\"fireQualified()\"]\n        Submit[\"submitJob()\"]\n        Execute[\"Job Execution\"]\n        Complete[\"Job Completion\"]\n    end\n    \n    subgraph \"Timing Control\"\n        Interval[\"job_interval\"]\n        StartTime[\"date_time_start\"]\n        EndTime[\"date_time_end\"]\n        LastRun[\"last_run\"]\n    end\n    \n    subgraph \"Job Queue\"\n        Queue[\"SugarJobQueue\"]\n        Status[\"Job Status Tracking\"]\n        Cleanup[\"cleanJobQueue()\"]\n    end\n    \n    Check --\u003e Interval\n    Check --\u003e StartTime\n    Check --\u003e EndTime\n    Check --\u003e LastRun\n    \n    Create --\u003e Submit\n    Submit --\u003e Queue\n    Queue --\u003e Execute\n    Execute --\u003e Complete\n    Complete --\u003e Status\n    \n    Status --\u003e Cleanup\n```\n\nSources: [modules/Schedulers/Scheduler.php:148-211](), [modules/Schedulers/_AddJobsHere.php:540-558]()\n\n## ElasticSearch Administration\n\nThe Administration Panel includes dedicated configuration for ElasticSearch integration, providing connection management, indexing controls, and scheduler integration for search functionality.\n\n```mermaid\ngraph TB\n    subgraph \"ElasticSearch Admin UI\"\n        ESSettings[\"ElasticSearchSettings.php\"]\n        ESController[\"ElasticSearch Controller\"]\n        ESView[\"ElasticSearch View\"]\n        ESTemplate[\"view.tpl\"]\n    end\n    \n    subgraph \"Configuration Management\"\n        ESConfig[\"ElasticSearch Config\"]\n        Connection[\"Connection Testing\"]\n        Indexing[\"Index Management\"]\n    end\n    \n    subgraph \"Scheduler Integration\"\n        ESScheduler[\"ES Scheduler Jobs\"]\n        FullIndex[\"doFullIndex()\"]\n        PartialIndex[\"doPartialIndex()\"]\n        JobSubmission[\"scheduleIndex()\"]\n    end\n    \n    subgraph \"Core ElasticSearch\"\n        ESClient[\"ElasticSearch Client\"]\n        ESIndexer[\"ElasticSearchIndexer\"]\n        ESBuilder[\"ElasticSearchClientBuilder\"]\n    end\n    \n    ESSettings --\u003e ESController\n    ESController --\u003e ESView\n    ESView --\u003e ESTemplate\n    \n    ESController --\u003e ESConfig\n    ESController --\u003e Connection\n    ESController --\u003e Indexing\n    \n    ESController --\u003e FullIndex\n    ESController --\u003e PartialIndex\n    FullIndex --\u003e JobSubmission\n    PartialIndex --\u003e JobSubmission\n    \n    JobSubmission --\u003e ESScheduler\n    ESScheduler --\u003e ESIndexer\n    ESIndexer --\u003e ESClient\n    Connection --\u003e ESBuilder\n```\n\nSources: [modules/Administration/Search/ElasticSearch/Controller.php:66-217](), [modules/Administration/ElasticSearchSettings.php:44-55]()\n\n### ElasticSearch Configuration Interface\n\nThe ElasticSearch administration interface provides comprehensive configuration management:\n\n| Component | Function | Description |\n|-----------|----------|-------------|\n| `doSaveConfig()` | Configuration Persistence | Saves ES connection settings to config |\n| `doTestConnection()` | Connection Validation | Tests ES server connectivity and returns status |\n| `doFullIndex()` | Complete Indexing | Schedules full system reindexing |\n| `doPartialIndex()` | Incremental Indexing | Schedules partial/differential indexing |\n| `getSchedulers()` | Job Status | Retrieves ES-related scheduler job information |\n\nSources: [modules/Administration/Search/ElasticSearch/Controller.php:88-216]()\n\n## Key Administrative Functions\n\nThe Administration Panel provides access to several critical system management functions organized by functional area:\n\n### System Maintenance Tools\n\n```mermaid\ngraph LR\n    subgraph \"Repair Tools\"\n        RepairDB[\"Repair Database\"]\n        RepairRoles[\"Repair Roles\"]\n        RepairIndex[\"Repair Indexes\"]\n        RepairXSS[\"Remove XSS\"]\n    end\n    \n    subgraph \"Rebuild Tools\"\n        RebuildConfig[\"Rebuild Config\"]\n        RebuildRel[\"Rebuild Relationships\"]\n        RebuildJS[\"Rebuild JS Files\"]\n        RebuildSchedulers[\"Rebuild Schedulers\"]\n    end\n    \n    subgraph \"Cleanup Tools\"\n        PruneDB[\"pruneDatabase()\"]\n        TrimTracker[\"trimTracker()\"]\n        CleanQueue[\"cleanJobQueue()\"]\n        RemoveDocs[\"removeDocumentsFromFS()\"]\n    end\n    \n    RepairDB --\u003e RebuildConfig\n    RepairRoles --\u003e RebuildRel\n    \n    PruneDB --\u003e TrimTracker\n    TrimTracker --\u003e CleanQueue\n    CleanQueue --\u003e RemoveDocs\n```\n\nSources: [modules/Administration/language/en_us.lang.php:297-558](), [modules/Schedulers/_AddJobsHere.php:299-558]()\n\n### Email System Configuration\n\nThe Administration Panel provides comprehensive email system management through multiple configuration interfaces:\n\n| Configuration Area | Components | Purpose |\n|-------------------|------------|---------|\n| Inbound Email | Mailbox Setup, IMAP/POP3 Configuration | Incoming email processing |\n| Outbound Email | SMTP Configuration, Authentication | Outgoing email delivery |\n| Campaign Management | Mass Email Settings, Bounce Handling | Email marketing functionality |\n| OAuth Integration | External OAuth Providers/Connections | Modern authentication for email services |\n\nSources: [modules/Administration/metadata/adminpaneldefs.php:238-293]()\n\n## Configuration Management Architecture\n\nThe Administration Panel integrates with the core configuration system to persist settings and manage system state:\n\n```mermaid\ngraph TB\n    subgraph \"Admin Interface Layer\"\n        AdminActions[\"Admin Actions\"]\n        ConfigForms[\"Configuration Forms\"]\n        SettingsPages[\"Settings Pages\"]\n    end\n    \n    subgraph \"Configuration Layer\"  \n        Configurator[\"Configurator Class\"]\n        ConfigPHP[\"config.php\"]\n        AdminSettings[\"Administration Settings\"]\n    end\n    \n    subgraph \"Storage Layer\"\n        Database[\"SuiteCRM Database\"]\n        FileSystem[\"File System\"]\n        Cache[\"Configuration Cache\"]\n    end\n    \n    AdminActions --\u003e ConfigForms\n    ConfigForms --\u003e SettingsPages\n    SettingsPages --\u003e Configurator\n    \n    Configurator --\u003e ConfigPHP\n    Configurator --\u003e AdminSettings\n    \n    ConfigPHP --\u003e FileSystem\n    AdminSettings --\u003e Database\n    Database --\u003e Cache\n    FileSystem --\u003e Cache\n```\n\nSources: [modules/Administration/Search/ElasticSearch/Controller.php:97-110]()"])</script><script>self.__next_f.push([1,"26:T38b9,"])</script><script>self.__next_f.push([1,"# Search System\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [ModuleInstall/PackageManager/tpls/ModuleLoaderListView.tpl](ModuleInstall/PackageManager/tpls/ModuleLoaderListView.tpl)\n- [include/ListView/ListViewColumnsFilterLink.tpl](include/ListView/ListViewColumnsFilterLink.tpl)\n- [include/ListView/ListViewData.php](include/ListView/ListViewData.php)\n- [include/ListView/ListViewDisplay.php](include/ListView/ListViewDisplay.php)\n- [include/ListView/ListViewSearchLink.tpl](include/ListView/ListViewSearchLink.tpl)\n- [include/ListView/ListViewSmarty.php](include/ListView/ListViewSmarty.php)\n- [include/Popups/PopupSmarty.php](include/Popups/PopupSmarty.php)\n- [include/Popups/tpls/header.tpl](include/Popups/tpls/header.tpl)\n- [include/SearchForm/SearchForm.php](include/SearchForm/SearchForm.php)\n- [include/SearchForm/SearchForm2.php](include/SearchForm/SearchForm2.php)\n- [include/SearchForm/tpls/SearchFormGeneric.tpl](include/SearchForm/tpls/SearchFormGeneric.tpl)\n- [include/SearchForm/tpls/SearchFormGenericAdvanced.tpl](include/SearchForm/tpls/SearchFormGenericAdvanced.tpl)\n- [include/SearchForm/tpls/footer.tpl](include/SearchForm/tpls/footer.tpl)\n- [include/SearchForm/tpls/footerPopup.tpl](include/SearchForm/tpls/footerPopup.tpl)\n- [include/SearchForm/tpls/header.tpl](include/SearchForm/tpls/header.tpl)\n- [include/SearchForm/tpls/headerPopup.tpl](include/SearchForm/tpls/headerPopup.tpl)\n- [lib/Robo/Plugin/Commands/ElasticSearchCommands.php](lib/Robo/Plugin/Commands/ElasticSearchCommands.php)\n- [lib/Search/ElasticSearch/ElasticSearchClientBuilder.php](lib/Search/ElasticSearch/ElasticSearchClientBuilder.php)\n- [lib/Search/ElasticSearch/ElasticSearchHooks.php](lib/Search/ElasticSearch/ElasticSearchHooks.php)\n- [lib/Search/ElasticSearch/ElasticSearchIndexer.php](lib/Search/ElasticSearch/ElasticSearchIndexer.php)\n- [lib/Search/Index/AbstractIndexer.php](lib/Search/Index/AbstractIndexer.php)\n- [lib/Search/Index/Documentify/AbstractDocumentifier.php](lib/Search/Index/Documentify/AbstractDocumentifier.php)\n- [lib/Search/Index/Documentify/JsonSerializerDocumentifier.php](lib/Search/Index/Documentify/JsonSerializerDocumentifier.php)\n- [lib/Search/Index/Documentify/SearchDefsDocumentifier.php](lib/Search/Index/Documentify/SearchDefsDocumentifier.php)\n- [lib/Search/Index/Documentify/SearchDefsDocumentifier.yml](lib/Search/Index/Documentify/SearchDefsDocumentifier.yml)\n- [lib/Utility/BeanJsonSerializer.php](lib/Utility/BeanJsonSerializer.php)\n- [modules/SavedSearch/SavedSearch.php](modules/SavedSearch/SavedSearch.php)\n- [modules/SavedSearch/SavedSearchForm.tpl](modules/SavedSearch/SavedSearchForm.tpl)\n- [modules/SavedSearch/language/en_us.lang.php](modules/SavedSearch/language/en_us.lang.php)\n- [themes/SuiteP/include/SearchForm/tpls/SearchFormGeneric.tpl](themes/SuiteP/include/SearchForm/tpls/SearchFormGeneric.tpl)\n- [themes/SuiteP/include/SearchForm/tpls/SearchFormGenericAdvanced.tpl](themes/SuiteP/include/SearchForm/tpls/SearchFormGenericAdvanced.tpl)\n- [themes/SuiteP/include/SearchForm/tpls/footer.tpl](themes/SuiteP/include/SearchForm/tpls/footer.tpl)\n- [themes/SuiteP/include/SearchForm/tpls/header.tpl](themes/SuiteP/include/SearchForm/tpls/header.tpl)\n\n\u003c/details\u003e\n\n\n\n## Purpose and Scope\n\nThe Search System provides comprehensive search and filtering capabilities across SuiteCRM modules. It encompasses search form interfaces, result display through list views, ElasticSearch integration for enhanced search performance, and saved search functionality for persistent queries. This system handles both basic quick filters and advanced multi-field searches.\n\nFor ListView display configuration, see [User Interface System](#3). For ElasticSearch server configuration, see [Administration Panel](#5.2).\n\n## Core Architecture\n\nThe search system consists of four main components working together to provide a complete search experience:\n\n```mermaid\ngraph TB\n    subgraph \"Search Interface Layer\"\n        SF2[\"SearchForm2\u003cbr/\u003einclude/SearchForm/SearchForm2.php\"]\n        ST[\"Search Templates\u003cbr/\u003ethemes/SuiteP/include/SearchForm/tpls/\"]\n    end\n    \n    subgraph \"Display Layer\"\n        LVS[\"ListViewSmarty\u003cbr/\u003einclude/ListView/ListViewSmarty.php\"]\n        LVD[\"ListViewDisplay\u003cbr/\u003einclude/ListView/ListViewDisplay.php\"]\n        LVData[\"ListViewData\u003cbr/\u003einclude/ListView/ListViewData.php\"]\n    end\n    \n    subgraph \"Search Engines\"\n        SQL[\"Database Queries\u003cbr/\u003eSugarBean methods\"]\n        ES[\"ElasticSearchIndexer\u003cbr/\u003elib/Search/ElasticSearch/\"]\n    end\n    \n    subgraph \"Persistence Layer\"\n        SS[\"SavedSearch\u003cbr/\u003emodules/SavedSearch/SavedSearch.php\"]\n        DB[(saved_search table)]\n    end\n    \n    SF2 --\u003e LVS\n    SF2 --\u003e SS\n    LVS --\u003e LVData\n    LVData --\u003e SQL\n    LVData --\u003e ES\n    SS --\u003e DB\n    ST --\u003e SF2\n    \n    LVS --\u003e LVD\n```\n\nSources: [include/SearchForm/SearchForm2.php:1-1148](), [include/ListView/ListViewSmarty.php:1-367](), [lib/Search/ElasticSearch/ElasticSearchIndexer.php:1-592](), [modules/SavedSearch/SavedSearch.php:1-507]()\n\n## Search Form Framework\n\n### SearchForm2 Class\n\nThe `SearchForm2` class handles search form generation, field population, and query processing:\n\n| Component | Purpose | Key Methods |\n|-----------|---------|-------------|\n| Form Generation | Builds search forms from searchdefs | `_build_field_defs()`, `setup()` |\n| Field Processing | Populates form fields from request data | `populateFromArray()` |\n| Template Rendering | Generates HTML output | `display()` |\n| Tab Management | Handles basic/advanced search tabs | `_displayTabs()` |\n\n```mermaid\ngraph LR\n    subgraph \"SearchForm2 Workflow\"\n        Setup[\"setup()\u003cbr/\u003esearchdefs, displayView\"]\n        BuildFields[\"_build_field_defs()\u003cbr/\u003eProcess field definitions\"]\n        PopulateFields[\"populateFromArray()\u003cbr/\u003eFill from $_REQUEST\"]\n        Display[\"display()\u003cbr/\u003eRender templates\"]\n        \n        Setup --\u003e BuildFields\n        BuildFields --\u003e PopulateFields\n        PopulateFields --\u003e Display\n    end\n    \n    subgraph \"Template System\"\n        BasicTpl[\"SearchFormGeneric.tpl\u003cbr/\u003eBasic search\"]\n        AdvTpl[\"SearchFormGenericAdvanced.tpl\u003cbr/\u003eAdvanced search\"]\n        HeaderTpl[\"header.tpl\u003cbr/\u003eForm wrapper\"]\n    end\n    \n    Display --\u003e BasicTpl\n    Display --\u003e AdvTpl\n    Display --\u003e HeaderTpl\n```\n\nSources: [include/SearchForm/SearchForm2.php:95-171](), [include/SearchForm/SearchForm2.php:622-727](), [themes/SuiteP/include/SearchForm/tpls/SearchFormGeneric.tpl:1-116]()\n\n### Search Field Configuration\n\nSearch forms are configured through `searchdefs.php` files defining available search fields per module:\n\n```mermaid\ngraph TB\n    SearchDefs[\"searchdefs.php\u003cbr/\u003eField definitions\"]\n    FieldTypes[\"Field Types\u003cbr/\u003etext, enum, date, relate\"]\n    SearchForm[\"SearchForm2\u003cbr/\u003eField rendering\"]\n    Templates[\"Smarty Templates\u003cbr/\u003eField HTML output\"]\n    \n    SearchDefs --\u003e FieldTypes\n    FieldTypes --\u003e SearchForm\n    SearchForm --\u003e Templates\n```\n\nSources: [include/SearchForm/SearchForm2.php:626-640](), [include/SearchForm/SearchForm2.php:641-727]()\n\n## ListView Integration\n\n### Display Components\n\nThe ListView system renders search results through coordinated components:\n\n```mermaid\ngraph TB\n    subgraph \"ListView Architecture\"\n        LVDisplay[\"ListViewDisplay\u003cbr/\u003eBase display logic\"]\n        LVSmarty[\"ListViewSmarty\u003cbr/\u003eSmarty template rendering\"]\n        LVData[\"ListViewData\u003cbr/\u003eData retrieval \u0026 pagination\"]\n    end\n    \n    subgraph \"Data Processing\"\n        Bean[\"SugarBean\u003cbr/\u003eData model\"]\n        Query[\"SQL Queries\u003cbr/\u003eDatabase operations\"]\n        Filter[\"Filter Fields\u003cbr/\u003eWHERE clauses\"]\n    end\n    \n    subgraph \"UI Components\"\n        Templates[\"ListView Templates\u003cbr/\u003eResult display\"]\n        Pagination[\"Pagination Controls\u003cbr/\u003eNavigation\"]\n        Actions[\"Bulk Actions\u003cbr/\u003eMass operations\"]\n    end\n    \n    LVDisplay --\u003e LVSmarty\n    LVDisplay --\u003e LVData\n    LVData --\u003e Bean\n    LVData --\u003e Query\n    LVSmarty --\u003e Templates\n    LVSmarty --\u003e Pagination\n    LVSmarty --\u003e Actions\n    \n    Query --\u003e Filter\n```\n\nSources: [include/ListView/ListViewDisplay.php:48-242](), [include/ListView/ListViewSmarty.php:78-342](), [include/ListView/ListViewData.php:249-531]()\n\n### Search Result Processing\n\nListView processes search parameters and generates appropriate queries:\n\n| Method | Purpose | Location |\n|--------|---------|----------|\n| `getListViewData()` | Main data retrieval | [include/ListView/ListViewData.php:249-531]() |\n| `getOrderBy()` | Sort order handling | [include/ListView/ListViewData.php:85-117]() |\n| `process()` | Template data preparation | [include/ListView/ListViewSmarty.php:111-258]() |\n\nSources: [include/ListView/ListViewData.php:249-531](), [include/ListView/ListViewSmarty.php:111-258]()\n\n## ElasticSearch Integration\n\n### Indexing System\n\nThe ElasticSearch indexer maintains synchronized search indices for enhanced performance:\n\n```mermaid\ngraph TB\n    subgraph \"ElasticSearch Components\"\n        ESIndexer[\"ElasticSearchIndexer\u003cbr/\u003elib/Search/ElasticSearch/ElasticSearchIndexer.php\"]\n        ESClient[\"ElasticSearchClientBuilder\u003cbr/\u003eClient configuration\"]\n        ESHooks[\"ElasticSearchHooks\u003cbr/\u003eBean synchronization\"]\n    end\n    \n    subgraph \"Documentifiers\"\n        JsonDoc[\"JsonSerializerDocumentifier\u003cbr/\u003eBean to JSON conversion\"]\n        SearchDoc[\"SearchDefsDocumentifier\u003cbr/\u003eSearchDefs-based indexing\"]\n    end\n    \n    subgraph \"Index Operations\"\n        FullIndex[\"index()\u003cbr/\u003eFull reindexing\"]\n        DiffIndex[\"Differential indexing\u003cbr/\u003eChanged records only\"]\n        BeanIndex[\"indexBean()\u003cbr/\u003eSingle record\"]\n    end\n    \n    ESIndexer --\u003e ESClient\n    ESIndexer --\u003e JsonDoc\n    ESIndexer --\u003e SearchDoc\n    ESIndexer --\u003e FullIndex\n    ESIndexer --\u003e DiffIndex\n    ESIndexer --\u003e BeanIndex\n    ESHooks --\u003e ESIndexer\n```\n\nSources: [lib/Search/ElasticSearch/ElasticSearchIndexer.php:65-591](), [lib/Search/ElasticSearch/ElasticSearchHooks.php:56-209](), [lib/Search/Index/Documentify/JsonSerializerDocumentifier.php:1-73]()\n\n### Index Management\n\nElasticSearch indexing supports both full and differential modes:\n\n| Mode | Method | Use Case |\n|------|--------|----------|\n| Full | `index()` with `differentialIndexing = false` | Initial setup, complete refresh |\n| Differential | `index()` with `differentialIndexing = true` | Regular updates, performance |\n| Real-time | `ElasticSearchHooks` callbacks | Bean save/delete operations |\n\nSources: [lib/Search/ElasticSearch/ElasticSearchIndexer.php:112-164](), [lib/Search/ElasticSearch/ElasticSearchHooks.php:73-96]()\n\n## Saved Search Management\n\n### SavedSearch Class\n\nThe SavedSearch module provides persistent search query storage and retrieval:\n\n```mermaid\ngraph TB\n    subgraph \"SavedSearch Operations\"\n        SaveForm[\"getForm()\u003cbr/\u003eSearch form with save options\"]\n        SaveQuery[\"handleSave()\u003cbr/\u003ePersist search criteria\"]\n        LoadQuery[\"returnSavedSearch()\u003cbr/\u003eRestore saved parameters\"]\n        DeleteQuery[\"handleDelete()\u003cbr/\u003eRemove saved search\"]\n    end\n    \n    subgraph \"Data Storage\"\n        SSTable[\"saved_search table\u003cbr/\u003eDatabase persistence\"]\n        Contents[\"contents field\u003cbr/\u003eSerialized search data\"]\n        Meta[\"Metadata\u003cbr/\u003ename, module, user\"]\n    end\n    \n    subgraph \"UI Integration\"\n        Dropdown[\"Saved search selector\u003cbr/\u003eSavedSearchSelects.tpl\"]\n        ColumnChooser[\"TemplateGroupChooser\u003cbr/\u003eColumn selection\"]\n    end\n    \n    SaveForm --\u003e SaveQuery\n    SaveQuery --\u003e SSTable\n    LoadQuery --\u003e SSTable\n    SSTable --\u003e Contents\n    SSTable --\u003e Meta\n    SaveForm --\u003e Dropdown\n    SaveForm --\u003e ColumnChooser\n```\n\nSources: [modules/SavedSearch/SavedSearch.php:87-137](), [modules/SavedSearch/SavedSearch.php:352-418](), [modules/SavedSearch/SavedSearch.php:251-307]()\n\n### Search Persistence\n\nSaved searches store complete search state including:\n\n- Search field values and operators\n- Column display preferences\n- Sort order and pagination settings\n- Module context and user ownership\n\nSources: [modules/SavedSearch/SavedSearch.php:352-418](), [modules/SavedSearch/SavedSearch.php:139-208]()\n\n## Search Flow Architecture\n\nThe complete search process integrates all components:\n\n```mermaid\nsequenceDiagram\n    participant User\n    participant SearchForm2\n    participant ListViewData\n    participant Database\n    participant ElasticSearch\n    participant SavedSearch\n    \n    User-\u003e\u003eSearchForm2: Submit search criteria\n    SearchForm2-\u003e\u003eSearchForm2: _build_field_defs()\n    SearchForm2-\u003e\u003eSearchForm2: populateFromArray()\n    SearchForm2-\u003e\u003eListViewData: getListViewData()\n    \n    alt Database Search\n        ListViewData-\u003e\u003eDatabase: Execute SQL query\n        Database--\u003e\u003eListViewData: Return results\n    else ElasticSearch\n        ListViewData-\u003e\u003eElasticSearch: Search index\n        ElasticSearch--\u003e\u003eListViewData: Return IDs\n        ListViewData-\u003e\u003eDatabase: Fetch bean data\n    end\n    \n    ListViewData--\u003e\u003eSearchForm2: Search results\n    SearchForm2-\u003e\u003eUser: Display ListView\n    \n    opt Save Search\n        User-\u003e\u003eSavedSearch: Save current search\n        SavedSearch-\u003e\u003eDatabase: Store search criteria\n    end\n```\n\nSources: [include/SearchForm/SearchForm2.php:172-314](), [include/ListView/ListViewData.php:249-531](), [modules/SavedSearch/SavedSearch.php:352-418]()\n\n## Configuration and Customization\n\n### Module Search Configuration\n\nEach module defines searchable fields through `searchdefs.php`:\n\n```php\n// Example structure from searchdefs.php\n$searchdefs['ModuleName'] = array(\n    'layout' =\u003e array(\n        'basic_search' =\u003e array('field_name', 'another_field'),\n        'advanced_search' =\u003e array(\n            array('name' =\u003e 'field_name', 'label' =\u003e 'LBL_FIELD'),\n            array('name' =\u003e 'date_field', 'type' =\u003e 'date_range')\n        )\n    )\n);\n```\n\n### Template Customization\n\nSearch forms use Smarty templates that can be customized per theme:\n\n| Template | Purpose | Location |\n|----------|---------|----------|\n| `SearchFormGeneric.tpl` | Basic search layout | [themes/SuiteP/include/SearchForm/tpls/SearchFormGeneric.tpl:1-116]() |\n| `SearchFormGenericAdvanced.tpl` | Advanced search layout | [themes/SuiteP/include/SearchForm/tpls/SearchFormGenericAdvanced.tpl:1-180]() |\n| `header.tpl` | Form wrapper and JavaScript | [themes/SuiteP/include/SearchForm/tpls/header.tpl:1-135]() |\n\nSources: [include/SearchForm/SearchForm2.php:127-171](), [themes/SuiteP/include/SearchForm/tpls/SearchFormGeneric.tpl:1-116](), [themes/SuiteP/include/SearchForm/tpls/SearchFormGenericAdvanced.tpl:1-180]()"])</script><script>self.__next_f.push([1,"27:T247a,"])</script><script>self.__next_f.push([1,"# Development \u0026 Testing\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [.travis.yml](.travis.yml)\n- [README.md](README.md)\n- [composer.json](composer.json)\n- [composer.lock](composer.lock)\n- [files.md5](files.md5)\n- [include/utils.php](include/utils.php)\n- [modules/Import/tpls/last.tpl](modules/Import/tpls/last.tpl)\n- [modules/Import/tpls/listview.tpl](modules/Import/tpls/listview.tpl)\n- [php_version.php](php_version.php)\n- [suitecrm_version.php](suitecrm_version.php)\n- [tests/SuiteCRM/Test/Driver/PhpBrowserDriver.php](tests/SuiteCRM/Test/Driver/PhpBrowserDriver.php)\n- [tests/SuiteCRM/Test/Driver/WebDriver.php](tests/SuiteCRM/Test/Driver/WebDriver.php)\n- [tests/_envs/travis-ci-hub.yml](tests/_envs/travis-ci-hub.yml)\n- [tests/_support/AcceptanceTester.php](tests/_support/AcceptanceTester.php)\n- [themes/SuiteP/css/Dawn/style.css](themes/SuiteP/css/Dawn/style.css)\n- [themes/SuiteP/css/Dawn/variables.scss](themes/SuiteP/css/Dawn/variables.scss)\n- [themes/SuiteP/css/Day/style.css](themes/SuiteP/css/Day/style.css)\n- [themes/SuiteP/css/Day/variables.scss](themes/SuiteP/css/Day/variables.scss)\n- [themes/SuiteP/css/Dusk/style.css](themes/SuiteP/css/Dusk/style.css)\n- [themes/SuiteP/css/Dusk/variables.scss](themes/SuiteP/css/Dusk/variables.scss)\n- [themes/SuiteP/css/Night/style.css](themes/SuiteP/css/Night/style.css)\n- [themes/SuiteP/css/Night/variables.scss](themes/SuiteP/css/Night/variables.scss)\n- [themes/SuiteP/css/suitep-base/editview.scss](themes/SuiteP/css/suitep-base/editview.scss)\n- [themes/SuiteP/css/suitep-base/listview.scss](themes/SuiteP/css/suitep-base/listview.scss)\n- [themes/SuiteP/css/suitep-base/navbar.scss](themes/SuiteP/css/suitep-base/navbar.scss)\n- [travis.php.ini](travis.php.ini)\n\n\u003c/details\u003e\n\n\n\nThis section covers the development infrastructure, testing frameworks, and continuous integration systems that support SuiteCRM development. This includes automated testing suites, CI/CD pipelines, build tools, and development workflow processes.\n\nFor information about the API testing framework, see [API Architecture](#6.2). For details about installation and system configuration, see [Installation System](#5.1).\n\n## CI/CD Pipeline Architecture\n\nSuiteCRM uses Travis CI for continuous integration with a comprehensive pipeline that includes multiple test suites and validation stages.\n\n```mermaid\nflowchart TD\n    GIT[\"Git Push/PR\"] --\u003e TRAVIS[\"Travis CI Pipeline\"]\n    \n    TRAVIS --\u003e MATRIX[\"Build Matrix\"]\n    MATRIX --\u003e PHP74[\"PHP 7.4 / MySQL 5.7\"]\n    MATRIX --\u003e COMPOSER_VALIDATE[\"composer validate\"]\n    MATRIX --\u003e COVERAGE[\"code coverage\"]\n    \n    PHP74 --\u003e SETUP[\"Environment Setup\"]\n    SETUP --\u003e CHROME[\"Chrome Driver Setup\"]\n    SETUP --\u003e MYSQL_SETUP[\"MySQL Database Setup\"]\n    SETUP --\u003e APACHE[\"Apache/PHP-FPM Setup\"]\n    \n    MYSQL_SETUP --\u003e DB_CREATE[\"automated_tests DB\"]\n    APACHE --\u003e COMPOSER_INSTALL[\"composer install\"]\n    COMPOSER_INSTALL --\u003e CODECEPT_BUILD[\"codecept build\"]\n    \n    CODECEPT_BUILD --\u003e INSTALL_TEST[\"Installation Wizard Test\"]\n    INSTALL_TEST --\u003e UNIT_TESTS[\"PHPUnit Tests\"]\n    UNIT_TESTS --\u003e API_DATA[\"OAuth2 Demo Data\"]\n    API_DATA --\u003e API_TESTS[\"API Functional Tests\"]\n    API_TESTS --\u003e ACCEPTANCE[\"Acceptance Tests\"]\n    \n    COVERAGE --\u003e CODECOV[\"Codecov Upload\"]\n    ACCEPTANCE --\u003e LOGS[\"Error Log Collection\"]\n```\n\n**Travis CI Configuration Structure**\n\nSources: [.travis.yml:1-115]()\n\n## Testing Framework Architecture\n\nSuiteCRM uses Codeception as the primary testing framework with custom drivers and helper classes for web application testing.\n\n```mermaid\nclassDiagram\n    class AcceptanceTester {\n        +login(username, password)\n        +loginAsAdmin()\n        +logout()\n        +dontSeeMissingLabels()\n        +dontSeeErrors()\n        +navigateToPage(module, action, record)\n        +getFaker()\n    }\n    \n    class WebDriver {\n        +getInstanceURL()\n        +getAdminUser() \n        +getAdminPassword()\n        +waitForElementVisible()\n        +waitForElementNotVisible()\n        +fillField()\n        +click()\n    }\n    \n    class PhpBrowserDriver {\n        +browserstack configurations\n        +local testing setup\n    }\n    \n    class TravisEnvironment {\n        +url: \"http://localhost/\"\n        +port: 9515\n        +browser: chrome\n        +chromeOptions: headless\n    }\n    \n    AcceptanceTester --\u003e WebDriver : uses\n    AcceptanceTester --\u003e PhpBrowserDriver : alternative\n    WebDriver --\u003e TravisEnvironment : configured by\n    \n    class CodeceptionConfig {\n        +modules: enabled\n        +environments: travis-ci-hub\n        +support: _generated\n    }\n```\n\n**Test Infrastructure Components**\n\nSources: [tests/_support/AcceptanceTester.php:1-113](), [tests/SuiteCRM/Test/Driver/WebDriver.php:1-67](), [tests/_envs/travis-ci-hub.yml:1-18]()\n\n## Build System and Development Tools\n\nThe development workflow is managed through Composer for dependency management and Robo for build automation.\n\n```mermaid\nflowchart LR\n    subgraph \"Development Dependencies\"\n        CODECEPTION[\"codeception/codeception ^4.1\"]\n        PHPUNIT[\"phpunit/phpunit ^9.5\"]\n        FAKER[\"fakerphp/faker ^1.14\"]\n        MOCKERY[\"mockery/mockery ^1.1.0\"]\n        PHPSTAN[\"phpstan/phpstan ^1.10\"]\n        ROBO[\"consolidation/robo ^3.0\"]\n    end\n    \n    subgraph \"Production Dependencies\"\n        ELASTICSEARCH[\"elasticsearch/elasticsearch ^7.13\"]\n        SLIM[\"slim/slim ^3.8\"]\n        PHPMAILER[\"phpmailer/phpmailer ^6.0\"]\n        SMARTY[\"smarty/smarty ^4\"]\n    end\n    \n    subgraph \"Build Tools\"\n        COMPOSER_JSON[\"composer.json\"]\n        ROBO_FILE[\"RoboFile.php\"]\n        TRAVIS_CONFIG[\".travis.yml\"]\n    end\n    \n    COMPOSER_JSON --\u003e CODECEPTION\n    COMPOSER_JSON --\u003e PHPUNIT\n    COMPOSER_JSON --\u003e ELASTICSEARCH\n    COMPOSER_JSON --\u003e SLIM\n    \n    ROBO_FILE --\u003e BUILD_TASKS[\"Build Automation Tasks\"]\n    TRAVIS_CONFIG --\u003e CI_PIPELINE[\"Continuous Integration\"]\n    \n    BUILD_TASKS --\u003e CODE_COVERAGE[\"Code Coverage Reports\"]\n    CI_PIPELINE --\u003e AUTOMATED_TESTING[\"Automated Test Execution\"]\n```\n\n**Dependency and Build Configuration**\n\nSources: [composer.json:1-153](), [RoboFile.php:1](), [.travis.yml:69-71]()\n\n## Test Environment Configuration\n\nThe testing infrastructure supports multiple environments with specific configurations for different testing scenarios.\n\n| Environment | Purpose | Configuration |\n|-------------|---------|---------------|\n| `travis-ci-hub` | CI/CD Pipeline | Headless Chrome, localhost URL, port 9515 |\n| Local Development | Developer Testing | Custom WebDriver configurations |\n| BrowserStack | Cross-browser Testing | Remote browser automation |\n\n**Travis CI Environment Setup**\n\nThe CI environment includes comprehensive setup for web application testing:\n\n- **Database Setup**: Creates `automated_tests` database with UTF8MB4 collation\n- **Web Server**: Apache with PHP-FPM and mod_rewrite enabled\n- **Browser Testing**: Headless Chrome with ChromeDriver on port 9515\n- **Test Data**: OAuth2 demo data and test users loaded from SQL files\n\nSources: [.travis.yml:48-71](), [tests/_envs/travis-ci-hub.yml:1-18]()\n\n## Testing Workflow Process\n\n```mermaid\nsequenceDiagram\n    participant DEV as \"Developer\"\n    participant GIT as \"Git Repository\"\n    participant TRAVIS as \"Travis CI\"\n    participant CHROME as \"Chrome Driver\"\n    participant MYSQL as \"MySQL Database\"\n    participant CODECEPT as \"Codeception\"\n    \n    DEV-\u003e\u003eGIT: Push code changes\n    GIT-\u003e\u003eTRAVIS: Trigger CI pipeline\n    \n    TRAVIS-\u003e\u003eTRAVIS: PHP lint check on changed files\n    TRAVIS-\u003e\u003eMYSQL: Create automated_tests database\n    TRAVIS-\u003e\u003eCHROME: Start ChromeDriver on port 9515\n    TRAVIS-\u003e\u003eTRAVIS: Install composer dependencies\n    \n    TRAVIS-\u003e\u003eCODECEPT: Build test suites\n    CODECEPT-\u003e\u003eTRAVIS: Run installation wizard tests\n    CODECEPT-\u003e\u003eTRAVIS: Execute PHPUnit tests\n    \n    TRAVIS-\u003e\u003eMYSQL: Load OAuth2 demo data\n    TRAVIS-\u003e\u003eMYSQL: Load demo users\n    \n    CODECEPT-\u003e\u003eCHROME: Run API functional tests\n    CODECEPT-\u003e\u003eCHROME: Run acceptance tests\n    \n    TRAVIS-\u003e\u003eTRAVIS: Collect error logs\n    TRAVIS-\u003e\u003eTRAVIS: Upload coverage reports\n```\n\n**Testing Types and Coverage**\n\n1. **Installation Tests**: Verify the setup wizard functionality\n2. **Unit Tests**: PHPUnit-based component testing\n3. **API Tests**: Functional testing of V8 API endpoints with OAuth2\n4. **Acceptance Tests**: End-to-end browser automation tests\n5. **Code Coverage**: Comprehensive coverage reporting with Codecov integration\n\nSources: [.travis.yml:73-98](), [tests/_support/AcceptanceTester.php:60-89]()\n\n## Development Tools Integration\n\nThe development environment provides several tools for code quality and testing:\n\n**Static Analysis Tools**\n- `phpstan/phpstan` for static code analysis\n- `friendsofphp/php-cs-fixer` for code style enforcement\n- `rector/rector` for automated code refactoring\n\n**Testing Utilities**\n- `mikey179/vfsstream` for virtual filesystem testing\n- `jeroendesloovere/vcard` for vCard handling tests\n- `flow/jsonpath` for JSON data manipulation in tests\n\n**Build and Automation**\n- `consolidation/robo` provides task automation capabilities\n- Composer scripts handle post-install tasks and dependency management\n- Travis CI matrix builds ensure compatibility across different PHP versions\n\nSources: [composer.json:79-97](), [composer.json:130-134]()"])</script><script>self.__next_f.push([1,"28:T27c0,"])</script><script>self.__next_f.push([1,"# Testing \u0026 CI/CD\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [.travis.yml](.travis.yml)\n- [php_version.php](php_version.php)\n- [tests/SuiteCRM/Test/Driver/PhpBrowserDriver.php](tests/SuiteCRM/Test/Driver/PhpBrowserDriver.php)\n- [tests/SuiteCRM/Test/Driver/WebDriver.php](tests/SuiteCRM/Test/Driver/WebDriver.php)\n- [tests/_envs/travis-ci-hub.yml](tests/_envs/travis-ci-hub.yml)\n- [tests/_support/AcceptanceTester.php](tests/_support/AcceptanceTester.php)\n- [travis.php.ini](travis.php.ini)\n\n\u003c/details\u003e\n\n\n\n## Purpose and Scope\n\nThis document covers SuiteCRM's automated testing infrastructure and continuous integration/continuous deployment (CI/CD) processes. It explains the Travis CI configuration, Codeception testing framework, test execution pipeline, and code coverage reporting system. \n\nFor information about the installation system that is tested as part of the CI pipeline, see [Installation System](#5.1). For details about the API architecture that includes API testing, see [API Architecture](#6.2).\n\n## CI/CD Pipeline Architecture\n\nSuiteCRM uses Travis CI as its primary continuous integration platform, orchestrating multiple test suites and validation steps across different environments.\n\n### Travis CI Pipeline Flow\n\n```mermaid\nflowchart TD\n    trigger[\"GitHub Push/PR\"] --\u003e matrix[\"Travis CI Matrix\"]\n    \n    matrix --\u003e php74[\"PHP 7.4 / MySQL 5.7\"]\n    matrix --\u003e composer[\"Composer Validate\"]\n    matrix --\u003e coverage[\"Code Coverage\"]\n    \n    php74 --\u003e setup_env[\"Environment Setup\"]\n    setup_env --\u003e mysql_setup[\"MySQL Database Setup\"]\n    setup_env --\u003e chrome_setup[\"Chrome Driver Installation\"]\n    setup_env --\u003e apache_setup[\"Apache Configuration\"]\n    \n    mysql_setup --\u003e install_test[\"Installation Tests\"]\n    chrome_setup --\u003e install_test\n    apache_setup --\u003e install_test\n    \n    install_test --\u003e unit_tests[\"PHPUnit Tests\"]\n    unit_tests --\u003e oauth_setup[\"OAuth2 Demo Data\"]\n    oauth_setup --\u003e api_tests[\"API Functional Tests\"]\n    api_tests --\u003e acceptance_tests[\"Acceptance Tests\"]\n    \n    composer --\u003e composer_install[\"composer install\"]\n    composer_install --\u003e composer_validate[\"composer validate\"]\n    \n    coverage --\u003e codecept_install[\"Codeception Install Tests\"]\n    codecept_install --\u003e robo_coverage[\"Robo Code Coverage\"]\n    robo_coverage --\u003e codecov_upload[\"Codecov Upload\"]\n    \n    acceptance_tests --\u003e cleanup[\"Cleanup \u0026 Logging\"]\n    composer_validate --\u003e cleanup\n    codecov_upload --\u003e cleanup\n```\n\n**Sources:** [.travis.yml:1-115]()\n\n### Environment Configuration Matrix\n\nThe CI pipeline supports multiple testing environments and validation steps:\n\n| Test Type | PHP Version | Services | Purpose |\n|-----------|-------------|----------|---------|\n| Main Tests | 7.4 | MySQL 5.7, Elasticsearch, Chrome | Full test suite execution |\n| Composer Validation | 7.4 | None | Dependency validation |\n| Code Coverage | 7.4 | MySQL 5.7, Elasticsearch, Chrome | Coverage reporting |\n\n**Sources:** [.travis.yml:4-19]()\n\n## Testing Framework Architecture\n\nSuiteCRM uses the Codeception testing framework with custom drivers and support classes to handle different types of testing scenarios.\n\n### Codeception Framework Structure\n\n```mermaid\nclassDiagram\n    class AcceptanceTester {\n        +getFaker() Generator\n        +login(username, password)\n        +loginAsAdmin()\n        +logout()\n        +dontSeeMissingLabels()\n        +dontSeeErrors()\n        +visitPage(module, action, record)\n    }\n    \n    class WebDriver {\n        +initialWindowSize()\n        +waitForElementVisible(element, timeout)\n        +waitForElementNotVisible(element, timeout)\n        +waitForText(text, timeout, selector)\n    }\n    \n    class PhpBrowserDriver {\n        +_initialize()\n    }\n    \n    class CodeceptionWebDriver {\n        \u003c\u003cexternal\u003e\u003e\n    }\n    \n    class CodeceptionPhpBrowser {\n        \u003c\u003cexternal\u003e\u003e\n    }\n    \n    class CodeceptionActor {\n        \u003c\u003cexternal\u003e\u003e\n    }\n    \n    AcceptanceTester --|\u003e CodeceptionActor\n    WebDriver --|\u003e CodeceptionWebDriver\n    PhpBrowserDriver --|\u003e CodeceptionPhpBrowser\n    \n    AcceptanceTester --\u003e WebDriver : uses\n    WebDriver --\u003e ChromeDriver : controls\n    \n    class ChromeDriver {\n        \u003c\u003cexternal\u003e\u003e\n        port: 9515\n        binary: \"/usr/bin/google-chrome-stable\"\n        args: \"--headless --disable-gpu\"\n    }\n```\n\n**Sources:** [tests/_support/AcceptanceTester.php:1-126](), [tests/SuiteCRM/Test/Driver/WebDriver.php:1-95](), [tests/SuiteCRM/Test/Driver/PhpBrowserDriver.php:1-57]()\n\n### Test Environment Configuration\n\nThe testing framework supports different browser environments through configuration:\n\n```mermaid\ngraph TB\n    subgraph \"Test Environment Config\"\n        travis_config[\"travis-ci-hub.yml\"]\n        webdriver_config[\"WebDriver Configuration\"]\n        chrome_config[\"Chrome Options\"]\n    end\n    \n    subgraph \"Browser Automation\"\n        chrome_binary[\"/usr/bin/google-chrome-stable\"]\n        chromedriver[\"ChromeDriver Port 9515\"]\n        headless_mode[\"Headless Mode\"]\n    end\n    \n    subgraph \"Test Execution\"\n        acceptance_tests[\"Acceptance Tests\"]\n        webdriver_tests[\"WebDriver Tests\"]\n        browser_tests[\"Browser Tests\"]\n    end\n    \n    travis_config --\u003e webdriver_config\n    webdriver_config --\u003e chrome_config\n    chrome_config --\u003e chrome_binary\n    chrome_config --\u003e chromedriver\n    chrome_config --\u003e headless_mode\n    \n    chromedriver --\u003e acceptance_tests\n    headless_mode --\u003e webdriver_tests\n    chrome_binary --\u003e browser_tests\n```\n\n**Sources:** [tests/_envs/travis-ci-hub.yml:1-18]()\n\n## Test Types and Execution\n\nThe CI pipeline executes multiple test types in a specific sequence to ensure comprehensive validation.\n\n### Test Execution Flow\n\n| Phase | Test Type | Framework | Command | Purpose |\n|-------|-----------|-----------|---------|---------|\n| 1 | Installation | Codeception | `codecept run install` | Validates installation wizard |\n| 2 | Unit Tests | PHPUnit | `phpunit --configuration tests/phpunit.xml.dist` | Unit test execution |\n| 3 | API Tests | Codeception | `codecept run tests/api/V8/` | API functionality validation |\n| 4 | Acceptance Tests | Codeception | `codecept run acceptance` | End-to-end user scenarios |\n\n**Sources:** [.travis.yml:74-98]()\n\n### AcceptanceTester Helper Methods\n\nThe `AcceptanceTester` class provides specialized methods for common testing scenarios:\n\n#### Authentication Methods\n- `login($username, $password)` - Generic login functionality\n- `loginAsAdmin()` - Admin user login using configured credentials\n- `logout()` - User logout through menu navigation\n\n#### Validation Methods\n- `dontSeeMissingLabels()` - Ensures no untranslated labels (LBL_ prefixes)\n- `dontSeeErrors()` - Checks for PHP warnings, notices, and errors\n\n#### Navigation Methods\n- `visitPage($module, $action, $record = null)` - Navigate to specific SuiteCRM pages\n\n**Sources:** [tests/_support/AcceptanceTester.php:60-124]()\n\n## Environment Setup and Configuration\n\n### PHP Version Requirements\n\nSuiteCRM defines specific PHP version requirements for different environments:\n\n```php\ndefine('SUITECRM_PHP_MIN_VERSION', '7.4.0');\ndefine('SUITECRM_PHP_REC_VERSION', '7.4.0');\n```\n\n**Sources:** [php_version.php:7-10]()\n\n### Travis CI Environment Variables\n\nThe CI environment uses specific configuration variables:\n\n| Variable | Value | Purpose |\n|----------|-------|---------|\n| `INSTANCE_URL` | `http://localhost` | Base URL for testing |\n| `DATABASE_DRIVER` | `MYSQL` | Database type |\n| `DATABASE_NAME` | `automated_tests` | Test database name |\n| `DATABASE_HOST` | `localhost` | Database host |\n| `DATABASE_USER` | `automated_tests` | Database user |\n| `DATABASE_PASSWORD` | `automated_tests` | Database password |\n| `INSTANCE_ADMIN_USER` | `admin` | Default admin username |\n| `INSTANCE_ADMIN_PASSWORD` | `admin1` | Default admin password |\n\n**Sources:** [.travis.yml:31-32]()\n\n### Apache and PHP-FPM Configuration\n\nThe CI pipeline configures Apache with PHP-FPM for web server testing:\n\n```mermaid\ngraph LR\n    subgraph \"Web Server Setup\"\n        apache[\"Apache 2\"]\n        phpfpm[\"PHP-FPM\"]\n        fastcgi[\"FastCGI Module\"]\n    end\n    \n    subgraph \"Configuration Files\"\n        vhost[\"travis-ci-apache\"]\n        phpini[\"travis.php.ini\"]\n        fpmconf[\"php-fpm.conf\"]\n    end\n    \n    subgraph \"Test Execution\"\n        chromedriver[\"ChromeDriver\"]\n        codeception[\"Codeception Tests\"]\n        webdriver[\"WebDriver\"]\n    end\n    \n    vhost --\u003e apache\n    phpini --\u003e phpfpm\n    fpmconf --\u003e phpfpm\n    fastcgi --\u003e apache\n    \n    apache --\u003e chromedriver\n    phpfpm --\u003e codeception\n    chromedriver --\u003e webdriver\n```\n\n**Sources:** [.travis.yml:52-68]()\n\n## Code Coverage and Reporting\n\n### Coverage Collection Process\n\nThe code coverage pipeline uses multiple tools for comprehensive coverage reporting:\n\n```mermaid\nsequenceDiagram\n    participant CI as \"Travis CI\"\n    participant Codecept as \"Codeception\"\n    participant Robo as \"Robo Task Runner\" \n    participant Codecov as \"Codecov Service\"\n    \n    CI-\u003e\u003eCodecept: Run install tests with coverage\n    Codecept-\u003e\u003eCI: Generate coverage data\n    CI-\u003e\u003eRobo: Execute code:coverage task\n    Robo-\u003e\u003eCI: Process coverage reports\n    CI-\u003e\u003eCodecov: Upload coverage.xml\n    Codecov-\u003e\u003eCI: Generate coverage reports\n```\n\nThe coverage collection command sequence:\n1. `./vendor/bin/codecept run install --env travis-ci-hub -f --ext DotReporter`\n2. `./vendor/bin/robo code:coverage --ci`\n3. `bash \u003c(curl -s https://codecov.io/bash) -f tests/_output/coverage.xml`\n\n**Sources:** [.travis.yml:19]()\n\n### PHP Configuration for Testing\n\nTravis CI uses a custom PHP configuration to optimize testing performance:\n\n```ini\nmemory_limit = -1\ndisplay_errors = On\nlog_errors = On\ntrace_errors = On\nerror_log = error.log\n```\n\n**Sources:** [travis.php.ini:1-6]()\n\n## Branch-Based CI Execution\n\nThe CI pipeline executes on specific branches to ensure proper testing coverage:\n\n- `master` - Production branch\n- `develop` - Development branch  \n- `hotfix.*` - Hotfix branches\n- `feature.*` - Feature branches\n- `fix.*` - Bug fix branches\n- `staging.*` - Staging branches\n\n**Sources:** [.travis.yml:107-115]()"])</script><script>self.__next_f.push([1,"29:T3329,"])</script><script>self.__next_f.push([1,"# API Architecture\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [README.md](README.md)\n- [composer.json](composer.json)\n- [composer.lock](composer.lock)\n- [files.md5](files.md5)\n- [include/utils.php](include/utils.php)\n- [modules/Import/tpls/last.tpl](modules/Import/tpls/last.tpl)\n- [modules/Import/tpls/listview.tpl](modules/Import/tpls/listview.tpl)\n- [suitecrm_version.php](suitecrm_version.php)\n- [themes/SuiteP/css/Dawn/style.css](themes/SuiteP/css/Dawn/style.css)\n- [themes/SuiteP/css/Dawn/variables.scss](themes/SuiteP/css/Dawn/variables.scss)\n- [themes/SuiteP/css/Day/style.css](themes/SuiteP/css/Day/style.css)\n- [themes/SuiteP/css/Day/variables.scss](themes/SuiteP/css/Day/variables.scss)\n- [themes/SuiteP/css/Dusk/style.css](themes/SuiteP/css/Dusk/style.css)\n- [themes/SuiteP/css/Dusk/variables.scss](themes/SuiteP/css/Dusk/variables.scss)\n- [themes/SuiteP/css/Night/style.css](themes/SuiteP/css/Night/style.css)\n- [themes/SuiteP/css/Night/variables.scss](themes/SuiteP/css/Night/variables.scss)\n- [themes/SuiteP/css/suitep-base/editview.scss](themes/SuiteP/css/suitep-base/editview.scss)\n- [themes/SuiteP/css/suitep-base/listview.scss](themes/SuiteP/css/suitep-base/listview.scss)\n- [themes/SuiteP/css/suitep-base/navbar.scss](themes/SuiteP/css/suitep-base/navbar.scss)\n\n\u003c/details\u003e\n\n\n\nThis document covers the SuiteCRM V8 REST API architecture, including its core components, authentication mechanisms, request flow, and service layer organization. The API provides programmatic access to SuiteCRM's business entities and functionality through a RESTful interface following JSON API specifications.\n\nFor information about user interface interactions, see [User Interface System](#3). For database and data layer details, see [Data Layer (SugarBean)](#2.2).\n\n## Overview\n\nThe SuiteCRM API architecture is built around a modern REST API implementation (V8) that provides standardized access to CRM data and operations. The system follows a layered architecture with clear separation between authentication, routing, business logic, and data persistence.\n\n```mermaid\ngraph TB\n    subgraph \"API Layer\"\n        API[\"Api/index.php\"]\n        Core[\"Api/Core/app.php\"]\n    end\n    \n    subgraph \"V8 API Implementation\"\n        Routes[\"Api/V8/Config/routes.php\"]\n        Controllers[\"Api/V8/Controller/*\"]\n        Services[\"Api/V8/Service/*\"]\n        OAuth[\"Api/V8/OAuth2/*\"]\n    end\n    \n    subgraph \"Middleware \u0026 Processing\"\n        Middleware[\"Api/V8/Middleware/*\"]\n        Params[\"Api/V8/Param/*\"]\n        JsonApi[\"Api/V8/JsonApi/*\"]\n    end\n    \n    subgraph \"Data Layer\"\n        SugarBean[\"SugarBean ORM\"]\n        Database[(\"Database\")]\n    end\n    \n    API --\u003e Core\n    Core --\u003e Routes\n    Routes --\u003e Controllers\n    Controllers --\u003e Services\n    Services --\u003e SugarBean\n    SugarBean --\u003e Database\n    \n    OAuth --\u003e Controllers\n    Middleware --\u003e Controllers\n    Params --\u003e Controllers\n    JsonApi --\u003e Controllers\n```\n\nSources: [Api/index.php](), [Api/Core/app.php](), [Api/V8/Config/routes.php]()\n\n## V8 API Structure\n\nThe V8 API represents the current generation of SuiteCRM's REST API, implementing a comprehensive set of endpoints for module management, user operations, and system administration.\n\n### Core Components\n\n| Component | Location | Purpose |\n|-----------|----------|---------|\n| Entry Point | `Api/index.php` | Main API entry point and bootstrap |\n| Application Core | `Api/Core/app.php` | Slim framework application setup |\n| Route Configuration | `Api/V8/Config/routes.php` | API endpoint definitions |\n| Service Container | `Api/V8/Config/services.php` | Dependency injection configuration |\n\n```mermaid\ngraph LR\n    subgraph \"Request Flow\"\n        Entry[\"Api/index.php\"] --\u003e AppCore[\"Api/Core/app.php\"]\n        AppCore --\u003e RouteConfig[\"Api/V8/Config/routes.php\"]\n        RouteConfig --\u003e Controller[\"Controller\"]\n    end\n    \n    subgraph \"Service Layer\"\n        Controller --\u003e Service[\"Service\"]\n        Service --\u003e Bean[\"SugarBean\"]\n    end\n    \n    subgraph \"Response Processing\"\n        Service --\u003e JsonApi[\"JSON API Response\"]\n        JsonApi --\u003e Client[\"API Client\"]\n    end\n```\n\nSources: [Api/index.php](), [Api/Core/app.php](), [Api/V8/Config/routes.php](), [Api/V8/Config/services.php]()\n\n## Authentication System\n\nThe API implements OAuth2 authentication with support for client credentials and refresh token flows.\n\n### OAuth2 Implementation\n\n```mermaid\ngraph TB\n    subgraph \"OAuth2 Entities\"\n        ClientEntity[\"Api/V8/OAuth2/Entity/ClientEntity.php\"]\n        UserEntity[\"Api/V8/OAuth2/Entity/UserEntity.php\"]\n        AccessToken[\"Api/V8/OAuth2/Entity/AccessTokenEntity.php\"]\n        RefreshToken[\"Api/V8/OAuth2/Entity/RefreshTokenEntity.php\"]\n    end\n    \n    subgraph \"OAuth2 Repositories\"\n        ClientRepo[\"Api/V8/OAuth2/Repository/ClientRepository.php\"]\n        UserRepo[\"Api/V8/OAuth2/Repository/UserRepository.php\"]\n        AccessRepo[\"Api/V8/OAuth2/Repository/AccessTokenRepository.php\"]\n        RefreshRepo[\"Api/V8/OAuth2/Repository/RefreshTokenRepository.php\"]\n        ScopeRepo[\"Api/V8/OAuth2/Repository/ScopeRepository.php\"]\n    end\n    \n    ClientEntity --\u003e ClientRepo\n    UserEntity --\u003e UserRepo\n    AccessToken --\u003e AccessRepo\n    RefreshToken --\u003e RefreshRepo\n```\n\n### Authentication Flow\n\n| Step | Component | Description |\n|------|-----------|-------------|\n| 1 | Client Registration | OAuth2 client credentials setup |\n| 2 | Token Request | Client requests access token using credentials |\n| 3 | Token Validation | API validates token for each request |\n| 4 | Token Refresh | Refresh tokens extend session lifecycle |\n\nSources: [Api/V8/OAuth2/Entity/](), [Api/V8/OAuth2/Repository/]()\n\n## Controller Layer\n\nThe controller layer handles HTTP request routing and delegates business logic to appropriate services.\n\n### Primary Controllers\n\n```mermaid\ngraph TB\n    BaseController[\"Api/V8/Controller/BaseController.php\"]\n    \n    subgraph \"Entity Controllers\"\n        ModuleController[\"Api/V8/Controller/ModuleController.php\"]\n        UserController[\"Api/V8/Controller/UserController.php\"]\n        RelationshipController[\"Api/V8/Controller/RelationshipController.php\"]\n    end\n    \n    subgraph \"View Controllers\"\n        ListViewController[\"Api/V8/Controller/ListViewController.php\"]\n        ListViewSearchController[\"Api/V8/Controller/ListViewSearchController.php\"]\n    end\n    \n    subgraph \"System Controllers\"\n        MetaController[\"Api/V8/Controller/MetaController.php\"]\n        UserPreferencesController[\"Api/V8/Controller/UserPreferencesController.php\"]\n        LogoutController[\"Api/V8/Controller/LogoutController.php\"]\n    end\n    \n    BaseController --\u003e ModuleController\n    BaseController --\u003e UserController\n    BaseController --\u003e RelationshipController\n    BaseController --\u003e ListViewController\n    BaseController --\u003e ListViewSearchController\n    BaseController --\u003e MetaController\n    BaseController --\u003e UserPreferencesController\n    BaseController --\u003e LogoutController\n```\n\n### Controller Responsibilities\n\n| Controller | Primary Function | Key Methods |\n|------------|------------------|-------------|\n| `ModuleController` | CRUD operations on modules | GET, POST, PATCH, DELETE |\n| `UserController` | User account management | User authentication, profile |\n| `RelationshipController` | Entity relationship management | Link/unlink related records |\n| `ListViewController` | List view data retrieval | Paginated module records |\n| `MetaController` | Metadata and configuration | Field definitions, module info |\n\nSources: [Api/V8/Controller/BaseController.php](), [Api/V8/Controller/ModuleController.php](), [Api/V8/Controller/UserController.php]()\n\n## Service Layer\n\nThe service layer encapsulates business logic and provides a clean interface between controllers and data access.\n\n```mermaid\ngraph LR\n    subgraph \"Service Layer\"\n        ModuleService[\"Api/V8/Service/ModuleService.php\"]\n        UserService[\"Api/V8/Service/UserService.php\"]\n        RelationshipService[\"Api/V8/Service/RelationshipService.php\"]\n        ListViewService[\"Api/V8/Service/ListViewService.php\"]\n        ListViewSearchService[\"Api/V8/Service/ListViewSearchService.php\"]\n        MetaService[\"Api/V8/Service/MetaService.php\"]\n        UserPreferencesService[\"Api/V8/Service/UserPreferencesService.php\"]\n        LogoutService[\"Api/V8/Service/LogoutService.php\"]\n    end\n    \n    subgraph \"Data Access\"\n        BeanManager[\"Api/V8/BeanDecorator/BeanManager.php\"]\n        SugarBean[\"SugarBean\"]\n    end\n    \n    ModuleService --\u003e BeanManager\n    UserService --\u003e BeanManager\n    RelationshipService --\u003e BeanManager\n    ListViewService --\u003e BeanManager\n    BeanManager --\u003e SugarBean\n```\n\n### Service Operations\n\n| Service | Core Functionality |\n|---------|-------------------|\n| `ModuleService` | Module CRUD, validation, business rules |\n| `UserService` | User authentication, session management |\n| `RelationshipService` | Entity relationship operations |\n| `ListViewService` | Data retrieval with filtering, sorting |\n| `MetaService` | System metadata and configuration |\n\nSources: [Api/V8/Service/ModuleService.php](), [Api/V8/Service/UserService.php](), [Api/V8/Service/RelationshipService.php]()\n\n## JSON API Implementation\n\nThe API follows JSON API specification for consistent request/response formatting.\n\n### Response Structure Components\n\n```mermaid\ngraph TB\n    subgraph \"JSON API Response Objects\"\n        DocumentResponse[\"Api/V8/JsonApi/Response/DocumentResponse.php\"]\n        DataResponse[\"Api/V8/JsonApi/Response/DataResponse.php\"]\n        ErrorResponse[\"Api/V8/JsonApi/Response/ErrorResponse.php\"]\n        MetaResponse[\"Api/V8/JsonApi/Response/MetaResponse.php\"]\n        LinksResponse[\"Api/V8/JsonApi/Response/LinksResponse.php\"]\n        AttributeResponse[\"Api/V8/JsonApi/Response/AttributeResponse.php\"]\n        RelationshipResponse[\"Api/V8/JsonApi/Response/RelationshipResponse.php\"]\n        PaginationResponse[\"Api/V8/JsonApi/Response/PaginationResponse.php\"]\n    end\n    \n    DocumentResponse --\u003e DataResponse\n    DocumentResponse --\u003e ErrorResponse\n    DocumentResponse --\u003e MetaResponse\n    DocumentResponse --\u003e LinksResponse\n    DataResponse --\u003e AttributeResponse\n    DataResponse --\u003e RelationshipResponse\n    LinksResponse --\u003e PaginationResponse\n```\n\n### Helper Components\n\n| Component | Purpose |\n|-----------|---------|\n| `AttributeObjectHelper` | Processes entity attributes |\n| `RelationshipObjectHelper` | Manages entity relationships |\n| `PaginationObjectHelper` | Handles pagination metadata |\n\nSources: [Api/V8/JsonApi/Response/](), [Api/V8/JsonApi/Helper/]()\n\n## Request Processing Pipeline\n\n### Middleware System\n\n```mermaid\ngraph LR\n    Request[\"HTTP Request\"] --\u003e ParamsMiddleware[\"Api/V8/Middleware/ParamsMiddleware.php\"]\n    ParamsMiddleware --\u003e Authentication[\"OAuth2 Validation\"]\n    Authentication --\u003e Controller[\"Controller Method\"]\n    Controller --\u003e Service[\"Service Layer\"]\n    Service --\u003e JsonApiResponse[\"JSON API Response\"]\n    JsonApiResponse --\u003e HTTPResponse[\"HTTP Response\"]\n```\n\n### Parameter Processing\n\nThe API uses a comprehensive parameter system for request validation and processing:\n\n| Parameter Type | Location | Purpose |\n|---------------|----------|---------|\n| Base Parameters | `Api/V8/Param/BaseParam.php` | Common parameter handling |\n| Module Parameters | `Api/V8/Param/*ModuleParams.php` | Module-specific operations |\n| Options | `Api/V8/Param/Options/` | Query options (filters, sorting) |\n\n### Request Flow Example\n\n```mermaid\nsequenceDiagram\n    participant Client\n    participant API[\"Api/index.php\"]\n    participant Auth[\"OAuth2\"]\n    participant Controller\n    participant Service\n    participant Bean[\"SugarBean\"]\n    \n    Client-\u003e\u003eAPI: HTTP Request\n    API-\u003e\u003eAuth: Validate Token\n    Auth--\u003e\u003eAPI: Token Valid\n    API-\u003e\u003eController: Route Request\n    Controller-\u003e\u003eService: Business Logic\n    Service-\u003e\u003eBean: Data Operation\n    Bean--\u003e\u003eService: Data Result\n    Service--\u003e\u003eController: Service Response\n    Controller--\u003e\u003eAPI: JSON API Response\n    API--\u003e\u003eClient: HTTP Response\n```\n\nSources: [Api/V8/Middleware/ParamsMiddleware.php](), [Api/V8/Param/BaseParam.php](), [Api/V8/Param/Options/]()\n\n## Configuration and Routing\n\n### Service Configuration\n\nThe API uses dependency injection configured through service definitions:\n\n| Configuration File | Purpose |\n|-------------------|---------|\n| `services.php` | Main service container setup |\n| `controllers.php` | Controller service definitions |\n| `factories.php` | Factory service definitions |\n| `middlewares.php` | Middleware configuration |\n| `validators.php` | Validation service setup |\n\n### Route Management\n\nRoutes are defined in `Api/V8/Config/routes.php` and follow REST conventions:\n\n- `GET /modules/{module}` - List module records\n- `POST /modules/{module}` - Create module record  \n- `GET /modules/{module}/{id}` - Get specific record\n- `PATCH /modules/{module}/{id}` - Update record\n- `DELETE /modules/{module}/{id}` - Delete record\n\nSources: [Api/V8/Config/services.php](), [Api/V8/Config/routes.php](), [Api/V8/Config/services/]()"])</script><script>self.__next_f.push([1,"2a:T37a7,"])</script><script>self.__next_f.push([1,"# External Integrations\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [include/GoogleSync/GoogleSync.php](include/GoogleSync/GoogleSync.php)\n- [include/GoogleSync/GoogleSyncBase.php](include/GoogleSync/GoogleSyncBase.php)\n- [include/GoogleSync/GoogleSyncExceptions.php](include/GoogleSync/GoogleSyncExceptions.php)\n- [include/GoogleSync/GoogleSyncHelper.php](include/GoogleSync/GoogleSyncHelper.php)\n- [lib/Robo/Plugin/Commands/ElasticSearchCommands.php](lib/Robo/Plugin/Commands/ElasticSearchCommands.php)\n- [lib/Search/ElasticSearch/ElasticSearchClientBuilder.php](lib/Search/ElasticSearch/ElasticSearchClientBuilder.php)\n- [lib/Search/ElasticSearch/ElasticSearchHooks.php](lib/Search/ElasticSearch/ElasticSearchHooks.php)\n- [lib/Search/ElasticSearch/ElasticSearchIndexer.php](lib/Search/ElasticSearch/ElasticSearchIndexer.php)\n- [lib/Search/Index/AbstractIndexer.php](lib/Search/Index/AbstractIndexer.php)\n- [lib/Search/Index/Documentify/AbstractDocumentifier.php](lib/Search/Index/Documentify/AbstractDocumentifier.php)\n- [lib/Search/Index/Documentify/JsonSerializerDocumentifier.php](lib/Search/Index/Documentify/JsonSerializerDocumentifier.php)\n- [lib/Search/Index/Documentify/SearchDefsDocumentifier.php](lib/Search/Index/Documentify/SearchDefsDocumentifier.php)\n- [lib/Search/Index/Documentify/SearchDefsDocumentifier.yml](lib/Search/Index/Documentify/SearchDefsDocumentifier.yml)\n- [lib/Utility/BeanJsonSerializer.php](lib/Utility/BeanJsonSerializer.php)\n- [modules/Configurator/language/en_us.lang.php](modules/Configurator/language/en_us.lang.php)\n- [modules/Configurator/tpls/EditView.tpl](modules/Configurator/tpls/EditView.tpl)\n- [modules/Configurator/views/view.edit.php](modules/Configurator/views/view.edit.php)\n- [modules/Users/GoogleApiKeySaverEntryPoint.php](modules/Users/GoogleApiKeySaverEntryPoint.php)\n- [modules/Users/entryPointSaveGoogleApiKey.php](modules/Users/entryPointSaveGoogleApiKey.php)\n- [modules/Users/googleApiKeySaverEntryPointError.tpl](modules/Users/googleApiKeySaverEntryPointError.tpl)\n- [tests/unit/phpunit/lib/Search/UI/SearchResultsControllerTest.php](tests/unit/phpunit/lib/Search/UI/SearchResultsControllerTest.php)\n- [tests/unit/phpunit/lib/SuiteCRM/Log/CliLoggerHandlerTest.php](tests/unit/phpunit/lib/SuiteCRM/Log/CliLoggerHandlerTest.php)\n- [tests/unit/phpunit/lib/SuiteCRM/Search/AbstractDocumentifierTest.php](tests/unit/phpunit/lib/SuiteCRM/Search/AbstractDocumentifierTest.php)\n- [tests/unit/phpunit/lib/SuiteCRM/Search/ElasticSearch/ElasticSearchClientBuilderTest.php](tests/unit/phpunit/lib/SuiteCRM/Search/ElasticSearch/ElasticSearchClientBuilderTest.php)\n- [tests/unit/phpunit/lib/SuiteCRM/Search/ElasticSearch/ElasticSearchEngineTest.php](tests/unit/phpunit/lib/SuiteCRM/Search/ElasticSearch/ElasticSearchEngineTest.php)\n- [tests/unit/phpunit/lib/SuiteCRM/Search/ElasticSearch/ElasticSearchIndexerTest.php](tests/unit/phpunit/lib/SuiteCRM/Search/ElasticSearch/ElasticSearchIndexerTest.php)\n- [tests/unit/phpunit/lib/SuiteCRM/Search/SearchTestAbstract.php](tests/unit/phpunit/lib/SuiteCRM/Search/SearchTestAbstract.php)\n- [tests/unit/phpunit/lib/SuiteCRM/Search/SearchWrapperTest.php](tests/unit/phpunit/lib/SuiteCRM/Search/SearchWrapperTest.php)\n- [tests/unit/phpunit/lib/SuiteCRM/Utility/ArrayMapperTest.php](tests/unit/phpunit/lib/SuiteCRM/Utility/ArrayMapperTest.php)\n- [tests/unit/phpunit/lib/SuiteCRM/Utility/BeanJsonSerializerTest.php](tests/unit/phpunit/lib/SuiteCRM/Utility/BeanJsonSerializerTest.php)\n- [tests/unit/phpunit/modules/Administration/BaseHandlerTest.php](tests/unit/phpunit/modules/Administration/BaseHandlerTest.php)\n- [tests/unit/phpunit/modules/Users/GoogleApiKeySaverEntryPointMock.php](tests/unit/phpunit/modules/Users/GoogleApiKeySaverEntryPointMock.php)\n- [tests/unit/phpunit/modules/Users/GoogleApiKeySaverEntryPointTest.php](tests/unit/phpunit/modules/Users/GoogleApiKeySaverEntryPointTest.php)\n\n\u003c/details\u003e\n\n\n\n## Purpose and Scope\n\nThis document covers SuiteCRM's external service integrations, which extend the platform's capabilities by connecting to third-party systems. The primary integrations are ElasticSearch for advanced search functionality and Google Calendar for calendar synchronization.\n\nFor information about the core search system and its UI components, see [Search System](#5.3). For general API architecture and service layers, see [API Architecture](#6.2).\n\n## ElasticSearch Integration\n\nThe ElasticSearch integration provides advanced full-text search capabilit
