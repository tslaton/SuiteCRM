uickCreate.tpl](themes/SuiteP/include/EditView/QuickCreate.tpl)\n- [themes/SuiteP/js/style.js](themes/SuiteP/js/style.js)\n- [themes/SuiteP/modules/Studio/TabGroups/EditViewTabs.tpl](themes/SuiteP/modules/Studio/TabGroups/EditViewTabs.tpl)\n- [themes/SuiteP/tpls/_headerModuleList.tpl](themes/SuiteP/tpls/_headerModuleList.tpl)\n- [themes/SuiteP/tpls/footer.tpl](themes/SuiteP/tpls/footer.tpl)\n\n\u003c/details\u003e\n\n\n\nThis document covers SuiteCRM's theme management system, which provides the presentation layer architecture for customizing the user interface. The theme system manages visual styling, layout templates, and responsive behavior across different devices and screen sizes.\n\nFor information about the underlying MVC framework that renders these themes, see [MVC Framework](#2.1). For configuration management that themes integrate with, see [Configuration System](#2.3).\n\n## Overview\n\nSuiteCRM's theme management system consists of theme directories containing Smarty templates, CSS stylesheets, JavaScript files, and configuration definitions. The system supports multiple themes with the primary themes being SuiteP (modern responsive theme) and SuiteR (legacy theme). Administrators can configure theme settings, enable/disable themes, and customize theme-specific parameters through the Administration panel.\n\n## Theme Architecture\n\nThe theme system follows a structured architecture where themes are self-contained packages with their own templates, assets, and configuration.\n\n```mermaid\ngraph TD\n    ThemeRegistry[\"SugarThemeRegistry\"] --\u003e SuiteP[\"SuiteP Theme\"]\n    ThemeRegistry --\u003e SuiteR[\"SuiteR Theme\"]\n    \n    SuiteP --\u003e SuitePTemplates[\"Templates (.tpl)\"]\n    SuiteP --\u003e SuitePCSS[\"Stylesheets (.css)\"]\n    SuiteP --\u003e SuitePJS[\"JavaScript (.js)\"]\n    SuiteP --\u003e SuitePConfig[\"theme.php Config\"]\n    \n    SuitePTemplates --\u003e HeaderTpl[\"_headerModuleList.tpl\"]\n    SuitePTemplates --\u003e DetailViewTpl[\"DetailView.tpl\"]\n    SuitePTemplates --\u003e FooterTpl[\"footer.tpl\"]\n    \n    SuitePJS --\u003e StyleJS[\"style.js\"]\n    \n    AdminViews[\"Administration Views\"] --\u003e ThemeSettings[\"ThemeSettings\"]\n    AdminViews --\u003e ThemeConfigSettings[\"ThemeConfigSettings\"]\n    \n    ThemeSettings --\u003e ThemeRegistry\n    ThemeConfigSettings --\u003e SuitePConfig\n```\n\nSources: [themes/SuiteP/tpls/_headerModuleList.tpl:1-600](), [themes/SuiteP/js/style.js:1-537](), [modules/Administration/templates/themeSettings.tpl:1-116](), [modules/Administration/views/view.themeconfigsettings.php:1-120]()\n\n## Template System Integration\n\nThe theme system integrates with SuiteCRM's Smarty templating engine to render views. Each theme provides specific templates for different view types.\n\n```mermaid\ngraph LR\n    SugarView[\"SugarView\"] --\u003e TemplateAssign[\"Template Assignment\"]\n    TemplateAssign --\u003e SmartyEngine[\"Smarty Engine\"]\n    \n    SmartyEngine --\u003e HeaderTemplate[\"Header Templates\"]\n    SmartyEngine --\u003e DetailTemplate[\"Detail View Templates\"]\n    SmartyEngine --\u003e FooterTemplate[\"Footer Templates\"]\n    \n    HeaderTemplate --\u003e HeaderModuleList[\"_headerModuleList.tpl\"]\n    DetailTemplate --\u003e DetailViewMain[\"DetailView.tpl\"]\n    DetailTemplate --\u003e TabPanelContent[\"tab_panel_content.tpl\"]\n    FooterTemplate --\u003e FooterMain[\"footer.tpl\"]\n    \n    Variables[\"Template Variables\"] --\u003e SmartyEngine\n    Variables --\u003e ModuleData[\"$module, $fields\"]\n    Variables --\u003e UIData[\"$config, $APP\"]\n    Variables --\u003e NavigationData[\"$moduleTopMenu, $groupTabs\"]\n```\n\nSources: [themes/SuiteP/include/DetailView/DetailView.tpl:1-365](), [themes/SuiteP/include/DetailView/tab_panel_content.tpl:1-213](), [themes/SuiteP/include/DetailView/header.tpl:1-104]()\n\n## SuiteP Theme Components\n\nThe SuiteP theme is the primary modern theme with responsive design capabilities and Bootstrap integration.\n\n### Navigation System\n\nThe header navigation system provides the main user interface for module access and quick actions.\n\n```mermaid\ngraph TD\n    NavBar[\"navbar navbar-inverse\"] --\u003e MobileToggle[\"Mobile Toggle Button\"]\n    NavBar --\u003e DesktopToolbar[\"Desktop Toolbar\"]\n    NavBar --\u003e MobileBar[\"Mobile Bar\"]\n    \n    DesktopToolbar --\u003e ModuleNavigation[\"Module Navigation\"]\n    DesktopToolbar --\u003e GroupTabs[\"Group Tabs\"]\n    \n    ModuleNavigation --\u003e CurrentTab[\"Current Module Tab\"]\n    ModuleNavigation --\u003e RecentRecords[\"Recent Records Dropdown\"]\n    ModuleNavigation --\u003e FavoriteRecords[\"Favorite Records Dropdown\"]\n    \n    MobileBar --\u003e QuickCreate[\"Quick Create Dropdown\"]\n    MobileBar --\u003e SearchButton[\"Search Button\"]\n    MobileBar --\u003e UserActions[\"User Actions\"]\n    \n    GroupTabs --\u003e AllModules[\"All Modules Group\"]\n    GroupTabs --\u003e CustomGroups[\"Custom Module Groups\"]\n```\n\nSources: [themes/SuiteP/tpls/_headerModuleList.tpl:42-489]()\n\n### JavaScript Framework\n\nThe SuiteP theme includes comprehensive JavaScript functionality for responsive behavior and user interactions.\n\n```mermaid\ngraph TD\n    StyleJS[\"style.js\"] --\u003e SugarMeasurements[\"SUGAR.measurements\"]\n    StyleJS --\u003e SugarThemes[\"SUGAR.themes\"]\n    StyleJS --\u003e ResponsiveBehavior[\"Responsive Behavior\"]\n    \n    SugarMeasurements --\u003e Breakpoints[\"Breakpoint Definitions\"]\n    Breakpoints --\u003e XSmall[\"x-small: 750px\"]\n    Breakpoints --\u003e Small[\"small: 768px\"]\n    Breakpoints --\u003e Medium[\"medium: 992px\"]\n    Breakpoints --\u003e Large[\"large: 1130px\"]\n    \n    SugarThemes --\u003e ModuleListLoader[\"loadModuleList()\"]\n    SugarThemes --\u003e ActionMenuHandler[\"actionMenu()\"]\n    SugarThemes --\u003e TabSetter[\"setModuleTabs()\"]\n    \n    ResponsiveBehavior --\u003e SidebarToggle[\"loadSidebar()\"]\n    ResponsiveBehavior --\u003e WindowResize[\"Window Resize Handlers\"]\n    ResponsiveBehavior --\u003e CheckboxInit[\"Bootstrap Checkbox Init\"]\n```\n\nSources: [themes/SuiteP/js/style.js:40-537]()\n\n## Administration Interface\n\nThe theme management system provides administrative interfaces for configuring themes and their settings.\n\n### Theme Settings View\n\n```mermaid\ngraph TD\n    AdminPanel[\"Administration Panel\"] --\u003e ThemeSettingsAction[\"ThemeSettings Action\"]\n    ThemeSettingsAction --\u003e ThemeSettingsView[\"ThemeSettings View\"]\n    \n    ThemeSettingsView --\u003e AvailableThemes[\"Available Themes List\"]\n    ThemeSettingsView --\u003e ThemePreview[\"Theme Preview Images\"]\n    ThemeSettingsView --\u003e ThemeStatus[\"Enable/Disable Controls\"]\n    ThemeSettingsView --\u003e DefaultTheme[\"Default Theme Selection\"]\n    \n    AvailableThemes --\u003e SuitePEntry[\"SuiteP Theme Entry\"]\n    AvailableThemes --\u003e SuiteREntry[\"SuiteR Theme Entry\"]\n    \n    ThemeConfigButton[\"Theme Config Button\"] --\u003e ThemeConfigSettings[\"ThemeConfigSettings Action\"]\n    ThemeConfigSettings --\u003e ConfigurableParams[\"Configurable Parameters\"]\n    ConfigurableParams --\u003e ColorParams[\"Color Parameters\"]\n    ConfigurableParams --\u003e BooleanParams[\"Boolean Parameters\"]\n```\n\nSources: [modules/Administration/templates/themeSettings.tpl:43-116](), [modules/Administration/views/view.themeconfigsettings.php:49-119]()\n\n### Configuration Management\n\nThe theme configuration system allows administrators to customize theme-specific parameters.\n\n```mermaid\ngraph LR\n    ConfigForm[\"themeConfigSettings Form\"] --\u003e ConfigSubmit[\"Form Submission\"]\n    ConfigSubmit --\u003e ConfiguratorClass[\"Configurator Class\"]\n    \n    ConfiguratorClass --\u003e ThemeConfig[\"theme_settings Array\"]\n    ThemeConfig --\u003e ThemeSpecificConfig[\"Theme-Specific Config\"]\n    \n    ThemeSpecificConfig --\u003e ColorSettings[\"Color Settings\"]\n    ThemeSpecificConfig --\u003e BooleanSettings[\"Boolean Settings\"]\n    \n    ConfigSave[\"Config Save\"] --\u003e ConfigOverride[\"handleOverride()\"]\n    ConfigOverride --\u003e RedirectToSettings[\"Redirect to ThemeSettings\"]\n    \n    SugarThemeRegistry[\"SugarThemeRegistry\"] --\u003e GetThemeConfig[\"getThemeConfig()\"]\n    GetThemeConfig --\u003e ThemeConfigArray[\"Theme Config Definition\"]\n```\n\nSources: [modules/Administration/templates/themeConfigSettings.tpl:43-84](), [modules/Administration/views/view.themeconfigsettings.php:79-101]()\n\n## Detail View System\n\nThe detail view template system provides structured layouts for displaying record information with tabs and panels.\n\n### Tab and Panel Structure\n\n```mermaid\ngraph TD\n    DetailViewTpl[\"DetailView.tpl\"] --\u003e TabSystem[\"Tab System Check\"]\n    TabSystem --\u003e UseTabs{\"useTabs?\"}\n    \n    UseTabs --\u003e|Yes| TabContent[\"Tab Content Structure\"]\n    UseTabs --\u003e|No| PanelContent[\"Panel Content Structure\"]\n    \n    TabContent --\u003e TabHeaders[\"Tab Headers (nav-tabs)\"]\n    TabContent --\u003e TabPanes[\"Tab Panes (tab-content)\"]\n    \n    TabHeaders --\u003e TabCounter[\"Tab Counter Logic\"]\n    TabPanes --\u003e TabPanelContent[\"tab_panel_content.tpl\"]\n    \n    PanelContent --\u003e PanelContainer[\"Panel Container\"]\n    PanelContent --\u003e CollapsiblePanels[\"Collapsible Panels\"]\n    \n    ActionMenu[\"Action Menu\"] --\u003e ActionMenuCheck{\"enable_action_menu?\"}\n    ActionMenuCheck --\u003e|Yes| ActionDropdown[\"Action Dropdown\"]\n    ActionMenuCheck --\u003e|No| ActionButtons[\"Action Buttons\"]\n    \n    TabPanelContent --\u003e RowIteration[\"Row Iteration\"]\n    RowIteration --\u003e ColumnIteration[\"Column Iteration\"]\n    ColumnIteration --\u003e FieldIteration[\"Field Iteration\"]\n```\n\nSources: [themes/SuiteP/include/DetailView/DetailView.tpl:44-365](), [themes/SuiteP/include/DetailView/tab_panel_content.tpl:45-213]()\n\n## Studio Integration\n\nThe theme system integrates with Studio for customizing tab groups and module organization.\n\n```mermaid\ngraph TD\n    StudioTabGroups[\"Studio Tab Groups\"] --\u003e EditViewTabs[\"EditViewTabs.tpl\"]\n    EditViewTabs --\u003e DragDropInit[\"dragDropInit()\"]\n    \n    DragDropInit --\u003e YahooSlots[\"yahooSlots Array\"]\n    DragDropInit --\u003e ModuleSlots[\"Module Slots\"]\n    DragDropInit --\u003e TabSlots[\"Tab Slots\"]\n    \n    YahooSlots --\u003e ygDDSlot[\"ygDDSlot Instances\"]\n    YahooSlots --\u003e ygDDListStudio[\"ygDDListStudio Instances\"]\n    \n    TabGroupLanguage[\"Tab Group Language\"] --\u003e LanguageSelector[\"Language Selector\"]\n    LanguageSelector --\u003e tabLanguageChange[\"tabLanguageChange()\"]\n    \n    AddTabGroup[\"Add Tab Group\"] --\u003e addTabGroup[\"addTabGroup()\"]\n    addTabGroup --\u003e NewTabCreation[\"Dynamic Tab Creation\"]\n    \n    SavePublish[\"Save \u0026 Publish\"] --\u003e GenerateForm[\"studiotabs.generateForm()\"]\n    GenerateForm --\u003e FormSubmission[\"Form Submission to SaveTabs\"]\n```\n\nSources: [themes/SuiteP/modules/Studio/TabGroups/EditViewTabs.tpl:47-300]()\n\n## File Organization\n\nThe theme management system follows a structured file organization pattern for maintainability and extensibility.\n\n| Component | Location | Purpose |\n|-----------|----------|---------|\n| Theme Templates | `themes/{theme}/tpls/` | Main template files |\n| Detail View Templates | `themes/{theme}/include/DetailView/` | Record detail templates |\n| Edit View Templates | `themes/{theme}/include/EditView/` | Record edit templates |\n| JavaScript | `themes/{theme}/js/` | Theme-specific JavaScript |\n| CSS | `themes/{theme}/css/` | Theme stylesheets |\n| Images | `themes/{theme}/images/` | Theme image assets |\n| Module Templates | `themes/{theme}/modules/{module}/` | Module-specific overrides |\n| Admin Templates | `modules/Administration/templates/` | Theme administration |\n| Admin Views | `modules/Administration/views/` | Theme management views |\n\nSources: [themes/SuiteP/tpls/_headerModuleList.tpl:1](), [themes/SuiteP/js/style.js:1](), [modules/Administration/templates/themeSettings.tpl:1](), [modules/Administration/action_view_map.php:42-43]()\n\n## Responsive Design Implementation\n\nThe SuiteP theme implements responsive design through JavaScript breakpoint management and CSS media queries.\n\n```mermaid\ngraph LR\n    WindowResize[\"Window Resize Event\"] --\u003e ResponsiveLogic[\"Responsive Logic\"]\n    \n    ResponsiveLogic --\u003e SidebarToggle[\"Sidebar Toggle Logic\"]\n    ResponsiveLogic --\u003e NavigationCollapse[\"Navigation Collapse\"]\n    ResponsiveLogic --\u003e FormOptimization[\"Form Optimization\"]\n    \n    SidebarToggle --\u003e CookieStorage[\"Cookie Storage\"]\n    SidebarToggle --\u003e BootstrapClasses[\"Bootstrap Class Management\"]\n    \n    NavigationCollapse --\u003e OverflowMenu[\"Overflow Menu\"]\n    NavigationCollapse --\u003e MobileMenu[\"Mobile Menu\"]\n    \n    FormOptimization --\u003e EmptyFieldHiding[\"Empty Field Hiding\"]\n    FormOptimization --\u003e TabletOptimization[\"Tablet Optimization\"]\n    \n    Breakpoints[\"Breakpoint System\"] --\u003e WindowResize\n    Breakpoints --\u003e MediaQueries[\"CSS Media Queries\"]\n```\n\nSources: [themes/SuiteP/js/style.js:292-537]()"])</script><script>self.__next_f.push([1,"1b:T2f4e,"])</script><script>self.__next_f.push([1,"# JavaScript Framework\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [include/SugarObjects/templates/basic/language/en_us.lang.php](include/SugarObjects/templates/basic/language/en_us.lang.php)\n- [include/javascript/sugar_3.js](include/javascript/sugar_3.js)\n- [jssource/src_files/include/javascript/sugar_3.js](jssource/src_files/include/javascript/sugar_3.js)\n- [jssource/src_files/modules/Calendar/Cal.js](jssource/src_files/modules/Calendar/Cal.js)\n- [modules/Calendar/Cal.js](modules/Calendar/Cal.js)\n- [modules/Calendar/tpls/main.tpl](modules/Calendar/tpls/main.tpl)\n- [modules/Emails/javascript/email_popup_helper.js](modules/Emails/javascript/email_popup_helper.js)\n- [themes/SuiteP/modules/SavedSearch/SavedSearchForm.tpl](themes/SuiteP/modules/SavedSearch/SavedSearchForm.tpl)\n\n\u003c/details\u003e\n\n\n\n## Purpose and Scope\n\nThis document covers SuiteCRM's client-side JavaScript framework, which provides a structured foundation for browser-based functionality. The framework centers around the `SUGAR` global namespace and includes comprehensive form validation, browser compatibility detection, and specialized modules like the calendar system. \n\nFor information about theme-specific JavaScript integration, see [Theme Management](#3.1). For details about inline editing JavaScript functionality, see [Inline Editing](#3.3).\n\n## SUGAR Namespace Architecture\n\nThe JavaScript framework is built around a global `SUGAR` object that serves as the primary namespace for all client-side functionality. This namespace provides organizational structure and prevents naming conflicts with other JavaScript libraries.\n\n```mermaid\ngraph TB\n    SUGAR[\"SUGAR (Global Namespace)\"]\n    SUGAR --\u003e namespace[\"namespace()\"]\n    SUGAR --\u003e append[\"append()\"]\n    SUGAR --\u003e themes[\"SUGAR.themes\"]\n    SUGAR --\u003e utils[\"SUGAR.utils\"]\n    SUGAR --\u003e language[\"SUGAR.language\"]\n    SUGAR --\u003e config[\"SUGAR.config\"]\n    SUGAR --\u003e savedViews[\"SUGAR.savedViews\"]\n    SUGAR --\u003e dashlets[\"SUGAR.dashlets\"]\n    SUGAR --\u003e subpanelUtils[\"SUGAR.subpanelUtils\"]\n    SUGAR --\u003e ajaxStatusClass[\"SUGAR.ajaxStatusClass\"]\n    \n    namespace --\u003e |\"Creates namespaces\"| themes\n    namespace --\u003e |\"Creates namespaces\"| utils\n    namespace --\u003e |\"Creates namespaces\"| language\n    \n    append --\u003e |\"Merges objects\"| utils\n```\n\nThe core namespace functionality is implemented through two primary methods:\n\n**Namespace Creation**: The `namespace()` function creates and returns namespaces within the SUGAR object, ensuring they exist before use.\n\n**Object Extension**: The `append()` function merges properties from one object into another, enabling modular functionality addition.\n\nSources: [jssource/src_files/include/javascript/sugar_3.js:46-75]()\n\n### Namespace Declarations\n\nThe framework pre-declares multiple specialized namespaces for different functional areas:\n\n| Namespace | Purpose |\n|-----------|---------|\n| `SUGAR.themes` | Theme-related functionality |\n| `SUGAR.tour` | User interface tours and guidance |\n| `SUGAR.sugarHome` | Homepage-specific features |\n| `SUGAR.subpanelUtils` | Subpanel management utilities |\n| `SUGAR.ajaxStatusClass` | AJAX request status handling |\n| `SUGAR.utils` | General utility functions |\n| `SUGAR.savedViews` | Saved view management |\n| `SUGAR.dashlets` | Dashlet functionality |\n| `SUGAR.language` | Internationalization support |\n| `SUGAR.config` | Configuration management |\n\nSources: [jssource/src_files/include/javascript/sugar_3.js:77-117]()\n\n## Form Validation System\n\nThe framework includes a comprehensive form validation system that manages client-side validation rules and error display. The system uses global arrays and functions to coordinate validation across forms.\n\n```mermaid\ngraph TB\n    ValidationSystem[\"Form Validation System\"]\n    ValidationSystem --\u003e GlobalArrays[\"Global Validation Arrays\"]\n    ValidationSystem --\u003e ValidationFunctions[\"Validation Functions\"]\n    ValidationSystem --\u003e ErrorHandling[\"Error Display System\"]\n    \n    GlobalArrays --\u003e validate[\"validate[]\"]\n    GlobalArrays --\u003e inputsWithErrors[\"inputsWithErrors[]\"]\n    GlobalArrays --\u003e alertList[\"alertList[]\"]\n    \n    ValidationFunctions --\u003e addToValidate[\"addToValidate()\"]\n    ValidationFunctions --\u003e validate_form[\"validate_form()\"]\n    ValidationFunctions --\u003e check_form[\"check_form()\"]\n    \n    ErrorHandling --\u003e add_error_style[\"add_error_style()\"]\n    ErrorHandling --\u003e clear_all_errors[\"clear_all_errors()\"]\n    ErrorHandling --\u003e fade_error_style[\"fade_error_style()\"]\n    \n    validate_form --\u003e |\"Calls\"| add_error_style\n    addToValidate --\u003e |\"Populates\"| validate\n```\n\n### Validation Rule Management\n\nThe validation system uses indexed arrays to store validation rules for form fields:\n\n- **nameIndex** (0): Field name\n- **typeIndex** (1): Validation type (email, date, etc.)\n- **requiredIndex** (2): Whether field is required\n- **msgIndex** (3): Error message\n- **jstypeIndex** (5): JavaScript-specific validation type\n\nSources: [jssource/src_files/include/javascript/sugar_3.js:119-131]()\n\n### Validation Types\n\nThe system supports multiple validation types:\n\n| Type | Purpose |\n|------|---------|\n| `email` | Email address format validation |\n| `date` | Date format validation |\n| `time` | Time format validation |\n| `int` | Integer validation |\n| `decimal` | Decimal number validation |\n| `float` | Floating point validation |\n| `range` | Numeric range validation |\n| `callback` | Custom validation function |\n\nSources: [jssource/src_files/include/javascript/sugar_3.js:965-1025]()\n\n### Error Display System\n\nThe validation system provides visual feedback through dynamic error styling:\n\n```mermaid\ngraph LR\n    ValidationError[\"Validation Error\"]\n    ValidationError --\u003e CreateErrorNode[\"Create Error Element\"]\n    CreateErrorNode --\u003e ApplyRedBackground[\"Apply Red Background\"]\n    ApplyRedBackground --\u003e FadeAnimation[\"Fade Animation\"]\n    FadeAnimation --\u003e RestoreOriginal[\"Restore Original Style\"]\n    \n    CreateErrorNode --\u003e |\"Creates\"| ErrorDiv[\"div.validation-message\"]\n    ErrorDiv --\u003e |\"Contains\"| ErrorText[\"Error Message Text\"]\n```\n\nThe error display process creates visual indicators and manages their lifecycle, including fade animations back to normal styling.\n\nSources: [jssource/src_files/include/javascript/sugar_3.js:756-826]()\n\n## Calendar Framework (CAL Namespace)\n\nThe calendar functionality is implemented through a separate `CAL` namespace that provides calendar-specific features including event management, dialog handling, and FullCalendar integration.\n\n```mermaid\ngraph TB\n    CAL[\"CAL (Calendar Namespace)\"]\n    CAL --\u003e DialogManagement[\"Dialog Management\"]\n    CAL --\u003e EventHandling[\"Event Handling\"]\n    CAL --\u003e FullCalendarIntegration[\"FullCalendar Integration\"]\n    CAL --\u003e RepeatFunctionality[\"Repeat Functionality\"]\n    \n    DialogManagement --\u003e open_edit_dialog[\"open_edit_dialog()\"]\n    DialogManagement --\u003e close_edit_dialog[\"close_edit_dialog()\"]\n    DialogManagement --\u003e reset_edit_dialog[\"reset_edit_dialog()\"]\n    \n    EventHandling --\u003e load_form[\"load_form()\"]\n    EventHandling --\u003e dialog_save[\"dialog_save()\"]\n    EventHandling --\u003e dialog_remove[\"dialog_remove()\"]\n    \n    FullCalendarIntegration --\u003e CalendarRendering[\"Calendar Rendering\"]\n    FullCalendarIntegration --\u003e EventDisplay[\"Event Display\"]\n    \n    RepeatFunctionality --\u003e fill_repeat_data[\"fill_repeat_data()\"]\n    RepeatFunctionality --\u003e edit_all_recurrences[\"edit_all_recurrences()\"]\n```\n\n### Calendar Dialog System\n\nThe calendar uses Bootstrap modal dialogs for event creation and editing:\n\n- **Modal Edit Dialog**: `.modal-cal-edit` for meetings and calls\n- **Task Dialog**: `.modal-cal-tasks-edit` for task records  \n- **Event Dialog**: `.modal-cal-events-edit` for FP_events\n\nSources: [modules/Calendar/Cal.js:93-96](), [modules/Calendar/tpls/main.tpl:193-258]()\n\n### Calendar Event Management\n\nThe calendar system manages different types of events through specialized handling:\n\n```mermaid\ngraph TB\n    EventTypes[\"Calendar Event Types\"]\n    EventTypes --\u003e Meetings[\"Meetings\"]\n    EventTypes --\u003e Calls[\"Calls\"] \n    EventTypes --\u003e Tasks[\"Tasks\"]\n    EventTypes --\u003e FP_events[\"FP_events\"]\n    \n    Meetings --\u003e EditableDialog[\"Editable Dialog\"]\n    Calls --\u003e EditableDialog\n    Tasks --\u003e ReadOnlyDialog[\"Read-Only Dialog\"]\n    FP_events --\u003e ReadOnlyDialog\n    \n    EditableDialog --\u003e FullForm[\"Full Form Access\"]\n    EditableDialog --\u003e InlineEdit[\"Inline Editing\"]\n    ReadOnlyDialog --\u003e DetailView[\"Detail View Link\"]\n    ReadOnlyDialog --\u003e QuickView[\"Quick View Display\"]\n```\n\nSources: [jssource/src_files/modules/Calendar/Cal.js:296-347]()\n\n## Browser Support and Compatibility\n\nThe framework includes comprehensive browser detection and compatibility checking to ensure consistent functionality across different browsers.\n\n### Browser Detection\n\nThe system implements multiple browser detection mechanisms:\n\n```mermaid\ngraph TB\n    BrowserDetection[\"Browser Detection System\"]\n    BrowserDetection --\u003e isSupportedIE[\"isSupportedIE()\"]\n    BrowserDetection --\u003e isSupportedBrowser[\"SUGAR.isSupportedBrowser()\"]\n    BrowserDetection --\u003e isIECompatibilityMode[\"SUGAR.isIECompatibilityMode()\"]\n    \n    isSupportedBrowser --\u003e SupportedBrowsers[\"Supported Browsers\"]\n    SupportedBrowsers --\u003e IE[\"Internet Explorer 9-11\"]\n    SupportedBrowsers --\u003e Firefox[\"Firefox 31.0+\"]\n    SupportedBrowsers --\u003e Chrome[\"Chrome 37+\"]\n    SupportedBrowsers --\u003e Safari[\"Safari 534+\"]\n    \n    isIECompatibilityMode --\u003e CompatibilityCheck[\"IE Compatibility Mode Detection\"]\n```\n\n**Supported Browser Versions**:\n- Internet Explorer: 9-11\n- Firefox: 31.0+\n- Chrome: 37+\n- Safari: 534+\n\nSources: [jssource/src_files/include/javascript/sugar_3.js:189-218]()\n\n### Compatibility Functions\n\nThe framework provides utility functions for handling browser-specific behaviors:\n\n- **`checkMinSupported()`**: Validates minimum browser version requirements\n- **`checkMaxSupported()`**: Validates maximum browser version compatibility\n- **`RegExp.escape()`**: Escapes regular expression special characters\n\nSources: [jssource/src_files/include/javascript/sugar_3.js:169-187](), [jssource/src_files/include/javascript/sugar_3.js:237-243]()\n\n## Utility Functions and Helpers\n\nThe framework provides numerous utility functions for common JavaScript operations and UI management.\n\n### Core Utilities\n\n| Function | Purpose |\n|----------|---------|\n| `toggleDisplay()` | Shows/hides elements with anchor text updates |\n| `checkAll()` | Checks/unchecks all form elements with given name |\n| `replaceAll()` | String replacement utility |\n| `trim()` | String trimming (delegates to YAHOO.lang.trim) |\n| `toDecimal()` | Number formatting with precision |\n\nSources: [jssource/src_files/include/javascript/sugar_3.js:302-335](), [jssource/src_files/include/javascript/sugar_3.js:489-498]()\n\n### Alert and Notification System\n\nThe framework includes a time-based alert system for displaying notifications:\n\n```mermaid\ngraph LR\n    AlertSystem[\"Alert System\"]\n    AlertSystem --\u003e addAlert[\"addAlert()\"]\n    AlertSystem --\u003e checkAlerts[\"checkAlerts()\"]\n    AlertSystem --\u003e AlertsModule[\"Alerts Module\"]\n    \n    addAlert --\u003e |\"Stores in\"| alertList[\"alertList[]\"]\n    checkAlerts --\u003e |\"Processes\"| alertList\n    checkAlerts --\u003e |\"Uses\"| AlertsModule\n    AlertsModule --\u003e |\"Displays\"| Notifications[\"User Notifications\"]\n```\n\nThe alert system supports timed notifications with optional redirection and integrates with the modern Alerts module when available.\n\nSources: [jssource/src_files/include/javascript/sugar_3.js:245-300]()\n\n### Integration Points\n\nThe JavaScript framework integrates with other SuiteCRM systems through:\n\n- **YUI Library**: Uses YAHOO.util components for DOM manipulation and events\n- **jQuery**: Leverages jQuery for modern DOM operations and AJAX\n- **Template System**: Embedded in Smarty templates for dynamic initialization\n- **PHP Backend**: Communicates via AJAX for form processing and data retrieval\n\nSources: [modules/Calendar/tpls/main.tpl:311-314](), [themes/SuiteP/modules/SavedSearch/SavedSearchForm.tpl:77-115]()"])</script><script>self.__next_f.push([1,"1c:T31f5,"])</script><script>self.__next_f.push([1,"# Inline Editing\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [include/DetailView/DetailView.tpl](include/DetailView/DetailView.tpl)\n- [include/InlineEditing/InlineEditing.php](include/InlineEditing/InlineEditing.php)\n- [include/InlineEditing/inlineEditing.js](include/InlineEditing/inlineEditing.js)\n- [include/ListView/ListViewButtons.tpl](include/ListView/ListViewButtons.tpl)\n- [include/ListView/ListViewFacade.php](include/ListView/ListViewFacade.php)\n- [include/ListView/ListViewGeneric.tpl](include/ListView/ListViewGeneric.tpl)\n- [include/ListView/ListViewPagination.tpl](include/ListView/ListViewPagination.tpl)\n- [include/MVC/Controller/SugarController.php](include/MVC/Controller/SugarController.php)\n- [modules/DynamicFields/language/en_us.lang.php](modules/DynamicFields/language/en_us.lang.php)\n- [modules/Emails/include/DetailView/ImportView.js](modules/Emails/include/DetailView/ImportView.js)\n- [modules/Emails/include/DetailView/import.js](modules/Emails/include/DetailView/import.js)\n- [modules/Emails/include/DetailView/quickCreateModal.js](modules/Emails/include/DetailView/quickCreateModal.js)\n- [modules/Emails/metadata/detailviewdefs.php](modules/Emails/metadata/detailviewdefs.php)\n- [modules/Emails/metadata/nonimporteddetailviewdefs.php](modules/Emails/metadata/nonimporteddetailviewdefs.php)\n- [modules/Employees/Employee.php](modules/Employees/Employee.php)\n- [modules/Home/controller.php](modules/Home/controller.php)\n- [themes/SuiteP/include/ListView/ListViewGeneric.tpl](themes/SuiteP/include/ListView/ListViewGeneric.tpl)\n- [themes/SuiteP/include/ListView/ListViewPagination.tpl](themes/SuiteP/include/ListView/ListViewPagination.tpl)\n- [themes/SuiteP/include/ListView/ListViewPaginationBottom.tpl](themes/SuiteP/include/ListView/ListViewPaginationBottom.tpl)\n- [themes/SuiteP/include/ListView/ListViewPaginationTop.tpl](themes/SuiteP/include/ListView/ListViewPaginationTop.tpl)\n\n\u003c/details\u003e\n\n\n\nThe Inline Editing system provides users with the ability to edit field values directly within list views and detail views without navigating to a separate edit page. Users can double-click on editable cells to activate an in-place editor, make changes, and save them via AJAX requests.\n\nFor information about the broader ListView system, see [Search System](#5.3). For details about the JavaScript Framework that supports inline editing, see [JavaScript Framework](#3.2).\n\n## System Architecture\n\nThe inline editing system consists of three main layers: a JavaScript frontend that handles user interactions, a PHP backend that processes field editing logic, and AJAX endpoints that bridge the two layers.\n\n```mermaid\ngraph TB\n    subgraph \"User Interface Layer\"\n        ListView[\"ListView Templates\"]\n        DetailView[\"DetailView Templates\"]\n        InlineEditIcon[\"inlineEditIcon\"]\n    end\n    \n    subgraph \"JavaScript Layer\"\n        buildEditField[\"buildEditField()\"]\n        onInlineEditDblClick[\"onInlineEditDblClick()\"]\n        validateFormAndSave[\"validateFormAndSave()\"]\n        handleSave[\"handleSave()\"]\n        setValueClose[\"setValueClose()\"]\n    end\n    \n    subgraph \"AJAX Layer\"\n        getEditFieldHTML[\"action_getEditFieldHTML\"]\n        saveHTMLField[\"action_saveHTMLField\"] \n        getDisplayValue[\"action_getDisplayValue\"]\n        getValidationRules[\"action_getValidationRules\"]\n        getRelateFieldJS[\"action_getRelateFieldJS\"]\n    end\n    \n    subgraph \"PHP Backend Layer\"\n        InlineEditingPHP[\"InlineEditing.php\"]\n        getEditFieldHTMLFunc[\"getEditFieldHTML()\"]\n        saveFieldFunc[\"saveField()\"]\n        getDisplayValueFunc[\"getDisplayValue()\"]\n        formatDisplayValueFunc[\"formatDisplayValue()\"]\n    end\n    \n    subgraph \"Data Layer\"\n        SugarBean[\"SugarBean\"]\n        Database[(Database)]\n    end\n    \n    ListView --\u003e buildEditField\n    DetailView --\u003e buildEditField\n    buildEditField --\u003e onInlineEditDblClick\n    onInlineEditDblClick --\u003e validateFormAndSave\n    validateFormAndSave --\u003e handleSave\n    handleSave --\u003e setValueClose\n    \n    onInlineEditDblClick --\u003e getEditFieldHTML\n    handleSave --\u003e saveHTMLField\n    setValueClose --\u003e getDisplayValue\n    onInlineEditDblClick --\u003e getValidationRules\n    onInlineEditDblClick --\u003e getRelateFieldJS\n    \n    getEditFieldHTML --\u003e getEditFieldHTMLFunc\n    saveHTMLField --\u003e saveFieldFunc\n    getDisplayValue --\u003e getDisplayValueFunc\n    getValidationRules --\u003e InlineEditingPHP\n    getRelateFieldJS --\u003e InlineEditingPHP\n    \n    getEditFieldHTMLFunc --\u003e SugarBean\n    saveFieldFunc --\u003e SugarBean\n    getDisplayValueFunc --\u003e formatDisplayValueFunc\n    formatDisplayValueFunc --\u003e SugarBean\n    \n    SugarBean --\u003e Database\n```\n\nSources: [include/InlineEditing/InlineEditing.php:45-325](), [include/InlineEditing/inlineEditing.js:40-661](), [modules/Home/controller.php:50-143]()\n\n## User Interaction Flow\n\nThe inline editing process follows a specific sequence of user actions and system responses, from initial activation through saving or cancellation.\n\n```mermaid\nsequenceDiagram\n    participant User\n    participant JavaScript\n    participant AJAX\n    participant PHP\n    participant Database\n    \n    User-\u003e\u003eJavaScript: Double-click on inlineEdit cell\n    JavaScript-\u003e\u003eJavaScript: onInlineEditDblClick()\n    JavaScript-\u003e\u003eAJAX: getEditFieldHTML request\n    AJAX-\u003e\u003ePHP: getEditFieldHTML()\n    PHP-\u003e\u003ePHP: Generate field HTML via SugarFieldHandler\n    PHP--\u003e\u003eAJAX: Field edit HTML\n    AJAX--\u003e\u003eJavaScript: Field edit HTML\n    JavaScript-\u003e\u003eJavaScript: Replace cell content with edit form\n    JavaScript-\u003e\u003eAJAX: getValidationRules request\n    AJAX-\u003e\u003ePHP: Field validation rules\n    PHP--\u003e\u003eJavaScript: Validation JavaScript\n    \n    User-\u003e\u003eJavaScript: Modify field value\n    User-\u003e\u003eJavaScript: Click save or press Enter\n    JavaScript-\u003e\u003eJavaScript: validateFormAndSave()\n    JavaScript-\u003e\u003eJavaScript: handleSave()\n    JavaScript-\u003e\u003eAJAX: saveHTMLField request\n    AJAX-\u003e\u003ePHP: saveField()\n    PHP-\u003e\u003eDatabase: Update record\n    Database--\u003e\u003ePHP: Save confirmation\n    PHP-\u003e\u003ePHP: getDisplayValue()\n    PHP--\u003e\u003eAJAX: Formatted display value\n    AJAX--\u003e\u003eJavaScript: Display value\n    JavaScript-\u003e\u003eJavaScript: setValueClose()\n    JavaScript-\u003e\u003eUser: Update cell with new value\n```\n\nSources: [include/InlineEditing/inlineEditing.js:105-220](), [include/InlineEditing/inlineEditing.js:230-249](), [include/InlineEditing/inlineEditing.js:464-482]()\n\n## Core PHP Functions\n\n### Field HTML Generation\n\nThe `getEditFieldHTML()` function is the primary entry point for generating editable field HTML. It creates appropriate form controls based on field type and handles caching for performance.\n\n| Function | Purpose | Key Parameters | Return Value |\n|----------|---------|----------------|-------------|\n| `getEditFieldHTML()` | Generate edit field HTML | `$module`, `$fieldname`, `$view`, `$id` | JSON-encoded HTML |\n| `saveField()` | Save field value to database | `$field`, `$id`, `$module`, `$value` | Formatted display value |\n| `getDisplayValue()` | Get formatted display value | `$bean`, `$field`, `$method` | Formatted field value |\n| `formatDisplayValue()` | Format value for display | `$bean`, `$value`, `$vardef` | HTML-formatted value |\n\nThe system handles various field types including:\n- Basic types: `varchar`, `text`, `enum`, `bool`\n- Date types: `date`, `datetime`, `datetimecombo`\n- Relationship types: `relate`, `parent`, `link`\n- Special types: `currency`, `multienum`, `radioenum`\n\nSources: [include/InlineEditing/InlineEditing.php:45-325](), [include/InlineEditing/InlineEditing.php:327-398](), [include/InlineEditing/InlineEditing.php:400-433](), [include/InlineEditing/InlineEditing.php:435-567]()\n\n### Security and Validation\n\nThe system implements several security measures to prevent unauthorized access and data corruption:\n\n```mermaid\ngraph TD\n    checkAccess[\"checkAccess()\"]\n    ACLAccess[\"bean-\u003eACLAccess('EditView')\"]\n    sensitiveField[\"Check sensitive field flag\"]\n    apiVisible[\"Check api-visible flag\"]\n    adminOnly[\"Check admin-only modules\"]\n    \n    Request[\"Inline Edit Request\"]\n    Request --\u003e checkAccess\n    checkAccess --\u003e ACLAccess\n    Request --\u003e sensitiveField\n    Request --\u003e apiVisible\n    Request --\u003e adminOnly\n    \n    ACLAccess --\u003e|Pass| Allow[\"Allow Edit\"]\n    ACLAccess --\u003e|Fail| Deny[\"Deny Access\"]\n    sensitiveField --\u003e|True| Deny\n    apiVisible --\u003e|False| Deny\n    adminOnly --\u003e|Fail \u0026 Not Admin| Deny\n```\n\nSources: [include/InlineEditing/InlineEditing.php:593-599](), [include/InlineEditing/InlineEditing.php:63-65](), [include/InlineEditing/InlineEditing.php:376-382]()\n\n## JavaScript Event Handling\n\n### Activation and Interaction\n\nThe JavaScript layer manages user interactions through a series of event handlers that control the inline editing lifecycle.\n\n| Event Handler | Trigger | Purpose |\n|---------------|---------|---------|\n| `buildEditField()` | Page load | Attach double-click handlers to `.inlineEdit` elements |\n| `onInlineEditDblClick()` | Double-click on cell | Activate inline editing mode |\n| `validateFormAndSave()` | Save button click | Validate form and trigger save |\n| `clickedawayclose()` | Click outside editor | Handle editor close with change detection |\n\nThe system uses a click detection mechanism to differentiate between single clicks (navigation) and double clicks (editing):\n\nSources: [include/InlineEditing/inlineEditing.js:58-221](), [include/InlineEditing/inlineEditing.js:230-249](), [include/InlineEditing/inlineEditing.js:261-281]()\n\n### Field Type Handling\n\nDifferent field types require specialized JavaScript handling for value extraction and validation:\n\n```mermaid\ngraph LR\n    getInputValue[\"getInputValue()\"]\n    \n    subgraph \"Field Types\"\n        varchar[\"varchar/text/phone\"]\n        enum[\"enum\"]\n        datetime[\"datetime/datetimecombo\"]\n        date[\"date\"]\n        multienum[\"multienum\"]\n        bool[\"bool\"]\n        radioenum[\"radioenum\"]\n        parent[\"parent\"]\n    end\n    \n    getInputValue --\u003e varchar\n    getInputValue --\u003e enum\n    getInputValue --\u003e datetime\n    getInputValue --\u003e date\n    getInputValue --\u003e multienum\n    getInputValue --\u003e bool\n    getInputValue --\u003e radioenum\n    getInputValue --\u003e parent\n    \n    varchar --\u003e SimpleValue[\"$(field).val()\"]\n    enum --\u003e SelectedValue[\"$(field + ' :selected').val()\"]\n    datetime --\u003e CombinedValue[\"date + hours + minutes + meridiem\"]\n    bool --\u003e CheckboxValue[\"'on' or 'off'\"]\n```\n\nSources: [include/InlineEditing/inlineEditing.js:380-451]()\n\n## ListView Integration\n\n### Template Structure\n\nThe ListView templates integrate inline editing by adding specific CSS classes and attributes to table cells that should be editable.\n\nIn `ListViewGeneric.tpl`, cells are marked as editable using:\n- `inlineEdit` CSS class\n- `type` attribute with field type\n- `field` attribute with field name\n\nThe inline edit icon is conditionally displayed based on the `$inline_edit` template variable and field-specific settings.\n\nSources: [include/ListView/ListViewGeneric.tpl:256-257](), [themes/SuiteP/include/ListView/ListViewGeneric.tpl:291]()\n\n### Field Configuration\n\nFields can be configured for inline editing through metadata definitions. The system checks for:\n- `inline_edit` property in field definitions\n- Default behavior (enabled unless explicitly disabled)\n- Module-level inline editing settings\n\n| Configuration | Location | Purpose |\n|---------------|----------|---------|\n| `$inline_edit` | Template variable | Global inline editing toggle |\n| `inline_edit` | Field metadata | Per-field inline editing control |\n| `inlineEdit` | CSS class | Visual indicator and JavaScript selector |\n\nSources: [include/ListView/ListViewGeneric.tpl:236](), [themes/SuiteP/include/ListView/ListViewGeneric.tpl:271]()\n\n## AJAX Endpoints\n\n### HomeController Actions\n\nThe `HomeController` provides AJAX endpoints that serve as the bridge between JavaScript requests and PHP backend functions:\n\n| Action | Purpose | Request Parameters | Response |\n|--------|---------|-------------------|----------|\n| `action_getEditFieldHTML` | Get field edit HTML | `field`, `id`, `current_module` | JSON-encoded HTML |\n| `action_saveHTMLField` | Save field value | `field`, `id`, `current_module`, `value` | Display value |\n| `action_getDisplayValue` | Get display value | `field`, `id`, `current_module` | Formatted value |\n| `action_getValidationRules` | Get validation rules | `field`, `id`, `current_module` | JSON validation config |\n| `action_getRelateFieldJS` | Get relate field JS | `field`, `current_module` | JavaScript code |\n\nThese endpoints handle the communication between the frontend JavaScript and the backend PHP processing, ensuring that field editing operations are properly validated and executed.\n\nSources: [modules/Home/controller.php:50-143]()"])</script><script>self.__next_f.push([1,"1d:T4cc8,"])</script><script>self.__next_f.push([1,"# Core Business Modules\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [include/SugarEmailAddress/SugarEmailAddress.php](include/SugarEmailAddress/SugarEmailAddress.php)\n- [include/SugarEmailAddress/getEmailAddressWidget.php](include/SugarEmailAddress/getEmailAddressWidget.php)\n- [include/SugarEmailAddress/templates/optInStatusTick.tpl](include/SugarEmailAddress/templates/optInStatusTick.tpl)\n- [include/SugarObjects/templates/basic/Basic.php](include/SugarObjects/templates/basic/Basic.php)\n- [include/SugarObjects/templates/company/metadata/listviewdefs.php](include/SugarObjects/templates/company/metadata/listviewdefs.php)\n- [include/generic/SugarWidgets/SugarWidgetSubPanelEmailLink.php](include/generic/SugarWidgets/SugarWidgetSubPanelEmailLink.php)\n- [include/generic/SugarWidgets/SugarWidgetSubPanelTopComposeEmailButton.php](include/generic/SugarWidgets/SugarWidgetSubPanelTopComposeEmailButton.php)\n- [include/language/en_us.lang.php](include/language/en_us.lang.php)\n- [metadata/email_addressesMetaData.php](metadata/email_addressesMetaData.php)\n- [modules/Accounts/metadata/listviewdefs.php](modules/Accounts/metadata/listviewdefs.php)\n- [modules/Configurator/Configurator.php](modules/Configurator/Configurator.php)\n- [modules/Contacts/Dashlets/MyContactsDashlet/MyContactsDashlet.data.php](modules/Contacts/Dashlets/MyContactsDashlet/MyContactsDashlet.data.php)\n- [modules/Contacts/metadata/listviewdefs.php](modules/Contacts/metadata/listviewdefs.php)\n- [modules/EmailAddresses/EmailAddress.php](modules/EmailAddresses/EmailAddress.php)\n- [modules/EmailAddresses/language/en_us.lang.php](modules/EmailAddresses/language/en_us.lang.php)\n- [modules/EmailMan/EmailMan.php](modules/EmailMan/EmailMan.php)\n- [modules/Emails/Email.php](modules/Emails/Email.php)\n- [modules/Emails/EmailUI.css](modules/Emails/EmailUI.css)\n- [modules/Emails/EmailUI.php](modules/Emails/EmailUI.php)\n- [modules/Emails/EmailUIAjax.php](modules/Emails/EmailUIAjax.php)\n- [modules/Emails/PopupDocuments.html](modules/Emails/PopupDocuments.html)\n- [modules/Emails/javascript/EmailUI.js](modules/Emails/javascript/EmailUI.js)\n- [modules/Emails/templates/editAccountDialogue.tpl](modules/Emails/templates/editAccountDialogue.tpl)\n- [modules/Emails/templates/emailSettingsAccounts.tpl](modules/Emails/templates/emailSettingsAccounts.tpl)\n- [modules/Emails/templates/emailSettingsFolders.tpl](modules/Emails/templates/emailSettingsFolders.tpl)\n- [modules/Emails/templates/emailSettingsGeneral.tpl](modules/Emails/templates/emailSettingsGeneral.tpl)\n- [modules/Emails/templates/outboundDialog.tpl](modules/Emails/templates/outboundDialog.tpl)\n- [modules/Users/User.php](modules/Users/User.php)\n- [modules/Users/UserViewHelper.php](modules/Users/UserViewHelper.php)\n- [modules/Users/controller.php](modules/Users/controller.php)\n- [modules/Users/language/en_us.lang.php](modules/Users/language/en_us.lang.php)\n- [modules/Users/tpls/EditViewFooter.tpl](modules/Users/tpls/EditViewFooter.tpl)\n- [modules/Users/tpls/EditViewHeader.tpl](modules/Users/tpls/EditViewHeader.tpl)\n- [modules/Users/tpls/wizard.tpl](modules/Users/tpls/wizard.tpl)\n- [modules/Users/views/view.wizard.php](modules/Users/views/view.wizard.php)\n- [themes/SuiteP/css/suitep-base/detailview.scss](themes/SuiteP/css/suitep-base/detailview.scss)\n\n\u003c/details\u003e\n\n\n\nThis document covers the primary business logic modules that form the backbone of SuiteCRM's customer relationship management functionality. These modules handle user management, email communications, campaign management, and reporting capabilities that enable core CRM operations.\n\nFor information about the user interface systems that present these modules, see [User Interface System](#3). For details about the underlying data layer that supports these modules, see [Data Layer (SugarBean)](#2.2).\n\n## Overview\n\nSuiteCRM's core business modules provide the essential functionality that enables customer relationship management. The system is built around several interconnected modules that handle different aspects of business operations:\n\n| Module | Primary Purpose | Key Components |\n|--------|----------------|----------------|\n| User Management | Authentication, preferences, access control | `User`, `SugarEmailAddress`, `UserPreference` |\n| Email System | Email composition, sending, receiving | `Email`, `EmailUI`, `SugarPHPMailer` |\n| Campaign Management | Email marketing, target lists | `EmailMan`, `Campaign`, `ProspectList` |\n| Contact Management | Customer and prospect data | `Contact`, `Lead`, `Account` |\n\nThe architecture follows a modular design where each business module extends the base `SugarBean` class and implements specific business logic while maintaining consistent data access patterns.\n\n```mermaid\ngraph TB\n    subgraph \"Core Business Layer\"\n        User[\"User\u003cbr/\u003emodules/Users/User.php\"]\n        Email[\"Email\u003cbr/\u003emodules/Emails/Email.php\"]\n        EmailMan[\"EmailMan\u003cbr/\u003emodules/EmailMan/EmailMan.php\"]\n        Contact[\"Contact\u003cbr/\u003emodules/Contacts/Contact.php\"]\n    end\n    \n    subgraph \"Supporting Components\"\n        SugarEmailAddress[\"SugarEmailAddress\u003cbr/\u003einclude/SugarEmailAddress/\"]\n        EmailUI[\"EmailUI\u003cbr/\u003emodules/Emails/EmailUI.php\"]\n        SugarPHPMailer[\"SugarPHPMailer\u003cbr/\u003einclude/SugarPHPMailer.php\"]\n    end\n    \n    subgraph \"Data Layer\"\n        SugarBean[\"SugarBean\u003cbr/\u003edata/SugarBean.php\"]\n        EmailAddresses[\"email_addresses table\"]\n        EmailAddrBeanRel[\"email_addr_bean_rel table\"]\n    end\n    \n    User --\u003e SugarEmailAddress\n    Email --\u003e EmailUI\n    Email --\u003e SugarPHPMailer\n    EmailMan --\u003e Email\n    \n    User --\u003e SugarBean\n    Email --\u003e SugarBean\n    EmailMan --\u003e SugarBean\n    Contact --\u003e SugarBean\n    \n    SugarEmailAddress --\u003e EmailAddresses\n    SugarEmailAddress --\u003e EmailAddrBeanRel\n```\n\nSources: [include/language/en_us.lang.php:51-112](), [modules/Users/User.php:50-51](), [modules/Emails/Email.php:54](), [modules/EmailMan/EmailMan.php:46]()\n\n## User Management System\n\nThe User management system serves as the foundation for authentication, authorization, and user preferences throughout SuiteCRM. The `User` class extends the `Person` template and implements the `EmailInterface` to provide comprehensive user functionality.\n\n### User Entity Architecture\n\nThe `User` class provides core user functionality including authentication, preferences, and email management:\n\n```mermaid\ngraph TB\n    User[\"User\u003cbr/\u003emodules/Users/User.php\"]\n    Person[\"Person\u003cbr/\u003einclude/SugarObjects/templates/person/Person.php\"]\n    Basic[\"Basic\u003cbr/\u003einclude/SugarObjects/templates/basic/Basic.php\"]\n    SugarBean[\"SugarBean\u003cbr/\u003edata/SugarBean.php\"]\n    EmailInterface[\"EmailInterface\u003cbr/\u003einclude/EmailInterface.php\"]\n    \n    User --\u003e Person\n    User --\u003e EmailInterface\n    Person --\u003e Basic\n    Basic --\u003e SugarBean\n    \n    User --\u003e UserPreference[\"UserPreference\u003cbr/\u003emodules/UserPreferences/\"]\n    User --\u003e SugarEmailAddress[\"SugarEmailAddress\u003cbr/\u003einclude/SugarEmailAddress/\"]\n    \n    UserPreference --\u003e \"user_preferences table\"\n    SugarEmailAddress --\u003e \"email_addresses table\"\n```\n\nThe `User` class contains extensive functionality for managing user accounts:\n\n- **Authentication**: Password validation, external authentication support\n- **Preferences**: User-specific settings, locale, timezone configuration  \n- **Email Integration**: Email signatures, outbound email accounts\n- **Security**: Access control, factor authentication support\n\nSources: [modules/Users/User.php:50-51](), [modules/Users/User.php:140-145](), [include/SugarObjects/templates/basic/Basic.php:43]()\n\n### Email Address Management\n\nThe `SugarEmailAddress` class provides sophisticated email address management capabilities that are used throughout the CRM system:\n\n```mermaid\ngraph LR\n    subgraph \"Email Address System\"\n        SugarEmailAddress[\"SugarEmailAddress\u003cbr/\u003esaveEmail()\"]\n        EmailAddressBean[\"EmailAddress\u003cbr/\u003eBean Entity\"]\n        EmailAddrBeanRel[\"email_addr_bean_rel\u003cbr/\u003eRelationship Table\"]\n    end\n    \n    subgraph \"Business Entities\"\n        User[\"User\"]\n        Contact[\"Contact\"] \n        Lead[\"Lead\"]\n        Account[\"Account\"]\n    end\n    \n    User --\u003e SugarEmailAddress\n    Contact --\u003e SugarEmailAddress\n    Lead --\u003e SugarEmailAddress\n    Account --\u003e SugarEmailAddress\n    \n    SugarEmailAddress --\u003e EmailAddressBean\n    SugarEmailAddress --\u003e EmailAddrBeanRel\n    \n    EmailAddrBeanRel --\u003e \"primary_address flag\"\n    EmailAddrBeanRel --\u003e \"reply_to_address flag\"\n    EmailAddrBeanRel --\u003e \"opt_out flag\"\n    EmailAddrBeanRel --\u003e \"invalid_email flag\"\n```\n\nKey features of the email address system include:\n\n- **Multi-address Support**: Each entity can have multiple email addresses\n- **Primary/Reply-to Designation**: Flexible addressing for communications\n- **Opt-out Management**: Compliance with email marketing regulations\n- **Validation**: Email format validation and duplicate detection\n\nSources: [include/SugarEmailAddress/SugarEmailAddress.php:49-50](), [include/SugarEmailAddress/SugarEmailAddress.php:632-682](), [include/SugarEmailAddress/SugarEmailAddress.php:278-408]()\n\n## Email Communication System\n\nThe email system provides comprehensive email functionality including composition, sending, receiving, and management. It integrates closely with the user management system and provides both programmatic and user interface capabilities.\n\n### Email Core Components\n\nThe email system architecture centers around the `Email` class and supporting components:\n\n```mermaid\ngraph TB\n    subgraph \"Email Core\"\n        Email[\"Email\u003cbr/\u003emodules/Emails/Email.php\u003cbr/\u003eemail2Send()\"]\n        EmailUI[\"EmailUI\u003cbr/\u003emodules/Emails/EmailUI.php\u003cbr/\u003edisplayEmailFrame()\"]\n        SugarPHPMailer[\"SugarPHPMailer\u003cbr/\u003einclude/SugarPHPMailer.php\"]\n    end\n    \n    subgraph \"Email Processing\"\n        EmailUIAjax[\"EmailUIAjax\u003cbr/\u003emodules/Emails/EmailUIAjax.php\u003cbr/\u003esendEmail action\"]\n        InboundEmail[\"InboundEmail\u003cbr/\u003emodules/InboundEmail/\"]\n        OutboundEmail[\"OutboundEmail\u003cbr/\u003einclude/OutboundEmail/\"]\n    end\n    \n    subgraph \"Storage\"\n        EmailsTable[\"emails table\"]\n        EmailText[\"emails_text table\"]\n        Attachments[\"notes table\u003cbr/\u003e(attachments)\"]\n    end\n    \n    Email --\u003e EmailUI\n    Email --\u003e SugarPHPMailer\n    EmailUI --\u003e EmailUIAjax\n    \n    Email --\u003e InboundEmail\n    Email --\u003e OutboundEmail\n    \n    Email --\u003e EmailsTable\n    Email --\u003e EmailText\n    Email --\u003e Attachments\n    \n    EmailUIAjax --\u003e \"AJAX handlers\u003cbr/\u003ecomposeEmail\u003cbr/\u003esendEmail\u003cbr/\u003euploadAttachment\"\n```\n\nThe `Email` class provides the core email functionality with methods for:\n\n- **Composition**: `email2Send()` method handles email creation and sending\n- **Address Parsing**: `email2ParseAddresses()` processes recipient lists\n- **Attachment Handling**: Integration with the Notes system for file attachments\n- **Template Processing**: Support for email templates and variable substitution\n\nSources: [modules/Emails/Email.php:54](), [modules/Emails/Email.php:911-912](), [modules/Emails/EmailUI.php:55](), [modules/Emails/EmailUIAjax.php:127-128]()\n\n### Email User Interface\n\nThe `EmailUI` class provides the sophisticated web-based email interface that allows users to manage emails through the browser:\n\n```mermaid\ngraph LR\n    subgraph \"Email UI Components\"\n        EmailUI[\"EmailUI\u003cbr/\u003edisplayEmailFrame()\"]\n        ComposeDialog[\"Compose Dialog\u003cbr/\u003edisplayComposeEmail()\"]\n        FolderTree[\"Folder Tree\u003cbr/\u003egetMailboxNodes()\"]\n        MessageList[\"Message List\u003cbr/\u003eListView\"]\n    end\n    \n    subgraph \"AJAX Handlers\"\n        ComposeHandler[\"composeEmail\u003cbr/\u003eEmailUIAjax.php:127\"]\n        SendHandler[\"sendEmail\u003cbr/\u003eEmailUIAjax.php:182\"]\n        AttachmentHandler[\"uploadAttachment\u003cbr/\u003eEmailUIAjax.php:207\"]\n    end\n    \n    subgraph \"User Preferences\"\n        EmailSettings[\"Email Settings\u003cbr/\u003egetUserPreferencesJS()\"]\n        Signatures[\"Email Signatures\u003cbr/\u003egetSignatures()\"]\n        Accounts[\"Email Accounts\u003cbr/\u003eretrieveByGroupId()\"]\n    end\n    \n    EmailUI --\u003e ComposeDialog\n    EmailUI --\u003e FolderTree\n    EmailUI --\u003e MessageList\n    \n    ComposeDialog --\u003e ComposeHandler\n    ComposeDialog --\u003e SendHandler\n    ComposeDialog --\u003e AttachmentHandler\n    \n    EmailUI --\u003e EmailSettings\n    EmailUI --\u003e Signatures\n    EmailUI --\u003e Accounts\n```\n\nKey features of the email UI include:\n\n- **Rich Compose Interface**: WYSIWYG editor, attachment support, address book integration\n- **Folder Management**: Hierarchical folder structure, inbox organization\n- **Account Management**: Multiple email account support, IMAP/POP integration\n- **Real-time Updates**: AJAX-based interface for responsive email handling\n\nSources: [modules/Emails/EmailUI.php:84-99](), [modules/Emails/EmailUI.php:108-109](), [modules/Emails/EmailUIAjax.php:110-121]()\n\n## Campaign Management System\n\nThe campaign management system enables email marketing capabilities through the `EmailMan` class and related components. This system manages bulk email sending, target list management, and campaign tracking.\n\n### Campaign Architecture\n\nThe campaign system coordinates between multiple modules to deliver email marketing functionality:\n\n```mermaid\ngraph TB\n    subgraph \"Campaign Management\"\n        EmailMan[\"EmailMan\u003cbr/\u003emodules/EmailMan/EmailMan.php\"]\n        Campaign[\"Campaign\u003cbr/\u003emodules/Campaigns/\"]\n        EmailMarketing[\"EmailMarketing\u003cbr/\u003emodules/EmailMarketing/\"]\n    end\n    \n    subgraph \"Target Management\"\n        ProspectList[\"ProspectList\u003cbr/\u003emodules/ProspectLists/\"]\n        Prospects[\"Prospects\u003cbr/\u003emodules/Prospects/\"]\n        Leads[\"Leads\u003cbr/\u003emodules/Leads/\"]\n        Contacts[\"Contacts\u003cbr/\u003emodules/Contacts/\"]\n    end\n    \n    subgraph \"Email Processing\"\n        EmailTemplate[\"EmailTemplate\u003cbr/\u003emodules/EmailTemplates/\"]\n        Email[\"Email\u003cbr/\u003emodules/Emails/Email.php\"]\n        SugarPHPMailer[\"SugarPHPMailer\"]\n    end\n    \n    EmailMan --\u003e Campaign\n    EmailMan --\u003e EmailMarketing\n    EmailMan --\u003e ProspectList\n    \n    ProspectList --\u003e Prospects\n    ProspectList --\u003e Leads\n    ProspectList --\u003e Contacts\n    \n    EmailMan --\u003e EmailTemplate\n    EmailMan --\u003e Email\n    Email --\u003e SugarPHPMailer\n    \n    EmailMan --\u003e \"emailman table\u003cbr/\u003eQueue Management\"\n    Campaign --\u003e \"campaigns table\"\n    EmailMarketing --\u003e \"email_marketing table\"\n```\n\nThe `EmailMan` class serves as the central coordinator for campaign email delivery:\n\n- **Queue Management**: Manages email delivery queues and scheduling\n- **Target Processing**: Handles recipient list processing and filtering\n- **Template Merging**: Applies email templates with personalized content\n- **Delivery Tracking**: Records delivery status and campaign metrics\n\nSources: [modules/EmailMan/EmailMan.php:46](), [modules/EmailMan/EmailMan.php:152-154](), [modules/EmailMan/EmailMan.php:182-195]()\n\n### Email Queue Processing\n\nThe EmailMan system includes sophisticated queue processing capabilities:\n\n```mermaid\ngraph LR\n    subgraph \"Queue Processing Flow\"\n        QueueEntry[\"EmailMan Entry\u003cbr/\u003ein_queue = 1\"]\n        ProcessEmail[\"sendEmailViaEmailMan()\u003cbr/\u003eEmailMan.php:785\"]\n        TemplateProcess[\"Template Processing\u003cbr/\u003eparse_template()\"]\n        Delivery[\"Email Delivery\u003cbr/\u003eSugarPHPMailer\"]\n        StatusUpdate[\"Status Update\u003cbr/\u003esend_attempts++\"]\n    end\n    \n    subgraph \"Queue Queries\"\n        CreateQueue[\"create_queue_items_query()\u003cbr/\u003eEmailMan.php:279\"]\n        NewListQuery[\"create_new_list_query()\u003cbr/\u003eEmailMan.php:182\"]\n    end\n    \n    QueueEntry --\u003e ProcessEmail\n    ProcessEmail --\u003e TemplateProcess\n    TemplateProcess --\u003e Delivery\n    Delivery --\u003e StatusUpdate\n    \n    CreateQueue --\u003e \"Queue View Queries\"\n    NewListQuery --\u003e \"Campaign Reports\"\n```\n\nKey queue processing features include:\n\n- **Batch Processing**: Handles large volume email campaigns efficiently\n- **Retry Logic**: Automatic retry for failed deliveries with attempt tracking\n- **Opt-out Compliance**: Respects opt-out flags and invalid email markers\n- **Performance Optimization**: Optimized queries for large recipient lists\n\nSources: [modules/EmailMan/EmailMan.php:279-347](), [modules/EmailMan/EmailMan.php:785](), [modules/EmailMan/EmailMan.php:182-263]()\n\n## Integration Patterns\n\nThe core business modules follow consistent integration patterns that enable seamless data flow and functionality across the CRM system.\n\n### Email Integration Pattern\n\nAll major business entities integrate with the email system through standardized patterns:\n\n```mermaid\ngraph TB\n    subgraph \"Business Entities\"\n        User[\"User\"]\n        Contact[\"Contact\"]\n        Lead[\"Lead\"]\n        Account[\"Account\"]\n        Opportunity[\"Opportunity\"]\n    end\n    \n    subgraph \"Email Integration Layer\"\n        SugarEmailAddress[\"SugarEmailAddress\u003cbr/\u003eEmail Address Management\"]\n        EmailCompose[\"Email Composition\u003cbr/\u003eSugarWidgetSubPanelTopComposeEmailButton\"]\n        EmailHistory[\"Email History\u003cbr/\u003eemails_beans_rel\"]\n    end\n    \n    subgraph \"Email System\"\n        Email[\"Email Class\"]\n        EmailUI[\"EmailUI\"]\n        EmailMan[\"EmailMan\"]\n    end\n    \n    User --\u003e SugarEmailAddress\n    Contact --\u003e SugarEmailAddress\n    Lead --\u003e SugarEmailAddress\n    Account --\u003e SugarEmailAddress\n    Opportunity --\u003e EmailCompose\n    \n    SugarEmailAddress --\u003e Email\n    EmailCompose --\u003e EmailUI\n    EmailHistory --\u003e EmailMan\n    \n    Email --\u003e \"Compose Email\u003cbr/\u003edata-module\u003cbr/\u003edata-record-id\u003cbr/\u003edata-email-address\"\n```\n\nThis integration pattern enables:\n\n- **Unified Email Access**: Consistent email functionality across all modules\n- **Contextual Communication**: Emails automatically linked to relevant records\n- **Address Management**: Centralized email address handling with validation\n- **Activity Tracking**: Complete email history associated with business records\n\nSources: [include/generic/SugarWidgets/SugarWidgetSubPanelTopComposeEmailButton.php:45](), [include/generic/SugarWidgets/SugarWidgetSubPanelTopComposeEmailButton.php:105-110](), [include/SugarObjects/templates/basic/Basic.php:75-87]()\n\n### Module Communication Architecture\n\nThe core business modules communicate through well-defined interfaces and shared services:\n\n```mermaid\ngraph TB\n    subgraph \"Service Layer\"\n        BeanFactory[\"BeanFactory\u003cbr/\u003eBean Creation\"]\n        SugarEmailAddress[\"SugarEmailAddress\u003cbr/\u003eEmail Services\"]\n        EmailUI[\"EmailUI\u003cbr/\u003eUI Services\"]\n        DBManagerFactory[\"DBManagerFactory\u003cbr/\u003eData Access\"]\n    end\n    \n    subgraph \"Core Modules\"\n        User[\"User Module\"]\n        Email[\"Email Module\"]\n        Campaign[\"Campaign Module\"]\n        Contact[\"Contact Module\"]\n    end\n    \n    subgraph \"Integration Points\"\n        EmailInterface[\"EmailInterface\u003cbr/\u003eContract Definition\"]\n        SugarBean[\"SugarBean\u003cbr/\u003eBase Functionality\"]\n        ACL[\"ACL System\u003cbr/\u003eAccess Control\"]\n    end\n    \n    User --\u003e EmailInterface\n    User --\u003e SugarBean\n    Email --\u003e SugarBean\n    Campaign --\u003e SugarBean\n    Contact --\u003e SugarBean\n    \n    User --\u003e SugarEmailAddress\n    Email --\u003e EmailUI\n    Campaign --\u003e SugarEmailAddress\n    Contact --\u003e SugarEmailAddress\n    \n    User --\u003e BeanFactory\n    Email --\u003e BeanFactory\n    Campaign --\u003e BeanFactory\n    \n    User --\u003e ACL\n    Email --\u003e ACL\n    Campaign --\u003e ACL\n```\n\nThis architecture provides:\n\n- **Loose Coupling**: Modules interact through well-defined interfaces\n- **Service Reuse**: Common functionality shared across modules\n- **Consistent Access Control**: Unified security model across all modules\n- **Extensibility**: Clear extension points for customization\n\nSources: [modules/Users/User.php:50](), [include/EmailInterface.php:46](), [include/SugarObjects/templates/basic/Basic.php:43](), [modules/Emails/Email.php:604-612]()"])</script><script>self.__next_f.push([1,"1e:T2c32,"])</script><script>self.__next_f.push([1,"# User Management\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [include/SugarEmailAddress/templates/optInStatusTick.tpl](include/SugarEmailAddress/templates/optInStatusTick.tpl)\n- [include/generic/SugarWidgets/SugarWidgetSubPanelEmailLink.php](include/generic/SugarWidgets/SugarWidgetSubPanelEmailLink.php)\n- [include/generic/SugarWidgets/SugarWidgetSubPanelTopComposeEmailButton.php](include/generic/SugarWidgets/SugarWidgetSubPanelTopComposeEmailButton.php)\n- [modules/Emails/EmailUI.css](modules/Emails/EmailUI.css)\n- [modules/Emails/EmailUI.php](modules/Emails/EmailUI.php)\n- [modules/Emails/EmailUIAjax.php](modules/Emails/EmailUIAjax.php)\n- [modules/Emails/PopupDocuments.html](modules/Emails/PopupDocuments.html)\n- [modules/Emails/javascript/EmailUI.js](modules/Emails/javascript/EmailUI.js)\n- [modules/Emails/templates/editAccountDialogue.tpl](modules/Emails/templates/editAccountDialogue.tpl)\n- [modules/Emails/templates/emailSettingsAccounts.tpl](modules/Emails/templates/emailSettingsAccounts.tpl)\n- [modules/Emails/templates/emailSettingsFolders.tpl](modules/Emails/templates/emailSettingsFolders.tpl)\n- [modules/Emails/templates/emailSettingsGeneral.tpl](modules/Emails/templates/emailSettingsGeneral.tpl)\n- [modules/Emails/templates/outboundDialog.tpl](modules/Emails/templates/outboundDialog.tpl)\n- [modules/Users/User.php](modules/Users/User.php)\n- [modules/Users/UserViewHelper.php](modules/Users/UserViewHelper.php)\n- [modules/Users/controller.php](modules/Users/controller.php)\n- [modules/Users/language/en_us.lang.php](modules/Users/language/en_us.lang.php)\n- [modules/Users/tpls/EditViewFooter.tpl](modules/Users/tpls/EditViewFooter.tpl)\n- [modules/Users/tpls/EditViewHeader.tpl](modules/Users/tpls/EditViewHeader.tpl)\n- [modules/Users/tpls/wizard.tpl](modules/Users/tpls/wizard.tpl)\n- [modules/Users/views/view.wizard.php](modules/Users/views/view.wizard.php)\n\n\u003c/details\u003e\n\n\n\n## Purpose and Scope\n\nThe User Management system in SuiteCRM handles user entities, authentication, preferences, and email integration. This system provides comprehensive user account management including user profiles, preferences, authentication, email settings, and administrative functions. For email-specific functionality beyond user settings, see [Email System](#4.2). For broader authentication and security configurations, see [Administration Panel](#5.2).\n\n## Core User Entity\n\nThe `User` class serves as the central entity for user management, extending the `Person` class and implementing the `EmailInterface`. Located in [modules/Users/User.php:50](), this class manages user data, preferences, and email functionality.\n\n```mermaid\nclassDiagram\n    class Person {\n        \u003c\u003cabstract\u003e\u003e\n        +first_name: string\n        +last_name: string\n        +email1: string\n    }\n    \n    class EmailInterface {\n        \u003c\u003cinterface\u003e\u003e\n        +populateComposeViewFields()\n    }\n    \n    class User {\n        +user_name: string\n        +user_hash: string\n        +is_admin: boolean\n        +status: string\n        +portal_only: boolean\n        +is_group: boolean\n        +factor_auth: boolean\n        +authenticated: boolean\n        +_userPreferenceFocus: UserPreference\n        +save(check_notify): string\n        +getSystemUser(): User\n        +setPreference(name, value, category): void\n        +getPreference(name, category): mixed\n        +getSignatures(): array\n        +hasPersonalEmail(): boolean\n    }\n    \n    class UserPreference {\n        +setPreference(name, value, category): void\n        +getPreference(name, category): mixed\n        +loadPreferences(category): boolean\n        +savePreferencesToDB(): void\n    }\n    \n    Person \u003c|-- User\n    EmailInterface \u003c|.. User\n    User --\u003e UserPreference : \"_userPreferenceFocus\"\n```\n\nThe User class contains essential user properties including authentication fields (`user_name`, `user_hash`, `authenticated`), access control fields (`is_admin`, `portal_only`, `is_group`), and two-factor authentication settings (`factor_auth`, `factor_auth_interface`).\n\n**Sources:** [modules/Users/User.php:50-138]()\n\n## User Preferences Management\n\nThe user preferences system integrates with the `UserPreference` class to manage user-specific settings across different categories. The User class provides an interface to preference management through its `_userPreferenceFocus` property.\n\n```mermaid\nflowchart TD\n    A[\"User::setPreference()\"] --\u003e B[\"UserPreference::setPreference()\"]\n    B --\u003e C[\"Validate Category\"]\n    C --\u003e D[\"Store in Memory\"]\n    D --\u003e E[\"User::savePreferencesToDB()\"]\n    E --\u003e F[\"UserPreference::savePreferencesToDB()\"]\n    F --\u003e G[\"Database Update\"]\n    \n    H[\"User::getPreference()\"] --\u003e I[\"UserPreference::getPreference()\"]\n    I --\u003e J[\"Check Memory Cache\"]\n    J --\u003e K[\"Load from DB if needed\"]\n    K --\u003e L[\"Return Value\"]\n    \n    M[\"User::loadPreferences()\"] --\u003e N[\"UserPreference::loadPreferences()\"]\n    N --\u003e O[\"Query Database\"]\n    O --\u003e P[\"Populate Memory Cache\"]\n```\n\nKey preference categories include:\n- `global`: General user settings\n- `Emails`: Email-specific preferences  \n- `ETag`: UI cache management\n\nThe system supports various preference types including timezone, date/time formats, currency settings, email signatures, and UI customizations.\n\n**Sources:** [modules/Users/User.php:379-394](), [modules/Users/User.php:518-531](), [modules/Users/UserViewHelper.php:730-970]()\n\n## Authentication and Access Control\n\nThe User class implements several authentication and authorization mechanisms:\n\n### User Types and Access Levels\n\n```mermaid\ngraph TB\n    User --\u003e Administrator[\"is_admin = true\u003cbr/\u003eFull System Access\"]\n    User --\u003e Regular[\"Regular User\u003cbr/\u003eRole-based Access\"]\n    User --\u003e Group[\"is_group = true\u003cbr/\u003eGroup Assignment Only\"]\n    User --\u003e Portal[\"portal_only = true\u003cbr/\u003ePortal API Access\"]\n    \n    Administrator --\u003e TwoFactor[\"factor_auth = true\u003cbr/\u003eTwo-Factor Authentication\"]\n    Regular --\u003e TwoFactor\n```\n\n### Authentication Flow\n\nThe authentication process involves multiple validation steps including two-factor authentication support:\n\n- Password validation with configurable complexity requirements\n- Two-factor authentication through `factor_auth` and `factor_auth_interface` fields\n- SMTP server validation for email-based authentication features\n- Session management through the `authenticated` property\n\n**Sources:** [modules/Users/User.php:621-654](), [modules/Users/UserViewHelper.php:115-168]()\n\n## Email Integration System\n\nThe User class integrates extensively with the email system through the `EmailUI` class and email preference management. This integration includes signature management, email account configuration, and compose functionality.\n\n```mermaid\nflowchart LR\n    subgraph \"User Email Components\"\n        A[\"User\"] --\u003e B[\"EmailUI\"]\n        A --\u003e C[\"Email Signatures\"]\n        A --\u003e D[\"Email Preferences\"]\n        A --\u003e E[\"Email Accounts\"]\n    end\n    \n    subgraph \"EmailUI Functions\"\n        B --\u003e F[\"populateComposeViewFields()\"]\n        B --\u003e G[\"displayEmailFrame()\"]\n        B --\u003e H[\"generateComposePackageForQuickCreate()\"]\n    end\n    \n    subgraph \"Signature Management\"\n        C --\u003e I[\"getSignatures()\"]\n        C --\u003e J[\"getDefaultSignature()\"]\n        C --\u003e K[\"getSignatureButtons()\"]\n    end\n    \n    subgraph \"Email Preferences\"\n        D --\u003e L[\"mail_fromname\"]\n        D --\u003e M[\"mail_fromaddress\"]\n        D --\u003e N[\"signature_default\"]\n        D --\u003e O[\"email_link_type\"]\n    end\n```\n\n### Email Signature System\n\nThe signature management system allows users to create and manage multiple email signatures:\n\n- Signatures are stored in the `users_signatures` table\n- Users can set a default signature via preferences\n- HTML and plain text signature support\n- Signature selection in compose dialogs\n\n### Email UI Integration\n\nThe `EmailUI` class provides comprehensive email functionality including:\n\n- Email composition interface generation\n- Account management dialogs\n- Folder management\n- Template integration\n- Quick compose functionality\n\n**Sources:** [modules/Users/User.php:181-325](), [modules/Emails/EmailUI.php:84-369](), [modules/Emails/EmailUI.php:458-605]()\n\n## User Management UI Components\n\nThe user interface system consists of several view components and helpers that manage user data presentation and interaction.\n\n```mermaid\ngraph TD\n    A[\"UsersController\"] --\u003e B[\"EditView\"]\n    A --\u003e C[\"DetailView\"] \n    A --\u003e D[\"WizardView\"]\n    \n    B --\u003e E[\"UserViewHelper\"]\n    C --\u003e E\n    D --\u003e F[\"ViewWizard\"]\n    \n    E --\u003e G[\"setupAdditionalFields()\"]\n    E --\u003e H[\"setupUserTypeDropdown()\"]\n    E --\u003e I[\"setupPasswordTab()\"]\n    E --\u003e J[\"setupEmailSettings()\"]\n    E --\u003e K[\"setupThemeTab()\"]\n    \n    G --\u003e L[\"EditViewHeader.tpl\"]\n    G --\u003e M[\"EditViewFooter.tpl\"]\n    \n    F --\u003e N[\"wizard.tpl\"]\n```\n\n### User View Helper\n\nThe `UserViewHelper` class manages complex UI rendering for user edit and detail views:\n\n- User type dropdown configuration\n- Password change interface\n- Email settings integration\n- Theme selection\n- Advanced preference tabs\n\n### User Controller Actions\n\nThe `UsersController` provides several key actions:\n\n- `action_editview()` and `action_detailview()`: Standard CRUD operations with access control\n- `action_resetPreferences()`: User preference reset functionality\n- `action_delete()`: User deactivation and cleanup\n- `action_wizard()` and `action_saveuserwizard()`: New user onboarding\n\n**Sources:** [modules/Users/UserViewHelper.php:49-112](), [modules/Users/controller.php:49-244](), [modules/Users/views/view.wizard.php:55-131]()\n\n## User Lifecycle Management\n\nThe user management system handles the complete user lifecycle from creation to deletion, including specialized user types and account management.\n\n```mermaid\nstateDiagram-v2\n    [*] --\u003e Creating\n    Creating --\u003e Active : save()\n    Creating --\u003e Wizard : New User Setup\n    \n    Active --\u003e Editing : Edit Profile\n    Active --\u003e PasswordChange : Change Password\n    Active --\u003e ResetPrefs : Reset Preferences\n    \n    Wizard --\u003e Active : Complete Setup\n    Editing --\u003e Active : Save Changes\n    PasswordChange --\u003e Active : Password Updated\n    ResetPrefs --\u003e Active : Preferences Reset\n    \n    Active --\u003e Inactive : Deactivate\n    Inactive --\u003e Active : Reactivate\n    Active --\u003e Deleted : mark_deleted()\n    \n    Deleted --\u003e [*]\n```\n\n### User Creation and Setup\n\nNew users go through a wizard process that configures:\n- Personal information\n- Locale preferences (timezone, date/time formats, currency)\n- Email settings\n- Theme selection\n- Initial module access\n\n### User Types and Permissions\n\nThe system supports multiple user types with different capabilities:\n\n- **Regular Users**: Standard CRM access with role-based permissions\n- **Administrators**: Full system access including user management\n- **Group Users**: Used for assignment purposes, cannot log in\n- **Portal Users**: Limited to portal API access\n\n### Account Maintenance\n\nThe system provides tools for ongoing user account maintenance:\n- Preference reset functionality\n- Password management with complexity requirements\n- Email account configuration\n- Theme and UI customization\n\n**Sources:** [modules/Users/controller.php:104-220](), [modules/Users/views/view.wizard.php:72-200](), [modules/Users/User.php:605-728]()"])</script><script>self.__next_f.push([1,"1f:T4b3c,"])</script><script>self.__next_f.push([1,"# Email System\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [include/SugarEmailAddress/SugarEmailAddress.php](include/SugarEmailAddress/SugarEmailAddress.php)\n- [include/SugarEmailAddress/getEmailAddressWidget.php](include/SugarEmailAddress/getEmailAddressWidget.php)\n- [include/SugarObjects/templates/basic/Basic.php](include/SugarObjects/templates/basic/Basic.php)\n- [include/SugarObjects/templates/company/metadata/listviewdefs.php](include/SugarObjects/templates/company/metadata/listviewdefs.php)\n- [include/TemplateHandler/TemplateHandler.php](include/TemplateHandler/TemplateHandler.php)\n- [include/javascript/EmailsComposeViewModal.js](include/javascript/EmailsComposeViewModal.js)\n- [include/language/en_us.lang.php](include/language/en_us.lang.php)\n- [jssource/src_files/include/javascript/EmailsComposeViewModal.js](jssource/src_files/include/javascript/EmailsComposeViewModal.js)\n- [jssource/src_files/include/javascript/message-box.js](jssource/src_files/include/javascript/message-box.js)\n- [metadata/email_addressesMetaData.php](metadata/email_addressesMetaData.php)\n- [modules/Accounts/metadata/listviewdefs.php](modules/Accounts/metadata/listviewdefs.php)\n- [modules/Configurator/Configurator.php](modules/Configurator/Configurator.php)\n- [modules/Contacts/Dashlets/MyContactsDashlet/MyContactsDashlet.data.php](modules/Contacts/Dashlets/MyContactsDashlet/MyContactsDashlet.data.php)\n- [modules/Contacts/metadata/listviewdefs.php](modules/Contacts/metadata/listviewdefs.php)\n- [modules/EmailAddresses/EmailAddress.php](modules/EmailAddresses/EmailAddress.php)\n- [modules/EmailAddresses/language/en_us.lang.php](modules/EmailAddresses/language/en_us.lang.php)\n- [modules/EmailMan/EmailMan.php](modules/EmailMan/EmailMan.php)\n- [modules/Emails/Email.php](modules/Emails/Email.php)\n- [modules/Emails/EmailsController.php](modules/Emails/EmailsController.php)\n- [modules/Emails/EmailsControllerActionGetFromFields.php](modules/Emails/EmailsControllerActionGetFromFields.php)\n- [modules/Emails/EmailsDataAddress.php](modules/Emails/EmailsDataAddress.php)\n- [modules/Emails/EmailsDataAddressCollector.php](modules/Emails/EmailsDataAddressCollector.php)\n- [modules/Emails/EmailsSignatureResolver.php](modules/Emails/EmailsSignatureResolver.php)\n- [modules/Emails/Folder.php](modules/Emails/Folder.php)\n- [modules/Emails/controller.php](modules/Emails/controller.php)\n- [modules/Emails/include/ComposeView/ComposeView.tpl](modules/Emails/include/ComposeView/ComposeView.tpl)\n- [modules/Emails/include/ComposeView/ComposeViewToolbar.tpl](modules/Emails/include/ComposeView/ComposeViewToolbar.tpl)\n- [modules/Emails/include/ComposeView/EmailsComposeView.js](modules/Emails/include/ComposeView/EmailsComposeView.js)\n- [modules/Emails/include/ImportView/ImportView.tpl](modules/Emails/include/ImportView/ImportView.tpl)\n- [modules/Emails/include/ListView/ComposeViewModal.js](modules/Emails/include/ListView/ComposeViewModal.js)\n- [modules/Emails/include/ListView/ListViewDataEmails.php](modules/Emails/include/ListView/ListViewDataEmails.php)\n- [modules/Emails/include/ListView/ListViewDataEmailsSearchAbstract.php](modules/Emails/include/ListView/ListViewDataEmailsSearchAbstract.php)\n- [modules/Emails/include/ListView/ListViewDataEmailsSearchOnCrm.php](modules/Emails/include/ListView/ListViewDataEmailsSearchOnCrm.php)\n- [modules/Emails/include/ListView/ListViewDataEmailsSearchOnIMap.php](modules/Emails/include/ListView/ListViewDataEmailsSearchOnIMap.php)\n- [modules/Emails/javascript/composeEmailTemplate.js](modules/Emails/javascript/composeEmailTemplate.js)\n- [modules/Emails/language/en_us.lang.php](modules/Emails/language/en_us.lang.php)\n- [modules/Emails/metadata/composeviewdefs.php](modules/Emails/metadata/composeviewdefs.php)\n- [modules/Emails/metadata/editviewdefs.php](modules/Emails/metadata/editviewdefs.php)\n- [modules/Emails/metadata/importviewdefs.php](modules/Emails/metadata/importviewdefs.php)\n- [modules/Emails/metadata/listviewdefs.php](modules/Emails/metadata/listviewdefs.php)\n- [modules/Emails/vardefs.php](modules/Emails/vardefs.php)\n- [modules/Emails/views/view.compose.php](modules/Emails/views/view.compose.php)\n- [modules/Emails/views/view.import.php](modules/Emails/views/view.import.php)\n- [modules/OutboundEmailAccounts/js/panel_toggle.js](modules/OutboundEmailAccounts/js/panel_toggle.js)\n- [themes/SuiteP/css/Noon/style.css](themes/SuiteP/css/Noon/style.css)\n- [themes/SuiteP/css/suitep-base/detailview.scss](themes/SuiteP/css/suitep-base/detailview.scss)\n- [themes/SuiteP/css/suitep-base/email.scss](themes/SuiteP/css/suitep-base/email.scss)\n\n\u003c/details\u003e\n\n\n\n## Purpose and Scope\n\nThe Email System provides comprehensive email functionality within SuiteCRM, including email composition, sending, receiving, storage, and management. This system handles both individual emails and mass email campaigns, managing email addresses, attachments, and relationships to other CRM entities.\n\nFor inbound email processing and IMAP handling, see [Inbound Email Processing](#4.5). For email marketing and campaign functionality, see [Campaign Management](#4.3).\n\n## System Architecture Overview\n\nThe email system consists of several interconnected components that work together to provide complete email functionality:\n\n```mermaid\ngraph TB\n    UI[\"EmailsComposeView.js\"] --\u003e Controller[\"EmailsController\"]\n    Controller --\u003e Email[\"Email\"]\n    Controller --\u003e SugarEmailAddress[\"SugarEmailAddress\"]\n    Email --\u003e EmailMan[\"EmailMan\"]\
