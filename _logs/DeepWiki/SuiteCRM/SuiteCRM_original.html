ies that supplement SuiteCRM's built-in database search. This system maintains a synchronized search index of CRM data and offers sophisticated query capabilities.\n\n### Architecture Overview\n\n```mermaid\ngraph TB\n    subgraph \"SuiteCRM Core\"\n        SB[\"SugarBean Objects\"]\n        DB[\"MySQL Database\"]\n        HOOKS[\"Logic Hooks\"]\n    end\n    \n    subgraph \"ElasticSearch Integration Layer\"\n        ESI[\"ElasticSearchIndexer\"]\n        ESHI[\"ElasticSearchHooks\"]\n        ESE[\"ElasticSearchEngine\"]\n        ESCB[\"ElasticSearchClientBuilder\"]\n    end\n    \n    subgraph \"Documentifiers\"\n        JSD[\"JsonSerializerDocumentifier\"]\n        SDD[\"SearchDefsDocumentifier\"]\n    end\n    \n    subgraph \"External Services\"\n        ESC[\"ElasticSearch Cluster\"]\n    end\n    \n    subgraph \"CLI Tools\"\n        ROBO[\"ElasticSearchCommands\"]\n    end\n    \n    SB --\u003e ESI\n    HOOKS --\u003e ESHI\n    ESHI --\u003e ESI\n    ESI --\u003e JSD\n    ESI --\u003e SDD\n    ESI --\u003e ESCB\n    ESCB --\u003e ESC\n    ESE --\u003e ESCB\n    ROBO --\u003e ESI\n    \n    ESI -.-\u003e ESC\n    ESE -.-\u003e ESC\n```\n\nSources: [lib/Search/ElasticSearch/ElasticSearchIndexer.php:1-592](), [lib/Search/ElasticSearch/ElasticSearchHooks.php:1-210](), [lib/Search/ElasticSearch/ElasticSearchClientBuilder.php:1-217]()\n\n### Indexing Process\n\nThe indexing system converts SugarBean objects into search-friendly documents and maintains them in ElasticSearch indices.\n\n```mermaid\ngraph TB\n    subgraph \"Data Sources\"\n        BEANS[\"SugarBean Objects\"]\n        MODULES[\"CRM Modules\"]\n    end\n    \n    subgraph \"Indexing Pipeline\"\n        ESI[\"ElasticSearchIndexer\"]\n        EDPM[\"ElasticSearchModuleDataPuller\"]\n        DOC[\"Documentifier\"]\n    end\n    \n    subgraph \"Document Processing\"\n        JSD[\"JsonSerializerDocumentifier\"]\n        SDD[\"SearchDefsDocumentifier\"]\n        BJS[\"BeanJsonSerializer\"]\n        PSF[\"ParserSearchFields\"]\n    end\n    \n    subgraph \"ElasticSearch Operations\"\n        CLIENT[\"Elasticsearch Client\"]\n        INDICES[\"ES Indices\"]\n    end\n    \n    MODULES --\u003e ESI\n    ESI --\u003e EDPM\n    EDPM --\u003e BEANS\n    BEANS --\u003e DOC\n    DOC --\u003e JSD\n    DOC --\u003e SDD\n    SDD --\u003e PSF\n    JSD --\u003e BJS\n    DOC --\u003e CLIENT\n    CLIENT --\u003e INDICES\n    \n    ESI -.-\u003e|\"index()\"| CLIENT\n    ESI -.-\u003e|\"indexBean()\"| CLIENT\n    ESI -.-\u003e|\"indexBeans()\"| CLIENT\n```\n\nThe indexer supports two main documentifiers:\n\n| Documentifier | Purpose | Configuration Source |\n|---------------|---------|---------------------|\n| `JsonSerializerDocumentifier` | Human-friendly documents with nested structure | Uses `BeanJsonSerializer` |\n| `SearchDefsDocumentifier` | Customizable fields based on search definitions | Uses module search defs files |\n\nSources: [lib/Search/ElasticSearch/ElasticSearchIndexer.php:111-164](), [lib/Search/Index/Documentify/JsonSerializerDocumentifier.php:1-79](), [lib/Search/Index/Documentify/SearchDefsDocumentifier.php:1-214]()\n\n### Real-time Index Updates\n\nLogic hooks ensure the search index stays synchronized with database changes:\n\n```mermaid\ngraph LR\n    subgraph \"SugarBean Lifecycle\"\n        SAVE[\"Bean Save\"]\n        DELETE[\"Bean Delete\"]\n    end\n    \n    subgraph \"Hook System\"\n        HOOKS[\"Logic Hooks\"]\n        ESH[\"ElasticSearchHooks\"]\n    end\n    \n    subgraph \"Index Operations\"\n        INDEX[\"indexBean()\"]\n        REMOVE[\"removeBean()\"]\n        ESI[\"ElasticSearchIndexer\"]\n    end\n    \n    SAVE --\u003e HOOKS\n    DELETE --\u003e HOOKS\n    HOOKS --\u003e ESH\n    ESH --\u003e|\"beanSaved()\"| INDEX\n    ESH --\u003e|\"beanDeleted()\"| REMOVE\n    INDEX --\u003e ESI\n    REMOVE --\u003e ESI\n```\n\nSources: [lib/Search/ElasticSearch/ElasticSearchHooks.php:67-96](), [lib/Search/ElasticSearch/ElasticSearchHooks.php:123-190]()\n\n### Configuration\n\nElasticSearch configuration is managed through the global `$sugar_config` array:\n\n```php\n$sugar_config['search']['ElasticSearch'] = [\n    'enabled' =\u003e true,\n    'host' =\u003e '127.0.0.1:9200',\n    'user' =\u003e 'elastic_user',  // optional\n    'pass' =\u003e 'elastic_pass'   // optional\n];\n```\n\nThe `ElasticSearchClientBuilder` class handles client configuration and connection management.\n\nSources: [lib/Search/ElasticSearch/ElasticSearchClientBuilder.php:166-188](), [lib/Search/ElasticSearch/ElasticSearchIndexer.php:97-109]()\n\n## Google Calendar Integration\n\nThe Google Calendar integration provides bidirectional synchronization between SuiteCRM meetings and Google Calendar events, allowing users to maintain unified calendar views.\n\n### Authentication Architecture\n\n```mermaid\ngraph TB\n    subgraph \"User Interface\"\n        UEV[\"User EditView\"]\n        SAVE_EP[\"entryPointSaveGoogleApiKey\"]\n    end\n    \n    subgraph \"OAuth Flow\"\n        GAKSE[\"GoogleApiKeySaverEntryPoint\"]\n        GCLIENT[\"Google Client\"]\n        GAUTH[\"Google OAuth2\"]\n    end\n    \n    subgraph \"Token Storage\"\n        UPREFS[\"User Preferences\"]\n        TOKEN[\"GoogleApiToken\"]\n        REFRESH[\"GoogleApiRefreshToken\"]\n    end\n    \n    subgraph \"Sync Components\"\n        GSB[\"GoogleSyncBase\"]\n        GS[\"GoogleSync\"]\n        GSH[\"GoogleSyncHelper\"]\n    end\n    \n    UEV --\u003e SAVE_EP\n    SAVE_EP --\u003e GAKSE\n    GAKSE --\u003e GCLIENT\n    GCLIENT -.-\u003e GAUTH\n    GAUTH -.-\u003e GCLIENT\n    GCLIENT --\u003e TOKEN\n    TOKEN --\u003e UPREFS\n    REFRESH --\u003e UPREFS\n    \n    UPREFS --\u003e GSB\n    GSB --\u003e GS\n    GS --\u003e GSH\n```\n\nSources: [modules/Users/entryPointSaveGoogleApiKey.php:1-58](), [modules/Users/GoogleApiKeySaverEntryPoint.php:1-265](), [include/GoogleSync/GoogleSyncBase.php:1-1127]()\n\n### Synchronization Process\n\nThe sync system implements a sophisticated conflict resolution strategy:\n\n```mermaid\ngraph TB\n    subgraph \"Data Sources\"\n        MEETINGS[\"SuiteCRM Meetings\"]\n        GEVENTS[\"Google Calendar Events\"]\n    end\n    \n    subgraph \"Sync Logic\"\n        GS[\"GoogleSync\"]\n        PPS[\"pushPullSkip()\"]\n        DA[\"doAction()\"]\n    end\n    \n    subgraph \"Actions\"\n        PUSH[\"pushEvent()\"]\n        PULL[\"pullEvent()\"]\n        SKIP[\"skip\"]\n        PUSH_DEL[\"push_delete\"]\n        PULL_DEL[\"pull_delete\"]\n    end\n    \n    subgraph \"Helper Functions\"\n        GSH[\"GoogleSyncHelper\"]\n        GTS[\"getTimeStrings()\"]\n        SKIP_CHECK[\"isSkippable()\"]\n        NEWEST[\"getNewestMeetingResponse()\"]\n    end\n    \n    MEETINGS --\u003e GS\n    GEVENTS --\u003e GS\n    GS --\u003e PPS\n    PPS --\u003e GSH\n    GSH --\u003e GTS\n    GSH --\u003e SKIP_CHECK\n    GSH --\u003e NEWEST\n    PPS --\u003e DA\n    DA --\u003e PUSH\n    DA --\u003e PULL\n    DA --\u003e SKIP\n    DA --\u003e PUSH_DEL\n    DA --\u003e PULL_DEL\n```\n\nThe sync decision logic follows this priority:\n\n| Condition | Action | Description |\n|-----------|--------|-------------|\n| Only SuiteCRM meeting exists | `push` | Create Google event |\n| Only Google event exists | `pull` | Create SuiteCRM meeting |\n| Both exist, no conflicts | `skip` | No action needed |\n| Google newer | `pull` or `pull_delete` | Update from Google |\n| SuiteCRM newer | `push` or `push_delete` | Update to Google |\n\nSources: [include/GoogleSync/GoogleSync.php:194-228](), [include/GoogleSync/GoogleSyncHelper.php:69-80](), [include/GoogleSync/GoogleSyncHelper.php:123-136]()\n\n### Calendar Management\n\n```mermaid\ngraph LR\n    subgraph \"Google Calendar Service\"\n        GSERV[\"Google Calendar Service\"]\n        CALLIST[\"Calendar List\"]\n        EVENTS[\"Events Resource\"]\n    end\n    \n    subgraph \"SuiteCRM Calendar\"\n        SUITE_CAL[\"SuiteCRM Calendar\"]\n        CAL_ID[\"Calendar ID\"]\n    end\n    \n    subgraph \"Operations\"\n        CREATE[\"createGoogleCalendarEvent()\"]\n        UPDATE[\"updateGoogleCalendarEvent()\"]\n        DELETE[\"delEvent()\"]\n        GET[\"getGoogleEventById()\"]\n    end\n    \n    GSERV --\u003e CALLIST\n    GSERV --\u003e EVENTS\n    CALLIST --\u003e SUITE_CAL\n    SUITE_CAL --\u003e CAL_ID\n    \n    CAL_ID --\u003e CREATE\n    CAL_ID --\u003e UPDATE\n    CAL_ID --\u003e DELETE\n    CAL_ID --\u003e GET\n```\n\nThe system automatically creates a \"SuiteCRM\" calendar in the user's Google account if it doesn't exist. The calendar name is configurable via `$sugar_config['google_calendar_sync_name']`.\n\nSources: [include/GoogleSync/GoogleSyncBase.php:328-371](), [include/GoogleSync/GoogleSyncBase.php:380-389](), [include/GoogleSync/GoogleSyncBase.php:397-427]()\n\n## Configuration and Administration\n\n### ElasticSearch Configuration\n\nElasticSearch can be enabled/disabled via the `ElasticSearchIndexer::isEnabled()` method, which checks the configuration:\n\n```php\n$sugar_config['search']['ElasticSearch']['enabled'] = true;\n```\n\nCLI commands are available for index management:\n\n| Command | Description | Implementation |\n|---------|-------------|----------------|\n| `elastic:index` | Full or differential indexing | `ElasticSearchCommands::elasticIndex()` |\n| `elastic:search` | Perform search queries | `ElasticSearchCommands::elasticSearch()` |\n| `elastic:rm-index` | Remove all indices | `ElasticSearchCommands::elasticRmIndex()` |\n\nSources: [lib/Robo/Plugin/Commands/ElasticSearchCommands.php:117-122](), [lib/Robo/Plugin/Commands/ElasticSearchCommands.php:76-97](), [lib/Robo/Plugin/Commands/ElasticSearchCommands.php:127-133]()\n\n### Google Calendar Configuration\n\nGoogle Calendar integration requires:\n\n1. **System Configuration**: Admin must configure OAuth credentials in `$sugar_config['google_auth_json']`\n2. **User Authorization**: Each user must authorize SuiteCRM to access their Google Calendar\n3. **Sync Preferences**: Users can enable/disable sync via `$user-\u003egetPreference('syncGCal', 'GoogleSync')`\n\nThe admin interface for Google configuration is available in the Configurator module.\n\nSources: [modules/Configurator/views/view.edit.php:176-185](), [include/GoogleSync/GoogleSyncBase.php:123-138](), [include/GoogleSync/GoogleSync.php:258-270]()\n\nBoth integrations support comprehensive error handling and logging through their respective logger systems, with ElasticSearch using Monolog and Google Sync using the standard SuiteCRM logger."])</script><script>self.__next_f.push([1,"2b:T377e,"])</script><script>self.__next_f.push([1,"# Google Calendar Integration\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [include/GoogleSync/GoogleSync.php](include/GoogleSync/GoogleSync.php)\n- [include/GoogleSync/GoogleSyncBase.php](include/GoogleSync/GoogleSyncBase.php)\n- [include/GoogleSync/GoogleSyncExceptions.php](include/GoogleSync/GoogleSyncExceptions.php)\n- [include/GoogleSync/GoogleSyncHelper.php](include/GoogleSync/GoogleSyncHelper.php)\n- [modules/Configurator/language/en_us.lang.php](modules/Configurator/language/en_us.lang.php)\n- [modules/Configurator/tpls/EditView.tpl](modules/Configurator/tpls/EditView.tpl)\n- [modules/Configurator/views/view.edit.php](modules/Configurator/views/view.edit.php)\n- [modules/Users/GoogleApiKeySaverEntryPoint.php](modules/Users/GoogleApiKeySaverEntryPoint.php)\n- [modules/Users/entryPointSaveGoogleApiKey.php](modules/Users/entryPointSaveGoogleApiKey.php)\n- [modules/Users/googleApiKeySaverEntryPointError.tpl](modules/Users/googleApiKeySaverEntryPointError.tpl)\n- [tests/unit/phpunit/lib/Search/UI/SearchResultsControllerTest.php](tests/unit/phpunit/lib/Search/UI/SearchResultsControllerTest.php)\n- [tests/unit/phpunit/lib/SuiteCRM/Log/CliLoggerHandlerTest.php](tests/unit/phpunit/lib/SuiteCRM/Log/CliLoggerHandlerTest.php)\n- [tests/unit/phpunit/lib/SuiteCRM/Search/AbstractDocumentifierTest.php](tests/unit/phpunit/lib/SuiteCRM/Search/AbstractDocumentifierTest.php)\n- [tests/unit/phpunit/lib/SuiteCRM/Search/ElasticSearch/ElasticSearchClientBuilderTest.php](tests/unit/phpunit/lib/SuiteCRM/Search/ElasticSearch/ElasticSearchClientBuilderTest.php)\n- [tests/unit/phpunit/lib/SuiteCRM/Search/ElasticSearch/ElasticSearchEngineTest.php](tests/unit/phpunit/lib/SuiteCRM/Search/ElasticSearch/ElasticSearchEngineTest.php)\n- [tests/unit/phpunit/lib/SuiteCRM/Search/ElasticSearch/ElasticSearchIndexerTest.php](tests/unit/phpunit/lib/SuiteCRM/Search/ElasticSearch/ElasticSearchIndexerTest.php)\n- [tests/unit/phpunit/lib/SuiteCRM/Search/SearchTestAbstract.php](tests/unit/phpunit/lib/SuiteCRM/Search/SearchTestAbstract.php)\n- [tests/unit/phpunit/lib/SuiteCRM/Search/SearchWrapperTest.php](tests/unit/phpunit/lib/SuiteCRM/Search/SearchWrapperTest.php)\n- [tests/unit/phpunit/lib/SuiteCRM/Utility/ArrayMapperTest.php](tests/unit/phpunit/lib/SuiteCRM/Utility/ArrayMapperTest.php)\n- [tests/unit/phpunit/lib/SuiteCRM/Utility/BeanJsonSerializerTest.php](tests/unit/phpunit/lib/SuiteCRM/Utility/BeanJsonSerializerTest.php)\n- [tests/unit/phpunit/modules/Administration/BaseHandlerTest.php](tests/unit/phpunit/modules/Administration/BaseHandlerTest.php)\n- [tests/unit/phpunit/modules/Users/GoogleApiKeySaverEntryPointMock.php](tests/unit/phpunit/modules/Users/GoogleApiKeySaverEntryPointMock.php)\n- [tests/unit/phpunit/modules/Users/GoogleApiKeySaverEntryPointTest.php](tests/unit/phpunit/modules/Users/GoogleApiKeySaverEntryPointTest.php)\n\n\u003c/details\u003e\n\n\n\n## Purpose and Scope\n\nThis document covers SuiteCRM's Google Calendar Integration system, which provides bidirectional synchronization between SuiteCRM Meetings and Google Calendar events. The integration supports OAuth2 authentication, user-level sync preferences, and automated scheduling via cron jobs. For information about other external integrations, see [External Integrations](#7). For ElasticSearch integration details, see [ElasticSearch Integration](#7.2).\n\n## Architecture Overview\n\nThe Google Calendar Integration consists of several interconnected components that handle authentication, synchronization logic, and configuration management.\n\n### System Component Architecture\n\n```mermaid\ngraph TB\n    subgraph \"Authentication Layer\"\n        OAUTH[\"GoogleApiKeySaverEntryPoint\u003cbr/\u003eOAuth2 Flow Handler\"]\n        TOKEN[\"User Token Storage\u003cbr/\u003eGoogleApiToken Preference\"]\n        CONFIG[\"Google API Configuration\u003cbr/\u003egoogle_auth_json\"]\n    end\n    \n    subgraph \"Sync Engine\"\n        SYNC[\"GoogleSync\u003cbr/\u003eMain Sync Orchestrator\"]\n        BASE[\"GoogleSyncBase\u003cbr/\u003eCore API Operations\"]\n        HELPER[\"GoogleSyncHelper\u003cbr/\u003eSync Logic Utilities\"]\n    end\n    \n    subgraph \"Data Layer\"\n        MEETINGS[\"Meeting Beans\u003cbr/\u003eSuiteCRM Meetings\"]\n        GCAL[\"Google Calendar API\u003cbr/\u003eCalendar Events\"]\n        PREFS[\"User Preferences\u003cbr/\u003esyncGCal Setting\"]\n    end\n    \n    subgraph \"Configuration Layer\"\n        ADMIN[\"Administration Panel\u003cbr/\u003eGoogle Auth JSON\"]\n        USER[\"User Settings\u003cbr/\u003eCalendar Sync Toggle\"]\n        SCHEDULER[\"Cron Scheduler\u003cbr/\u003eAutomated Sync Jobs\"]\n    end\n    \n    OAUTH --\u003e TOKEN\n    CONFIG --\u003e OAUTH\n    ADMIN --\u003e CONFIG\n    \n    SYNC --\u003e BASE\n    SYNC --\u003e HELPER\n    BASE --\u003e GCAL\n    BASE --\u003e MEETINGS\n    \n    TOKEN --\u003e BASE\n    PREFS --\u003e SYNC\n    USER --\u003e PREFS\n    \n    SCHEDULER --\u003e SYNC\n```\n\n**Sources:** [include/GoogleSync/GoogleSync.php:57-313](), [include/GoogleSync/GoogleSyncBase.php:60-285](), [modules/Users/GoogleApiKeySaverEntryPoint.php:58-264]()\n\n### OAuth2 Authentication Flow\n\n```mermaid\nsequenceDiagram\n    participant User\n    participant SuiteCRM as \"SuiteCRM\u003cbr/\u003eentryPointSaveGoogleApiKey\"\n    participant Google as \"Google OAuth2\u003cbr/\u003eAPI\"\n    participant KeySaver as \"GoogleApiKeySaverEntryPoint\"\n    \n    User-\u003e\u003eSuiteCRM: Navigate to User Settings\n    SuiteCRM-\u003e\u003eKeySaver: Request new token (?getnew=1)\n    KeySaver-\u003e\u003eGoogle: createAuthUrl()\n    Google--\u003e\u003eKeySaver: Authorization URL\n    KeySaver-\u003e\u003eUser: Redirect to Google OAuth\n    User-\u003e\u003eGoogle: Grant permissions\n    Google-\u003e\u003eSuiteCRM: Callback with auth code\n    SuiteCRM-\u003e\u003eKeySaver: handleRequestCode()\n    KeySaver-\u003e\u003eGoogle: fetchAccessTokenWithAuthCode()\n    Google--\u003e\u003eKeySaver: Access + Refresh Tokens\n    KeySaver-\u003e\u003eSuiteCRM: Save to user preferences\n    KeySaver-\u003e\u003eUser: Redirect to User Settings\n```\n\n**Sources:** [modules/Users/GoogleApiKeySaverEntryPoint.php:106-198](), [modules/Users/entryPointSaveGoogleApiKey.php:55-57]()\n\n## Core Classes and Responsibilities\n\n### GoogleSync Class\n\nThe `GoogleSync` class serves as the main orchestrator for synchronization operations.\n\n| Method | Purpose | Line Reference |\n|--------|---------|---------------|\n| `doSync()` | Performs sync for a single user | [include/GoogleSync/GoogleSync.php:144-169]() |\n| `syncAllUsers()` | Orchestrates sync for all configured users | [include/GoogleSync/GoogleSync.php:281-312]() |\n| `pushPullSkip()` | Determines sync action for event pairs | [include/GoogleSync/GoogleSync.php:204-228]() |\n| `doAction()` | Executes the determined sync action | [include/GoogleSync/GoogleSync.php:100-135]() |\n\n### GoogleSyncBase Class\n\nThe `GoogleSyncBase` class provides core functionality for Google API interactions and data management.\n\n| Method | Purpose | Line Reference |\n|--------|---------|---------------|\n| `initUserService()` | Initializes Google services for a user | [include/GoogleSync/GoogleSyncBase.php:257-285]() |\n| `pushEvent()` | Syncs SuiteCRM meeting to Google | [include/GoogleSync/GoogleSyncBase.php:556-586]() |\n| `pullEvent()` | Syncs Google event to SuiteCRM | [include/GoogleSync/GoogleSyncBase.php:631-662]() |\n| `getUserMeetings()` | Retrieves user's SuiteCRM meetings | [include/GoogleSync/GoogleSyncBase.php:295-318]() |\n| `getUserGoogleEvents()` | Retrieves user's Google calendar events | [include/GoogleSync/GoogleSyncBase.php:397-427]() |\n\n**Sources:** [include/GoogleSync/GoogleSync.php:48-313](), [include/GoogleSync/GoogleSyncBase.php:51-285]()\n\n## Synchronization Logic\n\n### Sync Decision Matrix\n\nThe system uses sophisticated logic to determine the appropriate action when synchronizing events between SuiteCRM and Google Calendar.\n\n```mermaid\nflowchart TD\n    START[\"Event Comparison\"] --\u003e SINGLE{\"Single Event?\"}\n    \n    SINGLE --\u003e|Yes| STYPE{\"Event Type?\"}\n    STYPE --\u003e|SuiteCRM Only\u003cbr/\u003enot deleted| PUSH[\"Action: push\"]\n    STYPE --\u003e|Google Only\u003cbr/\u003enot cancelled\u003cbr/\u003enot all-day| PULL[\"Action: pull\"]\n    STYPE --\u003e|Other| SKIP1[\"Action: skip\"]\n    \n    SINGLE --\u003e|No| SYNCED{\"Already Synced\u003cbr/\u003eThis Session?\"}\n    SYNCED --\u003e|Yes| SKIP2[\"Action: skip\"]\n    \n    SYNCED --\u003e|No| DELETED{\"Both Deleted?\"}\n    DELETED --\u003e|Yes| SKIP3[\"Action: skip\"]\n    \n    DELETED --\u003e|No| MODIFIED{\"Modified Since\u003cbr/\u003eLast Sync?\"}\n    MODIFIED --\u003e|No| SKIP4[\"Action: skip\"]\n    \n    MODIFIED --\u003e|Yes| NEWER{\"Which is Newer?\"}\n    NEWER --\u003e|Google Newer\u003cbr/\u003eCancelled| PULLDELETE[\"Action: pull_delete\"]\n    NEWER --\u003e|Google Newer\u003cbr/\u003eActive| PULL2[\"Action: pull\"]\n    NEWER --\u003e|SuiteCRM Newer\u003cbr/\u003eDeleted| PUSHDELETE[\"Action: push_delete\"]\n    NEWER --\u003e|SuiteCRM Newer\u003cbr/\u003eActive| PUSH2[\"Action: push\"]\n```\n\n**Sources:** [include/GoogleSync/GoogleSyncHelper.php:69-170](), [include/GoogleSync/GoogleSync.php:204-228]()\n\n### Data Flow Architecture\n\n```mermaid\ngraph LR\n    subgraph \"SuiteCRM Data\"\n        MEET[\"Meeting Records\u003cbr/\u003emeetings table\"]\n        GSYNC[\"gsync_id field\u003cbr/\u003egsync_lastsync field\"]\n        USERPREFS[\"User Preferences\u003cbr/\u003eGoogleApiToken\u003cbr/\u003esyncGCal\"]\n    end\n    \n    subgraph \"Sync Engine\"\n        SYNCPROC[\"Sync Process\u003cbr/\u003eGoogleSync::doSync()\"]\n        COMPARE[\"Event Comparison\u003cbr/\u003eGoogleSyncHelper\"]\n        ACTIONS[\"Sync Actions\u003cbr/\u003epush/pull/skip/delete\"]\n    end\n    \n    subgraph \"Google Calendar\"\n        GEVENTS[\"Calendar Events\u003cbr/\u003eGoogle Calendar API\"]\n        GCAL[\"SuiteCRM Calendar\u003cbr/\u003eCreated if missing\"]\n        EXTPROPS[\"Extended Properties\u003cbr/\u003esuitecrm_id\u003cbr/\u003esuitecrm_type\"]\n    end\n    \n    MEET --\u003e SYNCPROC\n    USERPREFS --\u003e SYNCPROC\n    SYNCPROC --\u003e COMPARE\n    COMPARE --\u003e ACTIONS\n    ACTIONS --\u003e GSYNC\n    ACTIONS --\u003e GEVENTS\n    GEVENTS --\u003e EXTPROPS\n    EXTPROPS --\u003e GCAL\n```\n\n**Sources:** [include/GoogleSync/GoogleSyncBase.php:295-427](), [include/GoogleSync/GoogleSyncHelper.php:92-170]()\n\n## Configuration Management\n\n### System-Level Configuration\n\nThe Google Calendar integration requires system-wide configuration of Google API credentials stored in the `google_auth_json` configuration variable.\n\n```mermaid\ngraph TD\n    subgraph \"Admin Configuration\"\n        ADMIN[\"Admin Panel\u003cbr/\u003emodules/Configurator\"]\n        JSON[\"google_auth_json\u003cbr/\u003eBase64 Encoded JSON\"]\n        VALIDATE[\"Config Validation\u003cbr/\u003echeckGoogleSyncJSON()\"]\n    end\n    \n    subgraph \"JSON Structure\"\n        WEB[\"web object\"]\n        CLIENTID[\"client_id\"]\n        SECRET[\"client_secret\"]\n        REDIRECT[\"redirect_uris\"]\n    end\n    \n    subgraph \"User Configuration\"\n        USEREDIT[\"User EditView\"]\n        SYNCPREF[\"syncGCal Preference\"]\n        TOKENS[\"OAuth Tokens\u003cbr/\u003eGoogleApiToken\u003cbr/\u003eGoogleApiRefreshToken\"]\n    end\n    \n    ADMIN --\u003e JSON\n    JSON --\u003e VALIDATE\n    JSON --\u003e WEB\n    WEB --\u003e CLIENTID\n    WEB --\u003e SECRET\n    WEB --\u003e REDIRECT\n    \n    USEREDIT --\u003e SYNCPREF\n    USEREDIT --\u003e TOKENS\n```\n\n**Sources:** [modules/Configurator/views/view.edit.php:176-209](), [modules/Users/GoogleApiKeySaverEntryPoint.php:106-142]()\n\n### User Preferences Schema\n\n| Preference Key | Category | Purpose | Format |\n|---------------|----------|---------|---------|\n| `GoogleApiToken` | `GoogleSync` | OAuth access token | Base64 encoded JSON |\n| `GoogleApiRefreshToken` | `GoogleSync` | OAuth refresh token | Base64 encoded string |\n| `syncGCal` | `GoogleSync` | Enable/disable sync | Boolean |\n\n**Sources:** [include/GoogleSync/GoogleSyncBase.php:186-195](), [modules/Users/GoogleApiKeySaverEntryPoint.php:190-194]()\n\n## Error Handling and Exceptions\n\n### Exception Hierarchy\n\nThe system defines a comprehensive set of custom exceptions for different failure scenarios.\n\n```mermaid\nclassDiagram\n    class GoogleSyncException {\n        +int MEETING_NOT_FOUND = 101\n        +int EVENT_ID_IS_EMPTY = 102\n        +int INVALID_CLIENT_ID = 104\n        +int UNABLE_TO_RETRIEVE_USER = 105\n        +int NO_REFRESH_TOKEN = 110\n        +int JSON_CORRUPT = 121\n        +int JSON_KEY_MISSING = 122\n        +int GEVENT_INSERT_OR_UPDATE_FAILURE = 124\n    }\n    \n    Exception \u003c|-- GoogleSyncException\n```\n\n### Common Error Scenarios\n\n| Error Code | Constant | Typical Cause | Recovery Action |\n|------------|----------|---------------|-----------------|\n| 101 | `MEETING_NOT_FOUND` | Database query failure | Retry or skip record |\n| 110 | `NO_REFRESH_TOKEN` | Missing refresh token | Re-authenticate user |\n| 121 | `JSON_CORRUPT` | Invalid Google auth JSON | Reconfigure admin settings |\n| 124 | `GEVENT_INSERT_OR_UPDATE_FAILURE` | Google API error | Retry with backoff |\n\n**Sources:** [include/GoogleSync/GoogleSyncExceptions.php:51-84]()\n\n## Scheduling and Automation\n\n### Cron Job Integration\n\nThe system supports automated synchronization through SuiteCRM's scheduler system, allowing administrators to configure regular sync intervals.\n\n```mermaid\ngraph LR\n    subgraph \"Scheduler System\"\n        CRON[\"Cron Job Trigger\"]\n        SCHEDULER[\"SuiteCRM Scheduler\"]\n        GSYNCJOB[\"Google Sync Job\"]\n    end\n    \n    subgraph \"Sync Execution\"\n        USERS[\"setSyncUsers()\u003cbr/\u003eFind eligible users\"]\n        LOOP[\"User Sync Loop\u003cbr/\u003esyncAllUsers()\"]\n        INDIVIDUAL[\"Individual Sync\u003cbr/\u003edoSync(userId)\"]\n    end\n    \n    subgraph \"User Selection Criteria\"\n        TOKEN[\"Has GoogleApiToken\"]\n        ENABLED[\"syncGCal = true\"]\n        VALID[\"Token not expired\"]\n    end\n    \n    CRON --\u003e SCHEDULER\n    SCHEDULER --\u003e GSYNCJOB\n    GSYNCJOB --\u003e USERS\n    USERS --\u003e TOKEN\n    USERS --\u003e ENABLED\n    USERS --\u003e VALID\n    USERS --\u003e LOOP\n    LOOP --\u003e INDIVIDUAL\n```\n\n**Sources:** [include/GoogleSync/GoogleSync.php:239-312](), [include/GoogleSync/GoogleSync.php:281-312]()\n\n## Integration Points\n\n### Meeting Module Integration\n\nThe Google Calendar integration extends the SuiteCRM Meeting module with additional fields for tracking synchronization state.\n\n| Field | Purpose | Type |\n|-------|---------|------|\n| `gsync_id` | Google Calendar event ID | VARCHAR |\n| `gsync_lastsync` | Last synchronization timestamp | TIMESTAMP |\n\n### Google Calendar API Integration\n\nThe system interacts with the Google Calendar API through the official Google Client Library, specifically using:\n\n- `\\Google\\Client` for authentication\n- `\\Google\\Service\\Calendar` for calendar operations  \n- `\\Google\\Service\\Calendar\\Event` for event manipulation\n\n**Sources:** [include/GoogleSync/GoogleSyncBase.php:65-78](), [include/GoogleSync/GoogleSyncBase.php:221-242]()"])</script><script>self.__next_f.push([1,"2c:T36f3,"])</script><script>self.__next_f.push([1,"# ElasticSearch Integration\n\n\u003cdetails\u003e\n\u003csummary\u003eRelevant source files\u003c/summary\u003e\n\nThe following files were used as context for generating this wiki page:\n\n- [lib/Robo/Plugin/Commands/ElasticSearchCommands.php](lib/Robo/Plugin/Commands/ElasticSearchCommands.php)\n- [lib/Search/ElasticSearch/ElasticSearchClientBuilder.php](lib/Search/ElasticSearch/ElasticSearchClientBuilder.php)\n- [lib/Search/ElasticSearch/ElasticSearchHooks.php](lib/Search/ElasticSearch/ElasticSearchHooks.php)\n- [lib/Search/ElasticSearch/ElasticSearchIndexer.php](lib/Search/ElasticSearch/ElasticSearchIndexer.php)\n- [lib/Search/Index/AbstractIndexer.php](lib/Search/Index/AbstractIndexer.php)\n- [lib/Search/Index/Documentify/AbstractDocumentifier.php](lib/Search/Index/Documentify/AbstractDocumentifier.php)\n- [lib/Search/Index/Documentify/JsonSerializerDocumentifier.php](lib/Search/Index/Documentify/JsonSerializerDocumentifier.php)\n- [lib/Search/Index/Documentify/SearchDefsDocumentifier.php](lib/Search/Index/Documentify/SearchDefsDocumentifier.php)\n- [lib/Search/Index/Documentify/SearchDefsDocumentifier.yml](lib/Search/Index/Documentify/SearchDefsDocumentifier.yml)\n- [lib/Utility/BeanJsonSerializer.php](lib/Utility/BeanJsonSerializer.php)\n\n\u003c/details\u003e\n\n\n\nThis document covers SuiteCRM's integration with Elasticsearch, which provides advanced full-text search capabilities across CRM data. The integration includes indexing of SugarBean entities, real-time synchronization through hooks, and a comprehensive search interface.\n\nFor information about the broader search framework and ListView search functionality, see [Search System](#5.3).\n\n## Architecture Overview\n\nThe ElasticSearch integration consists of several interconnected components that handle indexing, synchronization, and search operations.\n\n### Core Component Architecture\n\n```mermaid\ngraph TB\n    subgraph \"SuiteCRM Core\"\n        SugarBean[\"SugarBean\"]\n        SearchWrapper[\"SearchWrapper\"]\n        BeanFactory[\"BeanFactory\"]\n    end\n    \n    subgraph \"ElasticSearch Integration\"\n        ESIndexer[\"ElasticSearchIndexer\"]\n        ESClientBuilder[\"ElasticSearchClientBuilder\"] \n        ESHooks[\"ElasticSearchHooks\"]\n        ESCommands[\"ElasticSearchCommands\"]\n    end\n    \n    subgraph \"Document Processing\"\n        AbstractDocumentifier[\"AbstractDocumentifier\"]\n        JsonSerializerDocumentifier[\"JsonSerializerDocumentifier\"]\n        SearchDefsDocumentifier[\"SearchDefsDocumentifier\"]\n        BeanJsonSerializer[\"BeanJsonSerializer\"]\n    end\n    \n    subgraph \"External Services\"\n        ESCluster[\"Elasticsearch Cluster\"]\n    end\n    \n    SugarBean --\u003e ESHooks\n    ESHooks --\u003e ESIndexer\n    ESIndexer --\u003e ESClientBuilder\n    ESClientBuilder --\u003e ESCluster\n    ESIndexer --\u003e AbstractDocumentifier\n    AbstractDocumentifier --\u003e JsonSerializerDocumentifier\n    AbstractDocumentifier --\u003e SearchDefsDocumentifier\n    JsonSerializerDocumentifier --\u003e BeanJsonSerializer\n    ESCommands --\u003e ESIndexer\n    SearchWrapper --\u003e ESIndexer\n    \n    style ESIndexer fill:#e8f5e8\n    style ESClientBuilder fill:#fff3e0\n    style ESHooks fill:#f3e5f5\n```\n\nSources: [lib/Search/ElasticSearch/ElasticSearchIndexer.php:65](), [lib/Search/ElasticSearch/ElasticSearchClientBuilder.php:52](), [lib/Search/ElasticSearch/ElasticSearchHooks.php:57](), [lib/Robo/Plugin/Commands/ElasticSearchCommands.php:60]()\n\n### Indexing and Search Flow\n\n```mermaid\nflowchart TD\n    Start[\"CRM Operation\"] --\u003e Hook[\"after_save/after_delete Hook\"]\n    Hook --\u003e ESHooks[\"ElasticSearchHooks.beanSaved()\"]\n    ESHooks --\u003e Check{\"ElasticSearchIndexer.isEnabled()\"}\n    Check --\u003e|No| End[\"Skip Indexing\"]\n    Check --\u003e|Yes| Reindex[\"reIndexSafe()\"]\n    Reindex --\u003e Action{\"Bean Action\"}\n    Action --\u003e|Saved| IndexBean[\"indexBean()\"]\n    Action --\u003e|Deleted| RemoveBean[\"removeBean()\"]\n    IndexBean --\u003e Documentify[\"documentifier.documentify()\"]\n    Documentify --\u003e ESClient[\"client.index()\"]\n    RemoveBean --\u003e ESDelete[\"client.delete()\"]\n    ESClient --\u003e ESCluster[\"Elasticsearch Cluster\"]\n    ESDelete --\u003e ESCluster\n    ESCluster --\u003e End\n    \n    subgraph \"Batch Operations\"\n        BatchIndex[\"index()\"] --\u003e ModuleLoop[\"indexModule()\"]\n        ModuleLoop --\u003e DataPuller[\"ElasticSearchModuleDataPuller\"]\n        DataPuller --\u003e BatchSend[\"indexBatch()\"]\n        BatchSend --\u003e BulkAPI[\"client.bulk()\"]\n    end\n```\n\nSources: [lib/Search/ElasticSearch/ElasticSearchHooks.php:73-96](), [lib/Search/ElasticSearch/ElasticSearchIndexer.php:112-164](), [lib/Search/ElasticSearch/ElasticSearchIndexer.php:288-305]()\n\n## Configuration System\n\nElasticSearch integration is configured through the global `$sugar_config` array and managed by the `ElasticSearchClientBuilder` class.\n\n### Configuration Structure\n\nThe configuration is stored in `$sugar_config['search']['ElasticSearch']` and includes:\n\n| Configuration Key | Purpose | Default |\n|------------------|---------|---------|\n| `enabled` | Enable/disable ElasticSearch | `false` |\n| `host` | ElasticSearch server host | `127.0.0.1` |\n| `user` | Authentication username | Empty |\n| `pass` | Authentication password | Empty |\n\n### Client Configuration\n\nThe `ElasticSearchClientBuilder` class handles client instantiation and host configuration:\n\n```mermaid\ngraph LR\n    Config[\"sugar_config\"] --\u003e LoadConfig[\"loadFromSugarConfig()\"]\n    LoadConfig --\u003e Sanitize[\"sanitizeHost()\"]\n    Sanitize --\u003e ClientBuilder[\"ClientBuilder.create()\"]\n    ClientBuilder --\u003e ESClient[\"Elasticsearch\\\\Client\"]\n    \n    subgraph \"Host Processing\"\n        Sanitize --\u003e AddHTTP[\"addHttp()\"]\n        AddHTTP --\u003e ParseURL[\"parse_url()\"]\n        ParseURL --\u003e Merge[\"array_merge()\"]\n    end\n```\n\nSources: [lib/Search/ElasticSearch/ElasticSearchClientBuilder.php:61-70](), [lib/Search/ElasticSearch/ElasticSearchClientBuilder.php:166-188](), [lib/Search/ElasticSearch/ElasticSearchClientBuilder.php:83-116]()\n\n## Indexing System\n\nThe indexing system is built around the `ElasticSearchIndexer` class, which extends `AbstractIndexer` and implements comprehensive indexing capabilities.\n\n### Indexer Lifecycle\n\nThe `ElasticSearchIndexer` supports both full and differential indexing modes:\n\n| Indexing Mode | Description | Performance |\n|---------------|-------------|-------------|\n| Full Indexing | Re-indexes all records | Slower, complete rebuild |\n| Differential Indexing | Only changed records since last run | Faster, incremental updates |\n\nThe indexer uses traits for modular functionality:\n\n- `IndexingStatisticsTrait` - Tracks indexing statistics\n- `IndexingLockFileTrait` - Manages lock files for differential indexing\n- `IndexingSchedulerTrait` - Handles scheduled indexing operations\n\n### Module Processing\n\n```mermaid\ngraph TD\n    IndexStart[\"index()\"] --\u003e GetModules[\"getModulesToIndex()\"]\n    GetModules --\u003e ModuleLoop{\"For each module\"}\n    ModuleLoop --\u003e IndexModule[\"indexModule(module)\"]\n    IndexModule --\u003e DataPuller[\"ElasticSearchModuleDataPuller\"]\n    DataPuller --\u003e WhereClause[\"buildWhereClause()\"]\n    WhereClause --\u003e PullBatch[\"pullNextBatch()\"]\n    PullBatch --\u003e IndexBeans[\"indexBeans()\"]\n    IndexBeans --\u003e IndexBatch[\"indexBatch()\"]\n    IndexBatch --\u003e SendBatch[\"sendBatch()\"]\n    SendBatch --\u003e BulkAPI[\"client.bulk()\"]\n    BulkAPI --\u003e NextBatch{\"More batches?\"}\n    NextBatch --\u003e|Yes| PullBatch\n    NextBatch --\u003e|No| NextModule{\"More modules?\"}\n    NextModule --\u003e|Yes| ModuleLoop\n    NextModule --\u003e|No| Complete[\"Indexing Complete\"]\n```\n\nSources: [lib/Search/ElasticSearch/ElasticSearchIndexer.php:112-164](), [lib/Search/ElasticSearch/ElasticSearchIndexer.php:201-239](), [lib/Search/ElasticSearch/ElasticSearchIndexer.php:433-461]()\n\n### Batch Processing\n\nThe indexer processes records in configurable batches (default: 1000 records) to optimize performance:\n\n- Batch size is configurable via `setBatchSize()`\n- Deleted beans are handled as delete operations in the same batch\n- Error handling tracks failed operations and adjusts statistics\n\nSources: [lib/Search/ElasticSearch/ElasticSearchIndexer.php:76](), [lib/Search/ElasticSearch/ElasticSearchIndexer.php:391-402](), [lib/Search/ElasticSearch/ElasticSearchIndexer.php:495-525]()\n\n## Document Transformation\n\nThe system uses documentifiers to convert `SugarBean` objects into searchable documents. Two main implementations are available:\n\n### Documentifier Architecture\n\n```mermaid\ngraph TB\n    SugarBean[\"SugarBean\"] --\u003e AbstractDocumentifier[\"AbstractDocumentifier\"]\n    AbstractDocumentifier --\u003e JsonSerializerDocumentifier[\"JsonSerializerDocumentifier\"]\n    AbstractDocumentifier --\u003e SearchDefsDocumentifier[\"SearchDefsDocumentifier\"]\n    \n    JsonSerializerDocumentifier --\u003e BeanJsonSerializer[\"BeanJsonSerializer\"]\n    SearchDefsDocumentifier --\u003e ParserSearchFields[\"ParserSearchFields\"]\n    SearchDefsDocumentifier --\u003e ArrayMapper[\"ArrayMapper\"]\n    \n    BeanJsonSerializer --\u003e JsonDoc[\"Human-friendly JSON\"]\n    ParserSearchFields --\u003e SearchDefs[\"Search Definitions\"]\n    ArrayMapper --\u003e MappedDoc[\"Mapped Document\"]\n    \n    subgraph \"Post-processing\"\n        JsonDoc --\u003e FixPhone[\"fixPhone()\"]\n        MappedDoc --\u003e FixPhone\n        FixPhone --\u003e FixEmails[\"fixEmails()\"]\n        FixEmails --\u003e FinalDoc[\"Final Document\"]\n    end\n```\n\nSources: [lib/Search/Index/Documentify/AbstractDocumentifier.php:56](), [lib/Search/Index/Documentify/JsonSerializerDocumentifier.php:56](), [lib/Search/Index/Documentify/SearchDefsDocumentifier.php:61]()\n\n### JsonSerializerDocumentifier\n\nThis documentifier creates human-friendly documents using the `BeanJsonSerializer`:\n\n- Provides nested structure for complex relationships\n- Includes all bean fields with standardized formatting\n- Suitable for advanced search queries\n- Does not use search definitions (non-customizable)\n\n### SearchDefsDocumentifier\n\nThis documentifier uses module-specific search definitions:\n\n- Customizable via search definition files\n- Module-specific field mapping\n- Uses `ParserSearchFields` to read configuration\n- Supports field mapping through YAML configuration\n\nSources: [lib/Search/Index/Documentify/JsonSerializerDocumentifier.php:70-77](), [lib/Search/Index/Documentify/SearchDefsDocumentifier.php:90-104](), [lib/Search/Index/Documentify/SearchDefsDocumentifier.yml:1-21]()\n\n## Real-time Synchronization\n\nThe `ElasticSearchHooks` class provides real-time index synchronization through SuiteCRM's logic hook system.\n\n### Hook Integration\n\n```mermaid\ngraph LR\n    BeanSave[\"Bean Save\"] --\u003e AfterSave[\"after_save Hook\"]\n    BeanDelete[\"Bean Delete\"] --\u003e AfterDelete[\"after_delete Hook\"]\n    AfterSave --\u003e BeanSaved[\"beanSaved()\"]\n    AfterDelete --\u003e BeanDeleted[\"beanDeleted()\"]\n    BeanSaved --\u003e ReIndexSafe[\"reIndexSafe()\"]\n    BeanDeleted --\u003e ReIndexSafe\n    ReIndexSafe --\u003e ReIndex[\"reIndex()\"]\n    ReIndex --\u003e PerformAction[\"performAction()\"]\n    PerformAction --\u003e IndexBean[\"indexBean()\"]\n    PerformAction --\u003e RemoveBean[\"removeBean()\"]\n```\n\nSources: [lib/Search/ElasticSearch/ElasticSearchHooks.php:73-80](), [lib/Search/ElasticSearch/ElasticSearchHooks.php:89-96](), [lib/Search/ElasticSearch/ElasticSearchHooks.php:105-145]()\n\n### Error Handling\n\nThe hooks implement comprehensive error handling to prevent CRM operations from failing due to search indexing issues:\n\n- `reIndexSafe()` wraps operations in try-catch blocks\n- Errors are logged but do not interrupt normal CRM workflow\n- Module blacklisting prevents indexing of unsupported modules\n\nSources: [lib/Search/ElasticSearch/ElasticSearchHooks.php:105-116](), [lib/Search/ElasticSearch/ElasticSearchHooks.php:163-166](), [lib/Search/ElasticSearch/ElasticSearchHooks.php:194-208]()\n\n## Command Line Interface\n\nThe `ElasticSearchCommands` class provides Robo-based CLI commands for ElasticSearch management.\n\n### Available Commands\n\n| Command | Method | Purpose |\n|---------|--------|---------|\n| `elastic:search` | `elasticSearch()` | Perform search queries |\n| `elastic:index` | `elasticIndex()` | Build or rebuild index |\n| `elastic:rm-index` | `elasticRmIndex()` | Remove index |\n\n### Command Implementation\n\n```mermaid\ngraph TD\n    CLI[\"CLI Command\"] --\u003e Bootstrap[\"bootstrap()\"]\n    Bootstrap --\u003e Command{\"Command Type\"}\n    Command --\u003e|search| Search[\"elasticSearch()\"]\n    Command --\u003e|index| Index[\"elasticIndex()\"]\n    Command --\u003e|rm-index| Remove[\"elasticRmIndex()\"]\n    \n    Search --\u003e SearchWrapper[\"SearchWrapper\"]\n    SearchWrapper --\u003e Results[\"Display Results\"]\n    \n    Index --\u003e RepairIndex[\"repairElasticsearchIndex()\"]\n    RepairIndex --\u003e ESIndexer[\"ElasticSearchIndexer\"]\n    \n    Remove --\u003e RemoveIndex[\"removeIndex()\"]\n    RemoveIndex --\u003e DeleteAPI[\"client.indices().delete()\"]\n```\n\nSources: [lib/Robo/Plugin/Commands/ElasticSearchCommands.php:76-97](), [lib/Robo/Plugin/Commands/ElasticSearchCommands.php:117-122](), [lib/Robo/Plugin/Commands/ElasticSearchCommands.php:127-133]()\n\n### Search Command Features\n\nThe search command supports:\n- Full Elasticsearch query string syntax\n- Configurable result size\n- JSON output format for detailed results\n- Performance timing display\n\nSources: [lib/Robo/Plugin/Commands/ElasticSearchCommands.php:72-75](), [lib/Robo/Plugin/Commands/ElasticSearchCommands.php:142-159](), [lib/Robo/Plugin/Commands/ElasticSearchCommands.php:166-170]()\n\n## Integration Points\n\nThe ElasticSearch integration connects with several core SuiteCRM systems:\n\n### SearchWrapper Integration\n\nThe `SearchWrapper` class provides the primary interface for search operations, supporting multiple search engines including ElasticSearch.\n\n### Administrative Interface\n\nElasticSearch configuration is accessible through the SuiteCRM administration panel, allowing administrators to:\n- Enable/disable ElasticSearch\n- Configure connection settings\n- Monitor indexing status\n- Trigger manual re-indexing\n\n### Module Compatibility\n\nThe system automatically determines which modules to index based on:\n- `SearchWrapper::getModules()` configuration\n- Module blacklisting capabilities\n- Search definition availability\n\nSources: [lib/Search/Index/AbstractIndexer.php:83](), [lib/Search/ElasticSearch/ElasticSearchHooks.php:163-166](), [lib/Search/ElasticSearch/ElasticSearchIndexer.php:97-109]()"])</script><script>self.__next_f.push([1,"5:[\"$\",\"$L12\",null,{\"repoName\":\"SuiteCRM/SuiteCRM\",\"hasConfig\":false,\"children\":[\"$\",\"$L13\",null,{\"wiki\":{\"metadata\":{\"repo_name\":\"SuiteCRM/SuiteCRM\",\"commit_hash\":\"0ff06765\",\"generated_at\":\"2025-07-18T19:57:08.065145\",\"config\":null,\"config_source\":\"none\"},\"pages\":[{\"page_plan\":{\"id\":\"1\",\"title\":\"SuiteCRM Overview\"},\"content\":\"$14\"},{\"page_plan\":{\"id\":\"2\",\"title\":\"Core Architecture\"},\"content\":\"$15\"},{\"page_plan\":{\"id\":\"2.1\",\"title\":\"MVC Framework\"},\"content\":\"$16\"},{\"page_plan\":{\"id\":\"2.2\",\"title\":\"Data Layer (SugarBean)\"},\"content\":\"$17\"},{\"page_plan\":{\"id\":\"2.3\",\"title\":\"Configuration System\"},\"content\":\"$18\"},{\"page_plan\":{\"id\":\"3\",\"title\":\"User Interface System\"},\"content\":\"$19\"},{\"page_plan\":{\"id\":\"3.1\",\"title\":\"Theme Management\"},\"content\":\"$1a\"},{\"page_plan\":{\"id\":\"3.2\",\"title\":\"JavaScript Framework\"},\"content\":\"$1b\"},{\"page_plan\":{\"id\":\"3.3\",\"title\":\"Inline Editing\"},\"content\":\"$1c\"},{\"page_plan\":{\"id\":\"4\",\"title\":\"Core Business Modules\"},\"content\":\"$1d\"},{\"page_plan\":{\"id\":\"4.1\",\"title\":\"User Management\"},\"content\":\"$1e\"},{\"page_plan\":{\"id\":\"4.2\",\"title\":\"Email System\"},\"content\":\"$1f\"},{\"page_plan\":{\"id\":\"4.3\",\"title\":\"Campaign Management\"},\"content\":\"$20\"},{\"page_plan\":{\"id\":\"4.4\",\"title\":\"Reports and Analytics\"},\"content\":\"$21\"},{\"page_plan\":{\"id\":\"4.5\",\"title\":\"Inbound Email Processing\"},\"content\":\"$22\"},{\"page_plan\":{\"id\":\"5\",\"title\":\"Administration \u0026 Configuration\"},\"content\":\"$23\"},{\"page_plan\":{\"id\":\"5.1\",\"title\":\"Installation System\"},\"content\":\"$24\"},{\"page_plan\":{\"id\":\"5.2\",\"title\":\"Administration Panel\"},\"content\":\"$25\"},{\"page_plan\":{\"id\":\"5.3\",\"title\":\"Search System\"},\"content\":\"$26\"},{\"page_plan\":{\"id\":\"6\",\"title\":\"Development \u0026 Testing\"},\"content\":\"$27\"},{\"page_plan\":{\"id\":\"6.1\",\"title\":\"Testing \u0026 CI/CD\"},\"content\":\"$28\"},{\"page_plan\":{\"id\":\"6.2\",\"title\":\"API Architecture\"},\"content\":\"$29\"},{\"page_plan\":{\"id\":\"7\",\"title\":\"External Integrations\"},\"content\":\"$2a\"},{\"page_plan\":{\"id\":\"7.1\",\"title\":\"Google Calendar Integration\"},\"content\":\"$2b\"},{\"page_plan\":{\"id\":\"7.2\",\"title\":\"ElasticSearch Integration\"},\"content\":\"$2c\"}]},\"children\":[\"$\",\"$L3\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L4\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]}]}]\n"])</script><script>self.__next_f.push([1,"c:null\n10:[[\"$\",\"title\",\"0\",{\"children\":\"SuiteCRM/SuiteCRM | DeepWiki\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"This document provides a comprehensive overview of SuiteCRM's architecture, core systems, and key components. SuiteCRM is an open-source Customer Relationship Management (CRM) system that provides ent\"}],[\"$\",\"meta\",\"2\",{\"property\":\"og:title\",\"content\":\"SuiteCRM/SuiteCRM | DeepWiki\"}],[\"$\",\"meta\",\"3\",{\"property\":\"og:description\",\"content\":\"This document provides a comprehensive overview of SuiteCRM's architecture, core systems, and key components. SuiteCRM is an open-source Customer Relationship Management (CRM) system that provides ent\"}],[\"$\",\"meta\",\"4\",{\"property\":\"og:url\",\"content\":\"https://deepwiki.com/SuiteCRM/SuiteCRM\"}],[\"$\",\"meta\",\"5\",{\"property\":\"og:site_name\",\"content\":\"DeepWiki\"}],[\"$\",\"meta\",\"6\",{\"property\":\"og:type\",\"content\":\"website\"}],[\"$\",\"meta\",\"7\",{\"name\":\"twitter:card\",\"content\":\"summary\"}],[\"$\",\"meta\",\"8\",{\"name\":\"twitter:title\",\"content\":\"SuiteCRM/SuiteCRM | DeepWiki\"}],[\"$\",\"meta\",\"9\",{\"name\":\"twitter:description\",\"content\":\"This document provides a comprehensive overview of SuiteCRM's architecture, core systems, and key components. SuiteCRM is an open-source Customer Relationship Management (CRM) system that provides ent\"}],[\"$\",\"link\",\"10\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"48x48\"}],[\"$\",\"link\",\"11\",{\"rel\":\"icon\",\"href\":\"/icon.png?66aaf51e0e68c818\",\"type\":\"image/png\",\"sizes\":\"16x16\"}],[\"$\",\"link\",\"12\",{\"rel\":\"apple-touch-icon\",\"h
